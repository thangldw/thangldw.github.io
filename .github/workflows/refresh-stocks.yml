name: Refresh stock data

# The visible half of the data pipeline: a scheduled ELT job that extracts from
# Yahoo Finance, transforms into a tidy Parquet table, and commits it back so the
# static Data Copilot demo always opens on fresh, real market data.

on:
  schedule:
    # 21:30 UTC daily ≈ after the US close and before the next Tokyo open.
    - cron: "30 21 * * *"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to commit the refreshed data back to the repo

concurrency:
  group: refresh-stocks
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet pandas pyarrow

      - name: Fetch + transform
        run: python scripts/fetch_stocks.py

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/data-copilot/data/stocks.parquet apps/data-copilot/data/meta.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore(data): refresh stock dataset [skip ci]"
            git push
          fi
