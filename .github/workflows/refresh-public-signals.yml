name: Refresh public signals

on:
  schedule:
    - cron: "15 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-public-signals
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch and validate public signals
        run: python scripts/fetch_public_signals.py
      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/public-signals/data/
          if git diff --cached --quiet; then
            echo "No public-signal changes — nothing to commit."
          else
            git commit -m "chore(data): refresh public signals [skip ci]"
            git push
          fi
