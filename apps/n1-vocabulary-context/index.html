var japaneseVoice = null;
function loadVoices() {
  var voices = window.speechSynthesis.getVoices();
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang === 'ja-JP' || voices[i].lang.indexOf('ja') === 0) {
      japaneseVoice = voices[i];
      break;
    }
  }
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function speakJapanese(text, btnId) {
  if (!text) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var allBtns = document.querySelectorAll('.spk, .spk-sm');
  for (var n = 0; n < allBtns.length; n++) {
    allBtns[n].classList.remove('playing');
  }
  var utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ja-JP';
  utterance.rate = 0.9;
  utterance.pitch = 1;
  utterance.volume = 1;
  if (japaneseVoice) {
    utterance.voice = japaneseVoice;
  }
  var btn = btnId ? document.getElementById(btnId) : null;
  if (btn) btn.classList.add('playing');
  utterance.onend = function() {
    if (btn) btn.classList.remove('playing');
  };
  utterance.onerror = function() {
    if (btn) btn.classList.remove('playing');
  };
  window.speechSynthesis.speak(utterance);
}

  if (!s) return '';
  s = s.split('&').join('&amp;');
  s = s.split('<').join('&lt;');
  s = s.split('>').join('&gt;');
  return s;
}

function escAttr(s) {
  if (!s) return '';
  s = esc(s);
  s = s.split('"').join('&quot;');
  s = s.split("'").join('&#39;');
  return s;
}

function escKeepMark(s) {
  if (!s) return '';
  s = s.split('&').join('&amp;');
  s = s.split('<mark>').join('');
  s = s.split('</mark>').join('');
  s = s.split('<').join('&lt;');
  s = s.split('>').join('&gt;');
  s = s.split('').join('<mark>');
  s = s.split('').join('</mark>');
  return s;
}

function buildQuestionHtml(qidx) {
  var arr = getQ();
  var q = arr[qidx];
  if (!q) return '';
  var total = arr.length;
  var k = curK + '_' + qidx;
  var chosen = sel[k];
  var ans = q.a;
  var done = (chosen !== undefined);

  var BLANK = '（　）';
  var spokenSent = q.s.split(BLANK).join('');

  var sentHtml;
  if (done) {
    var ansWord = q.w[ans-1].k;
    var ansWordPlain = ansWord.split('(')[0];
    sentHtml = esc(q.s).split(BLANK).join('<span class="filled">' + esc(ansWordPlain) + '</span>');
  } else {
    sentHtml = esc(q.s).split(BLANK).join('<span class="blank">（　　）</span>');
  }

  var sentVnHtml = '';
  if (done && q.sv) {
    sentVnHtml = '<div class="sentvn">&#x1F1FB;&#x1F1F3; ' + esc(q.sv) + '</div>';
  }

  var opts = '';
  for (var i = 0; i < q.w.length; i++) {
    var w = q.w[i];
    var wcls = 'optwrap';
    if (done) {
      if (i + 1 === ans) wcls = 'optwrap ok';
      else if (i + 1 === chosen) wcls = 'optwrap ng';
    }
    var dis = done ? ' disabled' : '';
    var spkId = 'optspk_' + qidx + '_' + i;
    opts += '<div class="' + wcls + '">';
    opts += '<button class="opt" onclick="pick(' + qidx + ',' + i + ')"' + dis + '>' + (i+1) + '　' + esc(w.k) + '</button>';
    opts += '</div>';
  }

  var expl = '';
  if (done) {
    expl = '<div class="exwrap"><div class="extitle">全選択肢の解説 / Giải thích đáp án (đáp án đúng hiển thị trước)</div>';
    var order = [];
    order.push(ans - 1);
    for (var oi = 0; oi < q.w.length; oi++) {
      if (oi !== ans - 1) order.push(oi);
    }
    for (var oj = 0; oj < order.length; oj++) {
      var j = order[oj];
      var ww = q.w[j];
      var ia = (j + 1 === ans);
      expl += '<div class="wcard' + (ia ? ' ans' : '') + '">';
      expl += '<div class="whead"><div class="wnum">' + (j+1) + '</div>';
      expl += '<span class="wk">' + esc(ww.k) + '</span>';
      expl += '<span class="wr">《' + esc(ww.r) + '》</span>';
      if (ia) expl += '<span class="wbadge">✓ 正解</span>';
      expl += '</div><div class="wbody">';
      expl += '<div><div class="wlbl">意味(日本語)</div><div class="wval">' + esc(ww.j) + '</div></div>';
      expl += '<div><div class="wlbl">Nghĩa tiếng Việt</div><div class="wval vn">' + esc(ww.v) + '</div></div>';
      expl += '<div class="wfull"><div class="wlbl">セット表現</div><div class="wval set">' + escKeepMark(ww.set) + '</div>';
      if (ww.setv) {
        expl += '<div class="wval setvn">&#x1F1FB;&#x1F1F3; ' + esc(ww.setv) + '</div>';
      }
      expl += '</div>';
      expl += '</div></div>';
    }
    expl += '</div>';
  }

  var spkBtnId = 'spkBtn_' + qidx;
  var out = '';
  out += '<div class="qlbl">問 ' + (qidx+1) + ' / ' + total + '　[第' + curK + '回]</div>';
  out += '<div class="sentwrap"><div class="sent">' + sentHtml + '</div><button id="' + spkBtnId + '" class="spk" data-spoken="' + escAttr(spokenSent) + '" onclick="speakJapanese(this.getAttribute(\'data-spoken\'),\'' + spkBtnId + '\')" title="発音を聴く">&#x1F50A;</button></div>';
  out += sentVnHtml;
  out += '<div class="opts">' + opts + '</div>';
  out += expl;
  return out;
}

function renderQuestion(qidx) {
  var el = document.getElementById('qcard_' + qidx);
  if (el) el.innerHTML = buildQuestionHtml(qidx);
}

function renderAll() {
  var arr = getQ();
  var html = '';
  for (var i = 0; i < arr.length; i++) {
    html += '<div class="qcard" id="qcard_' + i + '">' + buildQuestionHtml(i) + '</div>';
  }
  document.getElementById('qa').innerHTML = html;
  updateScore();
}

function updateScore() {
  document.getElementById('sc').textContent = '正解 ' + sc + '/' + an;
  var arr = getQ();
  var pct = arr.length ? Math.round(an / arr.length * 100) : 0;
  document.getElementById('pf').style.width = pct + '%';
}

window.addEventListener('scroll', function() {
  var btn = document.getElementById('totopBtn');
  if (!btn) return;
  if (window.scrollY > 300) btn.classList.add('show');
  else btn.classList.remove('show');
});

function scrollToTop() {
  window.scrollTo({top:0, behavior:'smooth'});
}

renderAll();

</script>
