<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface2: #eef1fb;
    --border: #d4d8f0;
    --text: #1e2048;
    --muted: #6b72a8;
    --green: #16a34a;
    --green-bg: #dcfce7;
    --green-border: #86efac;
    --red: #dc2626;
    --red-bg: #fee2e2;
    --red-border: #fca5a5;
    --accent: #4f46e5;
    --accent-dim: rgba(79,70,229,0.08);
    --accent-border: rgba(79,70,229,0.25);
    --yellow: #d97706;
    --yellow-bg: #fef3c7;
    --orange: #ea580c;
    --orange-dim: rgba(234,88,12,0.08);
    --orange-border: rgba(234,88,12,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono), var(--font-sans, var(--portfolio-font-sans)); min-height: 100vh; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; box-shadow: 0 1px 8px rgba(79,70,229,0.07); }
  .header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .header-title { font-size: 15px; font-weight: 500; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid; }
  .badge-blue { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); font-weight: 500; }
  .badge-orange { background: var(--orange-dim); color: var(--orange); border-color: var(--orange-border); font-weight: 500; }
  .header-btns { display: flex; gap: 8px; }
  .hbtn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; font-weight: 500; }
  .hbtn:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .modes { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .mode-label { font-size: 12px; color: var(--muted); margin-right: 2px; }
  .mbtn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; font-weight: 500; }
  .mbtn:hover { border-color: var(--accent); color: var(--text); }
  .mbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .mbtn.active-orange { background: var(--orange); border-color: var(--orange); color: #fff; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { background: var(--surface); padding: 14px 16px; text-align: center; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .stat-val { font-size: 20px; font-weight: 500; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.accent { color: var(--accent); }

  .progress-wrap { background: var(--surface); border-bottom: 1px solid var(--border); }
  .progress-bar { height: 4px; background: var(--surface2); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: width .4s ease; border-radius: 0 2px 2px 0; }

  .main { max-width: 780px; margin: 0 auto; padding: 36px 20px 80px; }

  /* SET PHRASE TAG */
  .set-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--orange-dim); border: 1px solid var(--orange-border); color: var(--orange); font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; font-weight: 600; }

  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px 28px 30px; margin-bottom: 20px; text-align: center; box-shadow: 0 2px 16px rgba(79,70,229,0.07); }
  .q-num { font-size: 13px; color: var(--muted); margin-bottom: 14px; letter-spacing: .05em; font-weight: 500; }
  .q-kanji { font-family: system-ui, sans-serif; font-size: 72px; font-weight: 700; color: var(--text); margin-bottom: 10px; line-height: 1.1; letter-spacing: .02em; }

  /* Set phrase context */
  .q-context { font-family: system-ui, sans-serif; font-size: 13px; color: var(--orange); background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 8px 16px; margin: 8px 0 4px; display: inline-block; line-height: 1.6; font-weight: 500; }
  .q-context b { color: var(--orange); }

  .q-meaning { font-size: 16px; color: #7c3aed; font-weight: 600; margin-bottom: 4px; background: #f5f3ff; display: inline-block; padding: 4px 16px; border-radius: 20px; }
  .q-ask { font-size: 14px; color: var(--muted); margin-top: 6px; }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .opt { background: var(--surface); border: 2px solid var(--border); color: var(--text); padding: 18px 10px; border-radius: 12px; font-size: 20px; font-family: var(--font-sans, var(--portfolio-font-sans)); cursor: pointer; transition: all .15s; text-align: center; font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(79,70,229,0.12); }
  .opt.correct { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }
  .opt.wrong { border-color: var(--red-border); background: var(--red-bg); color: var(--red); }
  .opt.reveal { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }

  /* SET PHRASE: show example after answer */
  .set-examples { background: #fffbf5; border: 1px solid #fed7aa; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: none; text-align: left; }
  .set-examples.show { display: block; }
  .set-examples-title { font-size: 11px; color: var(--orange); margin-bottom: 8px; letter-spacing: .06em; text-transform: uppercase; }
  .colloc-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 10px 0 2px; }
  .colloc-chip { background: #eef1fb; border: 1px solid #c7d0f5; color: #4f46e5; font-family: system-ui, sans-serif; font-size: 13px; padding: 4px 13px; border-radius: 20px; line-height: 1.5; font-weight: 500; }
  .speak-btn { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .15s; margin-top: 6px; flex-shrink: 0; }
  .speak-btn:hover { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); transform: scale(1.08); }
  .speak-btn.speaking { border-color: var(--accent); background: var(--accent); color: #fff; animation: pulse-speak 1s ease-in-out infinite; }
  @keyframes pulse-speak { 0%,100%{box-shadow:0 0 0 0 rgba(79,70,229,0.4)} 50%{box-shadow:0 0 0 7px rgba(79,70,229,0)} }
  .speak-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .set-ex { font-family: system-ui, sans-serif; font-size: 13px; color: var(--muted); line-height: 1.8; padding: 4px 0; border-bottom: 1px solid #fed7aa; }
  .set-ex:last-child { border-bottom: none; }
  .set-ex .jp { color: var(--text); font-size: 14px; }
  .set-ex .vn { color: var(--muted); font-size: 12px; }

  .feedback { text-align: center; font-size: 15px; font-weight: 600; min-height: 22px; margin-bottom: 12px; }
  .feedback.ok { color: var(--green); }
  .feedback.ng { color: var(--red); }

  .next-btn { width: 100%; background: var(--accent); border: 2px solid var(--accent); color: #fff; padding: 13px; border-radius: 12px; font-size: 14px; font-family: inherit; cursor: pointer; display: none; transition: all .15s; letter-spacing: .03em; font-weight: 600; box-shadow: 0 2px 8px rgba(79,70,229,0.25); }
  .next-btn:hover { background: #4338ca; box-shadow: 0 4px 14px rgba(79,70,229,0.35); transform: translateY(-1px); }
  .next-btn.show { display: block; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(30,32,72,0.45); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; max-width: 380px; width: 100%; box-shadow: 0 8px 40px rgba(79,70,229,0.18); text-align: center; }
  .modal-icon { font-size: 36px; margin-bottom: 12px; }
  .modal-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .modal-btn { padding: 10px 22px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
  .modal-btn:hover { background: var(--border); }
  .modal-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .modal-btn.primary:hover { background: #4338ca; }

  .done-screen { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 32px; text-align: center; box-shadow: 0 4px 24px rgba(79,70,229,0.1); }
  .done-score { font-size: 64px; font-weight: 700; background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .done-title { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .done-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .done-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .done-btn { padding: 10px 22px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: inherit; font-size: 13px; cursor: pointer; transition: background .15s; }
  .done-btn:hover { background: var(--border); }
  .done-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  .streak-toast { position: fixed; top: 96px; right: 20px; background: var(--yellow-bg); color: var(--yellow); border: 1px solid #fcd34d; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(-8px); transition: all .3s; pointer-events: none; z-index: 200; }
  .streak-toast.show { opacity: 1; transform: translateY(0); }

  /* Legend */
  .legend { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 7px 24px; background: #f5f7ff; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-blue { background: var(--accent); }
  .dot-orange { background: var(--orange); }

  @media(max-width:480px){
    .stats { grid-template-columns: repeat(2,1fr); }
    .q-kanji { font-size: 38px; }
    .main { padding: 20px 12px 80px; }
  }
</style>

<script>

// ─── Storage helpers ─────────────────────────────────────────────────────
const STORAGE_KEY = 'kanji_n1_progress';

function saveProgress() {
  const data = {
    mode: currentMode,
    deckKeys: deck.map(v => v[0]),   // save kanji as keys to reconstruct order
    idx, okCount, ngCount, streak,
    wrongKeys: wrongList.map(v => v[0]),
    savedAt: Date.now()
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function clearProgress() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

function allVocab() { return [...KANJI_VOCAB, ...SET_VOCAB]; }

function vocabByKey(key) {
  return allVocab().find(v => v[0] === key) || null;
}

// ─── State ───────────────────────────────────────────────────────────────
let currentMode = 'all';
let deck = [];
let idx = 0, okCount = 0, ngCount = 0, streak = 0;
let answered = false, wrongList = [];
let opts = [], correctAns = '';
let history = []; // [{idx, opts, correctAns, picked, isOk}] for back navigation
let pendingResume = null; // holds loaded save data while modal is shown

function getFilteredVocab() {
  if (currentMode === 'all') return [...KANJI_VOCAB, ...SET_VOCAB];
  if (currentMode === 'verb') return KANJI_VOCAB.filter(v => v[3] === 'v');
  if (currentMode === 'adj') return KANJI_VOCAB.filter(v => v[3] === 'a');
  if (currentMode === 'noun') return KANJI_VOCAB.filter(v => v[3] === 'n');
  if (currentMode === 'adv') return KANJI_VOCAB.filter(v => v[3] === 'd');
  if (currentMode === 'set') return SET_VOCAB;
  if (currentMode === 'wrong') return wrongList.length ? wrongList : [...KANJI_VOCAB, ...SET_VOCAB];
  return [...KANJI_VOCAB, ...SET_VOCAB];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = 0|Math.random()*(i+1); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ── Distractor engine: generate phonetically similar wrong options ──────────
const HIRA_SUBS = {
  'あ':'お','い':'え','う':'お','え':'い','お':'あ',
  'か':'が','き':'ぎ','く':'ぐ','け':'げ','こ':'ご',
  'が':'か','ぎ':'き','ぐ':'く','げ':'け','ご':'こ',
  'さ':'ざ','し':'じ','す':'ず','せ':'ぜ','そ':'ぞ',
  'ざ':'さ','じ':'し','ず':'す','ぜ':'せ','ぞ':'そ',
  'た':'だ','ち':'じ','つ':'づ','て':'で','と':'ど',
  'だ':'た','で':'て','ど':'と',
  'な':'ま','に':'み','ぬ':'む','ね':'め','の':'も',
  'は':'ば','ひ':'び','ふ':'ぶ','へ':'べ','ほ':'ぼ',
  'ば':'は','び':'ひ','ぶ':'ふ','べ':'へ','ぼ':'ほ',
  'ま':'な','み':'に','む':'ぬ','め':'ね','も':'の',
  'ら':'わ','り':'い','る':'う','れ':'え','ろ':'お',
  'わ':'は','を':'お',
  'や':'ら','ゆ':'る','よ':'ろ',
};

function mutateKana(kana) {
  const chars = [...kana];
  if (chars.length === 0) return kana;
  const variants = [];

  // Strategy 1: swap one char with voiced/unvoiced pair
  for (let i = 0; i < chars.length; i++) {
    if (HIRA_SUBS[chars[i]]) {
      const mut = [...chars]; mut[i] = HIRA_SUBS[chars[i]];
      variants.push(mut.join(''));
    }
  }

  // Strategy 2: drop last char (e.g. もよおす → もよす)
  if (chars.length > 2) variants.push(chars.slice(0, -1).join(''));

  // Strategy 3: swap last 2 chars (もよおす → もよすお)
  if (chars.length >= 4) {
    const m = [...chars];
    [m[m.length-1], m[m.length-2]] = [m[m.length-2], m[m.length-1]];
    variants.push(m.join(''));
  }

  // Strategy 4: replace last vowel mora with similar
  const last = chars[chars.length-1];
  if (HIRA_SUBS[last]) {
    const m = [...chars]; m[m.length-1] = HIRA_SUBS[last];
    variants.push(m.join(''));
  }

  // Strategy 5: insert small っ before last char
  if (chars.length >= 2) {
    const m = [...chars]; m.splice(m.length-1, 0, 'っ');
    variants.push(m.join(''));
  }

  // Filter: must differ from answer, be non-empty, reasonable length
  const filtered = [...new Set(variants)].filter(v => v !== kana && v.length >= 1 && v.length <= kana.length + 2);
  return filtered.length ? filtered[Math.floor(Math.random() * filtered.length)] : null;
}

function getOptions(ci) {
  const card = deck[ci];
  const ans = card[1];
  const isSet = card[3] === 'set';

  const distractors = new Set();

  // For set phrases: pull from SET_VOCAB pool (same-length preference)
  if (isSet) {
    const pool = shuffle(SET_VOCAB).map(v => v[1]);
    for (const p of pool) {
      if (p !== ans && !distractors.has(p)) distractors.add(p);
      if (distractors.size === 3) break;
    }
  } else {
    // Step 1: phonetically mutated variants of the answer
    for (let attempt = 0; attempt < 12 && distractors.size < 2; attempt++) {
      const mut = mutateKana(ans);
      if (mut && mut !== ans && !distractors.has(mut)) distractors.add(mut);
    }

    // Step 2: fill remaining from vocab pool with similar MORA COUNT (±1)
    const ansLen = [...ans].length;
    const pool = shuffle(KANJI_VOCAB)
      .map(v => v[1])
      .filter(p => p !== ans && Math.abs([...p].length - ansLen) <= 1);
    for (const p of pool) {
      if (!distractors.has(p)) distractors.add(p);
      if (distractors.size === 3) break;
    }

    // Step 3: absolute fallback — any different reading
    if (distractors.size < 3) {
      const fallback = shuffle(KANJI_VOCAB).map(v => v[1]);
      for (const p of fallback) {
        if (p !== ans && !distractors.has(p)) distractors.add(p);
        if (distractors.size === 3) break;
      }
    }
  }

  return shuffle([ans, ...[...distractors].slice(0, 3)]);
}

function modeLabel(mode) {
  return {all:'Tất cả',verb:'Động từ',adj:'Tính từ',noun:'Danh từ',adv:'Phó từ',set:'Set Phrases',wrong:'Ôn sai'}[mode] || mode;
}

function setMode(mode, el) {
  const saved = loadProgress();
  if (saved && saved.mode === mode && saved.idx > 0) {
    pendingResume = saved;
    const ago = Math.round((Date.now() - saved.savedAt) / 60000);
    const agoStr = ago < 1 ? 'vừa xong' : ago < 60 ? ago + ' phút trước' : Math.round(ago/60) + ' giờ trước';
    document.getElementById('modal-title').textContent = 'Tiếp tục học ' + modeLabel(mode) + '?';
    document.getElementById('modal-sub').innerHTML =
      'Bạn đang học <strong>' + modeLabel(mode) + '</strong><br>' +
      'Tiến độ: <strong>câu ' + (saved.idx + 1) + ' / ' + saved.deckKeys.length + '</strong><br>' +
      'Đúng <strong style="color:var(--green)">' + saved.okCount + '</strong> · Sai <strong style="color:var(--red)">' + saved.ngCount + '</strong> · Lưu ' + agoStr;
    document.getElementById('resume-modal').style.display = 'flex';
  }
  currentMode = mode;
  document.querySelectorAll('.mbtn').forEach(b => { b.classList.remove('active','active-orange'); });
  if (el) { if (mode === 'set') el.classList.add('active-orange'); else el.classList.add('active'); }
  if (!(pendingResume && pendingResume.mode === mode)) restartQuiz();
}

function modalResume() {
  document.getElementById('resume-modal').style.display = 'none';
  if (!pendingResume) { restartQuiz(); return; }
  const saved = pendingResume; pendingResume = null;
  deck = saved.deckKeys.map(k => vocabByKey(k)).filter(Boolean);
  idx = saved.idx;
  okCount = saved.okCount;
  ngCount = saved.ngCount;
  streak = saved.streak || 0;
  wrongList = (saved.wrongKeys || []).map(k => vocabByKey(k)).filter(Boolean);
  answered = false;
  history = [];
  updateBadges();
  updateStats();
  renderQuestion();
}

function modalFresh() {
  document.getElementById('resume-modal').style.display = 'none';
  pendingResume = null;
  clearProgress();
  restartQuiz();
}

// ── Init: check for saved progress on page load ─────────────────────────
(function initApp() {
  const saved = loadProgress();
  if (saved && saved.idx > 0) {
    currentMode = saved.mode || 'all';
    const modeMap = {all:'m-all',verb:'m-verb',adj:'m-adj',noun:'m-noun',adv:'m-adv',set:'m-set',wrong:'m-wrong'};
    document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('active','active-orange'));
    const btn = document.getElementById(modeMap[currentMode]);
    if (btn) { if (currentMode === 'set') btn.classList.add('active-orange'); else btn.classList.add('active'); }
    pendingResume = saved;
    const ago = Math.round((Date.now() - saved.savedAt) / 60000);
    const agoStr = ago < 1 ? 'vừa xong' : ago < 60 ? ago + ' phút trước' : Math.round(ago/60) + ' giờ trước';
    document.getElementById('modal-title').textContent = 'Chào mừng trở lại! 👋';
    document.getElementById('modal-sub').innerHTML =
      'Bạn đang học <strong>' + modeLabel(currentMode) + '</strong><br>' +
      'Tiến độ: <strong>câu ' + (saved.idx + 1) + ' / ' + saved.deckKeys.length + '</strong><br>' +
      'Đúng <strong style="color:var(--green)">' + saved.okCount + '</strong> · Sai <strong style="color:var(--red)">' + saved.ngCount + '</strong> · Lưu ' + agoStr;
    document.getElementById('resume-modal').style.display = 'flex';
    deck = []; updateBadges(); updateStats();
  } else {
    restartQuiz();
  }
})();

function updateBadges() {
  const setCount = deck.filter(v => v[3] === 'set').length;
  document.getElementById('total-badge').textContent = deck.length + ' câu';
  document.getElementById('set-badge').textContent = setCount + ' set phrases';
}


// ── Japanese TTS ─────────────────────────────────────────────────────────
let _speakTimer = null;

function speakJapanese(text) {
  if (!text) return;
  window.speechSynthesis.cancel();
  clearTimeout(_speakTimer);
  const btn = document.getElementById('speak-btn');
  if (btn) btn.classList.add('speaking');

  // Chrome needs a small delay for getVoices() to be populated
  const doSpeak = () => {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ja-JP';
    utterance.rate = 0.9;
    utterance.pitch = 1;
    utterance.volume = 1;
    const voices = window.speechSynthesis.getVoices();
    const jpVoice = voices.find(v => v.lang === 'ja-JP' || v.lang.startsWith('ja'));
    if (jpVoice) utterance.voice = jpVoice;
    utterance.onend = () => { const b = document.getElementById('speak-btn'); if(b) b.classList.remove('speaking'); };
    utterance.onerror = () => { const b = document.getElementById('speak-btn'); if(b) b.classList.remove('speaking'); };
    window.speechSynthesis.speak(utterance);
  };

  if (window.speechSynthesis.getVoices().length > 0) {
    doSpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = doSpeak;
    _speakTimer = setTimeout(doSpeak, 200); // fallback
  }
}

function speakCurrent() {
  if (idx < deck.length) speakJapanese(deck[idx][0]);
}

function restartQuiz() {
  window.speechSynthesis.cancel();
  deck = shuffle(getFilteredVocab());
  idx = 0; okCount = 0; ngCount = 0; streak = 0; answered = false;
  const setCount = deck.filter(v=>v[3]==='set').length;
  document.getElementById('total-badge').textContent = deck.length + ' câu';
  document.getElementById('set-badge').textContent = setCount + ' set phrases';
  updateStats(); renderQuestion();
}

function shuffleDeck() { deck = shuffle(deck.slice(idx)); idx=0; answered=false; renderQuestion(); }

function updateStats() {
  document.getElementById('s-cur').textContent = Math.min(idx+1, deck.length);
  document.getElementById('s-ok').textContent = okCount;
  document.getElementById('s-ng').textContent = ngCount;
  const t = okCount+ngCount;
  document.getElementById('s-pct').textContent = t ? Math.round(okCount/t*100)+'%' : '—';
  document.getElementById('prog').style.width = (idx/deck.length*100)+'%';
  document.getElementById('onsai-count').textContent = '('+wrongList.length+')';
  // back button
  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.disabled = (history.length === 0);
  // progress label
  const pl = document.getElementById('progress-label');
  if (pl) pl.textContent = idx > 0 ? '📍 ' + modeLabel(currentMode) + ' · câu ' + (idx+1) : '';
}

function renderQuestion() {
  const el = document.getElementById('main');
  if (idx >= deck.length) { renderDone(el); return; }
  const card = deck[idx];
  const isSet = card[3] === 'set';
  opts = getOptions(idx);
  correctAns = card[1];
  answered = false;

  const setTagHtml = isSet
    ? `<div class="set-tag">🔥 Set Phrase hay gặp N1</div>`
    : '';

  // Context for set phrases / collocations for kanji
  const contextHtml = isSet && card[4]
    ? `<div class="q-context">${card[4].replace(/\n/g,'<br>')}</div>`
    : '';

  // Collocation chips (index 4 for kanji vocab)
  let collocHtml = '';
  if (!isSet && card[4]) {
    const chips = card[4].split(' / ').flatMap(s => s.split('・')).filter(Boolean);
    collocHtml = `<div class="colloc-bar">${chips.map(c=>`<span class="colloc-chip">${c}</span>`).join('')}</div>`;
  }

  el.innerHTML = `
    <div class="q-card">
      <div class="q-num">Câu ${idx+1} / ${deck.length}</div>
      ${setTagHtml}
      <div style="display:flex;align-items:center;justify-content:center;gap:12px">
        <div class="q-kanji">${card[0]}</div>
        <button class="speak-btn" id="speak-btn" onclick="speakCurrent()" title="Phát âm tiếng Nhật">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
      </div>
      ${collocHtml}
      ${contextHtml}
      <div class="q-meaning" style="margin-top:6px">${card[2]}</div>
      <div class="q-ask">Cách đọc (仮名) là gì?</div>
    </div>
    <div class="options">
      ${opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="pick(${i})">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <div class="set-examples" id="set-ex"></div>
    <button class="next-btn" id="nb" onclick="nextQ()">Câu tiếp theo →</button>
  `;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const isOk = opts[i] === correctAns;
  const card = deck[idx];

  // Record into history BEFORE updating scores (so goBack can undo)
  history.push({
    idx,
    opts: [...opts],
    correctAns,
    picked: i,
    isOk,
    okBefore: okCount,
    ngBefore: ngCount,
    streakBefore: streak,
    wrongBefore: wrongList.map(w=>w[0])
  });

  if (isOk) { okCount++; streak++; if(streak>=3) showStreak(); }
  else { ngCount++; streak=0; if(!wrongList.find(w=>w[0]===card[0])) wrongList.push(card); }

  opts.forEach((o,j) => {
    const btn = document.getElementById('opt'+j);
    btn.disabled = true;
    if (o === correctAns) btn.classList.add(j===i ? 'correct' : 'reveal');
    else if (j===i && !isOk) btn.classList.add('wrong');
  });

  const fb = document.getElementById('fb');
  if (isOk) { fb.className='feedback ok'; fb.textContent = streak>=3 ? '✓ Chính xác! Chuỗi '+streak+' câu liên tiếp!' : '✓ Chính xác!'; }
  else { fb.className='feedback ng'; fb.textContent = '✗ Sai rồi! Đáp án đúng: '+correctAns; }

  if (card[3]==='set' && card[5] && card[5].length) {
    const exEl = document.getElementById('set-ex');
    exEl.classList.add('show');
    exEl.innerHTML = '<div class="set-examples-title">📚 Ví dụ cùng set phrase</div>'
      + card[5].map(e=>`<div class="set-ex"><div class="jp">${e[0]}</div><div class="vn">→ ${e[1]}</div></div>`).join('');
  }

  document.getElementById('nb').classList.add('show');
  updateStats();
  saveProgress(); // auto-save after every answer
}

function nextQ() { window.speechSynthesis.cancel(); idx++; updateStats(); renderQuestion(); }

function renderDone(el) {
  const t = okCount+ngCount;
  const pct = t ? Math.round(okCount/t*100) : 0;
  const msg = pct>=90?'🎌 Xuất sắc!':pct>=70?'👏 Khá tốt! Tiếp tục luyện nha!':'📚 Cần ôn thêm! Đừng bỏ cuộc!';
  el.innerHTML = `<div class="done-screen">
    <div class="done-score">${pct}%</div>
    <div class="done-title">${msg}</div>
    <div class="done-sub">Đúng ${okCount} / ${t} câu &nbsp;·&nbsp; Sai ${ngCount} câu &nbsp;·&nbsp; Cần ôn: ${wrongList.length} từ</div>
    <div class="done-btns">
      <button class="done-btn primary" onclick="restartQuiz()">Làm lại từ đầu</button>
      ${wrongList.length ? `<button class="done-btn" onclick="reviewWrong()">Ôn lại ${wrongList.length} câu sai</button>` : ''}
      <button class="done-btn" onclick="setMode('set',document.getElementById('m-set'))">Chỉ Set Phrases 🔥</button>
    </div>
  </div>`;
}

function reviewWrong() {
  currentMode='wrong';
  document.querySelectorAll('.mbtn').forEach(b=>{b.classList.remove('active','active-orange');});
  document.getElementById('m-wrong').classList.add('active');
  // On load: check if there's any saved progress

}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  // Restore scores to before that answer
  okCount = prev.okBefore;
  ngCount = prev.ngBefore;
  streak = prev.streakBefore;
  // Restore wrongList
  const prevWrongKeys = new Set(prev.wrongBefore);
  wrongList = wrongList.filter(w => prevWrongKeys.has(w[0]));
  // Go back to that question index (unanswered)
  idx = prev.idx;
  answered = false;
  updateStats();
  saveProgress();
  renderQuestion();
}

function showStreak() {
  const t = document.getElementById('streak-toast');
  t.textContent = '🔥 Chuỗi '+streak+' câu đúng!';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function copyCard() {
  if(idx<deck.length){ const c=deck[idx]; navigator.clipboard.writeText(c[0]+' ('+c[1]+') — '+c[2]); }
}
function markKnown() { nextQ(); }
function markUnknown() {
  if(idx<deck.length && !wrongList.find(w=>w[0]===deck[idx][0])){ wrongList.push(deck[idx]); updateStats(); }
}
function retryCard() { answered=false; renderQuestion(); }

// On load: check if there's any saved progress
