<body class="portfolio-app" data-app-route="gkentei">
  <a class="skip-link" href="#main">メインコンテンツへ移動</a>
  <div class="gk-shell">
    <aside class="gk-sidebar" aria-label="G検定ナビゲーション">
      <div class="gk-sidebar-head">
        <a class="gk-brand" href="/" aria-label="Thang Luu ホーム">
          <span class="gk-brand-mark" aria-hidden="true">t:&gt;</span>
          <span>thang<span class="gk-brand-dot">.</span></span>
        </a>
        <div class="gk-sidebar-actions">
          <button class="gk-icon-button" id="themeToggle" type="button" aria-label="ライトテーマに切り替え" title="ライトテーマに切り替え">
            <i class="fa-solid fa-sun" aria-hidden="true"></i>
          </button>
          <button class="gk-icon-button gk-mobile-menu" id="mobileMenu" type="button" aria-expanded="false" aria-controls="sidebarBody" aria-label="メニューを開く">
            <i class="fa-solid fa-list-ol" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <div class="gk-sidebar-body" id="sidebarBody">
        <nav class="gk-primary-nav" aria-label="学習メニュー">
          <button class="gk-nav-item" type="button" data-view="path">
            <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i><span>ロードマップ</span>

          <button class="gk-nav-item" type="button" data-view="topics">

          </button>
          <button class="gk-nav-item" type="button" data-view="practice">

          </button>
          <button class="gk-nav-item" type="button" data-view="review">
            <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i><span>間違い復習</span><small class="gk-wrong-count" id="wrongCount">0</small>
          </button>
          <button class="gk-nav-item" type="button" data-view="stats">
            <i class="fa-solid fa-chart-line" aria-hidden="true"></i><span>学習記録</span>
          </button>
