<!doctype html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JLPT N1 Study Program — thang.</title>
  <meta name="description" content="Chương trình JLPT N1 thống nhất cho từ vựng, ngữ pháp, đọc hiểu và luyện đề.">
  <link rel="canonical" href="https://thangldw.github.io/apps/jlpt-n1/">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/icons.css?v=20260714">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/tokens.css?v=20260721b">
  <link rel="stylesheet" href="styles.css?v=20260721a">
  <script>
    (function () {
      document.documentElement.dataset.theme = localStorage.getItem('theme') || 'dark';
    }());
  </script>
  <script defer src="/js/analytics.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Đi tới nội dung chính</a>
  <div class="n1-shell">
    <aside class="sidebar" aria-label="Điều hướng JLPT N1">
      <div class="sidebar-head">
        <a class="brand" href="/" aria-label="Trang chủ Thang Luu">
          <span class="brand-mark" aria-hidden="true">t:&gt;</span>
          <span>thang<span class="brand-dot">.</span></span>
        </a>
        <button class="mobile-menu" id="mobileMenu" type="button" aria-expanded="false" aria-controls="sidebarBody" aria-label="Mở điều hướng">
          <i class="fa-solid fa-list-ol" aria-hidden="true"></i>
        </button>
      </div>

      <div class="sidebar-body" id="sidebarBody">
        <div class="program-switcher" aria-label="Chọn chương trình">
          <a class="program-link is-current" href="/apps/jlpt-n1/">
            <i class="fa-solid fa-language" aria-hidden="true"></i>
            <span>JLPT N1</span>
          </a>
          <a class="program-link program-bjt" href="/apps/bjt-study/">
            <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
            <span>BJT</span>
          </a>
          <a class="program-hub" href="/apps/#learning">
            <span>Tất cả chương trình</span>
            <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
          </a>
        </div>

        <nav class="primary-nav" aria-label="Nội dung chương trình">
          <button class="nav-item" type="button" data-view="path">
            <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i><span>Lộ trình</span>
          </button>
          <button class="nav-item" type="button" data-view="vocabulary">
            <i class="fa-solid fa-book-open" aria-hidden="true"></i><span>Từ vựng</span><small>6</small>
          </button>
          <button class="nav-item" type="button" data-view="grammar">
            <i class="fa-solid fa-language" aria-hidden="true"></i><span>Ngữ pháp</span><small>4</small>
          </button>
          <button class="nav-item" type="button" data-view="reading">
            <i class="fa-solid fa-newspaper" aria-hidden="true"></i><span>Đọc hiểu</span><small>2</small>
          </button>
          <button class="nav-item" type="button" data-view="exams">
            <i class="fa-solid fa-graduation-cap" aria-hidden="true"></i><span>Luyện đề</span>
          </button>
          <button class="nav-item" type="button" data-view="review">
            <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i><span>Ôn sai</span><small class="wrong-count" id="wrongCount">0</small>
          </button>
          <button class="nav-item" type="button" data-view="stats">
            <i class="fa-solid fa-chart-line" aria-hidden="true"></i><span>Thống kê</span>
          </button>
        </nav>
      </div>

      <div class="sidebar-foot">
        <div class="data-note">
          <span>Chương trình JLPT N1</span>
          <strong>12 module luyện tập</strong>
          <small>Từ vựng · Ngữ pháp · Đọc hiểu</small>
        </div>
        <a class="back-apps" href="/apps/"><i class="fa-solid fa-arrow-right" aria-hidden="true"></i>Về danh sách apps</a>
        <div class="theme-switch" aria-label="Chọn giao diện">
          <button type="button" data-theme-choice="light"><i class="fa-solid fa-sun" aria-hidden="true"></i>Sáng</button>
          <button type="button" data-theme-choice="dark"><i class="fa-solid fa-moon" aria-hidden="true"></i>Tối</button>
        </div>
      </div>
    </aside>

    <main id="main" class="main" tabindex="-1">
      <div id="appView" aria-live="polite"></div>
    </main>
  </div>

  <script src="app.js?v=20260721a"></script>
</body>
</html>
