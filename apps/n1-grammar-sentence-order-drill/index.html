<script>
const ALL_DATA = [{"period": "07-2010", "stt": 1, "q": "このレストランは、（　　）（　　）（　＊　）（　　）と評判だ。", "options": ["だけあって", "主人が", "魚屋も経営している", "魚料理がおいしい"], "correct": "だけあって", "full": "このレストランは、（主人が）（魚屋も経営している）（*だけあって）（魚料理がおいしい）と評判だ。", "vn": "Nhà hàng này được đánh giá là món cá ngon, cũng đúng thôi vì chủ quán cũng đồng thời điều hành cửa hàng hải sản.", "order": "2-3-1-4", "grammar": "だけあって"}, {"period": "07-2010", "stt": 2, "q": "A「申し訳ない。僕が（　　）（　　）（　＊　）（　　）ことになってしまって。」\nB「あ、いいえ、気にしないでください。」", "options": ["残業してもらう", "君にまで", "ミスをした", "ばかりに"], "correct": "君にまで", "full": "A「申し訳ない。僕が（ミスをした）（ばかりに）（*君にまで）（残業してもらう）ことになってしまって。」B「あ、いいえ、気にしないでください。」", "vn": "A: Xin lỗi, chỉ vì tôi mắc lỗi mà khiến cả bạn cũng phải làm thêm giờ. B: À, không, đừng bận tâm đâu ạ.", "order": "3-4-2-1", "grammar": "ばかりに"}, {"period": "07-2010", "stt": 3, "q": "そもそもこの情報が、責任者である彼に（　　）（　　）（　＊　）（　　）と思う。", "options": ["伝わっていない", "おかしい", "こと", "からして"], "correct": "からして", "full": "そもそもこの情報が、責任者である彼に（伝わっていない）（こと）（*からして）（おかしい）と思う。", "vn": "Ngay từ đầu, tôi đã nghĩ rằng việc thông tin này không được truyền đến anh ấy, người chịu trách nhiệm, cũng là điều bất thường.", "order": "1-3-4-2", "grammar": "からして"}, {"period": "07-2010", "stt": 4, "q": "アルバイト先の仲間は、みんな（　　）（　　）（　＊　）（　　）話でいつも盛り上がっています。", "options": ["こともあって", "ならではの", "同世代", "年が近い"], "correct": "同世代", "full": "アルバイト先の仲間は、みんな（年が近い）（こともあって）（*同世代）（ならではの）話でいつも盛り上がっています。", "vn": "Các đồng nghiệp làm thêm của tôi, cũng vì tuổi gần nhau, luôn sôi nổi với những câu chuyện đặc trưng chỉ có ở cùng thế hệ.", "order": "4-1-3-2", "grammar": "こともあって"}, {"period": "07-2010", "stt": 5, "q": "ジョン「この 『りかい』という言葉はどういう意味ですか。」\nアリ「ああ、確か『わかる 』（　　）（　＊　）（　　）（　　）んですけど。」", "options": ["ような", "と思う", "という", "意味だった"], "correct": "ような", "full": "ジョン「この 『りかい』という言葉はどういう意味ですか。」アリ「ああ、確か『わかる 』（という）（*ような）（意味だった）（と思う）んですけど。」", "vn": "Ari: À, chắc là ý nghĩa kiểu ‘hiểu’ thì đúng, tôi nghĩ vậy.", "order": "3-1-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2010", "stt": 1, "q": "山田監督は私の恩人です。今の（　　）（　　）（　＊　）（　　）ことです。", "options": ["あっての", "あるのも", "私が", "監督"], "correct": "監督", "full": "山田監督は私の恩人です。今の（私が）（あるのも）（*監督）（あっての）ことです。", "vn": "Huấn luyện viên Yamada là ân nhân của tôi. Việc tôi có được như ngày hôm nay cũng là nhờ có huấn luyện viên.", "order": "3-2-4-1", "grammar": "あっての"}, {"period": "12-2010", "stt": 2, "q": "いったん仕事を引き受けた（　　）（　　）（　＊　）（　　）最後までやり通すに違いない。", "options": ["彼の性格", "からして", "からには", "責任感の強い"], "correct": "彼の性格", "full": "いったん仕事を引き受けた（からには）（責任感の強い）（*彼の性格）（からして）最後までやり通すに違いない。", "vn": "Một khi đã nhận việc, thì xét theo tính cách trách nhiệm cao của anh ấy, chắc chắn anh ấy sẽ làm đến cùng.", "order": "3-4-1-2", "grammar": "からして"}, {"period": "12-2010", "stt": 3, "q": "ちょっと考えれば、さっきの話が冗談（　　）（　　）（　＊　）（　　）、単純な彼は簡単に信じてしまった。", "options": ["わかるだろう", "だって", "に", "ことぐらい"], "correct": "わかるだろう", "full": "ちょっと考えれば、さっきの話が冗談（ことぐらい）（だって）（*わかるだろう）（に）、単純な彼は簡単に信じてしまった。", "vn": "Chỉ cần suy nghĩ một chút cũng biết chuyện vừa rồi chỉ là nói đùa, nhưng vì đơn giản nên anh ta đã tin ngay.", "order": "4-2-1-3", "grammar": "ことぐらい"}, {"period": "12-2010", "stt": 4, "q": "かつて映画スターであった山田氏が初挑戦で知事選に勝利したのは、能力という（　　）（　　）（　＊　）（　　）大きい。", "options": ["ところが", "より", "よる", "人気と知名度に"], "correct": "よる", "full": "かつて映画スターであった山田氏が初挑戦で知事選に勝利したのは、能力という（より）（人気と知名度に）（*よる）（ところが）大きい。", "vn": "Việc ông Yamada, từng là ngôi sao điện ảnh, thắng trong lần đầu tiên tranh cử chức thống đốc, phần lớn dựa không phải vào năng lực mà là vào sự nổi tiếng và mức độ được yêu mến.", "order": "2-4-3-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2010", "stt": 5, "q": "この植物はとても強いので、（　　）（　　）（　＊　）（　　）ちゃんと育ちますよ", "options": ["水やりを", "さえ", "しなければ", "忘れ"], "correct": "さえ", "full": "この植物はとても強いので、（水やりを）（忘れ）（*さえ）（しなければ）ちゃんと育ちますよ", "vn": "Loài cây này rất khỏe, nên chỉ cần không quên tưới nước, nó sẽ phát triển tốt.", "order": "1-4-2-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2011", "stt": 1, "q": "大学入試では、試験当日初めてその大学に行き、迷ってしまった（　　）（　　）（　＊　）（　　）事前に見学しておくとよい。", "options": ["ない", "という", "ように", "ことの"], "correct": "ない", "full": "大学入試では、試験当日初めてその大学に行き、迷ってしまった（という）（ことの）（*ない）（ように）事前に見学しておくとよい。", "vn": "Trong kỳ thi tuyển sinh đại học, nên đi khảo sát trường trước, để tránh tình trạng đến đúng ngày thi mới lần đầu đến trường đó và bị lạc đường.", "order": "2-4-1-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2011", "stt": 2, "q": "趣味を持つのは良いことだと思いますが、家庭を犠牲（　　）（　　）（　＊　）（　　）、それはちょっと問題です。", "options": ["となる", "まで", "と", "にして"], "correct": "となる", "full": "趣味を持つのは良いことだと思いますが、家庭を犠牲（にして）（まで）（*となる）（と）、それはちょっと問題です。", "vn": "Tôi nghĩ có sở thích là điều tốt, nhưng nếu đến mức phải hy sinh cả gia đình thì đó lại là một vấn đề.", "order": "4-2-1-3", "grammar": "にして"}, {"period": "07-2011", "stt": 3, "q": "管理職になったら、たとえ（　　）（　　）（　＊　）（　　）部下の失敗も引き受けるというくらいの覚悟がなくてはならない。", "options": ["だとして", "がなくても", "自分には責任", "自分の責任"], "correct": "自分の責任", "full": "管理職になったら、たとえ（自分には責任）（がなくても）（*自分の責任）（だとして）部下の失敗も引き受けるというくらいの覚悟がなくてはならない。", "vn": "Khi trở thành quản lý, ngay cả khi bản thân không có trách nhiệm, cũng phải có tinh thần chấp nhận rằng đó là trách nhiệm của mình và gánh vác cả những thất bại của cấp dưới.", "order": "3-2-4-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2011", "stt": 4, "q": "（　　）（　　）（　＊　）（　　）小さな町工場だった。", "options": ["もともとは", "我が社だが", "今でこそ", "一流企業と言われる"], "correct": "我が社だが", "full": "（今でこそ）（一流企業と言われる）（*我が社だが）（もともとは）小さな町工場だった。", "vn": "Hiện nay công ty chúng tôi được gọi là một doanh nghiệp hàng đầu, nhưng ban đầu chỉ là một xưởng nhỏ ở thị trấn.", "order": "3-4-2-1", "grammar": "今でこそ"}, {"period": "07-2011", "stt": 5, "q": "新番組でこれまでにない役柄を演じる俳優の上田秋さん。役作りに悩んでいる（　　）（　　）（　＊　）（　　）という。", "options": ["と", "そうでもない", "思いやき", "のか"], "correct": "思いやき", "full": "新番組でこれまでにない役柄を演じる俳優の上田秋さん。役作りに悩んでいる（のか）（と）（*思いやき）（そうでもない）という。", "vn": "Diễn viên Ueda Aki sẽ đảm nhận một vai diễn chưa từng có trong chương trình mới. Người ta nói rằng dường như cậu ấy đang băn khoăn trong việc xây dựng vai diễn, nhưng cũng không hẳn là như vậy.", "order": "4-1-3-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2011", "stt": 1, "q": "雑誌で紹介された（　　）（　　）（　＊　）（　　）というわけではないだろう 。", "options": ["レストラン", "おいしい", "からといって", "必ずしも"], "correct": "おいしい", "full": "雑誌で紹介された（からといって）（必ずしも）（*おいしい）（レストラン）というわけではないだろう 。", "vn": "Chỉ vì được giới thiệu trên tạp chí thì chưa hẳn đã là nhà hàng ngon.", "order": "3-4-2-1", "grammar": "からといって"}, {"period": "12-2011", "stt": 2, "q": "彼はとても優秀で成績が学年の上位に入っている（　　）（　　）（　＊　）（　　）真面目で好感がもてる。", "options": ["授業に取り組む", "のみならず", "姿勢そのものも", "ことが多い"], "correct": "授業に取り組む", "full": "彼はとても優秀で成績が学年の上位に入っている（ことが多い）（のみならず）（*授業に取り組む）（姿勢そのものも）真面目で好感がもてる。", "vn": "Anh ấy rất xuất sắc, không chỉ thường đứng trong top đầu khối, mà cả thái độ học tập trên lớp cũng nghiêm túc và dễ gây cảm tình.", "order": "4-2-1-3", "grammar": "のみならず"}, {"period": "12-2011", "stt": 3, "q": "会社で\nA「X社に行くなら、電話で連絡してから行ったら。」\nB「いや、X社の担当者が（　　）（　　）（　＊　）（　　）だから、しなくていいよ。」", "options": ["この書類を", "だけのこと", "不在なら", "預けてくればいい"], "correct": "預けてくればいい", "full": "会社でA「X社に行くなら、電話で連絡してから行ったら。」B「いや、X社の担当者が（不在なら）（この書類を）（*預けてくればいい）（だけのこと）だから、しなくていいよ。」", "vn": "B: Không, chỉ cần gửi tờ tài liệu này nếu người phụ trách công ty X vắng mặt thôi, nên không cần gọi đâu.", "order": "3-1-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2011", "stt": 4, "q": "政府は（　　）（　　）（　＊　）（　　） として、手始め自動車税の引き上げを主張している。", "options": ["もの", "増税は", "のない", "避けよう"], "correct": "のない", "full": "政府は（避けよう）（もの）（*のない）（増税は） として、手始め自動車税の引き上げを主張している。", "vn": "Chính phủ coi việc tăng thuế là điều không thể tránh khỏi, nên trước tiên chủ trương tăng thuế ô tô.", "order": "4-1-3-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2011", "stt": 5, "q": "「反省」とは、あたかも他人（　　）（　　）（　＊　）（　　）自らを客観的して精神活動である。", "options": ["が", "を", "ごとく", "眺める"], "correct": "が", "full": "「反省」とは、あたかも他人（を）（眺める）（*が）（ごとく）自らを客観的して精神活動である。", "vn": "“Phản tỉnh” là một hoạt động tinh thần trong đó con người tự nhìn nhận bản thân một cách khách quan, như thể đang quan sát người khác.", "order": "2-4-1-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2012", "stt": 1, "q": "（　　）（　＊　）（　　）（　　）良心は残っているはずだ。", "options": ["どこかに", "悪人で", "あろうと", "どんな"], "correct": "悪人で", "full": "（どんな）（*悪人で）（あろうと）（どこかに）良心は残っているはずだ。", "vn": "Cho dù có là kẻ xấu xa đến mức nào đi nữa, ắt hẳn ở đâu đó vẫn còn lương tâm.", "order": "4-2-3-1", "grammar": "あろうと"}, {"period": "07-2012", "stt": 2, "q": "インターネットの功罪といった議論があるが、インターネットはただの手段だ。その価値は（　　）（　　）（　＊　）（　　）ものだと思う。", "options": ["人の使い方", "使う", "決まる", "次第で"], "correct": "次第で", "full": "インターネットの功罪といった議論があるが、インターネットはただの手段だ。その価値は（使う）（人の使い方）（*次第で）（決まる）ものだと思う。", "vn": "Có những tranh luận về công và tội của Internet, nhưng Internet chỉ là một phương tiện. Giá trị của nó, tôi nghĩ rằng, được quyết định bởi cách sử dụng của con người.", "order": "2-1-4-3", "grammar": "次第で"}, {"period": "07-2012", "stt": 3, "q": "たばこの値段が（　　）（　　）（　＊　）（　　）ことだ。", "options": ["わたしにとっては", "上がろうと下がろうと", "どうでもいい", "たばこを吸わない"], "correct": "わたしにとっては", "full": "たばこの値段が（上がろうと下がろうと）（たばこを吸わない）（*わたしにとっては）（どうでもいい）ことだ。", "vn": "Giá thuốc lá có tăng hay giảm đi chăng nữa, đối với tôi người không hút thuốc, thì đó là chuyện chẳng quan trọng gì cả.", "order": "2-4-1-3", "grammar": "にとっては"}, {"period": "07-2012", "stt": 4, "q": "A 「見てみて。レストラン 『夢』の無料券もらっちゃった。」\nB「いいなあ。ちょっと見せて。なんだ。デザート（　　）（　　）（　＊　）（　　）じゃないか。」", "options": ["が", "だけ", "いう", "ただって"], "correct": "いう", "full": "A 「見てみて。レストラン 『夢』の無料券もらっちゃった。」B「いいなあ。ちょっと見せて。なんだ。デザート（が）（ただって）（*いう）（だけ）じゃないか。」", "vn": "B: Thích thế. Cho tớ xem với…… Hả? Chẳng phải chỉ mỗi món tráng miệng là miễn phí thôi sao.", "order": "1-4-3-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2012", "stt": 5, "q": "１日午後４時ごろ、システムトラブルの影響により、一時メールサービスに障害が発生しました。お客様に（　　）（　　）（　＊　）（　　）願い申し上げます。", "options": ["今後は再発防止に努めて参りますので", "深くおわび申し上げますとともに", "多大なご不便をおかけしましたことを", "引き続き本サービスをご利用くださいますよう"], "correct": "今後は再発防止に努めて参りますので", "full": "１日午後４時ごろ、システムトラブルの影響により、一時メールサービスに障害が発生しました。お客様に（多大なご不便をおかけしましたことを）（深くおわび申し上げますとともに）（*今後は再発防止に努めて参りますので）（引き続き本サービスをご利用くださいますよう）願い申し上げます。", "vn": "Vào khoảng 4 giờ chiều ngày 1, do ảnh hưởng của lỗi hệ thống, dịch vụ email đã tạm thời gặp sự cố. Chúng tôi xin gửi lời xin lỗi sâu sắc vì đã gây ra nhiều bất tiện cho khách hàng, và sẽ nỗ lực để ngăn chặn sự cố tái diễn trong thời gian tới, rất mong quý khách tiếp tục sử dụng dịch vụ này.", "order": "3-2-1-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2012", "stt": 1, "q": "勉強に専念するためにアルバイトをすぐにでも（　　）（　　）（　＊　）（　　）困っている。", "options": ["やめられず", "スタッフ不足から", "やめるに", "やめたいが"], "correct": "やめるに", "full": "勉強に専念するためにアルバイトをすぐにでも（やめたいが）（スタッフ不足から）（*やめるに）（やめられず）困っている。", "vn": "Vì muốn tập trung hoàn toàn vào việc học nên tôi muốn nghỉ làm thêm ngay lập tức, nhưng do thiếu nhân viên, muốn nghỉ cũng không nghỉ được, nên tôi đang rất khổ sở.", "order": "4-2-3-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2012", "stt": 2, "q": "昨日、息子が近所の公園で捕まえてきた昆虫を見て驚いた。虫について（　　）（　　）（　＊　）（　　）。あんな虫は見たことがなかった。", "options": ["だったら", "知っているつもりの", "人よりも詳しく", "私でも"], "correct": "知っているつもりの", "full": "昨日、息子が近所の公園で捕まえてきた昆虫を見て驚いた。虫について（だったら）（人よりも詳しく）（*知っているつもりの）（私でも）。あんな虫は見たことがなかった。", "vn": "Hôm qua, tôi đã rất ngạc nhiên khi nhìn thấy con côn trùng mà con trai tôi bắt được ở công viên gần nhà. Ngay cả tôi người vốn nghĩ rằng nếu nói về côn trùng thì mình biết rõ hơn người khác cũng chưa từng thấy loài nào như thế.", "order": "1-3-2-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2012", "stt": 3, "q": "将棋は好きなら上達する。将棋が好きだということ（　　）（　　）（　＊　）（　　）強くなれるのだ。", "options": ["すでに才能なのであって", "あればこそ", "自体が", "好きだという気持ちが"], "correct": "好きだという気持ちが", "full": "将棋は好きなら上達する。将棋が好きだということ（自体が）（すでに才能なのであって）（*好きだという気持ちが）（あればこそ）強くなれるのだ。", "vn": "Nếu thích cờ Shogi thì ắt sẽ tiến bộ. Việc bản thân yêu thích Shogi vốn dĩ đã là một loại tài năng rồi, chính vì có tình yêu đó nên mới có thể trở nên mạnh hơn.", "order": "3-1-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2012", "stt": 4, "q": "動物園のゴリラが、私のことをずっと見ていた。私を仲間（　　）（　　）（　＊　）（　　）だろうか。", "options": ["と", "だ", "でも", "思っていたの"], "correct": "でも", "full": "動物園のゴリラが、私のことをずっと見ていた。私を仲間（だ）（と）（*でも）（思っていたの）だろうか。", "vn": "Con khỉ đột ở sở thú cứ nhìn chằm chằm tôi mãi. Không biết nó có nghĩ tôi là đồng loại hay gì đó không nữa.", "order": "2-1-3-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2012", "stt": 5, "q": "（　　）（　　）（　＊　）（　　）姿勢を持つことが重要である。", "options": ["これまでの考え方にこだわらず", "情報技術や交通手段の発達などで", "異なる価値観を理解しようとする", "異文化間の交流が活発化した現代にあっては"], "correct": "これまでの考え方にこだわらず", "full": "（情報技術や交通手段の発達などで）（異文化間の交流が活発化した現代にあっては）（*これまでの考え方にこだわらず）（異なる価値観を理解しようとする）姿勢を持つことが重要である。", "vn": "Trong thời đại hiện nay, khi giao lưu giữa các nền văn hóa khác nhau trở nên sôi động nhờ sự phát triển của công nghệ thông tin và phương tiện giao thông, điều quan trọng là phải có thái độ không bám chấp vào cách nghĩ cũ mà cố gắng hiểu các giá trị quan khác nhau.", "order": "2-4-1-3", "grammar": "ようと"}, {"period": "07-2013", "stt": 1, "q": "近所の猫は、私を見るとすぐに逃げるくせに、途中で立ち止まってこちらを振り返る。できるもんなら（　　）（　　）（　＊　）（　　）すごくかわいい。", "options": ["表情が", "あの憎らしい", "というような", "捕まえてごらん"], "correct": "あの憎らしい", "full": "近所の猫は、私を見るとすぐに逃げるくせに、途中で立ち止まってこちらを振り返る。できるもんなら（捕まえてごらん）（というような）（*あの憎らしい）（表情が）すごくかわいい。", "vn": "Con mèo ở gần nhà cứ hễ thấy tôi là chạy trốn ngay, vậy mà lại còn đang chạy thì dừng lại giữa chừng và ngoái đầu nhìn tôi. Cái vẻ mặt như muốn nói “giỏi thì bắt được tôi xem nào” đầy đáng ghét đó lại dễ thương vô cùng.", "order": "4-3-2-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2013", "stt": 2, "q": "先月、父に手作りの箸をプレゼントした。長くて（　　）（　　）（　＊　）（　　）気に入ってくれているのかもしれない。", "options": ["と言いながらも", "ところを見ると", "なんだか使いにくい", "毎日使っている"], "correct": "毎日使っている", "full": "先月、父に手作りの箸をプレゼントした。長くて（なんだか使いにくい）（と言いながらも）（*毎日使っている）（ところを見ると）気に入ってくれているのかもしれない。", "vn": "Tháng trước, tôi đã tặng cho bố một đôi đũa do chính tay mình làm. Tuy ông vừa nói rằng “dài quá, có chút khó dùng”, thế nhưng nhìn cảnh ngày nào ông cũng dùng nó, tôi cảm thấy có lẽ ông đã thích món quà này rồi.", "order": "3-1-4-2", "grammar": "ながらも"}, {"period": "07-2013", "stt": 3, "q": "このドラマの人気は、ストーリーも（　　）（　　）（　＊　）（　　）いえる。", "options": ["よるところが", "さることながら", "大きいと", "俳優の演技力に"], "correct": "よるところが", "full": "このドラマの人気は、ストーリーも（さることながら）（俳優の演技力に）（*よるところが）（大きいと）いえる。", "vn": "Có thể nói rằng sức hút của bộ phim này không chỉ nhờ vào cốt truyện, mà phần lớn là nhờ vào diễn xuất của diễn viên.", "order": "2-4-1-3", "grammar": "さることながら"}, {"period": "07-2013", "stt": 4, "q": "通勤に片道２時間かかる私みたいな（　　）（　　）（　＊　）（　　）人は本当にうらやましい。", "options": ["人間から", "数分なんて", "職場まで歩いて", "すれば"], "correct": "職場まで歩いて", "full": "通勤に片道２時間かかる私みたいな（人間から）（すれば）（*職場まで歩いて）（数分なんて）人は本当にうらやましい。", "vn": "Đối với một người như tôi phải mất hai tiếng cho một chiều đi làm, thì những người chỉ mất vài phút đi bộ là tới chỗ làm thật sự đáng ganh tị.", "order": "1-4-3-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2013", "stt": 5, "q": "近年の急速なインターネットの普及がマスメデアに（　　）（　　）（　＊　）（　　）。", "options": ["少なからぬ", "ものがある", "与えた", "影響は"], "correct": "少なからぬ", "full": "近年の急速なインターネットの普及がマスメデアに（与えた）（影響は）（*少なからぬ）（ものがある）。", "vn": "Sự phổ biến nhanh chóng của Internet trong những năm gần đây đã gây ảnh hưởng không nhỏ đến truyền thông đại chúng.", "order": "3-4-1-2", "grammar": "ものがある"}, {"period": "12-2013", "stt": 1, "q": "昨今、森林を単に木材の供給源（　　）（　＊　）（　　）（　　）と捉えることの重要性が広く認識されてきている。", "options": ["のみではなく", "環境資源", "として", "水や空気を育む"], "correct": "のみではなく", "full": "昨今、森林を単に木材の供給源（として）（*のみではなく）（水や空気を育む）（環境資源）と捉えることの重要性が広く認識されてきている。", "vn": "Trong thời gian gần đây, tầm quan trọng của việc nhìn nhận rừng không chỉ là một nguồn cung cấp gỗ, mà còn là nguồn tài nguyên môi trường nuôi dưỡng nước và không khí đã ngày càng được nhận thức rộng rãi.", "order": "3-1-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2013", "stt": 2, "q": "西川高校の森キャプテンは、次の対戦相手が優勝候補の北第一高校に決定したことについて、「たとえ（　　）（　　）（　＊　）（　　）やるだけです。」と語った。", "options": ["相手が", "精一杯", "どういう", "チームだろうと"], "correct": "チームだろうと", "full": "西川高校の森キャプテンは、次の対戦相手が優勝候補の北第一高校に決定したことについて、「たとえ（相手が）（どういう）（*チームだろうと）（精一杯）やるだけです。」と語った。", "vn": "Đội trưởng Mori của trường THPT Nishikawa, trước việc đối thủ tiếp theo được quyết định là trường Kita Daiichi ứng cử viên vô địch, đã nói: “Cho dù đối thủ có là đội bóng như thế nào đi chăng nữa, chúng tôi chỉ biết cố gắng hết sức mà thôi.”", "order": "1-3-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2013", "stt": 3, "q": "この店のハンバーガは、値段は多少高めだが、手間が（　　）（　　）（　＊　）（　　）おいしさだ。", "options": ["ほかの店の", "ものとは", "くらべものにならない", "かかっている分"], "correct": "ものとは", "full": "この店のハンバーガは、値段は多少高めだが、手間が（かかっている分）（ほかの店の）（*ものとは）（くらべものにならない）おいしさだ。", "vn": "Bánh hamburger của cửa hàng này tuy giá có hơi cao một chút, nhưng vì được làm rất kỳ công nên độ ngon của nó không thể nào đem so sánh với các cửa hàng khác.", "order": "4-1-2-3", "grammar": "ものとは"}, {"period": "12-2013", "stt": 4, "q": "田中「明日の食事会、森さんも来るんだよね。私、会うの５年ぶりだよ。」\n木村「わたしは仕事で（　　）（　　）（　＊　）（　　） なるかな。」", "options": ["１０年ぶりに", "大阪に行ったついでに", "それっきりだから", "一度あって"], "correct": "それっきりだから", "full": "田中「明日の食事会、森さんも来るんだよね。私、会うの５年ぶりだよ。」木村「わたしは仕事で（大阪に行ったついでに）（一度あって）（*それっきりだから）（１０年ぶりに） なるかな。」", "vn": "Kimura: Còn tôi, nhân tiện đi công tác ở Osaka, đã gặp một lần, nhưng sau đó không gặp nữa, nên chắc là 10 năm mới gặp lại.", "order": "2-4-3-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2013", "stt": 5, "q": "この本を買ったときは、話題の本だから読んでみようか（　　）（　　）（　＊　）（　　）しかなかったが、読み始めたら夢中になり、一晩で一気に読んでしまった。", "options": ["気持ち", "ぐらい", "の", "で"], "correct": "気持ち", "full": "この本を買ったときは、話題の本だから読んでみようか（ぐらい）（の）（*気持ち）（で）しかなかったが、読み始めたら夢中になり、一晩で一気に読んでしまった。", "vn": "Khi mua cuốn sách này, tôi chỉ nghĩ đơn giản kiểu \"thử đọc xem vì đây là cuốn sách đang được nói đến\" thôi, nhưng khi bắt đầu đọc thì bị cuốn hút và đọc hết trong một đêm.", "order": "2-3-1-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2014", "stt": 1, "q": "A「おとといは大雨、昨日は車のパンク。旅行に来てからトラブル続きで嫌なるよね」\nB「本当だよ。最終日の（　　）（　　）（　＊　）（　　）。」", "options": ["何も", "今日こそ", "ように", "起きません"], "correct": "起きません", "full": "A「おとといは大雨、昨日は車のパンク。旅行に来てからトラブル続きで嫌なるよね」B「本当だよ。最終日の（今日こそ）（何も）（*起きません）（ように）。」", "vn": "B: Đúng thật. Ngày cuối cùng hôm nay, hy vọng sẽ không có gì xảy ra.", "order": "2-1-4-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2014", "stt": 2, "q": "うちの娘は、なぜあんなに買い物に時間がかかるのか。ブラウス（　　）（　　）（　＊　）（　　）、全くあきれてしまった。", "options": ["４時間もかかる", "だけのことなのに", "１枚選ぶ", "とは"], "correct": "４時間もかかる", "full": "うちの娘は、なぜあんなに買い物に時間がかかるのか。ブラウス（１枚選ぶ）（だけのことなのに）（*４時間もかかる）（とは）、全くあきれてしまった。", "vn": "Con gái tôi sao lại mất nhiều thời gian mua sắm đến vậy. Chỉ chọn một cái áo sơ mi thôi mà mất tới 4 giờ, tôi thực sự ngán ngẩm.", "order": "3-2-1-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2014", "stt": 3, "q": "この仕事をすべて（　　）（　　）（　＊　）（　　）無理だ。", "options": ["一人でやる", "新入社員の田中さん", "には", "のは"], "correct": "新入社員の田中さん", "full": "この仕事をすべて（一人でやる）（のは）（*新入社員の田中さん）（には）無理だ。", "vn": "Làm toàn bộ công việc này một mình thì với nhân viên mới Tanaka là không thể.", "order": "1-4-2-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2014", "stt": 4, "q": "最近、運動不足だ。何しろ外出（　　）（　　）（　＊　）（　　）、あとは朝から晩まで家にいるという生活なのだ。", "options": ["もので", "近所のスーパーに行く", "程度の", "といったら"], "correct": "程度の", "full": "最近、運動不足だ。何しろ外出（といったら）（近所のスーパーに行く）（*程度の）（もので）、あとは朝から晩まで家にいるという生活なのだ。", "vn": "Gần đây, tôi thiếu vận động. Dù sao thì nếu nói đến ra ngoài, cũng chỉ đến siêu thị gần nhà thôi, còn lại thì cả ngày từ sáng đến tối đều ở trong nhà.", "order": "4-2-3-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2014", "stt": 5, "q": "交通のバス路線が一部廃止される問題で、会社側から地域住民に対し、路線を廃止する（　　）（　　）（　＊　）（　　）について、説明がなされた。", "options": ["及び", "に至った", "経緯", "今後の対応"], "correct": "及び", "full": "交通のバス路線が一部廃止される問題で、会社側から地域住民に対し、路線を廃止する（に至った）（経緯）（*及び）（今後の対応）について、説明がなされた。", "vn": "Về vấn đề một phần tuyến xe buýt giao thông bị xóa bỏ, phía công ty đã giải thích với cư dân địa phương quá trình dẫn đến việc xóa bỏ tuyến, cũng như các biện pháp sẽ thực hiện trong tương lai.", "order": "2-3-1-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2014", "stt": 1, "q": "彼はこの映画で、純粋で不器用な（　　）（　　）（　＊　）（　　）までに演じきった。", "options": ["その確かな", "主人公を", "見事な", "表現力で"], "correct": "表現力で", "full": "彼はこの映画で、純粋で不器用な（主人公を）（その確かな）（*表現力で）（見事な）までに演じきった。", "vn": "Trong bộ phim này, anh ấy đã diễn trọn vẹn nhân vật chính ngây thơ và vụng về đến mức xuất sắc nhờ khả năng biểu cảm chắc chắn của mình.", "order": "2-1-4-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2014", "stt": 2, "q": "社長は、「常に魅力ある新商品を開発し続けることが重要であり、それ（　　）（　　）（　＊　）（　　）ない」と語った。", "options": ["など", "会社の成長", "望みようも", "なくして"], "correct": "など", "full": "社長は、「常に魅力ある新商品を開発し続けることが重要であり、それ（なくして）（会社の成長）（*など）（望みようも）ない」と語った。", "vn": "Giám đốc công ty nói: “Việc luôn phát triển những sản phẩm mới hấp dẫn là rất quan trọng, nếu thiếu điều đó, không thể nào mong đợi sự phát triển của công ty.”", "order": "4-2-1-3", "grammar": "なくして"}, {"period": "12-2014", "stt": 3, "q": "たんぱく質は体の組織を作る重要な成分ですが、多くとった（　　）（　　）（　＊　）（　　）ものでもなく、とりすぎは逆に健康に悪影響を及ぼすことがあります。", "options": ["より丈夫になる", "かというと", "からといって", "そういう"], "correct": "かというと", "full": "たんぱく質は体の組織を作る重要な成分ですが、多くとった（からといって）（より丈夫になる）（*かというと）（そういう）ものでもなく、とりすぎは逆に健康に悪影響を及ぼすことがあります。", "vn": "Protein là thành phần quan trọng để tạo nên các mô cơ thể, nhưng không phải cứ ăn nhiều là sẽ khỏe hơn, và việc ăn quá nhiều thậm chí có thể gây ảnh hưởng xấu đến sức khỏe.", "order": "3-1-2-4", "grammar": "からといって"}, {"period": "12-2014", "stt": 4, "q": "来年２月のコンサート（　　）（　　）（　＊　）（　　）となるＣＤを発売した。", "options": ["をもって", "６枚目にして最後", "が", "解散するバンド「Ｚ」"], "correct": "が", "full": "来年２月のコンサート（をもって）（解散するバンド「Ｚ」）（*が）（６枚目にして最後）となるＣＤを発売した。", "vn": "Ban nhạc “Z”, sẽ giải tán sau buổi hòa nhạc vào tháng 2 năm sau, đã phát hành đĩa CD thứ sáu và cũng là cuối cùng.", "order": "1-4-3-2", "grammar": "にして"}, {"period": "12-2014", "stt": 5, "q": "新型ゲーム機について、来月あたりに何らかの発表を（　　）（　　）（　＊　）（　　）ホームページ上で公表し、話題となっている。", "options": ["見られていた", "Ｘ社が", "来週にも情報を公開すると", "するのではないかと"], "correct": "Ｘ社が", "full": "新型ゲーム機について、来月あたりに何らかの発表を（するのではないかと）（見られていた）（*Ｘ社が）（来週にも情報を公開すると）ホームページ上で公表し、話題となっている。", "vn": "Về máy chơi game thế hệ mới, trước đó dự đoán rằng công ty X sẽ có một thông báo nào đó vào khoảng tháng tới, nhưng họ đã công bố trên trang chủ rằng có thể sẽ tiết lộ thông tin ngay tuần sau, gây chú ý dư luận.", "order": "4-1-2-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2015", "stt": 1, "q": "新入社員には、一斉研修よりも現場で直接指導したほうがいい。例えば、（　　）（　＊　）（　　）（　　）、現場だと場面に応じて指導できるので、成長も早い。", "options": ["しても", "メールの書き方", "ひとつに", "そうで"], "correct": "ひとつに", "full": "新入社員には、一斉研修よりも現場で直接指導したほうがいい。例えば、（メールの書き方）（*ひとつに）（しても）（そうで）、現場だと場面に応じて指導できるので、成長も早い。", "vn": "Với nhân viên mới, việc hướng dẫn trực tiếp tại hiện trường tốt hơn là đào tạo đồng loạt. Ví dụ, chỉ riêng cách viết email thôi, tại hiện trường có thể hướng dẫn tùy theo từng tình huống, nên sự tiến bộ cũng nhanh hơn.", "order": "2-3-1-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2015", "stt": 2, "q": "僕みたいに（　　）（　　）（　＊　）（　　）かもしれないが、僕は、お金よりもやりがいを重視して仕事を選んだほうが、幸せになれると思う。", "options": ["学生が", "言っても", "説得力がない", "働いたことがない"], "correct": "言っても", "full": "僕みたいに（働いたことがない）（学生が）（*言っても）（説得力がない）かもしれないが、僕は、お金よりもやりがいを重視して仕事を選んだほうが、幸せになれると思う。", "vn": "Có thể một sinh viên như tôi, chưa từng đi làm, nói ra sẽ không thuyết phục lắm, nhưng tôi nghĩ rằng nên chọn công việc coi trọng sự hứng thú hơn tiền bạc thì mới có thể hạnh phúc.", "order": "4-1-2-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2015", "stt": 3, "q": "本のあとがきで\n皆さんが国際経済を理解するために、この本が（　　）（　　）（　＊　）（　　）喜びはありません。", "options": ["お役に立てば", "これ以上の", "少しでも", "著者として"], "correct": "著者として", "full": "本のあとがきで皆さんが国際経済を理解するために、この本が（少しでも）（お役に立てば）（*著者として）（これ以上の）喜びはありません。", "vn": "\"Với tư cách là tác giả, tôi sẽ không có niềm vui nào hơn nếu cuốn sách này có thể giúp ích, dù chỉ một chút, cho các bạn hiểu về kinh tế quốc tế.\"", "order": "3-1-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2015", "stt": 4, "q": "先生「今からディスカッションを始めますが、一つ注意点があります。（　　）（　　）（　＊　）（　　）聞くようにしてください。」", "options": ["反論したくなっても", "言っていることに", "相手が", "まずは相手の話を"], "correct": "反論したくなっても", "full": "先生「今からディスカッションを始めますが、一つ注意点があります。（相手が）（言っていることに）（*反論したくなっても）（まずは相手の話を）聞くようにしてください。」", "vn": "Giáo viên: “Bây giờ chúng ta sẽ bắt đầu thảo luận, nhưng có một điểm cần lưu ý. Dù bạn có muốn phản bác những gì đối phương nói, trước hết hãy lắng nghe câu chuyện của họ.”", "order": "3-2-1-4", "grammar": "にして"}, {"period": "07-2015", "stt": 5, "q": "出張の帰りに空港の売店で、家族（　　）（　　）（　＊　）（　　） 、人気の紅茶クッキーを買った。", "options": ["への", "と", "おみやげ", "に"], "correct": "に", "full": "出張の帰りに空港の売店で、家族（への）（おみやげ）（*に）（と） 、人気の紅茶クッキーを買った。", "vn": "Trên đường về từ chuyến công tác, tôi đã mua bánh quy trà được ưa chuộng làm quà cho gia đình.", "order": "1-3-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2015", "stt": 1, "q": "社内で発生したシステムトラブルに関し、担当者から、原因を特定する （　　）（　　）（　＊　）（　　）報告があった。", "options": ["必要がある", "との", "詳細な調査をする、", "には"], "correct": "必要がある", "full": "社内で発生したシステムトラブルに関し、担当者から、原因を特定する （には）（詳細な調査をする、）（*必要がある）（との）報告があった。", "vn": "Liên quan đến sự cố hệ thống xảy ra trong công ty, người phụ trách đã báo cáo rằng cần phải điều tra chi tiết để xác định nguyên nhân.", "order": "4-3-1-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2015", "stt": 2, "q": "私はどんな困難に遭っても（　　）（　　）（　＊　）（　　）にほかならない。", "options": ["サッカーを続けてこられたのは", "それに負けることなく", "仲間がいたから", "信頼できる"], "correct": "信頼できる", "full": "私はどんな困難に遭っても（それに負けることなく）（サッカーを続けてこられたのは）（*信頼できる）（仲間がいたから）にほかならない。", "vn": "Dù gặp bất cứ khó khăn nào, việc tôi tiếp tục chơi bóng đá mà không chịu thua chính là nhờ có những đồng đội đáng tin cậy.", "order": "2-1-4-3", "grammar": "にほかならない"}, {"period": "12-2015", "stt": 3, "q": "１０年ぶりに故郷に帰ったら、大規模な再開発が行われていて驚いた。昔の（　　）（　　）（　＊　）（　　）不思議な感覚だった。", "options": ["私にとっては", "どこか知らない", "町の様子しか知らない", "町に来たかのような"], "correct": "どこか知らない", "full": "１０年ぶりに故郷に帰ったら、大規模な再開発が行われていて驚いた。昔の（町の様子しか知らない）（私にとっては）（*どこか知らない）（町に来たかのような）不思議な感覚だった。", "vn": "Khi trở về quê hương sau 10 năm, tôi đã ngạc nhiên khi thấy khu vực được tái phát triển quy mô lớn. Với tôi, người chỉ biết về cảnh phố xưa, đó là một cảm giác kỳ lạ như thể đến một thị trấn nào đó mà mình chưa từng biết đến.", "order": "3-1-2-4", "grammar": "にとっては"}, {"period": "12-2015", "stt": 4, "q": "親友とけんかしたその日は、謝ってきても（　　）（　　）（　＊　）（　　）気持ちもあったけど、次の日には仲直りした。", "options": ["なんて", "やる", "許して", "もんか"], "correct": "もんか", "full": "親友とけんかしたその日は、謝ってきても（許して）（やる）（*もんか）（なんて）気持ちもあったけど、次の日には仲直りした。", "vn": "Ngày hôm đó, sau khi cãi nhau với người bạn thân, dù có cảm giác kiểu “chẳng đời nào tha cho cậu ấy đâu” khi họ xin lỗi, nhưng ngày hôm sau chúng tôi đã làm lành.", "order": "3-2-4-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2015", "stt": 5, "q": "映画「プレゼント」について、監督は、大人の（　　）（　　）（　＊　）（　　）と語った。", "options": ["アニメ映画を", "作った作品だ", "と考えて", "鑑賞にたえるような"], "correct": "と考えて", "full": "映画「プレゼント」について、監督は、大人の（鑑賞にたえるような）（アニメ映画を）（*と考えて）（作った作品だ）と語った。", "vn": "Về bộ phim hoạt hình “Present”, đạo diễn nói rằng ông đã nghĩ tới việc tạo ra một tác phẩm xứng đáng để người lớn thưởng thức.", "order": "4-1-3-2", "grammar": "にたえる"}, {"period": "07-2016", "stt": 1, "q": "町の夏祭りに行くときはいつも一人だ。一人で（　　）（　＊　）（　　）（　　）約束して一緒に行く必要もないからだ。", "options": ["誰かと", "誰かしら", "行っても", "友達に会うので"], "correct": "誰かしら", "full": "町の夏祭りに行くときはいつも一人だ。一人で（行っても）（*誰かしら）（友達に会うので）（誰かと）約束して一緒に行く必要もないからだ。", "vn": "Khi đi đến lễ hội mùa hè của thị trấn thì tôi luôn đi một mình. Vì dù có đi một mình thì kiểu gì cũng sẽ gặp một ai đó là bạn bè, nên cũng không cần phải hẹn trước để đi cùng với ai cả.", "order": "3-2-4-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2016", "stt": 2, "q": "先月初めて出版した自分の小説の売れ行きが気になっているが、友人の前では、そんなこと（　　）（　＊　）（　　）（　　）言いってしまう。", "options": ["とか", "どうだって", "かまわない", "本心とは違うことを"], "correct": "かまわない", "full": "先月初めて出版した自分の小説の売れ行きが気になっているが、友人の前では、そんなこと（どうだって）（*かまわない）（とか）（本心とは違うことを）言いってしまう。", "vn": "Tôi đang rất để tâm đến tình hình bán ra của cuốn tiểu thuyết đầu tiên mình xuất bản tháng trước, thế nhưng trước mặt bạn bè lại nói những câu trái ngược với lòng mình, kiểu như “chuyện đó thế nào cũng được”.", "order": "2-3-1-4", "grammar": "とか"}, {"period": "07-2016", "stt": 3, "q": "授業のレポートなどでインターネット上のデータを使肘るときは、情報が正しい（　　）（　　）（　＊　）（　　）も重要である。", "options": ["か否か", "確認すること", "いつのデータかを", "だけでなく"], "correct": "いつのデータかを", "full": "授業のレポートなどでインターネット上のデータを使肘るときは、情報が正しい（か否か）（だけでなく）（*いつのデータかを）（確認すること）も重要である。", "vn": "Khi sử dụng dữ liệu trên Internet cho các bài báo cáo trên lớp, không chỉ cần biết thông tin đó đúng hay sai, mà việc kiểm tra xem dữ liệu đó là của thời điểm nào cũng rất quan trọng.", "order": "1-4-3-2", "grammar": "か否か"}, {"period": "07-2016", "stt": 4, "q": "部屋が汚いことを（　　）（　　）（　＊　）（　　）、まだ汚いと言われた。", "options": ["これ以上", "親に注意されて", "きれいにしたつもりだったが", "きれいにしようがないくらい"], "correct": "きれいにしようがないくらい", "full": "部屋が汚いことを（親に注意されて）（これ以上）（*きれいにしようがないくらい）（きれいにしたつもりだったが）、まだ汚いと言われた。", "vn": "Bị bố mẹ nhắc nhở rằng phòng bẩn, tôi đã cố dọn sạch đến mức không thể làm sạch hơn được nữa rồi, vậy mà vẫn bị nói là còn bẩn.", "order": "2-1-4-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2016", "stt": 5, "q": "政府は景気回復のための政策を進めてはいるが、景気が回徨してきている（　　）（　　）（　＊　）（　　）現状である。", "options": ["企業もまだ多い", "までに至らない", "と実感できる", "というのが"], "correct": "企業もまだ多い", "full": "政府は景気回復のための政策を進めてはいるが、景気が回徨してきている（と実感できる）（までに至らない）（*企業もまだ多い）（というのが）現状である。", "vn": "Chính phủ đang thúc đẩy các chính sách nhằm phục hồi kinh tế, tuy nhiên thực tế vẫn còn nhiều doanh nghiệp vẫn chưa thể cảm nhận được rằng nền kinh tế đang hồi phục.", "order": "3-2-1-4", "grammar": "というのが"}, {"period": "12-2016", "stt": 1, "q": "「アセビ」という、白い花を咲かせる樹木を漢字で「馬酔木」と書くのは、アセビには（　＊　）（　　）（　　）（　　）そうです。", "options": ["由来する", "有毒成分があり", "状態になることに", "馬が食べると酔ったような"], "correct": "有毒成分があり", "full": "「アセビ」という、白い花を咲かせる樹木を漢字で「馬酔木」と書くのは、アセビには（*有毒成分があり）（馬が食べると酔ったような）（状態になることに）（由来する）そうです。", "vn": "Cây “asebi”, một loại cây nở hoa màu trắng, được viết bằng chữ Hán là “馬酔木” (Mã túy mộc) là do cây asebi có độc, và khi ngựa ăn phải thì sẽ ở trong trạng thái giống như bị say, nên cái tên đó được đặt theo nguồn gốc như vậy.", "order": "2-4-3-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2016", "stt": 2, "q": "家族の時間を大切にする夫は、つい（　　）（　　）（　＊　）（　　）ありがたい存在です。", "options": ["本当に大切なものは何なのか", "私に", "仕事に夢中になりすぎる", "気づかせてくれる"], "correct": "本当に大切なものは何なのか", "full": "家族の時間を大切にする夫は、つい（仕事に夢中になりすぎる）（私に）（*本当に大切なものは何なのか）（気づかせてくれる）ありがたい存在です。", "vn": "Người chồng trân trọng thời gian bên gia đình ấy là một người đáng quý, luôn giúp tôi – người hay quá mải mê với công việc – nhận ra điều gì mới thực sự quan trọng.", "order": "3-2-1-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2016", "stt": 3, "q": "Ｚ県知事の林和夫氏は、週刊誌で、脱税を行った（　　）（　　）（　＊　）（　　）異なり、名誉を傷つけられたとして、発行元のＸ社を相手取り訴訟を起こした。", "options": ["事実とは全く", "疑いがあるなどと", "報じられた", "ことに対し"], "correct": "ことに対し", "full": "Ｚ県知事の林和夫氏は、週刊誌で、脱税を行った（疑いがあるなどと）（報じられた）（*ことに対し）（事実とは全く）異なり、名誉を傷つけられたとして、発行元のＸ社を相手取り訴訟を起こした。", "vn": "Ông Hayashi Kazuo, thống đốc tỉnh Z, đã khởi kiện công ty xuất bản X, với lý do danh dự của ông bị tổn hại vì tuần san đã đưa tin rằng ông có nghi vấn trốn thuế, nhưng điều đó hoàn toàn không đúng sự thật.", "order": "2-3-4-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2016", "stt": 4, "q": "Ｑ鉄道が１０年ぶりに運賃値上げに踏み切った。安全対策や原油の高騰で支出が増え、経営努力だけでは対応しきれないと判断（　　）（　　）（　＊　）（　　）。", "options": ["という", "の", "ことだ", "して"], "correct": "ことだ", "full": "Ｑ鉄道が１０年ぶりに運賃値上げに踏み切った。安全対策や原油の高騰で支出が増え、経営努力だけでは対応しきれないと判断（して）（の）（*ことだ）（という）。", "vn": "Đường sắt Q đã quyết định tăng giá vé lần đầu tiên sau 10 năm. Người ta nói rằng họ đã phán đoán rằng chi phí tăng lên do các biện pháp an toàn và giá dầu thô leo thang, và chỉ dựa vào nỗ lực quản lý thôi thì không thể ứng phó được.", "order": "4-2-3-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2016", "stt": 5, "q": "世の中にはさまざまな資格があふれているが、資格を取った（　　）（　　）（　　）（　＊　）世間は甘くないらしい。", "options": ["だけ", "ほど", "で", "希望の職につける"], "correct": "ほど", "full": "世の中にはさまざまな資格があふれているが、資格を取った（だけ）（で）（希望の職につける）（*ほど）世間は甘くないらしい。", "vn": "Trên đời có vô số loại chứng chỉ, nhưng hình như xã hội không dễ dàng đến mức chỉ cần lấy được chứng chỉ thôi là có thể làm công việc mình mong muốn.", "order": "1-3-4-2", "grammar": "ほど"}, {"period": "07-2017", "stt": 1, "q": "みなみ水族館はふだんから来館者が多いが、先日ペンギンの赤ちゃんが生まれた（　　）（　　）（　＊　）（　　）いつも以上ににぎわっている。", "options": ["多くの人で", "こともあって", "という", "赤ちゃんを一目見よう"], "correct": "という", "full": "みなみ水族館はふだんから来館者が多いが、先日ペンギンの赤ちゃんが生まれた（こともあって）（赤ちゃんを一目見よう）（*という）（多くの人で）いつも以上ににぎわっている。", "vn": "Thủy cung Minami vốn đã có nhiều khách tham quan, nhưng do mới đây có một chú chim cánh cụt con chào đời nên có nhiều người đến để được nhìn thấy chú một lần, khiến nơi đây còn nhộn nhịp hơn thường lệ.", "order": "2-4-3-1", "grammar": "こともあって"}, {"period": "07-2017", "stt": 2, "q": "新社長は労働条件に問題はないと考えているようだが、実態をわかっていない。労働条件（　　）（　　）（　＊　）（　　）が業績向上だ。", "options": ["の", "なくして", "何", "改善"], "correct": "なくして", "full": "新社長は労働条件に問題はないと考えているようだが、実態をわかっていない。労働条件（の）（改善）（*なくして）（何）が業績向上だ。", "vn": "Tân giám đốc hình như cho rằng điều kiện lao động không có vấn đề gì, nhưng thực tế ông ấy không hiểu rõ. Không cải thiện điều kiện lao động thì làm gì có chuyện nâng cao thành tích chứ.", "order": "1-4-2-3", "grammar": "なくして"}, {"period": "07-2017", "stt": 3, "q": "現代の映画音楽界で、作品の世界観に合わせて（　　）（　　）（　＊　）（　　）だろう。", "options": ["彼女以上に優れている", "才能にかけては", "作曲家はまずいない", "音楽を作る"], "correct": "彼女以上に優れている", "full": "現代の映画音楽界で、作品の世界観に合わせて（音楽を作る）（才能にかけては）（*彼女以上に優れている）（作曲家はまずいない）だろう。", "vn": "Trong giới âm nhạc phim hiện đại, nếu nói về tài năng sáng tác nhạc phù hợp với thế giới quan của tác phẩm thì chắc hẳn không có nhà soạn nhạc nào vượt qua được cô ấy.", "order": "4-2-1-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2017", "stt": 4, "q": "ゼミの教え子たちが新しい技術を使ったソーラーカーの開発に成功した。実用化が近いとされている（　　）（　　）（　＊　）（　　）効率よく走れることができたと思う。", "options": ["それなりに", "ものには", "A社が開発した", "遠く及ばないにしろ"], "correct": "遠く及ばないにしろ", "full": "ゼミの教え子たちが新しい技術を使ったソーラーカーの開発に成功した。実用化が近いとされている（A社が開発した）（ものには）（*遠く及ばないにしろ）（それなりに）効率よく走れることができたと思う。", "vn": "Những học trò seminar của tôi đã thành công trong việc phát triển xe chạy bằng năng lượng mặt trời sử dụng công nghệ mới. Dù cho còn kém xa sản phẩm do tập đoàn A phát triển và sắp được ứng dụng thực tế, nhưng tôi nghĩ chiếc xe đã có thể chạy khá hiệu quả.", "order": "3-2-4-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2017", "stt": 5, "q": "これまでにないウェディングドレスを作ろうと思い、デザイン画を描いては（　　）（　　）（　＊　）（　　）、やっと納得のいくものができた。", "options": ["を", "数十回", "直す", "繰り返すこと"], "correct": "繰り返すこと", "full": "これまでにないウェディングドレスを作ろうと思い、デザイン画を描いては（直す）（を）（*繰り返すこと）（数十回）、やっと納得のいくものができた。", "vn": "Muốn tạo ra một chiếc váy cưới chưa từng có, tôi đã vẽ bản thiết kế rồi chỉnh sửa đi chỉnh sửa lại vài chục lần và cuối cùng cũng làm ra được một sản phẩm ưng ý.", "order": "3-1-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2018", "stt": 1, "q": "妹は、来月初に（　　）（　　）（　*　）（　　）そうだ。", "options": ["買えずにいた", "ソファを買うことにした", "引っ越しするのを機に", "今まで欲しいと思いつつ"], "correct": "買えずにいた", "full": "妹は、来月初に（引っ越しするのを機に）（今まで欲しいと思いつつ）（*買えずにいた）（ソファを買うことにした）そうだ。", "vn": "Nghe nói em gái tôi, nhân dịp chuyển nhà vào đầu tháng sau, đã quyết định mua chiếc sofa mà từ trước đến nay vẫn muốn mua nhưng chưa mua được.", "order": "3-4-1-2", "grammar": "を機に"}, {"period": "07-2018", "stt": 2, "q": "私の故郷は、自然に囲まれたのどかな所（　　）（　　）（　*　）（　　）周りに田んぼしかない、ただの田舎町だ。", "options": ["と言えば", "要するに", "聞こえはいいが", "である"], "correct": "聞こえはいいが", "full": "私の故郷は、自然に囲まれたのどかな所（である）（と言えば）（*聞こえはいいが）（要するに）周りに田んぼしかない、ただの田舎町だ。", "vn": "Quê tôi nếu nói là một nơi yên bình được thiên nhiên bao quanh thì nghe có vẻ hay, nhưng nói thẳng ra thì chỉ là một thị trấn quê mùa, xung quanh toàn là ruộng lúa.", "order": "4-1-3-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2018", "stt": 3, "q": "入社2年目でプロジェクトのリーダーに指名されたときは（　　）（　　）（　*　）（　　）先輩方の厳しくも温かいサポートのおかげで、無事に務めることができました。", "options": ["こんな大役が", "新人に務まるのかと", "不安でいっぱいでしたが", "私ごとき"], "correct": "新人に務まるのかと", "full": "入社2年目でプロジェクトのリーダーに指名されたときは（こんな大役が）（私ごとき）（*新人に務まるのかと）（不安でいっぱいでしたが）先輩方の厳しくも温かいサポートのおかげで、無事に務めることができました。", "vn": "Khi được chỉ định làm trưởng nhóm dự án vào năm thứ hai làm việc, tôi đã rất lo lắng không biết một người mới như mình có đảm nhận được vai trò lớn như vậy không, nhưng nhờ sự hỗ trợ nghiêm khắc mà ấm áp của các anh chị đi trước, tôi đã hoàn thành được nhiệm vụ một cách an toàn.", "order": "1-4-2-3", "grammar": "ごとき"}, {"period": "07-2018", "stt": 4, "q": "都市開発事業を、地域住民の同意を得る（　　）（　　）（　*　）（　　）、北市の住民が市長を訴えた。", "options": ["なしに", "こと", "として", "進めた"], "correct": "進めた", "full": "都市開発事業を、地域住民の同意を得る（こと）（なしに）（*進めた）（として）、北市の住民が市長を訴えた。", "vn": "Người dân thành phố Kita đã kiện thị trưởng với lý do đã tiến hành dự án phát triển đô thị mà không có sự đồng ý của người dân địa phương.", "order": "2-1-4-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2018", "stt": 5, "q": "政府が発表した数字によると、昨年4月1日（　　）（　*　）（　　）（　　）一昨年と比べて15万人少なく、過去最低となった。", "options": ["は", "現在", "における", "15 歳未満の人口"], "correct": "における", "full": "政府が発表した数字によると、昨年4月1日（現在）（*における）（15 歳未満の人口）（は）一昨年と比べて15万人少なく、過去最低となった。", "vn": "Theo số liệu do chính phủ công bố, dân số dưới 15 tuổi tính đến ngày 1/4 năm ngoái đã giảm 150.000 người so với năm trước đó, xuống mức thấp nhất từ trước đến nay.", "order": "2-3-4-1", "grammar": "における"}, {"period": "12-2018", "stt": 1, "q": "民話「鶴の恩返し」は、わなにかかって苦しんでいる（　　）（　　）（　*　）（　　）おじいさんに美しい布を織って恩返しをするというお話です。", "options": ["鶴が", "ところを", "助けられた", "助けてくれた"], "correct": "鶴が", "full": "民話「鶴の恩返し」は、わなにかかって苦しんでいる（ところを）（助けられた）（*鶴が）（助けてくれた）おじいさんに美しい布を織って恩返しをするというお話です。", "vn": "Truyện dân gian “Sự báo ân của chim hạc” kể về một con hạc bị mắc bẫy và được cứu, sau đó dệt vải tặng ông lão để báo đáp ân tình.", "order": "2-3-1-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2018", "stt": 2, "q": "新人が仕事中に居眠りしているのを発見。上司として、見なかった（　　）（　　）（　*　）（　　）注意することにした。", "options": ["起こして", "ほうっておく", "ことにして", "わけにもいかず"], "correct": "わけにもいかず", "full": "新人が仕事中に居眠りしているのを発見。上司として、見なかった（ことにして）（ほうっておく）（*わけにもいかず）（起こして）注意することにした。", "vn": "Phát hiện nhân viên mới ngủ gật trong giờ làm. Với vai trò là cấp trên, tôi không thể coi như không thấy mà bỏ qua, nên đã đánh thức và nhắc nhở.", "order": "3-2-4-1", "grammar": "にして"}, {"period": "12-2018", "stt": 3, "q": "株式会社トモカワ。短期的な成果が重視されがちな（　　）（　　）（　*　）（　　）工作機械メーカーである。", "options": ["時代にあって", "目先の利益だけでなく", "着実に成長を続けている", "日本の将来を見据えながら"], "correct": "日本の将来を見据えながら", "full": "株式会社トモカワ。短期的な成果が重視されがちな（時代にあって）（目先の利益だけでなく）（*日本の将来を見据えながら）（着実に成長を続けている）工作機械メーカーである。", "vn": "Công ty cổ phần Tomokawa là một nhà sản xuất máy công cụ vẫn đang tiếp tục phát triển vững chắc, không chỉ chú trọng lợi ích trước mắt mà còn hướng đến tương lai của Nhật Bản, trong thời đại mà thành quả ngắn hạn thường được coi trọng.", "order": "1-2-4-3", "grammar": "にあって"}, {"period": "12-2018", "stt": 4, "q": "犯罪心理学者でもある小説家大石竜也が描く巧みな心理描写は、犯罪心理学に精通した（　　）（　　）（　*　）（　　）ものである。", "options": ["専門家", "初めて", "にして", "書ける"], "correct": "初めて", "full": "犯罪心理学者でもある小説家大石竜也が描く巧みな心理描写は、犯罪心理学に精通した（専門家）（にして）（*初めて）（書ける）ものである。", "vn": "Những miêu tả tâm lý tinh tế mà nhà văn Oishi Ryuya — người cũng là một nhà tâm lý học hình sự — viết ra, là điều mà chỉ những chuyên gia am hiểu sâu về tâm lý học hình sự mới có thể viết được.", "order": "1-3-2-4", "grammar": "にして"}, {"period": "12-2018", "stt": 5, "q": "自分の人生に関わる選択は自分でしたい。たとえその結果失敗したとしても、自分が（　　）（　*　）（　　）（　　）経験として受け入れられると思う。", "options": ["ひとつの", "決めたことなら", "それで", "それは"], "correct": "それは", "full": "自分の人生に関わる選択は自分でしたい。たとえその結果失敗したとしても、自分が（決めたことなら）（*それは）（それで）（ひとつの）経験として受け入れられると思う。", "vn": "Tôi muốn tự mình đưa ra những lựa chọn liên quan đến cuộc đời mình. Dù kết quả có thất bại, nhưng nếu đó là điều do mình quyết định, tôi nghĩ vẫn có thể chấp nhận nó như một kinh nghiệm.", "order": "2-4-3-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2019", "stt": 1, "q": "X 医院は、患者を（　　）（　　）（　*　）（　　）近々予約制を導入するらしい。", "options": ["待たせる", "診察できる", "ように", "ことなく"], "correct": "診察できる", "full": "X 医院は、患者を（待たせる）（ことなく）（*診察できる）（ように）近々予約制を導入するらしい。", "vn": "Nghe nói phòng khám X sẽ áp dụng hệ thống đặt lịch hẹn trong thời gian tới để có thể khám cho bệnh nhân mà không cần để họ phải chờ đợi.", "order": "1-4-2-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2019", "stt": 2, "q": "昨日、友人から野菜ジュースをたくさんもらった。一人暮らしだとインスタント食品ばかり食べてしまって（　　）（　　）（　*　）（　　）ありがたい。", "options": ["だけに", "になり", "がちな", "野菜不足"], "correct": "がちな", "full": "昨日、友人から野菜ジュースをたくさんもらった。一人暮らしだとインスタント食品ばかり食べてしまって（野菜不足）（になり）（*がちな）（だけに）ありがたい。", "vn": "Hôm qua tôi được bạn tặng rất nhiều nước ép rau củ. Vì sống một mình nên hay ăn toàn đồ ăn nhanh, dễ bị thiếu rau, nên tôi càng thấy quý món quà này.", "order": "4-2-3-1", "grammar": "がちな"}, {"period": "07-2019", "stt": 3, "q": "ホームページで\nQ：洗剤をたくさん使ったほうが、洗濯物がきれいになりますか。\nA：洗濯物を（　　）（　　）（　*　）（　　）悪臭の原因にもなります。適量を守りましょう。", "options": ["洗剤をたくさん入れればいいかといえば", "逆にすすぎ切れなかったりして", "きれいに洗うには", "そうではなく"], "correct": "そうではなく", "full": "ホームページでQ：洗剤をたくさん使ったほうが、洗濯物がきれいになりますか。A：洗濯物を（きれいに洗うには）（洗剤をたくさん入れればいいかといえば）（*そうではなく）（逆にすすぎ切れなかったりして）悪臭の原因にもなります。適量を守りましょう。", "vn": "Trên trang web: Hỏi: Dùng nhiều bột giặt hơn thì quần áo có sạch hơn không? Đáp: Không phải cứ cho nhiều bột giặt là quần áo sẽ sạch hơn, ngược lại có thể khiến việc xả không sạch hết và gây ra mùi hôi. Hãy sử dụng đúng liều lượng.", "order": "3-1-4-2", "grammar": "たりして"}, {"period": "07-2019", "stt": 4, "q": "この町には、大正初期に建てられた洋館があるらしい。前々から（　　）（　*　）（　　）（　　）帰ることはできない。", "options": ["私としては", "近代建築に興味がある", "その洋館を見ずに", "それを知ったからには"], "correct": "私としては", "full": "この町には、大正初期に建てられた洋館があるらしい。前々から（近代建築に興味がある）（*私としては）（それを知ったからには）（その洋館を見ずに）帰ることはできない。", "vn": "Nghe nói ở thị trấn này có một tòa biệt thự kiểu phương Tây được xây từ đầu thời Taisho. Là người đã có hứng thú với kiến trúc cận đại từ trước, một khi đã biết điều đó thì tôi không thể về mà không xem tòa biệt thự đó.", "order": "2-1-4-3", "grammar": "からには"}, {"period": "07-2019", "stt": 5, "q": "私は、（　　）（　*　）（　　）（　　）と思い、校内に畑を作って生徒たちに野菜を育てさせることを校長に提案した。", "options": ["農業を身近なものとして", "食べるということが", "考えるきっかけになれば", "育てた野菜を収穫して"], "correct": "食べるということが", "full": "私は、（育てた野菜を収穫して）（*食べるということが）（農業を身近なものとして）（考えるきっかけになれば）と思い、校内に畑を作って生徒たちに野菜を育てさせることを校長に提案した。", "vn": "Tôi đã đề xuất với hiệu trưởng việc tạo một khu vườn trong trường để học sinh trồng rau, với mong muốn rằng việc thu hoạch và ăn những loại rau mình trồng sẽ là cơ hội để các em cảm thấy nông nghiệp gần gũi hơn.", "order": "4-2-1-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2019", "stt": 1, "q": "先生に薦められた文献は難しくて、ひと通り読むことは（　*　）（　　）（　　）（　　）とは言えない。", "options": ["が", "あまり", "読んだ", "理解できた"], "correct": "読んだ", "full": "先生に薦められた文献は難しくて、ひと通り読むことは（*読んだ）（が）（あまり）（理解できた）とは言えない。", "vn": "Tài liệu được thầy giới thiệu thì quá khó, tôi cũng đã đọc qua một lượt rồi, nhưng không thể nói là đã hiểu được nhiều.", "order": "3-1-2-4", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2019", "stt": 2, "q": "今日は予定が詰まっていて、食事をする（　　）（　*　）（　　）（　　）一日だった。", "options": ["のも", "くらい", "忙しい", "時間が惜しい"], "correct": "時間が惜しい", "full": "今日は予定が詰まっていて、食事をする（のも）（*時間が惜しい）（くらい）（忙しい）一日だった。", "vn": "Hôm nay lịch trình kín mít, bận đến mức mà ngay cả thời gian để ăn cũng thấy tiếc.", "order": "1-4-2-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2019", "stt": 3, "q": "自分のこと（　　）（　　）（　*　）（　　）のは我慢できない。", "options": ["について", "ともかく", "なら", "家族や友人を悪く言われる"], "correct": "ともかく", "full": "自分のこと（について）（なら）（*ともかく）（家族や友人を悪く言われる）のは我慢できない。", "vn": "Nếu là chuyện liên quan đến bản thân tôi thì còn tạm được, chứ bị nói xấu về gia đình hay bạn bè thì tôi không thể chịu đựng được.", "order": "1-3-2-4", "grammar": "ともかく"}, {"period": "12-2019", "stt": 4, "q": "食に関しては、これだけは、（　　）（　　）（　*　）（　　）誰にでもあると思う。", "options": ["こだわりを", "持つことは", "譲れないという", "何かしらの"], "correct": "こだわりを", "full": "食に関しては、これだけは、（譲れないという）（何かしらの）（*こだわりを）（持つことは）誰にでもあると思う。", "vn": "Về vấn đề ăn uống, tôi nghĩ ai cũng có một sở thích hay nguyên tắc nào đó mà mình cho là “điều này thì tuyệt đối không thể nhượng bộ được”.", "order": "3-4-1-2", "grammar": "こだわり"}, {"period": "12-2019", "stt": 5, "q": "人気のランニングシューズが欲しくて、（　　）（　　）（　*　）（　　）結局買えなかった。", "options": ["残っていても", "売り切れているか", "サイズが合うのがなかったりで", "スポーツショップを数軒回って探したが"], "correct": "残っていても", "full": "人気のランニングシューズが欲しくて、（スポーツショップを数軒回って探したが）（売り切れているか）（*残っていても）（サイズが合うのがなかったりで）結局買えなかった。", "vn": "Vì muốn mua đôi giày chạy bộ đang rất được ưa chuộng, tôi đã đi tìm ở mấy cửa hàng thể thao, nhưng hoặc là đã bán hết, hoặc dù còn hàng thì cũng không có cỡ vừa, nên cuối cùng vẫn không mua được.", "order": "4-2-1-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2020", "stt": 1, "q": "この花火大会は、日本の夏を語る（　　）（　　）（　*　）（　　）有名だ。", "options": ["うえで", "として", "欠かせない", "イベント"], "correct": "イベント", "full": "この花火大会は、日本の夏を語る（うえで）（欠かせない）（*イベント）（として）有名だ。", "vn": "Lễ hội pháo hoa này nổi tiếng là một sự kiện không thể thiếu khi nói về mùa hè ở Nhật Bản.", "order": "1-3-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2020", "stt": 2, "q": "子供にいろいろなことを習わせたいという親の気持ちはよくわかるが、子供の遊ぶ時間を奪って（　　）（　　）（　*　）（　　）ないと思う。", "options": ["必要は", "やらせる", "まで", "無理に"], "correct": "やらせる", "full": "子供にいろいろなことを習わせたいという親の気持ちはよくわかるが、子供の遊ぶ時間を奪って（まで）（無理に）（*やらせる）（必要は）ないと思う。", "vn": "Tôi rất hiểu mong muốn của cha mẹ muốn cho con học nhiều thứ, nhưng tôi nghĩ không cần phải ép con học đến mức tước đi cả thời gian chơi của con.", "order": "3-4-2-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2020", "stt": 3, "q": "A「おとといは大雨、昨日は車のパンク。旅行に来てからトラブル続きで嫌になるよね。」 \nB「本当だよ。最終日の（　　）（　　）（　*　）（　　）。」", "options": ["何も", "今日こそ", "ように", "起きません"], "correct": "起きません", "full": "A「おとといは大雨、昨日は車のパンク。旅行に来てからトラブル続きで嫌になるよね。」 \nB「本当だよ。最終日の（今日こそ）（何も）（*起きません）（ように）。」", "vn": "A: Hôm kia thì mưa to, hôm qua xe lại bị nổ lốp. Từ khi đi du lịch toàn gặp sự cố liên tục, chán thật đấy. B: Đúng vậy đó. Mong rằng hôm nay, ngày cuối cùng, sẽ không có chuyện gì xảy ra nữa.", "order": "2-1-4-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2020", "stt": 4, "q": "2025年には介護を必要とする高齢者が著しく増加することから、多くの専門家が「介護施設員の給与を引き上げる（　　）（　　）（　*　）（　　）」と指摘する。", "options": ["などして", "緊急の課題", "人材を確保することが", "介護に携わる"], "correct": "人材を確保することが", "full": "2025年には介護を必要とする高齢者が著しく増加することから、多くの専門家が「介護施設員の給与を引き上げる（などして）（介護に携わる）（*人材を確保することが）（緊急の課題）」と指摘する。", "vn": "Do số lượng người cao tuổi cần được chăm sóc sẽ tăng mạnh vào năm 2025, nên nhiều chuyên gia chỉ ra rằng “việc thực hiện các biện pháp như tăng lương cho nhân viên cơ sở chăm sóc để đảm bảo nguồn nhân lực tham gia vào công tác điều dưỡng là một vấn đề cấp bách.”", "order": "1-4-3-2", "grammar": "とか"}, {"period": "12-2020", "stt": 5, "q": "川北市出身の画家平一明の（　　）（　　）（　*　）（　　）、先週20日に完成した。", "options": ["建設を進めていた", "川北市が", "記念美術館が", "業績を後世に伝えようと"], "correct": "建設を進めていた", "full": "川北市出身の画家平一明の（業績を後世に伝えようと）（川北市が）（*建設を進めていた）（記念美術館が）、先週20日に完成した。", "vn": "Bảo tàng mỹ thuật tưởng niệm do thành phố Kawakita xúc tiến xây dựng với mục đích truyền lại cho hậu thế những thành tựu của họa sĩ Hiraichi Akira, người xuất thân từ thành phố này đã được hoàn thành vào ngày 20 tuần trước.", "order": "4-2-1-3", "grammar": "ようと"}, {"period": "07-2021", "stt": 1, "q": "そんな簡単なこと、わざわざあなたに（　　）（　　）（　*　）（　　）。", "options": ["もらう", "ない", "説明して", "までも"], "correct": "までも", "full": "そんな簡単なこと、わざわざあなたに（説明して）（もらう）（*までも）（ない）。", "vn": "Chuyện đơn giản như thế thì chẳng cần phải phiền bạn giải thích cho tôi đâu.", "order": "3-1-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2021", "stt": 2, "q": "ちょっと考えれば、さっきの話が冗談（　　）（　　）（　*　）（　　）、単純な彼は簡単に信じてしまった。", "options": ["わかるだろう", "だって", "に", "ことくらい"], "correct": "わかるだろう", "full": "ちょっと考えれば、さっきの話が冗談（だって）（ことくらい）（*わかるだろう）（に）、単純な彼は簡単に信じてしまった。", "vn": "Chỉ cần nghĩ một chút thôi thì cũng phải hiểu được rằng câu chuyện vừa rồi chỉ là một trò đùa, thế mà anh chàng ngây thơ ấy lại tin ngay lập tức.", "order": "2-4-1-3", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2021", "stt": 3, "q": "彼はとても優秀で成績が学年の上位に入っている（　　）（　　）（　*　）（　　）真面目で好感が持てる。", "options": ["授業に取り組む", "のみならず", "姿勢そのものも", "ことが多い"], "correct": "授業に取り組む", "full": "彼はとても優秀で成績が学年の上位に入っている（ことが多い）（のみならず）（*授業に取り組む）（姿勢そのものも）真面目で好感が持てる。", "vn": "Cậu ấy rất xuất だったら", "何度でも気持ちを伝えたら", "一度断られたぐらいで", "あきらめたりしないで"], "correct": "あきらめたりしないで", "full": "あの人のことが好きで（忘れられないんだったら）（一度断られたぐらいで）（*あきらめたりしないで）（何度でも気持ちを伝えたら）いいと思う。", "vn": "Nếu thật sự thích người đó và không thể quên được, thì đừng từ bỏ chỉ vì bị từ chối một lần, hãy bày tỏ tình cảm của mình bao nhiêu lần cũng được tôi nghĩ như vậy.", "order": "1-3-4-2", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2021", "stt": 4, "q": "他人のことは（　　）（　　）（　*　）（　　）人間というものだ。", "options": ["自分のこととなると", "そう簡単にはいかず", "感情的になってしまうのが", "冷静に見られるのに"], "correct": "そう簡単にはいかず", "full": "他人のことは（冷静に見られるのに）（自分のこととなると）（*そう簡単にはいかず）（感情的になってしまうのが）人間というものだ。", "vn": "Chuyện của người khác thì có thể bình tĩnh mà nhìn nhận, nhưng hễ đụng đến chuyện của bản thân thì đâu có dễ như vậy, rồi lại trở nên cảm tính — đó chính là bản tính con người.", "order": "4-1-2-3", "grammar": "というもの"}, {"period": "12-2021", "stt": 5, "q": "介護の現場における（　　）（　　）（　*　）（　　）そのうち必ず限界が来る。介護ロボットの普及が期待される。", "options": ["このまま", "人の手のみに頼っていては", "人手不足が深刻している", "中で"], "correct": "このまま", "full": "介護の現場における（人手不足が深刻している）（中で）（*このまま）（人の手のみに頼っていては）そのうち必ず限界が来る。介護ロボットの普及が期待される。", "vn": "Trong tình trạng thiếu nhân lực nghiêm trọng tại các cơ sở chăm sóc, nếu cứ tiếp tục chỉ dựa vào sức người như hiện nay thì chắc chắn sẽ đến lúc gặp giới hạn. Việc phổ biến robot chăm sóc đang được kỳ vọng.", "order": "3-4-1-2", "grammar": "における"}, {"period": "07-2022", "stt": 1, "q": "インタビューで\n私が30年間歌手を続けてこられたのは、ファンの方の支えがあったからです。（　　）（　　）（　*　）（　　）歌い続けたいと思っています。", "options": ["限り", "ファンの皆さんが", "応援してくれる", "いる"], "correct": "いる", "full": "インタビューで私が30年間歌手を続けてこられたのは、ファンの方の支えがあったからです。（応援してくれる）（ファンの皆さんが）（*いる）（限り）歌い続けたいと思っています。", "vn": "Chừng nào vẫn còn những người hâm mộ ủng hộ tôi, tôi vẫn muốn tiếp tục ca hát.", "order": "3-2-4-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "07-2022", "stt": 2, "q": "S市が18歳以上の（　　）（　　）（　*　）（　　）運動不足を感じていることがわかった。", "options": ["意識調査を行ったところ、", "市民を対象に", "多くの人が", "運動に関する"], "correct": "意識調査を行ったところ、", "full": "S市が18歳以上の（ ": "秋の初めてのこの時期は、真夏の戻った（かのような）（*日もあれば）（ひんやりとした）（日もあり）、気温の差が大きくて体調を崩しやすいので、注意が必要だ。", "vn": "Vào thời điểm đầu thu này, có những ngày như thể mùa hè đã quay trở lại, cũng có những ngày se lạnh, do sự chênh lệch nhiệt độ lớn nên dễ bị ảnh hưởng đến sức khỏe, cần phải chú ý.", "order": "4-2-3-1", "grammar": "Khác (cấu trúc riêng theo câu)"}, {"period": "12-2022", "stt": 2, "q": "歴史的価値が高いとされる旧白本小学校の校舎を始めて見たが、とても（　　）（　　）（　*　）（　　）驚いた。", "options": ["100年前に", "現代的なデザインに", "建てられたものとは", "思えないほどの"], "correct": "思えないほどの", "full": "歴史的価値が高いとされる旧白本小学校の校舎を始めて見たが、とても（100年前に）（建てられたものとは）（*思えないほどの）（現代的なデザインに）驚いた。", "vn": "Tôi lần đầu tiên nhìn thấy tòa nhà của trường tiểu học cũ Shiramoto, được cho là có giá trị lịch sử cao, và đã ngạc nhiên vì thiết kế hiện đại đến mức không thể tin rằng nó được xây dựng cách đây 100 năm.", "order": "1-3-4-2", "grammar": "ものとは"}, {"period": "12-2022", "stt": 3, "q": "くしゃみや鼻水といった症状が現れる花粉症は、風邪と（　　）（　　）（　*　）（　　）ケースもあるそうだ。", "options": ["自覚がない", "自分は花粉症だという", "症状が似ている", "こともあって"], "correct": "自分は花粉症だという", "full": "くしゃみや鼻水といった症状が現れる花粉症は、風邪と（症状が似ている）（こともあって）（*自分は花粉症だという）（自覚がない）ケースもあるそうだ。", "vn": "Bệnh dị ứng phấn hoa, với các triệu chứng như hắt hơi và chảy nước mũi, do có triệu chứng giống cảm lạnh nên có vẻ cũng có những trường hợp người bệnh không tự nhận ra mình bị dị ứng phấn hoa.", "order": "3-4-2-1", "grammar": "こともあって"}, {"period": "12-2022", "stt": 4, "q": "高校卒業後の進路について両親に反対されたが、誰に何と（　　）（　　）（　*　）（　　）思う。", "options": ["思える道を", "信じて進みたいと", "言われようとも", "自分がこれだと"], "correct": "思える道を", "full": "高校卒業後の進路について両親に反対されたが、誰に何と（言われようとも）（自分がこれだと）（*思える道を）（信じて進みたいと）思う。", "vn": "Tôi đã bị bố mẹ phản đối về con đường sau khi tốt nghiệp cấp ba, nhưng dù có bị ai nói gì đi nữa, tôi vẫn muốn tin tưởng và bước đi trên con đường mà mình cảm thấy đúng đắn.", "order": "3-4-1-2", "grammar": "ようと"}, {"period": "12-2022", "stt": 5, "q": "企業の海外進出が成功するかどうかは、（　　）（　　）（　*　）（　　）といってもいいだろう。", "options": ["優秀な人材を確保できる", "にかかっている", "か否か", "その国の事情をよく知る"], "correct": "か否か", "full": "企業の let DATA = ALL_DATA;

let current = 0;
let answers = new Array(DATA.length).fill(null); // store selected option text
let score = 0;

// populate period filter dropdown, preserving order of first appearance
const periodFilterEl = document.getElementById('periodFilter');
const seenPeriods = [];
ALL_DATA.forEach(d => { if(!seenPeriods.includes(d.period)) seenPeriods.push(d.period); });
seenPeriods.forEach(p => {
  const opt = document.createElement('option');
  opt.value = p;
  opt.textContent = "Kỳ " + p;
  periodFilterEl.appendChild(opt);
});
periodFilterEl.onchange = applyFilters;

// populate grammar filter dropdown
const grammarFilterEl = document.getElementById('grammarFilter');
const seenGrammar = [];
ALL_DATA.forEach(d => { if(!seenGrammar.includes(d.grammar)) seenGrammar.push(d.grammar); });
seenGrammar.sort((a,b)=> a.startsWith('Khác') ? 1 : (b.startsWith('Khác') ? -1 : 0));
seenGrammar.forEach(g => {
  const opt = document.createElement('option');
  opt.value = g;
  const cnt = ALL_DATA.filter(d => d.grammar === g).length;
  opt.textContent = g + " (" + cnt + ")";
  grammarFilterEl.appendChild(opt);
});
grammarFilterEl.onchange = applyFilters;

function applyFilters(){
  const pv = periodFilterEl.value;
  const gv = grammarFilterEl.value;
  DATA = ALL_DATA.filter(d => (pv==='all' || d.period===pv) && (gv==='all' || d.grammar===gv));
  if(DATA.length === 0) DATA = ALL_DATA; // fallback safety
  current = 0;
  score = 0;
  answers = new Array(DATA.length).fill(null);
  quizScreenShow();
  renderQuestion(0);
}

function quizScreenShow(){
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('finishScreen').style.display = 'none';
  nextBtn.textContent = "Câu tiếp →";
}

// generate generic step-by-step explanation based on order + options
function buildExplanation(item){
  const optList = item.options;
  const orderNums = item.order.split('-').map(n => parseInt(n,10));
  const arranged = orderNums.map(n => optList[n-1]);
  const starPos = arranged.indexOf(item.correct) + 1;

  const first = arranged[0];
  const last = arranged[3];
  const mid1 = arranged[1];
  const mid2 = arranged[2];

  let html = '';
  html += '<div class="step"><b>1. Mảnh đầu câu (vị trí 1):</b> "' + first + '" — khớp với phần câu ngay trước chỗ trống.</div>';
  html += '<div class="step"><b>2. Mảnh cuối câu (vị trí 4):</b> "' + last + '" — khớp với phần câu ngay sau chỗ trống.</div>';
  html += '<div class="step"><b>3. Hai mảnh giữa (2-3):</b> "' + mid1 + '" rồi "' + mid2 + '" — ghép theo cấu trúc ngữ pháp/ý nghĩa nối tiếp giữa 2 mảnh này.</div>';
  html += '<div class="step"><b>4. Vị trí ★ (số ' + starPos + '):</b> = <span class="mark">' + item.correct + '</span></div>';
  return html;
}

const nextBtn = document.getElementById('nextBtn');
const quizScreen = document.getElementById('quizScreen');
const finishScreen = document.getElementById('finishScreen');

function renderQuestion(i){
  const item = DATA[i];
  periodEl.textContent = "Kỳ " + item.period + " · Câu " + item.stt;
  questionTextEl.innerHTML = item.q.replace(/＊/g, '<span class="star">★</span>');
  counterEl.textContent = "Câu " + (i+1) + " / " + DATA.length;
  liveScoreEl.textContent = "Đúng: " + score;
  progressBar.style.width = ((i)/DATA.length*100) + "%";

  optionsBox.innerHTML = "";
  item.options.forEach(opt => {
    const div = document.createElement('div');
    div.className = "opt";
    div.textContent = opt;
    div.onclick = () => selectOption(i, opt, div);
    optionsBox.appendChild(div);
  });

  feedbackEl.classList.remove('show');
  feedbackEl.innerHTML = "";
  nextBtn.disabled = true;
  prevBtn.disabled = (i === 0);

  // if already answered, restore state
  if(answers[i] !== null){
    Array.from(optionsBox.children).forEach(div => {
      div.classList.add('disabled');
      if(div.textContent === item.correct) div.classList.add('correct');
      else if(div.textContent === answers[i]) div.classList.add('incorrect');
    });
    showFeedback(item);
    nextBtn.disabled = false;
  }
}

function selectOption(i, opt, el){
  if(answers[i] !== null) return; // already answered
  const item = DATA[i];
  answers[i] = opt;
  const isCorrect = (opt === item.correct);
  if(isCorrect) score++;

  Array.from(optionsBox.children).forEach(div => {
    div.classList.add('disabled');
    if(div.textContent === item.correct) div.classList.add('correct');
    else if(div === el && !isCorrect) div.classList.add('incorrect');
  });

  liveScoreEl.textContent = "Đúng: " + score;
  showFeedback(item);
  nextBtn.disabled = false;
}

function speakJapanese(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  // strip star marks and parentheses markers for cleaner reading
  const clean = text.replace(/★/g,'').replace(/\*/g,'').replace(/[（）]/g,'');
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'ja-JP';
  utter.rate = 0.9;
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang && v.lang.startsWith('ja'));
  if(jaVoice) utter.voice = jaVoice;
  window.speechSynthesis.speak(utter);
}

function showFeedback(item){
  const fullHtml = item.full.replace(/\*([^）]+)/g, '<span class="mark">★$1</span>');
  const cleanForSpeech = item.full.replace(/\*/g,'');
  feedbackEl.innerHTML =
    '<div class="order">Thứ tự đúng: ' + item.order + '</div>' +
    '<div class="grammarTag">📌 Mẫu: <b>' + item.grammar + '</b>' + (item.grammar_meaning ? ' — ' + item.grammar_meaning : '') + '</div>' +
    '<div class="fullRow"><div class="full">' + fullHtml + '</div>' +
    '<button class="speakBtn" id="speakBtn" title="Đọc câu này">🔊</button></div>' +
    '<div class="vn">' + (item.vn || '') + '</div>' +
    '<div class="explain">' + buildExplanation(item) + '</div>';
  feedbackEl.classList.add('show');
  document.getElementById('speakBtn').onclick = () => speakJapanese(cleanForSpeech);
}

prevBtn.onclick = () => {
  if(current > 0){ current--; renderQuestion(current); }
};
nextBtn.onclick = () => {
  if(current < DATA.length - 1){
    current++;
    renderQuestion(current);
  } else {
    finishQuiz();
  }
  if(current === DATA.length -1){
    nextBtn.textContent = "Hoàn thành ✓";
  }
};

function finishQuiz(){
  quizScreen.style.display = "none";
  finishScreen.style.display = "block";
  document.getElementById('scoreBig').textContent = score + " / " + DATA.length;
  const pct = Math.round(score/DATA.length*100);
  document.getElementById('scoreDetail').textContent = pct + "% chính xác";
}

document.getElementById('restartBtn').onclick = () => {
  current = 0;
  score = 0;
  answers = new Array(DATA.length).fill(null);
  quizScreen.style.display = "block";
  finishScreen.style.display = "none";
  nextBtn.textContent = "Câu tiếp →";
  renderQuestion(0);
};

renderQuestion(0);
</script>
