<script src="data.js?v=20260722a"></script>
<script>

const PERIODS=[
  {id:"2010-2012",label:"2010-2012",years:["07-2010","12-2010","07-2011","12-2011","07-2012","12-2012"]},
  {id:"2013-2015",label:"2013-2015",years:["07-2013","12-2013","07-2014","12-2014","07-2015","12-2015"]},
  {id:"2016-2018",label:"2016-2018",years:["07-2016","12-2016","07-2017","07-2018","12-2018"]},
  {id:"2019-2022",label:"2019-2022",years:["07-2019","12-2019","12-2020","07-2021","12-2021","07-2022","12-2022"]},
  {id:"2023-2024",label:"2023-2024",years:["07-2023","12-2023","07-2024","12-2024"]},
  {id:"2025",label:"2025",years:["07-2025","12-2025"]},
];
const YL={};
PERIODS.forEach(p=>p.years.forEach(y=>{
  const [m,yr]=y.split('-');
  YL[y]=(m==='07'?'7/':'12/')+yr;
}));
const Q_MAP={};
QUESTIONS.forEach(q=>Q_MAP[q.id]=q);

let tab='practice',period='2013-2015',year='07-2013';
let pidx=0,psel=null,pscore={ok:0,bad:0},pdone=false;
let sopen={};
// Wrong answers: stored as Set of question IDs
let wrongIds=new Set(JSON.parse(localStorage.getItem('jlpt_wrong')||'[]'));
// Wrong review mode
let wridx=0,wrsel=null,wrscore={ok:0,bad:0},wrdone=false;
let wrList=[];

function saveWrong(){
  try{localStorage.setItem('jlpt_wrong',JSON.stringify([...wrongIds]));}catch(e){}
}
function updateWrongBadge(){
  const cnt=wrongIds.size;
  const el=document.getElementById('wrong-cnt');
  el.textContent=cnt;
  el.classList.toggle('is-hidden',cnt===0);
}

// ── TTS ────────────────────────────────────────────────────────────────────
let jpVoice=null, synthReady=false, speakQueue=[];

function initVoices(){
  const voices=speechSynthesis.getVoices();
  // Ưu tiên giọng Nhật
  jpVoice=voices.find(v=>v.lang==='ja-JP'&&v.localService)||
          voices.find(v=>v.lang==='ja-JP')||
          voices.find(v=>v.lang.startsWith('ja'))||null;
  synthReady=true;
}
if(typeof speechSynthesis!=='undefined'){
  speechSynthesis.onvoiceschanged=initVoices;
  initVoices();
}

function stopSpeak(){
  speechSynthesis.cancel();
  document.querySelectorAll('.speak-btn.speaking,.speak-opt-btn.speaking').forEach(b=>{
    b.classList.remove('speaking');
    if(b.dataset.orig) b.innerHTML=b.dataset.orig;
  });
}

function speak(text,btnEl){
  if(!text) return;
  stopSpeak();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';
  if(jpVoice) u.voice=jpVoice;
  // Get speed from selector
  const sel=document.getElementById('tts-speed');
  u.rate=sel?parseFloat(sel.value):0.85;
  u.pitch=1;
  if(btnEl){
    btnEl.dataset.orig=btnEl.innerHTML;
    btnEl.innerHTML='⏸';
    btnEl.classList.add('speaking');
    const resetSpeakButton=()=>{btnEl.classList.remove('speaking');btnEl.innerHTML=btnEl.dataset.orig||'🔊';};
    u.addEventListener('end',resetSpeakButton);
    u.addEventListener('error',resetSpeakButton);
  }
  speechSynthesis.speak(u);
}

// Đọc toàn bộ câu hỏi (câu JP không có đáp án) + 4 lựa chọn
function speakQuestion(q,btnEl){
  const blank=q.jp.replace(/【([^】]+)】/g,'＿＿');
  const opts=q.options.map(o=>o[0]+'　'+o.slice(3)).join('　。　');
  speak(blank+'　　'+opts, btnEl);
}

// Đọc chỉ câu hỏi (có đáp án điền vào)
function speakFull(q,btnEl){
  speak(q.jp.replace(/【([^】]+)】/g,'$1'), btnEl);
}

function ttsBar(){
  return`<div class="tts-bar">
    <span class="tts-label">🔊 Tốc độ:</span>
    <select class="tts-speed" id="tts-speed">
      <option value="0.6">Chậm</option>
      <option value="0.85" selected>Bình thường</option>
      <option value="1.1">Nhanh</option>
      <option value="1.35">Rất nhanh</option>
    </select>
  </div>`;
}

function speakBtnHTML(q){
  return`<div class="speak-actions">
    <button type="button" class="speak-btn" data-action="speak-question" data-question-id="${q.id}" title="Đọc câu hỏi + 4 lựa chọn">🔊 Đọc câu hỏi + lựa chọn</button>
    <button type="button" class="speak-btn" data-action="speak-full" data-question-id="${q.id}" title="Đọc câu đầy đủ có đáp án">🔊 Đọc câu đầy đủ</button>
    <button type="button" class="speak-btn speak-stop" data-action="stop-speak">⏹ Dừng</button>
  </div>`;
}

// Đọc từng lựa chọn riêng (gắn vào từng nút option)
function speakOpt(text,btn){speak(text,btn);}


function periodYears(){return PERIODS.find(p=>p.id===period).years;}
function filtered(){return QUESTIONS.filter(q=>q.year===year);}
function correctLetter(q){return['a','b','c','d'].find(l=>q.options.some(o=>o.startsWith(l+'.')&&o.slice(3).trim()===q.answer));}

function jpHTML(text,blank){
  const t=blank?text.replace(/【([^】]+)】/g,'（　　）'):text.replace(/【([^】]+)】/g,'<span class="mark">$1</span>');
  return`<span class="jp">${t}</span>`;
}
function kwHTML(id){
  const e=EXP[id];if(!e||!e.kw)return'';
  return`<div class="kw-box"><div class="kw-title">🔑 Từ khóa loại đáp án nhanh</div><div class="kw-hint">「${e.kw}」→ ${e.kw_hint}</div><div class="kw-loai">✂️ ${e.kw_loai}</div></div>`;
}
function expHTML(id){
  const e=EXP[id];if(!e)return'';
  const sLines=e.s.split('\n').map(l=>`<span class="exp-line">${l}</span>`).join('');
  let traps='';
  if(e.traps&&e.traps.length){
    const rows=e.traps.map(t=>`<div class="trap-row"><span class="trap-w">・${t.w}</span> ${t.e}</div>`).join('');
    traps=`<div class="traps-box"><div class="traps-title">⚠️ Phân biệt đáp án sai:</div>${rows}</div>`;
  }
  return`<div class="exp"><div class="exp-s"><span class="exp-lbl-s">📌 </span>${sLines}</div><div class="exp-r"><span class="exp-lbl-r">💡 </span>${e.r}</div>${traps}</div>`;
}

function setTab(t){
  tab=t;
  ['practice','study','wrong'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('on',x===t);
  });
  const needBars=t==='practice'||t==='study';
  document.getElementById('pbar').style.display=needBars?'':'none';
  document.getElementById('ybar').style.display=needBars?'':'none';
  if(t==='wrong'){
    wrList=[...wrongIds].map(id=>Q_MAP[id]).filter(Boolean);
    wridx=0;wrsel=null;wrscore={ok:0,bad:0};wrdone=false;
  }
  render();
}
function setPeriod(p){
  period=p;year=PERIODS.find(x=>x.id===p).years[0];
  pidx=0;psel=null;pdone=false;sopen={};
  renderBars();render();
}
function setYear(y){
  year=y;pidx=0;psel=null;pdone=false;sopen={};
  renderBars();render();
}
function renderBars(){
  document.getElementById('pbar').innerHTML=
    PERIODS.map(p=>`<button type="button" class="pbtn ${p.id===period?'on':''}" data-period="${p.id}">${p.label}</button>`).join('')+
    `<span class="cnt-info">${filtered().length} câu</span>`;
  document.getElementById('ybar').innerHTML=
    periodYears().map(y2=>`<button type="button" class="ybtn ${y2===year?'on':''}" data-year="${y2}">${YL[y2]}</button>`).join('');
}

// ── PRACTICE ──────────────────────────────────────────────────────────────────
function pick(letter){
  if(psel)return;psel=letter;
  const q=filtered()[pidx];
  const cl=correctLetter(q);
  if(letter===cl){pscore.ok++;}
  else{pscore.bad++;wrongIds.add(q.id);saveWrong();}
  updateWrongBadge();render();
}
function next(){
  const qs=filtered();
  if(pidx+1>=qs.length){pdone=true;}else{pidx++;psel=null;}
  render();
}
function prev(){
  if(pidx>0){pidx--;psel=null;render();}
}
function goToStart(){pidx=0;psel=null;render();}
function restart(){pidx=0;psel=null;pscore={ok:0,bad:0};pdone=false;render();}
function startWrongMode(){setTab('wrong');}

function renderAfter(q,ok){
  return`<div class="result ${ok?'ok':'ng'}">
    <div class="res-lbl ${ok?'ok':'ng'}">${ok?'✓ Chính xác!':'✗ Sai! Đáp án: '+q.answer}</div>
    <div class="res-vn jp">${q.vn}</div>
  </div>
  ${kwHTML(q.id)}
  ${expHTML(q.id)}`;
}

function renderCard(q,sel,cl,isWrongMode){
  const opts=q.options.map(opt=>{
    const l=opt[0],txt=opt.slice(3);
    let cls='opt',ico=l.toUpperCase();
    if(sel){if(l===cl){cls='opt correct';ico='✓';}else if(l===sel){cls='opt wrong';ico='✗';}}
    return`<button type="button" class="${cls}" data-action="answer" data-letter="${l}" data-review="${isWrongMode?'true':'false'}"><span class="opt-num">${ico}</span><span class="jp">${txt}</span></button>`;
  }).join('');
  const wrongTag=isWrongMode?'<span class="tag-wrong">✗ Câu sai</span>':'';
  return`<div class="card ${isWrongMode?'wrong-mode':''}">
    <div class="tags">
      <span class="tag-num">Câu ${q.num}</span>
      ${wrongTag}
      <span class="tag-yr">${YL[q.year]}</span>
      <span class="tag-prog">${isWrongMode?wridx+1+'/'+wrList.length:pidx+1+'/'+filtered().length}</span>
    </div>
    <div class="jp-s">${jpHTML(q.jp,!sel)}</div>
    <div class="opts">${opts}</div>
  </div>`;
}

function renderPractice(){
  const qs=filtered();
  if(pdone){
    const hasWrong=wrongIds.size>0;
    return`<div class="done">
      <div class="done-icon">🎉</div>
      <h2 class="done-title">Hoàn thành!</h2>
      <p class="done-meta">${qs.length} câu · ${YL[year]}</p>
      <div class="scores">
        <div class="score-ok"><div class="snum-ok">${pscore.ok}</div><div class="slbl-ok">Đúng ✓</div></div>
        <div class="score-ng"><div class="snum-ng">${pscore.bad}</div><div class="slbl-ng">Sai ✗</div></div>
      </div>
      <div>
        <button type="button" class="restart-btn" data-action="restart">Làm lại</button>
        ${hasWrong?`<button type="button" class="review-btn" data-action="start-review">✗ Ôn ${wrongIds.size} câu sai</button>`:''}
      </div>
    </div>`;
  }
  const q=qs[pidx];
  const cl=correctLetter(q);
  const pct=Math.round((pidx/qs.length)*100);
  let after='';
  if(psel){
    const ok=psel===cl;
    const prevBtn=pidx>0?`<button type="button" class="prev-btn" data-action="previous">← Câu trước</button>`:'';
    after=renderAfter(q,ok)+`<div class="btn-row">${prevBtn}<button type="button" class="next-btn" data-action="next">Câu tiếp →</button></div>`;
  }
  const backBtn=pidx>0?`<button type="button" class="back-top-btn" data-action="first">⤴ Về câu 1</button>`:'';
  return`<div class="prog-info"><span>${pidx+1} / ${qs.length} ${backBtn}</span><span class="score-summary">✓ ${pscore.ok} &nbsp;<span>✗ ${pscore.bad}</span></span></div>
  <div class="prog-bar"><div class="prog-fill" data-progress="${pct}"></div></div>
  ${ttsBar()}
  ${speakBtnHTML(q)}
  ${renderCard(q,psel,cl,false)}
  ${after}`;
}

// ── STUDY ─────────────────────────────────────────────────────────────────────
function toggleStudy(id){sopen[id]=!sopen[id];render();}
function renderStudy(){
  return filtered().map(q=>{
    const opts=q.options.map(o=>`<span class="sopt ${o.slice(3).trim()===q.answer?'sopt-ans':'sopt-no'} jp">${o}</span>`).join('');
    const isOpen=!!sopen[q.id];
    const isWrong=wrongIds.has(q.id);
    return`<div class="study-card ${isWrong?'is-wrong':''}">
      <div class="study-body">
        <div class="tags tags-compact">
          <span class="tag-num">Câu ${q.num}</span>
          ${isWrong?'<span class="tag-wrong">✗ Đã sai</span>':''}
          <span class="tag-yr">${YL[q.year]}</span>
        </div>
        <div class="study-jp jp">${jpHTML(q.jp,false)}</div>
        <div class="study-vn">${q.vn}</div>
        <div class="study-opts">${opts}</div>
        <button type="button" class="toggle-btn" data-action="toggle-study" data-question-id="${q.id}">${isOpen?'▲ Ẩn':'▼ Giải thích'}</button>
      </div>
      ${isOpen?`<div class="study-exp">${kwHTML(q.id)}${expHTML(q.id)}</div>`:''}
    </div>`;
  }).join('');
}

// ── WRONG REVIEW ──────────────────────────────────────────────────────────────
function wrpick(letter){
  if(wrsel)return;wrsel=letter;
  const q=wrList[wridx];
  const cl=correctLetter(q);
  if(letter===cl){wrscore.ok++;wrongIds.delete(q.id);saveWrong();}
  else{wrscore.bad++;}
  updateWrongBadge();render();
}
function wrnext(){
  if(wridx+1>=wrList.length){wrdone=true;}
  else{wridx++;wrsel=null;}
  render();
}
function wrprev(){
  if(wridx>0){wridx--;wrsel=null;render();}
}
function wrGoToStart(){wridx=0;wrsel=null;render();}
function wrrestart(){
  wrList=[...wrongIds].map(id=>Q_MAP[id]).filter(Boolean);
  wridx=0;wrsel=null;wrscore={ok:0,bad:0};wrdone=false;render();
}
function clearWrong(){wrongIds.clear();saveWrong();updateWrongBadge();wrrestart();}

function renderWrong(){
  if(wrongIds.size===0&&!wrdone){
    return`<div class="wrong-empty">
      <div class="empty-icon">🎯</div>
      <h3 class="empty-title">Chưa có câu sai!</h3>
      <p class="empty-copy">Làm luyện thi để tích lũy câu sai vào đây.</p>
    </div>`;
  }
  if(wrdone||wrList.length===0){
    return`<div class="done">
      <div class="done-icon">${wrscore.bad===0?'🏆':'📚'}</div>
      <h2 class="done-title">${wrscore.bad===0?'Xuất sắc!':'Ôn tập xong!'}</h2>
      <p class="done-meta">Đã ôn ${wrList.length} câu sai</p>
      <div class="scores">
        <div class="score-ok"><div class="snum-ok">${wrscore.ok}</div><div class="slbl-ok">Đúng ✓</div></div>
        <div class="score-ng"><div class="snum-ng">${wrscore.bad}</div><div class="slbl-ng">Vẫn sai ✗</div></div>
      </div>
      <div>
        ${wrongIds.size>0?`<button type="button" class="review-btn" data-action="review-restart">Ôn lại ${wrongIds.size} câu còn sai</button>`:''}
        <button type="button" class="restart-btn" data-tab="practice">Về luyện thi</button>
      </div>
      ${wrscore.bad===0?'<p class="review-cleared">🎉 Đã xóa hết câu sai!</p>':''}
    </div>`;
  }

  const q=wrList[wridx];
  const cl=correctLetter(q);
  const pct=Math.round((wridx/wrList.length)*100);
  let after='';
  if(wrsel){
    const ok=wrsel===cl;
    after=renderAfter(q,ok);
    if(ok) after+=`<p class="review-removed">✓ Đã xóa khỏi danh sách câu sai!</p>`;
    const prevBtn=wridx>0?`<button type="button" class="prev-btn" data-action="review-previous">← Câu trước</button>`:'';
    after+=`<div class="btn-row">${prevBtn}<button type="button" class="next-btn" data-action="review-next">Câu tiếp →</button></div>`;
  }
  const backBtn=wridx>0?`<button type="button" class="back-top-btn" data-action="review-first">⤴ Về câu 1</button>`:'';
  return`<div class="wrong-header">
    <span class="wrong-header-txt">✗ Ôn sai — còn ${wrongIds.size} câu</span>
    <button type="button" class="clear-btn" data-action="clear-wrong">Xóa tất cả</button>
  </div>
  <div class="prog-info"><span>${wridx+1} / ${wrList.length} ${backBtn}</span><span class="score-summary">✓ ${wrscore.ok} &nbsp;<span>✗ ${wrscore.bad}</span></span></div>
  <div class="prog-bar"><div class="prog-fill red" data-progress="${pct}"></div></div>
  ${ttsBar()}
  ${speakBtnHTML(q)}
  ${renderCard(q,wrsel,cl,true)}
  ${after}`;
}

function handleAction(control){
  if(control.dataset.tab){setTab(control.dataset.tab);return;}
  if(control.dataset.period){setPeriod(control.dataset.period);return;}
  if(control.dataset.year){setYear(control.dataset.year);return;}
  const action=control.dataset.action;
  const question=control.dataset.questionId?Q_MAP[control.dataset.questionId]:null;
  if(action==='speak-question'&&question){speakQuestion(question,control);return;}
  if(action==='speak-full'&&question){speakFull(question,control);return;}
  if(action==='stop-speak'){stopSpeak();return;}
  if(action==='answer'){control.dataset.review==='true'?wrpick(control.dataset.letter):pick(control.dataset.letter);return;}
  if(action==='restart'){restart();return;}
  if(action==='start-review'){startWrongMode();return;}
  if(action==='previous'){prev();return;}
  if(action==='next'){next();return;}
  if(action==='first'){goToStart();return;}
  if(action==='toggle-study'){toggleStudy(control.dataset.questionId);return;}
  if(action==='review-restart'){wrrestart();return;}
  if(action==='review-previous'){wrprev();return;}
  if(action==='review-next'){wrnext();return;}
  if(action==='review-first'){wrGoToStart();return;}
  if(action==='clear-wrong'&&confirm('Xóa tất cả câu sai?'))clearWrong();
}

document.addEventListener('click',event=>{
  const control=event.target.closest('[data-tab],[data-period],[data-year],[data-action]');
  if(control)handleAction(control);
});

function render(){
  document.getElementById('cnt').innerHTML=
    tab==='practice'?renderPractice():
    tab==='study'?renderStudy():
    renderWrong();
  document.querySelectorAll('[data-progress]').forEach(el=>{el.style.width=`${el.dataset.progress}%`;});
}

updateWrongBadge();
renderBars();
render();
</script>
