m được đi nữa thì Y (nhượng bộ mức nhẹ, nhưng mức nặng thì không)","r":"「目がかゆくなるくらいはいいとしても、ひどい場合は痛くて目が開けない」= ngứa mắt thì còn tạm được, nhưng đau đến không mở mắt được thì không.","traps":[{"w":"までにならないとしても","e":"= dù không đến mức đó thì → phủ định chiều, cấu trúc không tự nhiên"},{"w":"めでにならないとすれば","e":"= không tồn tại (めで sai) → sai ngữ pháp hoàn toàn"},{"w":"くらいでいいとすれば","e":"= nếu coi mức đó là ổn thì → điều kiện giả định, không phải nhượng bộ"}]},"12-2011_40":{"s":"〜がたい → khó có thể, khó lòng (tính từ hóa từ động từ, diễn tả khó khăn tâm lý/thực tế)","r":"「受け入れがたい」= khó lòng chấp nhận. V + がたい = V + にくい (nhưng trang trọng hơn, thường về tâm lý).","traps":[{"w":"受け入れずにすまない","e":"= không thể không chấp nhận → NGƯỢC nghĩa hoàn toàn, buộc phải chấp nhận"},{"w":"受け入れないにかぎる","e":"= tốt nhất là không chấp nhận → khuyến nghị từ chối, không phải khó khăn"},{"w":"受け入れないではないか","e":"= chẳng phải là không chấp nhận sao → phủ định kép mơ hồ, không diễn tả khó khăn"}]},"07-2012_41":{"s":"〜も後半 → đã đi vào nửa sau của X (đánh dấu giai đoạn đang ở)","r":"「40代も後半となり」= đã bước vào nửa sau của độ tuổi 40. も nhấn mạnh tới giai đoạn đó rồi.","traps":[{"w":"を","e":"= tân ngữ → 40代を後半となり không thành nghĩa"},{"w":"へ","e":"= hướng đến → 40代へ後半となり không tự nhiên"},{"w":"まで","e":"= đến tận, cho đến → 40代まで後半となり sai nghĩa và sai cấu trúc"}]},"07-2012_42":{"s":"〜ようによっては → tùy theo cách X mà (kết quả có thể khác nhau tùy cách làm)","r":"「使いようによっては薬になる」= tùy cách dùng mà có thể thành thuốc. ようによっては = tùy theo phương cách.","traps":[{"w":"使うとなると","e":"= khi nói đến việc dùng thì → chuyển sang vấn đề dùng, không phải tùy cách dùng"},{"w":"使おうものなら","e":"= lỡ mà dùng thì... (cảnh báo hậu quả xấu) → hàm ý tiêu cực, không phải tùy cách"},{"w":"使わんばかりに","e":"= như thể sắp dùng (trạng thái) → mô tả dáng vẻ, không phải tùy cách"}]},"07-2012_43":{"s":"見えざる → không nhìn thấy được (文語/văn cổ điển). 見える + ざる (phủ định cổ)","r":"「見えざる敵」= kẻ thù vô hình. ざる là phủ định cổ của động từ, thường dùng trong văn học/tiêu đề phim.","traps":[{"w":"見て","e":"= nhìn (chủ động) → 見てざる vô nghĩa, không phải cấu trúc"},{"w":"見る","e":"= nhìn (thể từ) → 見る敵 = kẻ thù nhìn thấy (nghĩa ngược)"},{"w":"見える","e":"= nhìn thấy được (khẳng định) → NGƯỢC nghĩa hoàn toàn, cần phủ định"}]},"07-2012_44":{"s":"まず〜ない → gần như chắc chắn không (phủ định cao, xấp xỉ tuyệt đối)","r":"「まず間違いない」= gần như chắc chắn không sai. まず + phủ định = ほとんど〜ない (mức rất cao).","traps":[{"w":"よく","e":"= thường/tốt → よく間違いない không thành nghĩa tự nhiên"},{"w":"かりに","e":"= giả sử → かりに間違いない vô nghĩa trong ngữ cảnh này"},{"w":"なかなか","e":"= không dễ, không thể không (nhấn mạnh khó khăn) → なかなか〜ない = khó mà không, sắc thái khác"}]},"07-2012_45":{"s":"〜ねがいたい → muốn nhờ, mong muốn (khiêm nhường nhẹ, thường trong dịch vụ)","r":"「ご変更ねがいたい」= mong quý khách chấp nhận thay đổi. ねがいたい = お願いしたい (nhẹ hơn một chút).","traps":[{"w":"なさりたい","e":"= (ông/bà) muốn làm → kính ngữ hành động của khách, sai chủ thể"},{"w":"くださりたい","e":"= không tự nhiên → くださる (kính ngữ của くれる) + たい không dùng như vậy"},{"w":"になりたい","e":"= muốn trở thành → hoàn toàn sai nghĩa"}]},"07-2012_46":{"s":"〜ていってほしいものです → muốn người ta tiếp tục làm X (kỳ vọng/mong mỏi về hành động duy trì)","r":"「これからも続けていってほしいものです」= mong mọi người tiếp tục gìn giữ truyền thống. ものです = cảm xúc mong mỏi.","traps":[{"w":"続けていくものです","e":"= là thứ sẽ tiếp tục → mô tả thực tế tự nhiên, không phải mong mỏi"},{"w":"続けていくことにしましょう","e":"= chúng ta hãy quyết định tiếp tục → quyết định của nhóm mình, không phải mong cầu người khác"},{"w":"続けていくことでしょう","e":"= chắc sẽ tiếp tục (dự đoán) → phỏng đoán khách quan, không phải mong mỏi"}]},"07-2012_47":{"s":"〜かねます → không thể (làm điều người ta yêu cầu), từ chối lịch sự","r":"「返品対応はいたしかねます」= chúng tôi không thể nhận trả hàng. かねます = từ chối nhẹ nhàng, trang trọng.","traps":[{"w":"いたしかねません","e":"= không phải là không thể làm (phủ định kép → khẳng định) → NGƯỢC nghĩa, nghĩa là có thể làm"},{"w":"さしあげかねます","e":"= cấu trúc không tự nhiên → さしあげる + かねる không kết hợp tự nhiên"},{"w":"さしあげかねません","e":"= vừa sai cấu trúc vừa phủ định kép → hoàn toàn sai"}]},"07-2012_48":{"s":"〜ようとしたとして → với cáo buộc là đã cố tình làm X (văn bản pháp lý/tin tức)","r":"「不正に現金を引き出そうとしたとして逮捕された」= bị bắt với cáo buộc cố gắng rút tiền trái phép.","traps":[{"w":"引き出したとするとして","e":"= với giả định là đã rút → とするとして = từ giả định, không phải cáo buộc thực tế"},{"w":"引き出したとするのに対して","e":"= trái với giả định là đã rút → đối lập, sai ngữ cảnh"},{"w":"引き出そうとしたのに対して","e":"= trái với việc cố rút → đối lập, không phải cáo buộc"}]},"07-2012_49":{"s":"〜させられる → bị bắt phải (bị động của 使役). Đây là bị động cưỡng bức","r":"「親に無理やり別れさせられそうになる」= bị cha mẹ ép buộc gần như phải chia tay. させられる = bị ép.","traps":[{"w":"別れそうになる","e":"= suýt chia tay (tự nguyện) → そうになる = suýt, không có ép buộc"},{"w":"別れられそうになる","e":"= suýt có thể chia tay → khả năng, không phải bị ép"},{"w":"別れさせそうになる","e":"= suýt bắt (người khác) chia tay → chủ động sai khiến, sai chủ thể"}]},"07-2012_50":{"s":"〜てください → xin hãy nhận/làm (yêu cầu thẳng thắn, thân mật)","r":"「よければどうぞやってください」= nếu muốn thì xin cứ nhận đi. Bạn bè thân mật → dùng trực tiếp.","traps":[{"w":"やりませんか","e":"= anh/chị không muốn làm/nhận không? → rủ rê/đề nghị, hơi khác với xin hãy nhận"},{"w":"いただきませんか","e":"= anh/chị không muốn nhận không? → khách khí hơn, nhưng context này thân mật nên hơi quá lịch sự"},{"w":"いただいてください","e":"= xin hãy nhận (kính ngữ) → いただく là khiêm nhường của mình, không dùng để yêu cầu người khác"}]},"12-2012_51":{"s":"〜にともなって → cùng với X, đi kèm với X (hai sự việc song hành, thường nhân quả)","r":"「経済成長にともなって、エネルギー消費が増加」= cùng với tăng trưởng kinh tế, tiêu thụ năng lượng tăng.","traps":[{"w":"に沿って","e":"= theo, tuân theo X (hướng dẫn/phương châm) → theo nguyên tắc, không phải song hành"},{"w":"に基づき","e":"= dựa trên X (căn cứ) → căn cứ, không phải đồng hành"},{"w":"にこたえて","e":"= đáp ứng X, hồi đáp X (yêu cầu/mong đợi) → phản hồi, không phải song hành"}]},"12-2012_52":{"s":"上がる (謙譲語) → khiêm nhường của 行く/来る khi đến nhà người khác/khách hàng","r":"「お届けに上がりたい」= muốn đến giao hàng. 上がる = đến (chỗ khách), dùng khi dịch vụ đến nơi khách.","traps":[{"w":"差しあげ","e":"= khiêm nhường của あげる (trao tặng) → trao đồ, không phải đến nơi"},{"w":"願い","e":"= xin phép/mong (お願い) → nhờ vả, không phải đến nơi giao hàng"},{"w":"見え","e":"= 見える → khiêm nhường của 来る chỉ dùng cho bề trên/khách hàng ĐẾN NƠI MÌNH. Ở đây mình đến nơi khách nên phải dùng 上がる"}]},"12-2012_53":{"s":"〜も〜だ → X cũng (có vấn đề) của X (phê bình nhẹ nhàng, cả hai đều có lỗi)","r":"「怒った君も君だよ」= mà cậu giận vì chuyện đó cũng là cậu đấy. も〜だ = cũng không vô can gì.","traps":[{"w":"で","e":"= bằng/tại → 怒った君で君だ vô nghĩa"},{"w":"でも","e":"= dù sao/ngay cả → 怒った君でも君だ = dù là cậu giận → sai sắc thái"},{"w":"まで","e":"= đến tận → 怒った君まで君だ vô nghĩa trong ngữ cảnh"}]},"12-2012_54":{"s":"〜べく → nhằm mục đích X, để làm X (văn phong trang trọng, ngữ pháp cổ điển)","r":"「帰るべく業務をこなしていた」= đang xử lý công việc nhằm mục đích về sớm. べく = ために (văn trang trọng).","traps":[{"w":"帰るべし","e":"= phải về! (mệnh lệnh cổ điển) → mệnh lệnh/nghĩa vụ, không phải mục đích"},{"w":"帰るべき","e":"= nên về, phải về (tính từ) → tính từ cần đi kèm danh từ, không đứng một mình"},{"w":"帰るべからず","e":"= không được về (cấm đoán cổ điển) → nghĩa NGƯỢC, cấm không về"}]},"12-2012_55":{"s":"〜だろうと〜だろうと → dù là X hay Y đi nữa (nhượng bộ liệt kê, bất chấp điều kiện)","r":"「雨だろうと雪だろうと毎日自転車で通勤」= dù mưa hay tuyết đều đi xe đạp. Bất chấp thời tiết.","traps":[{"w":"雨とも雪とも","e":"= cả mưa lẫn tuyết → liệt kê, không có sắc thái nhượng bộ bất chấp"},{"w":"雨でもなく雪でもなく","e":"= không phải mưa cũng không phải tuyết → phủ định cả hai, nghĩa ngược"},{"w":"雨というか雪というか","e":"= không biết là mưa hay tuyết (lưỡng lự) → không chắc chắn, không phải bất chấp"}]},"12-2012_56":{"s":"〜のためを思って → nghĩ cho lợi ích của X, vì X mà (vô tư, hành động vì lợi ích người khác)","r":"「子供のためを思って注意する」= nhắc nhở vì nghĩ cho lợi ích của con. のためを思って = hành động vì lợi ích.","traps":[{"w":"に思って","e":"= nghĩ đến/nhớ đến → に思う là hướng suy nghĩ, không phải hành động vì lợi ích"},{"w":"に思っても","e":"= dù có nghĩ đến → nhượng bộ, không phải lý do hành động"},{"w":"を思っても","e":"= dù có nghĩ cho → nhượng bộ, sắc thái 'dù vậy cũng không ích gì'"}]},"12-2012_57":{"s":"〜ものの → tuy nhiên, dù vậy nhưng (nhượng bộ - thừa nhận A nhưng kết quả B trái chiều)\n🔗 Họ ものを/ものか/ものだ/ものの dễ lẫn:\n・ものを → tiếc nuối/bực bội, đi cặp 〜ば...ものを, luôn ở CUỐI câu\n・ものか → đời nào/không thể... được sao (phủ định mạnh hoặc than thở)\n・ものだ → cảm thán/quy luật tự nhiên ('hóa ra là vậy')\n・ものの → tuy...nhưng (nhượng bộ, giữa câu)","r":"「能力は疑いようがないものの、首相になるにはまだ早い」= tuy năng lực không nghi ngờ gì, nhưng còn sớm để làm thủ tướng.","traps":[{"w":"疑いようがないものを","e":"= thế mà (bực bội) năng lực không nghi ngờ gì → ものを = bực bội tiếc nuối, sắc thái hoàn toàn khác"},{"w":"疑わないことはないものを","e":"= thế mà không phải là không nghi ngờ → phủ định kép + ものを = rối rắm sai"},{"w":"疑わないことはないものの","e":"= tuy không phải là không nghi ngờ → thừa nhận có nghi ngờ, NGƯỢC với câu gốc"}]},"12-2012_58":{"s":"〜から言わせてもらえば → nếu cho phép tôi nói từ góc độ của mình thì (nêu quan điểm lịch sự)","r":"「私たち営業の立場から言わせてもらえば」= nếu cho phép tôi nói từ góc độ bộ phận kinh doanh thì.","traps":[{"w":"に言わせていれば","e":"= nếu cứ để tôi nói thì → いれば (điều kiện tồn tại) sai cấu trúc"},{"w":"から言わせてやれば","e":"= nếu cho tôi nói thì → てやる = làm ơn cho ai, sắc thái trịch thượng, không lịch sự"},{"w":"に言わせてあげれば","e":"= nếu cho tôi nói thì → てあげる = làm ơn cho, sắc thái ban phát, không phù hợp"}]},"12-2012_59":{"s":"〜そうになかったら → nếu trông có vẻ không kịp thì (điều kiện dựa trên dự đoán quan sát)","r":"「間に合いそうになかったら、また連絡する」= nếu trông có vẻ không kịp thì sẽ liên lạc lại. そうにない = có vẻ không.","traps":[{"w":"間に合いそうになかったから","e":"= vì trông có vẻ không kịp → から = lý do đã xảy ra, không phải điều kiện tương lai"},{"w":"間に合っていなかったのだから","e":"= vì thực tế đã không kịp → quá khứ xác nhận, không phải điều kiện tương lai"},{"w":"間に合っていなかったのだったら","e":"= nếu thực tế đã không kịp thì → giả định trái thực tế quá khứ, sai thì"}]},"12-2012_60":{"s":"〜といいましょうか → tạm gọi là, nói thế nào nhỉ (diễn đạt cảm giác khó nói, văn nói)","r":"「ほっとするといいましょうか、そんな温かい雰囲気」= tạm gọi là cảm giác ấm lòng, kiểu như vậy.","traps":[{"w":"というでしょうから","e":"= vì người ta nói là... → lý do dựa trên điều người khác nói, không phải tự diễn đạt"},{"w":"といいませんか","e":"= không gọi là... không? → mời đề xuất cách gọi tên, không phải tự diễn đạt lưỡng lự"},{"w":"というでしょうが","e":"= người ta có thể gọi là... nhưng → nhượng bộ điều người khác nói, không phải tự diễn đạt"}]},"07-2016_1":{"s":"果たして〜のだろうか → liệu rốt cuộc... (hỏi kết quả chưa biết, hồi hộp chờ đợi)","r":"「果たしてどちらが勝つのでしょうか」= rốt cuộc bên nào sẽ thắng? Dùng khi kết quả chưa rõ.","traps":[{"w":"ついに","e":"= cuối cùng (kết quả đã xảy ra) → không dùng cho câu hỏi chưa có đáp án"},{"w":"まさか","e":"= không lẽ nào (bác bỏ) → phủ nhận khả năng"},{"w":"どうやら","e":"= hình như (đã có suy đoán) → đã có kết luận, không phải chờ đợi"}]},"07-2016_2":{"s":"〜ようと → dù có định làm X đi nữa (nhượng bộ tự do — làm gì thì làm nhưng...)","r":"「どんな反論をしようと自由だが」= dù định phản bác thế nào cũng tự do, nhưng đừng ép buộc người khác.","traps":[{"w":"する以上","e":"= một khi đã làm thì... (nghĩa vụ) → không phải nhượng bộ"},{"w":"しつつも","e":"= vừa làm X vừa Y (song hành, tương phản) → hai việc cùng lúc"},{"w":"している限りは","e":"= chừng nào còn làm → điều kiện tiếp diễn"}]},"07-2016_3":{"s":"〜ともなれば → khi mà đã là X thì... (X là hoàn cảnh đặc biệt, kết quả tất nhiên)","r":"「週末ともなれば、いつも家族連れでいっぱいだ」= khi đã là cuối tuần thì lúc nào cũng đông gia đình.","traps":[{"w":"につき","e":"= vì lý do / mỗi X → lý do hoặc đơn vị"},{"w":"を機に","e":"= nhân dịp X → cơ hội thay đổi, không phải mô tả thường xuyên"},{"w":"をもって","e":"= lấy X làm mốc / tiêu chí → khác nghĩa"}]},"07-2016_4":{"s":"〜するもしないも → việc X hay không X đều phụ thuộc vào ai đó (nhấn mạnh trách nhiệm)","r":"「成功するもしないも、リーダーの君にかかっている」= thành hay bại đều trông vào cậu là trưởng nhóm.","traps":[{"w":"するやらしないやら","e":"= không biết có làm hay không (lưỡng lự) → không chắc chắn"},{"w":"するなりしないなり","e":"= làm hay không làm thì tùy (để người khác tự chọn) → tùy bạn"},{"w":"するというかしないというか","e":"= không biết nói là làm hay không → mơ hồ"}]},"07-2016_5":{"s":"〜てみせる → quyết tâm làm được X để chứng minh (ý chí mạnh mẽ)","r":"「今度は絶対おいしく作ってみせる」= lần này nhất định làm ngon để chứng minh. みせる = cho người khác thấy.","traps":[{"w":"作るものか","e":"= đời nào tôi làm! (phủ định mạnh) → NGƯỢC, quyết không làm"},{"w":"作る始末だ","e":"= kết cục là phải làm (kết quả đáng tiếc) → kết quả tệ"},{"w":"作りつつある","e":"= đang dần dần làm → quá trình đang diễn ra"}]},"07-2016_6":{"s":"〜といったところだ → khoảng chừng X, xấp xỉ X (ước lượng không chắc chắn, văn nói)","r":"「高くても4、5万円といったところだ」= đắt cũng chỉ khoảng 4-5 vạn yên thôi.","traps":[{"w":"に上る","e":"= lên đến (số lượng lớn) → số lượng thực tế, không phải ước lượng"},{"w":"でもあるまい","e":"= chắc cũng không đến mức... → phủ định nhẹ"},{"w":"どころではない","e":"= không phải vấn đề X → hoàn cảnh nghiêm trọng hơn"}]},"07-2016_7":{"s":"〜であるがゆえの → chính vì là X nên có (Y đặc thù của X) — ゆえ = vì, do (văn trang trọng)","r":"「天才であるがゆえの苦悩」= nỗi khổ đặc thù chỉ vì là thiên tài.","traps":[{"w":"とし得る","e":"= có thể coi là / có thể trở thành → khả năng"},{"w":"であるがごとき","e":"= như thể là X (so sánh) → so sánh, không phải nguyên nhân"},{"w":"とせざるを得ない","e":"= không thể không coi là → bắt buộc nhận định"}]},"07-2016_8":{"s":"〜ようとしたものの → đã cố gắng làm X nhưng (kết quả trái mong đợi)","r":"「市民の心をつかもうとしたものの、支持が得られず落選」= đã cố giành trái tim người dân nhưng không được ủng hộ.","traps":[{"w":"つかみきれなかったものの","e":"= tuy không nắm bắt được hết nhưng → thừa nhận thất bại một phần"},{"w":"つかもうとしたからといって","e":"= chỉ vì cố giành cũng không có nghĩa là... → phủ nhận kết luận"},{"w":"つかみきれなかったからといって","e":"= chỉ vì không giành được cũng không có nghĩa → phủ nhận"}]},"07-2016_9":{"s":"〜てもらうしかない → chỉ còn cách nhờ người khác làm X (không còn lựa chọn nào khác)","r":"「自分の力で頑張ってもらうしかない」= chỉ còn cách nhờ em tự cố gắng bằng sức mình thôi.","traps":[{"w":"頑張れるに決まっている","e":"= chắc chắn có thể cố gắng được → phán đoán lạc quan"},{"w":"頑張れないこともない","e":"= không phải là không thể cố gắng → khả năng dè dặt"},{"w":"頑張ってしまうところがある","e":"= có xu hướng cố gắng quá → đặc điểm tính cách"}]},"07-2016_10":{"s":"〜されますように → kính ngữ: mong rằng (ông/bà) được... (cầu mong cho người trên)","r":"「一日も早く回復されますように」= mong ông/bà sớm hồi phục. される = kính ngữ.","traps":[{"w":"願ってはどうですか","e":"= sao không cầu mong đi? → đề nghị hành động của người nghe"},{"w":"いたしたく思います","e":"= tôi muốn làm → hành động của mình, sai chủ thể"},{"w":"していらっしゃるでしょうか","e":"= ông/bà có đang... không? → hỏi tình trạng hiện tại"}]},"12-2016_11":{"s":"〜をよそに → bất chấp X, coi thường X (không quan tâm đến X xung quanh)","r":"「車内の混雑をよそに、平然とパソコンを広げた」= bất chấp xe đông, vẫn thản nhiên mở laptop.","traps":[{"w":"含めて","e":"= bao gồm cả X → liệt kê thêm"},{"w":"もとに","e":"= dưới sự / dựa trên → căn cứ, nền tảng"},{"w":"除いて","e":"= trừ X ra → loại bỏ"}]},"12-2016_12":{"s":"〜もしない → không thèm làm (phủ định nhấn mạnh bằng も — sắc thái khinh thường)","r":"「読みもしないで漫画を批判する」= chẳng thèm đọc mà đã chê. も + phủ định = không hề, không buồn.","traps":[{"w":"読まない","e":"= không đọc (bình thường) → phủ định thông thường, thiếu sắc thái"},{"w":"読もう","e":"= hãy đọc / định đọc → ý chí"},{"w":"読んで","e":"= đọc rồi (nối tiếp) → hành động liên tục"}]},"12-2016_13":{"s":"もっとも → tuy nhiên, có điều (nêu hạn chế/điều kiện sau câu khẳng định)","r":"「チームワークの大切さを学んだ。もっとも、今の仕事に直接役立っているかというと...」","traps":[{"w":"要するに","e":"= tóm lại → kết luận tổng hợp"},{"w":"あるいは","e":"= hoặc là (lựa chọn) → đưa ra phương án"},{"w":"ついては","e":"= về việc đó / nhân đó → chuyển sang vấn đề liên quan"}]},"12-2016_14":{"s":"おいでになる → kính ngữ của いる/来る/行く (ông/bà đang ở / đến)\n🔗 Họ kính ngữ của 来る (đến) dễ lẫn — phân biệt theo CHIỀU di chuyển:\n・見える, おいでになる, お越しになる, おいでくださる → DÙNG khi KHÁCH/người trên ĐẾN chỗ mình (tôn trọng hành động đến của họ)\n・上がる, まいる → khiêm nhường khi MÌNH đến chỗ khách/người trên\n→ Luôn hỏi: ai đang di chuyển đến đâu? Người được kính trọng đến = dùng kính ngữ (見える/おいでになる); mình đến = khiêm nhường (上がる/まいる)","r":"「鮮明に覚えておいでになり」= ông ấy vẫn còn nhớ rõ. おいでになる = kính ngữ cao của いる.","traps":[{"w":"差し上げ","e":"= khiêm nhường của あげる → trao tặng, sai chủ thể"},{"w":"まいり","e":"= khiêm nhường của 行く/来る → hành động của mình"},{"w":"申し上げ","e":"= khiêm nhường của 言う → nói (hành động của mình)"}]},"12-2016_15":{"s":"〜に越したことはない → không gì tốt hơn là X (X là điều lý tưởng, nhưng không bắt buộc)","r":"「知識はあるに越したことはない」= có kiến thức thì tốt hơn không có, nhưng không có cũng được.","traps":[{"w":"にすぎない","e":"= chỉ là X thôi → hạ thấp mức độ"},{"w":"ことは否めない","e":"= không thể phủ nhận rằng → thừa nhận sự thật"},{"w":"といっても過言ではない","e":"= nói X cũng không phải nói quá → khẳng định mạnh"}]},"12-2016_16":{"s":"〜次第では → tùy vào X mà (kết quả có thể thay đổi — điều kiện không chắc)","r":"「復旧状況次第では営業再開が遅れる可能性がある」= tùy tình hình phục hồi mà có thể mở cửa muộn hơn.","traps":[{"w":"次第には","e":"= không phải cấu trúc tự nhiên → sai dạng"},{"w":"次第に","e":"= dần dần (trạng từ) → nghĩa hoàn toàn khác"},{"w":"次第","e":"= ngay khi / tùy thuộc vào → không có では, khác nghĩa"}]},"12-2016_17":{"s":"〜ては困る → nếu X thì phiền/khó xử (biểu thị lo ngại về điều không mong muốn)","r":"「他人に知られては困る情報」= thông tin mà nếu bị người khác biết thì sẽ phiền. ては = nếu/khi.","traps":[{"w":"知っていても","e":"= dù có biết thì... → nhượng bộ, không phải lo ngại"},{"w":"知っていなくても","e":"= dù không biết → nhượng bộ phủ định"},{"w":"知らなくては","e":"= nếu không biết thì... → lo ngại về việc không biết, sai chiều"}]},"12-2016_18":{"s":"〜ばいいというものではない → không phải cứ làm X là xong (phủ nhận suy nghĩ đơn giản hóa)","r":"「単に時間をかけてがんばればいいというものではない」= không phải cứ bỏ nhiều thời gian cố gắng là xong.","traps":[{"w":"がんばることだといってもおかしくない","e":"= nói là cần cố gắng cũng không sai → khẳng định nhẹ, NGƯỢC"},{"w":"がんばることでしかない","e":"= chỉ còn cách cố gắng thôi → bắt buộc"},{"w":"がんばりようがない","e":"= không có cách nào cố gắng được → không thể"}],"kw":"単に","kw_hint":"単に → cặp cố định với にすぎない/ばいいというものではない","kw_loai":"Loại ngay đáp án mang nghĩa khẳng định mạnh"},"12-2016_19":{"s":"〜ものと思われる → được cho là sẽ X, dự đoán rằng X (văn viết trang trọng, khách quan)","r":"「いずれ近いうちに明らかになるものと思われる」= dự đoán rằng sắp được làm rõ.","traps":[{"w":"するという思いがある","e":"= có ý nghĩ sẽ làm → cảm xúc chủ quan"},{"w":"なったかに思える","e":"= có vẻ như đã trở thành → đã xảy ra, sai thì"},{"w":"するだろうと思う","e":"= tôi nghĩ sẽ làm → chủ quan hơn, ít trang trọng"}]},"12-2016_20":{"s":"〜させてもらおうかと思って → tôi đang định xin phép... (thông báo ý định, lịch sự)","r":"「このサークルを辞めさせてもらおうかと思って」= tôi đang muốn xin phép rút khỏi câu lạc bộ này.","traps":[{"w":"辞めてしまわれたのでしょうか","e":"= (ông/bà) đã nghỉ rồi chưa? → hỏi về hành động của người khác"},{"w":"辞めてしまったのかと思って","e":"= tôi nghĩ là đã nghỉ rồi → giả định quá khứ"},{"w":"辞めさせたらどうでしょうか","e":"= sao không cho nghỉ đi? → đề xuất cho người khác nghỉ, sai chủ thể"}]},"07-2017_21":{"s":"〜限り → chừng nào còn X thì (điều kiện tiếp diễn)","r":"「応援してくれるファンが一人でもいる限り、歌い続けます」= chừng nào còn một fan ủng hộ thì sẽ tiếp tục hát.","traps":[{"w":"いた上","e":"= sau khi đã ở → thứ tự, không phải điều kiện"},{"w":"いながら","e":"= trong khi ở → song hành"},{"w":"いるだけあって","e":"= xứng với việc có → kết quả hợp lý"}]},"07-2017_22":{"s":"〜とすれば → nếu giả định là X thì (suy luận từ giả thuyết)","r":"「石川さんでないとすれば、誰なのだろう」= nếu không phải Ishikawa thì là ai?","traps":[{"w":"とあって","e":"= vì là X (nguyên nhân đặc biệt) → lý do, không phải giả định"},{"w":"というより","e":"= hơn là / nói đúng hơn là → so sánh, điều chỉnh"},{"w":"と思っても","e":"= dù có nghĩ là X → nhượng bộ"}]},"07-2017_23":{"s":"なんら〜ない → hoàn toàn không có gì (phủ định tuyệt đối — văn trang trọng)","r":"「品質にはなんら問題はない」= về chất lượng không có bất kỳ vấn đề gì.","traps":[{"w":"かりに","e":"= giả sử → giả định"},{"w":"なかなか","e":"= không dễ / khá → mức độ, không phải phủ định tuyệt đối"},{"w":"あまりにも","e":"= quá mức → mức độ cao, không phải phủ định"}],"kw":"なんら","kw_hint":"なんら → luôn đi với phủ định ない (= 何ら～ない = không có gì cả)","kw_loai":"Loại ngay đáp án không có ない (かりに・なかなか・あまりにも)"},"07-2017_24":{"s":"〜ことは否めない → không thể phủ nhận rằng X (thừa nhận thực tế dù không muốn)","r":"「体力が落ちてきたことは否めない」= không thể phủ nhận là thể lực đã giảm.","traps":[{"w":"はずだった","e":"= đáng lẽ ra / vốn dĩ → kỳ vọng không thành"},{"w":"とおりだった","e":"= đúng như X → xác nhận dự đoán"},{"w":"に越したことはない","e":"= không gì tốt hơn là → điều lý tưởng"}]},"07-2017_25":{"s":"なさいます → kính ngữ của する (ông/bà/anh ấy làm)","r":"「課長がご説明なさいます」= trưởng phòng sẽ giải thích. なさる = kính ngữ của する.","traps":[{"w":"申します","e":"= khiêm nhường của 言う → hành động của mình"},{"w":"いただきます","e":"= khiêm nhường của もらう → mình nhận, sai chiều"},{"w":"願います","e":"= mong/nhờ → yêu cầu, không phải mô tả hành động"}]},"07-2017_26":{"s":"〜においてさえ → ngay cả trong X (nhấn mạnh X tưởng đủ điều kiện nhưng vẫn chưa)","r":"「現代においてさえ、脳のメカニズムは解明できていない」= ngay cả thời hiện đại vẫn chưa giải mã được não.","traps":[{"w":"においてこそ","e":"= chính trong X mới (điều kiện lý tưởng) → khẳng định X tốt nhất"},{"w":"に対してさえ","e":"= ngay cả đối với X → đối tượng, không phải bối cảnh"},{"w":"に対してこそ","e":"= chính đối với X mới → nhấn mạnh đối tượng lý tưởng"}]},"07-2017_27":{"s":"〜抜く → làm đến cùng, vượt qua hoàn toàn (V + ぬく = hoàn thành triệt để)","r":"「厳しい攻撃に耐えぬいた末に、勝利を収めた」= chịu đựng đến cùng rồi chiến thắng.","traps":[{"w":"耐えかねたほど","e":"= đến mức không chịu được nữa → gần không chịu được, không hoàn thành"},{"w":"耐えかねた末に","e":"= sau khi không chịu được nữa thì → bỏ cuộc, NGƯỢC nghĩa"},{"w":"耐えぬいたほど","e":"= đến mức chịu đựng được hết → ほど chỉ mức độ, không phải hoàn thành"}]},"07-2017_28":{"s":"〜たつもりが → tưởng là đã làm X nhưng (kết quả trái ngược với ý định)","r":"「新入生が話しやすいようにしたつもりが、逆に緊張させてしまった」= tưởng tạo điều kiện dễ nói nhưng lại khiến họ căng thẳng.","traps":[{"w":"ようにしたあげく","e":"= cuối cùng sau khi làm cho dễ nói → kết quả tệ nhưng không có yếu tố 'tưởng'"},{"w":"ようになったものを","e":"= đã trở nên dễ nói vậy mà → bực bội về kết quả"},{"w":"ようになったばかりか","e":"= không những trở nên dễ nói mà còn → cộng thêm"}]},"07-2017_29":{"s":"〜ばかりとなった → chỉ còn chờ X nữa thôi (mọi việc đã xong, chỉ còn bước cuối)","r":"「あとは出発を待つばかりとなった」= tất cả đã xong, chỉ còn chờ khởi hành thôi.","traps":[{"w":"待つこともあるはずだ","e":"= hẳn cũng có lúc phải chờ → dự đoán về khả năng"},{"w":"待てなくなってしまった","e":"= đã không thể chờ được nữa → không thể chịu đựng"},{"w":"待てそうにないみたいだ","e":"= hình như không thể chờ được → dự đoán tiêu cực"}]},"07-2017_30":{"s":"〜っこない → tuyệt đối không thể (khẩu ngữ mạnh, phủ định tuyệt đối)","r":"「絶対読みきれっこない」= tuyệt đối không thể đọc hết. っこない = không thể nào (thẳng thắn, khẩu ngữ).","traps":[{"w":"読みかけなのか","e":"= đang đọc dở à? → hỏi về trạng thái"},{"w":"読みっぱなしだろう","e":"= chắc đọc xong rồi để đó → để dở"},{"w":"読んでもいないくせに","e":"= chẳng đọc gì mà → phê phán chưa đọc"}]},"07-2018_31":{"s":"〜と引きかえに → đổi lại bằng X, đánh đổi X (được cái này mất cái kia)","r":"「便利さと引きかえに失ったものも少なくない」= đánh đổi sự tiện lợi mà mất đi không ít thứ.","traps":[{"w":"なくしては","e":"= nếu không có X → điều kiện thiếu X"},{"w":"と相まって","e":"= kết hợp với X (cộng hưởng, tích cực) → bổ sung nhau"},{"w":"のみならず","e":"= không chỉ X mà còn → liệt kê thêm"}]},"07-2018_32":{"s":"〜べく → nhằm mục đích X (văn trang trọng/cổ điển = ために)","r":"「地球環境を守るべく、廃棄物の減量に取り組む」= nhằm bảo vệ môi trường trái đất, nỗ lực giảm chất thải.","traps":[{"w":"守ろうとも","e":"= dù có cố bảo vệ đi nữa → nhượng bộ"},{"w":"守ればこそ","e":"= chính vì bảo vệ nên... → nhấn mạnh nguyên nhân"},{"w":"守るにせよ","e":"= dù có bảo vệ hay không → nhượng bộ hai chiều"}]},"07-2018_33":{"s":"なにも〜なくてもいい → không cần phải... đến mức đó (phê phán phản ứng thái quá)","r":"「少し遅れたぐらいでなにもそんなに怒らなくてもいいだろう」= chỉ trễ tý thôi có cần tức đến vậy không.","traps":[{"w":"まるで","e":"= hoàn toàn không (phủ định tuyệt đối) → không hợp với 'không cần thiết'"},{"w":"ちっとも","e":"= không một chút nào → phủ định tuyệt đối"},{"w":"いっさい","e":"= tuyệt đối không → phủ định tuyệt đối, không phải phê phán"}]},"07-2018_34":{"s":"〜ったって → dù có... đi nữa (khẩu ngữ = 〜といっても, thực tế khó khăn)","r":"「探すったって、こんな広い場所でどうやって探すの?」= dù nói tìm thì cũng tìm thế nào được ở chỗ rộng thế này.","traps":[{"w":"探すのかどうか","e":"= có tìm hay không → hỏi về ý định"},{"w":"探すわりには","e":"= so với việc tìm thì → kết quả không tương xứng"},{"w":"探すっていうより","e":"= hơn là tìm thì... → điều chỉnh cách nói"}]},"07-2018_35":{"s":"なんと〜ことか → thật là... làm sao! (cảm thán mạnh về mức độ)","r":"「なんと美しかったことか」= thật đẹp làm sao! なんと〜ことか = cảm thán về điều ấn tượng.","traps":[{"w":"のか","e":"= hả? (câu hỏi thường) → không có sắc thái cảm thán"},{"w":"わけだ","e":"= đó là lý do / cho nên → kết luận logic"},{"w":"ものだ","e":"= hóa ra là vậy / thật là (nhẹ hơn) → ít cảm xúc hơn ことか"}]},"07-2018_36":{"s":"〜かと思えば → vừa X thì lại Y (hai trạng thái trái ngược liên tiếp, khó lường)\n🔗 Cặp dễ lẫn vì giống hình thức:\n・かと思いきや → tưởng là A nhưng thực ra lại B (BẤT NGỜ TRÁI CHIỀU hoàn toàn so với dự đoán)\n・かと思えば → vừa A thì lại B ngay (CHUYỂN BIẾN NHANH liên tiếp, không nhất thiết trái ngược dự đoán)\n→ 思いきや luôn có yếu tố 'tưởng vậy mà không phải vậy'; 思えば chỉ là 'vừa...thì lại...'","r":"「突然甘えてきたり、そうかと思えば、どこかに行ってしまったりする」= vừa đến nũng nịu thì lại bỏ đi.","traps":[{"w":"そうだと思って","e":"= cứ nghĩ là vậy → suy nghĩ chủ quan, không phải chuyển biến"},{"w":"こうだと見て","e":"= nhìn thấy như thế → nhận xét bề ngoài"},{"w":"こうかと見れば","e":"= nếu nhìn thấy như thế → không phải cấu trúc tự nhiên"}]},"07-2018_37":{"s":"〜のをいいことに → lợi dụng X để (nhân cơ hội thuận lợi làm điều không đúng)","r":"「誰にも何も言われないのをいいことに、だらしない生活をした」= lợi dụng không ai nhắc nhở để sống bừa bộn.","traps":[{"w":"のがよければ","e":"= nếu X là tốt thì → điều kiện giả định"},{"w":"といいものだから","e":"= vì X là tốt nên... → không phải cấu trúc tự nhiên"},{"w":"とよさそうなのに","e":"= tưởng là tốt vậy mà → tiếc nuối"}]},"07-2018_38":{"s":"〜させていただく → khiêm nhường: được làm X (nhận ân huệ được phép làm — lịch sự cao)","r":"「被害者のお話を聞かせていただく中で」= trong quá trình được nghe câu chuyện của nạn nhân.","traps":[{"w":"聞いてくださる一方で","e":"= trong khi anh/chị nghe cho → sai chủ thể"},{"w":"聞かせてくださる一方で","e":"= trong khi anh/chị cho nghe → sai chủ thể"},{"w":"聞いていただく中で","e":"= trong quá trình được nghe → 聞く của mình, nhưng いただく sai chiều"}]},"07-2018_39":{"s":"〜しかあるまい → chỉ còn cách X thôi (không còn lựa chọn — văn trang trọng)","r":"「根気よく交渉を重ねていくしかあるまい」= chỉ còn cách kiên nhẫn tiếp tục đàm phán thôi.","traps":[{"w":"どころではなかろう","e":"= chắc không phải vấn đề X → phủ nhận sự phù hợp"},{"w":"などあるものか","e":"= làm gì có! → phủ định mạnh bác bỏ"},{"w":"ことすらない","e":"= không hề có / không đến mức → không có kinh nghiệm"}]},"07-2018_40":{"s":"〜てくれればよかったのに → giá mà (anh/chị) đã làm cho tôi thì tốt rồi (tiếc nuối)","r":"「気づいたなら声をかけてくれればよかったのに」= biết thì cũng gọi một tiếng cho tôi thì tốt rồi.","traps":[{"w":"くれたと思ったんだね","e":"= bạn nghĩ là đã làm cho mình à → không phải tiếc nuối"},{"w":"もらったと思ったのに","e":"= cứ tưởng đã được... vậy mà → tiếc về điều tưởng đã nhận"},{"w":"もらえばよかったんだね","e":"= đáng lẽ nên nhờ thì tốt nhỉ → nhờ mình làm, sai chiều"}]},"12-2018_41":{"s":"〜にジーンズ → X với Y (liệt kê trang phục/đồ vật đi kèm bằng に)","r":"「Tシャツにジーンズ」= áo phông với quần jeans. に dùng để kết hợp đồ vật đi cùng nhau.","traps":[{"w":"を","e":"= Tシャツをジーンズ vô nghĩa → tân ngữ"},{"w":"など","e":"= v.v., chẳng hạn → liệt kê không đầy đủ"},{"w":"ほど","e":"= đến mức / khoảng → mức độ"}]},"12-2018_42":{"s":"〜ならではの → đặc trưng riêng của X, chỉ có X mới có (không thể thay thế)","r":"「海の町ならではの新鮮な魚料理」= món cá tươi đặc trưng chỉ có ở thị trấn ven biển.","traps":[{"w":"なり","e":"= hay là / ngay lúc → lựa chọn hoặc thời điểm"},{"w":"なくして","e":"= nếu không có X (điều kiện thiếu) → điều kiện"},{"w":"ながらに","e":"= trong khi / theo đúng trạng thái → đồng thời"}]},"12-2018_43":{"s":"なかなか → khá, rất (dùng khi kết quả vượt mong đợi — đánh giá tích cực)","r":"「さすが日本有数の水量、なかなか見事な滝だった」= đúng là thác nước hàng đầu Nhật Bản, khá hùng vĩ.","traps":[{"w":"あえて","e":"= cố tình, dám làm → hành động chủ động bất chấp"},{"w":"まさか","e":"= không lẽ nào → bác bỏ khả năng"},{"w":"かえって","e":"= ngược lại → kết quả trái chiều"}]},"12-2018_44":{"s":"〜ところだった → suýt (xảy ra điều đó) — hú vía vì không xảy ra","r":"「教えてもらわなかったら、見逃すところでした」= nếu không được báo thì đã bỏ lỡ rồi.","traps":[{"w":"見逃す","e":"= bỏ lỡ (thực tế xảy ra) → đã bỏ lỡ thật, không phải suýt"},{"w":"見逃さなかった","e":"= đã không bỏ lỡ → phủ định, sai ý"},{"w":"見逃せる","e":"= có thể bỏ qua → khả năng chủ động"}]},"12-2018_45":{"s":"〜かねない → có nguy cơ X (điều không mong muốn có thể xảy ra — cảnh báo)","r":"「伝統技術が失われかねない」= có nguy cơ kỹ thuật truyền thống bị thất truyền.","traps":[{"w":"失われたようだ","e":"= có vẻ đã bị mất rồi → quá khứ, đã xảy ra"},{"w":"失われかけている","e":"= đang gần mất → quá trình hiện tại"},{"w":"失われてはならない","e":"= không được để mất → mệnh lệnh/cấm đoán"}]},"12-2018_46":{"s":"〜ようにも〜ない → dù muốn X cũng không thể (có ý muốn nhưng thiếu điều kiện)","r":"「聞こうにも聞けない」= dù muốn hỏi cũng không hỏi được (vì sếp không có mặt).","traps":[{"w":"聞いては","e":"= nếu hỏi thì... → điều kiện"},{"w":"聞くには","e":"= để hỏi / đối với việc hỏi → mục đích"},{"w":"聞かずとも","e":"= dù không hỏi cũng → nhượng bộ phủ định"}]},"12-2018_47":{"s":"〜までになる → đạt đến mức X (tiến bộ đến trình độ mới đáng kể)","r":"「支店長を任されるまでになったが、45歳で退職」= đã tiến đến mức được giao quản lý chi nhánh nhưng lại từ chức.","traps":[{"w":"任されたまでは","e":"= chỉ đến mức được giao thôi → hạn chế, không nhấn mạnh tiến bộ"},{"w":"任されたくらいでは","e":"= chỉ vì được giao thì... → không đủ điều kiện"},{"w":"任されるくらいになれば","e":"= nếu đạt đến mức được giao thì → điều kiện giả định"}]},"12-2018_48":{"s":"〜てみなきゃわからない → không thử thì không biết được (khẩu ngữ)","r":"「やってみなきゃわかんないよ」= không thử thì làm sao biết được.","traps":[{"w":"やってるって","e":"= đang làm đó → thông báo hành động hiện tại"},{"w":"やっちゃうのが","e":"= việc làm luôn là → danh từ hóa"},{"w":"やっちゃおうと","e":"= định làm luôn đi → ý định"}]},"12-2018_49":{"s":"〜ておけばいい → làm X trước là xong, cứ làm X đi (lời khuyên đơn giản)","r":"「適当に答えておけばいいんだよ」= cứ trả lời đại cho xong là được. ておく = làm trước để đối phó.","traps":[{"w":"答えてくれそうだよ","e":"= hình như sẽ trả lời cho → dự đoán về người khác"},{"w":"答えられたせいだよ","e":"= vì đã bị hỏi nên... → nguyên nhân bị động"},{"w":"答えただけのことだ","e":"= chỉ là đã trả lời thôi → giảm nhẹ"}]},"12-2018_50":{"s":"〜おそれがある → có nguy cơ X (điều không mong muốn có thể xảy ra — cảnh báo)","r":"「目標が高すぎると、やる気を失わせてしまうおそれがある」= nếu mục tiêu quá cao có nguy cơ làm mất động lực.","traps":[{"w":"失わせてしまってはならない","e":"= không được để mất đi → cấm đoán mạnh"},{"w":"失わせてしまいつつある","e":"= đang dần khiến mất đi → quá trình đang xảy ra"},{"w":"失わせてしまうところだ","e":"= suýt khiến mất đi → đã qua nguy hiểm, hú vía"}]},"07-2019_1":{"s":"〜こそ → chính X (nhấn mạnh đối tượng, thường đi với tương phản)","r":"「優勝こそ逃したが、自己ベストを更新した」= tuy trượt chính ngôi vô địch nhưng phá kỷ lục cá nhân.","traps":[{"w":"さえ","e":"= ngay cả X (mức tối thiểu đáng ngạc nhiên) → nhấn mạnh mức tối thiểu"},{"w":"ほど","e":"= đến mức / khoảng → mức độ"},{"w":"ばかり","e":"= chỉ toàn X / vừa mới → hạn chế hoặc thời điểm gần"}]},"07-2019_2":{"s":"〜ことだから → nhân dịp X / vì là X (căn cứ vào đặc tính đã biết để suy luận)","r":"「息子も帰ってくることだから、家族旅行にでも行こう」= nhân dịp con trai về, đi du lịch gia đình đi.","traps":[{"w":"ことだが","e":"= có chuyện là... → dẫn dắt vào vấn đề"},{"w":"ことでも","e":"= ngay cả việc / dù chỉ là chuyện → nhượng bộ"},{"w":"こととはいえ","e":"= dù là việc X đi nữa → nhượng bộ"}]},"07-2019_3":{"s":"どうやら〜ようだ → hình như, có vẻ (suy đoán có căn cứ từ quan sát)","r":"「表情が明るいところを見ると、どうやらうまくいったようだ」= nhìn nét mặt sáng sủa, hình như mọi thứ ổn.","traps":[{"w":"仮に","e":"= giả sử → giả định"},{"w":"まさか","e":"= không lẽ nào → bác bỏ"},{"w":"必ずしも","e":"= không nhất thiết → phủ định một phần"}],"kw":"どうやら","kw_hint":"どうやら → cặp cố định với 〜ようだ/らしい","kw_loai":"Loại ngay 仮に・まさか・必ずしも"},"07-2019_4":{"s":"〜ないものか → không thể... được sao? (mong muốn điều tốt hơn, than thở nhẹ)\n🔗 Họ ものを/ものか/ものだ/ものの dễ lẫn:\n・ものを → tiếc nuối/bực bội, đi cặp 〜ば...ものを, luôn ở CUỐI câu\n・ものか → đời nào/không thể... được sao (phủ định mạnh hoặc than thở)\n・ものだ → cảm thán/quy luật tự nhiên ('hóa ra là vậy')\n・ものの → tuy...nhưng (nhượng bộ, giữa câu)","r":"「もう少し良いものを使えないものか」= không thể dùng đồ tốt hơn một chút được sao?","traps":[{"w":"ものの","e":"= tuy nhiên / dù X nhưng → nhượng bộ"},{"w":"ものだ","e":"= hóa ra / thật là / quy luật → cảm thán hoặc khái quát"},{"w":"ものを","e":"= vậy mà / đáng lẽ (tiếc nuối, bực bội) → thường đi với ば...ものを ở CUỐI câu, không hợp ngữ cảnh câu hỏi than thở nhẹ này"}]},"07-2019_5":{"s":"〜じゃない → chẳng phải... đó sao! (ngạc nhiên tích cực, khen ngợi nhẹ — khẩu ngữ)","r":"「けっこうよく書けてるじゃない」= viết khá tốt đó chứ! じゃない = nhận ra điều tốt hơn mong đợi.","traps":[{"w":"書けてなきゃ","e":"= nếu không viết được thì... → điều kiện"},{"w":"書けてたらいいね","e":"= nếu viết được thì tốt nhỉ → ao ước"},{"w":"書けてるかどうかだね","e":"= vấn đề là có viết được không nhỉ → nghi vấn"}]},"07-2019_6":{"s":"〜とかで → nghe nói là (lý do nghe được, không chắc chắn)","r":"「テレビで紹介されたとかで、毎日長い行列ができている」= nghe nói được giới thiệu trên TV nên mỗi ngày hàng dài.","traps":[{"w":"とかなら","e":"= nếu là X hay gì đó thì → điều kiện lựa chọn"},{"w":"というのが","e":"= điều gọi là / thứ mà → giải thích định nghĩa"},{"w":"というのも","e":"= bởi vì (lý do chắc chắn) → lý do chắc chắn hơn"}]},"07-2019_7":{"s":"〜にもなっておらず → chẳng trở thành X dù ở mức tối thiểu (phủ định + も nhấn mạnh)","r":"「何の説明にもなっておらず」= chẳng những không thành bất kỳ lời giải thích nào.","traps":[{"w":"になっておらず","e":"= chưa trở thành X → phủ định thông thường, thiếu sắc thái nhấn mạnh"},{"w":"になっているのではなく","e":"= không phải là đang trở thành → phủ định nhẹ"},{"w":"にもなっているのではなく","e":"= không phải đang trở thành cả X → cấu trúc kỳ lạ"}]},"07-2019_8":{"s":"〜たり〜なかったり → khi thì X khi thì không (không ổn định, thất thường)","r":"「来たり来なかったり」= khi thì đến khi thì không. たり〜たりする = lặp lại hai trạng thái.","traps":[{"w":"来ても来なくても","e":"= dù đến hay không đến → nhượng bộ (kết quả không đổi)"},{"w":"来るか来ないか","e":"= có đến hay không? → câu hỏi về ý định"},{"w":"来るのも来ないのも","e":"= cả việc đến lẫn không đến → danh từ hóa hai việc"}]},"07-2019_9":{"s":"〜させられるところだった → suýt bị bắt phải làm X (bị động cưỡng bức + hú vía)","r":"「危うく入会させられるところだった」= suýt bị bắt phải gia nhập. させられる = bị ép, ところだった = suýt.","traps":[{"w":"されようがなかった","e":"= không có cách nào bị làm → không thể bị"},{"w":"させなかったのかと思った","e":"= tôi nghĩ có phải đã không để bị làm không → suy nghĩ phức tạp"},{"w":"しなかったことにした","e":"= quyết định coi như không làm → chủ động quyết định"}]},"07-2019_10":{"s":"〜なきゃいけないってわけじゃない → không có nghĩa là bắt buộc phải X (phủ nhận nghĩa vụ)","r":"「見学したからといって、入らなきゃいけないってわけじゃない」= tham quan không có nghĩa là bắt buộc phải gia nhập.","traps":[{"w":"入りたがるだけじゃない","e":"= không chỉ muốn gia nhập thôi → phạm vi"},{"w":"入らせないわけにはいかない","e":"= không thể không để gia nhập → bắt buộc NGƯỢC"},{"w":"入りたくないだけかもしれない","e":"= có thể chỉ là không muốn gia nhập → suy đoán ý muốn"}]},"12-2019_11":{"s":"〜を余儀なくされる → bị buộc phải X (bị động — bất đắc dĩ phải làm)","r":"「多くの企業が事業縮小を余儀なくされている」= nhiều doanh nghiệp bị buộc phải thu hẹp hoạt động.","traps":[{"w":"で","e":"= bằng/do (phương tiện) → sai trợ từ với 余儀なくされる"},{"w":"と","e":"= và / với → liệt kê hoặc trích dẫn"},{"w":"に","e":"= cho/đến → hướng tác động, sai cấu trúc"}]},"12-2019_12":{"s":"そう簡単には〜ない → không dễ dàng thế đâu (phủ định mức độ dễ)","r":"「一度ついてしまった癖は、そう簡単には直らない」= thói quen đã hình thành không dễ sửa vậy đâu.","traps":[{"w":"たとえ","e":"= dù, cho dù → nhượng bộ giả định"},{"w":"そのうち","e":"= sớm thôi / rồi sẽ → thời gian tương lai"},{"w":"いったい","e":"= rốt cuộc / đến mức nào → tăng cường câu hỏi"}]},"12-2019_13":{"s":"〜を控えて → khi X đang đến gần (sự kiện quan trọng sắp xảy ra)","r":"「大学受験を控えて、活動を休止している」= khi kỳ thi đại học đang đến gần, tạm dừng hoạt động.","traps":[{"w":"を基にして","e":"= dựa trên X → căn cứ"},{"w":"をもって","e":"= lấy X làm mốc / tiêu chí → kết thúc hoặc căn cứ"},{"w":"をめぐって","e":"= xoay quanh X (tranh luận) → vấn đề tranh cãi"}]},"12-2019_14":{"s":"〜でもあるまい → không lẽ / chắc cũng không phải là X (phủ nhận nhẹ điều quá mức)","r":"「いまさら夫婦二人で遊園地でもあるまい」= đã đến tuổi này chắc cũng không phải là lúc đi công viên giải trí.","traps":[{"w":"にすぎない","e":"= chỉ là X thôi → hạ thấp"},{"w":"ならではだ","e":"= đặc trưng của X → đặc thù"},{"w":"のようなものだ","e":"= giống như X → so sánh"}]},"12-2019_15":{"s":"存じます → khiêm nhường của 思う (thư từ trang trọng với đối tác/cấp trên)","r":"「お忙しい毎日をお過ごしのことと存じます」= tôi hiểu ông/bà đang có những ngày bận rộn.","traps":[{"w":"いたします","e":"= khiêm nhường của します → hành động, không phải suy nghĩ"},{"w":"承りします","e":"= sai ngữ pháp (phải là 承ります) → nhận/nghe lệnh"},{"w":"申し上げます","e":"= khiêm nhường của 言う → nói"}]},"12-2019_16":{"s":"〜ようとしたとたんに → ngay lúc vừa định làm X thì... (hành động chuẩn bị + bất ngờ xảy ra)","r":"「車から出ようとしたとたんに、大粒の雨が降ってきた」= ngay lúc vừa định ra khỏi xe thì mưa to ập xuống.","traps":[{"w":"出るようにしたとたんに","e":"= ngay lúc làm cho ra thì → sai khiến, sai chủ thể"},{"w":"出るようにするにつれて","e":"= khi dần làm cho ra thì → tiệm tiến, không phải bất ngờ"},{"w":"出るようとするにつれて","e":"= sai ngữ pháp → không phải cấu trúc tồn tại"}]},"12-2019_17":{"s":"〜べきところを → đáng lẽ phải nói/làm X nhưng (sai lầm so với điều đúng đắn)","r":"「御社でと言うべきところを、誤って弊社でと言ってしまった」= đáng lẽ nói 御社 lại nói nhầm 弊社.","traps":[{"w":"言うのにひきかえ","e":"= trái với việc nói X → tương phản hai sự kiện"},{"w":"言ったことにしても","e":"= dù coi như đã nói → nhượng bộ giả định"},{"w":"言ったつもりはないのに","e":"= tuy không có ý nói vậy mà → phủ nhận ý định"}]},"12-2019_18":{"s":"〜だけに → chính vì X (nguyên nhân làm kết quả càng đáng tiếc/ấn tượng)","r":"「ほかの俳優については文句のつけようがないだけに、実にもったいない」= chính vì những diễn viên khác hoàn hảo, nên càng tiếc.","traps":[{"w":"文句のつけようがないのか","e":"= liệu có thể không phàn nàn không? → câu hỏi"},{"w":"文句をつけずにはいられないのか","e":"= liệu có thể không phàn nàn không? → câu hỏi phủ định"},{"w":"文句をつけずにはいられないだけに","e":"= chính vì không thể không phàn nàn → NGƯỢC nghĩa"}]},"12-2019_19":{"s":"〜んじゃなかった → đáng lẽ không nên làm X (hối hận về hành động của mình)","r":"「こんなに天気が良くなるなら、レインコートを着てくるんじゃなかった」= biết trời đẹp thế thì đáng lẽ không mặc áo mưa.","traps":[{"w":"きたんだった","e":"= đáng lẽ nên đến (hối hận vì không đến) → hối hận NGƯỢC"},{"w":"くるんだった","e":"= đáng lẽ nên mang đến (hối hận vì không mang) → hối hận NGƯỢC"},{"w":"きたんじゃなかった","e":"= đáng lẽ không nên đến → hối hận về việc đi, khác với mang đồ"}]},"12-2019_20":{"s":"〜ともかぎらない → không nhất thiết là không X, có thể X (phủ nhận loại trừ hoàn toàn)","r":"「午後の便がすべて欠航にならないともかぎらない」= không thể loại trừ khả năng tất cả chuyến bay chiều bị hủy.","traps":[{"w":"なるにこしたことはない","e":"= tốt nhất là trở thành X → điều lý tưởng, NGƯỢC ý"},{"w":"なりそうですらない","e":"= thậm chí không có vẻ sẽ trở thành → phủ định mạnh"},{"w":"なっているはずがない","e":"= không thể nào đã trở thành rồi → phủ định chắc chắn"}]},"12-2020_21":{"s":"〜ならではの → đặc trưng riêng của X, chỉ có X mới có","r":"「老舗旅館ならではの細やかな心遣い」= sự chu đáo chỉ có ở quán trọ lâu đời mới có.","traps":[{"w":"ごときの","e":"= như (khinh thường hoặc khiêm tốn) → so sánh, không phải đặc trưng"},{"w":"がらみの","e":"= liên quan đến, dính líu → quan hệ"},{"w":"ほどまでの","e":"= không phải cấu trúc tự nhiên → sai"}]},"12-2020_22":{"s":"〜ばかりに → chỉ vì X mà (nguyên nhân duy nhất dẫn đến kết quả tệ — hối hận)","r":"「名前を間違えたばかりに、契約してもらえなかった」= chỉ vì nhầm tên mà không ký được hợp đồng.","traps":[{"w":"なんて","e":"= thật là... / chuyện mà → cảm thán, không phải nguyên nhân"},{"w":"以上は","e":"= một khi đã... thì → nghĩa vụ sau điều kiện"},{"w":"かと思うと","e":"= vừa X thì lại Y → chuyển biến nhanh"}]},"12-2020_23":{"s":"それが → vậy mà / ấy vậy mà (bất ngờ trái chiều — điều không ngờ đến)","r":"「森さんのことなど何とも思っていなかった。それが最近、急に意識するようになった」= vậy mà gần đây lại đột nhiên để ý.","traps":[{"w":"それは","e":"= cái đó thì / về điều đó thì → chủ đề, không phải bất ngờ trái chiều"},{"w":"それも","e":"= cái đó cũng / thêm vào đó → bổ sung"},{"w":"それか","e":"= hay là / hoặc là → lựa chọn"}]},"12-2020_24":{"s":"〜をもってすれば → nếu dùng/với X thì (nhấn mạnh X là công cụ/năng lực đặc biệt)","r":"「私が持つノウハウをもってすれば、早期の黒字化が図れる」= với bí quyết tôi có thì có thể đạt lợi nhuận sớm.","traps":[{"w":"とあってか","e":"= có phải vì là X không → nghi vấn nguyên nhân"},{"w":"とあってさえ","e":"= ngay cả khi là X → nhấn mạnh hoàn cảnh"},{"w":"にとってみれば","e":"= đối với X mà xét → góc nhìn của ai đó"}]},"12-2020_25":{"s":"〜ないうちから → ngay cả trước khi làm X / chưa làm X mà đã... (phê phán sự vội vàng)","r":"「やってもいないうちからあきらめてしまう人に、成長はない」= người chưa thử mà đã bỏ cuộc thì không tiến bộ.","traps":[{"w":"やることはないにしろ","e":"= dù không làm → nhượng bộ"},{"w":"やりようがないにもかかわらず","e":"= mặc dù không có cách làm → nhượng bộ thực tế"},{"w":"やってしまってからでないと","e":"= nếu chưa làm xong thì... → điều kiện phải hoàn thành trước"}]},"12-2020_26":{"s":"〜ないくせに → không làm mà lại... (phê phán ai đó nói/làm điều trái với thực tế của họ)","r":"「本当は読んでみたくてしかたがないくせに」= rõ ràng muốn đọc lắm vậy mà lại nói không quan tâm.","traps":[{"w":"なくちゃ","e":"= phải (nếu không thì không xong) → nghĩa vụ"},{"w":"ないけど","e":"= không có nhưng → nhượng bộ trung tính"},{"w":"なくたって","e":"= dù không có cũng → nhượng bộ"}]},"12-2020_27":{"s":"〜ている → kinh nghiệm đã có / trạng thái kết quả (thể tiếp diễn mang nghĩa kinh nghiệm tích lũy)","r":"「前回の大会で一度対戦している」= đã từng đấu một lần ở giải trước. ている = kinh nghiệm đã có.","traps":[{"w":"対戦してくる","e":"= sẽ đến đấu → hành động hướng về mình từ tương lai"},{"w":"対戦してみる","e":"= thử đấu xem → thử nghiệm lần đầu"},{"w":"対戦していく","e":"= sẽ tiếp tục đấu → tiếp diễn về tương lai"}]},"12-2020_28":{"s":"上がる (謙譲語) → khiêm nhường của 行く khi đến chỗ khách/người trên\n🔗 Họ kính ngữ của 来る (đến) dễ lẫn — phân biệt theo CHIỀU di chuyển:\n・見える, おいでになる, お越しになる, おいでくださる → DÙNG khi KHÁCH/người trên ĐẾN chỗ mình (tôn trọng hành động đến của họ)\n・上がる, まいる → khiêm nhường khi MÌNH đến chỗ khách/người trên\n→ Luôn hỏi: ai đang di chuyển đến đâu? Người được kính trọng đến = dùng kính ngữ (見える/おいでになる); mình đến = khiêm nhường (上がる/まいる)","r":"「スタッフがお迎えにあがります」= nhân viên sẽ đến đón quý khách. 上がる = đến (chỗ người được kính trọng).","traps":[{"w":"見えます","e":"= trông thấy / xuất hiện → 見える là khiêm nhường của 来る khi khách ĐẾN CHỖ MÌNH"},{"w":"くださいます","e":"= (người trên) làm cho mình → kính ngữ, không phải khiêm nhường"},{"w":"さし上げます","e":"= khiêm nhường của あげる → trao cho, không phải đến nơi"}]},"12-2020_29":{"s":"〜どころではない → không phải lúc X / hoàn toàn không thể X (hoàn cảnh không cho phép)","r":"「強風と寒さで、夜景を楽しむどころではなかった」= gió mạnh và lạnh đến mức không thể thưởng thức cảnh đêm.","traps":[{"w":"楽しまずにはいられなかった","e":"= không thể không thưởng thức → NGƯỢC, bắt buộc thưởng thức"},{"w":"楽しめないことはなかった","e":"= không phải là không thể thưởng thức → có thể thưởng thức được"},{"w":"楽しむつもりはなかった","e":"= không có ý định thưởng thức → không muốn từ đầu"}]},"12-2020_30":{"s":"〜ってもんだ → đó mới gọi là X chứ! (khẩu ngữ — nhận định mạnh về điều hiển nhiên)","r":"「さすがに無理ってもんだ」= thật sự đó mới gọi là không thể chứ! Nhận định chắc chắn về điều hiển nhiên.","traps":[{"w":"無理するもんだ","e":"= đúng là cứ cố quá sức → nhận định thói quen"},{"w":"無理するもんか","e":"= đời nào mà cố quá sức → phủ định mạnh"},{"w":"無理なもんか","e":"= sao lại không thể được! → phản bác phủ định"}]},"07-2021_31":{"s":"〜ならまだしも → X thì còn tạm được nhưng (X là mức chấp nhận được, Y thì không)","r":"「プロならまだしも、普通の人間には使いこなせない」= nếu là dân chuyên nghiệp thì còn được, người thường thì không thể.","traps":[{"w":"はおろか","e":"= chưa nói đến X, ngay cả Y cũng... → nêu cái nhỏ hơn cũng không được"},{"w":"どころではなく","e":"= không phải là vấn đề X → hoàn toàn khác mức"},{"w":"に比して","e":"= so với X → so sánh đơn thuần"}]},"07-2021_32":{"s":"〜極まりない → cực kỳ (N な bỏ な + 極まりない). KHÔNG thêm な/に\n🔗 Bẫy lặp lại nhiều lần trong đề thi:\n・〜極まりない luôn theo SAU dạng gốc của tính từ na (bỏ な)\n・VD đúng: 危険極まりない, 失礼極まりない (KHÔNG có な trước 極まりない)\n→ Hễ thấy 極まりない là first phải loại ngay đáp án có thêm な hoặc に","r":"「危険極まりない行為」= hành động cực kỳ nguy hiểm. Bẫy kinh điển: không thêm な.","traps":[{"w":"危険の","e":"= の không dùng trước 極まりない → sai"},{"w":"危険な","e":"= thêm な → SAI. Bẫy phổ biến nhất!"},{"w":"危険に","e":"= thêm に → sai, に dùng với động từ"}]},"07-2021_33":{"s":"〜を皮切りに → lấy X làm sự kiện khởi đầu cho chuỗi tiếp theo\n🔗 Cặp đối nghĩa dễ lẫn:\n・を最後に → lấy X làm mốc KẾT THÚC (sau đó dừng lại)\n・を皮切りに → lấy X làm mốc KHỞI ĐẦU (sau đó tiếp diễn chuỗi sự kiện)\n→ Nhớ: 最後=cuối, 皮切り=mở màn. Nghĩa NGƯỢC HOÀN TOÀN nhau!","r":"「東京で開催されるのを皮切りに、全国を巡回していく」= lấy Tokyo làm nơi khai mạc rồi lưu diễn toàn quốc.","traps":[{"w":"開催されるや否や","e":"= ngay khi vừa khai mạc thì → tức thì, không phải khởi đầu chuỗi"},{"w":"開催されたとたんに","e":"= ngay lúc vừa khai mạc thì → bất ngờ"},{"w":"開催されて以来","e":"= kể từ khi khai mạc → từ thời điểm đó đến nay"}]},"07-2021_34":{"s":"〜だろうと〜だろうと → dù là X hay Y đi nữa (nhượng bộ liệt kê, bất chấp)","r":"「雨だろうと雪だろうと、毎日自転車で通勤してくる」= dù mưa hay tuyết cũng đạp xe đi làm.","traps":[{"w":"雨とも雪とも","e":"= cả mưa lẫn tuyết → liệt kê, không có sắc thái bất chấp"},{"w":"雨でもなく雪でもなく","e":"= không phải mưa cũng không phải tuyết → phủ định cả hai"},{"w":"雨というか雪というか","e":"= không biết là mưa hay tuyết → lưỡng lự"}]},"07-2021_35":{"s":"〜ばかりに → chỉ vì X mà (nguyên nhân duy nhất dẫn đến hậu quả không mong muốn)","r":"「余計なことをつい言ってしまったばかりに、自らに災いが降りかかる」= chỉ vì lỡ miệng mà tự rước họa vào thân.","traps":[{"w":"言ってみたばかり","e":"= vừa mới thử nói → thời điểm vừa xong"},{"w":"言ってみたとおり","e":"= đúng như đã thử nói → xác nhận"},{"w":"言ってしまったとおりに","e":"= đúng như đã lỡ nói → xác nhận, không phải nguyên nhân"}]},"07-2021_36":{"s":"〜あまり → quá X đến mức (hành động thái quá do cảm xúc/nỗ lực quá mức)","r":"「汚れを落とそうとするあまり、強い力で磨いてしまいがち」= vì quá muốn làm sạch mà có xu hướng chà mạnh.","traps":[{"w":"落とそうとしたわりに","e":"= so với việc cố làm sạch thì → kết quả không tương xứng"},{"w":"落とせばいいのであれば","e":"= nếu làm sạch là được thì → điều kiện"},{"w":"落とせばいいかというと","e":"= nếu hỏi có phải làm sạch là xong không → phủ nhận đơn giản hóa"}]},"07-2021_37":{"s":"〜ないことはない → không phải là không thể (phủ định kép = có thể, dù không dễ)","r":"「やってやれないことはない」= không phải là không làm được = có thể làm được. ないことはない = khả năng tuy khó.","traps":[{"w":"やってやることがない","e":"= không có việc để làm → không có gì"},{"w":"やってもやるべきではない","e":"= dù làm cũng không nên → phủ nhận tính đúng đắn"},{"w":"やってもやれるものでもない","e":"= dù làm cũng không thể được → phủ định khả năng"}]},"07-2021_38":{"s":"〜かねない → có thể xảy ra điều không mong muốn (nguy cơ, cảnh báo)","r":"「慎重に選ばないと『こんなはずではなかった』ということになりかねない」= không cẩn thận có thể dẫn đến 'không ngờ lại thế này'.","traps":[{"w":"といったようにはしかねる","e":"= không thể làm theo kiểu đó → từ chối cách làm"},{"w":"といったようにならない","e":"= không trở thành theo kiểu đó → phủ định kết quả"},{"w":"ということにはなりえない","e":"= không thể trở thành điều đó → phủ định khả năng hoàn toàn"}]},"07-2021_39":{"s":"〜にすぎまい → chắc chỉ là X thôi (văn trang trọng/cổ điển = すぎないだろう)","r":"「結局は人件費削減を正当化するための口実にすぎまい」= rốt cuộc chắc chỉ là cái cớ hợp lý hóa giảm chi phí thôi.","traps":[{"w":"になどせぬ","e":"= không thể nào làm X → cổ điển phủ định hành động"},{"w":"でかまわぬ","e":"= X cũng được / không sao → chấp nhận"},{"w":"でもあるまい","e":"= chắc cũng không phải X → phủ định nhẹ về danh tính/tư cách"}]},"07-2021_40":{"s":"〜次第です → đó là lý do / đó là hoàn cảnh (văn trang trọng — kết thúc giải thích lý do liên hệ)","r":"「ご連絡した次第です」= đó là lý do tôi liên hệ với ông/bà. 次第です = văn thư trang trọng kết thúc giải thích.","traps":[{"w":"ご連絡を承りました","e":"= đã nhận được liên lạc từ ông/bà → NGƯỢC chiều"},{"w":"ご連絡をくださいました","e":"= ông/bà đã liên hệ cho tôi → NGƯỢC chiều"},{"w":"ご連絡したことです","e":"= điều tôi đã liên hệ → ít trang trọng, thiếu sắc thái lý giải"}]},"12-2021_41":{"s":"〜はどうあれ → dù X thế nào đi nữa (bất chấp tính chất của X, tập trung điều khác)","r":"「方法はどうあれ、現状を打開する必要がある」= dù phương pháp thế nào thì cũng cần phá vỡ hiện trạng.","traps":[{"w":"としても","e":"= ngay cả khi là X → nhượng bộ cụ thể"},{"w":"だけでなく","e":"= không chỉ X mà còn → liệt kê thêm"},{"w":"にかわって","e":"= thay thế cho X → thay thế"}]},"12-2021_42":{"s":"なんら〜ない → hoàn toàn không có gì (phủ định tuyệt đối — văn trang trọng)","r":"「品質にはなんら問題はない」= về chất lượng không có bất kỳ vấn đề gì.","traps":[{"w":"かりに","e":"= giả sử → giả định"},{"w":"なかなか","e":"= không dễ / khá → mức độ"},{"w":"あまりにも","e":"= quá mức → mức độ cao"}],"kw":"なんら","kw_hint":"なんら → luôn đi với phủ định ない (= 何ら～ない = không có gì cả)","kw_loai":"Loại ngay đáp án không có ない"},"12-2021_43":{"s":"〜ものを → vậy mà / đáng lẽ (tiếc nuối hoặc bực bội về điều không làm)\n🔗 Họ ものを/ものか/ものだ/ものの dễ lẫn:\n・ものを → tiếc nuối/bực bội, đi cặp 〜ば...ものを, luôn ở CUỐI câu\n・ものか → đời nào/không thể... được sao (phủ định mạnh hoặc than thở)\n・ものだ → cảm thán/quy luật tự nhiên ('hóa ra là vậy')\n・ものの → tuy...nhưng (nhượng bộ, giữa câu)","r":"「あの時すぐに治療しておけばよかったものを」= đáng lẽ lúc đó chữa trị ngay thì tốt rồi vậy mà.","traps":[{"w":"ばかりに","e":"= chỉ vì X mà → nguyên nhân, không phải tiếc nuối"},{"w":"ことを","e":"= việc X → danh từ hóa"},{"w":"ために","e":"= để / vì → mục đích hoặc nguyên nhân"}]},"12-2021_44":{"s":"〜かと思いきや → tưởng là X nhưng thực ra lại Y (bất ngờ ngược chiều)\n🔗 Cặp dễ lẫn vì giống hình thức:\n・かと思いきや → tưởng là A nhưng thực ra lại B (BẤT NGỜ TRÁI CHIỀU hoàn toàn so với dự đoán)\n・かと思えば → vừa A thì lại B ngay (CHUYỂN BIẾN NHANH liên tiếp, không nhất thiết trái ngược dự đoán)\n→ 思いきや luôn có yếu tố 'tưởng vậy mà không phải vậy'; 思えば chỉ là 'vừa...thì lại...'","r":"「たくさん並んでいたので待たされるかと思いきや、すぐに案内された」= tưởng phải chờ nhưng được dẫn vào ngay.","traps":[{"w":"待たされたかと思えば","e":"= vừa nghĩ là đã chờ thì... → liên tiếp nhanh"},{"w":"待たされることと思い","e":"= nghĩ rằng sẽ phải chờ và... → tiếp tục"},{"w":"待たされたことと思うが","e":"= tuy nghĩ là đã chờ nhưng → nhượng bộ nhẹ"}]},"12-2021_45":{"s":"〜といて → 〜ておいて (khẩu ngữ rút gọn) = đã làm trước mà (trách cứ về hành động làm sẵn)","r":"「自分から言っといて忘れるなんて信じられない」= tự mình nói trước mà lại quên, thật không thể tin.","traps":[{"w":"言えたけど","e":"= dù có nói được thôi → khả năng"},{"w":"言ったせいで","e":"= vì đã nói nên → nguyên nhân trung tính"},{"w":"言ってたとすると","e":"= nếu giả sử đã nói → giả định"}]},"12-2021_46":{"s":"〜からには → một khi đã (nhận được X) thì phải Y (nghĩa vụ/kỳ vọng)","r":"「先生においでいただくからには、地元の名物料理をお出ししたい」= đã nhờ được thầy đến thì muốn đãi món đặc sản địa phương.","traps":[{"w":"おいでくださるにしては","e":"= xét việc thầy đến thì → đánh giá kết quả"},{"w":"おいでいただくにしては","e":"= xét việc được thầy đến thì → đánh giá kết quả"},{"w":"おいでくださるからには","e":"= một khi thầy đến thì → くださる = thầy cho, không phải mình nhận"}]},"12-2021_47":{"s":"〜どころではない → không phải lúc X / hoàn toàn không thể X (hoàn cảnh không cho phép)","r":"「仕事が忙しくて、今年は旅行どころではない」= bận công việc đến mức không phải lúc đi du lịch.","traps":[{"w":"に過ぎない","e":"= chỉ là X thôi → hạ thấp mức độ"},{"w":"にほかならない","e":"= không gì khác ngoài X → khẳng định mạnh"},{"w":"といっても過言ではない","e":"= nói X cũng không ngoa → khẳng định"}]},"12-2021_48":{"s":"〜にもほどがある → cái gì cũng phải có giới hạn chứ! (phê phán mức thái quá)","r":"「猫好きにもほどがある」= thích mèo cũng phải có chừng mực chứ.","traps":[{"w":"のかぎりではない","e":"= không chỉ giới hạn ở đây → mở rộng"},{"w":"のことにかぎる","e":"= chỉ riêng chuyện X → giới hạn"},{"w":"にあるほどでもない","e":"= không đến mức... → phủ định nhẹ, ngược"}]},"12-2021_49":{"s":"〜てもしきれない → dù làm bao nhiêu cũng không đủ (X quá lớn để hoàn thành)","r":"「両親にはどんなに感謝してもしきれない」= dù cảm ơn bao nhiêu cũng không đủ đối với bố mẹ.","traps":[{"w":"感謝しようにもできない","e":"= dù muốn cảm ơn cũng không thể → thiếu điều kiện"},{"w":"感謝しすぎることはない","e":"= không có chuyện cảm ơn quá mức → không thể thái quá"},{"w":"感謝したくてたまらない","e":"= muốn cảm ơn không chịu được → khao khát mạnh"}]},"12-2021_50":{"s":"〜ぐらいだ → chỉ đến mức X thôi (mức tối đa khiêm tốn, không hơn — với せいぜい)","r":"「せいぜい正しい持ち方ができるようになるぐらいだ」= nhiều nhất cũng chỉ đến mức cầm đúng cách thôi.","traps":[{"w":"ようになるほどだ","e":"= đến mức trở nên (ほど = mức tương đối cao hơn) → ほど cao hơn ぐらい"},{"w":"ようにはならないだけだ","e":"= chỉ là không trở thành được → phủ định, sai"},{"w":"ようにはならないはずだ","e":"= chắc hẳn không thể trở thành → phủ định dự đoán"}],"kw":"せいぜい","kw_hint":"せいぜい → cặp cố định với ぐらいだ/しか〜ない (tối đa cũng chỉ...)","kw_loai":"Loại ngay ほどだ (ほど cao hơn せいぜい)"},"07-2022_51":{"s":"いっさい〜ない → tuyệt đối không (phủ định tuyệt đối, không ngoại lệ)","r":"「釘などの金属類はいっさい使わず、木材だけで建てられている」= tuyệt đối không dùng bất kỳ kim loại nào.","traps":[{"w":"あまりに","e":"= quá mức → mức độ"},{"w":"できれば","e":"= nếu có thể → nguyện vọng"},{"w":"どうしても","e":"= dù thế nào cũng → nhất định (khẳng định)"}],"kw":"いっさい","kw_hint":"いっさい → luôn đi với phủ định ない/ず","kw_loai":"Loại ngay あまりに・できれば・どうしても"},"07-2022_52":{"s":"〜と相まって → kết hợp với X (hai yếu tố cộng hưởng tạo ra hiệu quả đẹp/tốt hơn)","r":"「紅葉が澄んだ青空と相まって、なんとも美しかった」= lá đỏ kết hợp với bầu trời xanh tạo nên vẻ đẹp tuyệt vời.","traps":[{"w":"を経て","e":"= sau khi trải qua X → trình tự thời gian"},{"w":"を基に","e":"= dựa trên X → căn cứ"},{"w":"と引きかえに","e":"= đánh đổi X → được cái này mất cái kia"}]},"07-2022_53":{"s":"〜につけ → mỗi khi X (tác nhân kích thích cảm xúc/suy nghĩ định kỳ)","r":"「ふるさとの海を見るにつけ、いつまでもこのままであってほしいと思う」= mỗi khi nhìn biển quê hương lại mong nó mãi như vậy.","traps":[{"w":"にせよ","e":"= dù là X → nhượng bộ"},{"w":"とはいえ","e":"= tuy nói vậy nhưng → nhượng bộ"},{"w":"というのは","e":"= bởi vì / điều gọi là → giải thích"}]},"07-2022_54":{"s":"〜そうにない → có vẻ không thể (dự đoán tiêu cực dựa trên quan sát)","r":"「一度座ったら立ち上がれそうにないぐらい疲れていた」= mệt đến mức trông như không thể đứng dậy được.","traps":[{"w":"立ち上がってはいけないなんて","e":"= không được đứng dậy thật là... → cấm đoán + cảm thán"},{"w":"立ち上がれそうにないなんて","e":"= thật là trông không thể đứng dậy được → cảm thán, thiếu ぐらい"},{"w":"立ち上がってはいけないぐらい","e":"= đến mức không được đứng dậy → cấm đoán, sai nghĩa"}]},"07-2022_55":{"s":"〜ばいいかというと、そうではない → nếu hỏi có phải X là xong không thì không hẳn (phủ nhận đơn giản hóa)","r":"「ただ長く眠ればいいかというと、そうではない」= không phải cứ ngủ nhiều là xong, chất lượng giấc ngủ cũng quan trọng.","traps":[{"w":"眠ればいいというより","e":"= hơn là ngủ nhiều → điều chỉnh so sánh"},{"w":"眠ってもいいかというと","e":"= nếu hỏi có được ngủ không → cho phép, sai ý"},{"w":"眠ってもいいというより","e":"= hơn là được ngủ → điều chỉnh, sai ý"}]},"07-2022_56":{"s":"〜ことから → vì X / xuất phát từ X (nguyên nhân/lý do dẫn đến quyết định)","r":"「対応しきれなくなったことから、今年新しい校舎が建設された」= xuất phát từ việc không thể xử lý được nữa mà xây thêm.","traps":[{"w":"しきれなくなったからには","e":"= một khi đã không thể xử lý nữa thì → nghĩa vụ"},{"w":"するほかなくなったからには","e":"= một khi đã không còn cách nào khác thì → nghĩa vụ"},{"w":"するほかなくなったことから","e":"= từ việc không còn cách nào → するほかなくなった không tự nhiên ở đây"}]},"07-2022_57":{"s":"〜見込みだ → dự kiến X (dự báo có căn cứ — tin tức/thông báo)","r":"「一周年となる来月には1000万人を超える見込みだ」= dự kiến tháng tới kỷ niệm 1 năm sẽ vượt 10 triệu khách.","traps":[{"w":"限りだ","e":"= đến tận cùng / điều duy nhất → mức độ hoặc hạn chế"},{"w":"最中だ","e":"= đang trong lúc X → đang diễn ra"},{"w":"一方だ","e":"= ngày càng X (xu hướng liên tục) → xu hướng, không phải dự báo"}]},"07-2022_58":{"s":"〜てはいられない → không thể cứ ở trạng thái X mãi (cảm giác phải làm gì đó)","r":"「のんびりしてはいられない。レポートを完成させなければ」= không thể cứ thư giãn mãi, phải hoàn thành báo cáo.","traps":[{"w":"するしかない","e":"= chỉ còn cách làm X → không còn lựa chọn"},{"w":"してしかたがない","e":"= cứ X mãi không chịu được → cảm xúc áp đảo"},{"w":"するまでもない","e":"= không cần phải làm đến mức X → không cần thiết"}]},"07-2022_59":{"s":"〜んだっけ → hình như... nhỉ? (xác nhận lại ký ức không chắc — khẩu ngữ)","r":"「ぜいたくのぜいって、漢字でどう書くんだっけ?」= chữ ぜい trong ぜいたく viết kanji thế nào nhỉ? だっけ = không chắc, hỏi lại.","traps":[{"w":"書くんだよね","e":"= viết thế này đúng không? (xác nhận tin tưởng hơn) → xác nhận điều đã biết"},{"w":"書けるんだよね","e":"= viết được chứ nhỉ? → xác nhận khả năng"},{"w":"書けるんだっけ","e":"= có viết được không nhỉ? → hỏi khả năng, không phải cách viết"}]},"07-2022_60":{"s":"〜させるつもりはなかった → không có ý định khiến X (chủ động không có ý muốn làm)","r":"「泣かせるつもりはなかったのだが、妻は感動して泣かれてしまった」= không có ý khiến vợ khóc nhưng vợ lại cảm động mà khóc.","traps":[{"w":"泣くつもりはなかった","e":"= bản thân không có ý khóc → mình khóc, sai chủ thể"},{"w":"泣きたくてたまらなかった","e":"= muốn khóc không chịu được → khao khát của mình"},{"w":"泣かせたくてたまらなかった","e":"= muốn khiến khóc không chịu được → có ý muốn khiến, NGƯỢC"}]},"12-2022_61":{"s":"〜をも → thậm chí cả X (nhấn mạnh X là đối tượng đặc biệt, mở rộng phạm vi)","r":"「著名な料理評論家をも満足させる」= thậm chí làm hài lòng cả những nhà phê bình ẩm thực nổi tiếng.","traps":[{"w":"とを","e":"= sai ngữ pháp → と và を không kết hợp"},{"w":"にまで","e":"= đến cả / thậm chí đến → nhấn mạnh phạm vi vật lý"},{"w":"までが","e":"= đến cả X cũng → nhấn mạnh cực điểm, tương tự nhưng をも thông dụng hơn"}]},"12-2022_62":{"s":"いつか → có lúc nào đó (trong quá khứ hoặc tương lai, không xác định)","r":"「この町にはいつか来たことがある」= tôi đã đến thị trấn này vào lúc nào đó trước đây.","traps":[{"w":"また","e":"= lại / một lần nữa → lần tiếp theo, không phải mơ hồ trong quá khứ"},{"w":"ついに","e":"= cuối cùng (sau thời gian chờ đợi) → kết quả đạt được"},{"w":"まもなく","e":"= sắp / không lâu nữa → tương lai gần"}]},"12-2022_63":{"s":"〜をもって → lấy X làm mốc kết thúc (thông báo chính thức). Nghĩa ① của をもって","r":"「本年3月15日をもって閉館しました」= lấy ngày 15/3 năm nay làm mốc đóng cửa.","traps":[{"w":"につき","e":"= vì lý do / mỗi X → lý do hoặc đơn vị"},{"w":"に至るまで","e":"= đến tận X / kể cả X → phạm vi"},{"w":"を皮切りに","e":"= lấy X làm khởi đầu → NGƯỢC, bắt đầu không phải kết thúc"}]},"12-2022_64":{"s":"〜まま → cứ theo như vậy, theo đúng trạng thái đó (không kháng cự, thuận theo)","r":"「友人に誘われるまま、テニス部に入った」= cứ theo lời bạn rủ mà vào câu lạc bộ tennis.","traps":[{"w":"誘われようが","e":"= dù có được rủ → nhượng bộ"},{"w":"誘われた上に","e":"= thêm vào việc được rủ → liệt kê thêm"},{"w":"誘われない限り","e":"= trừ khi không được rủ → điều kiện phủ định"}]},"12-2022_65":{"s":"〜を除いて → trừ X ra, ngoại trừ X (điều kiện ngoại lệ)","r":"「商品に欠陥がある場合を除いて、返品はお受けできません」= ngoại trừ trường hợp hàng có lỗi, không nhận trả hàng.","traps":[{"w":"点に加えて","e":"= thêm vào điểm đó → bổ sung"},{"w":"点を除いて","e":"= trừ điểm đó ra → gần đúng nhưng 場合 (trường hợp) tự nhiên hơn 点 ở đây"},{"w":"場合に加えて","e":"= thêm vào trường hợp đó → bổ sung, sai nghĩa"}]},"12-2022_66":{"s":"存じます → khiêm nhường của 思う (thư từ trang trọng với đối tác/cấp trên)","r":"「お忙しいとは存じますが、ご確認いただければ幸いです」= tôi hiểu ông/bà bận, nhưng rất mong được xác nhận.","traps":[{"w":"いたします","e":"= khiêm nhường của します → hành động, không phải suy nghĩ"},{"w":"いらっしゃいます","e":"= kính ngữ của います → hành động của người trên"},{"w":"申し上げます","e":"= khiêm nhường của 言う → nói"}]},"12-2022_67":{"s":"〜てからというもの → kể từ khi X thì (thay đổi lớn kể từ mốc thời gian đó)","r":"「社会人になってからというもの、運動する機会がすっかり減ってしまった」= kể từ khi đi làm thì cơ hội vận động giảm hẳn.","traps":[{"w":"なってからであっても","e":"= ngay cả khi đã trở thành → nhượng bộ"},{"w":"なったばかりなのか","e":"= mới chỉ vừa trở thành phải không? → hỏi thời điểm"},{"w":"なったばかりだとして","e":"= giả sử chỉ vừa mới trở thành → giả định"}]},"12-2022_68":{"s":"〜っぱなし → để nguyên trạng thái X, cứ X mãi (hành động tiếp diễn không kết thúc hoặc để dở)","r":"「ズボンのポケットに入れっぱなしだった」= để nguyên trong túi quần mãi. っぱなし = hành động tiếp diễn/để dở.","traps":[{"w":"入れたつもり","e":"= cứ tưởng là đã bỏ vào → ký ức sai"},{"w":"入れっこなかった","e":"= không thể nào đã bỏ vào (phủ định mạnh) → không thể"},{"w":"入れるべきではなかった","e":"= đáng lẽ không nên bỏ vào → hối hận về hành động"}]},"12-2022_69":{"s":"〜なんてもんじゃない → không phải chỉ là X đâu (X là quá nhỏ so với thực tế)","r":"「広いなんてもんじゃないよ、1日じゃ全部回れなかった」= không phải chỉ là rộng đâu, 1 ngày không đi hết được.","traps":[{"w":"広くないはずなんだよ","e":"= hẳn là không rộng đâu → phủ định, NGƯỢC"},{"w":"広いなんてことはないよ","e":"= không có chuyện rộng đâu → phủ định, NGƯỢC"},{"w":"広くないわけじゃないんだよ","e":"= không phải là không rộng (phủ định kép) → dè dặt, khác sắc thái"}]},"12-2022_70":{"s":"〜たものだ → thường hay làm X (hồi tưởng thói quen trong quá khứ, cảm xúc nhớ nhung)\n🔗 Họ ものを/ものか/ものだ/ものの dễ lẫn:\n・ものを → tiếc nuối/bực bội, đi cặp 〜ば...ものを, luôn ở CUỐI câu\n・ものか → đời nào/không thể... được sao (phủ định mạnh hoặc than thở)\n・ものだ → cảm thán/quy luật tự nhiên ('hóa ra là vậy')\n・ものの → tuy...nhưng (nhượng bộ, giữa câu)","r":"「小さい頃は、よく父のバイクの後ろに乗りたがったものだ」= hồi nhỏ hay đòi ngồi sau xe máy của ba.","traps":[{"w":"乗りたがったところだ","e":"= đúng lúc muốn ngồi lên → thời điểm, không phải hồi ký"},{"w":"乗って欲しがったものだ","e":"= hay muốn cho người khác lên → sai chủ thể"},{"w":"乗って欲しがったところだ","e":"= đúng lúc muốn cho người khác lên → sai chủ thể và thời điểm"}]},"07-2023_1":{"s":"〜に思う → cảm thấy X (với に trong cụm cố định như 誇りに思う, 不思議に思う)","r":"「弟のことを誇りに思う」= cảm thấy tự hào về em trai. 誇りに思う là cụm cố định.","traps":[{"w":"を","e":"= 誇りを思う không tự nhiên → tân ngữ sai"},{"w":"で","e":"= 誇りで思う vô nghĩa → sai"},{"w":"が","e":"= 誇りが思う vô nghĩa → sai"}]},"07-2023_2":{"s":"〜からしか〜ない → chỉ có thể từ X mà (X là nguồn duy nhất)","r":"「失敗からしか学べないこともある」= có những điều chỉ học được từ thất bại thôi.","traps":[{"w":"にまで","e":"= đến cả / thậm chí đến → phạm vi mở rộng"},{"w":"まででも","e":"= ngay cả đến X → nhượng bộ"},{"w":"だけから","e":"= chỉ từ X → gần nghĩa nhưng からしか〜ない tự nhiên hơn"}]},"07-2023_3":{"s":"〜そのものだ → chính là X, đúng là X (nhấn mạnh bản chất, không có gì khác)","r":"「子供たちの表情は、真剣そのものだった」= biểu cảm của các em chính là sự nghiêm túc. そのもの = chính bản thân nó.","traps":[{"w":"真剣で","e":"= bằng sự nghiêm túc → trạng từ, không phải vị ngữ danh từ"},{"w":"真剣に","e":"= một cách nghiêm túc → trạng từ"},{"w":"真剣な","e":"= nghiêm túc (tính từ) → tính từ, 真剣そのもの mạnh hơn"}]},"07-2023_4":{"s":"〜うちに → trong quá trình X (điều gì đó dần dần nhận ra/thay đổi)","r":"「一緒に仕事をするうちに、実はよくしゃべる人だとわかった」= trong quá trình làm việc cùng mới dần nhận ra là người hay nói.","traps":[{"w":"する間","e":"= trong khoảng thời gian làm → khoảng thời gian cụ thể hơn"},{"w":"する限り","e":"= chừng nào còn làm → điều kiện tiếp diễn"},{"w":"するとしたら","e":"= nếu giả sử làm thì → giả định"}]},"07-2023_5":{"s":"〜ていたところ → đang trong tình huống X thì (thời điểm gặp sự kiện bổ sung)","r":"「荷造りができずにいたところ、友人が教えてくれた」= đang trong tình cảnh không thể đóng hộp thì bạn chỉ cho dịch vụ.","traps":[{"w":"できずにいたなら","e":"= nếu không thể thì → điều kiện giả định"},{"w":"できないようにしたら","e":"= nếu làm cho không thể thì → sai nghĩa"},{"w":"できないようにしたところ","e":"= vào lúc làm cho không thể → sai nghĩa"}]},"07-2023_6":{"s":"〜んじゃないかというぐらい → đến mức tưởng chừng như X (so sánh mức độ cực đoan)","r":"「雪が降るんじゃないかというぐらい寒かった」= lạnh đến mức tưởng chừng như sắp có tuyết.","traps":[{"w":"降ることがあるかのように","e":"= như thể có thể có tuyết → so sánh giả định nhẹ hơn"},{"w":"降るなんて思えないぐらい","e":"= đến mức không ngờ lại có tuyết → không có khả năng, NGƯỢC"},{"w":"降るとは思えないように","e":"= như không thể nghĩ là có tuyết → phủ định khả năng"}]},"07-2023_7":{"s":"〜なくもない → không phải là không thể (khẳng định dè dặt — có thể nhưng không dễ)","r":"「歩こうと思えば歩けなくもない」= nếu muốn đi bộ thì không phải là không đi được.","traps":[{"w":"歩くほかない","e":"= chỉ còn cách đi bộ → bắt buộc, không còn lựa chọn"},{"w":"歩いてはいられない","e":"= không thể cứ đi bộ mãi → không thể ở trạng thái đó"},{"w":"歩けるわけがない","e":"= không thể nào đi bộ được → phủ định hoàn toàn, NGƯỢC"}]},"07-2023_8":{"s":"おいでくださる → kính ngữ của 来る (ông/bà/các vị đã đến — kính trọng cao)\n🔗 Họ kính ngữ của 来る (đến) dễ lẫn — phân biệt theo CHIỀU di chuyển:\n・見える, おいでになる, お越しになる, おいでくださる → DÙNG khi KHÁCH/người trên ĐẾN chỗ mình (tôn trọng hành động đến của họ)\n・上がる, まいる → khiêm nhường khi MÌNH đến chỗ khách/người trên\n→ Luôn hỏi: ai đang di chuyển đến đâu? Người được kính trọng đến = dùng kính ngữ (見える/おいでになる); mình đến = khiêm nhường (上がる/まいる)","r":"「たくさんの方がおいでくださいました」= nhiều quý vị đã đến.","traps":[{"w":"お越しいただきました","e":"= khiêm nhường nhận việc (quý vị) đến → góc nhìn khiêm nhường của người tổ chức"},{"w":"ご参加いただきました","e":"= nhận được sự tham gia → nhấn mạnh tham gia, không phải đến"},{"w":"ご覧くださいました","e":"= quý vị đã xem → hành động xem, không phải đến"}]},"07-2023_9":{"s":"〜たつもりになれる → có thể tự cảm thấy như đã X (tự tạo cảm giác dù chưa thực sự làm)","r":"「ここを訪れるだけで海外を旅行したつもりになれる」= chỉ đến đây đã có thể cảm thấy như đi du lịch nước ngoài.","traps":[{"w":"するつもりでいる","e":"= đang có ý định làm → kế hoạch thực tế"},{"w":"してくるつもりだ","e":"= định sẽ đến làm rồi về → kế hoạch"},{"w":"するつもりになっていた","e":"= đã có ý định (quá khứ) → ý định quá khứ"}]},"07-2023_10":{"s":"〜んだもん → vì mà... (biện hộ lý do, khẩu ngữ — もの rút gọn)","r":"「自分で買わなくてもたくさんの本が読めるんだもん」= vì ở đây có thể đọc nhiều sách mà không cần mua kia mà.","traps":[{"w":"読めるもんか","e":"= đời nào mà đọc được! → phủ định mạnh, NGƯỢC"},{"w":"読みたいんだもん","e":"= vì muốn đọc mà → lý do là muốn, không phải có thể"},{"w":"読みたいもんか","e":"= đời nào muốn đọc! → phủ định mạnh"}]},"12-2023_11":{"s":"〜を機に → nhân dịp X, lấy X làm cơ hội để thay đổi/bắt đầu điều mới","r":"「引っ越しを機に、古い冷蔵庫を買い替えた」= nhân dịp chuyển nhà mà thay tủ lạnh mới.","traps":[{"w":"を皮切りに","e":"= lấy X làm khởi đầu chuỗi sự kiện → nhiều sự kiện tiếp theo"},{"w":"に基づいて","e":"= dựa trên X (nguyên tắc/căn cứ) → căn cứ"},{"w":"にわたって","e":"= trải dài suốt (phạm vi) → phạm vi"}]},"12-2023_12":{"s":"〜あっての → X mới tồn tại được nhờ có Y (Y là điều kiện không thể thiếu của X)","r":"「会社は社員あってのものだ」= công ty tồn tại được là nhờ có nhân viên. あっての = chỉ có nhờ Y mới có X.","traps":[{"w":"たる","e":"= là (tư cách, văn cổ) → mô tả tư cách xứng đáng"},{"w":"における","e":"= trong/tại X → địa điểm/phạm vi"},{"w":"ならではの","e":"= đặc trưng riêng của X → độc đáo"}]},"12-2023_13":{"s":"〜ては → mỗi lần X thì Y (lặp đi lặp lại, thói quen định kỳ)","r":"「つらいときに読み返しては元気をもらっている」= mỗi lần đọc lại là lại được tiếp thêm năng lượng.","traps":[{"w":"読み返すべく","e":"= nhằm mục đích đọc lại → mục đích"},{"w":"読み返すならば","e":"= nếu đọc lại thì → điều kiện"},{"w":"読み返してこそ","e":"= chính khi đọc lại mới... → nhấn mạnh điều kiện lý tưởng"}]},"12-2023_14":{"s":"〜せいか → có lẽ vì X (suy đoán nguyên nhân — không chắc chắn 100%)","r":"「寝てばかりいたせいか、今日は体がだるい」= có lẽ vì cứ nằm ngủ mãi nên hôm nay người mệt mỏi.","traps":[{"w":"寝たことにしたせいか","e":"= có lẽ vì coi như đã ngủ → giả vờ ngủ, sai"},{"w":"寝たことにしたとすると","e":"= nếu giả sử coi như đã ngủ → giả định"},{"w":"寝てばかりいたとすると","e":"= nếu giả sử cứ nằm ngủ → giả định, không phải nguyên nhân"}]},"12-2023_15":{"s":"〜といたしましては → về phía tôi / theo quan điểm của tôi (kính ngữ trang trọng cho bản thân)","r":"「私個人といたしましては、その必要性を感じております」= về phía cá nhân tôi thì cảm thấy điều đó là cần thiết.","traps":[{"w":"によりますと","e":"= theo X (trích dẫn nguồn) → trích dẫn thông tin"},{"w":"といいますと","e":"= nếu nói là X thì → yêu cầu giải thích thêm"},{"w":"におかれましては","e":"= về phía ông/bà (kính ngữ cao) → dùng cho người được kính trọng, không phải bản thân"}]},"12-2023_16":{"s":"〜はいいが → X thì được rồi nhưng (thừa nhận đã làm nhưng có vấn đề theo sau)","r":"「高性能のパソコンを買ったはいいが、全く使いこなせていない」= mua máy tính tốt rồi đó nhưng lại không biết dùng.","traps":[{"w":"買ったばかりでも","e":"= dù chỉ vừa mới mua → nhượng bộ thời gian"},{"w":"買ったかにかかわらず","e":"= bất kể có mua hay không → không phân biệt"},{"w":"買ったきりなのに","e":"= vậy mà chỉ mua xong rồi để đó → gần nghĩa nhưng はいいが tự nhiên hơn"}]},"12-2023_17":{"s":"〜思いをする → có cảm giác/trải qua cảm xúc X (cụm cố định diễn tả trải nghiệm cảm xúc)","r":"「店員の失礼な態度に大変不快な思いをした」= đã trải qua cảm giác rất khó chịu vì thái độ thô lỗ.","traps":[{"w":"不快極まりない","e":"= cực kỳ khó chịu → mức độ, không phải trải nghiệm"},{"w":"不快だったことか","e":"= thật là đã khó chịu làm sao → cảm thán quá khứ"},{"w":"不快にもほどがある","e":"= sự khó chịu cũng phải có giới hạn chứ → phê phán thái quá"}]},"12-2023_18":{"s":"見える → kính ngữ của 来る khi khách/người trên đến chỗ mình (= おいでになる)\n🔗 Họ kính ngữ của 来る (đến) dễ lẫn — phân biệt theo CHIỀU di chuyển:\n・見える, おいでになる, お越しになる, おいでくださる → DÙNG khi KHÁCH/người trên ĐẾN chỗ mình (tôn trọng hành động đến của họ)\n・上がる, まいる → khiêm nhường khi MÌNH đến chỗ khách/người trên\n→ Luôn hỏi: ai đang di chuyển đến đâu? Người được kính trọng đến = dùng kính ngữ (見える/おいでになる); mình đến = khiêm nhường (上がる/まいる)","r":"「ABC銀行の山下さんが見えました」= Ông Yamashita từ ngân hàng ABC đã đến. 見える = kính ngữ của 来る (khách đến chỗ mình).","traps":[{"w":"参りました","e":"= khiêm nhường của 来る/行く → hành động của mình, không phải của khách"},{"w":"うかがいました","e":"= khiêm nhường của 聞く/訪問する → mình đến chỗ người trên"},{"w":"お目にかかりました","e":"= khiêm nhường của 会う → gặp mặt"}]},"12-2023_19":{"s":"〜ようとしている → đang chuẩn bị X, sắp X (hành động chuẩn bị diễn ra ngay)","r":"「今年ももうすぐ終わろうとしている」= năm nay cũng sắp kết thúc rồi.","traps":[{"w":"終わろうとする","e":"= cố kết thúc (ý chí) → chủ động cố tình"},{"w":"終わるようにする","e":"= làm cho kết thúc → sai khiến"},{"w":"終わるようにしている","e":"= đang cố làm cho kết thúc → chủ động điều chỉnh"}]},"12-2023_20":{"s":"〜に決まっている → chắc chắn X, đương nhiên là X (phán đoán mạnh mẽ)","r":"「ミスはしないほうがいいに決まっている」= đương nhiên là không mắc lỗi thì tốt hơn rồi.","traps":[{"w":"してはいけないわけがない","e":"= không có lý gì không được làm → phủ định kép, NGƯỢC"},{"w":"してはいけないはずだった","e":"= đáng lẽ không được làm → kỳ vọng quá khứ"},{"w":"しないほうがいいとは限らない","e":"= không nhất thiết là không nên làm → phủ nhận chắc chắn, NGƯỢC"}]},"07-2024_21":{"s":"〜はする → V は する = có làm X nhưng... (thừa nhận có làm, kèm hạn chế)","r":"「まだ使えはするが、使う機会がなさそう」= dùng thì vẫn dùng được đấy, nhưng có vẻ không có dịp dùng.","traps":[{"w":"すら","e":"= ngay cả (mức tối thiểu đáng ngạc nhiên) → nhấn mạnh mức đáng ngạc nhiên"},{"w":"さえ","e":"= ngay cả / chỉ cần → điều kiện tối thiểu"},{"w":"も","e":"= cũng → liệt kê thêm"}]},"07-2024_22":{"s":"〜にしては → xét ra thì (kết quả vượt hoặc dưới mong đợi so với X)","r":"「わずか27歳にしては市長となった」= mới 27 tuổi mà đã trở thành thị trưởng, thật đáng ngạc nhiên.","traps":[{"w":"にあたって","e":"= nhân dịp / khi → thời điểm đặc biệt"},{"w":"に際して","e":"= nhân dịp / khi (trang trọng hơn) → thời điểm"},{"w":"に先立って","e":"= trước khi / trước dịp → trước sự kiện"}]},"07-2024_23":{"s":"お越しになる → kính ngữ của 来る/行く (ông/bà đến/đi — kính trọng cao)\n🔗 Họ kính ngữ của 来る (đến) dễ lẫn — phân biệt theo CHIỀU di chuyển:\n・見える, おいでになる, お越しになる, おいでくださる → DÙNG khi KHÁCH/người trên ĐẾN chỗ mình (tôn trọng hành động đến của họ)\n・上がる, まいる → khiêm nhường khi MÌNH đến chỗ khách/người trên\n→ Luôn hỏi: ai đang di chuyển đến đâu? Người được kính trọng đến = dùng kính ngữ (見える/おいでになる); mình đến = khiêm nhường (上がる/まいる)","r":"「当センターにお越しになる際は、事前にご連絡を」= khi ông/bà đến trung tâm, xin liên hệ trước.","traps":[{"w":"伺って以来","e":"= kể từ khi tôi đến thăm → hành động của mình (khiêm nhường)"},{"w":"伺う際は","e":"= khi tôi đến thăm → khiêm nhường của 訪問する, sai chủ thể"},{"w":"お越しになって以来","e":"= kể từ khi ông/bà đến → từ lần đến đó, khác với mỗi khi đến"}]},"07-2024_24":{"s":"〜はともかく → X thì tạm gác lại (không quan tâm đến X, tập trung điều khác)","r":"「実際になるかどうかはともかく、そう言ってくれたことがうれしい」= bất kể có thực sự thành hay không, vui vì con nói vậy.","traps":[{"w":"なるかどうかに限らず","e":"= bất kể có thành hay không → gần nghĩa nhưng はともかく tự nhiên hơn"},{"w":"ならざるを得ないとしても","e":"= dù không thể không trở thành → bất đắc dĩ"},{"w":"ならざるを得ないばかりか","e":"= không những bất đắc dĩ phải trở thành → thêm vào"}]},"07-2024_25":{"s":"あたかも〜かのごとく → như thể là X (so sánh giả thuyết — văn trang trọng/cổ điển)","r":"「事実であるかのごとく報道された」= được đưa tin như thể là sự thật vậy. かのごとく = như thể (văn trang trọng).","traps":[{"w":"までもなく","e":"= không cần đến mức X → không cần thiết"},{"w":"がゆえに","e":"= chính vì X (nguyên nhân) → nguyên nhân"},{"w":"からには","e":"= một khi đã X → nghĩa vụ"}]},"07-2024_26":{"s":"〜始末だ → cuối cùng lại ra nông nỗi X (kết cục tệ hại — liệt kê các chuyện xấu xảy ra liên tiếp)","r":"「自転車はパンクするし、財布はなくすし、しまいには大雨に降られる始末だった」= rốt cuộc là bị mưa ướt hết.","traps":[{"w":"最中だった","e":"= đang trong lúc X → đang diễn ra, không phải kết cục"},{"w":"思いだった","e":"= là cảm giác X → trải nghiệm cảm xúc"},{"w":"限りだった","e":"= đến tận cùng / cực kỳ → mức độ"}]},"07-2024_27":{"s":"〜だけのことだ → chỉ là vì vậy thôi (giảm nhẹ, không phải lý do phức tạp)","r":"「単に実力が足りなかっただけのことだ」= đơn giản chỉ là thiếu thực lực thôi. だけのことだ = không có lý do gì khác.","traps":[{"w":"だけある","e":"= xứng đáng với / đúng như kỳ vọng → kết quả hợp lý"},{"w":"ものがある","e":"= có điều gì đó đáng chú ý → đánh giá cao"},{"w":"ようなものだ","e":"= giống như là → so sánh"}],"kw":"単に","kw_hint":"単に → cặp cố định với にすぎない/だけのことだ","kw_loai":"Loại ngay だけある・ものがある・ようなものだ (những cái này không hạ thấp)"},"07-2024_28":{"s":"〜かねない → có nguy cơ X (điều không mong muốn có thể xảy ra — cảnh báo)","r":"「これでもう暑さに悩まされかねない」= → Bẫy: đây là câu sau khi SỬA XONG rồi nên nghĩa là 'sẽ không còn bị khổ sở vì nóng nữa'. Đáp án đúng là 悩まされかねない nhưng nghĩa âm tính.","traps":[{"w":"悩まされかねない","e":"= có nguy cơ bị làm khổ (bị động) → ĐÁP ÁN ĐÚNG thực ra: nhưng câu hỏi này có bẫy về chủ thể"},{"w":"悩ませかねない","e":"= có nguy cơ khiến người khác khổ (chủ động) → sai chủ thể, mình không khiến ai"},{"w":"悩まされることはない","e":"= sẽ không bị làm khổ → phủ định, ngược với nguy cơ"},{"w":"悩ませることはない","e":"= sẽ không khiến người khác khổ → chủ động phủ định"}]},"07-2024_29":{"s":"〜見込みです → dự kiến X (dự báo có căn cứ — tin tức/thông báo)","r":"「西日本を中心に風雨が強まる見込みです」= dự báo gió và mưa sẽ mạnh hơn ở miền Tây Nhật Bản.","traps":[{"w":"強めつつあります","e":"= đang dần mạnh lên → quá trình đang xảy ra"},{"w":"強める見込みです","e":"= dự kiến (ai đó) làm mạnh hơn → chủ động, sai chủ thể"},{"w":"強まりつつあります","e":"= đang dần mạnh hơn → quá trình hiện tại, không phải dự báo"}]},"07-2024_30":{"s":"〜たがるものです → thường hay muốn X (quy luật tự nhiên về tâm lý/hành vi)\n🔗 Họ ものを/ものか/ものだ/ものの dễ lẫn:\n・ものを → tiếc nuối/bực bội, đi cặp 〜ば...ものを, luôn ở CUỐI câu\n・ものか → đời nào/không thể... được sao (phủ định mạnh hoặc than thở)\n・ものだ → cảm thán/quy luật tự nhiên ('hóa ra là vậy')\n・ものの → tuy...nhưng (nhượng bộ, giữa câu)","r":"「3歳前後の子供は、何でも知りたがるものです」= trẻ khoảng 3 tuổi thường muốn biết mọi thứ. ものだ = quy luật tự nhiên.","traps":[{"w":"知りたそうなものです","e":"= trông có vẻ muốn biết → bề ngoài/vẻ ngoài"},{"w":"知りたがることです","e":"= việc muốn biết → danh từ hóa, không phải mô tả quy luật"},{"w":"知りそうなことです","e":"= điều có vẻ sẽ biết → dự đoán"}]},"12-2024_31":{"s":"〜だけ無駄だ → chỉ là lãng phí X thôi (hành động X không có ích gì)","r":"「どうせ当たらないんだから、買うだけ無駄だ」= vì thế nào cũng không trúng nên mua chỉ là lãng phí thôi.","traps":[{"w":"より","e":"= hơn là / từ → so sánh hoặc nguồn"},{"w":"のみ","e":"= chỉ (văn trang trọng) → hạn chế, ít thông dụng hơn だけ ở đây"},{"w":"には","e":"= cho / về → mục đích hoặc chủ đề"}]},"12-2024_32":{"s":"〜を受けて → dựa trên X, phản ứng với X (nhận ảnh hưởng gián tiếp)","r":"「健康意識の高まりを受けて健康食品は急成長している」= do tác động của ý thức sức khỏe tăng cao, thực phẩm chức năng tăng trưởng mạnh.","traps":[{"w":"に次いで","e":"= đứng sau X / tiếp theo sau X → thứ tự xếp hạng"},{"w":"にわたって","e":"= trải dài suốt → phạm vi"},{"w":"をめぐって","e":"= xoay quanh X (tranh luận) → vấn đề tranh cãi"}]},"12-2024_33":{"s":"〜なり → ngay khi vừa X thì (hành động tiếp theo xảy ra tức thì, không chần chừ)","r":"「家に帰るなり食事もとらず、寝てしまった」= ngay khi vừa về nhà là không ăn tối gì, ngủ luôn.","traps":[{"w":"帰り次第","e":"= ngay khi về đến (và sau đó làm Y) → hành động cụ thể tiếp theo"},{"w":"帰ったなり","e":"= về rồi cứ ở đó mãi không làm gì (帰ったなり = về rồi không động đậy) → trạng thái bất động"},{"w":"帰るとなれば","e":"= nếu nói đến chuyện về thì → điều kiện/chuyển chủ đề"}]},"12-2024_34":{"s":"〜以上 → một khi có nguy cơ X thì phải Y (nghĩa vụ tất yếu từ nguyên nhân đã xác định)","r":"「不正アクセスの恐れがある以上、やむを得ない」= một khi có nguy cơ bị truy cập trái phép thì bất đắc dĩ phải làm vậy.","traps":[{"w":"しかない以上","e":"= một khi đã không còn cách nào khác thì → bắt buộc, không phải nguy cơ"},{"w":"しかない反面","e":"= trong khi không còn cách nào khác thì → tương phản"},{"w":"恐れがある反面","e":"= trong khi có nguy cơ X thì → tương phản, không phải nghĩa vụ"}]},"12-2024_35":{"s":"〜きれない → không thể làm hết được (quá nhiều/quá lớn để hoàn thành)","r":"「一日では見きれないほどの作品が展示されていた」= triển lãm nhiều tác phẩm đến mức 1 ngày không xem hết.","traps":[{"w":"見ずにはいられないほどの","e":"= nhiều đến mức không thể không xem → muốn xem, không phải không thể xem hết"},{"w":"見きれないといった","e":"= đại loại là không xem hết được → gần nghĩa nhưng ほど tự nhiên hơn"},{"w":"見ずにはいられないといった","e":"= đại loại là không thể không xem → muốn xem, sai nghĩa"}]},"12-2024_36":{"s":"〜たいところだが → muốn làm X lắm nhưng (ý muốn rõ ràng nhưng thực tế cản trở)","r":"「余計な出費を押さえたいところだが、友人に誘われたスキー旅行に行くことにした」= muốn tiết kiệm lắm nhưng vẫn đi trượt tuyết.","traps":[{"w":"押さえたら抑えたで","e":"= nếu tiết kiệm được thì lại có vấn đề khác → nghịch lý"},{"w":"抑えられるものなら","e":"= nếu có thể tiết kiệm được thì → ao ước điều khó"},{"w":"抑えるには抑えずに","e":"= không phải cấu trúc tự nhiên → sai"}]},"12-2024_37":{"s":"〜てみせる → làm được X để chứng minh (thực sự làm và cho người khác thấy kết quả)","r":"「その小学生は高校レベルの問題をすらすらと解いてみせた」= em học sinh tiểu học đó đã giải suôn sẻ và chứng minh được.","traps":[{"w":"解けるとは","e":"= thật không ngờ là giải được → cảm thán bất ngờ"},{"w":"解けるものなら","e":"= nếu có thể giải thì (thử đi) → thách thức"},{"w":"解いたまでだ","e":"= chỉ là đã giải thôi → hạ thấp, không có ý chứng minh"}]},"12-2024_38":{"s":"〜という → truyền đạt thông tin nghe/đọc được (trích dẫn thông tin từ người khác/nguồn khác)","r":"「専門家の話では、かつてこの地域は海だったという」= theo lời chuyên gia, vùng này từng là biển.","traps":[{"w":"といえる","e":"= có thể nói là → đánh giá/khẳng định của người nói"},{"w":"といった","e":"= chẳng hạn như / kiểu như → liệt kê ví dụ"},{"w":"といわれる","e":"= được nói là / người ta nói là → thông tin phổ biến, không nhất thiết từ nguồn cụ thể"}]},"12-2024_39":{"s":"〜わけではない → không có nghĩa là X, không nhất thiết là X (phủ nhận kết luận tuyệt đối)","r":"「親の経済状況によって子どもの教育機会が奪われることであるわけではない」= không có nghĩa là điều kiện kinh tế nhất thiết dẫn đến tước cơ hội giáo dục.","traps":[{"w":"があるわけではない","e":"= không có nghĩa là có X → phủ nhận sự tồn tại"},{"w":"があってはならない","e":"= không được có X → cấm đoán"},{"w":"であってはならない","e":"= không được là X → cấm đoán mạnh, không phải phủ nhận kết luận"}]},"12-2024_40":{"s":"〜なんかでいいんですか → tôi mà được sao? (tự ti, khiêm tốn về bản thân — khẩu ngữ)","r":"「私なんかでいいんですか」= người như tôi mà được sao? なんか = nhấn mạnh sự khiêm tốn/tự ti.","traps":[{"w":"だったらいいんですか","e":"= nếu là X thì được sao? → hỏi điều kiện"},{"w":"だったらいいんでしょう","e":"= nếu là X thì hẳn là được nhỉ → suy đoán"},{"w":"なんかでいいんでしょうか","e":"= gần đúng nhưng でしょうか lịch sự hơn → ít tự nhiên hơn đáp án"}]},"07-2025_26":{"s":"〜こそ → chính X mới... (nhấn mạnh điều kiện — ở đây: chính việc tiết kiệm bằng cách nhịn thứ mình thích mới không bền)","r":"「好きなことを我慢してこそする節約」= chính kiểu tiết kiệm bằng cách nhịn thứ mình thích mới không thể kéo dài. こそ nhấn mạnh chủ đề câu.","traps":[{"w":"さえ","e":"= ngay cả / chỉ cần → さえ〜ば là điều kiện, không hợp ngữ cảnh nhấn mạnh"},{"w":"まで","e":"= đến mức / thậm chí → không tạo nghĩa nhấn mạnh ở đây"},{"w":"のみ","e":"= chỉ (văn trang trọng) → mang nghĩa hạn chế, không phải nhấn mạnh"}]},"07-2025_27":{"s":"〜にあっても → ngay cả trong/dù trong hoàn cảnh X (nhượng bộ — dù điều kiện tốt như vậy vẫn chưa giải quyết được)","r":"「脳科学の研究が進んだ現代にあっても」= ngay cả trong thời hiện đại mà não học đã tiến bộ vẫn còn nhiều điều chưa rõ. にあっても = trong hoàn cảnh X nhưng vẫn Y.","traps":[{"w":"に至っては","e":"= đến mức / nói đến trường hợp X thì (cực đoan hơn) → không phải nhượng bộ"},{"w":"をめぐって","e":"= xoay quanh X (tranh luận/thảo luận) → không phù hợp"},{"w":"を踏まえて","e":"= dựa trên X, căn cứ vào X → không phải nhượng bộ"}]},"07-2025_28":{"s":"〜だろうが〜だろうが → dù là X hay Y đi nữa (nhượng bộ liệt kê, bất chấp)","r":"「先輩だろうが上司だろうが」= dù là đàn anh hay cấp trên đi nữa. Khi câu văn có ý 'bất kể đối phương là ai' → dùng だろうが...だろうが.","traps":[{"w":"先輩やら上司やら","e":"= đàn anh hay cấp trên này nọ (liệt kê thực tế, không phải nhượng bộ) → sai nghĩa"},{"w":"先輩なり上司なり","e":"= đàn anh hay cấp trên gì đó (không cụ thể, tùy chọn) → không phải bất chấp"},{"w":"先輩というか上司というか","e":"= không biết gọi là đàn anh hay cấp trên nữa (lưỡng lự) → không phải nhượng bộ"}]},"07-2025_29":{"s":"〜というときに限って → đúng lúc mà... thì (nhấn mạnh sự trùng hợp đáng bực bội)","r":"「今日だけは遅刻できないというときに限って、電車が遅れる」= đúng hôm nay không thể trễ thì tàu lại trễ. というときに限って nhấn mạnh mạnh hơn ときに限って.","traps":[{"w":"ときに限って","e":"= đúng lúc X thì → đúng nghĩa nhưng thiếu という nên không đủ nhấn mạnh ngữ cảnh 'đúng hôm nay'"},{"w":"ことに反して","e":"= trái với X → trái với điều gì đó, không phải trùng hợp bực bội"},{"w":"ということに反して","e":"= trái với điều gọi là X → sai ngữ cảnh"}]},"07-2025_30":{"s":"〜としながらも → trong khi lấy X làm đề tài/hình thức nhưng (Y lại là nội dung thực chất khác)","r":"「政界の権力争いを題材としながらも、描かれているのは家族のきずな」= tuy lấy đề
