.card{background:white;border-radius:16px;padding:18px 16px;border:1px solid #e8eaed;box-shadow:0 1px 4px rgba(0,0,0,.05)}

.kw-loai{font-size:12.5px;color:#b45309;line-height:1.5}
.exp{margin-top:10px;background:#faf5ff;border:1px solid #e9d5ff;border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}

.exp-lbl-s{font-weight:700;color:#7c3aed}
.exp-r{font-size:13.5px;line-height:1.7;color:#1f2937}

.speak-opt-btn:hover{background:#eff6ff;border-color:#93c5fd;color:#2563eb}
.speak-opt-btn.speaking{background:#eff6ff;border-color:#3b82f6;color:#2563eb}

.restart-btn{background:#1a1a2e;color:white;border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin:4px}

/* Wrong list */

<script>
const QUESTIONS=[{"num":1,"year":"07-2010","jp":"この美術館の絵を全部見ようと思ったら、半日【では】足りないと思います。","vn":"Nếu định xem hết tất cả các bức tranh trong bảo tàng này, tôi nghĩ nửa ngày là không đủ.","answer":"では","options":["a. にわたって","b. にかけて","c. までは","d. では"],"id":"07-2010_1"},{"num":2,"year":"07-2010","jp":"部屋の広さも考えず、店員に勧められる【まま】、大きいテーブルを買ってしまった。","vn":"Không suy nghĩ đến diện tích phòng, tôi đã mua chiếc bàn lớn theo như được nhân viên gợi ý / y lời nhân viên khuyên.","answer":"まま","options":["a. まま","b. ままを","c. ままでも","d. ままなのに"],"id":"07-2010_2"},{"num":3,"year":"07-2010","jp":"A会社の元社員が１１日、突然の解雇を不当【として】、解雇取り消しを同社に求める訴えを起こした。","vn":"Cựu nhân viên của công ty A vào ngày 11 đã khởi kiện công ty này, cho rằng việc sa thải bất ngờ là không công bằng, yêu cầu hủy quyết định sa thải.","answer":"として","options":["a. となって","b. になって","c. として","d. にして"],"id":"07-2010_3"},{"num":4,"year":"07-2010","jp":"下水道工事中、ご不便をおかけ致しますが、どうかご理解【いただきたく】、よろしくお願い申し上げます。","vn":"Trong thời gian thi công cống rãnh, chúng tôi xin lỗi vì đã gây bất tiện, mong quý vị hiểu cho / thông cảm cho chúng tôi.","answer":"いただきたく","options":["a. いたしたく","b. いただきたく","c. 差し上げたく","d. 申しあげたく"],"id":"07-2010_4"},{"num":5,"year":"07-2010","jp":"間違い電話をかけてきて謝りもしないとは、失礼【極まりない】。","vn":"Gọi nhầm số mà còn không chịu xin lỗi thật là vô cùng thiếu lịch sự.","answer":"極まりない","options":["a. でならない","b. ではいられない","c. 極まりない","d. に越したことはない"],"id":"07-2010_5"},{"num":6,"year":"07-2010","jp":"（電車の中で）A「いつもならこの時間帯は込んでるのに、今日は空いてるね。」B「祝日だからね。」A「あ、そっか。どうりで空いてる【はずだ】。」","vn":"(Trên tàu điện)A: Thông thường giờ này đông người lắm, hôm nay trống thế nhỉ.B: Vì hôm nay là ngày lễ mà.A: À, đúng rồi. Thế nên mới trống là phải trống.","answer":"はずだ","options":["a. こともある","b. に決まってる","c. に違いない","d. はずだ"],"id":"07-2010_6"},{"num":7,"year":"07-2010","jp":"今回の事件で山田氏の政治的影響力が完全に失われる【ことはないにしても】、弱まることは間違いないだろう。","vn":"Trong vụ việc lần này, dù không thể nói là ảnh hưởng chính trị của ông Yamada hoàn toàn mất đi, nhưng chắc chắn nó sẽ suy yếu.","answer":"ことはないにしても","options":["a. ことはないにしても","b. ことはないにもかかわらず","c. ほかはないにしても","d. ほかはないにもかかわらず"],"id":"07-2010_7"},{"num":8,"year":"07-2010","jp":"「３歳までの育児は母親がすべきだ」と言う人もいるが、子育てをするのが母親で【なくてはならないかというと】、必ずしもそうではないと思う。","vn":"Có người nói “Việc nuôi con đến 3 tuổi phải do mẹ đảm nhiệm”, nhưng nếu hỏi liệu việc nuôi con nhất thiết phải là mẹ hay không, tôi nghĩ không hẳn như vậy.","answer":"なくてはならないかというと","options":["a. なくてはならないからといって","b. なくてはならないかというと","c. あるわけにはいかないからといって","d. あるわけにはいかないかというと"],"id":"07-2010_8"},{"num":9,"year":"07-2010","jp":"もう二度と恋【などするものか】と固く心に誓ったはずだったが、知らず知らずのうちに彼女のことが好きになっていた。","vn":"Tôi đã thề trong lòng rằng sẽ không bao giờ yêu ai nữa, nhưng không biết từ lúc nào, tôi lại thích cô ấy.","answer":"などするものか","options":["a. こそするものか","b. などするものか","c. こそするものなのか","d. などするものなのか"],"id":"07-2010_9"},{"num":10,"year":"07-2010","jp":"先日提出した私の意見書は、単に決定に至るプロセスの問題点を指摘【しようとしたにすぎず】、決定そのものに反対するものではありません。","vn":"Bản ý kiến của tôi nộp hôm trước chỉ nhằm chỉ ra những vấn đề trong quá trình ra quyết định, chứ không phải là phản đối quyết định đó.","answer":"しようとしたにすぎず","options":["a. しそうになったにすぎず","b. しそうになったほどで","c. しようとしたにすぎず","d. しようとしたほどで"],"id":"07-2010_10"},{"num":11,"year":"12-2010","jp":"山川鉄道は、３月で開業９０周年を迎えるの【を機に】最新型車両を導入し、１５日から運営運転を開始する。","vn":"Nhân dịp kỷ niệm 90 năm thành lập vào tháng 3, đường sắt Yamakawa sẽ đưa vào sử dụng các tàu thế hệ mới và bắt đầu vận hành từ ngày 15.","answer":"を機に","options":["a. を限りに","b. を皮切りに","c. をよそに","d. を機に"],"id":"12-2010_11"},{"num":12,"year":"12-2010","jp":"いかなる理論でも、データによって実証されなければ多くの人に【受け入れられは】しない。","vn":"Dù là lý thuyết gì đi nữa, nếu không được chứng minh bằng dữ liệu thì sẽ không được nhiều người chấp nhận.","answer":"受け入れられは","options":["a. 受け入れは","b. 受け入れられは","c. 受け入れられては","d. 受け入れられることは"],"id":"12-2010_12"},{"num":13,"year":"12-2010","jp":"（テレビのコマーシャルで）「こちらは添参加を【いっさい】使用していない、ヘルシーな食料油です。」","vn":"(Trong quảng cáo trên TV)Dầu ăn lành mạnh này hoàn toàn không sử dụng chất phụ gia.","answer":"いっさい","options":["a. いっさい","b. とても","c. きっと", ":49,"year":"07-2012","jp":"（本屋で）A「あ、この本、面白いよ。」B「どんな話？」A「主人公と恋人が、親に無理やり【別れさせられそうになる】話しなんだけど、すごくどきどきするんだ。」","vn":"(Tại hiệu sách)A: À, cuốn sách này hay lắm đấy.B: Chuyện gì vậy?A: Là câu chuyện về hai nhân vật chính và người yêu của anh ta bị cha mẹ ép buộc phải chia tay, nhưng rất hồi hộp và cảm động lắm.","answer":"別れさせられそうになる","options":["a. 別れそうになる","b. 別れられそうになる","c. 別れさせそうになる","d. 別れさせられそうになる"],"id":"07-2012_49"},{"num":50,"year":"07-2012","jp":"川村「石田さん、ギターがほしいって言っていましたよね。わたしの弟が使っていたギターがあるんですが、よければどうですか。」石田「いいんですか。」川村「はい。弟に聞いたら、弾いてくれる方がいるなら、ぜひと言っていましたので、どうぞもらって【やってください】。」","vn":"Kawamura: Anh Ishida, anh nói là muốn có một cây guitar phải không? Em trai tôi có một cây guitar từng dùng, nếu anh thích thì thế nào?Ishida: Thật ạ, được không vậy?Kawamura: Vâng. Tôi đã hỏi em trai rồi, nó nói nếu có người chơi được thì rất muốn tặng, nên anh hãy nhận lấy giúp nhé.","answer":"やってください","options":["a. やりませんか","b. やってください","c. いただきませんか","d. いただいてください"],"id":"07-2012_50"},{"num":51,"year":"12-2012","jp":"A国では、急激な経済成長【にともなって】、エネルギー消費量がこの１０年で約３倍に増加している。","vn":"Ở nước A, cùng với sự tăng trưởng kinh tế nhanh chóng, lượng tiêu thụ năng lượng đã tăng khoảng gấp ba lần trong vòng 10 năm qua.","answer":"にともなって","options":["a. に沿って","b. に基づき","c. にともなって","d. にこたえて"],"id":"12-2012_51"},{"num":52,"year":"12-2012","jp":"（電話で）A「ご注文の品をお届けに【上がり】たいのですが、明日のご都合はいかがでしょうか。」B「そうですね、３時以降なら家にいます。」","vn":"(Qua điện thoại)A: Tôi muốn đến giao hàng mà quý khách đã đặt, ngày mai quý khách có tiện không ạ?B: Ừm, sau 3 giờ thì tôi sẽ ở nhà.","answer":"上がり","options":["a. 上がり","b. 差しあげ","c. 願い","d. 見え"],"id":"12-2012_52"},{"num":53,"year":"12-2012","jp":"「なるほど。それでけんかになったのか。もちろん悪いのは冗談を言った彼だけど、それくらいのことで怒った君【も】君だよ」","vn":"Ra là vậy, thế nên mới cãi nhau à.\nTất nhiên người nói đùa là người có lỗi, nhưng mà cậu cũng thật là… (cậu cũng có phần sai đấy, giận đến mức đó chỉ vì chuyện nhỏ như vậy).","answer":"も","options":["a. も","b. で","c. でも","d. まで"],"id":"12-2012_53"},{"num":54,"year":"12-2012","jp":"デートの約束がある日は、急いで【帰るべく】業務をこなしていても、なぜか急な会議が入ったりして、結局残業で遅れてしまう。","vn":"Vào những ngày có hẹn hò, dù tôi làm việc nhanh để có thể về sớm, thế nào rồi cũng có cuộc họp đột xuất, và rốt cuộc lại tăng ca mà đến muộn.","answer":"帰るべく","options":["a. 帰るべし","b. 帰るべき","c. 帰るべく","d. 帰るべからず"],"id":"12-2012_54"},{"num":55,"year":"12-2012","jp":"彼は自転車がよほど好きらしい 。【雨だろうと雪だろうと】、毎日楽しそうに自転車で通勤してくる。","vn":"Anh ấy có vẻ rất thích xe đạp.\nDù mưa hay tuyết đi nữa, ngày nào anh ấy cũng vui vẻ đi làm bằng xe đạp.","answer":"雨だろうと雪だろうと","options":["a. 雨とも雪とも","b. 雨でもなく雪でもなく","c. 雨というか雪というか","d. 雨だろうと雪だろうと"],"id":"12-2012_55"},{"num":56,"year":"12-2012","jp":"親が子供を注意するのは、子供のため【を思って】のことなのだが、その気持ちはなかなか伝わらない。","vn":"Việc cha mẹ nhắc nhở con cái là vì nghĩ cho con,\nnhưng tấm lòng ấy lại khó mà truyền đạt được.","answer":"を思って","options":["a. に思って","b. を思って","c. に思っても","d. を思っても"],"id":"12-2012_56"},{"num":57,"year":"12-2012","jp":"彼の政治家としての能力は【疑いようがないものの】、首相になるにはまだ早い。","vn":"Tuy không có gì phải nghi ngờ về năng lực của anh ta với tư cách là một chính trị gia,\nnhưng để trở thành Thủ tướng thì vẫn còn hơi sớm.","answer":"疑いようがないものの","options":["a. 疑いようがないものを","b. 疑いようがないものの","c. 疑わないことはないものを","d. 疑わないことはないものの"],"id":"12-2012_57"},{"num":58,"year":"12-2012","jp":"（会議で）部長「この方針について意見のある人はいますか。あ、田村さん、どうぞ。」田村「はい。そのような対応は確かに必要だとは思います。しかし、私たち営業の立場【から言わせてもらえば】現在の状況でそこまでやるのは厳しいです。」","vn":"(Trong cuộc họp)Trưởng phòng: Có ai có ý kiến gì về chính sách này không? À, Tamura-san, mời cô.Tamura: Vâng. Tôi cũng nghĩ rằng cách xử lý đó đúng là cần thiết. Tuy nhiên, nếu cho phép tôi nói từ lập trường của bộ phận kinh doanh, thì trong tình hình hiện tại, làm đến mức đó là rất khó.","answer":"から言わせてもらえば","options":["a. に言わせていれば","b. から言わせてやれば","c. に言わせてあげれば","d. から言わせてもらえば"],"id":"12-2012_58"},{"num":59,"year":"12-2012","jp":"（携帯電話で）夏子「もしもし、友子？ごめん、電車が遅れてて」友子「え、そうなの？映画、7時からだけど。」夏子「うん。【間に合いそうになかったら】、また連絡するね。」","vn":"(Qua điện thoại di động)Natsuko: A lô, Tomoko à? Xin lỗi nhé, tàu đang bị trễ.Tomoko: Hả, vậy à? Phim bắt đầu từ 7 giờ đấy.Natsuko: Ừ. Nếu có vẻ như không kịp, mình sẽ liên lạc lại nhé.","answer":"間に合いそうになかったら","options":["a. 間に合いそうになかったら","b. 間に合いそうになかったから","c. 間に合っていなかったのだから","d. 間に合っていなかったのだったら"],"id":"12-2012_59"},{"num":60,"year":"12-2012","jp":"A「西川先生のデザインは、どういうところが魃カですか。」B「そうですね。私にとって先生のデザインは、見ているだけでほっとする【といいましょうか】、そんな温かい雰囲気があって、好きなんです」","vn":"A: Thiết kế của thầy Nishikawa có điểm gì hấp dẫn vậy?B: Ừm… nói sao nhỉ, có thể nói là chỉ cần nhìn thôi cũng thấy nhẹ lòng, có một bầu không khí ấm áp khiến tôi rất thích.","answer":"といいましょうか","options":["a. というでしょうから","b. といいませんか","c. というでしょうが","d. といいましょうか"],"id":"12-2012_60"},{"num":1,"answer":"をもって","options":["a. を受けて","b. を皮切りに","c. をピークに","d. をもって"],"year":"07-2013","jp":"乗客の減少が続いていた竹山鉄道が、今年の3月31日【をもって】廃止された。","vn":"Đường sắt Takeyama liên tục giảm khách đã bị ngừng hoạt động kể từ ngày 31/3 năm nay.","id":"07-2013_1"},{"num":2,"answer":"だけでも","options":["a. のみも","b. だけでも","c. ですらも","d. くらいも"],"year":"07-2013","jp":"北川動物園では、せめて気分【だけでも】南極を感じてもらおうと水の塊がプレゼントされました。","vn":"Vườn thú tặng khối nước đá để chim cánh cụt ít nhất cảm nhận được không khí Nam Cực dù chỉ trong cảm giác.","id":"07-2013_2"},{"num":3,"answer":"はたして","options":["a. かりに","b. どうやら","c. おそらく","d. はたして"],"year":"07-2013","jp":"近年、子ども読書離れが指摘されているが、【はたして】子どもの読書量は本当に減っているのだろうか。","vn":"Người ta chỉ ra trẻ em xa rời đọc sách, nhưng liệu lượng sách trẻ em đọc có thực sự giảm?","id":"07-2013_3"},{"num":4,"answer":"存じます","options":["a. 存じます","b. あずかります","c. 頂戴します","d. うけたまわります"],"year":"07-2013","jp":"引き続きご検討いただければ幸いに【存じます】。","vn":"(Cuối email) Tôi rất mong quý vị tiếp tục xem xét vấn đề trên.","id":"07-2013_4"},{"num":5,"answer":"取っといて","options":["a. 取れるって","b. 取っといて","c. 取っちゃわないって","d. 取っとけなくて"],"year":"07-2013","jp":"「その資料はあしたまた使うから、捨てないで【取っといて】。」","vn":"Tài liệu đó ngày mai dùng lại, đừng vứt đi, giữ lại nhé.","id":"07-2013_5"},{"num":6,"answer":"ご覧になった上で","options":["a. ご覧の結果","b. ご覧になった結果","c. ご覧になった上で","d. ご覧くださった上に"],"year":"07-2013","jp":"本サービスを利用される方は、利用規約を【ご覧になった上で】、お申し込みください。","vn":"Vui lòng đăng ký dịch vụ này sau khi đã xem qua quy định sử dụng.","id":"07-2013_6"},{"num":7,"answer":"夢を夢で","options":["a. 夢に夢を","b. 夢なら夢と","c. 夢が夢なら","d. 夢を夢で"],"year":"07-2013","jp":"絶対に、【夢を夢で】終わらせない。","vn":"Tôi nhất định sẽ không để giấc mơ mãi chỉ là giấc mơ.","id":"07-2013_7"},{"num":8,"answer":"やるとするか","options":["a. やるとするか","b. やりはするから","c. やろうとしているか","d. やってはいるから"],"year":"07-2013","jp":"「そうだね。じゃあ、残りはあした【やるとするか】。」","vn":"Ừ nhỉ, vậy thì phần còn lại để mai làm vậy.","id":"07-2013_8"},{"num":9,"answer":"思わせてくれた","options":["a. 思われていた","b. 思わせてくれた","c. 思わせられた","d. 思われてならなかった"],"year":"07-2013","jp":"この曲は、失恋で落ち込んで泣いていた私に、また新しい恋をしようと【思わせてくれた】曲です。","vn":"Bài hát này đã khiến tôi, người đang buồn vì thất tình, muốn bắt đầu một tình yêu mới.","id":"07-2013_9"},{"num":10,"answer":"にもほどがある","options":["a. のかぎりではない","b. のことにかぎる","c. にもほどがある","d. にあるほどでもない"],"year":"07-2013","jp":"家族から『猫好き【にもほどがある】だろう。』って言われたりする。","vn":"Gia đình hay nói: 'Thích mèo cũng vừa vừa thôi chứ!'","id":"07-2013_10"},{"num":11,"answer":"が","options":["a. で","b. に","c. は","d. が"],"year":"12-2013","jp":"夏休みに水族館に行ったら、時期【が】時期だけに親子連れで混雑していた。","vn":"Đến thủy cung vào kỳ nghỉ hè, vì đúng mùa cao điểm nên đông nghẹt các gia đình.","id":"12-2013_11"},{"num":12,"answer":"かつ","options":["a. かつ","b. むしろ","c. ついては","d. かえって"],"year":"12-2013","jp":"良好な景観形成を計画的【かつ】具体的に勧めるために、基本方針を定めています。","vn":"Để thúc đẩy hình thành cảnh quan đẹp một cách có kế hoạch và cụ thể, thành phố đã ban hành phương châm cơ bản.","id":"12-2013_12"},{"num":13,"answer":"危険","options":["a. 危険","b. 危険の","c. 危険な","d. 危険に"],"year":"12-2013","jp":"十分な装備もなく単独で登るのは、【危険】極まりない行為だ。","vn":"Leo núi mùa đông một mình không có đủ trang bị là hành động cực kỳ nguy hiểm.","id":"12-2013_13"},{"num":14,"answer":"思われる","options":["a. 思う","b. 思っている","c. 思われる","d. 思わせる"],"year":"12-2013","jp":"景気は徐々に回復してきていると言われるが、私には一時的な現象のように【思われる】。","vn":"Người ta nói kinh tế đang hồi phục, nhưng với tôi thì có vẻ chỉ là hiện tượng . 揺られながらとなれば","c. 揺られっぱなしなのか","d. 揺られっぱなしだとは"],"year":"12-2014","jp":"山道を走るバスに【揺られながらにしては】けっこう良く撮れていた。","vn":"Dù bị lắc lư trên xe buýt đường núi, bức ảnh lại chụp khá đẹp.","id":"12-2014_38"},{"num":39,"answer":"悔やまれてならない","options":["a. 悔やまないようにする","b. 悔やんでばかりだ","c. 悔やむべきではない","d. 悔やまれてならない"],"year":"12-2014","jp":"「絶対に勝ちたい相手だっただけに、大事な場面でのミスが【悔やまれてならない】」","vn":"Chính vì đó là đối thủ nhất định phải thắng, nên không thể không tiếc nuối về sai lầm ở tình huống quan trọng.","id":"12-2014_39"},{"num":40,"answer":"買わなくて済みそうだ","options":["a. 買ってきてはないんだ","b. 買ったきりになってる","c. 買わなくて済みそうだ","d. 買うつもりじゃなかった"],"year":"12-2014","jp":"「これだけたくさんあれば、当分お米は【買わなくて済みそうだ】ね。」","vn":"Với từng này nhiều thì có vẻ chúng ta không cần phải mua gạo một thời gian rồi nhỉ.","id":"12-2014_40"},{"num":41,"answer":"まるで","options":["a. とうとう","b. まるで","c. 二度と","d. たとえ"],"year":"07-2015","jp":"私はオリンピックには【まるで】興味がない。","vn":"Tôi hoàn toàn không có hứng thú gì với Thế vận hội cả.","id":"07-2015_41"},{"num":42,"answer":"をもって","options":["a. にむけて","b. をめぐって","c. をもって","d. につれて"],"year":"07-2015","jp":"そもそも何【をもって】幸せとするのだろうか。","vn":"Rốt cuộc dựa vào điều gì để cho là hạnh phúc?","id":"07-2015_42"},{"num":43,"answer":"見ていなければ","options":["a. 見たとしたら","b. 見ようが","c. 見なかったにしろ","d. 見ていなければ"],"year":"07-2015","jp":"「あのときあのお芝居を【見ていなければ】、女優になることはなかったと思います。」","vn":"Nếu lúc đó không xem vở kịch ấy, có lẽ tôi đã không trở thành diễn viên.","id":"07-2015_43"},{"num":44,"answer":"認めようとはしなかった","options":["a. 認めるほかはなかった","b. 認めないでもなかった","c. 認めようとはしなかった","d. 認めねばならなかった"],"year":"07-2015","jp":"A社は決してそれを【認めようとはしなかった】。","vn":"Công ty A nhất quyết không chịu thừa nhận điều đó dù kết quả điều tra đã rõ ràng.","id":"07-2015_44"},{"num":45,"answer":"思い出される","options":["a. 思い出される","b. 思い出す","c. 思い出すだろう","d. 思い出させた"],"year":"07-2015","jp":"あのころのことが昨日のことのように【思い出される】。","vn":"Những chuyện hồi còn là sinh viên lại được hồi tưởng như vừa mới hôm qua.","id":"07-2015_45"},{"num":46,"answer":"出てからでは","options":["a. 出たせいなのかは","b. 出てしまうかは","c. に役立っていることは何でしょうか。」田中「ラグビー部での経験ですね。チームワークの大切さを痛感しました。【もっとも】、それは去年企画チームのリーダーになって始めて気づいたことですが。」","vn":"(Trong buổi phỏng vấn với cựu sinh viên)Người phỏng vấn: Trong những việc bạn đã làm thời sinh viên, điều gì đang hữu ích cho công việc hiện tại của bạn?Tanaka: Là kinh nghiệm ở câu lạc bộ rugby. Tôi đã nhận ra tầm quan trọng của làm việc nhóm. Tuy nhiên, đó là điều tôi chỉ nhận ra khi năm ngoái trở thành trưởng nhóm dự án.","answer":"もっとも","options":["a. 要するに","b. あるいは","c. もっとも","d. ついては"],"id":"12-2016_13"},{"num":14,"year":"12-2016","jp":"村の郷土史をまとめるにあたり、今年９０歳になる元村長の東山さんにお話を伺った。村に初めて汽車が走ったときのことを鮮明に覚えて【おいでになり】、その記憶力に驚いた。","vn":"Trong quá trình tổng hợp lịch sử địa phương của làng, tôi đã phỏng vấn ông Higashiyama, cựu trưởng làng, năm nay 90 tuổi. Ông vẫn còn nhớ rõ ràng lúc con tàu đầu tiên chạy qua làng, khiến tôi ngạc nhiên về khả năng ghi nhớ của ông.","answer":"おいでになり","options":["a. おいでになり","b. 差し上げ","c. まいり","d. 申し上げ"],"id":"12-2016_14"},{"num":15,"year":"12-2016","jp":"（求人サイトの「よくある質問」で）Q：インテリアに関する知識がないのですが、働けますか。A：研修があるので大丈夫です。知識はある【に越したことはありません】が、それよりも人柄や仕事に取り組む姿勢を重視しています。","vn":"(Trong mục “Câu hỏi thường gặp” của trang tuyển dụng)Q: Tôi không có kiến thức về nội thất, vậy có thể làm việc không?A: Có đào tạo nên không vấn đề gì. Dĩ nhiên có kiến thức thì càng tốt, nhưng hơn hết chúng tôi coi trọng tính cách và thái độ làm việc của bạn.","answer":"に越したことはありません","options":["a. にすぎません","b. ことは否めません","c. に越したことはありません","d. といっても過言ではありません"],"id":"12-2016_15"},{"num":16,"year":"12-2016","jp":"（お知らせで）水道管破裂による断水のため、８月１２日まで市民プールの営業を休止します。復旧状況【次第では】営業再開が遅れる可能性がありますので、ご了承ください。","vn":"(Thông báo)Do đường ống nước bị vỡ gây mất nước, hồ bơi công cộng sẽ ngừng hoạt động đến ngày 12 tháng 8. Tùy theo tình hình khắc phục, khả năng mở cửa trở lại có thể bị chậm, xin quý khách thông cảm.","answer":"次第では","options":["a. 次第には","b. 次第に","c. 次第では","d. 次第"],"id":"12-2016_16"},{"num":17,"year":"12-2016","jp":"クレジットカードの番号等、他人に【知られては】困る情報は、電子メールには書かないほうがいいそうだ。","vn":"Những thông tin とすれば","b. とあって","c. というより","d. と思っても"],"id":"07-2017_22"},{"num":23,"year":"07-2017","jp":"A社は、製品の成分表示に誤りがあったことについて謝罪したが、品質には【なんら】問題はないと強調した。","vn":"Công ty A đã xin lỗi về việc thông tin thành phần sản phẩm bị sai, nhưng nhấn mạnh rằng không có vấn đề gì về chất lượng.","answer":"なんら","options":["a. かりに","b. なんら","c. なかなか","d. あまりにも"],"id":"07-2017_23"},{"num":24,"year":"07-2017","jp":"今年３５歳になるサッカー日本代表の森選手について、監督は、「確かに体カが落ちてきた【ことは否めない】が、高い技術力に期待している。」と述べた。","vn":"Về tuyển thủ Mori, 35 tuổi trong năm nay của đội tuyển bóng đá Nhật Bản, huấn luyện viên đã nói: “Chắc chắn không thể phủ nhận rằng thể lực đã giảm, nhưng tôi vẫn kỳ vọng vào kỹ năng cao của cậu ấy.”","answer":"ことは否めない","options":["a. はずだった","b. とおりだった","c. ことは否めない","d. に越したことはない"],"id":"07-2017_24"},{"num":25,"year":"07-2017","jp":"田中部長「ねえ、山下くん、今度の会議でこの企画の説明をするのは鈴木課長だっけ？」山下「はい、課長がご説明【なさいます】。","vn":"Trưởng phòng Tanaka: Này, Yamashita, người sẽ thuyết trình về dự án này trong cuộc họp tới là trưởng bộ phận Suzuki phải không?Yamashita: Vâng, trưởng bộ phận sẽ thuyết trình ạ.","answer":"なさいます","options":["a. 申します","b. いただきます","c. 願います","d. なさいます"],"id":"07-2017_25"},{"num":26,"year":"07-2017","jp":"脳科学の研究が進んだと言われる現代【においてさえ】、脳のメカニズムについては解明できていない部分が多いという。","vn":"Ngay cả trong thời hiện đại, khi nghiên cứu về khoa học não bộ đã tiến bộ, vẫn có nhiều phần cơ chế hoạt động của não bộ chưa được giải thích rõ ràng.","answer":"においてさえ","options":["a. においてさえ","b. においてこそ","c. に対してさえ","d. に対してこそ"],"id":"07-2017_26"},{"num":27,"year":"07-2017","jp":"全国高校テニス大会決勝で、西山選手は、持ち前の精神カの強さで相手の厳しい攻撃に【耐えぬいた末に】、見事勝利を収めた。","vn":"Trong trận chung kết giải tennis các trường trung học toàn quốc, tuyển thủ Nishiyama, sau khi chịu đựng những đợt tấn công mạnh mẽ của đối thủ bằng tinh thần kiên cường vốn có, đã giành chiến thắng xuất sắc.","answer":"耐えぬいた末に","options":["a. 耐えかねたほど","b. 耐えかねた末に","c. 耐えぬいたほど","d. 耐えぬいた末に"],"id":"07-2017_27"},{"num":28,"year":"07-2017","jp":"昨日の新入生歓迎会に失敗だった。私たち上級生がたくさん質問をして、新入生が話しやすい【ようにしたつもりが】、逆に緊張させてしまったようだ。","vn":"Buổi lễ chào đón tân sinh viên hôm qua thật thất bại. Chúng tôi, các sinh viên khóa trên, đã đặt nhiều câu hỏi để làm cho các tân sinh viên dễ nói chuyện hơn, nhưng ngược lại có vẻ đã khiến họ căng thẳng.","answer":"ようにしたつもりが","options":["a. ようにしたあげく","b. ようにしたつもりが","c. ようになったものを","d. ようになったばかりか"],"id":"07-2017_28"},{"num":29,"year":"07-2017","jp":"楽しみにしていた初めての海外旅行。搭乗手続きも出国審査も終わり、あとは出発を【待つばかりとなった】。","vn":"Chuyến du lịch nước ngoài lần đầu tiên mà tôi háo hức mong đợi. Thủ tục lên máy bay và kiểm tra xuất cảnh đều đã xong, giờ chỉ còn chờ đến lúc khởi hành.","answer":"待つばかりとなった","options":["a. 待つばかりとなった","b. 待つこともあるはすだ","c. 待てなくなってしまった","d. 待てそうにないみたいだ"],"id":"07-2017_29"},{"num":30,"year":"07-2017","jp":"先々週、妹が図書館で分厚い本を１０冊も借りてきた。「２週間しか借りられないんだから、そんなに絶対【読みきれっこない】」と思ったが、全部読んで返したらしい。","vn":"Hai tuần trước, em gái tôi đã mượn tận 10 cuốn sách dày ở thư viện. Tôi nghĩ rằng, chắc chắn không thể đọc hết vì chỉ được mượn trong 2 tuần, nhưng hình như em ấy đã đọc hết và trả lại tất cả.","answer":"読みきれっこない","options":["a. 読みかけなのか","b. 読みっぱなしだろう","c. 読みきれっこない","d. 読んでもいないくせに"],"id":"07-2017_30"},{"num":31,"year":"07-2018","jp":"技術の進歩で世の中は便利になったが、便利さ【と引きかえに】失ったものも少なくないのではないだろうか。","vn":"Nhờ tiến bộ kỹ thuật, cuộc sống trở nên tiện lợi, nhưng đổi lại cũng không ít thứ đã bị mất đi, phải không?","answer":"と引きかえに","options":["a. なくしては","b. と相まって","c. のみならず","d. と引きかえに"],"id":"07-2018_31"},{"num":32,"year":"07-2018","jp":"わが社は、地球環境を【守るべく】、廃棄物の減量とリサイクルの推進に取り組んでいる。","vn":"Công ty chúng tôi đang nỗ lực giảm chất thải và thúc đẩy tái chế nhằm bảo vệ môi trường trái đất.","answer":"守るべく","options":["a. 守ろうとも","b. 守ればこそ","c. 守るべく","d. 守るにせよ"],"id":"07-2018_32"},{"num":33,"year":"07-2018","jp":"A:「遅れてごめん」B:「遅いよ!10分も遅刻するなんて、何考えてるの?」A:「少し遅れたぐらいで【なにも】そんなに怒らなくてもいいだろう。」","vn":"A: Xin lỗi vì đến muộn.B: Muộn quá! Trễ tận 10 phút, cậu đang nghĩ gì vậy?A: Chỉ trễ một chút thôi mà, không cần tức giận như vậy đâu.","answer":"なにも","options":["a. まるで","b. ちっとも","c. なにも","d. いっさい"],"id":"07-2018_33"},{"num":34,"year":"07-2018","jp":"(海岸で)A:「あれ?イヤリングが片方ない。どこでなくしたんだろう。ねえ、一緒に探して。」B:「【探すったって】、こんな広い場所でどうやって探すの?」","vn":"A: Hả? Một bên hoa tai bị mất rồi. Không biết mất ở đâu nhỉ. Này, cùng tìm với tớ đi.B: Tìm thì tìm, nhưng ở một chỗ rộng như thế này làm sao mà tìm được?","answer":"探すったって","options":["a. 探すったって","b. 探すのかどうか","c. 探すわりには","d. 探すっていうより"],"id":"07-2018_34"},{"num":35,"year":"07-2018","jp":"富士山頂から見た景色のなんと美しかった【ことか】。本当に感動した。","vn":"Cảnh từ đỉnh núi Phú Sĩ đẹp đến mức không thể tả. Thực sự tôi rất cảm động.","answer":"ことか","options":["a. のか","b. ことか","c. わけだ","d. ものだ"],"id":"07-2018_35"},{"num":36,"year":"07-2018","jp":"うちの猫は、突然甘えてきたり、【そうかと思えば】、呼んでも無視してどこかに行ってしまったりする。本当に気まぐれだ。","vn":"Con mèo nhà tôi, lúc thì bỗng dưng lại quấn quýt, lúc khác lại phớt lờ khi gọi và đi đâu đó. Thật sự rất thất thường.","answer":"そうかと思えば","options":["a. そうだと思って","b. そうかと思えば","c. こうだと見て","d. こうかと見れば"],"id":"07-2018_36"},{"num":37,"year":"07-2018","jp":"一人暮らしを始めてからは、誰にも何も言われない【のをいいことに】、だらしない生活をするようになってしまった。","vn":"Kể từ khi bắt đầu sống một mình, tôi lợi dụng việc không ai nói gì mà bắt đầu sống lười biếng.","answer":"のをいいことに","options":["a. のをいいことに","b. のがよければ","c. といいものだから","d. とよさそうなのに"],"id":"07-2018_37"},{"num":38,"year":"07-2018","jp":"(インタビューで)｜\nA:「新聞記者から弁護士に転職しようと思われたのはなぜですか。」｜\nB:「事件の取材で被害者の方のお話を【聞かせていただく中で】、大変なご苦労があることを知り、そういう方たちの力になりたいと思うようになったんです。」","vn":"A: Tại sao anh lại nghĩ đến việc chuyển từ phóng viên báo chí sang làm luật sư?B: Trong quá trình lắng nghe câu chuyện của các nạn nhân khi đưa tin về các vụ án, tôi nhận ra họ đã trải qua rất nhiều khó khăn, và tôi muốn trở thành người giúp đỡ những người như vậy.","answer":"聞かせていただく中で","options":["a. 聞いてくださる一方で","b. 聞かせてくださる一方で","c. 聞いていただく中で","d. 聞かせていただく中で"],"id":"07-2018_38"},{"num":39,"year":"07-2018","jp":"条件の折り合いがつかず、すぐに契約を結ぶのが難しい現状では、A社とは、時間はかかっても、根気よく交渉を重ねていく【しかあるまい】。","vn":"Trong tình hình hiện tại, khi các điều kiện không thể thống nhất và khó có thể ký hợp đồng ngay, với công ty A, chỉ còn cách kiên nhẫn tiến hành các cuộc đàm phán dần dần, dù có tốn thời gian.","answer":"しかあるまい","options":["a. どころではなかろう","b. しかあるまい","c. などあるものか","d. ことすらない"],"id":"07-2018_39"},{"num":40,"year":"07-2018","jp":"A:「ねえ、昨日、ABCデパートにいたでしょう?見かけたよ。」｜\nB:「ええ!気づいたなら声をかけて【くれればよかったのに】。」","vn":"A: Này, hôm qua cậu có ở trung tâm thương mại ABC đúng không? Tớ thấy cậu kìa.B: Ừ! Nếu nhận ra thì nói với tớ một tiếng cũng được mà.","answer":"くれればよかったのに","options":["a. くれたと思ったんだね","b. もらったと思ったのに","c. くれればよかったのに","d. もらえばよかったんだね"],"id":"07-2018_40"},{"num":41,"year":"12-2018","jp":"私は、Tシャツ【に】ジーンズといったカジュアルな格好が好きだ。","vn":"Tôi thích trang phục thường ngày như áo phông với quần jeans.","answer":"に","options":["a. を","b. に","c. など","d. ほど"],"id":"12-2018_41"},{"num":42,"year":"12-2018","jp":"大波海岸に面している夏原町では、海の町【ならではの】新鮮な魚料理が楽しめます。","vn":"Ở thị trấn Natsuhara, nằm bên bờ biển Ōnami, bạn có thể thưởng thức các món cá tươi đặc trưng chỉ có ở một thị trấn ven biển.","answer":"ならではの","options":["a. なり","b. なくして","c. ながらに","d. ならではの"],"id":"12-2018_42"},{"num":43,"year":"12-2018","jp":"昨日、水月滝を見に行った。さすが日本有数の水量を誇るだけあって、【なかなか】見事な滝だった。","vn":"Hôm qua, tôi đã đi xem thác Mizuki. Quả đúng là một thác rất tuyệt vời, xứng đáng với danh tiếng là một trong những thác có lưu lượng nước lớn nhất Nhật Bản.","answer":"なかなか","options":["a. あえて","b. まさか","c. なかなか","d. かえって"],"id":"12-2018_43"},{"num":44,"year":"12-2018","jp":"(メールで)映画の情報、ありがとうございます。教えてもらわなかったら、【見逃す】ところでした。明日早速見に行きます。","vn":"Cảm ơn bạn đã gửi thông tin về bộ phim qua email. Nếu không được bạn cho biết, tôi suýt bỏ lỡ mất. Ngày mai tôi sẽ đi xem ngay.","answer":"見逃す","options":["a. 見逃す","b. 見逃さなかった","c. 見逃せる","d. 見逃せなかった"],"id":"12-2018_44"},{"num":45,"year":"12-2018","jp":"最近、多くの地域で和紙職人の高齢化が進んでおり、このままでは、せっかくの伝統技術が【失われかねない】。","vn":"Gần đây, ở nhiều vùng, việc thợ làm giấy Nhật đã già hóa đang tiến triển, nếu cứ tiếp tục như vậy, kỹ thuật truyền thống quý giá có khả năng bị mai một.","answer":"失われかねない","options":["a. 失われたようだ","b. 失われかけている","c. 失われかねない","d. 失われてはならない"],"id":"12-2018_45"},{"num":46,"year":"12-2018","jp":"会社の先輩は、「わからないことがあったら、何でも聞いて。」と言ってくれるが、会議や外出でほとんど席にいないので、【聞こうにも】聞けない。","vn":"Tiền bối ở công ty nói: “Nếu có gì không hiểu thì cứ hỏi bất cứ điều gì,” nhưng vì hầu như không có mặt ở chỗ làm do đi họp hay ra ngoài, nên dù muốn hỏi cũng không thể.","answer":"聞こうにも","options":["a. 聞いては","b. 聞くには","c. 聞こうにも","d. 聞かずとも"],"id":"12-2018_46"},{"num":47,"year":"12-2018","jp":"西清さんは元銀行員。支店長を【任されるまでになったが】、夢であった和菓子職人を目指し、45歳で退職。その10年後、大ヒット商品の「七色だんこ」を生み出した。","vn":"Ông Nishikiyo từng là nhân viên ngân hàng. Ông đã được giao trọng trách làm trưởng chi nhánh, nhưng để theo đuổi ước mơ trở thành thợ làm bánh Nhật, ông đã nghỉ việc ở tuổi 45. Mười năm sau, ông đã tạo ra sản phẩm nổi tiếng “Nanairo Dango”.","answer":"任されるまでになったが","options":["a. 任されたまでは","b. 任されたくらいでは","c. 任されるまでになったが","d. 任されるくらいになれば"],"id":"12-2018_47"},{"num":48,"year":"12-2018","jp":"母:「ねえ、たけしの次の対戦相手、去年優勝してるんだって。勝つのは難しいかな。」父:「そんなの【やってみなきゃ】わかんないよ。」","vn":"Mẹ: Này, đối thủ tiếp theo của Takeshi là người đã vô địch năm ngoái đấy. Có lẽ sẽ khó thắng nhỉ.Bố: Cái đó không thử thì không biết đâu.","answer":"やってみなきゃ","options":["a. やってるって","b. やってみなきゃ","c. やっちゃうのが","d. やっちゃおうと"],"id":"12-2018_48"},{"num":49,"year":"12-2018","jp":"A:「昨日、取引先の人と食事したんだけど、プライベートなことまでいろいろ聞かれて困っちゃった。」B:「そんなのは、いちいち本当のことを言わずに適当に【答えておけばいいんだよ】。」","vn":"A: Hôm qua tôi đã đi ăn với đối tác, nhưng họ hỏi đủ thứ chuyện riêng tư, thật phiền quá.B: Với những chuyện đó, không cần nói thật từng li từng tí, cứ trả lời cho xong là được.","answer":"答えておけばいいんだよ","options":["a. 答えてくれそうだよ","b. 答えられたせいだよ","c. 答えただけのことだ","d. 答えておけばいいんだよ"],"id":"12-2018_49"},{"num":50,"year":"12-2018","jp":"適切な目標を設定するのは難しいと言われている。目標があまりに高すぎると、やる気を【失わせてしまうおそれがある】からだ。","vn":"Người ta nói rằng việc đặt mục tiêu phù hợp là khó. Nếu mục tiêu quá cao, có nguy cơ làm mất động lực.","answer":"失わせてしまうおそれがある","options":["a. 失わせてしまってはならない","b. 失わせてしまいつつある","c. 失わせてしまうところだ","d. 失わせてしまうおそれがある"],"id":"12-2018_50"},{"num":1,"year":"07-2019","jp":"優勝【こそ】逃したが、石川選手は今大会で自己べストを更新する好成績を収めた。","vn":"Tuy đúng là đã lỡ mất chức vô địch, nhưng vận động viên Ishikawa đã đạt thành tích tốt, phá kỷ lục cá nhân trong giải đấu lần này.","answer":"こそ","options":["a. さえ","b. こそ","c. ほど","d. ばかり"],"id":"07-2019_1"},{"num":2,"year":"07-2019","jp":"今度の正月休みには、留学している息子も帰ってくる【ことだから】、久しぶりに家族旅行にでも行こうかと思っています。","vn":"Nhân dịp nghỉ Tết sắp tới, vì con trai đang du học cũng sẽ về, tôi định tổ chức một chuyến du lịch cùng gia đình sau một thời gian dài.","answer":"ことだから","options":["a. ことだが","b. ことでも","c. ことだから","d. こととはいえ"],"id":"07-2019_2"},{"num":3,"year":"07-2019","jp":"兄が会社の採用面接試験から帰ってきた。表情が明るいところを見ると、【どうやら】うまくいったようだ。","vn":"Anh trai tôi vừa về sau buổi phỏng vấn tuyển dụng ở công ty. Nhìn vẻ mặt tươi cười, hình như mọi chuyện đã suôn sẻ.","answer":"どうやら","options":["a. 仮に","b. まさか","c. 必ずしも","d. どうやら"],"id":"07-2019_3"},{"num":4,"year":"07-2019","jp":"このレストランは、料理はおいしいのだが、皿が安っぽい。もう少し良いものを使えない【ものか】と思う。","vn":"Nhà hàng này món ăn thì ngon, nhưng đĩa thì trông rẻ tiền. Tôi tự hỏi liệu có không thể dùng thứ tốt hơn chút được không.","answer":"ものか","options":["a. ものか","b. ものの","c. ものだ","d. ものを"],"id":"07-2019_4"},{"num":5,"year":"07-2019","jp":"先生:「木村くん、このレポート読んだよ。うまくまとめられなかったって言ってたけど、けっこうよく【書けてるじゃない】。」木村:「ありがとうございます。」","vn":"Thầy: Kimura, thầy đã đọc báo cáo của cậu rồi. Cậu nói là không thể tóm tắt tốt, nhưng viết cũng khá ổn đấy chứ.Kimura: Cảm ơn thầy ạ.","answer":"書けてるじゃない","options":["a. 書けてなきゃ","b. 書けてたらいいね","c. 書けてるじゃない","d. 書けてるかどうかだね"],"id":"07-2019_5"},{"num":6,"year":"07-2019","jp":"駅前のうどん屋「やまむら」は、最近テレビで紹介された【とかで】、毎日店の前に長い行列ができている。","vn":"Quán udon “Yamamura” trước ga, gần đây được giới thiệu trên tivi, nghe nói vậy, nên mỗi ngày đều có một hàng dài trước cửa.","answer":"とかで","options":["a. とかで","b. とかなら","c. というのが","d. というのも"],"id":"07-2019_6"},{"num":7,"year":"07-2019","jp":"今回の事故について社長が会見を行ったが、あれでは何の説明【にもなっておらず】、わが社の信用が失われるだけだ。","vn":"Giám đốc đã tổ chức họp báo về vụ tai nạn lần này, nhưng như vậy cũng không yết này là đúng thì số lượng dữ liệu vẫn chưa đủ, cần phải điều tra thêm.","answer":"とするには","options":["a. とするには","b. となるには","c. とするとは","d. となるとは"],"id":"12-2025_29"},{"num":30,"year":"12-2025","jp":"ユーキ選手は度重なる怪我に【悩まされながらも】、それを克服してオリンピック出場を果たした。","vn":"Dù liên tục bị thương, vận động viên Yuki vẫn vượt qua được và hoàn thành giấc mơ tham dự Olympic.","answer":"悩まされながらも","options":["a. 悩ませながらも","b. 悩ませたあげく","c. 悩まされながらも","d. 悩まされたあげく"],"id":"12-2025_30"},{"num":31,"year":"12-2025","jp":"引越しの予定は半年後だからまだまだ先だが、早く準備を始める【に越したことはない】と思い、少しずつ片付けを進めている。","vn":"Kế hoạch chuyển nhà còn nửa năm nữa nhưng tôi nghĩ bắt đầu chuẩn bị sớm thì không thể nào tốt hơn, nên đang dần dọn dẹp từng chút một.","answer":"に越したことはない","options":["a. 勢いだ","b. ことは否めない","c. 見込みだ","d. に越したことはない"],"id":"12-2025_31"},{"num":32,"year":"12-2025","jp":"（車の中で）A「ああ、こんなに道が渋滞していなければ、今頃とっくに遊園地に着いて【遊んでいた】のに。」B「そうだね。」","vn":"(Trong xe) A: Ôi, nếu đường không kẹt xe thế này thì giờ này chúng ta đã đến công viên giải trí từ lâu rồi. B: Đúng nhỉ.","answer":"遊んでいた","options":["a. 遊んだ","b. 遊びたかった","c. 遊んでいた","d. 遊んでいたかった"],"id":"12-2025_32"},{"num":33,"year":"12-2025","jp":"けんか中の父と母を仲直りさせられそうだったのに、姉が話しを蒸し返したせいで、うまくいかなくなってしまった。まったく、余計なことを【してくれたものだ】。","vn":"Suýt làm hòa được cho bố và mẹ đang cãi nhau, nhưng chị gái lại kéo chuyện cũ ra làm mọi thứ hỏng bét. Thật sự, chị ấy cứ làm những việc thừa thãi!","answer":"してくれたものだ","options":["a. してくれたものだ","b. しかねないものだ","c. してくれたはずだ","d. しかけないはずだ"],"id":"12-2025_33"},{"num":34,"year":"12-2025","jp":"（弁護士へのインタビューで）A「弁護士として毎日お忙しいと思いますが、休日はどのようにお過ごしですか。」B「家にいることが多いですね。弁護士は人と話すのが仕事【みたいなところがある】ので、休日は一人でゆっくりしたいんです。」","vn":"(Phỏng vấn luật sư) A: Tôi nghĩ anh bận rộn mỗi ngày với tư cách là luật sư, những ngày nghỉ anh thường làm gì? B: Tôi hay ở nhà. Vì công việc của luật sư vốn là nói chuyện với người khác, nên ngày nghỉ tôi muốn ở một mình thư giãn.","answer":"みたいなところがある","options":["a. らしいことである","b. らしいところがある","c. みたいなことである","d. みたいなところがある"],"id":"12-2025_34"},{"num":35,"year":"12-2025","jp":"もう１ヶ月近く雨が降っていない。晴れの日が続くのは嬉しいが、水不足などの問題を考えると【喜んでばかりもいられない】。","vn":"Gần 1 tháng rồi không có mưa. Những ngày nắng liên tiếp thật vui, nhưng nghĩ đến các vấn đề như thiếu nước thì không thể chỉ mãi vui mừng.","answer":"喜んでばかりもいられない","options":["a. 喜んだだけにすぎない","b. 喜んでばかりもいられない","c. 喜んでしまうところだった","d. 喜んでいないではないか"],"id":"12-2025_35"}];
const EXP={"07-2013_1":{"s":"をもって ①[kết thúc] lấy X làm mốc chấm dứt  ②[tiêu chí] lấy X làm căn cứ xác định","r":"→ Câu này dùng nghĩa ①: 「3月31日をもって廃止」= lấy ngày 31/3 làm mốc chấm dứt.","traps":[{"w":"を受けて","e":"= tiếp nhận ảnh hưởng từ X → dùng khi phản ứng với sự kiện, không phải kết thúc"},{"w":"を皮切りに","e":"= lấy X làm khởi đầu → nghĩa NGƯỢC với を最後に/をもって"},{"w":"をピークに","e":"= đạt đỉnh tại X rồi giảm → không liên quan đến chấm dứt hoạt động"}]},"07-2013_2":{"s":"せめて〜だけでも → ít nhất là... dù chỉ... (mong muốn mức tối thiểu)","r":"せめて và だけでも luôn đi cặp với nhau = 'ít nhất dù chỉ về mặt cảm giác'.","traps":[{"w":"のみも","e":"= chỉ... mà thôi (liệt kê giới hạn) → không đi với せめて"},{"w":"ですらも","e":"= ngay cả... cũng (mức bất ngờ) → sắc thái khác, không phải ao ước tối thiểu"},{"w":"くらいも","e":"= khoảng chừng... cũng → nghĩa mơ hồ, không tự nhiên ở đây"}],"kw":"せめて","kw_hint":"せめて → cặp cố định với だけでも","kw_loai":"Loại ngay のみも・ですらも・くらいも"},"07-2013_3":{"s":"はたして〜のだろうか → liệu có thực sự... không? (hoài nghi, muốn kiểm chứng)","r":"Câu hỏi nghi ngờ điều người ta nói → はたして + のだろうか là cặp cố định.","traps":[{"w":"かりに","e":"= giả sử, nếu như → dùng cho giả định, không phải nghi vấn"},{"w":"どうやら","e":"= hình như (suy đoán có căn cứ quan sát) → khẳng định nhẹ, không phải hoài nghi"},{"w":"おそらく","e":"= có lẽ, chắc là → suy đoán khẳng định, không phải đặt câu hỏi"}],"kw":"はたして","kw_hint":"はたして → cặp cố định với 〜のだろうか (câu hỏi tu từ, hoài nghi)","kw_loai":"Loại ngay かりに・おそらく・どうやら"},"07-2013_4":{"s":"存じます → khiêm nhường ngữ của 思う/知る (email/văn bản trang trọng)","r":"Cuối email gửi đối tác → 幸いに存じます = tôi rất mong/hân hạnh.","traps":[{"w":"あずかります","e":"= khiêm nhường của 預かる → nghĩa là 'giữ hộ', sai hoàn toàn"},{"w":"頂戴します","e":"= nhận (đồ vật, tiền) → không dùng để diễn tả suy nghĩ/mong muốn"},{"w":"うけたまわります","e":"= khiêm nhường của 聞く/引き受ける → nghĩa là 'xin lắng nghe/nhận lời', sai ngữ cảnh"}]},"07-2013_5":{"s":"取っておいて→取っといて (khẩu ngữ) = giữ lại để sau dùng (V ておく rút gọn)","r":"Nói chuyện thân mật ở công ty → dùng dạng rút gọn 取っといて rất tự nhiên.","traps":[{"w":"取れるって","e":"= nghe nói có thể lấy được → sai nghĩa hoàn toàn"},{"w":"取っちゃわないって","e":"= sẽ không vứt đi đâu → phủ định lộn xộn, không tự nhiên"},{"w":"取っとけなくて","e":"= vì không thể giữ được → phủ định, sai nghĩa"}]},"07-2013_6":{"s":"〜た上で → sau khi đã làm X xong thì mới làm Y (thứ tự bắt buộc)","r":"「ご覧になった上で申し込む」= xem qua quy định trước, rồi mới đăng ký.","traps":[{"w":"ご覧の結果","e":"= kết quả của việc đã xem → không mang nghĩa điều kiện trình tự"},{"w":"ご覧になった結果","e":"= kết quả sau khi xem → 結果 chỉ kết quả xảy ra, không phải điều kiện tiếp theo"},{"w":"ご覧くださった上に","e":"= thêm vào việc đã xem → 上に = thêm vào đó (liệt kê), không phải thứ tự"}]},"07-2013_7":{"s":"夢を夢で終わらせない → không để giấc mơ mãi chỉ là giấc mơ (lặp từ nhấn mạnh ý chí)","r":"Cấu trúc N を N で + 終わらせない = không để X kết thúc chỉ là X. Trợ từ を và で là cố định.","traps":[{"w":"夢に夢を","e":"= trợ từ sai → không tạo cấu trúc lặp từ có nghĩa"},{"w":"夢なら夢と","e":"= nếu là giấc mơ thì như giấc mơ → sắc thái chấp nhận, ngược với ý chí"},{"w":"夢が夢なら","e":"= nếu giấc mơ là giấc mơ → câu điều kiện vô nghĩa trong ngữ cảnh này"}]},"07-2013_8":{"s":"〜とするか → thôi thì làm X vậy (tự nhủ, quyết định nhẹ nhàng với bản thân)","r":"Nakamura tự nhủ 'để mai làm vậy' → とするか diễn tả quyết định thư giãn, thân mật.","traps":[{"w":"やりはするから","e":"= sẽ làm đấy vì... → giải thích lý do, không phải tự nhủ"},{"w":"やろうとしているか","e":"= đang có ý định làm không? → câu hỏi với người khác, sai đối tượng"},{"w":"やってはいるから","e":"= vì đang làm rồi → đang tiến hành, sai thì"}]},"07-2013_9":{"s":"〜させてくれる → ai đó làm điều tốt khiến mình... (mình là người hưởng lợi)","r":"Bài hát「思わせてくれた」= đã khiến tôi muốn yêu lại (bài hát làm điều tốt cho tôi).","traps":[{"w":"思われていた","e":"= đã được nghĩ đến (bị động) → chủ thể và nghĩa khác hoàn toàn"},{"w":"思わせられた","e":"= bị bắt phải nghĩ (bị động bất lợi) → sắc thái ép buộc tiêu cực"},{"w":"思われてならなかった","e":"= cứ tự nhiên nghĩ mãi → cảm xúc tự phát của mình, không phải do bài hát tạo ra"}]},"07-2013_10":{"s":"〜にもほどがある → cái gì đó cũng phải có giới hạn chứ! (phê phán mức độ thái quá)","r":"「猫好きにもほどがある」= thích mèo cũng phải có chừng mực.","traps":[{"w":"のかぎりではない","e":"= không chỉ giới hạn ở điều này → nghĩa mở rộng phạm vi, trái ngược"},{"w":"のことにかぎる","e":"= chỉ riêng chuyện X thôi → giới hạn phạm vi, không phải phê phán"},{"w":"にあるほどでもない","e":"= không đến mức... → phủ định nhẹ, ngược với ý phê phán thái quá"}]},"12-2013_11":{"s":"時期が時期だけに → đúng vào lúc đó mà (nhấn mạnh hoàn cảnh đặc biệt). Trợ từ が là cố định","r":"Cấu trúc N が N だけに. Trợ từ が bắt buộc, không thể thay bằng に/で/は.","traps":[{"w":"で","e":"= bằng/tại (phương tiện, địa điểm) → sai cấu trúc N が N だけに"},{"w":"に","e":"= tại, vào (thời gian) → cũng sai, cấu trúc này chỉ dùng が"},{"w":"は","e":"= trợ từ chủ đề → phá vỡ cấu trúc lặp từ, mất nghĩa nhấn mạnh"}]},"12-2013_12":{"s":"かつ → và đồng thời (nối hai tính chất song song, văn viết hành chính/trang trọng)","r":"「計画的かつ具体的に」= một cách có kế hoạch và cụ thể. Văn phong chính thức.","traps":[{"w":"むしろ","e":"= hơn là, thay vào đó → mang nghĩa so sánh/thay thế, không phải liệt kê"},{"w":"ついては","e":"= về vấn đề đó, nhân đó → chuyển chủ đề, không nối hai tính chất"},{"w":"かえって","e":"= ngược lại, trái mong đợi → mang nghĩa đối lập/bất ngờ"}]},"12-2013_13":{"s":"〜極まりない → cực kỳ, vô cùng. Cấu trúc: Nな (bỏ な) + 極まりない. KHÔNG thêm な/に\n🔗 Bẫy lặp lại nhiều lần trong đề thi:\n・〜極まりない luôn theo SAU dạng gốc của tính từ na (bỏ な)\n・VD đúng: 危険極まりない, 失礼極まりない (KHÔNG có な trước 極まりない)\n→ Hễ thấy 極まりない là first phải loại ngay đáp án có thêm な hoặc に","r":"「危険極まりない」= cực kỳ nguy hiểm. Trước 極まりない là dạng gốc, không có な hay に.","traps":[{"w":"危険の","e":"= の không dùng trước 極まりない → sai cấu trúc hoàn toàn"},{"w":"危険な","e":"= thêm な → SAI. Đây là bẫy phổ biến nhất của cấu trúc 極まりない"},{"w":"危険に","e":"= thêm に (dạng trạng từ) → sai, に chỉ dùng với động từ không phải 極まりない"}]},"12-2013_14":{"s":"〜と思われる → có vẻ như (tự phát, khách quan, không chủ ý — nói ý kiến lịch sự)","r":"「私には〜のように思われる」= với tôi thì có vẻ như. Diễn tả ý kiến cá nhân dè dặt, lịch sự.","traps":[{"w":"思う","e":"= tôi nghĩ (chủ động, thẳng) → quá trực tiếp, mất sắc thái dè dặt"},{"w":"思っている","e":"= đang nghĩ (chủ động tiếp diễn) → vẫn là chủ động, không phù hợp"},{"w":"思わせる","e":"= khiến người khác nghĩ → chủ ngữ làm cho người khác nghĩ, sai chủ thể"}]},"12-2013_15":{"s":"〜とあっては → trong tình huống X xảy ra thì... (điều tất nhiên phải xảy ra theo)","r":"「公開されるとあっては、見に行かないわけにはいかない」= đã là tình huống đó thì tất nhiên phải đi xem.","traps":[{"w":"にあってか","e":"= không phải cấu trúc tồn tại → không có nghĩa trong tiếng Nhật"},{"w":"になっては","e":"= khi trở thành X → thiếu tính tất nhiên/hiển nhiên của とあっては"},{"w":"となってか","e":"= khi thành X thì sao → câu hỏi tu từ, không phải điều kiện hiển nhiên"}]},"12-2013_16":{"s":"〜に言わせると → theo ý kiến của X, nếu để X nói thì (quan điểm của người khác)","r":"「友達に言わせると」= theo lời bạn bè / nếu để bạn bè nói. Diễn tả góc nhìn khác với mình.","traps":[{"w":"言われれば","e":"= nếu được (người ta) nói với mình → bị động, sai chiều tác động"},{"w":"言われたら","e":"= nếu bị nói (quá khứ giả định) → bị động, chủ ngữ nhận tác động"},{"w":"言わせて","e":"= cho/để nói → thiếu と, không hoàn chỉnh, mất nghĩa 'theo quan điểm của'"}]},"12-2013_17":{"s":"〜かと思いきや → tưởng là X nhưng thực ra lại Y (bất ngờ ngược chiều hoàn toàn)\n🔗 Cặp dễ lẫn vì giống hình thức:\n・かと思いきや → tưởng là A nhưng thực ra lại B (BẤT NGỜ TRÁI CHIỀU hoàn toàn so với dự đoán)\n・かと思えば → vừa A thì lại B ngay (CHUYỂN BIẾN NHANH liên tiếp, không nhất thiết trái ngược dự đoán)\n→ 思いきや luôn có yếu tố 'tưởng vậy mà không phải vậy'; 思えば chỉ là 'vừa...thì lại...'","r":"Nhiều người xếp hàng → tưởng phải chờ, nhưng được dẫn vào ngay. Bất ngờ trái dự đoán.","traps":[{"w":"待たされたかと思えば","e":"= vừa nghĩ là đã chờ thì... → liên tiếp nhanh, không phải bất ngờ ngược chiều"},{"w":"待たされることと思い","e":"= nghĩ rằng sẽ phải chờ và... → tiếp tục hành động, không có yếu tố bất ngờ"},{"w":"待たされたことと思うが","e":"= tuy nghĩ là đã chờ nhưng → nhượng bộ nhẹ, không đủ sắc thái bất ngờ"}]},"12-2013_18":{"s":"〜といったらない → không có gì sánh được, vô cùng... (cảm xúc mạnh đến mức không tả được)","r":"「うれしさといったらない」= niềm vui lúc đó không gì sánh được.","traps":[{"w":"にすぎない","e":"= chỉ là... thôi (hạ thấp mức độ) → nghĩa NGƯỢC, làm giảm nhẹ cảm xúc"},{"w":"ほどのことではない","e":"= không đáng đến mức đó → phủ nhận sự quan trọng, ngược ý"},{"w":"ともかぎらない","e":"= không nhất thiết là... → không chắc chắn, không hợp cảm xúc mạnh"}]},"12-2013_19":{"s":"おっしゃってくださいませんか → nhờ người trên nói giúp (kính ngữ, rất lịch sự)","r":"Nhân viên nhờ quản lý (cấp trên) nói với người khác → おっしゃる (尊敬語 của 言う) + くださいませんか.","traps":[{"w":"伺いたですが","e":"= tôi muốn thưa hỏi (sai ngữ pháp: 伺いたい) → chủ ngữ là mình, không phải nhờ sếp"},{"w":"お聞きになるでしょうか","e":"= sếp sẽ hỏi không? → hỏi về hành động của sếp, không phải nhờ sếp làm"},{"w":"申し上げてもよろしいですか","e":"= tôi có thể thưa không? → chủ ngữ là MÌNH nói, không phải nhờ sếp nói"}]},"12-2013_20":{"s":"どうしたものか → không biết phải làm thế nào đây (tự hỏi bản thân, phân vân)","r":"「どうしたものか」= không biết xử lý thế nào. Thường kèm と悩む, と困る.","traps":[{"w":"どうなったのか","e":"= chuyện gì đã xảy ra → hỏi về sự việc đã xảy ra, không phải cách xử lý"},{"w":"どうなっているか","e":"= đang như thế nào → hỏi về tình trạng hiện tại, không phải băn khoăn"},{"w":"どうしていることか","e":"= đang làm gì thế → tự thán/ngạc nhiên, không phải phân vân tìm cách"}]},"07-2014_21":{"s":"〜かぎりは → chừng nào còn X thì Y. Trước かぎり cần thể khả năng (〜できる/〜える)","r":"「働けるかぎりは働きたい」= chừng nào còn có thể làm việc thì muốn làm.","traps":[{"w":"働けず","e":"= không thể làm → phủ định, logic sai: 'chừng nào không thể làm thì muốn làm'"},{"w":"働いた","e":"= đã làm (quá khứ) → かぎり cần điều kiện còn tiếp diễn, không phải quá khứ"},{"w":"働こう","e":"= hãy làm, sẽ làm (ý chí) → không phải điều kiện khả năng"}]},"07-2014_22":{"s":"〜(よ)うとも → dù có... đi nữa (nhượng bộ mạnh, quyết tâm bất chấp tất cả)","r":"「批判を浴びようとも、貫くべきだ」= dù có bị chỉ trích đi nữa vẫn phải kiên định.","traps":[{"w":"浴びたといえば","e":"= nếu nói đến chuyện bị chỉ trích → chuyển chủ đề, không phải nhượng bộ"},{"w":"浴びたにもかかわらず","e":"= mặc dù đã bị chỉ trích → nhượng bộ sự kiện đã xảy ra, không phải bất chấp tương lai"},{"w":"浴びようにも","e":"= dù muốn bị chỉ trích cũng không thể → nghĩa NGƯỢC: không có điều kiện để làm"}]},"07-2014_23":{"s":"〜を最後に → lấy X làm lần cuối cùng, sau đó không còn nữa\n🔗 Cặp đối nghĩa dễ lẫn:\n・を最後に → lấy X làm mốc KẾT THÚC (sau đó dừng lại)\n・を皮切りに → lấy X làm mốc KHỞI ĐẦU (sau đó tiếp diễn chuỗi sự kiện)\n→ Nhớ: 最後=cuối, 皮切り=mở màn. Nghĩa NGƯỢC HOÀN TOÀN nhau!","r":"「全日本大会優勝を最後に、競技から離れた」= kể từ chiến thắng đó là lần cuối, rời thi đấu.","traps":[{"w":"を皮切りに","e":"= lấy X làm khởi đầu → nghĩa NGƯỢC HOÀN TOÀN. Bẫy cổ điển nhất!"},{"w":"にあたって","e":"= nhân dịp X, khi tiến hành X → không có nghĩa kết thúc hay khởi đầu"},{"w":"に沿って","e":"= theo, dọc theo X → theo phương hướng/nguyên tắc, không liên quan"}]},"07-2014_24":{"s":"それを → vậy mà, thế mà (bực bội phản bác khi ai đó làm điều vô lý)","r":"「自分たちが決めたのに、それを今さら早めろと言う」= chính họ quyết mà vậy mà lại đòi thay đổi.","traps":[{"w":"実は","e":"= thật ra, thực tế là → tiết lộ thông tin mới, không phải phản bác"},{"w":"というのは","e":"= bởi vì, lý do là → giải thích nguyên nhân, không phải bực bội"},{"w":"ただし","e":"= tuy nhiên, nhưng (thêm điều kiện/hạn chế) → trung tính, không có sắc thái bực tức"}]},"07-2014_25":{"s":"〜んだもん → vì mà... (biện hộ lý do, khẩu ngữ trẻ em/thân mật)","r":"「わかんないんだもん」= vì con chẳng hiểu gì mà. もん = もの diễn tả lý do biện hộ.","traps":[{"w":"わかんないもんか","e":"= không lý gì không hiểu! (phủ định mạnh, khẳng định ngược) → nghĩa đảo"},{"w":"わかんないんだっけ","e":"= hình như không hiểu nhỉ? (xác nhận lại ký ức) → không phải biện hộ"},{"w":"わかんないからって","e":"= chỉ vì không hiểu mà... (phê phán hành động vì lý do đó) → sắc thái hoàn toàn khác"}]},"07-2014_26":{"s":"〜てまいります → khiêm nhường của 〜ていく (sẽ tiến hành, cam kết thực hiện, trang trọng)","r":"Thị trưởng phát biểu trước công chúng → まいる là khiêm nhường ngữ của 行く/いく.","traps":[{"w":"願います","e":"= mong/cầu mong → chủ thể mong người khác làm, không phải tự cam kết"},{"w":"いたします","e":"= khiêm nhường của します → 実行していたします nghe rất kỳ"},{"w":"頂戴します","e":"= nhận (quà/tiền/lời) → không hợp với 実行して, sai ngữ cảnh cam kết"}]},"07-2014_27":{"s":"〜といっても過言ではない → nói X cũng không phải là nói quá (khẳng định mạnh nhưng khiêm tốn)","r":"「日本一といっても過言ではない」= nói là số một Nhật Bản cũng không ngoa.","traps":[{"w":"の疑いがある","e":"= có nghi ngờ là... → mang nghĩa tiêu cực, nghi vấn về tội lỗi/lỗi lầm"},{"w":"を余儀なくさせる","e":"= buộc phải, ép phải → không có lựa chọn, không phải đánh giá"},{"w":"よりほかはない","e":"= chỉ còn cách này thôi → không có lựa chọn khác, nghĩa hoàn toàn khác"}]},"07-2014_28":{"s":"〜たら〜たで → nếu có X thì X lại có vấn đề của X (nghịch lý: dù có thứ muốn cũng phiền)","r":"「時間があったらあったで、遊んでしまう」= nếu có thời gian thì lại mải chơi.","traps":[{"w":"あるにはあるが","e":"= có thì có đấy nhưng → thừa nhận có nhưng kèm hạn chế, không phải nghịch lý"},{"w":"あるとないとでは","e":"= giữa có và không có → so sánh hai trạng thái, không phải tình huống giả định"},{"w":"あつたりなかったりで","e":"= khi có khi không → không ổn định, không phải nghịch lý dù có"}]},"07-2014_29":{"s":"〜知らされておらず → không được thông báo (bị động phủ định + ず nối sang mệnh đề sau)","r":"「参加者には知らされておらず」= không được thông báo → 〜ておらず = 〜ていなくて.","traps":[{"w":"知られつつも","e":"= dù đã được biết đến → thừa nhận đã biết, nghĩa NGƯỢC"},{"w":"知らされていないと","e":"= với tình trạng không được thông báo → と gợi ý điều kiện/trích dẫn, không nối tiếp"},{"w":"知られたためか","e":"= có lẽ vì đã được biết → suy đoán về nguyên nhân, lại NGƯỢC nghĩa"}]},"07-2014_30":{"s":"〜としか言いようがない → chỉ có thể nói là X, không có từ nào khác để mô tả","r":"「奇跡としか言いようがない」= chỉ có thể gọi là kỳ tích. Diễn tả sự ấn tượng tột độ.","traps":[{"w":"とでも言えばいい","e":"= gọi là gì đó cho xong → thái độ tùy tiện, không phải ca ngợi"},{"w":"とすら言おうとしない","e":"= không chịu nói là... → phủ nhận việc nói, nghĩa tiêu cực"},{"w":"と言ってもしかたがない","e":"= nói vậy cũng vô ích → bi quan, không phải ngưỡng mộ"}]},"12-2014_31":{"s":"N という N → mọi loại N, tất cả các N không ngoại lệ (nhấn mạnh toàn bộ)","r":"「花という花が一斉に咲く」= mọi loài hoa đều nở. という kẹp hai danh từ giống nhau.","traps":[{"w":"だの","e":"= này nọ (liệt kê tiêu cực, thất vọng) → sắc thái tiêu cực, không phải ca ngợi"},{"w":"との","e":"= với (liên kết) → không tạo nghĩa 'tất cả không ngoại lệ'"},{"w":"なり","e":"= hay là (liệt kê lựa chọn tùy ý) → chọn một trong hai, không phải tất cả"}]},"12-2014_32":{"s":"どうやら〜ようだ/らしい → hình như, có vẻ như (suy đoán CÓ CĂN CỨ từ quan sát)","r":"Quan sát thấy mèo chạy khi thấy máy ảnh → suy ra「どうやらレンズが怖いようだ」.","traps":[{"w":"まさか","e":"= không lẽ nào, chắc không phải (bác bỏ khả năng) → nghi ngờ, không phải suy đoán từ quan sát"},{"w":"なんて","e":"= thật là... (cảm thán ngạc nhiên) → biểu cảm, không phải suy luận"},{"w":"かえって","e":"= ngược lại, trái mong đợi → chỉ kết quả trái chiều, không phải phỏng đoán"}],"kw":"どうやら","kw_hint":"どうやら → cặp cố định với 〜ようだ/らしい","kw_loai":"Loại ngay まさか・なんて・かえって"},"12-2014_33":{"s":"〜を受けて → tiếp nhận/dựa trên X, phản ứng với X (ảnh hưởng gián tiếp)","r":"「景気の回復傾向を受けて」= dựa trên/do ảnh hưởng của xu hướng phục hồi kinh tế.","traps":[{"w":"に限って","e":"= chỉ riêng X mới... (ngoại lệ bất ngờ) → nhấn mạnh trường hợp đặc biệt"},{"w":"にわたって","e":"= trải dài qua, suốt (phạm vi thời gian/không gian) → phạm vi, không phải ảnh hưởng"},{"w":"を含めて","e":"= bao gồm cả X → liệt kê thêm vào, không phải chịu ảnh hưởng từ"}]},"12-2014_34":{"s":"〜なくはない → không phải là không... (phủ định kép = khẳng định dè dặt, miễn cưỡng)","r":"「着られなくはなかった」= không phải là không mặc được = mặc được nhưng hơi chật.","traps":[{"w":"着られもしなかった","e":"= không mặc được tí nào (phủ định tuyệt đối) → nghĩa NGƯỢC, không thể mặc"},{"w":"着られてはならなかった","e":"= không được phép mặc → cấm đoán, sai hoàn toàn"},{"w":"着るに着られなかった","e":"= dù muốn mặc cũng không mặc được → không thể mặc, nghĩa ngược"}]},"12-2014_35":{"s":"頂戴する → khiêm nhường ngữ của もらう (nhận từ người trên/khách hàng)","r":"Khách sạn nhận ý kiến từ khách hàng → 頂戴した ご意見 = ý kiến chúng tôi đã nhận được.","traps":[{"w":"なさった","e":"= kính ngữ của する → hành động của KHÁCH HÀNG, sai chủ thể (khách sạn mới là người nhận)"},{"w":"差し上げた","e":"= khiêm nhường của あげる → nghĩa là TRAO CHO (ngược chiều)"},{"w":"おいでくださった","e":"= kính ngữ của 来る → nghĩa là 'đã đến', không liên quan đến ý kiến"}]},"12-2014_36":{"s":"〜ばいいものを → chỉ cần làm X là xong vậy mà (tiếc nuối/bực bội vì không chịu làm)\n🔗 Họ ものを/ものか/ものだ/ものの dễ lẫn:\n・ものを → tiếc nuối/bực bội, đi cặp 〜ば...ものを, luôn ở CUỐI câu\n・ものか → đời nào/không thể... được sao (phủ định mạnh hoặc than thở)\n・ものだ → cảm thán/quy luật tự nhiên ('hóa ra là vậy')\n・ものの → tuy...nhưng (nhượng bộ, giữa câu)","r":"「謝ればいいものを、できない」= chỉ cần xin lỗi là xong vậy mà lại không làm được.","traps":[{"w":"謝ろうとしないのだから","e":"= vì không chịu xin lỗi → giải thích lý do, không có sắc thái tiếc nuối"},{"w":"謝っているところに","e":"= ngay lúc đang xin lỗi → thời điểm hành động, sai ngữ cảnh"},{"w":"謝らないかぎりは","e":"= chừng nào chưa xin lỗi thì → điều kiện thuần túy, không có tiếc nuối/bực bội"}]},"12-2014_37":{"s":"〜か〜ないかのころ → vào khoảng lúc vừa X hay chưa X (thời điểm rất sớm, ký ức mơ hồ)","r":"「小学校に入るか入らないかのころ」= lúc mới vào hay chưa vào tiểu học. Ký ức thơ ấu rất mờ nhạt.","traps":[{"w":"入ろうが入るまいが","e":"= dù có vào hay không → nhượng bộ, không quan trọng kết quả. Không nói về thời điểm"},{"w":"入っていてもいなくても","e":"= dù đang học hay không → cũng là nhượng bộ, không phải thời điểm"},{"w":"入るにしても入らないにしても","e":"= dù vào hay không vào → nhượng bộ hai chiều, không phải thời điểm mơ hồ"}]},"12-2014_38":{"s":"〜ながらにしては → xét trong điều kiện đang X thì... (kết quả tốt hơn dự kiến)","r":"「揺られながらにしては、よく撮れた」= xét trong hoàn cảnh bị lắc thì chụp khá tốt.","traps":[{"w":"揺られながらとなれば","e":"= nếu trở thành trạng thái đang bị lắc thì → giả định tương lai, không phải thực tế đang xảy ra"},{"w":"揺られっぱなしなのか","e":"= bị lắc mãi không thôi à? → câu hỏi ngạc nhiên, không phải đánh giá kết quả"},{"w":"揺られっぱなしだとは","e":"= thật ra bị lắc mãi → cảm thán về tình trạng, không phải so sánh kết quả"}]},"12-2014_39":{"s":"〜てならない → không thể không... (cảm xúc tự trào dâng, không kìm được)","r":"「悔やまれてならない」= không thể không tiếc nuối. Cảm xúc tự nhiên, không kiểm soát được.","traps":[{"w":"悔やまないようにする","e":"= cố gắng không tiếc → chủ động kiềm chế, ngược lại hoàn toàn"},{"w":"悔やんでばかりだ","e":"= cứ tiếc mãi (mô tả thói quen/hành vi) → khác với cảm xúc không kìm được"},{"w":"悔やむべきではない","e":"= không nên tiếc → khuyên bảo, không phải diễn tả cảm xúc"}]},"12-2014_40":{"s":"〜なくて済む → không cần phải làm X (thoát khỏi việc phải làm, cảm giác nhẹ nhõm)","r":"「買わなくて済みそうだ」= có vẻ không cần phải mua. そうだ = có vẻ (dự đoán từ quan sát).","traps":[{"w":"買ってきてはないんだ","e":"= thực ra không mua về rồi → phủ nhận hành động đã làm"},{"w":"買ったきりになってる","e":"= mua rồi không dùng/không làm gì thêm → mua rồi bỏ quên"},{"w":"買うつもりじゃなかった","e":"= vốn không có ý định mua → nói về ý định ban đầu, không phải kết quả"}]},"07-2015_41":{"s":"まるで〜ない → hoàn toàn không... một chút nào (phủ định tuyệt đối)","r":"「まるで興味がない」= không có hứng thú một chút nào. まるで + phủ định = tuyệt đối không.","traps":[{"w":"とうとう","e":"= cuối cùng, rốt cuộc → kết quả sau quá trình chờ đợi/cố gắng"},{"w":"二度と","e":"= không bao giờ nữa (từ lần này trở đi) → phủ định tương lai, không phải mức độ hiện tại"},{"w":"たとえ","e":"= dù, cho dù → nhượng bộ giả định, cần thêm 〜ても"}],"kw":"まるで","kw_hint":"まるで + phủ định → hoàn toàn không... (tuyệt đối)","kw_loai":"Loại ngay とうとう・たとえ・二度と"},"07-2015_42":{"s":"をもって ①[kết thúc] lấy X làm mốc chấm dứt  ②[tiêu chí] lấy X làm căn cứ xác định","r":"→ Câu này dùng nghĩa ②: 「何をもって幸せとするか」= dựa vào điều gì để định nghĩa hạnh phúc.","traps":[{"w":"にむけて","e":"= hướng tới X, nhắm vào X → mục tiêu, không phải tiêu chí"},{"w":"をめぐって","e":"= xoay quanh X (tranh luận, thảo luận về) → bàn cãi về vấn đề"},{"w":"につれて","e":"= theo đà X tăng thì Y (tỉ lệ thuận) → sự thay đổi song song"}]},"07-2015_43":{"s":"〜ていなければ〜なかった → nếu không đang/đã làm X thì Y đã không xảy ra (giả định trái thực tế quá khứ)","r":"「見ていなければ、女優にならなかった」= nếu không xem thì đã không trở thành diễn viên.","traps":[{"w":"見たとしたら","e":"= giả sử đã xem thì → giả định thuận chiều (nếu CÓ xem), không phải trái thực tế"},{"w":"見ようが","e":"= dù có xem hay không → nhượng bộ, kết quả không đổi dù thế nào"},{"w":"見なかったにしろ","e":"= dù không xem đi nữa → nhượng bộ chấp nhận, không phải giả định kết quả"}]},"07-2015_44":{"s":"〜ようとはしなかった → cố tình không chịu làm X, nhất quyết từ chối (ý chí chủ động)","r":"「認めようとはしなかった」= nhất quyết không chịu thừa nhận. Nhấn mạnh ý chí từ chối chủ động.","traps":[{"w":"認めるほかはなかった","e":"= không còn cách nào khác ngoài thừa nhận → nghĩa NGƯỢC HOÀN TOÀN!"},{"w":"認めないでもなかった","e":"= không phải là không thừa nhận (dè dặt) → nghĩa ngược, thực ra có thừa nhận"},{"w":"認めねばならなかった","e":"= buộc phải thừa nhận → bị ép buộc, cũng ngược nghĩa"}]},"07-2015_45":{"s":"〜れる (自発) → tự nhiên nhớ ra, tự nhiên cảm thấy (không chủ ý, tự phát)","r":"「思い出される」= ký ức tự nhiên ùa về. Đến nơi quen → ký ức tự trào ra, không cần cố nhớ.","traps":[{"w":"思い出す","e":"= chủ động nhớ lại (mình cố tình nhớ) → trái với ngữ cảnh ký ức tự ùa về"},{"w":"思い出すだろう","e":"= chắc sẽ nhớ lại → dự đoán tương lai, sai thì"},{"w":"思い出させた","e":"= khiến (ai đó) nhớ lại → cần tân ngữ là người bị khiến nhớ, sai cấu trúc"}]},"07-2015_46":{"s":"〜てからでは遅い → đợi đến khi X xảy ra rồi thì muộn (kêu gọi hành động ngay)","r":"「影響が出てからでは遅い」= đợi ảnh hưởng xuất hiện rồi mới xử lý thì muộn mất.","traps":[{"w":"出たせいなのかは","e":"= có phải vì đã xuất hiện không → nghi vấn về nguyên nhân, không phải cảnh báo"},{"w":"出てしまうかは","e":"= liệu có bị xuất hiện không → nghi vấn về khả năng, không phải cảnh báo"},{"w":"出たばかりでは","e":"= ngay khi mới vừa xuất hiện thì → thời điểm quá sớm, không phải 'đợi đến khi'"}]},"07-2015_47":{"s":"〜ともいうべき → có thể/đáng gọi là X (đánh giá xứng đáng, khẳng định trang trọng)","r":"「象徴ともいうべき存在」= sự hiện diện có thể gọi là biểu tượng. とも言うべき = cũng có thể nói là.","traps":[{"w":"にするべく","e":"= nhằm mục đích biến thành X → ý định/mục đích, không phải đánh giá"},{"w":"があるらしい","e":"= hình như có X → phỏng đoán sự tồn tại, không phải đánh giá danh hiệu"},{"w":"でもなるような","e":"= kiểu như trở thành → mơ hồ, không trang trọng, sai nghĩa"}]},"07-2015_48":{"s":"〜ものだ → hóa ra là vậy đấy! (khám phá bất ngờ, cảm thán về sự thật mới nhận ra)\n🔗 Họ ものを/ものか/ものだ/ものの dễ lẫn:\n・ものを → tiếc nuối/bực bội, đi cặp 〜ば...ものを, luôn ở CUỐI câu\n・ものか → đời nào/không thể... được sao (phủ định mạnh hoặc than thở)\n・ものだ → cảm thán/quy luật tự nhiên ('hóa ra là vậy')\n・ものの → tuy...nhưng (nhượng bộ, giữa câu)","r":"「意外と簡単に作れるものだ」= hóa ra cũng làm được dễ dàng (ngạc nhiên tích cực khi tự làm thử).","traps":[{"w":"作るまでだ","e":"= chỉ còn cách làm thôi (không có lựa chọn khác) → quyết tâm bất đắc dĩ"},{"w":"作るに限る","e":"= tự làm là nhất, không gì bằng → khuyến nghị, không phải khám phá"},{"w":"作っただけのことはある","e":"= xứng đáng với công sức đã làm → kết quả tương xứng, không phải ngạc nhiên"}]},"07-2015_49":{"s":"〜じゃわないか → mình làm X luôn đi nhé! (〜てしまわないか rút gọn, rủ rê thân mật)","r":"「頼んじゃわないか」= đặt món luôn đi nhé. 〜てしまう → 〜ちゃう/じゃう. Rủ rê nhẹ nhàng.","traps":[{"w":"頼んどけないよ","e":"= không đặt trước được đâu → phủ định khả năng, nghĩa ngược"},{"w":"頼んどかないで","e":"= đừng đặt trước → cấm đoán, hoàn toàn ngược nghĩa"},{"w":"頼んじゃうんじゃないよね","e":"= không phải định đặt đấy chứ? → hỏi nghi ngờ lo lắng, sai sắc thái"}]},"07-2015_50":{"s":"〜ていただけると助かるんですが → nếu anh/chị có thể... thì tôi rất biết ơn (nhờ vả lịch sự, dè dặt)","r":"ていただけると = nếu có thể; 助かる = tôi nhẹ nhõm/vui; が cuối = còn dang dở (lịch sự hơn).","traps":[{"w":"見ていただくんでしょうか","e":"= sếp sẽ xem đúng không? → xác nhận kế hoạch của sếp, không phải nhờ"},{"w":"見ていだだいたと思うんですが","e":"= tôi nghĩ là đã được xem rồi → nói về quá khứ, sai thì"},{"w":"見ていただいてはいかがでしょうか","e":"= sao anh không xem thử nhỉ → đề xuất với sếp nghe hơi vô lý"}]},"12-2015_51":{"s":"N は N で → X thì X cũng có (vấn đề/đặc điểm riêng của X). Cấu trúc lặp từ cố định","r":"「大人は大人で大変なことがある」= người lớn thì người lớn cũng có chuyện vất vả riêng.","traps":[{"w":"大人が大人に","e":"= người lớn với/cho người lớn → quan hệ đối tượng, sai hoàn toàn"},{"w":"大人より大人で","e":"= người lớn hơn người lớn mà → so sánh vô nghĩa"},{"w":"大人から大人に","e":"= từ người lớn đến người lớn → chuyển giao, không phải cấu trúc lặp từ"}]},"12-2015_52":{"s":"〜だけあって → xứng với, đúng như... (kết quả hoàn toàn hợp lý với nền tảng/kinh nghiệm)","r":"「幼稚園の先生をしていただけあって、童話をたくさん知っている」= đúng vì từng là giáo viên mầm non nên biết nhiều.","traps":[{"w":"していたからには","e":"= một khi đã từng làm thì phải... → nghĩa vụ/trách nhiệm, không phải kết quả hợp lý"},{"w":"していたとは","e":"= thật bất ngờ là đã từng làm → ngạc nhiên, không phải nhận xét hợp lý"},{"w":"していたところ","e":"= ngay lúc đang làm thì... → thời điểm xảy ra sự kiện, không phải nền tảng kinh nghiệm"}]},"12-2015_53":{"s":"いっさい〜ない → tuyệt đối không, một chút cũng không (phủ định hoàn toàn không ngoại lệ)","r":"「いっさい認められていない」= tuyệt đối không được phép. いっさい luôn đi với phủ định.","traps":[{"w":"むしろ","e":"= hơn là, thay vào đó → so sánh/thay thế, không phải phủ định tuyệt đối"},{"w":"かならず","e":"= nhất định, chắc chắn (khẳng định) → đối lập hoàn toàn với phủ định"},{"w":"どうしても","e":"= dù thế nào cũng / không thể không → khẳng định mạnh hoặc phủ định ý chí, không phải cấm đoán"}],"kw":"いっさい","kw_hint":"いっさい → luôn đi với phủ định ない/ず","kw_loai":"Loại ngay むしろ・かならず・どうしても"},"12-2015_54":{"s":"〜にしてみれば → đối với X mà xét, từ góc nhìn của X thì (đặt mình vào vị trí người khác)","r":"「地元の人にしてみれば日常の風景」= đối với người địa phương mà nói thì chỉ là cảnh thường ngày.","traps":[{"w":"からして","e":"= ngay từ X đã thấy rõ → dùng để nêu bằng chứng/căn cứ, không phải góc nhìn"},{"w":"といっても","e":"= dù nói vậy nhưng (nhượng bộ) → hạn chế ý vừa nói, không phải góc nhìn"},{"w":"はともかくとして","e":"= X thì tạm gác sang một bên → bỏ qua X để nói chuyện khác"}]},"12-2015_55":{"s":"存じ上げる → khiêm nhường ngữ đặc biệt của 知る khi đối tượng là NGƯỜI (cao hơn 存じる)","r":"「よく存じ上げています」= tôi biết rõ về anh ấy. 存じ上げる chỉ dùng khi biết VỀ một NGƯỜI cụ thể.","traps":[{"w":"知っていただけます","e":"= có thể cho anh biết → mình cung cấp thông tin cho người kia, sai chiều"},{"w":"お目にかかれます","e":"= có thể được gặp → nghĩa là gặp mặt, không phải biết về ai đó"},{"w":"お会いになっています","e":"= (anh ấy) đang gặp → kính ngữ hành động của người khác, sai chủ thể"}]},"12-2015_56":{"s":"〜ずに済むものなら → nếu có thể thoát khỏi việc phải làm X thì (ao ước điều khó/không thể)","r":"「抜かずに済むものなら、そうしたい」= nếu không nhổ mà vẫn ổn thì muốn vậy. Nhưng thực tế là phải nhổ.","traps":[{"w":"抜かずにいると","e":"= nếu cứ không nhổ thì → điều kiện thực tế, không phải ao ước"},{"w":"抜かずにいることで","e":"= bằng cách không nhổ → phương tiện để đạt mục đích, sai"},{"w":"抜かずに済むのだから","e":"= vì không nhổ cũng ổn → khẳng định thực tế ổn, MÂU THUẪN với câu sau 'không còn cách khác'"}]},"12-2015_57":{"s":"〜に決まっている → chắc chắn là X, không nghi ngờ gì (xác định mạnh từ phán đoán)","r":"「無理だと言われるに決まっている」= chắc chắn bị nói là không thể.","traps":[{"w":"言わせる始末だ","e":"= đến mức để xảy ra tình trạng người ta nói → kết quả đáng tiếc/tệ"},{"w":"言わせるということだ","e":"= có nghĩa là để người ta nói → giải thích/kết luận, không phải chắc chắn"},{"w":"言われるまでになる","e":"= đến mức bị nói → đạt đến trạng thái, không phải dự đoán chắc chắn"}]},"12-2015_58":{"s":"〜でいい → X thế này là được rồi (chấp nhận mức tối thiểu, không đòi hỏi cao)","r":"「時間があるときでいいから」= khi nào rảnh thì được, không cần cấp bách. Thể hiện sự thông cảm.","traps":[{"w":"がいいし","e":"= X là tốt và... → liệt kê ưu điểm, không phải chấp nhận tối thiểu"},{"w":"ならいいのに","e":"= nếu là X thì tốt nhỉ → ao ước điều không có, sắc thái tiếc nuối"},{"w":"でもいいけど","e":"= X cũng được thôi nhưng → miễn cưỡng chấp nhận kèm điều kiện ngầm"}]},"12-2015_59":{"s":"〜といえるだろうか → liệu có thể nói là X không? (câu hỏi tu từ, thực ra là phủ định)","r":"「質が向上しているといえるだろうか。私はそうは思わない」= hỏi tu từ để dẫn đến phủ định ngay sau.","traps":[{"w":"といえないではないか","e":"= không phải không thể nói là... (phủ định kép = khẳng định) → nghĩa ngược với ý tác giả"},{"w":"へきではないだろうか","e":"= không phải là không nên... → sai ngữ pháp (へき không tồn tại, phải là べき)"},{"w":"べきであるか否か","e":"= có nên hay không (vấn đề đạo đức/nghĩa vụ) → hỏi về nghĩa vụ, không phải thực tế"}]},"12-2015_60":{"s":"〜てばかりいても始まらない → cứ mãi X cũng vô ích, không giải quyết được gì","r":"「落ち込んでばかりいても始まらない」= cứ buồn mãi cũng chẳng giải quyết được gì. ばかり = chỉ mãi.","traps":[{"w":"落ち込みもしない","e":"= không hề buồn → phủ định hoàn toàn trạng thái, ngược với câu chuyện"},{"w":"落ち込むわけではない","e":"= không phải là buồn (phủ định nhẹ) → không hoàn toàn phủ nhận, nhưng sai ngữ cảnh"},{"w":"落ち込んでいたことは否めない","e":"= không thể phủ nhận là đã buồn → thừa nhận quá khứ, không phải quyết tâm tiến lên"}]},"07-2010_1":{"s":"〜では → trong điều kiện chỉ/chỉ với X thì không đủ (phủ định điều kiện không thỏa mãn)","r":"「半日では足りない」= chỉ với nửa ngày thì không đủ. では đánh dấu điều kiện bị phán đoán là thiếu.","traps":[{"w":"にわたって","e":"= kéo dài suốt (phạm vi thời gian/không gian rộng) → không hợp với 足りない"},{"w":"にかけて","e":"= từ X đến Y (phạm vi liên tục) → chỉ khoảng thời gian, không phải điều kiện"},{"w":"までは","e":"= đến tận X thì... → nhấn mạnh giới hạn tối đa, không phải điều kiện thiếu"}]},"07-2010_2":{"s":"〜まま → cứ y như vậy, theo đúng như (bị tác động mà không kháng cự)","r":"「勧められるまま買ってしまった」= cứ theo lời nhân viên gợi ý mà mua. まま = theo đúng trạng thái đó.","traps":[{"w":"ままを","e":"= まま + を (tân ngữ) → まま không cần を, đây là sai cấu trúc"},{"w":"ままでも","e":"= dù theo đúng trạng thái đó thì... → nhượng bộ, không phải hành động thuận theo"},{"w":"ままなのに","e":"= vậy mà cứ theo đó → thể hiện bực bội/tương phản, sai ngữ cảnh"}]},"07-2010_3":{"s":"〜として → coi X là, lấy danh nghĩa X (xác nhận tư cách/nhận định)","r":"「不当として訴えを起こした」= coi việc sa thải là không công bằng mà khởi kiện. として = với nhận định là.","traps":[{"w":"となって","e":"= trở thành X → kết quả biến đổi, không phải nhận định/lập trường"},{"w":"になって","e":"= trở thành, biến thành X → cũng là sự biến đổi, không phải coi là"},{"w":"にして","e":"= vừa là X vừa là Y / ngay tại X → đa nghĩa nhưng không phải 'coi là'"}]},"07-2010_4":{"s":"〜ていただきたく → khiêm nhường: muốn được nhận (～ていただく) điều gì đó (trong thông báo chính thức)","r":"「ご理解いただきたく」= mong được quý vị thông cảm. いただきたく = いただきたい (dạng nối, bỏ い).","traps":[{"w":"いたしたく","e":"= muốn làm (hành động của mình) → chủ thể sai, ở đây cần người đọc làm (理解する)"},{"w":"差し上げたく","e":"= khiêm nhường của あげる → trao cái gì đó cho người khác, không phải nhận sự thông cảm"},{"w":"申しあげたく","e":"= khiêm nhường của 言う → muốn thưa gửi, không phải muốn được nhận sự thông cảm"}]},"07-2010_5":{"s":"〜極まりない → cực kỳ, vô cùng (mức tột cùng)\nCấu trúc: Nな (bỏ な) + 極まりない\n⚠️ KHÔNG thêm な hay に vào trước 極まりない\n🔗 Bẫy lặp lại nhiều lần trong đề thi:\n・〜極まりない luôn theo SAU dạng gốc của tính từ na (bỏ な)\n・VD đúng: 危険極まりない, 失礼極まりない (KHÔNG có な trước 極まりない)\n→ Hễ thấy 極まりない là first phải loại ngay đáp án có thêm な hoặc に","r":"「失礼極まりない」= cực kỳ thiếu lịch sự. Trước 極まりない là dạng gốc, không thêm な hay に.","traps":[{"w":"でならない","e":"= không thể không... (cảm xúc tự phát) → dùng với động từ/trạng thái cảm xúc, không phải đánh giá mức độ"},{"w":"ではいられない","e":"= không thể cứ ở trạng thái... mãi → hành vi không thể kìm chế, không phải mức độ"},{"w":"に越したことはない","e":"= không gì tốt hơn là X (khuyến nghị) → nghĩa khuyên bảo, hoàn toàn khác"}]},"07-2010_6":{"s":"どうりで〜はずだ → thảo nào..., bảo sao... (hiểu ra lý do)","r":"「祝日だから → どうりで空いてるはずだ」= thảo nào trống vắng, vì hôm nay là ngày lễ mà. はずだ = hợp lý.","traps":[{"w":"こともある","e":"= đôi khi cũng có → mức độ 'đôi khi', không phải kết luận chắc chắn"},{"w":"に決まってる","e":"= chắc chắn là (phán đoán mạnh chủ quan) → không phù hợp với どうりで"},{"w":"に違いない","e":"= chắc chắn là (suy luận khách quan) → cũng mạnh quá, はずだ hợp với どうりで hơn"}]},"07-2010_7":{"s":"〜ことはないにしても → dù không đến mức X thì Y vẫn xảy ra (nhượng bộ + kết luận chắc chắn)","r":"「完全に失われることはないにしても、弱まることは間違いない」= dù không đến mức mất hoàn toàn, yếu đi là chắc chắn.","traps":[{"w":"ことはないにもかかわらず","e":"= mặc dù không X (nhượng bộ đối lập) → mặc dù không nhưng... ngược nghĩa"},{"w":"ほかはないにしても","e":"= dù không còn cách nào khác thì → ほかはない nghĩa hoàn toàn khác"},{"w":"ほかはないにもかかわらず","e":"= mặc dù không còn cách nào khác → kép sai, vừa sai nghĩa vừa sai cấu trúc"}]},"07-2010_8":{"s":"〜かというと、そうではない → liệu có phải là X không thì không hẳn (phủ nhận mềm)","r":"「母親でなくてはならないかというと、必ずしもそうではない」= liệu có phải nhất thiết là mẹ không thì không nhất thiết vậy.","traps":[{"w":"なくてはならないからといって","e":"= chỉ vì phải là... → からといって = dù nói vậy cũng không có nghĩa, khác hướng lập luận"},{"w":"あるわけにはいかないからといって","e":"= sai ngữ nghĩa cơ bản → あるわけにはいかない không phù hợp ngữ cảnh"},{"w":"あるわけにはいかないかというと","e":"= liệu có phải không thể là... → あるわけにはいかない sai nghĩa với câu này"}]},"07-2010_9":{"s":"〜などするものか → đời nào mà (làm X), tôi nhất quyết không làm X (phủ định cảm xúc mạnh)\n🔗 Họ ものを/ものか/ものだ/ものの dễ lẫn:\n・ものを → tiếc nuối/bực bội, đi cặp 〜ば...ものを, luôn ở CUỐI câu\n・ものか → đời nào/không thể... được sao (phủ định mạnh hoặc than thở)\n・ものだ → cảm thán/quy luật tự nhiên ('hóa ra là vậy')\n・ものの → tuy...nhưng (nhượng bộ, giữa câu)","r":"「もう二度と恋などするものか」= đời nào tôi còn yêu nữa. などするものか = dấu hiệu phủ nhận mạnh cảm xúc.","traps":[{"w":"こそするものか","e":"= こそ nhấn mạnh đối tượng → 'đúng cái này thì không làm', hơi khác với などするものか"},{"w":"こそするものなのか","e":"= のか = câu hỏi thực → biến thành câu hỏi thực, không phải cảm thán phủ định"},{"w":"などするものなのか","e":"= thêm なのか → cũng biến thành câu hỏi, mất sắc thái quyết tâm phủ định"}]},"07-2010_10":{"s":"単に〜にすぎず → chỉ là, đơn thuần chỉ nhằm... thôi (giới hạn ý định)\n💡 DẤU HIỆU: 単に trong câu → loại ngay ほどで (a, b), chỉ còn c, d với にすぎず","r":"「単に指摘しようとしたにすぎず」= chỉ nhằm chỉ ra vấn đề thôi, không hơn. しようとした = cố định làm (đúng), không phải しそうになった = suýt xảy ra.","traps":[{"w":"しそうになったにすぎず","e":"= chỉ là suýt làm → しそうになった = suýt, không phải 'cố định làm'. Sai ý nghĩa"},{"w":"しそうになったほどで","e":"= đến mức suýt làm → ほどで không cặp với 単に. Loại ngay!"},{"w":"しようとしたほどで","e":"= đến mức cố định làm → ほどで không cặp với 単に. Loại ngay!"}],"kw":"単に","kw_hint":"単に → cặp cố định với にすぎない/にすぎず","kw_loai":"Loại ngay b・d (dùng ほどで) vì 単に không đi với ほど"},"12-2010_11":{"s":"〜を機に → nhân dịp X, lấy X làm cơ hội để (bắt đầu điều mới)","r":"「90周年を機に最新型車両を導入」= nhân dịp 90 năm thành lập mà đưa vào sử dụng tàu mới.","traps":[{"w":"を限りに","e":"= lấy X làm giới hạn cuối cùng (kết thúc) → nghĩa NGƯỢC: kết thúc, không phải bắt đầu"},{"w":"を皮切りに","e":"= lấy X làm khởi đầu → gần nghĩa nhưng 皮切り = khai mạc chuỗi sự kiện, を機に = cơ hội chuyển sang cái mới"},{"w":"をよそに","e":"= bất chấp X, coi thường X → không liên quan đến cơ hội hay bắt đầu"}]},"12-2010_12":{"s":"〜は〜しない (は強調) → chắc chắn không làm X (phủ định mạnh bằng は để nhấn mạnh)","r":"「受け入れられはしない」= chắc chắn không được chấp nhận. は giữa động từ và phủ định = nhấn mạnh phủ định.","traps":[{"w":"受け入れは","e":"= は đứng ngay sau động từ thể từ → sai ngữ pháp, cần 受け入れられは (thể bị động)"},{"w":"受け入れられては","e":"= nếu bị chấp nhận thì... → ては = điều kiện/nguyên nhân tiêu cực, không phải phủ định nhấn mạnh"},{"w":"受け入れられることは","e":"= việc được chấp nhận thì... → ことは danh từ hóa, không phải phủ định nhấn mạnh"}]},"12-2010_13":{"s":"いっさい〜ない → tuyệt đối không, hoàn toàn không có (phủ định tuyệt đối)","r":"「添加物をいっさい使用していない」= tuyệt đối không sử dụng phụ gia. いっさい luôn đi với phủ định.","traps":[{"w":"とても","e":"= rất (khẳng định mức độ) → đối lập, không dùng với 〜ない theo nghĩa này"},{"w":"きっと","e":"= chắc chắn (suy đoán khẳng định) → không hợp với phủ định 〜ていない"},{"w":"まさか","e":"= không lẽ nào (bác bỏ, ngạc nhiên) → câu hỏi tu từ, không phải tuyên bố"}],"kw":"いっさい","kw_hint":"いっさい → luôn đi với phủ định ない/ず","kw_loai":"Loại ngay đáp án không có ない"},"12-2010_14":{"s":"〜思い → cảm giác, cảm xúc (dùng trong cụm cố định diễn tả trạng thái tâm lý)","r":"「身が引き締まる思い」= cảm giác nghiêm túc/căng thẳng lên. 思い = cảm giác/tâm trạng trong văn trang trọng.","traps":[{"w":"考え","e":"= suy nghĩ, ý kiến (lý trí) → 考え là suy nghĩ trí tuệ, không phải cảm xúc thể xác"},{"w":"見込み","e":"= triển vọng, dự tính → hoàn toàn sai, không có cụm 身が引き締まる見込み"},{"w":"始末","e":"= kết cục tệ hại, tình trạng đáng tiếc → nghĩa tiêu cực, không phải cảm xúc nghiêm túc tích cực"}]},"12-2010_15":{"s":"おわび申し上げます → khiêm nhường ngữ cao nhất để xin lỗi (văn thư trang trọng)","r":"「深くおわび申し上げます」= xin chân thành xin lỗi quý vị. 申し上げる = khiêm nhường của 言う.","traps":[{"w":"わびでいただきます","e":"= sai ngữ pháp và nghĩa → いただく = nhận từ người trên, không phải xin lỗi"},{"w":"わびでいらっしゃいます","e":"= là (kính ngữ của です) → đây là kính ngữ cho người khác, không phải xin lỗi của mình"},{"w":"おわびいただきます","e":"= nhận được lời xin lỗi (từ người khác) → chiều ngược lại, người kia xin lỗi mình"}]},"12-2010_16":{"s":"〜じゃないか → chẳng phải sao! (trách móc trực tiếp, khẩu ngữ nam giới cấp trên)","r":"「困るじゃないか」= khó xử quá chứ! じゃないか = trách móc thẳng thắn trong hội thoại thân mật/cấp trên.","traps":[{"w":"のではないか","e":"= có phải là không nhỉ (nghi vấn nhẹ) → mềm hơn nhiều, không phải trách móc"},{"w":"じゃないのか","e":"= chẳng phải là không sao? (nghi vấn kép, khó hiểu) → thêm の làm câu mất đi tính trách móc trực tiếp"},{"w":"のではないのか","e":"= có phải không phải không? (phủ định kép rối rắm) → quá phức tạp, không tự nhiên"}]},"12-2010_17":{"s":"〜となりつつある → đang dần trở thành X (quá trình biến đổi đang xảy ra, chưa hoàn thành)","r":"「優良企業の条件の一つとなりつつある」= đang dần trở thành một trong những điều kiện của doanh nghiệp tốt.","traps":[{"w":"としうる","e":"= có thể là X (khả năng) → とし + うる = không phải cấu trúc tự nhiên, sai"},{"w":"となりうる","e":"= có thể trở thành X (khả năng tương lai) → khả năng, không phải quá trình đang diễn ra"},{"w":"としつつある","e":"= cấu trúc sai → とし không kết hợp với つつある, phải dùng となり"}]},"12-2010_18":{"s":"〜でもしたら → lỡ mà xảy ra X thì... (giả định tình huống tồi tệ, lo lắng)","r":"「刺されでもしたら大変」= lỡ mà bị đốt thì nguy hiểm lắm. でもしたら nhấn mạnh lo lắng về khả năng xấu.","traps":[{"w":"刺されさえしたら","e":"= chỉ cần bị đốt là... → さえ〜たら = điều kiện tối thiểu, không phải lo lắng tình huống xấu"},{"w":"刺させるなどしても","e":"= dù có cho đốt đi nữa → させる (sai khiến) sai, vả lại nghĩa hoàn toàn khác"},{"w":"刺させるくらいしても","e":"= đến mức cho đốt → させる sai chủ thể, không hợp ngữ cảnh lo lắng"}]},"12-2010_19":{"s":"〜ほどのことではない → không có gì đáng (tự hào/lo lắng) đến mức đó (hạ thấp mức độ)","r":"「自慢するほどのことではない」= không có gì đáng tự hào đến vậy đâu. Khiêm tốn về thành tích của mình.","traps":[{"w":"だけのことではない","e":"= không chỉ là vậy (mở rộng ra) → nghĩa mở rộng phạm vi, không phải hạ thấp mức độ"},{"w":"だけのことに過ぎない","e":"= chỉ là vậy thôi → cũng hạ thấp nhưng 過ぎない = chỉ là, còn ほどではない = không đến mức"},{"w":"ほどのことに過ぎない","e":"= chỉ là đến mức đó thôi → kết hợp sai, ほどのことではない mới đúng"}]},"12-2010_20":{"s":"〜べきではないのでしょうか → có lẽ không nên... không? (nghi vấn lịch sự về điều không nên làm)","r":"「もう何も言うべきではないのでしょうか」= có lẽ không nên nói gì nữa không? Hỏi ý kiến nhẹ nhàng.","traps":[{"w":"べきでしょう","e":"= nên làm (khẳng định) → nghĩa NGƯỢC, không phải nghi vấn về điều không nên"},{"w":"べきなのでしょう","e":"= có lẽ nên làm nhỉ → khẳng định nhẹ, không phải hỏi về điều không nên"},{"w":"べきなのではないでしょう","e":"= sai ngữ pháp → thiếu か cuối, câu bỏ dang, không tự nhiên"}]},"07-2011_21":{"s":"〜とあって → vì là X (lý do đặc biệt) nên... (nhấn mạnh nguyên nhân đặc thù dẫn đến kết quả rõ ràng)","r":"「無料とあって、多くのファンが詰めかけた」= vì là miễn phí nên rất đông người đến. とあって = vì là điều đặc biệt đó.","traps":[{"w":"にして","e":"= vừa là X / tại X (vị trí đặc biệt) → không có nghĩa 'vì là X nên'"},{"w":"にあって","e":"= trong hoàn cảnh X (trung tính) → không nhấn mạnh nguyên nhân đặc thù"},{"w":"として","e":"= với tư cách là X → xác định tư cách, không phải lý do tạo ra kết quả"}]},"07-2011_22":{"s":"〜につけ → mỗi khi..., hễ... là (tác nhân kích thích cảm xúc/suy nghĩ định kỳ)","r":"「話を聞くにつけ、つくづく感じる」= mỗi khi nghe chuyện như vậy lại thấm thía cảm nhận.","traps":[{"w":"なり","e":"= ngay khi / vừa... thì (tức thì) → なり = ngay lập tức, không phải mỗi khi"},{"w":"とは","e":"= điều gọi là X (định nghĩa/cảm thán) → không phải tác nhân lặp lại"},{"w":"にしてみると","e":"= nếu đứng từ góc nhìn của X thì → xét quan điểm, không phải tác nhân định kỳ"}]},"07-2011_23":{"s":"〜に〜に〜と → liệt kê công dụng/trường hợp (nhấn mạnh đa dụng)","r":"「いため物に、揚げ物に、何にでも使える」= dùng được cho xào này, chiên kia, đủ thứ. N に N に と = liệt kê đa dạng.","traps":[{"w":"は","e":"= trợ từ chủ đề → は liệt kê mang tính đối lập, không phải liệt kê đa dụng"},{"w":"や","e":"= và (liệt kê không đầy đủ) → や là liệt kê thông thường, không nhấn mạnh đa dụng"},{"w":"か","e":"= hay là (lựa chọn) → か là lựa chọn một trong hai, không phải liệt kê"}]},"07-2011_24":{"s":"〜させられた → bị bắt phải làm X (bị động của 使役 - cưỡng bức bất lợi)","r":"「質問に答えさせられた」= bị bắt phải trả lời câu hỏi (không muốn). させられる = bị ép buộc, chịu thiệt thòi.","traps":[{"w":"させた","e":"= bắt (người khác) làm → chủ động sai khiến, NGƯỢC chiều hoàn toàn"},{"w":"させられる","e":"= bị bắt (hiện tại/tương lai) → đúng dạng nhưng cần quá khứ させられた vì câu kể chuyện quá khứ"},{"w":"させる","e":"= bắt (người khác) làm (chủ động) → chủ ngữ sai khiến, không phải bị ép buộc"}]},"07-2011_25":{"s":"〜ではないか → ngạc nhiên/thán phục trước điều bất ngờ! (cảm thán phát hiện bất ngờ)","r":"「反対方向に走り始めたではないか」= thế mà nó lại chạy ngược chiều kia! ではないか = phát hiện bất ngờ, cảm thán.","traps":[{"w":"ではない","e":"= không phải là X (phủ định bình thường) → không có sắc thái ngạc nhiên/cảm thán"},{"w":"のではない","e":"= không phải là (nhẹ, giải thích) → giải thích phủ định, không phải ngạc nhiên"},{"w":"のではないか","e":"= có lẽ là không...? (nghi vấn nhẹ) → nghi vấn phỏng đoán, không phải cảm thán bất ngờ"}]},"07-2011_26":{"s":"〜以上 → một khi đã X thì phải Y (nghĩa vụ/trách nhiệm tất yếu)","r":"「お出しする以上、衛生管理に注意する」= một khi đã phục vụ khách ăn thì phải chú trọng vệ sinh.","traps":[{"w":"お出しになる以上","e":"= kính ngữ của お出しになる → chủ ngữ là khách hàng, không phải cửa hàng. Sai chủ thể"},{"w":"お出しになるうえ","e":"= thêm vào việc (khách) mang ra → sai chủ thể và nghĩa"},{"w":"お出しするうえ","e":"= thêm vào việc phục vụ → うえ = thêm nữa, không phải 'một khi đã X thì'"}]},"07-2011_27":{"s":"〜でしかないことに → chỉ là X thôi (giới hạn, không hơn) + nhận ra điều đó","r":"「世界のほんの小さな一部分でしかないことに気づいていなかった」= không nhận ra đó chỉ là một phần rất nhỏ.","traps":[{"w":"でないことにしか","e":"= chỉ vào việc không phải là X → đảo ngữ sai, không thành câu có nghĩa"},{"w":"にないことでしか","e":"= cấu trúc đảo sai → không tự nhiên trong tiếng Nhật"},{"w":"にしかないことで","e":"= cũng đảo sai → にしかない = chỉ có ở trong X, hoàn toàn khác nghĩa"}]},"07-2011_28":{"s":"〜くらい → đến mức (nhấn mạnh mức độ tương đối cao, ngạc nhiên tích cực)","r":"「ばかばかしく思えるくらい簡単に計算できた」= tính toán dễ đến mức thấy buồn cười. くらい = đến mức đó.","traps":[{"w":"ばかばかしい思いをするもので","e":"= vì tạo ra cảm giác buồn cười nên... → もので = lý do, không phải mức độ"},{"w":"ばかばかしく思えるもので","e":"= vì có vẻ buồn cười nên → もので = lý do, không phải mức độ"},{"w":"ばかばかしい思いをするくらい","e":"= đến mức có cảm giác buồn cười → ばかばかしい思いをする (danh từ hóa) thay vì trạng từ ばかばかしく, ít tự nhiên hơn"}]},"07-2011_29":{"s":"お待ちいただくわけにはいきませんか → khiêm nhường: không thể phiền anh/chị chờ được không?","r":"「待っていただくわけにはいきませんか」= không thể nhờ ông/bà chờ một chút được không? Nhờ lịch sự.","traps":[{"w":"待っておいでになります","e":"= (ông/bà) đang chờ (kính ngữ) → kính ngữ mô tả trạng thái, không phải nhờ vả"},{"w":"お待ち申し上げております","e":"= chúng tôi đang chờ đợi (khiêm nhường) → chiều ngược lại, mình chờ khách"},{"w":"待たせていただくことにしましょうか","e":"= để tôi chờ vậy nhé → mình tự chờ, không phải nhờ khách chờ"}]},"07-2011_30":{"s":"〜かっていうと、そうじゃない → nếu hỏi có phải X không thì không hẳn (phủ định mềm câu hỏi)","r":"「初めから宇宙飛行士になるつもりだったかっていうと、そうじゃない」= nếu hỏi có định sẵn không thì không hẳn.","traps":[{"w":"つもりなのかっていわれたら","e":"= nếu bị hỏi về ý định → bị động (いわれたら), sắc thái khác với tự hỏi"},{"w":"つもりじゃなかったのかっていわれたら","e":"= nếu bị hỏi là có phải không có ý định không → phủ định kép rối, sai"},{"w":"つもりがなかったかっていうと","e":"= nếu hỏi là có phải không có ý định không → phủ định câu hỏi sai, câu trả lời ngược"}]},"12-2011_31":{"s":"〜を受けて → tiếp nhận/dựa trên X, phản ứng với X (ảnh hưởng gián tiếp dẫn đến hành động)","r":"「燃料価格の高騰を受けて、航空会社が運賃を値上げした」= do ảnh hưởng của giá nhiên liệu tăng mà tăng giá vé.","traps":[{"w":"に沿って","e":"= theo, tuân theo X (phương châm/hướng dẫn) → theo nguyên tắc, không phải phản ứng với sự kiện"},{"w":"にわたって","e":"= kéo dài suốt (phạm vi) → phạm vi rộng, không phải nguyên nhân"},{"w":"を通じる","e":"= thông qua X (phương tiện) → sai cấu trúc, phải là を通じて hoặc を通して"}]},"12-2011_32":{"s":"〜こととする → quyết định làm X, thống nhất là X (văn phong trang trọng/quyết nghị)","r":"「次回、改めて検討することと致します」= quyết định sẽ xem xét lại vào lần sau. こと+と+致します.","traps":[{"w":"の","e":"= trợ từ sở hữu → 検討することの致します không thành câu có nghĩa"},{"w":"で","e":"= bằng/tại (phương tiện, địa điểm) → 検討することで致します sai cấu trúc"},{"w":"が","e":"= chủ ngữ → 検討することが致します sai hoàn toàn về cú pháp"}]},"12-2011_33":{"s":"〜ゆえに → vì X (lý do - văn phong trang trọng/văn viết)","r":"「手軽さゆえに人気を集めている」= vì sự tiện lợi mà thu hút được sự yêu thích. ゆえに = から/ので (trang trọng).","traps":[{"w":"ながら","e":"= trong khi / mặc dù (nhượng bộ) → ながら = dù có đặc điểm X vẫn Y, không phải nguyên nhân"},{"w":"どころか","e":"= không những... mà còn / ngược lại → tương phản, không phải nguyên nhân"},{"w":"なくして","e":"= nếu không có X (điều kiện không thể thiếu) → điều kiện, không phải nguyên nhân"}]},"12-2011_34":{"s":"〜といったところ → khoảng chừng, xấp xỉ (ước lượng không chắc chắn)","r":"「大人で2時間半といったところ」= với người lớn thì khoảng 2 tiếng rưỡi. といったところ = ước lượng gần đúng.","traps":[{"w":"こと","e":"= danh từ hóa/sự việc → 2時間半ということ = đại ý là 2 tiếng rưỡi, nhưng không có nghĩa ước lượng"},{"w":"ばかり","e":"= vừa mới / chỉ khoảng (nhấn mạnh hạn chế) → 2時間半ばかり = khoảng chừng, nhưng sắc thái khác"},{"w":"とき","e":"= lúc, khi → 2時間半というとき = khi là 2 tiếng rưỡi → vô nghĩa trong ngữ cảnh này"}]},"12-2011_35":{"s":"〜ならではの → chỉ có X mới có, đặc trưng riêng của X (độc đáo không thể thay thế)","r":"「老舗旅館ならではの細やかな心遣い」= sự chu đáo chỉ có ở khách sạn lâu đời mới có được.","traps":[{"w":"ごときの","e":"= như (tương tự, thường mang nghĩa khiêm tốn hoặc khinh thường) → không có nghĩa độc quyền"},{"w":"がらみの","e":"= liên quan đến, dính líu đến (thường mang tính tiêu cực) → không phải đặc trưng"},{"w":"はどまでの","e":"= không tồn tại trong tiếng Nhật → cấu trúc sai hoàn toàn"}]},"12-2011_36":{"s":"〜しないでもない → không phải là không... (phủ định kép = thừa nhận dè dặt)","r":"「気がしないでもない」= không phải là không cảm thấy = có cảm thấy một chút. Thừa nhận một cách miễn cưỡng.","traps":[{"w":"することはないが","e":"= không cần phải làm X nhưng → không cần thiết, hoàn toàn khác"},{"w":"するよりほかないが","e":"= không còn cách nào khác ngoài X → bắt buộc phải làm, nghĩa đối lập"},{"w":"しないのではないが","e":"= không phải là không làm đâu nhưng → gần nghĩa nhưng しないでもない tự nhiên hơn trong văn viết"}]},"12-2011_37":{"s":"〜わけじゃあるまいし → chứ có phải là X đâu mà... (phủ định điều kiện quá mức)","r":"「何週間も海外に行くわけじゃあるまいし」= chứ có đi nước ngoài mấy tuần đâu mà (cần vali to vậy).","traps":[{"w":"行くもんだっただろうに","e":"= hẳn là nên đi rồi nhỉ → tiếc nuối về điều đã không xảy ra, sai hoàn toàn"},{"w":"行くわけだったんだから","e":"= vì vốn là nên đi → giải thích lý do, không phải phủ định điều kiện"},{"w":"行くもんじゃないだろうけど","e":"= hẳn không nên đi đâu nhỉ → nhẹ, không có sắc thái bực bội của じゃあるまいし"}]},"12-2011_38":{"s":"お聞かせ願えますか → kính ngữ: có thể cho tôi nghe được không? (nhờ người được phỏng vấn chia sẻ)","r":"「今のお気持ちをお聞かせ願えますか」= có thể cho tôi nghe cảm xúc hiện tại không? お聞かせ = cho nghe, 願えますか = xin phép.","traps":[{"w":"お聞きいただけません","e":"= không thể cho chúng tôi hỏi được không? → お聞き = nghe (của mình), sai chiều"},{"w":"お話になるでしょうか","e":"= (ông/bà) có nói không? → kính ngữ hỏi về hành động của đối phương, không phải xin phép nhờ"},{"w":"お話し申し上げましょうか","e":"= tôi có nên thưa không? → mình nói, sai chiều hoàn toàn"}]},"12-2011_39":{"s":"〜くらいはいいとしても → dù X ở mức đó còn tạ
