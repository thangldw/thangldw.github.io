tài tranh giành quyền lực nhưng nội dung thực lại là tình cảm gia đình. としながらも = hình thức là X nhưng thực ra là Y.","traps":[{"w":"であることで","e":"= vì là X → nguyên nhân, không phải tương phản"},{"w":"とすることで","e":"= bằng cách coi là X → không có tương phản"},{"w":"でありながらも","e":"= tuy là X nhưng → gần nghĩa nhưng でありながらも dùng khi danh tính/tính chất là X, ở đây 題材として cụ thể hơn cần としながらも"}]},"07-2025_31":{"s":"〜ほどではないものの → tuy không đến mức phải X nhưng Y (nhượng bộ nhẹ — thừa nhận nhưng kèm kết quả trái chiều)","r":"「病院で診てもらうほどではないものの、今朝もまだ少し痛む」= tuy không đến mức phải đến bệnh viện nhưng sáng nay vẫn còn hơi đau.","traps":[{"w":"診てもらうほどではないどころか","e":"= không chỉ không đến mức... mà còn → どころか = không chỉ vậy mà còn tệ hơn, sai nghĩa"},{"w":"診てもらわなくてはならないものの","e":"= tuy phải đến bệnh viện nhưng → NGƯỢC nghĩa, câu nói không cần đến bệnh viện"},{"w":"診てもらわなくてはならないどころか","e":"= không chỉ phải đến bệnh viện mà còn → vừa sai nghĩa vừa sai cấu trúc"}]},"07-2025_32":{"s":"〜ようとはしなかった → cố tình không chịu làm X, nhất quyết từ chối (ý chí chủ động — câu 44 [07-2015] cùng loại)","r":"「嫌いな色の服を決して着ようとはしなかった」= nhất quyết không chịu mặc quần áo màu mình ghét. とはしなかった nhấn mạnh ý chí từ chối chủ động.","traps":[{"w":"着るまでもなかった","e":"= không cần phải mặc đến mức đó → không cần thiết, không phải từ chối"},{"w":"着るわけにはいかなかった","e":"= không thể mặc được (vì lý do xã hội/đạo đức) → nghĩa không thể, không phải không chịu"},{"w":"着ようがなかった","e":"= dù muốn mặc cũng không thể (thiếu điều kiện) → NGƯỢC: muốn nhưng không thể ≠ không muốn"}]},"07-2025_33":{"s":"〜てまいります → khiêm nhường của 〜ていく (sẽ tiếp tục thực hiện — cam kết trang trọng)","r":"「さらに進めてまいります」= sẽ tiếp tục thúc đẩy hơn nữa. まいる = khiêm nhường của 行く/いく, dùng trong văn bản/trang web trang trọng.","traps":[{"w":"いたします","e":"= khiêm nhường của します → 進めていたします nghe không tự nhiên khi kết hợp với 〜ていく"},{"w":"いらっしゃいます","e":"= kính ngữ của います/来る/行く → dùng cho hành động của người được kính trọng, không phải bản thân"},{"w":"なさいます","e":"= kính ngữ của する → dùng khi nói về hành động của người được kính trọng, không phải tự nói về mình"}]},"07-2025_34":{"s":"〜ていたかもしれない → có lẽ đã (đang) X (giả định trái thực tế quá khứ — tiếp diễn tại thời điểm hiện tại tưởng tượng)","r":"「今ごろ部長くらいになっていたかもしれない」= bây giờ có lẽ đã lên đến chức trưởng phòng rồi. ていた = đang ở trạng thái đó (hiện tại tưởng tượng).","traps":[{"w":"なってきたようだ","e":"= có vẻ đã dần trở thành → mô tả quá trình đã xảy ra thực tế, không phải giả định"},{"w":"なってほしいようだ","e":"= có vẻ muốn trở thành → mong muốn của người khác, sai ngữ cảnh"},{"w":"なっていくかもしれない","e":"= có lẽ sẽ dần trở thành → tương lai, không phải giả định quá khứ"}]},"07-2025_35":{"s":"〜わけがない → không thể nào (phủ định chắc chắn, logic). Cấu trúc: V(phủ định) + に + 済む + わけがない","r":"「何の責任も取らずに済むわけがない」= không thể nào lại không phải chịu bất kỳ trách nhiệm nào. わけがない = không có lý nào, không thể.","traps":[{"w":"取りかねないわけだ","e":"= đó là lý do có thể không dám nhận → かねない = có nguy cơ không dám, NGƯỢC nghĩa"},{"w":"取らざるを得ないわけだ","e":"= đó là lý do không thể không nhận trách nhiệm → gần nghĩa nhưng わけだ = đó là lẽ đương nhiên, không phải phủ định mạnh"},{"w":"取りきれるわけがない","e":"= không thể nào nhận hết được → きれる = làm hết/hoàn toàn, nghĩa khác với 取らずに済む"}]},"12-2025_26":{"s":"とても〜そうにない → trông có vẻ không thể nào... (kết hợp với そうにない để phủ định dự đoán tuyệt đối)","r":"「一日ではとても終わりそうにない」= trông có vẻ không thể nào hoàn thành trong một ngày. とても + phủ định = hoàn toàn không thể.","traps":[{"w":"仮に","e":"= giả sử → giả định, không phải mức độ"},{"w":"今にも","e":"= sắp ngay bây giờ → sắp xảy ra, NGƯỢC với phủ định"},{"w":"まもなく","e":"= không lâu nữa → tương lai gần, NGƯỢC với phủ định"}]},"12-2025_27":{"s":"〜なくしては → nếu không có X thì không thể (điều kiện không thể thiếu)","r":"「地域住民の協力なくしては実現しなかったであろう」= nếu không có sự hợp tác của người dân thì hẳn đã không thể thực hiện được. なくしては = なければ (trang trọng hơn).","traps":[{"w":"をはじめて","e":"= sai ngữ pháp → phải là をはじめ (bắt đầu từ X, đặc biệt là X)"},{"w":"とあって","e":"= vì là X (nguyên nhân đặc biệt) → lý do tích cực dẫn đến kết quả, không phải điều kiện thiếu"},{"w":"のみならず","e":"= không chỉ X mà còn → liệt kê thêm, không phải điều kiện"}]},"12-2025_28":{"s":"〜くらいなら → thà không làm X còn hơn / nếu phải X thì thà... (từ chối phương án tệ hơn)","r":"「飛行機に乗るくらいなら、何時間かかっても電車や車で行く方がいい」= thà mất bao nhiêu tiếng cũng muốn đi tàu hay xe hơn là đi máy bay. くらいなら = nếu phải X thì thà Y còn hơn.","traps":[{"w":"乗るうえで","e":"= trong quá trình đi / để đi → mục đích hoặc tiền đề, không phải từ chối"},{"w":"乗るわりに","e":"= so với việc đi máy bay thì → kết quả không tương xứng, không phải từ chối"},{"w":"乗るどころか","e":"= không những không đi máy bay mà còn → mở rộng phủ định, không phải so sánh hai lựa chọn"}]},"12-2025_29":{"s":"〜とするには → để coi là X thì (điều kiện để đạt được nhận định/kết luận)","r":"「この仮説を正しいとするにはデータ数が十分ではない」= để coi giả thuyết này là đúng thì số liệu chưa đủ. とするには = để coi là... thì cần phải...","traps":[{"w":"となるには","e":"= để trở thành X thì → trở thành thực tế, không phải nhận định/coi là"},{"w":"とするとは","e":"= thật bất ngờ khi coi là X → cảm thán, không phải điều kiện"},{"w":"となるとは","e":"= thật bất ngờ khi trở thành X → cảm thán về sự thật, không phải điều kiện"}]},"12-2025_30":{"s":"〜させられながらも → dù bị (ai đó/hoàn cảnh) làm X vẫn... (bị động cưỡng bức + nhượng bộ)","r":"「度重なる怪我に悩まされながらも、克服してオリンピック出場を果たした」= dù liên tục bị thương hành hạ vẫn vượt qua và tham dự Olympic. 怪我に悩まされる = bị chấn thương làm khổ (bị động).","traps":[{"w":"悩ませながらも","e":"= trong khi làm (ai đó) khổ vẫn → chủ động làm người khác khổ, sai chủ thể"},{"w":"悩ませたあげく","e":"= sau khi làm (ai đó) khổ rồi cuối cùng → chủ động, sai chiều + kết quả tiêu cực"},{"w":"悩まされたあげく","e":"= sau khi bị hành hạ thì cuối cùng → bị động đúng nhưng あげく = kết quả tiêu cực đáng tiếc, NGƯỢC với câu này"}]},"12-2025_31":{"s":"〜に越したことはない → không gì tốt hơn là X (X là lý tưởng nhất, nhưng không bắt buộc)","r":"「早く準備を始めるに越したことはない」= không gì tốt hơn là bắt đầu chuẩn bị sớm. Hợp với ngữ cảnh: biết còn lâu nhưng nghĩ nên chuẩn bị trước.","traps":[{"w":"勢いだ","e":"= đà/xu thế là → mô tả trạng thái, không phải khuyến nghị"},{"w":"ことは否めない","e":"= không thể phủ nhận rằng → thừa nhận sự thật, không phải khuyến nghị"},{"w":"見込みだ","e":"= dự kiến là → dự báo, không phải khuyến nghị"}]},"12-2025_32":{"s":"〜ていた + のに → đã (đang ở trạng thái) X rồi (giả định hiện tại tưởng tượng, nếu không có điều kiện đó)","r":"「今頃とっくに遊園地に着いて遊んでいたのに」= giờ này đã đến công viên và đang chơi rồi (nếu không kẹt xe). ていた = đang ở trạng thái đó tại 今頃 (thời điểm tưởng tượng).","traps":[{"w":"遊んだ","e":"= đã chơi (hoàn thành) → 今頃 cần trạng thái đang tiếp diễn, không phải kết thúc"},{"w":"遊びたかった","e":"= đã muốn chơi → ý muốn trong quá khứ, không phải giả định hiện tại"},{"w":"遊んでいたかった","e":"= đã muốn đang chơi → kết hợp ý muốn + tiếp diễn nhưng không tự nhiên, 遊んでいた là đủ"}]},"12-2025_33":{"s":"〜てくれたものだ → sao lại (làm chuyện đó) cho tôi thế! (cảm thán bực bội khi ai đó làm điều không mong muốn)","r":"「余計なことをしてくれたものだ」= sao lại làm chuyện thừa cho tôi thế! てくれたものだ dùng khi tức giận vì người khác can thiệp không cần thiết.","traps":[{"w":"しかねないものだ","e":"= có nguy cơ làm... → cảnh báo về tương lai, không phải bực bội về quá khứ"},{"w":"してくれたはずだ","e":"= hẳn là đã làm cho → kỳ vọng đã được đáp ứng, không có bực bội"},{"w":"しかけないはずだ","e":"= sai ngữ pháp → しかけない không phải cấu trúc tự nhiên"}]},"12-2025_34":{"s":"〜みたいなところがある → có những khía cạnh giống như X (so sánh nhẹ, khẩu ngữ)","r":"「人と話すのが仕事みたいなところがある」= công việc có những khía cạnh giống như chuyên nói chuyện với người. みたいな = như (khẩu ngữ của ような).","traps":[{"w":"らしいことである","e":"= là điều đúng với tính chất của X → らしい mang nghĩa 'đúng như X', không phải so sánh"},{"w":"らしいところがある","e":"= có những điểm đúng với tính chất của X → らしい = xứng với, không phải như/giống như"},{"w":"みたいなことである","e":"= là chuyện giống như X → ことである kết thúc câu cứng nhắc; ところがある tự nhiên hơn khi nói về đặc điểm"}]},"12-2025_35":{"s":"〜てばかりもいられない → không thể cứ mãi X (cần làm gì đó khác — ý thức trách nhiệm/thực tế)","r":"「喜んでばかりもいられない」= không thể cứ mãi vui mừng (vì có vấn đề thực tế cần lo). ばかりもいられない = không thể chỉ ở trạng thái đó mãi.","traps":[{"w":"喜んだだけにすぎない","e":"= chỉ là vui mừng thôi → giảm nhẹ hành động vui, không phải nhận ra cần dừng lại"},{"w":"喜んでしまうところだった","e":"= suýt mừng rỡ quá → hú vía, không đúng ngữ cảnh"},{"w":"喜んでいないではないか","e":"= chẳng phải đang không vui mừng sao → phủ định kép kỳ lạ, không tự nhiên"}]}};

// ── TTS ────────────────────────────────────────────────────────────────────
let jpVoice=null, synthReady=false, speakQueue=[];

function initVoices(){
  const voices=speechSynthesis.getVoices();
  // Ưu tiên giọng Nhật
  jpVoice=voices.find(v=>v.lang==='ja-JP'&&v.localService)||
          voices.find(v=>v.lang==='ja-JP')||
          voices.find(v=>v.lang.startsWith('ja'))||null;
  synthReady=true;
}
if(typeof speechSynthesis!=='undefined'){
  speechSynthesis.onvoiceschanged=initVoices;
  initVoices();
}

function stopSpeak(){
  speechSynthesis.cancel();
  document.querySelectorAll('.speak-btn.speaking,.speak-opt-btn.speaking').forEach(b=>{
    b.classList.remove('speaking');
    if(b.dataset.orig) b.innerHTML=b.dataset.orig;
  });
}

function speak(text,btnEl){
  if(!text) return;
  stopSpeak();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';
  if(jpVoice) u.voice=jpVoice;
  // Get speed from selector
  const sel=document.getElementById('tts-speed');
  u.rate=sel?parseFloat(sel.value):0.85;
  u.pitch=1;
  if(btnEl){
    btnEl.dataset.orig=btnEl.innerHTML;
    btnEl.innerHTML='⏸';
    btnEl.classList.add('speaking');
    u.onend=()=>{btnEl.classList.remove('speaking');btnEl.innerHTML=btnEl.dataset.orig||'🔊';};
    u.onerror=()=>{btnEl.classList.remove('speaking');btnEl.innerHTML=btnEl.dataset.orig||'🔊';};
  }
  speechSynthesis.speak(u);
}

// Đọc toàn bộ câu hỏi (câu JP không có đáp án) + 4 lựa chọn
function speakQuestion(q,btnEl){
  const blank=q.jp.replace(/【([^】]+)】/g,'＿＿');
  const opts=q.options.map(o=>o[0]+'　'+o.slice(3)).join('　。　');
  speak(blank+'　　'+opts, btnEl);
}

// Đọc chỉ câu hỏi (có đáp án điền vào)
function speakFull(q,btnEl){
  speak(q.jp.replace(/【([^】]+)】/g,'$1'), btnEl);
}

function ttsBar(){
  return`<div class="tts-bar">
    <span class="tts-label">🔊 Tốc độ:</span>
    <select class="tts-speed" id="tts-speed">
      <option value="0.6">Chậm</option>
      <option value="0.85" selected>Bình thường</option>
      <option value="1.1">Nhanh</option>
      <option value="1.35">Rất nhanh</option>
    </select>
  </div>`;
}

function speakBtnHTML(q){
  return`<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="speak-btn" onclick="speakQuestion(${JSON.stringify(q).replace(/</g,'\u003c').replace(/"/g,'&quot;')},this)" title="Đọc câu hỏi + 4 lựa chọn">🔊 Đọc câu hỏi + lựa chọn</button>
    <button class="speak-btn" onclick="speakFull(${JSON.stringify(q).replace(/</g,'\u003c').replace(/"/g,'&quot;')},this)" title="Đọc câu đầy đủ có đáp án">🔊 Đọc câu đầy đủ</button>
    <button class="speak-btn" onclick="stopSpeak()" style="color:#9ca3af">⏹ Dừng</button>
  </div>`;
}

// Đọc từng lựa chọn riêng (gắn vào từng nút option)
function speakOpt(text,btn){speak(text,btn);}


function periodYears(){return PERIODS.find(p=>p.id===period).years;}
function filtered(){return QUESTIONS.filter(q=>q.year===year);}
function correctLetter(q){return['a','b','c','d'].find(l=>q.options.some(o=>o.startsWith(l+'.')&&o.slice(3).trim()===q.answer));}

function jpHTML(text,blank){
  const t=blank?text.replace(/【([^】]+)】/g,'（　　）'):text.replace(/【([^】]+)】/g,'<span class="mark">$1</span>');
  return`<span class="jp">${t}</span>`;
}
function kwHTML(id){
  const e=EXP[id];if(!e||!e.kw)return'';
  return`<div class="kw-box"><div class="kw-title">🔑 Từ khóa loại đáp án nhanh</div><div class="kw-hint">「${e.kw}」→ ${e.kw_hint}</div><div class="kw-loai">✂️ ${e.kw_loai}</div></div>`;
}
function expHTML(id){
  const e=EXP[id];if(!e)return'';
  const sLines=e.s.split('\n').map(l=>`<span style="display:block">${l}</span>`).join('');
  let traps='';
  if(e.traps&&e.traps.length){
    const rows=e.traps.map(t=>`<div class="trap-row"><span class="trap-w">・${t.w}</span> ${t.e}</div>`).join('');
    traps=`<div class="traps-box"><div class="traps-title">⚠️ Phân biệt đáp án sai:</div>${rows}</div>`;
  }
  return`<div class="exp"><div class="exp-s"><span class="exp-lbl-s">📌 </span>${sLines}</div><div class="exp-r"><span class="exp-lbl-r">💡 </span>${e.r}</div>${traps}</div>`;
}

function setTab(t){
  tab=t;
  ['practice','study','wrong'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('on',x===t);
  });
  const needBars=t==='practice'||t==='study';
  document.getElementById('pbar').style.display=needBars?'':'none';
  document.getElementById('ybar').style.display=needBars?'':'none';
  if(t==='wrong'){
    wrList=[...wrongIds].map(id=>Q_MAP[id]).filter(Boolean);
    wridx=0;wrsel=null;wrscore={ok:0,bad:0};wrdone=false;
  }
  render();
}
function setPeriod(p){
  period=p;year=PERIODS.find(x=>x.id===p).years[0];
  pidx=0;psel=null;pdone=false;sopen={};
  renderBars();render();
}
function setYear(y){
  year=y;pidx=0;psel=null;pdone=false;sopen={};
  renderBars();render();
}
function renderBars(){
  document.getElementById('pbar').innerHTML=
    PERIODS.map(p=>`<button class="pbtn ${p.id===period?'on':''}" onclick="setPeriod('${p.id}')">${p.label}</button>`).join('')+
    `<span class="cnt-info">${filtered().length} câu</span>`;
  document.getElementById('ybar').innerHTML=
    periodYears().map(y2=>`<button class="ybtn ${y2===year?'on':''}" onclick="setYear('${y2}')">${YL[y2]}</button>`).join('');
}

// ── PRACTICE ──────────────────────────────────────────────────────────────────
function pick(letter){
  if(psel)return;psel=letter;
  const q=filtered()[pidx];
  const cl=correctLetter(q);
  if(letter===cl){pscore.ok++;}
  else{pscore.bad++;wrongIds.add(q.id);saveWrong();}
  updateWrongBadge();render();
}
function next(){
  const qs=filtered();
  if(pidx+1>=qs.length){pdone=true;}else{pidx++;psel=null;}
  render();
}
function prev(){
  if(pidx>0){pidx--;psel=null;render();}
}
function goToStart(){pidx=0;psel=null;render();}
function restart(){pidx=0;psel=null;pscore={ok:0,bad:0};pdone=false;render();}
function startWrongMode(){setTab('wrong');}

function renderAfter(q,ok){
  return`<div class="result ${ok?'ok':'ng'}">
    <div class="res-lbl ${ok?'ok':'ng'}">${ok?'✓ Chính xác!':'✗ Sai! Đáp án: '+q.answer}</div>
    <div class="res-vn jp">${q.vn}</div>
  </div>
  ${kwHTML(q.id)}
  ${expHTML(q.id)}`;
}

function renderCard(q,sel,cl,isWrongMode){
  const opts=q.options.map(opt=>{
    const l=opt[0],txt=opt.slice(3);
    let cls='opt',ico=l.toUpperCase();
    if(sel){if(l===cl){cls='opt correct';ico='✓';}else if(l===sel){cls='opt wrong';ico='✗';}}
    const fn=isWrongMode?`wrpick('${l}')`:`pick('${l}')`;
    return`<button class="${cls}" onclick="${fn}"><span class="opt-num">${ico}</span><span class="jp">${txt}</span></button>`;
  }).join('');
  const wrongTag=isWrongMode?'<span class="tag-wrong">✗ Câu sai</span>':'';
  return`<div class="card ${isWrongMode?'wrong-mode':''}">
    <div class="tags">
      <span class="tag-num">Câu ${q.num}</span>
      ${wrongTag}
      <span class="tag-yr">${YL[q.year]}</span>
      <span class="tag-prog">${isWrongMode?wridx+1+'/'+wrList.length:pidx+1+'/'+filtered().length}</span>
    </div>
    <div class="jp-s">${jpHTML(q.jp,!sel)}</div>
    <div class="opts">${opts}</div>
  </div>`;
}

function renderPractice(){
  const qs=filtered();
  if(pdone){
    const hasWrong=wrongIds.size>0;
    return`<div class="done">
      <div style="font-size:52px;margin-bottom:12px">🎉</div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:6px">Hoàn thành!</h2>
      <p style="color:#9ca3af;margin-bottom:0">${qs.length} câu · ${YL[year]}</p>
      <div class="scores">
        <div class="score-ok"><div class="snum-ok">${pscore.ok}</div><div class="slbl-ok">Đúng ✓</div></div>
        <div class="score-ng"><div class="snum-ng">${pscore.bad}</div><div class="slbl-ng">Sai ✗</div></div>
      </div>
      <div>
        <button class="restart-btn" onclick="restart()">Làm lại</button>
        ${hasWrong?`<button class="review-btn" onclick="startWrongMode()">✗ Ôn ${wrongIds.size} câu sai</button>`:''}
      </div>
    </div>`;
  }
  const q=qs[pidx];
  const cl=correctLetter(q);
  const pct=Math.round((pidx/qs.length)*100);
  let after='';
  if(psel){
    const ok=psel===cl;
    const prevBtn=pidx>0?`<button class="prev-btn" onclick="prev()">← Câu trước</button>`:'';
    after=renderAfter(q,ok)+`<div class="btn-row">${prevBtn}<button class="next-btn" onclick="next()">Câu tiếp →</button></div>`;
  }
  const backBtn=pidx>0?`<button class="back-top-btn" onclick="goToStart()">⤴ Về câu 1</button>`:'';
  return`<div class="prog-info"><span>${pidx+1} / ${qs.length} ${backBtn}</span><span style="color:#16a34a;font-weight:600">✓ ${pscore.ok} &nbsp;<span style="color:#ef4444">✗ ${pscore.bad}</span></span></div>
  <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  ${ttsBar()}
  ${speakBtnHTML(q)}
  ${renderCard(q,psel,cl,false)}
  ${after}`;
}

// ── STUDY ─────────────────────────────────────────────────────────────────────
function toggleStudy(id){sopen[id]=!sopen[id];render();}
function renderStudy(){
  return filtered().map(q=>{
    const opts=q.options.map(o=>`<span class="sopt ${o.slice(3).trim()===q.answer?'sopt-ans':'sopt-no'} jp">${o}</span>`).join('');
    const isOpen=!!sopen[q.id];
    const isWrong=wrongIds.has(q.id);
    return`<div class="study-card" style="${isWrong?'border-color:#fecaca':''}">
      <div class="study-body">
        <div class="tags" style="margin-bottom:9px">
          <span class="tag-num">Câu ${q.num}</span>
          ${isWrong?'<span class="tag-wrong">✗ Đã sai</span>':''}
          <span class="tag-yr">${YL[q.year]}</span>
        </div>
        <div class="study-jp jp">${jpHTML(q.jp,false)}</div>
        <div class="study-vn">${q.vn}</div>
        <div class="study-opts">${opts}</div>
        <button class="toggle-btn" onclick="toggleStudy('${q.id}')">${isOpen?'▲ Ẩn':'▼ Giải thích'}</button>
      </div>
      ${isOpen?`<div class="study-exp">${kwHTML(q.id)}${expHTML(q.id)}</div>`:''}
    </div>`;
  }).join('');
}

// ── WRONG REVIEW ──────────────────────────────────────────────────────────────
function wrpick(letter){
  if(wrsel)return;wrsel=letter;
  const q=wrList[wridx];
  const cl=correctLetter(q);
  if(letter===cl){wrscore.ok++;wrongIds.delete(q.id);saveWrong();}
  else{wrscore.bad++;}
  updateWrongBadge();render();
}
function wrnext(){
  if(wridx+1>=wrList.length){wrdone=true;}
  else{wridx++;wrsel=null;}
  render();
}
function wrprev(){
  if(wridx>0){wridx--;wrsel=null;render();}
}
function wrGoToStart(){wridx=0;wrsel=null;render();}
function wrrestart(){
  wrList=[...wrongIds].map(id=>Q_MAP[id]).filter(Boolean);
  wridx=0;wrsel=null;wrscore={ok:0,bad:0};wrdone=false;render();
}
function clearWrong(){wrongIds.clear();saveWrong();updateWrongBadge();wrrestart();}

function renderWrong(){
  if(wrongIds.size===0&&!wrdone){
    return`<div class="wrong-empty">
      <div style="font-size:48px;margin-bottom:12px">🎯</div>
      <h3 style="font-size:18px;font-weight:700;margin-bottom:8px;color:#374151">Chưa có câu sai!</h3>
      <p style="font-size:14px">Làm luyện thi để tích lũy câu sai vào đây.</p>
    </div>`;
  }
  if(wrdone||wrList.length===0){
    return`<div class="done">
      <div style="font-size:52px;margin-bottom:12px">${wrscore.bad===0?'🏆':'📚'}</div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:6px">${wrscore.bad===0?'Xuất sắc!':'Ôn tập xong!'}</h2>
      <p style="color:#9ca3af;margin-bottom:0">Đã ôn ${wrList.length} câu sai</p>
      <div class="scores">
        <div class="score-ok"><div class="snum-ok">${wrscore.ok}</div><div class="slbl-ok">Đúng ✓</div></div>
        <div class="score-ng"><div class="snum-ng">${wrscore.bad}</div><div class="slbl-ng">Vẫn sai ✗</div></div>
      </div>
      <div>
        ${wrongIds.size>0?`<button class="review-btn" onclick="wrrestart()">Ôn lại ${wrongIds.size} câu còn sai</button>`:''}
        <button class="restart-btn" onclick="setTab('practice')">Về luyện thi</button>
      </div>
      ${wrscore.bad===0?'<p style="margin-top:16px;font-size:13px;color:#16a34a;font-weight:600">🎉 Đã xóa hết câu sai!</p>':''}
    </div>`;
  }

  const q=wrList[wridx];
  const cl=correctLetter(q);
  const pct=Math.round((wridx/wrList.length)*100);
  let after='';
  if(wrsel){
    const ok=wrsel===cl;
    after=renderAfter(q,ok);
    if(ok) after+=`<p style="font-size:12px;color:#16a34a;margin-top:8px;font-weight:600">✓ Đã xóa khỏi danh sách câu sai!</p>`;
    const prevBtn=wridx>0?`<button class="prev-btn" onclick="wrprev()">← Câu trước</button>`:'';
    after+=`<div class="btn-row">${prevBtn}<button class="next-btn" onclick="wrnext()">Câu tiếp →</button></div>`;
  }
  const backBtn=wridx>0?`<button class="back-top-btn" onclick="wrGoToStart()">⤴ Về câu 1</button>`:'';
  return`<div class="wrong-header">
    <span class="wrong-header-txt">✗ Ôn sai — còn ${wrongIds.size} câu</span>
    <button class="clear-btn" onclick="if(confirm('Xóa tất cả câu sai?'))clearWrong()">Xóa tất cả</button>
  </div>
  <div class="prog-info"><span>${wridx+1} / ${wrList.length} ${backBtn}</span><span style="color:#16a34a;font-weight:600">✓ ${wrscore.ok} &nbsp;<span style="color:#ef4444">✗ ${wrscore.bad}</span></span></div>
  <div class="prog-bar"><div class="prog-fill red" style="width:${pct}%"></div></div>
  ${ttsBar()}
  ${speakBtnHTML(q)}
  ${renderCard(q,wrsel,cl,true)}
  ${after}`;
}

function render(){
  document.getElementById('cnt').innerHTML=
    tab==='practice'?renderPractice():
    tab==='study'?renderStudy():
    renderWrong();
}

updateWrongBadge();
renderBars();
render();
</script>
