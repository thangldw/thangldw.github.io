hain": "社会の中心から遠い (cảm giác chung)\n　↓ しかし①\n私自身が中心 (tôi là trung tâm tạo nghĩa)\n　↓ しかし②（tránh hiểu nhầm tự kỷ trung tâm）\nたくさんの中心がある (ai cũng là trung tâm như vậy)", "correctExplainJp": "一人一人が<b>生きる意味</b>を持っている大切な存在だ。", "correctExplain": "khớp đúng kết luận: MỖI người (一人一人) đều có ý nghĩa sống (生きる意味) riêng, đáng được coi trọng — không phải chỉ riêng tác giả."}, {"bai": "BÀI 20", "date": "07/2013 (1)", "passage": "現代、恋愛は、通常は部分でしか他者とかかわり合いをもたない個人にとって、例外的に全人格と全人格とのぶつかりあいを経験する、特別な関係なのであろうか。それとも、「全人格的」というのは幻想で、恋愛もまた互いに自己のある一面を見せあう、部分的関係の一例か。これはもちろん、そのどちらなのか、という問題ではなく、個々の恋愛はこの振幅のどこかにあるということになるだろう。だが、趨勢(注)としては後者の方へと振れてきているのではないだろうか。\n\n(注) 趨勢：傾向", "source": "（草柳千早による）", "question": "筆者は、現代の恋愛はどうなってきていると考えているか。", "choices": ["全人格でぶつかりあう関係が一般的になってきた。", "全人格でぶつかりあう関係は現実には存在しなくなった。", "自己の一部しか見せあわない関係は敬遠されてきている。", "お互いに自己の一部しか見せあわないようになってきている。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Câu cuối (だが趨勢としては後者の方へ) chốt rõ: xu hướng đang nghiêng về phía \"chỉ lộ một phần bản thân\" (部分的関係) — đúng với D.", "wrong": ["A ngược nghĩa: xu hướng đang nghiêng về \"後者\" (quan hệ một phần), không phải \"全人格\" (toàn bộ nhân cách).", "B nói \"hoàn toàn không còn tồn tại\" — quá tuyệt đối, bài chỉ nói xu hướng NGHIÊNG về phía kia, không phủ nhận hoàn toàn.", "C nói về việc \"bị xa lánh\" — không có trong bài, bài chỉ nói về xu hướng phổ biến hơn, không nói bị ghét bỏ."]}, "anchor": "Có mỏ neo đảo ngược nhẹ: 「だが」ở câu cuối — sau khi nêu 2 khả năng ngang nhau, だが chốt rõ xu hướng nghiêng về phía nào.", "first": "現代、恋愛は…全人格と全人格とのぶつかりあいを経験する、特別な関係なのであろうか。 → Đặt câu hỏi mở: liệu tình yêu là sự va chạm toàn bộ nhân cách, hay chỉ là quan hệ từng phần?", "last": "だが、趨勢としては後者の方へと振れてきているのではないだろうか。 → Câu cuối (だが) chốt: xu hướng hiện nay nghiêng về phía \"quan hệ từng phần\" (chỉ lộ 1 mặt của bản thân).", "link": "Bài nêu 2 khả năng đối lập (toàn bộ nhân cách ⇔ từng phần) rồi だが chốt nghiêng về phía sau (từng phần) — đây chính là ý chính cần nắm, không phải dừng ở việc nêu giả thuyết ban đầu.", "traps": [{"label": "A", "tag": "Bẫy ngược nghĩa", "jp": "<b>全人格</b>でぶつかりあう関係が<b>一般的</b>になってきた。", "vn": "Ngược hẳn — xu hướng đang nghiêng về phía \"quan hệ từng phần\" (部分的), không phải \"toàn bộ nhân cách\" (全人格)."}, {"label": "B", "tag": "Bẫy tuyệt đối hoá", "jp": "全人格でぶつかりあう関係は<b>現実には存在しなくなった</b>。", "vn": "Bài chỉ nói xu hướng NGHIÊNG về phía kia, không khẳng định kiểu quan hệ cũ \"KHÔNG CÒN TỒN TẠI\" nữa."}, {"label": "C", "tag": "Bẫy thêm chi tiết", "jp": "自己の一部しか見せあわない関係は<b>敬遠</b>されてきている。", "vn": "\"Bị xa lánh\" (敬遠) là từ không có trong bài — bài chỉ nói về xu hướng phổ biến hơn, không nói đến việc bị ghét bỏ."}], "translate": [{"jp": "恋愛もまた互いに自己のある一面を見せあう、部分的関係の一例か。", "vn": "Hay phải chăng tình yêu cũng chỉ là một ví dụ của quan hệ từng phần, nơi hai người chỉ cho nhau thấy một mặt nào đó của bản thân?"}, {"jp": "だが、趨勢としては後者の方へと振れてきているのではないだろうか。", "vn": "Nhưng theo xu hướng hiện nay, có lẽ nó đang nghiêng dần về phía quan hệ từng phần ấy."}], "vocab": [{"term": "振幅", "reading": "しんぷく", "mean": "biên độ dao động (ẩn dụ: khoảng giữa hai cực)"}, {"term": "趨勢", "reading": "すうせい", "mean": "xu hướng, chiều hướng phát triển"}, {"term": "〜のではないだろうか", "reading": "—", "mean": "chẳng phải là~ hay sao (ngữ pháp suy đoán nhấn mạnh)"}], "anchorWords": ["筆者", "現代", "恋愛", "全人格", "経験", "特別", "関係", "趨勢"], "thinking": [{"jp": "現代、恋愛は…全人格と全人格とのぶつかりあいを経験する、特別な関係なのであろうか。それとも…部分的関係の一例か。", "vn": "→ Đặt câu hỏi mở: yêu = va chạm TOÀN BỘ nhân cách (全人格), hay chỉ là quan hệ TỪNG PHẦN (部分的)?"}, {"jp": "これはもちろん、そのどちらなのか、という問題ではなく、個々の恋愛はこの振幅のどこかにあるということになるだろう。", "vn": "→ Không phải chọn 1 trong 2 tuyệt đối, mà mỗi cuộc yêu nằm đâu đó giữa 2 cực."}, {"jp": "だが、趨勢としては後者の方へと振れてきているのではないだろうか。", "vn": "→ Suy ra (だが): xu hướng chung (趨勢) đang NGHIÊNG về phía \"quan hệ từng phần\" (後者)."}], "chain": "全人格 ⇔ 部分的関係 (2 cực)\n　↓ 個々の恋愛はどこかにある\n　↓ だが\n趨勢は後者へ (nghiêng về \"từng phần\")", "correctExplainJp": "お互いに自己の<b>一部</b>しか<b>見せあわない</b>ようになってきている。", "correctExplain": "khớp đúng xu hướng (趨勢): hai người chỉ lộ MỘT PHẦN (一部) bản thân, không phải toàn bộ nhân cách."}, {"bai": "BÀI 21", "date": "07/2013 (2)", "passage": "これから起こる社会の変化を読みとるのは難しい。しかし、その変化を見極めて将来に対する指針をもたなければ、激しく変化する社会のなかで自分を見失ってしまう。歴史学は、この時代の変化を長い時間のなかにおいて見据え、社会の進む方向を教えてくれる学問である。けっして、過ぎ去った過去を記憶したり、なぞったりする学問ではない。ゆるやかに流れる時代にあっても激動する時代にあっても、歴史学は私たちの行く手(注)を照らす一条(注)の光なのだと思う。\n\n(注) 行く手：行く先\n(注) 一条：一筋", "source": "", "question": "歴史学について、筆者はどのように考えているか。", "choices": ["社会の流れを読み取り、将来のために記録しておくものである。", "現代社会や人々の活動の変化を、過去の時代と比較するものである。", "社会の変化を時間の流れのなかに位置づけて、進む道を示すものである。", "社会の変化や流れを振り返り、これまでの出来事を検証するものである。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Bài nói rõ và phủ định mạnh: \"けっして…過去をなぞる学問ではない\" — lịch sử KHÔNG phải để ghi nhớ/lặp lại quá khứ, mà để soi đường tương lai. C khớp đúng (đặt sự thay đổi vào dòng thời gian, chỉ ra hướng đi).", "wrong": ["A nói \"ghi lại cho tương lai\" — gần nhưng thiếu ý \"chỉ ra hướng đi\", chỉ là lưu trữ thông tin.", "B/D đều nhấn vào việc \"so sánh/kiểm chứng quá khứ\" — đây chính là điều tác giả PHỦ ĐỊNH rõ ràng (けっして〜ない)."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「けっして〜ではない」ngay giữa bài — phủ định mạnh quan niệm sai (lịch sử học chỉ là ghi nhớ quá khứ), từ đó dẫn đến câu cuối là ý chính thật.", "first": "これから起こる社会の変化を読みとるのは難しい。 → Mở bài nêu khó khăn: khó đoán biến đổi xã hội tương lai.", "last": "歴史学は私たちの行く手を照らす一条の光なのだと思う。 → Câu cuối ví lịch sử học như tia sáng soi đường cho tương lai — đây là hình ảnh chốt ý chính.", "link": "Từ khó khăn (khó đoán tương lai) → tác giả khẳng định vai trò của lịch sử học: đặt biến đổi vào dòng thời gian dài để CHỈ RA HƯỚNG ĐI, đồng thời phủ định mạnh quan niệm sai rằng lịch sử chỉ là ghi nhớ quá khứ.", "traps": [{"label": "A", "tag": "Bẫy thiếu ý", "jp": "社会の流れを読み取り、将来のために<b>記録</b>しておくものである。", "vn": "\"Ghi lại cho tương lai\" (記録しておく) chỉ là LƯU TRỮ, thiếu vai trò \"chỉ ra hướng đi\" mà tác giả nhấn mạnh."}, {"label": "B", "tag": "Bẫy ngược nghĩa", "jp": "現代社会や人々の活動の変化を、<b>過去の時代</b>と<b>比較</b>するものである。", "vn": "Đây chính là điều tác giả PHỦ ĐỊNH rõ ràng bằng けっして — lịch sử học không phải để SO SÁNH (比較) với quá khứ."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "社会の変化や流れを振り返り、これまでの出来事を<b>検証</b>するものである。", "vn": "\"Kiểm chứng những việc đã qua\" (検証する) cũng là điều bị PHỦ ĐỊNH trực tiếp trong bài (なぞったりする学問ではない)."}], "translate": [{"jp": "歴史学は、この時代の変化を長い時間のなかにおいて見据え、社会の進む方向を教えてくれる学問である。", "vn": "Lịch sử học là môn học nhìn nhận sự biến đổi của thời đại trong một dòng thời gian dài, từ đó cho ta biết xã hội đang hướng về đâu."}, {"jp": "歴史学は私たちの行く手を照らす一条の光なのだと思う。", "vn": "Tôi nghĩ lịch sử học chính là một tia sáng soi đường cho con đường phía trước của chúng ta."}], "vocab": [{"term": "見据える", "reading": "みすえる", "mean": "nhìn thẳng vào, xem xét kỹ"}, {"term": "なぞる", "reading": "なぞる", "mean": "lặp lại theo, vẽ lại theo khuôn cũ"}, {"term": "行く手を照らす", "reading": "いくてをてらす", "mean": "soi sáng con đường phía trước"}], "anchorWords": ["歴史学", "筆者", "社会", "変化", "一条", "時間", "位置"], "thinking": [{"jp": "これから起こる社会の変化を読みとるのは難しい。しかし、その変化を見極めて将来に対する指針をもたなければ、激しく変化する社会のなかで自分を見失ってしまう。", "vn": "→ Nêu khó khăn: khó đoán biến đổi tương lai, NHƯNG cần có ĐỊNH HƯỚNG (指針) để không lạc lối."}, {"jp": "歴史学は、この時代の変化を長い時間のなかにおいて見据え、社会の進む方向を教えてくれる学問である。けっして、過ぎ去った過去を記憶したり、なぞったりする学問ではない。", "vn": "→ Suy ra vai trò lịch sử học: ĐẶT biến đổi vào dòng thời gian dài để CHỈ HƯỚNG ĐI (進む方向) — PHỦ ĐỊNH MẠNH (けっして〜ない) quan niệm \"chỉ là ghi nhớ quá khứ\"."}, {"jp": "歴史学は私たちの行く手を照らす一条の光なのだと思う。", "vn": "→ Hình ảnh chốt: lịch sử học là TIA SÁNG (一条の光) soi đường cho tương lai."}], "chain": "将来の指針が必要 (cần định hướng)\n　↓ けっして\n歴史学 ≠ 過去を記憶する学問 (PHỦ ĐỊNH)\n　↓ 本当は\n歴史学 = 時間の流れに位置づけ、進む道を示す (soi đường)", "correctExplainJp": "社会の変化を<b>時間の流れ</b>のなかに<b>位置づけて</b>、<b>進む道</b>を示すものである。", "correctExplain": "khớp đúng: đặt biến đổi xã hội vào DÒNG THỜI GIAN (時間の流れ) để chỉ ra HƯỚNG ĐI (進む道) — đúng hình ảnh \"tia sáng soi đường\"."}, {"bai": "BÀI 22", "date": "07/2013 (3)", "passage": "昔も今も、才覚というのは一定の軌道から飛び出してゆく能力のことで、みんなにそんな例外的な能力が備わっていたら、そもそも大地にはりつく農業も、分業で成り立つ産業社会も有り得ない。いつの世も、才覚のある者が新しいビジネスを起こしてゆくのは事実だが、それをビジネスとして成立させるのは社員の労働と献身であるし、それがなければ起業者の才覚が活きることもない。", "source": "（高村による）", "question": "才覚のある人について、この文章ではどのように述べられているか。", "choices": ["優秀な能力を使って、社員を率いてゆく責任がある。", "人並み外れた能力をビジネスに活かすことが必要である。", "誰の助けを借りることもなく、企業を成功に導くことができる。", "他者の支えによって初めて能力をビジネスに活用することができる。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Câu cuối nói rõ: nếu không có \"労働と献身\" (lao động và sự cống hiến) của nhân viên, tài năng của người sáng lập cũng không phát huy được — đúng với D: cần sự hỗ trợ của người khác.", "wrong": ["A nói về \"trách nhiệm dẫn dắt nhân viên\" — không có trong bài, bài nói ngược lại: nhân viên là người LÀM CHO tài năng đó phát huy.", "B chỉ nói nửa đầu (cần đưa năng lực vào kinh doanh), bỏ sót điều kiện quan trọng (cần người khác hỗ trợ).", "C ngược nghĩa hoàn toàn: bài nói RÕ là không thể thành công nếu không có sự giúp đỡ của người khác."]}, "anchor": "Có mỏ neo đảo ý nhẹ: 「が」giữa câu cuối — từ việc khẳng định tài năng cá nhân quan trọng, chuyển sang nhấn mạnh điều kiện cần thiết khác (sự cống hiến của nhân viên).", "first": "昔も今も、才覚というのは一定の軌道から飛び出してゆく能力のことで…そもそも農業も産業社会も有り得ない。 → Nêu định nghĩa về tài năng đặc biệt và vai trò hiếm có của nó trong xã hội.", "last": "それをビジネスとして成立させるのは社員の労働と献身であるし、それがなければ起業者の才覚が活きることもない。 → Câu cuối (sau が) chốt: tài năng của người sáng lập chỉ phát huy được NHỜ VÀO lao động, cống hiến của nhân viên.", "link": "Bài công nhận tài năng cá nhân là có thật và quan trọng, nhưng が đảo ý: tài năng đó chỉ thành công khi có sự hỗ trợ của người khác (nhân viên) — đây là ý chính, không phải chỉ ca ngợi tài năng cá nhân đơn thuần.", "traps": [{"label": "A", "tag": "Bẫy thêm chi tiết", "jp": "優秀な能力を使って、<b>社員を率いてゆく責任</b>がある。", "vn": "\"Trách nhiệm dẫn dắt nhân viên\" (社員を率いてゆく責任) không có trong bài — bài nói NGƯỢC LẠI, nhân viên giúp tài năng đó phát huy."}, {"label": "B", "tag": "Bẫy thiếu ý", "jp": "<b>人並み外れた能力</b>をビジネスに活かすことが必要である。", "vn": "Chỉ nói nửa đầu (đưa tài năng vào kinh doanh), bỏ sót điều kiện cốt lõi: cần có sự hỗ trợ của người khác (他者の支え)."}, {"label": "C", "tag": "Bẫy ngược nghĩa", "jp": "<b>誰の助けを借りることもなく</b>、企業を成功に導くことができる。", "vn": "Hoàn toàn ngược ý bài — bài khẳng định rõ KHÔNG THỂ thành công nếu THIẾU sự giúp đỡ của người khác."}], "translate": [{"jp": "いつの世も、才覚のある者が新しいビジネスを起こしてゆくのは事実だが、それをビジネスとして成立させるのは社員の労働と献身である。", "vn": "Ở thời nào cũng vậy, đúng là người có tài năng đặc biệt sẽ khởi xướng những công việc kinh doanh mới, nhưng điều khiến nó thực sự trở thành một doanh nghiệp thành công lại là lao động và sự cống hiến của nhân viên."}, {"jp": "それがなければ起業者の才覚が活きることもない。", "vn": "Nếu không có điều đó, tài năng của người sáng lập cũng không thể phát huy được."}], "vocab": [{"term": "才覚", "reading": "さいかく", "mean": "tài năng, sự nhạy bén đặc biệt"}, {"term": "献身", "reading": "けんしん", "mean": "sự cống hiến, hết lòng vì công việc"}, {"term": "軌道から飛び出す", "reading": "きどうからとびだす", "mean": "thoát ra khỏi quỹ đạo thông thường (ẩn dụ: vượt khỏi khuôn mẫu)"}], "anchorWords": ["才覚", "文章", "一定", "軌道", "能力", "農業", "産業社会", "成立"], "thinking": [{"jp": "昔も今も、才覚というのは一定の軌道から飛び出してゆく能力のことで、みんなにそんな例外的な能力が備わっていたら、そもそも大地にはりつく農業も、分業で成り立つ産業社会も有り得ない。", "vn": "→ Tài năng đặc biệt (才覚) là năng lực HIẾM, không phải ai cũng có."}, {"jp": "いつの世も、才覚のある者が新しいビジネスを起こしてゆくのは事実だが、それをビジネスとして成立させるのは社員の労働と献身である", "vn": "→ が đảo ý: dù người tài khởi xướng kinh doanh, NHƯNG điều khiến nó THÀNH CÔNG là LAO ĐỘNG/CỐNG HIẾN (労働と献身) của nhân viên."}, {"jp": "それがなければ起業者の才覚が活きることもない。", "vn": "→ Suy ra: NẾU KHÔNG có sự cống hiến đó, tài năng của người sáng lập CŨNG KHÔNG PHÁT HUY được (才覚が活きることもない)."}], "chain": "才覚のある者が起業 (người tài khởi xướng)\n　↓ が\nビジネスを成立させるのは社員の労働と献身 (nhân viên mới làm nó thành công)\n　↓ suy ra\n社員の支えがなければ才覚は活きない (tài năng cần được hỗ trợ)", "correctExplainJp": "<b>他者の支え</b>によって初めて<b>能力</b>をビジネスに<b>活用</b>することができる。", "correctExplain": "khớp đúng: tài năng (才覚) chỉ phát huy được NHỜ sự hỗ trợ của người khác (他者の支え) — đúng tinh thần が đảo ý."}, {"bai": "BÀI 23", "date": "07/2013 (4)", "passage": "今の世には明るいものは余りに少なく、暗いものは余りに多く見えるが、両者は別個のばらばらではない。絶望と見える対象を嫌がったり恐れたりして目をつぶって、そこを去れば、もう希望とは決して会えない。絶望すべき対象にはしっかと(注)絶望し、それを克服するために努力し続ければ、それが希望に転化(注)してゆくのだ。そうだ、希望は絶望の真ん中の、そのどん底に実在しているのだ。\n\n(注) しっかと：しっかり\n(注) 転化：変化", "source": "（むのたけじ『希望は絶望のど真ん中に』による）", "question": "この文章で筆者が言いたいことは何か。", "choices": ["絶望を希望に変える方法を模索しなければならない。", "絶望していては希望にたどり着くことはできない。", "絶望に立ち向かってゆけばその先に希望がある。", "絶望から目をそらすと希望が見えてくる。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Câu cuối khẳng định: \"希望は絶望の…どん底に実在している\" — hy vọng nằm NGAY TRONG tuyệt vọng, chỉ cần đối mặt và cố gắng vượt qua thì tuyệt vọng sẽ biến thành hy vọng. C đúng.", "wrong": ["A nói mơ hồ về \"tìm phương pháp\" — chưa đúng trọng tâm, bài nói rõ PHƯƠNG PHÁP là đối mặt + nỗ lực vượt qua, không phải còn đang tìm.", "B đúng một phần (tuyệt vọng đơn thuần không đến được hy vọng) nhưng thiếu hành động \"cố gắng vượt qua\" mà bài nhấn mạnh.", "D ngược nghĩa hoàn toàn: bài nói nếu QUAY MẶT/TRÁNH tuyệt vọng thì sẽ KHÔNG BAO GIỜ gặp được hy vọng."]}, "anchor": "Không có mỏ neo đảo ngược kiểu しかし, nhưng có cấu trúc đối lập rõ giữa 2 hành động: 'tránh né tuyệt vọng' (mất hy vọng) ⇔ 'đối mặt + nỗ lực' (có hy vọng). Câu cuối là kết luận hình tượng hoá ý chính.", "first": "今の世には明るいものは余りに少なく、暗いものは余りに多く見えるが、両者は別個のばらばらではない。 → Mở bài: ánh sáng và bóng tối (hy vọng/tuyệt vọng) không tách biệt nhau, mà liên quan chặt chẽ.", "last": "そうだ、希望は絶望の真ん中の、そのどん底に実在しているのだ。 → Câu cuối khẳng định hình tượng: hy vọng tồn tại ngay giữa lòng tuyệt vọng.", "link": "Bài xây dựng 2 con đường đối lập: tránh né tuyệt vọng → mất hy vọng vĩnh viễn; đối mặt + nỗ lực vượt qua tuyệt vọng → tuyệt vọng biến thành hy vọng. Câu cuối là hình ảnh cô đọng cho toàn bộ lập luận này.", "traps": [{"label": "A", "tag": "Bẫy mơ hồ", "jp": "絶望を希望に変える<b>方法を模索</b>しなければならない。", "vn": "Nói chung là \"cần tìm cách\" (方法を模索) trong khi bài đã chỉ rõ cách: đối mặt trực tiếp + nỗ lực không ngừng, không phải còn mơ hồ tìm kiếm."}, {"label": "B", "tag": "Bẫy thiếu ý", "jp": "絶望していては希望にたどり着くことはできない。", "vn": "Chỉ đúng một nửa (tuyệt vọng đơn thuần thì không đến được hy vọng), thiếu điều kiện quan trọng: phải có hành động ĐỐI MẶT và NỖ LỰC."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "絶望から<b>目をそらす</b>と希望が見えてくる。", "vn": "Ngược hoàn toàn — bài nói RÕ nếu né tránh, NHẮM MẮT (目をつぶる) bỏ đi thì SẼ KHÔNG BAO GIỜ gặp được hy vọng."}], "translate": [{"jp": "絶望と見える対象を嫌がったり恐れたりして目をつぶって、そこを去れば、もう希望とは決して会えない。", "vn": "Nếu vì ghét bỏ hay sợ hãi điều tưởng như tuyệt vọng mà nhắm mắt bỏ đi, thì ta sẽ không bao giờ gặp được hy vọng nữa."}, {"jp": "絶望すべき対象にはしっかと絶望し、それを克服するために努力し続ければ、それが希望に転化してゆくのだ。", "vn": "Nếu ta thực sự đối diện và tuyệt vọng trọn vẹn với điều đáng tuyệt vọng, rồi không ngừng cố gắng vượt qua nó, thì chính điều đó sẽ chuyển hoá thành hy vọng."}], "vocab": [{"term": "転化する", "reading": "てんかする", "mean": "biến đổi, chuyển hoá thành cái khác"}, {"term": "どん底", "reading": "どんぞこ", "mean": "đáy cùng, tận đáy (của khó khăn/tuyệt vọng)"}, {"term": "目をつぶる", "reading": "めをつぶる", "mean": "nhắm mắt làm ngơ, lờ đi"}], "anchorWords": ["文章", "筆者", "両者", "別個", "希望", "絶望", "実在"], "thinking": [{"jp": "今の世には明るいものは余りに少なく、暗いものは余りに多く見えるが、両者は別個のばらばらではない。", "vn": "→ Hy vọng và tuyệt vọng KHÔNG TÁCH BIỆT (別個のばらばらではない) — liên quan chặt chẽ với nhau."}, {"jp": "絶望と見える対象を嫌がったり恐れたりして目をつぶって、そこを去れば、もう希望とは決して会えない。絶望すべき対象にはしっかと絶望し、それを克服するために努力し続ければ、それが希望に転化してゆくのだ。", "vn": "→ Suy ra 2 con đường: TRÁNH NÉ (目をつぶる) → mất hy vọng vĩnh viễn; ĐỐI MẶT + NỖ LỰC (努力し続ければ) → tuyệt vọng BIẾN THÀNH hy vọng (希望に転化)."}, {"jp": "そうだ、希望は絶望の真ん中の、そのどん底に実在しているのだ。", "vn": "→ Chốt hình tượng: hy vọng tồn tại NGAY GIỮA LÒNG tuyệt vọng (絶望の真ん中)."}], "chain": "希望と絶望は別個ではない (liên quan chặt)\n　↓ 2つの道\n目をつぶる(tránh né) → 希望に会えない\n対峙+努力(đối mặt) → 希望に転化\n　↓ kết luận\n希望は絶望のど真ん中にある", "correctExplainJp": "絶望に<b>立ち向かって</b>ゆけばその先に希望がある。", "correctExplain": "khớp đúng: ĐỐI MẶT (立ち向かう) + nỗ lực vượt qua tuyệt vọng thì tuyệt vọng sẽ BIẾN THÀNH hy vọng (希望に転化)."}, {"bai": "BÀI 24", "date": "12/2013 (2)", "passage": "何かを学ぶということは、もちろん問題に答える知識や技術を身につけるという意味もあるけれど、それは実は学ぶことの本質ではない。ぼくらは本や学校で、これまでひとが見出してきたさまざまな秩序、筋道を学ぶ。だけどそうやってさまざまな「型」を学ぶことによって今まで見えていなかった、あるいはぼんやりとしか見えていなかった「型やぶり」なものが見えてくるようになる。つまりは、学べば、学ぶほど、見えてくる問題は増えるというわけだ。", "source": "（野矢茂樹『はじめて考えるときのように』による）", "question": "筆者は、学ぶことの本質とは、どのようなことだと考えているか。", "choices": ["「型」を学ぶことで、気づいていなかった問題を認識できるようになること。", "知識や、技術を身につけて、さまざまな秩序や筋道が見えるようになること。", "既存の「型」に固執せず、常に「型やぶり」なことに挑むこと。", "他人が見出したことを学ぶのではなく、自分自身で考えること。"], "correct": 0, "shortFeedback": {"correct": "Đúng! Bài nói: học \"khuôn mẫu\" (型) giúp ta NHÌN RA những vấn đề/điều \"phá khuôn\" mà trước đây không thấy được — học nhiều hơn thì vấn đề nhận ra cũng nhiều hơn. A khớp đúng cơ chế này.", "wrong": ["B chỉ là ý phụ (mục đích thông thường của học), bị bài bác bỏ ngay (それは実は学ぶことの本質ではない).", "C đi quá xa: bài không nói \"phải thử thách phá khuôn\", mà nói học khuôn mẫu giúp NHÌN RA điều phá khuôn — khác với việc chủ động phá khuôn.", "D không có trong bài — bài không so sánh giữa \"học người khác\" và \"tự suy nghĩ\"."]}, "anchor": "Có mỏ neo đảo ngược nhẹ: 「けれど」+「実は〜ではない」ngay đầu bài — phủ nhận ý hiểu thông thường về việc học (chỉ để lấy kiến thức/kỹ năng), dẫn đến bản chất thật ở các câu sau.", "first": "何かを学ぶということは…知識や技術を身につけるという意味もあるけれど、それは実は学ぶことの本質ではない。 → Phủ nhận ngay từ đầu: học không chỉ đơn thuần là lấy kiến thức/kỹ năng.", "last": "つまりは、学べば、学ぶほど、見えてくる問題は増えるというわけだ。 → Câu cuối (つまりは) chốt bản chất thật: học nhiều hơn → nhìn ra nhiều vấn đề mới hơn (nhờ học khuôn mẫu mà thấy được điều phá khuôn).", "link": "Câu đầu phủ nhận quan niệm thông thường (học = lấy kiến thức) → các câu giữa giải thích cơ chế thật (học khuôn mẫu giúp nhận ra điều phá khuôn) → câu cuối (つまりは) chốt: bản chất của học là ngày càng NHÌN RA nhiều vấn đề hơn.", "traps": [{"label": "B", "tag": "Bẫy mọi người", "jp": "知識や、技術を身につけて、さまざまな<b>秩序</b>や<b>筋道</b>が見えるようになること。", "vn": "Đây chính là quan niệm THÔNG THƯỜNG mà câu đầu bài đã PHỦ NHẬN (それは実は学ぶことの本質ではない), không phải bản chất thật."}, {"label": "C", "tag": "Bẫy mở rộng quá mức", "jp": "既存の「型」に固執せず、常に「<b>型やぶり</b>」なことに<b>挑む</b>こと。", "vn": "Bài không kêu gọi \"chủ động THỬ THÁCH phá khuôn\" (挑む) — mà nói học khuôn mẫu giúp ta NHÌN THẤY (見える) điều phá khuôn, khác bản chất với việc ĐI PHÁ khuôn."}, {"label": "D", "tag": "Bẫy không có trong bài", "jp": "他人が<b>見出した</b>ことを学ぶのではなく、<b>自分自身</b>で考えること。", "vn": "Bài không so sánh \"học từ người khác\" với \"tự mình suy nghĩ\" (自分自身で考える) — đây là nội dung không xuất hiện trong đoạn văn."}], "translate": [{"jp": "何かを学ぶということは…知識や技術を身につけるという意味もあるけれど、それは実は学ぶことの本質ではない。", "vn": "Việc học một điều gì đó, tất nhiên cũng mang nghĩa là tiếp thu kiến thức, kỹ năng để giải quyết vấn đề, nhưng đó thực ra không phải là bản chất của việc học."}, {"jp": "つまりは、学べば、学ぶほど、見えてくる問題は増えるというわけだ。", "vn": "Nói cách khác, càng học nhiều, ta lại càng nhìn ra nhiều vấn đề mới hơn."}], "vocab": [{"term": "型やぶり", "reading": "かたやぶり", "mean": "phá vỡ khuôn mẫu, khác thường"}, {"term": "見出す", "reading": "みいだす", "mean": "tìm ra, phát hiện ra"}, {"term": "〜ば〜ほど", "reading": "—", "mean": "càng~ thì càng~ (ngữ pháp tỉ lệ thuận)"}], "anchorWords": ["筆者", "本質", "知識", "技術", "意味", "問題", "認識"], "thinking": [{"jp": "何かを学ぶということは…知識や技術を身につけるという意味もあるけれど、それは実は学ぶことの本質ではない。", "vn": "→ Phủ nhận ngay: học KHÔNG chỉ là lấy kiến thức/kỹ năng (それは実は学ぶことの本質ではない)."}, {"jp": "さまざまな「型」を学ぶことによって今まで見えていなかった、あるいはぼんやりとしか見えていなかった「型やぶり」なものが見えてくるようになる。", "vn": "→ Suy ra cơ chế thật: học \"khuôn mẫu\" (型) giúp ta NHÌN RA điều \"phá khuôn\" (型やぶり) mà trước đây KHÔNG THẤY."}, {"jp": "つまりは、学べば、学ぶほど、見えてくる問題は増えるというわけだ。", "vn": "→ つまりは chốt bản chất: học CÀNG NHIỀU → NHÌN RA CÀNG NHIỀU vấn đề mới."}], "chain": "学ぶ ≠ 知識を得るだけ (PHỦ ĐỊNH)\n　↓ 本当は\n型を学ぶ → 型やぶりなものが見える (nhìn ra điều mới)\n　↓ つまり\n学べば学ぶほど → 見える問題が増える", "correctExplainJp": "「型」を学ぶことで、<b>気づいていなかった問題</b>を<b>認識</b>できるようになること。", "correctExplain": "khớp đúng cơ chế: học khuôn mẫu (型) giúp NHẬN RA (認識) những vấn đề trước đây CHƯA TỪNG ĐỂ Ý (気づいていなかった)."}, {"bai": "BÀI 25", "date": "12/2013 (3)", "passage": "医者、ナース(注)と患者との間の意味のズレやスレ違いは、患者の身体的症状に対する専門的な医学的認識、患者自身の意味づけとの間に生まれている。医療関係者の課題の一つは、患者自身の身勝手な解釈とそれに基づいた治療行動を再考させて、医学的に求められる治療活動だけに目を向けさせることであろう。つまり、患者の内面にある認識構造の再構成というむずかしい問題にぶつかるのである。\n\n(注) ナース：看護師", "source": "（梶田正巳『勉強力をつける』による）", "question": "筆者によると、医療関係者に求められていることは、何か。", "choices": ["患者の希望を聞いて治療方法を再考すること。", "患者が、納得できる医学的な見解を示すこと。", "患者の目を最新の治療方法に向けさせること。", "患者を医学的な認識に導くこと。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Bài nói rõ: cần cho bệnh nhân tập trung vào nhận thức Y HỌC đúng đắn (医学的に求められる治療活動だけに目を向けさせる), tức là dẫn dắt họ đến nhận thức y khoa — D khớp đúng.", "wrong": ["A ngược ý: bài nói cần làm bệnh nhân XEM LẠI cách hiểu chủ quan của họ, không phải nghe theo nguyện vọng của họ.", "B không đúng — bài không nói về việc bác sĩ phải đưa ra ý kiến \"khiến bệnh nhân thoả mãn\".", "C nói về \"phương pháp điều trị mới nhất\" — không có trong bài, bài chỉ nói về nhận thức y học nói chung."]}, "anchor": "Không có mỏ neo đảo ngược. Câu đầu nêu hiện tượng (lệch nhận thức bác sĩ-bệnh nhân), câu cuối (つまり) chốt vấn đề cốt lõi.", "first": "医者、ナースと患者との間の意味のズレやスレ違いは…生まれている。 → Nêu hiện tượng: có sự lệch pha nhận thức giữa bác sĩ và bệnh nhân.", "last": "つまり、患者の内面にある認識構造の再構成というむずかしい問題にぶつかるのである。 → つまり chốt: vấn đề khó là phải TÁI CẤU TRÚC nhận thức bên trong bệnh nhân.", "link": "Từ hiện tượng lệch pha → giải pháp (đưa bệnh nhân về nhận thức y học đúng) → つまり chốt lại bằng cách diễn đạt khác: tái cấu trúc nhận thức bệnh nhân. Đáp án cần phản ánh đúng việc \"dẫn dắt bệnh nhân đến nhận thức y học\".", "traps": [{"label": "A", "tag": "Bẫy ngược nghĩa", "jp": "患者の<b>希望</b>を聞いて治療方法を<b>再考</b>すること。", "vn": "Ngược ý — bài nói cần làm bệnh nhân XEM LẠI nhận thức chủ quan của họ, không phải nghe theo NGUYỆN VỌNG (希望) đó."}, {"label": "B", "tag": "Bẫy không có trong bài", "jp": "患者が、<b>納得</b>できる医学的な<b>見解</b>を示すこと。", "vn": "Bài không nói về việc đưa ra ý kiến (見解) để bệnh nhân \"thoả mãn\" (納得), mà nói về việc điều chỉnh nhận thức của họ."}, {"label": "C", "tag": "Bẫy thêm chi tiết", "jp": "患者の目を<b>最新の治療方法</b>に向けさせること。", "vn": "\"Phương pháp điều trị mới nhất\" (最新の治療方法) là chi tiết không có trong bài."}], "translate": [{"jp": "医療関係者の課題の一つは、患者自身の身勝手な解釈とそれに基づいた治療行動を再考させて、医学的に求められる治療活動だけに目を向けさせることであろう。", "vn": "Một trong những nhiệm vụ của người làm y tế có lẽ là khiến bệnh nhân xem lại cách hiểu chủ quan của họ và hành vi điều trị dựa trên đó, để hướng họ tập trung vào hoạt động điều trị đúng theo yêu cầu y học."}, {"jp": "つまり、患者の内面にある認識構造の再構成というむずかしい問題にぶつかるのである。", "vn": "Nói cách khác, đây là một vấn đề khó: phải tái cấu trúc lại cấu trúc nhận thức bên trong bệnh nhân."}], "vocab": [{"term": "スレ違い", "reading": "すれちがい", "mean": "sự lệch pha, hiểu lầm giữa hai bên"}, {"term": "身勝手", "reading": "みがって", "mean": "tự cho mình là đúng, chủ quan ích kỷ"}, {"term": "認識構造", "reading": "にんしきこうぞう", "mean": "cấu trúc nhận thức"}], "anchorWords": ["筆者", "医療関係者", "医者", "患者", "意味", "内面", "認識構造", "再構成"], "thinking": [{"jp": "医者、ナースと患者との間の意味のズレやスレ違いは…生まれている。", "vn": "→ Hiện tượng: có sự LỆCH PHA (ズレ) nhận thức giữa bác sĩ/y tá và bệnh nhân."}, {"jp": "医療関係者の課題の一つは、患者自身の身勝手な解釈とそれに基づいた治療行動を再考させて、医学的に求められる治療活動だけに目を向けさせることであろう。", "vn": "→ Suy ra nhiệm vụ: khiến bệnh nhân XEM LẠI (再考させて) cách hiểu chủ quan, hướng họ về nhận thức Y HỌC đúng."}, {"jp": "つまり、患者の内面にある認識構造の再構成というむずかしい問題にぶつかるのである。", "vn": "→ つまり chốt: đó là vấn đề khó — TÁI CẤU TRÚC (再構成) nhận thức bên trong bệnh nhân."}], "chain": "医者と患者の認識がズレている (hiện tượng)\n　↓ 課題\n患者の身勝手な解釈を再考させる (cho xem lại)\n　↓ つまり\n患者を医学的な認識構造へ導く (tái cấu trúc)", "correctExplainJp": "患者を<b>医学的な認識</b>に<b>導く</b>こと。", "correctExplain": "khớp đúng: dẫn dắt (導く) bệnh nhân đến nhận thức Y HỌC (医学的な認識) đúng đắn."}, {"bai": "BÀI 26", "date": "12/2013 (4)", "passage": "日記とは限りなく私的な記録であり、読者が存在しないどころか、他人には読まれたくない秘密の表現であるともいえる。ただ一人だけ奇妙な読者が存在する。いつでも自由に日記を読むことのできる日記の筆者である。その読者は筆者とは異なる場に立って様々な配慮を動かす。万が一、日記が盗み読まれたり、死後に他人の目に曝されるような事態が発生した場合、こんなことが書かれているのはまずいのではあるまいか、等々と。しかし、これは限りなく私的な記録であるはずの日記にとっては矛盾である。", "source": "", "question": "矛盾であるとあるが、何が矛盾か。", "choices": ["他人に読まれる可能性のある日記に秘密を書き残すこと。", "日記の筆者が他人に読まれることを想定すること。", "日記は筆者しか読まないのに、他人にも読みやすく書くこと。", "日記は私的なものなのに、他人に自由に読まれるかもしれないこと。"], "correct": 0, "shortFeedback": {"correct": "Đúng! Bài nói: nhật ký vốn riêng tư tuyệt đối, NHƯNG người viết lại tự đặt mình vào vị trí \"người đọc khác\" để lo lắng liệu viết gì có \"bị lộ\" không — tức là VIẾT điều bí mật trong khi vẫn ý thức về khả năng bị người khác đọc. A khớp đúng mâu thuẫn này.", "wrong": ["B chỉ nói \"giả định bị đọc\" — chưa đủ, mâu thuẫn nằm ở việc VẪN VIẾT bí mật dù có giả định đó.", "C không có trong bài — bài không nói về việc viết \"dễ đọc cho người khác\".", "D là một diễn đạt chung nhưng chưa chỉ rõ ĐÚNG bản chất mâu thuẫn: chính bản thân người viết tự đặt ra sự lo lắng đó."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「しかし」ở câu cuối — chỉ ra mâu thuẫn giữa bản chất riêng tư của nhật ký và hành vi tự kiểm duyệt của người viết.", "first": "日記とは限りなく私的な記録であり…秘密の表現であるともいえる。 → Khẳng định nhật ký là ghi chép cực kỳ riêng tư, mang tính bí mật.", "last": "しかし、これは限りなく私的な記録であるはずの日記にとっては矛盾である。 → Câu cuối (しかし) chỉ thẳng: đó là một mâu thuẫn đối với bản chất riêng tư của nhật ký.", "link": "しかし đảo ý: nhật ký lẽ ra hoàn toàn riêng tư (không có người đọc) NHƯNG người viết tự đóng vai \"người đọc khác\" để lo lắng việc bị phát hiện — đây chính là mâu thuẫn cốt lõi mà câu hỏi yêu cầu chỉ ra.", "traps": [{"label": "B", "tag": "Bẫy thiếu ý", "jp": "日記の筆者が他人に<b>読まれること</b>を<b>想定</b>すること。", "vn": "Chỉ nói về việc \"giả định bị đọc\" (想定する), chưa nêu đủ mâu thuẫn: dù giả định vậy vẫn TIẾP TỤC viết bí mật."}, {"label": "C", "tag": "Bẫy không có trong bài", "jp": "日記は筆者しか読まないのに、他人にも<b>読みやすく</b>書くこと。", "vn": "Bài không nhắc đến việc viết \"dễ đọc cho người khác\" (読みやすく) — đây là chi tiết bị thêm vào."}, {"label": "D", "tag": "Bẫy diễn đạt mơ hồ", "jp": "日記は<b>私的</b>なものなのに、他人に<b>自由に読まれる</b>かもしれないこと。", "vn": "Cách nói chung, chưa chỉ rõ rằng MÂU THUẪN nằm ở chính hành vi TỰ KIỂM DUYỆT của người viết khi viết bí mật."}], "translate": [{"jp": "日記とは限りなく私的な記録であり、読者が存在しないどころか、他人には読まれたくない秘密の表現であるともいえる。", "vn": "Nhật ký là một ghi chép vô cùng riêng tư, không chỉ không có người đọc mà còn có thể coi là cách thể hiện những điều bí mật mà ta không muốn ai khác đọc được."}, {"jp": "しかし、これは限りなく私的な記録であるはずの日記にとっては矛盾である。", "vn": "Nhưng đó lại là một mâu thuẫn đối với nhật ký — vốn lẽ ra phải là một ghi chép hoàn toàn riêng tư."}], "vocab": [{"term": "曝される", "reading": "さらされる", "mean": "bị phơi bày ra (trước mắt người khác)"}, {"term": "〜どころか", "reading": "どころか", "mean": "chứ chưa nói đến~ (ngữ pháp nhấn mạnh sự đối lập)"}, {"term": "配慮を動かす", "reading": "はいりょをうごかす", "mean": "vận hành/khởi động sự cân nhắc, lo lắng"}], "anchorWords": ["矛盾", "日記", "私的", "記録", "秘密", "表現", "他人", "可能性"], "thinking": [{"jp": "日記とは限りなく私的な記録であり、読者が存在しないどころか、他人には読まれたくない秘密の表現であるともいえる。", "vn": "→ Khẳng định: nhật ký cực kỳ riêng tư (私的), thậm chí là cách thể hiện BÍ MẬT (秘密) không muốn ai đọc."}, {"jp": "いつでも自由に日記を読むことのできる、日記の筆者である。…万が一日記が盗み読まれたり…こんなことが書かれているのはまずいのではあるまいか、等々と。", "vn": "→ Suy ra: chính người viết lại tự đặt mình vào vị trí \"người đọc khác\" để LO LẮNG (まずいのではあるまいか) liệu có bị lộ không."}, {"jp": "しかし、これは限りなく私的な記録である筈の日記にとって矛盾である。", "vn": "→ しかし chốt: đó là MÂU THUẪN — vẫn viết bí mật trong khi tự kiểm duyệt như vậy."}], "chain": "日記 = 秘密の表現 (riêng tư tuyệt đối)\n　↓ しかし\n筆者自身が「読まれたら困る」と心配する (tự kiểm duyệt)\n　↓ 矛盾\n秘密を書きつつ、読まれることを意識する", "correctExplainJp": "他人に<b>読まれる可能性</b>のある日記に<b>秘密</b>を書き残すこと。", "correctExplain": "khớp đúng mâu thuẫn: VIẾT bí mật (秘密) trong khi vẫn Ý THỨC về khả năng bị người khác đọc (読まれる可能性)."}, {"bai": "BÀI 27", "date": "7/2014 (2)", "passage": "井上ひさし(注)さんが、「エッセイとはすなわち、自慢話である」といったことを書いていらしたのを、以前読んだことがありますが、私はその文を一読した瞬間、「ああっ!」と叫んで赤面(注)したのでした。エッセイー自慢、とはまさにその通り。エッセイを書く仕事をしている私は、心のどこかでそのことを感じつつ、気付かない努力をしていた気がする。しかしそのようにズバリ言われると、「私は今まで、自慢話によって、口を糊して(注)きたのだなぁ」ということが、明確に理解できるのです。\n\n(注) 井上ひさし：日本の小説家\n(注) 赤面する：顔が赤くなる\n(注) 口を糊して：ここでは、生計を立てる", "source": "（酒井項子『黒いマナー』による）", "question": "筆者が「ああっ!」と叫んだのはなぜか。", "choices": ["前々から抱いていた自身の思いを先に言われたから。", "だれかに言いたかった自身の気持ちを見抜かれたから。", "意識しないようにしていた自身の思いを指摘されたから。", "言葉にできないでいた自身の気持ちをズバリ言われたから。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Bài nói rõ: tác giả vốn đã cảm nhận điều đó \"đâu đó trong lòng\" nhưng CỐ GẮNG KHÔNG NHẬN RA (気付かない努力をしていた) — bị chỉ thẳng ra khiến giật mình. C khớp đúng \"điều đang cố không để ý tới\".", "wrong": ["A nói \"đã có ý nghĩ đó từ trước\" — đúng một phần nhưng thiếu yếu tố quan trọng: tác giả đang CHỦ ĐỘNG TRÁNH nhận ra điều đó.", "B nói về việc \"muốn nói với ai đó\" — sai, tác giả không muốn nói ra, mà đang né tránh nó.", "D nói \"không thể diễn đạt thành lời\" — khác với việc \"cố tình không nhận ra\" mà bài thực sự miêu tả."]}, "anchor": "Không có mỏ neo đảo ngược rõ kiểu しかし ở cuối, nhưng có しかし ngay giữa bài — chuyển từ trạng thái lờ đi (気付かない努力) sang nhận thức rõ ràng khi bị nói thẳng.", "first": "エッセイとはすなわち、自慢話である…私はその文を一読した瞬間、「ああっ!」と叫んで赤面したのでした。 → Tác giả phản ứng mạnh ngay khi đọc câu nói thẳng về bản chất của tản văn.", "last": "しかしそのようにズバリ言われると…ということが、明確に理解できるのです。 → しかし chốt: khi bị nói thẳng, tác giả mới HIỂU RÕ điều mình vốn cố tránh nhận ra.", "link": "Tác giả vốn đã ngầm cảm nhận sự thật này nhưng \"cố gắng không nhận ra\" (気付かない努力) → bị nói thẳng (ズバリ言われる) → buộc phải đối diện rõ ràng với điều đó, dẫn đến phản ứng giật mình \"ああっ!\".", "traps": [{"label": "A", "tag": "Bẫy thiếu ý", "jp": "<b>前々から</b>抱いていた自身の思いを<b>先に言われた</b>から。", "vn": "Chỉ nói \"đã từng nghĩ vậy\" (前々から抱いていた), thiếu yếu tố cốt lõi: tác giả đang CHỦ ĐỘNG né tránh (気付かない努力), không muốn nhận ra điều đó."}, {"label": "B", "tag": "Bẫy lệch ý", "jp": "だれかに<b>言いたかった</b>自身の気持ちを<b>見抜かれた</b>から。", "vn": "\"Muốn nói với ai đó\" (言いたかった) sai hướng — tác giả không có ý định chia sẻ, mà đang LỜ ĐI sự thật này."}, {"label": "D", "tag": "Bẫy gần giống nhưng khác bản chất", "jp": "<b>言葉にできないで</b>いた自身の気持ちをズバリ言われたから。", "vn": "\"Không diễn đạt được thành lời\" (言葉にできない) khác với việc \"CỐ TÌNH không để ý/nhận ra\" (気付かない努力) — hai trạng thái tâm lý khác nhau."}], "translate": [{"jp": "エッセイを書く仕事をしている私は、心のどこかでそのことを感じつつ、気付かない努力をしていた気がする。", "vn": "Tôi, một người làm công việc viết tản văn, có cảm giác rằng đâu đó trong lòng mình đã cảm nhận được điều đó, nhưng vẫn cố gắng để không nhận ra nó."}, {"jp": "しかしそのようにズバリ言われると、「私は今まで、自慢話によって、口を糊してきたのだなぁ」ということが、明確に理解できるのです。", "vn": "Nhưng khi bị nói thẳng như vậy, tôi mới hiểu rõ ràng rằng: \"Hoá ra từ trước đến nay, tôi đã sống bằng những câu chuyện khoe khoang của chính mình.\""}], "vocab": [{"term": "赤面する", "reading": "せきめんする", "mean": "đỏ mặt (vì xấu hổ, bất ngờ)"}, {"term": "ズバリ言う", "reading": "ズバリいう", "mean": "nói thẳng, nói trúng tim đen"}, {"term": "口を糊する", "reading": "くちをのりする", "mean": "kiếm sống, mưu sinh (thành ngữ)"}], "anchorWords": ["筆者", "自慢話", "一読", "瞬間", "赤面", "明確", "理解", "気付"], "thinking": [{"jp": "井上ひさしさんが、「エッセイとはすなわち、自慢話である」といったことを…私はその文を一読した瞬間、「ああっ!」と叫んで赤面したのでした。", "vn": "→ Tác giả phản ứng MẠNH (ああっ!と叫んで赤面) khi đọc câu nói thẳng về bản chất tản văn."}, {"jp": "エッセイを書く仕事をしている私は、心のどこかでそのことを感じつつ、気付かない努力をしていた気がする。", "vn": "→ Suy ra: tác giả vốn đã NGẦM CẢM NHẬN (感じつつ) điều đó, nhưng CỐ GẮNG KHÔNG NHẬN RA (気付かない努力)."}, {"jp": "しかしそのようにズバリ言われると…ということが、明確に理解できるのです。", "vn": "→ しかし chốt: bị nói THẲNG (ズバリ) khiến tác giả buộc phải HIỂU RÕ điều mình vốn cố tránh."}], "chain": "本質を感じつつ、気付かない努力をする (cố né tránh)\n　↓ しかし\nズバリ言われる (bị nói thẳng)\n　↓ 結果\n明確に理解する → ああっ!と叫ぶ", "correctExplainJp": "<b>意識しないようにしていた</b>自身の思いを<b>指摘</b>されたから。", "correctExplain": "khớp đúng: điều tác giả đang CỐ GẮNG KHÔNG ĐỂ Ý (気付かない努力) bị CHỈ RA (指摘される) thẳng."}, {"bai": "BÀI 28", "date": "7/2014 (3)", "passage": "人間の社会的な日常生活は、無数の暗黙の約束を相互に共有することで成り立っています。暗黙というのは、そうした約束が明瞭に意識されたり、どこかにはっきり書かれているわけではないということです。習慣化し、なかば無意識的に守られている社会的な約束事の海に、共に浸かっているから、われわれはこの世界の中に安心して毎日生きていられるのであり、これから何が起きるのか、自分はどう行動したらよいのか、一々思い悩まずにいられるわけです。", "source": "（森亘代表『異文化への理解』による）", "question": "思い悩まずにいられるとあるが、なぜか。", "choices": ["習慣化された社会共通の約束事があるから。", "社会的な約束事は日常生活で教えられるから。", "社会でお互いの約束事が意識的に守られているから。", "習慣行動に関する約束事を共有する場が持てるから。"], "correct": 0, "shortFeedback": {"correct": "Đúng! Bài nói: vì ta cùng \"ngâm mình\" trong biển quy ước xã hội đã thành thói quen, được giữ một cách GẦN NHƯ VÔ THỨC — đúng với A: có quy ước chung đã thành thói quen.", "wrong": ["B nói \"được dạy trong sinh hoạt hàng ngày\" — không đúng, bài nói quy ước này là NGẦM ĐỊNH, không phải được dạy rõ ràng.", "C ngược nghĩa: bài nói quy ước được giữ \"GẦN NHƯ VÔ THỨC\" (無意識的), không phải có ý thức.", "D nói về \"có nơi để chia sẻ\" — không đúng trọng tâm, bài không nói về \"địa điểm\" mà nói về việc CÙNG TỒN TẠI trong quy ước chung."]}, "anchor": "Không có mỏ neo đảo ngược. Câu đầu nêu luận điểm chính (đời sống xã hội dựa trên quy ước ngầm), câu cuối giải thích hệ quả của luận điểm đó.", "first": "人間の社会的な日常生活は、無数の暗黙の約束を相互に共有することで成り立っています。 → Nêu luận điểm: đời sống xã hội dựa trên vô số quy ước ngầm được chia sẻ chung.", "last": "…一々思い悩まずにいられるわけです。 → Câu cuối nêu hệ quả: nhờ có quy ước ngầm đó mà con người không phải lo nghĩ về từng hành động nhỏ.", "link": "Mạch xuyên suốt không đảo ngược: có quy ước ngầm, thành thói quen, được giữ vô thức → con người sống an tâm, không cần đắn đo từng việc. Đáp án đúng phải nêu được NGUYÊN NHÂN gốc: tồn tại quy ước chung đã thành thói quen.", "traps": [{"label": "B", "tag": "Bẫy ngược nghĩa", "jp": "社会的な約束事は<b>日常生活で教えられる</b>から。", "vn": "Bài nói quy ước là NGẦM ĐỊNH (暗黙), không phải được DẠY (教えられる) rõ ràng trong sinh hoạt."}, {"label": "C", "tag": "Bẫy ngược nghĩa", "jp": "社会でお互いの約束事が<b>意識的に</b>守られているから。", "vn": "Ngược hẳn — bài nói quy ước được giữ một cách GẦN NHƯ VÔ THỨC (無意識的), không phải có Ý THỨC (意識的) rõ ràng."}, {"label": "D", "tag": "Bẫy lệch trọng tâm", "jp": "習慣行動に関する約束事を<b>共有する場</b>が持てるから。", "vn": "\"Có nơi để chia sẻ\" (共有する場) không phải ý chính — bài nói về việc CÙNG TỒN TẠI trong quy ước chung, không nhấn vào địa điểm/khung cảnh."}], "translate": [{"jp": "人間の社会的な日常生活は、無数の暗黙の約束を相互に共有することで成り立っています。", "vn": "Đời sống xã hội thường ngày của con người được hình thành nhờ việc cùng chia sẻ vô số quy ước ngầm với nhau."}, {"jp": "習慣化し、なかば無意識的に守られている社会的な約束事の海に、共に浸かっているから、われわれはこの世界の中に安心して毎日生きていられる。", "vn": "Vì chúng ta cùng đắm mình trong biển quy ước xã hội đã trở thành thói quen và được giữ gần như vô thức, nên ta mới có thể sống an tâm mỗi ngày trong thế giới này."}], "vocab": [{"term": "暗黙の約束", "reading": "あんもくのやくそく", "mean": "quy ước ngầm, luật bất thành văn"}, {"term": "なかば無意識的に", "reading": "なかばむいしきてきに", "mean": "gần như là vô thức"}, {"term": "思い悩む", "reading": "おもいなやむ", "mean": "lo nghĩ, trăn trở"}], "anchorWords": ["人間", "社会的", "日常生活", "無数", "暗黙", "相互", "共有", "習慣化"], "thinking": [{"jp": "人間の社会的な日常生活は、無数の暗黙の約束を相互に共有することで成り立っています。", "vn": "→ Luận điểm: đời sống xã hội dựa trên vô số quy ước NGẦM (暗黙の約束) được chia sẻ chung."}, {"jp": "習慣化し、なかば無意識的に守られている社会的な約束事の海に、共に浸かっているから。", "vn": "→ Suy ra: vì ta CÙNG NGÂM MÌNH (浸かっている) trong biển quy ước đã thành THÓI QUEN (習慣化), giữ GẦN NHƯ VÔ THỨC (無意識的)."}, {"jp": "われわれはこの世界の中に安心して毎日生きていられるのであり…一々思い悩まずにいられるわけです。", "vn": "→ Hệ quả: nhờ vậy con người sống AN TÂM, không phải LO NGHĨ (思い悩まず) từng việc nhỏ."}], "chain": "暗黙の約束を共有 (quy ước ngầm chung)\n　↓ 習慣化・無意識的に守る\n約束事の海に浸かる (sống trong biển quy ước)\n　↓ 結果\n思い悩まずに生きられる (an tâm)", "correctExplainJp": "<b>習慣化</b>された<b>社会共通</b>の約束事があるから。", "correctExplain": "khớp đúng nguyên nhân gốc: có quy ước CHUNG (社会共通) đã thành THÓI QUEN (習慣化)."}, {"bai": "BÀI 29", "date": "7/2014 (4)", "passage": "白色度というのは物理的な指標であって感受性の指標ではない。したがって白色度が高いというだけでは白は印象づけられないのである。咲き乱れる花々の印象は真っ白でも、その背後にコピー用紙程度の紙を置いてみると、花そのものの白さは紙の白さほどではないことに気が付く。花弁(注)は淡い色を含み水分をたたえた(注)重たい白である。しかし咲き誇る花々が僕らの心に届けてくる白は鮮烈に白い。\n\n(注) 花弁：花びら\n(注) たたえる：ここでは、含む", "source": "（原研哉『白（しろ）』による）", "question": "筆者の考えを表しているのはどれか。", "choices": ["花そのものの白さは物理的な指標で示せない。", "花そのものの白さは他のものとの比較によって決まる。", "花の白さの印象は白色度では説明できない。", "花びらより咲き誇る花々のほうが白色度が高い。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Câu đầu + câu cuối khẳng định: \"白色度\" (chỉ số trắng vật lý) không quyết định ẤN TƯỢNG về độ trắng — hoa thực ra không trắng bằng giấy (vật lý), nhưng vẫn gây ấn tượng \"trắng rực rỡ\" trong lòng người xem. C khớp đúng: ấn tượng trắng KHÔNG thể giải thích bằng chỉ số vật lý.", "wrong": ["A chỉ nói về \"không thể đo bằng chỉ số vật lý\" — đúng nhưng chưa đủ, thiếu phần quan trọng: vẫn có ẤN TƯỢNG trắng rực rỡ trong tâm trí.", "B nói về \"so sánh để xác định\" — đây chỉ là phương pháp minh chứng (đặt cạnh giấy), không phải luận điểm chính của bài.", "D ngược nghĩa: hoa có chỉ số trắng vật lý THẤP hơn giấy, không phải cao hơn."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「しかし」ở câu cuối — đối lập giữa \"màu trắng vật lý nặng nề\" của hoa và \"ấn tượng trắng rực rỡ\" mà hoa mang lại trong tâm trí.", "first": "白色度というのは物理的な指標であって感受性の指標ではない。 → Mở bài bằng luận điểm: chỉ số trắng vật lý khác với cảm nhận trắng của con người.", "last": "しかし咲き誇る花々が僕らの心に届けてくる白は鮮烈に白い。 → しかし chốt: dù về vật lý hoa không trắng bằng giấy, ấn tượng trắng nó mang lại vẫn rực rỡ trong tâm trí.", "link": "Câu đầu nêu luận điểm (chỉ số vật lý ≠ cảm nhận) → ví dụ minh chứng (đặt hoa cạnh giấy, thấy hoa không trắng bằng) → しかし chốt: vậy mà ẤN TƯỢNG trắng của hoa vẫn rất mạnh — khẳng định lại luận điểm ban đầu bằng một góc nhìn khác.", "traps": [{"label": "A", "tag": "Bẫy thiếu ý", "jp": "花そのものの白さは<b>物理的な指標</b>で示せない。", "vn": "Chỉ nói về việc không đo được bằng chỉ số vật lý (物理的な指標), thiếu phần đối lập quan trọng: vẫn có ẤN TƯỢNG trắng mạnh mẽ trong cảm nhận."}, {"label": "B", "tag": "Bẫy lấy phương pháp làm luận điểm", "jp": "花そのものの白さは他のものとの<b>比較</b>によって決まる。", "vn": "Việc đặt hoa cạnh giấy chỉ là cách MINH CHỨNG (比較), không phải luận điểm cốt lõi của bài."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "花びらより<b>咲き誇る花々</b>のほうが<b>白色度</b>が高い。", "vn": "Ngược hẳn — bài nói hoa có độ trắng vật lý (白色度) THẤP hơn giấy, không phải cao hơn."}], "translate": [{"jp": "白色度というのは物理的な指標であって感受性の指標ではない。したがって白色度が高いというだけでは白は印象づけられないのである。", "vn": "Độ trắng là một chỉ số vật lý, không phải chỉ số cảm nhận. Vì vậy, chỉ riêng việc có độ trắng cao không đủ để tạo nên ấn tượng về màu trắng."}, {"jp": "しかし咲き誇る花々が僕らの心に届けてくる白は鮮烈に白い。", "vn": "Nhưng màu trắng mà những bông hoa đang nở rộ mang đến cho tâm hồn chúng ta lại rực rỡ, trắng đến nao lòng."}], "vocab": [{"term": "白色度", "reading": "はくしょくど", "mean": "độ trắng (chỉ số vật lý đo màu)"}, {"term": "咲き誇る", "reading": "さきほこる", "mean": "nở rộ, nở kiêu hãnh"}, {"term": "鮮烈に", "reading": "せんれつに", "mean": "một cách rực rỡ, mạnh mẽ, gây ấn tượng sâu"}], "anchorWords": ["筆者", "白色度", "物理的", "指標", "感受性", "鮮烈", "印象", "説明"], "thinking": [{"jp": "白色度というのは物理的な指標であって感受性の指標ではない。したがって白色度が高いというだけでは白は印象づけられないのである。", "vn": "→ Luận điểm: chỉ số trắng vật lý (白色度) KHÁC với cảm nhận trắng (感受性) của con người."}, {"jp": "花そのものの白さは紙の白さほどではないことに気が付く。花弁は淡い色を含み水分をたたえた重たい白である。", "vn": "→ Minh chứng: thực tế hoa KHÔNG trắng bằng giấy (vật lý thấp hơn)."}, {"jp": "しかし咲き誇る花々が僕らの心に届けてくる白は鮮烈に白い。", "vn": "→ Suy ra (しかし): dù vật lý thấp hơn, ẤN TƯỢNG trắng (印象) mà hoa mang lại vẫn RỰC RỠ (鮮烈) trong tâm trí."}], "chain": "白色度 ≠ 感受性 (vật lý khác cảm nhận)\n　↓ ví dụ\n花の白色度は紙より低い (thực tế thấp hơn)\n　↓ しかし\n心に届く白は鮮烈 (ấn tượng vẫn mạnh)", "correctExplainJp": "花の白さの<b>印象</b>は<b>白色度</b>では説明できない。", "correctExplain": "khớp đúng luận điểm: ẤN TƯỢNG trắng (印象) không thể giải thích bằng CHỈ SỐ vật lý (白色度) — đúng tinh thần đối lập đầu-cuối."}, {"bai": "BÀI 30", "date": "12/2014 (1)", "passage": "失敗はすべて子どもがその後の人生を大過(注)なく生きるための血となり肉となる。そう思えば失敗する前に手を出すことがいかに愚かな教育かわかろうというものです。ただし親は常に子どもをそばでしっかり見守っていなければなりません。手は出さないけれどいつでも危険から救ってやれるよう待機するのです。そうしてもし子どもが転んでケガをしたら「ほら痛いでしょう。ぶつからないように注意するのよ」と教えてやる。そういう姿勢が親に求められるのです。\n\n(注) 大過：大きな過ち", "source": "（大宅映子『親の常識』による）", "question": "筆者が親に対して言いたいことは何か。", "choices": ["子どもが失敗しなくなるまであきらめずに教えることが大切だ。", "子どもが失敗しないようあらかじめ教えることが大切だ。", "子どもが失敗するまでは何も言わずに見守ることが大切だ。", "子どもが失敗したとしてもそのまま見守ることが大切だ。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Bài nói: không nên \"ra tay trước khi trẻ thất bại\" (失敗する前に手を出すことがいかに愚かな教育), mà cha mẹ chỉ cần ĐỨNG BÊN QUAN SÁT, sẵn sàng cứu khi nguy hiểm thật, còn lại để trẻ tự trải nghiệm thất bại — đúng với C.", "wrong": ["A nói \"dạy đến khi không còn thất bại\" — sai, bài không nói mục tiêu là loại bỏ hết thất bại.", "B ngược nghĩa hoàn toàn: bài phê phán việc dạy trước/ngăn thất bại từ đầu (đó là \"giáo dục ngu xuẩn\").", "D thiếu vai trò \"can thiệp khi nguy hiểm thật\" — bài nói cha mẹ vẫn cần sẵn sàng cứu trẻ khỏi nguy hiểm, không chỉ đứng nhìn."]}, "anchor": "Không có mỏ neo đảo ngược kiểu しかし ở cuối, nhưng có ただし ở câu 2 — bổ sung điều kiện quan trọng (vẫn cần giám sát) cho luận điểm chính (để trẻ tự thất bại).", "first": "失敗はすべて子どもがその後の人生を大過なく生きるための血となり肉となる。 → Nêu luận điểm: thất bại là bài học quý giúp trẻ trưởng thành, tránh sai lầm lớn về sau.", "last": "そういう姿勢が親に求められるのです。 → Câu cuối chốt: thái độ cần có của cha mẹ là quan sát, chỉ ra bài học SAU KHI trẻ đã trải nghiệm thất bại, không ngăn cản từ đầu.", "link": "Luận điểm chính: để trẻ tự thất bại để học (không ngăn từ đầu), NHƯNG (ただし) cha mẹ vẫn phải giám sát sát sao để can thiệp khi nguy hiểm thật xảy ra. Đáp án đúng cần phản ánh đúng 2 yếu tố: không ngăn cản + vẫn theo dõi/can thiệp khi cần.", "traps": [{"label": "A", "tag": "Bẫy thêm chi tiết", "jp": "子どもが失敗<b>しなくなるまで</b>あきらめずに教えることが大切だ。", "vn": "Bài không nói mục tiêu là dạy đến khi trẻ \"KHÔNG còn thất bại nữa\" (失敗しなくなるまで) — đây là chi tiết không có trong bài."}, {"label": "B", "tag": "Bẫy ngược nghĩa", "jp": "子どもが失敗しないよう<b>あらかじめ</b>教えることが大切だ。", "vn": "Ngược hẳn ý bài — bài phê phán việc ngăn thất bại TỪ TRƯỚC (あらかじめ) là \"giáo dục ngu xuẩn\"."}, {"label": "D", "tag": "Bẫy thiếu ý", "jp": "子どもが失敗したとしても<b>そのまま見守る</b>ことが大切だ。", "vn": "Thiếu vai trò can thiệp khi nguy hiểm thật xảy ra — bài nói cha mẹ vẫn cần SẴN SÀNG CỨU (救ってやれるよう待機) trẻ, không chỉ đứng nhìn suông."}], "translate": [{"jp": "失敗はすべて子どもがその後の人生を大過なく生きるための血となり肉となる。", "vn": "Mọi thất bại đều trở thành máu và thịt, giúp đứa trẻ sống cuộc đời sau này mà không vướng phải những lỗi lầm lớn."}, {"jp": "手は出さないけれどいつでも危険から救ってやれるよう待機するのです。", "vn": "Cha mẹ không ra tay can thiệp, nhưng luôn ở trong trạng thái sẵn sàng để cứu con khỏi nguy hiểm bất cứ lúc nào."}], "vocab": [{"term": "血となり肉となる", "reading": "ちとなりにくとなる", "mean": "trở thành máu thịt, bài học quý giá thấm vào người (thành ngữ)"}, {"term": "見守る", "reading": "みまもる", "mean": "trông coi, quan sát chăm chú"}, {"term": "待機する", "reading": "たいきする", "mean": "chờ sẵn, đứng chờ trong trạng thái sẵn sàng"}], "anchorWords": ["筆者", "失敗", "人生", "大過", "姿勢", "見守", "大切"], "thinking": [{"jp": "失敗はすべて子どもがその後の人生を大過なく生きるための血となり肉となる。そう思えば失敗する前に手を出すことがいかに愚かな教育かわかろうというものです。", "vn": "→ Luận điểm: thất bại là BÀI HỌC quý (血となり肉となる) — RA TAY TRƯỚC khi trẻ thất bại là \"giáo dục NGU XUẨN\" (愚かな教育)."}, {"jp": "ただし親は常に子どもをそばでしっかり見守っていなければなりません。手は出さないけれどいつでも危険から救ってやれるよう待機するのです。", "vn": "→ Suy ra (ただし bổ sung điều kiện): không ngăn cản (手は出さない), NHƯNG vẫn phải QUAN SÁT (見守る), sẵn sàng cứu khi nguy hiểm thật."}, {"jp": "そういう姿勢が親に求められるのです。", "vn": "→ Chốt: thái độ cần có là QUAN SÁT, chỉ dạy SAU KHI trẻ đã trải nghiệm thất bại."}], "chain": "失敗する前に手を出す = 愚かな教育 (phê phán)\n　↓ ただし\n見守る + 危険時のみ救う (quan sát + can thiệp khi cần)\n　↓ kết luận\n失敗するまで何も言わず見守る", "correctExplainJp": "子どもが<b>失敗する</b>までは<b>何も言わずに見守る</b>ことが大切だ。", "correctExplain": "khớp đúng: KHÔNG ngăn cản trước, để trẻ TỰ THẤT BẠI (失敗する), chỉ QUAN SÁT (見守る) — đúng tinh thần bài."}, {"bai": "BÀI 31", "date": "12/2014 (3)", "passage": "以下は、諦めについて書かれた文章である。\n\n人が自分の能力以上のことに憧れ、それがどうしても出来ないというのに、なお執着を持っているとしたら、登れない壁の下で、徒らにじたばたしているようなもので、気の毒でもありますが、滑稽でもあります。この場合は諦めが必要です。ただそれは、その次の、自分の能力に合った憧れなり、道なりを求めるためにのみ必要であって、諦めの中に憩ってしまうことは少し見当が外れていることになるかもしれません。", "source": "（串田孫一『考える葦』による）", "question": "筆者の考えに合うのはどれか。", "choices": ["前へ進みたいなら、無理なことに執着せずに諦めることも必要だ。", "前へ進めない理由がわからないなら、諦めることが必要だ。", "能力を超えていると思っても、すぐに諦めてしまっては前へ進めない。", "能力に合った憧れや道を求めるなら、何事も諦めてはいけない。"], "correct": 0, "shortFeedback": {"correct": "Đúng! Bài nói: nếu cố chấp với điều ngoài khả năng thì chỉ là vô ích (じたばた), CẦN buông bỏ — nhưng buông bỏ chỉ là BƯỚC ĐỆM để tìm con đường phù hợp hơn, không phải để nghỉ ngơi trong sự từ bỏ. A khớp đúng: từ bỏ điều vô lý để tiếp tục tiến lên.", "wrong": ["B nói về \"không rõ lý do không tiến được\" — không có trong bài, bài nói rõ lý do là VƯỢT QUÁ khả năng, không phải mơ hồ.", "C ngược nghĩa: bài nói NÊN từ bỏ khi vượt quá khả năng, không phải \"từ bỏ ngay sẽ không tiến được\".", "D ngược nghĩa hoàn toàn: bài nói CẦN từ bỏ điều vô lý, không phải \"không nên từ bỏ bất cứ điều gì\"."]}, "anchor": "Có mỏ neo đảo ý nhẹ: 「ただ」ở câu cuối — giới hạn lại ý nghĩa thật của sự từ bỏ (chỉ là bước đệm, không phải đích đến).", "first": "人が自分の能力以上のことに憧れ…気の毒でもありますが、滑稽でもあります。この場合は諦めが必要です。 → Nêu luận điểm: cố chấp với điều ngoài khả năng là vô ích, cần phải từ bỏ.", "last": "諦めの中に憩ってしまうことは少し見当が外れていることになるかもしれません。 → Câu cuối (sau ただ) giới hạn ý nghĩa: từ bỏ chỉ nên là bước đệm, không phải nơi để \"nghỉ ngơi\" mãi.", "link": "Luận điểm chính: cần từ bỏ điều vượt khả năng (vì cố chấp là vô ích) NHƯNG (ただ) mục đích của từ bỏ là để tìm con đường phù hợp hơn — không phải dừng lại mãi trong trạng thái từ bỏ. A là đáp án duy nhất phản ánh đúng \"từ bỏ để tiếp tục tiến lên\".", "traps": [{"label": "B", "tag": "Bẫy thêm chi tiết", "jp": "前へ進めない<b>理由がわからない</b>なら、諦めることが必要だ。", "vn": "\"Không rõ lý do\" (理由がわからない) không có trong bài — bài nói rõ lý do từ bỏ là vì điều đó VƯỢT QUÁ khả năng, không phải mơ hồ không biết lý do."}, {"label": "C", "tag": "Bẫy ngược nghĩa", "jp": "能力を超えていると思っても、すぐに<b>諦めてしまっては</b>前へ進めない。", "vn": "Ngược ý — bài KHUYẾN KHÍCH từ bỏ ĐÚNG LÚC (khi vượt khả năng) để tiến lên, không phải cảnh báo từ bỏ sẽ cản trở tiến bộ."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "能力に合った憧れや道を求めるなら、<b>何事も諦めてはいけない</b>。", "vn": "Ngược hoàn toàn — bài nói CẦN từ bỏ những điều vô lý/vượt khả năng, không phải \"không nên từ bỏ bất cứ điều gì\"."}], "translate": [{"jp": "人が自分の能力以上のことに憧れ…登れない壁の下で、徒らにじたばたしているようなもので、気の毒でもありますが、滑稽でもあります。", "vn": "Khi một người khao khát điều vượt quá khả năng của mình mà vẫn cố chấp, điều đó giống như đang vùng vẫy vô ích dưới chân một bức tường không thể trèo qua — vừa đáng thương lại vừa có phần buồn cười."}, {"jp": "諦めの中に憩ってしまうことは少し見当が外れていることになるかもしれません。", "vn": "Nhưng nếu chỉ dừng lại nghỉ ngơi mãi trong sự từ bỏ ấy, có lẽ đó lại là một sự lệch hướng."}], "vocab": [{"term": "執着", "reading": "しゅうちゃく", "mean": "sự cố chấp, bám chặt vào điều gì"}, {"term": "じたばたする", "reading": "じたばたする", "mean": "vùng vẫy, cố gắng vô ích"}, {"term": "憩う", "reading": "いこう", "mean": "nghỉ ngơi, an dưỡng"}], "anchorWords": ["筆者", "自分", "能力以上", "滑稽", "場合", "必要", "見当", "無理"], "thinking": [{"jp": "人が自分の能力以上のことに憧れ…登れない壁の下で、徒らにじたばたしているようなもので、気の毒でもありますが、滑稽でもあります。この場合は諦めが必要です。", "vn": "→ Luận điểm: cố chấp với điều VƯỢT KHẢ NĂNG (能力以上) là vô ích (じたばた) — CẦN từ bỏ (諦め)."}, {"jp": "ただそれは、その次の、自分の能力に合った憧れなり、道なりを求めるためにのみ必要であって", "vn": "→ Suy ra (ただ giới hạn ý): từ bỏ chỉ là BƯỚC ĐỆM để TÌM con đường phù hợp hơn (次の憧れ・道)."}, {"jp": "諦めの中に憩ってしまうことは少し見当が外れていることになるかもしれません。", "vn": "→ Chốt: nếu chỉ NGHỈ NGƠI (憩う) mãi trong từ bỏ thì LỆCH HƯỚNG (見当が外れている)."}], "chain": "能力以上のことに執着 = 無駄 (vô ích)\n　↓ 諦めが必要\n　↓ ただ（giới hạn）\n諦め = 次の道を求めるための手段（không phải đích đến）", "correctExplainJp": "前へ進みたいなら、<b>無理なこと</b>に<b>執着せず</b>に<b>諦める</b>ことも必要だ。", "correctExplain": "khớp đúng: từ bỏ (諦める) điều VÔ LÝ/VƯỢT KHẢ NĂNG (無理なこと) để tiếp tục TIẾN LÊN (前へ進む)."}, {"bai": "BÀI 32", "date": "12/2014 (4)", "passage": "私が35歳になったころ、「このごろは、少年時代に経験したような、ものすごい雷雨がなくなった」と口にしたことがあります。ところが、60歳ぐらいになったとき、35歳ぐらいの人から同じ言葉を聞いたのです。つまり、私が強い雷雨はなくなったと感じたとき、その人はまだ少年時代で、強い雷雨を経験していたことになります。この場合は、なくなったのは、少年時代特有の自然から受ける鮮烈な印象、驚き、恐れでしょう。", "source": "（倉嶋厚『日和見の事典』による）", "question": "筆者の考えに合うのはどれか。", "choices": ["少年時代に経験した雷雨の記憶は、人によって異なる。", "同じ雷雨でも、今の人は昔の人と同じような印象は受けない。", "大人になると、子供時代に経験した雷雨の記憶は薄れてしまう。", "昔も今も雷雨はあるが、大人になると子供のときほど強い印象は受けない。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Bài nói: cảm giác \"sấm sét mạnh đã không còn\" thực ra không phải vì thiên nhiên thay đổi, mà vì khi LỚN LÊN, ta không còn cảm nhận ấn tượng/sợ hãi mạnh mẽ như thời thiếu niên nữa — D khớp đúng: sấm sét vẫn có, nhưng ấn tượng nhận được khi lớn không mạnh như lúc nhỏ.", "wrong": ["A chỉ nói về \"sự khác nhau giữa từng người\" — chưa đúng trọng tâm, bài nói về sự khác nhau theo TUỔI (giai đoạn cuộc đời), không phải khác nhau ngẫu nhiên giữa cá nhân.", "B nói mơ hồ \"người bây giờ\" so với \"người ngày xưa\" — bài thực ra so sánh THIẾU NIÊN với NGƯỜI LỚN, không phải theo thời đại.", "C nói \"ký ức phai nhạt\" — không đúng, bài nói về CẢM NHẬN HIỆN TẠI thay đổi (it ấn tượng hơn), không phải về việc quên ký ức cũ."]}, "anchor": "Không có mỏ neo đảo ngược kiểu しかし, nhưng có ところが ở câu 2 — đảo từ trải nghiệm cá nhân (tưởng là thật) sang phát hiện bất ngờ (người khác cũng nói y vậy ở tuổi khác).", "first": "私が35歳になったころ…「ものすごい雷雨がなくなった」と口にしたことがあります。 → Tác giả kể trải nghiệm cá nhân: từng nghĩ sấm sét mạnh đã không còn.", "last": "この場合は、なくなったのは、少年時代特有の自然から受ける鮮烈な印象、驚き、恐れでしょう。 → Câu cuối chốt: thứ mất đi không phải là sấm sét, mà là ẤN TƯỢNG MẠNH MẼ đặc trưng của tuổi thiếu niên khi đối diện thiên nhiên.", "link": "ところが đảo ý: tưởng là sấm sét thật sự giảm đi (trải nghiệm cá nhân) → phát hiện người khác ở tuổi nhỏ hơn vẫn thấy sấm sét mạnh như vậy → câu cuối chốt: thực ra cái mất đi là CẢM NHẬN của tuổi thiếu niên, không phải hiện tượng tự nhiên thay đổi.", "traps": [{"label": "A", "tag": "Bẫy lệch trọng tâm", "jp": "少年時代に経験した雷雨の記憶は、<b>人によって異なる</b>。", "vn": "Bài nói về sự khác biệt cảm nhận THEO TUỔI/giai đoạn cuộc đời, không phải khác nhau ngẫu nhiên giữa TỪNG CÁ NHÂN (人によって)."}, {"label": "B", "tag": "Bẫy lệch trục so sánh", "jp": "同じ雷雨でも、<b>今の人</b>は<b>昔の人</b>と同じような印象は受けない。", "vn": "Bài không so sánh \"người hiện đại\" với \"người ngày xưa\" theo THỜI ĐẠI — mà so sánh THIẾU NIÊN với NGƯỜI LỚN trong CÙNG một đời người."}, {"label": "C", "tag": "Bẫy lệch ý", "jp": "大人になると、子供時代に経験した雷雨の<b>記憶は薄れて</b>しまう。", "vn": "\"Ký ức phai nhạt\" (記憶が薄れる) sai — bài nói về việc CẢM NHẬN HIỆN TẠI (khi đã lớn) không còn mạnh mẽ như xưa, không phải về việc QUÊN ký ức cũ."}], "translate": [{"jp": "私が強い雷雨はなくなったと感じたとき、その人はまだ少年時代で、強い雷雨を経験していたことになります。", "vn": "Vào lúc tôi cảm thấy những trận sấm sét mạnh đã không còn nữa, thì người đó vẫn đang ở tuổi thiếu niên và vẫn đang trải qua những trận sấm sét mạnh mẽ ấy."}, {"jp": "この場合は、なくなったのは、少年時代特有の自然から受ける鮮烈な印象、驚き、恐れでしょう。", "vn": "Trong trường hợp này, thứ đã mất đi có lẽ là ấn tượng mạnh mẽ, sự kinh ngạc và sợ hãi đặc trưng mà chỉ tuổi thiếu niên mới cảm nhận được từ thiên nhiên."}], "vocab": [{"term": "鮮烈な印象", "reading": "せんれつないんしょう", "mean": "ấn tượng mạnh mẽ, sâu sắc"}, {"term": "ところが", "reading": "ところが", "mean": "nhưng mà, thế nhưng (chuyển ý bất ngờ)"}, {"term": "〜特有の", "reading": "とくゆうの", "mean": "đặc trưng riêng của~"}], "anchorWords": ["筆者", "雷雨", "場合", "少年時代特有", "自然", "鮮烈", "印象", "大人"], "thinking": [{"jp": "私が35歳になったころ…「ものすごい雷雨がなくなった」と口にしたことがあります。ところが、60歳ぐらいになったとき、35歳ぐらいの人から同じ言葉を聞いたのです。", "vn": "→ Trải nghiệm cá nhân: tưởng sấm sét mạnh đã KHÔNG CÒN (なくなった), nhưng người khác ở tuổi nhỏ hơn vẫn thấy vậy."}, {"jp": "つまり、私が強い雷雨はなくなったと感じたとき、その人はまだ少年時代で、強い雷雨を経験していたことになります。", "vn": "→ Suy ra: SẤM SÉT thật ra KHÔNG MẤT — chỉ là CẢM NHẬN của từng giai đoạn tuổi khác nhau."}, {"jp": "この場合は、なくなったのは、少年時代特有の自然から受ける鮮烈な印象、驚き、恐れでしょう。", "vn": "→ Chốt: thứ MẤT ĐI không phải sấm sét, mà là ẤN TƯỢNG MẠNH (鮮烈な印象) đặc trưng của tuổi THIẾU NIÊN."}], "chain": "私: 雷雨がなくなったと感じる (35歳)\n　↓ ところが\n別の人はまだ少年時代で経験 (60歳の視点)\n　↓ つまり\nなくなったのは「印象」、雷雨自体ではない", "correctExplainJp": "昔も今も<b>雷雨</b>はあるが、大人になると子供のときほど<b>強い印象</b>は受けない。", "correctExplain": "khớp đúng: sấm sét VẪN CÓ (雷雨はある), chỉ là khi LỚN không còn cảm nhận ẤN TƯỢNG MẠNH (強い印象) như lúc nhỏ."}, {"bai": "BÀI 33", "date": "7/2015 (1)", "passage": "「できる人のモノサシ」は、ごく一部であるエリートにしか通用しません。でも大多数に属している平凡な自分がもつ「ふつうのモノサシ」は、世の中の多くの人に通用するモノサシです。その「ふつうのモノサシ」からこそ、多くの人に共感されるヒット商品が生み出せると思うのです。自分は平凡だとか、つまらない人間だと思っている人にこそ、「売れる発想」がわき、「売れるシナリオ」が組み立てられ、「売れる商品」を作れるのではないか。私はそんなふうに考えています。", "source": "（吉川美樹『半径1メートルの「売れる！」発想術』による）", "question": "「売れる商品」を作れるとあるが、なぜか。", "choices": ["平凡な人は自身のモノサシを大多数の人に合わせて変えられるから。", "平凡な人は自身のモノサシが世の中に通用すると理解しているから。", "平凡な人はエリートより独創的なモノサシをもっているから。", "平凡な人は大多数の人に受け入れられるモノサシをもっているから。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Bài nói \"thước đo bình thường\" (ふつうのモノサシ) của người bình thường lại được SỐ ĐÔNG đồng cảm/chấp nhận — đúng với D: họ có thước đo mà đa số đều chấp nhận được.", "wrong": ["A nói \"thay đổi thước đo để hợp với số đông\" — sai, bài nói thước đo của họ VỐN ĐÃ phù hợp, không cần thay đổi.", "B chỉ nói về việc \"hiểu rằng nó phù hợp\" — chưa đủ, ý chính là thước đo đó THỰC SỰ được số đông chấp nhận, không chỉ là sự hiểu biết.", "C nói về \"độc đáo hơn elite\" — ngược ý, bài không so sánh độ độc đáo, mà so sánh độ PHỔ BIẾN/phù hợp với số đông."]}, "anchor": "Có mỏ neo đảo ý nhẹ: 「でも」ở câu 2 — đối lập \"thước đo của elite\" (chỉ hợp số ít) với \"thước đo bình thường\" (hợp số đông).", "first": "「できる人のモノサシ」は、ごく一部であるエリートにしか通用しません。 → Nêu vế đối lập: thước đo của người tài giỏi chỉ hợp với số ít elite.", "last": "自分は平凡だとか…と思っている人にこそ、「売れる発想」がわき…「売れる商品」を作れるのではないか。 → Câu cuối chốt: chính người bình thường mới có khả năng tạo ra sản phẩm bán chạy.", "link": "でも đảo ý: thước đo elite hẹp ⇔ thước đo người bình thường rộng, phù hợp số đông → vì vậy chính sự \"bình thường\" lại là lợi thế để tạo sản phẩm được nhiều người đón nhận.", "traps": [{"label": "A", "tag": "Bẫy thêm chi tiết", "jp": "平凡な人は自身のモノサシを大多数の人に<b>合わせて変えられる</b>から。", "vn": "Bài không nói về việc \"thay đổi thước đo cho hợp số đông\" (合わせて変える) — thước đo của họ VỐN ĐÃ phù hợp từ đầu."}, {"label": "B", "tag": "Bẫy thiếu ý", "jp": "平凡な人は自身のモノサシが世の中に<b>通用すると理解している</b>から。", "vn": "Chỉ nói về việc \"hiểu rằng phù hợp\" (理解している), thiếu yếu tố cốt lõi: thước đo đó THỰC SỰ được số đông chấp nhận."}, {"label": "C", "tag": "Bẫy lệch trục so sánh", "jp": "平凡な人はエリートより<b>独創的な</b>モノサシをもっているから。", "vn": "Bài không so sánh độ ĐỘC ĐÁO (独創的) với elite, mà so sánh độ PHỔ BIẾN — C đi sai hướng so sánh."}], "translate": [{"jp": "「できる人のモノサシ」は、ごく一部であるエリートにしか通用しません。", "vn": "\"Thước đo của người tài giỏi\" chỉ phù hợp với một số ít người ưu tú."}, {"jp": "自分は平凡だとか、つまらない人間だと思っている人にこそ、「売れる発想」がわき…「売れる商品」を作れるのではないか。", "vn": "Chính những người tự cho mình là bình thường, tầm thường mới là người nảy ra ý tưởng bán chạy, và từ đó tạo ra được sản phẩm được nhiều người ưa thích."}], "vocab": [{"term": "モノサシ", "reading": "モノサシ", "mean": "thước đo, chuẩn mực đánh giá"}, {"term": "通用する", "reading": "つうようする", "mean": "có hiệu lực, được áp dụng/chấp nhận"}, {"term": "わく", "reading": "わく", "mean": "nảy ra, trào ra (ý tưởng, cảm xúc)"}], "anchorWords": ["商品", "一部", "通用", "自分", "平凡", "発想", "大多数"], "thinking": [{"jp": "「できる人のモノサシ」は、ごく一部であるエリートにしか通用しません。でも大多数に属している平凡な自分がもつ「ふつうのモノサシ」は、世の中の多くの人に通用するモノサシです。", "vn": "→ でも đảo ý: thước đo người TÀI (エリート) chỉ hợp số ÍT, nhưng thước đo BÌNH THƯỜNG (ふつうのモノサシ) lại hợp với SỐ ĐÔNG (多くの人)."}, {"jp": "その「ふつうのモノサシ」からこそ、多くの人に共感されるヒット商品が生み出せると思うのです。", "vn": "→ Suy ra: chính vì thước đo đó được số đông CHIA SẺ (共感される), nên nó tạo ra được sản phẩm BÁN CHẠY."}, {"jp": "自分は平凡だとか、つまらない人間だと思っている人にこそ…「売れる商品」を作れるのではないか。", "vn": "→ Chốt: chính người TỰ THẤY BÌNH THƯỜNG mới có khả năng tạo SẢN PHẨM BÁN CHẠY."}], "chain": "エリートのモノサシ = 少数にしか通用しない\n⇔\nふつうのモノサシ = 多くの人に通用する\n　↓ suy ra\n平凡な人 → 売れる商品を作れる", "correctExplainJp": "平凡な人は大多数の人に<b>受け入れられる</b>モノサシをもっているから。", "correctExplain": "khớp đúng: thước đo của người bình thường VỐN ĐÃ được số đông (大多数) CHẤP NHẬN (受け入れられる)."}, {"bai": "BÀI 34", "date": "7/2015 (2)", "passage": "グーテンベルクの活版印刷革命から約500年、今世紀、デジタル技術による情報爆発の時代が始まった。だれもが発信者になるインターネット世界で、すでに情報は飽和している。すると、「いかに蓄積された情報を統合的に再利用するか」がキー(注)になる。大量に蓄積された情報の中から、重要なものを発掘して新たな創造に結びつけていく技術。それは古代から書物を大量に蓄積し、索引検索によって利用できるようにしてきた図書館の基本システムそのものだ。図書館は、私たちが思っているよりはるかに未来的なものだ。\n\n(注) キー：ここでは、重要な点", "source": "（朝日新聞グロープ2013年8月18日付による）", "question": "未来的とあるが、どのような点が未来的なのか。", "choices": ["インターネット世界よりも情報を検索する仕組みが優れている点。", "インターネット世界と同様に情報の蓄積と検索の仕組みがある点。", "インターネット世界と同様にだれもが自由自在に情報を検索できる点。", "インターネット世界では見られない古代からの情報を蓄積している点。"], "correct": 1, "shortFeedback": {"correct": "Đúng! Bài nói: chìa khoá của thời đại hiện nay là \"tái sử dụng tổng hợp thông tin đã tích lũy\" — và đây CHÍNH LÀ hệ thống cơ bản mà thư viện đã làm từ xưa (lưu trữ + tìm kiếm theo chỉ mục). B khớp đúng: thư viện có cơ chế lưu trữ + tìm kiếm GIỐNG với thế giới Internet cần.", "wrong": ["A nói \"vượt trội hơn Internet\" — không có trong bài, bài chỉ nói thư viện có hệ thống TƯƠNG TỰ điều Internet đang cần, không so sánh ai hơn ai.", "C nói về việc \"ai cũng tìm kiếm tự do\" — đây là đặc điểm của Internet, không phải điểm tương đồng được nhấn mạnh ở thư viện.", "D nói về \"thông tin cổ đại mà Internet không có\" — không đúng trọng tâm, bài nhấn vào CƠ CHẾ vận hành giống nhau, không phải nội dung thông tin."]}, "anchor": "Không có mỏ neo đảo ngược. Mạch bài: nêu vấn đề thời đại (thông tin bão hoà) → chìa khoá giải quyết (tái sử dụng thông tin tích lũy) → câu cuối chốt: đó chính là hệ thống thư viện đã có từ lâu.", "first": "グーテンベルクの活版印刷革命から約500年…デジタル技術による情報爆発の時代が始まった。 → Mở bài bằng bối cảnh: thời đại bùng nổ thông tin số.", "last": "それは古代から書物を大量に蓄積し、索引検索によって利用できるようにしてきた図書館の基本システムそのものだ。図書館は…はるかに未来的なものだ。 → Câu cuối chốt: hệ thống thư viện (tích lũy + tìm kiếm theo chỉ mục) chính là điều cần cho tương lai.", "link": "Vấn đề thời đại (Internet bão hoà thông tin) → giải pháp cần có (tái sử dụng thông tin đã tích lũy) → câu cuối chỉ ra: đây CHÍNH LÀ cơ chế mà thư viện đã vận hành từ xưa. Vậy điểm \"未来的\" nằm ở việc thư viện có sẵn cơ chế lưu trữ + tìm kiếm mà thế giới Internet đang cần.", "traps": [{"label": "A", "tag": "Bẫy thêm chi tiết", "jp": "インターネット世界よりも情報を検索する仕組みが<b>優れている</b>点。", "vn": "\"Vượt trội hơn Internet\" (優れている) không có trong bài — bài chỉ so sánh sự TƯƠNG ĐỒNG về cơ chế, không nói ai hơn ai."}, {"label": "C", "tag": "Bẫy nhầm chủ thể", "jp": "インターネット世界と同様に<b>だれもが自由自在に</b>情報を検索できる点。", "vn": "\"Ai cũng tìm kiếm tự do\" (だれもが自由自在に) là đặc điểm của Internet, không phải điểm được nhấn mạnh ở thư viện trong bài."}, {"label": "D", "tag": "Bẫy lệch trọng tâm", "jp": "インターネット世界では見られない<b>古代からの情報</b>を蓄積している点。", "vn": "Bài nhấn vào CƠ CHẾ vận hành (lưu trữ + tìm kiếm) giống nhau, không phải nói về NỘI DUNG thông tin cổ đại đặc biệt."}], "translate": [{"jp": "だれもが発信者になるインターネット世界で、すでに情報は飽和している。すると、「いかに蓄積された情報を統合的に再利用するか」がキーになる。", "vn": "Trong thế giới Internet nơi ai cũng có thể là người phát tin, thông tin đã bão hoà. Khi đó, điểm mấu chốt trở thành: làm sao để tái sử dụng một cách tổng hợp lượng thông tin đã được tích lũy."}, {"jp": "それは古代から書物を大量に蓄積し、索引検索によって利用できるようにしてきた図書館の基本システムそのものだ。", "vn": "Đó chính là hệ thống cơ bản của thư viện — nơi đã tích lũy một lượng lớn sách từ thời cổ đại và giúp con người sử dụng chúng thông qua việc tìm kiếm theo chỉ mục."}], "vocab": [{"term": "活版印刷", "reading": "かっぱんいんさつ", "mean": "in ấn bằng bản khắc chữ (kỹ thuật in cổ)"}, {"term": "飽和する", "reading": "ほうわする", "mean": "bão hoà"}, {"term": "索引検索", "reading": "さくいんけんさく", "mean": "tìm kiếm theo chỉ mục/mục lục"}], "anchorWords": ["未来的", "活版印刷革命", "技術", "情報爆発", "時代", "古代", "書物", "大量"], "thinking": [{"jp": "だれもが発信者になるインターネット世界で、すでに情報は飽和している。すると、「いかに蓄積された情報を統合的に再利用するか」がキーになる。", "vn": "→ Vấn đề thời đại: Internet bão hoà thông tin → chìa khoá là TÁI SỬ DỤNG thông tin đã TÍCH LŨY (蓄積)."}, {"jp": "それは古代から書物を大量に蓄積し、索引検索によって利用できるようにしてきた図書館の基本システムそのものだ。", "vn": "→ Suy ra: đó CHÍNH LÀ cơ chế (蓄積+検索) mà THƯ VIỆN (図書館) đã có từ xưa."}, {"jp": "図書館は、私たちが思っているよりはるかに未来的なものだ。", "vn": "→ Chốt: vậy thư viện mới là thứ \"未来的\" (hướng tới tương lai) — vì có sẵn cơ chế cần cho thời đại Internet."}], "chain": "インターネット時代: 蓄積された情報の再利用がキー (chìa khoá thời đại)\n　↓ それは\n図書館の基本システム（蓄積+検索）と同じ\n　↓ 結論\n図書館 = 未来的なもの", "correctExplainJp": "インターネット世界と同様に<b>情報の蓄積</b>と<b>検索</b>の仕組みがある点。", "correctExplain": "khớp đúng: thư viện có CƠ CHẾ TƯƠNG TỰ Internet — vừa TÍCH LŨY (蓄積) vừa TÌM KIẾM (検索) thông tin."}, {"bai": "BÀI 35", "date": "7/2015 (3)", "passage": "職業として芸術家や学者、あるいは創造にかかわるひとびととは生涯コドモとしての部分がその作品をつくる。その部分の水分が蒸発せぬよう心がけねばならないが、このことは生活人のすべてに通じることである。万人にとって感動のある人生を送るためには、自分のなかのコドモを蒸発させてはならない。じつをいうと、この世のたいていの職は、オトナの部分で成立している。とくに法律や経理のビジネスの分野はそうである。ところが、うれしいことに、そういう職業人のなかに豊潤な鑑賞家や趣味人が多い。", "source": "（司馬遼太郎『風塵抄』による）", "question": "うれしいことにとあるが、何がうれしいのか。", "choices": ["この世のたいていの職業は、コドモの部分も必要としていること。", "コドモの部分で成立している職業の人は、感動のある人生を送れること。", "コドモの部分を持っていれば、オトナの部分で成立している職業に就けること。", "オトナの部分で成立している職業の人でも、コドモの部分を持ち続けていること。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Bài nói: dù làm nghề thuộc \"phần người lớn\" (luật, kế toán...), nhiều người trong số họ vẫn là người sành thưởng thức/có thú vui riêng (giữ \"phần trẻ con\") — đúng với D: vẫn giữ được phần trẻ con dù làm nghề thuộc phần người lớn.", "wrong": ["A nói \"hầu hết nghề cũng cần phần trẻ con\" — ngược ý, bài nói rõ HẦU HẾT nghề thuộc về phần NGƯỜI LỚN, chỉ nghệ thuật/học thuật mới cần phần trẻ con.", "B nói về \"nghề thuộc phần trẻ con\" — sai chủ thể, niềm vui ở đây nằm ở NGHỀ THUỘC PHẦN NGƯỜI LỚN vẫn giữ được phần trẻ con, không phải nghề trẻ con có cuộc sống cảm động.", "C nói về điều kiện để \"có được nghề người lớn\" — không có trong bài, đây là suy diễn không đúng."]}, "anchor": "Có mỏ neo đảo ý nhẹ: 「ところが」trước cụm うれしいことに — đảo từ thực tế tưởng buồn (đa số nghề thuộc phần người lớn, thiếu phần trẻ con) sang điều đáng mừng (vẫn có nhiều người giữ được phần trẻ con).", "first": "職業として芸術家や学者…とは生涯コドモとしての部分がその作品をつくる。 → Mở bài: nghệ thuật/học thuật cần \"phần trẻ con\" tồn tại suốt đời để tạo ra tác phẩm.", "last": "ところが、うれしいことに、そういう職業人のなかに豊潤な鑑賞家や趣味人が多い。 → Câu cuối (ところが) nêu điều đáng mừng: trong số người làm nghề \"người lớn\", vẫn có nhiều người sành thưởng thức/có thú vui riêng.", "link": "Mạch bài: nghệ thuật cần phần trẻ con → hầu hết nghề khác (luật, kế toán) thuộc phần người lớn, tưởng như thiếu phần trẻ con → ところが đảo ý: thực ra trong số đó vẫn có nhiều người giữ được phần trẻ con (sành thưởng thức, có sở thích riêng) — đó là điều đáng mừng.", "traps": [{"label": "A", "tag": "Bẫy ngược nghĩa", "jp": "この世の<b>たいていの職業</b>は、コドモの部分も<b>必要としている</b>こと。", "vn": "Ngược ý — bài nói HẦU HẾT nghề thuộc phần NGƯỜI LỚN, không phải đều CẦN phần trẻ con."}, {"label": "B", "tag": "Bẫy nhầm chủ thể", "jp": "コドモの部分で成立している職業の人は、<b>感動のある人生</b>を送れること。", "vn": "Niềm vui không nằm ở \"nghề trẻ con có cuộc sống cảm động\" — mà ở việc NGHỀ NGƯỜI LỚN vẫn giữ được phần trẻ con."}, {"label": "C", "tag": "Bẫy suy diễn sai", "jp": "コドモの部分を持っていれば、オトナの部分で成立している職業に<b>就ける</b>こと。", "vn": "Bài không nói về điều kiện để \"có được\" (就ける) nghề người lớn — đây là nội dung không xuất hiện trong bài."}], "translate": [{"jp": "職業として芸術家や学者、あるいは創造にかかわるひとびととは生涯コドモとしての部分がその作品をつくる。", "vn": "Đối với những người làm nghệ thuật, học giả, hay những người làm công việc sáng tạo, chính phần \"trẻ con\" tồn tại suốt đời trong họ mới là thứ tạo ra tác phẩm."}, {"jp": "ところが、うれしいことに、そういう職業人のなかに豊潤な鑑賞家や趣味人が多い。", "vn": "Nhưng điều đáng mừng là, trong số những người làm các nghề ấy (thuộc phần người lớn), vẫn có rất nhiều người sành thưởng thức và có những sở thích phong phú riêng."}], "vocab": [{"term": "蒸発する", "reading": "じょうはつする", "mean": "bốc hơi, biến mất (ẩn dụ: mất đi sự tươi mới)"}, {"term": "豊潤な", "reading": "ほうじゅんな", "mean": "phong phú, dồi dào"}, {"term": "鑑賞家", "reading": "かんしょうか", "mean": "người sành thưởng thức (nghệ thuật, cái đẹp)"}], "anchorWords": ["芸術家", "学者", "生涯", "部分", "作品", "職業人", "豊潤", "鑑賞家"], "thinking": [{"jp": "職業として芸術家や学者…とは生涯コドモとしての部分がその作品をつくる。", "vn": "→ Nghệ thuật/học thuật cần \"phần TRẺ CON\" (コドモの部分) tồn tại suốt đời để tạo tác phẩm."}, {"jp": "じつをいうと、この世のたいていの職は、オトナの部分で成立している。とくに法律や経理のビジネスの分野はそうである。", "vn": "→ Suy ra: HẦU HẾT nghề khác (luật, kế toán) thuộc \"phần NGƯỜI LỚN\" (オトナの部分), tưởng như thiếu phần trẻ con."}, {"jp": "ところが、うれしいことに、そういう職業人のなかに豊潤な鑑賞家や趣味人が多い。", "vn": "→ ところが đảo ý: điều ĐÁNG MỪNG là trong số người làm nghề \"người lớn\" đó, vẫn có nhiều người sành thưởng thức (鑑賞家)."}], "chain": "芸術家: コドモの部分が必要\n⇔\n大半の職業: オトナの部分で成立 (tưởng thiếu コドモ)\n　↓ ところが\n実はコドモの部分を持ち続けている人が多い (đáng mừng)", "correctExplainJp": "オトナの部分で成立している職業の人でも、<b>コドモの部分</b>を<b>持ち続けている</b>こと。", "correctExplain": "khớp đúng điều đáng mừng: dù làm nghề thuộc \"phần người lớn\", vẫn GIỮ ĐƯỢC (持ち続けている) phần trẻ con."}, {"bai": "BÀI 36", "date": "7/2015 (4)", "passage": "我々は裸の眼でものを見ているように思っているが、実際そうではない。我々は、常識という色眼鏡でものを見ている。そして、常識を作ったのは、過去の偉大な人間であり、その偉大な人間はある学問や芸術を創り出し、そして、新しく世界を見る眼を我々に教えた。その眼が歴史的に我々に伝承され、我々はその眼でもって、ものを見、しかも裸の眼でものを見ていると思っている。しかし、一つの眼である限り、それは世界を歪んで見ているのである。その眼からはどうしても見えない何かがあるのである。", "source": "（梅原猛『状宴―梅原猛随想、と対話』による）", "question": "この文章で筆者が述べていることは何か。", "choices": ["我々は裸の眼でものを見ている限り、世界のすべてを見ることはできない。", "我々は過去の偉大な人間と同じ見方で世界を見ていると思い込んでいる。", "我々は常識に縛られているために、見えるものが限られている。", "我々は常識という色眼鏡を外して裸の眼で世界を見るべきだ。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Bài nói: ta nhìn đời qua \"kính màu của lẽ thường\" (常識という色眼鏡), và vì đó CHỈ LÀ MỘT loại kính, nên thế giới bị nhìn LỆCH, có điều ta KHÔNG THỂ THẤY — đúng với C: bị lẽ thường ràng buộc nên tầm nhìn bị hạn chế.", "wrong": ["A nói về \"mắt trần\" — ngược ý, bài nói ta KHÔNG dùng mắt trần thật, mà dùng \"kính lẽ thường\" mà lại tưởng là mắt trần.", "B nói về việc \"nghĩ mình nhìn GIỐNG người vĩ đại xưa\" — chưa đúng trọng tâm, ý chính là ta tưởng mình nhìn KHÁCH QUAN (như mắt trần) nhưng thực ra không phải.", "D đưa ra lời khuyên \"nên bỏ kính\" — không có trong bài, bài chỉ nêu THỰC TẾ giới hạn của nhận thức, không đề xuất hành động cụ thể đó."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「しかし」ở gần cuối bài — chuyển từ việc ta lầm tưởng đang nhìn bằng mắt trần, sang sự thật: nhìn qua một \"con mắt\" duy nhất luôn bị lệch.", "first": "我々は裸の眼でものを見ているように思っているが、実際そうではない。我々は、常識という色眼鏡でものを見ている。 → Mở bài phủ nhận ngay: ta tưởng nhìn bằng mắt trần nhưng thực ra qua kính màu của lẽ thường.", "last": "しかし、一つの眼である限り、それは世界を歪んで見ているのである。その眼からはどうしても見えない何かがあるのである。 → Câu cuối (しかし) chốt: vì chỉ là MỘT loại kính/mắt, nên nhìn thế giới bị lệch, có điều không thể thấy được.", "link": "Mở bài phủ nhận ngộ nhận (tưởng nhìn khách quan bằng mắt trần) → giải thích nguồn gốc của \"kính lẽ thường\" (do người vĩ đại xưa tạo ra, truyền lại) → しかし chốt: vì chỉ là một góc nhìn duy nhất nên luôn bị hạn chế, có điều không thể thấy. C phản ánh đúng: bị lẽ thường ràng buộc → tầm nhìn hạn chế.", "traps": [{"label": "A", "tag": "Bẫy ngược nghĩa", "jp": "我々は<b>裸の眼</b>でものを見ている限り、世界のすべてを見ることはできない。", "vn": "Ngược ý — bài nói ta KHÔNG dùng mắt trần thật, dù lầm tưởng là vậy; A giả định điều bài đã PHỦ NHẬN."}, {"label": "B", "tag": "Bẫy lệch trọng tâm", "jp": "我々は過去の偉大な人間と<b>同じ見方</b>で世界を見ていると<b>思い込んでいる</b>。", "vn": "Ý chính không phải là \"nghĩ giống người vĩ đại xưa\", mà là việc LẦM TƯỞNG góc nhìn đó là khách quan/trung lập."}, {"label": "D", "tag": "Bẫy thêm đề xuất không có", "jp": "我々は常識という色眼鏡を<b>外して</b>裸の眼で世界を見る<b>べきだ</b>。", "vn": "Bài chỉ nêu THỰC TẾ giới hạn nhận thức, không đưa ra LỜI KHUYÊN hành động \"nên bỏ kính\" (べきだ) như D nói."}], "translate": [{"jp": "我々は裸の眼でものを見ているように思っているが、実際そうではない。我々は、常識という色眼鏡でものを見ている。", "vn": "Chúng ta nghĩ rằng mình đang nhìn sự vật bằng mắt trần, nhưng thực ra không phải vậy. Ta đang nhìn qua một cặp kính màu mang tên \"lẽ thường\"."}, {"jp": "しかし、一つの眼である限り、それは世界を歪んで見ているのである。その眼からはどうしても見えない何かがあるのである。", "vn": "Nhưng chừng nào còn chỉ là một góc nhìn duy nhất, ta vẫn đang nhìn thế giới một cách lệch lạc. Luôn có điều gì đó mà góc nhìn ấy không thể nào nhìn thấy được."}], "vocab": [{"term": "色眼鏡", "reading": "いろめがね", "mean": "kính màu (ẩn dụ: cách nhìn thiên lệch, định kiến)"}, {"term": "伝承される", "reading": "でんしょうされる", "mean": "được truyền lại (qua các thế hệ)"}, {"term": "歪んで見る", "reading": "ゆがんでみる", "mean": "nhìn một cách lệch lạc, sai lệch"}], "anchorWords": ["文章", "筆者", "実際", "常識", "色眼鏡", "世界"], "thinking": [{"jp": "我々は裸の眼でものを見ているように思っているが、実際そうではない。我々は、常識という色眼鏡でものを見ている。", "vn": "→ Phủ nhận ngay: ta TƯỞNG nhìn bằng mắt trần (裸の眼), nhưng thực ra qua KÍNH MÀU của lẽ thường (常識という色眼鏡)."}, {"jp": "その眼が歴史的に我々に伝承され、我々はその眼でもって、ものを見、しかも裸の眼でものを見ていると思っている。", "vn": "→ Suy ra: \"con mắt\" đó được TRUYỀN LẠI (伝承される) qua các thời, nhưng ta lại LẦM TƯỞNG đó là mắt trần khách quan."}, {"jp": "しかし、一つの眼である限り、それは世界を歪んで見ているのである。その眼からはどうしても見えない何かがあるのである。", "vn": "→ しかし chốt: vì CHỈ LÀ MỘT loại kính (一つの眼), nên nhìn thế giới bị LỆCH (歪んで見る), có điều KHÔNG THỂ THẤY."}], "chain": "裸の眼で見ていると思う (lầm tưởng)\n　↓ 実は\n常識という色眼鏡で見ている (kính lẽ thường)\n　↓ しかし\n一つの眼 = 歪んで見る + 見えない何かがある", "correctExplainJp": "我々は<b>常識に縛られている</b>ために、<b>見えるもの</b>が限られている。", "correctExplain": "khớp đúng: bị LẼ THƯỜNG RÀNG BUỘC (常識に縛られる) khiến tầm nhìn (見えるもの) bị HẠN CHẾ."}, {"bai": "BÀI 37", "date": "12/2015 (1)", "passage": "無駄なものを早めに見極め、優先度をつけ、いかにスピーディーに仕事をこなしていくか。それが賢く成果を出す方法だ。目の前の先輩たちも、そうやって働いている人も多いのではないかと思います。でも、そうした人たちの問題点は、仕事の判断軸が自分になるということです。結局自分が効率的に働けるか、自分が求められている仕事量を時間内にこなせるかが最大の判断軸になっていくのです。すると、できる範囲のこと、無理のないことに収まっていってしまうのです。", "source": "（高橋克航『「上司がさっぱりわかってくれない」と思っているあなたへ』による）", "question": "この文章で筆者が言いたいことは何か。", "choices": ["無駄を見極められなければ、自分に求められている仕事をこなせなくなる。", "成果を出すことばかりを考えていると、自分の基準を人にも求めるようになる。", "効率性を重視しすぎると、自分が求められている仕事がわからなくなる。", "効率的に働くことばかりを考えていると、自分にできる仕事しかしなくなる。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Câu cuối nói rõ: khi lấy bản thân làm chuẩn đánh giá (chỉ quan tâm mình làm việc hiệu quả không), cuối cùng sẽ chỉ làm những việc TRONG KHẢ NĂNG, không vượt ra ngoài — đúng với D.", "wrong": ["A nói ngược: bài không nói về việc \"không nhận diện được lãng phí\" dẫn đến không hoàn thành công việc, mà nói về hệ quả của việc LẤY BẢN THÂN làm chuẩn.", "B nói về việc \"áp chuẩn của mình lên người khác\" — không có trong bài, bài chỉ nói về việc tự giới hạn bản thân, không nói về việc áp đặt người khác.", "C nói \"không biết công việc được yêu cầu\" — không đúng, bài nói rõ vấn đề là chỉ làm trong khả năng, không phải không hiểu yêu cầu công việc."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「でも」giữa bài — chuyển từ cách làm việc tưởng là khôn ngoan (loại bỏ lãng phí, làm nhanh) sang vấn đề thực sự của cách làm đó.", "first": "無駄なものを早めに見極め…それが賢く成果を出す方法だ。 → Nêu cách làm việc tưởng là thông minh: loại bỏ lãng phí, ưu tiên, làm nhanh.", "last": "結局自分が効率的に働けるか…が最大の判断軸になっていくのです。すると、できる範囲のこと、無理のないことに収まっていってしまうのです。 → Câu cuối (sau でも) chỉ ra vấn đề thực: khi lấy hiệu quả CỦA BẢN THÂN làm chuẩn, cuối cùng chỉ làm trong khả năng, không vượt giới hạn.", "link": "でも đảo ý: cách làm tưởng khôn ngoan (hiệu quả, nhanh) ⇔ vấn đề thật (chỉ co lại trong vùng an toàn của bản thân). Ý chính: quá chú trọng hiệu quả cá nhân khiến người ta chỉ làm những gì mình LÀM ĐƯỢC, không thử thách bản thân.", "traps": [{"label": "A", "tag": "Bẫy đảo nhân-quả", "jp": "<b>無駄</b>を見極められなければ、自分に求められている仕事を<b>こなせなくなる</b>。", "vn": "Bài không nói \"không nhận diện lãng phí thì không hoàn thành việc\" — đây là quan hệ nhân-quả không có trong bài."}, {"label": "B", "tag": "Bẫy thêm chi tiết", "jp": "成果を出すことばかりを考えていると、自分の<b>基準</b>を<b>人にも求める</b>ようになる。", "vn": "\"Áp chuẩn của mình lên người khác\" (人にも求める) không có trong bài — bài chỉ nói về việc TỰ GIỚI HẠN bản thân."}, {"label": "C", "tag": "Bẫy lệch ý", "jp": "<b>効率性</b>を重視しすぎると、自分が求められている<b>仕事がわからなくなる</b>。", "vn": "\"Không biết công việc được yêu cầu\" sai — vấn đề thực sự là chỉ làm trong khả năng, không phải KHÔNG HIỂU yêu cầu."}], "translate": [{"jp": "でも、そうした人たちの問題点は、仕事の判断軸が自分になるということです。", "vn": "Nhưng vấn đề của những người làm việc theo cách đó là: tiêu chí đánh giá công việc của họ lại lấy chính bản thân mình làm chuẩn."}, {"jp": "結局自分が効率的に働けるか…が最大の判断軸になっていくのです。すると、できる範囲のこと、無理のないことに収まっていってしまうのです。", "vn": "Cuối cùng, tiêu chí lớn nhất trở thành: liệu bản thân có thể làm việc hiệu quả hay không. Và rồi, công việc chỉ còn gói gọn trong những gì mình có thể làm, những gì không quá khó với mình."}], "vocab": [{"term": "見極める", "reading": "みきわめる", "mean": "nhận định rõ, xác định chính xác"}, {"term": "判断軸", "reading": "はんだんじく", "mean": "tiêu chí/trục đánh giá"}, {"term": "収まる", "reading": "おさまる", "mean": "gói gọn lại, thu hẹp vào trong (một giới hạn)"}], "anchorWords": ["文章", "筆者", "無駄", "見極", "成果", "方法", "結局自分", "効率的"], "thinking": [{"jp": "無駄なものを早めに見極め、優先度をつけ、いかにスピーディーに仕事をこなしていくか。それが賢く成果を出す方法だ。", "vn": "→ Nêu cách làm việc TƯỞNG là khôn ngoan: loại lãng phí (無駄), làm NHANH (スピーディー)."}, {"jp": "でも、そうした人たちの問題点は、仕事の判断軸が自分になるということです。", "vn": "→ でも đảo ý: vấn đề là khi lấy CHÍNH BẢN THÂN (自分) làm CHUẨN (判断軸)."}, {"jp": "結局自分が効率的に働けるか…が最大の判断軸になっていくのです。すると、できる範囲のこと、無理のないことに収まっていってしまうのです。", "vn": "→ Suy ra: cuối cùng chỉ làm trong KHẢ NĂNG (できる範囲), không vượt giới hạn — vì lấy HIỆU QUẢ CỦA MÌNH làm chuẩn."}], "chain": "無駄を省き、スピーディーに働く = 賢いと思われがち (tưởng khôn ngoan)\n　↓ でも\n判断軸が自分になる (lấy bản thân làm chuẩn)\n　↓ 結局\nできる範囲のことしかしない (chỉ làm trong khả năng)", "correctExplainJp": "<b>効率的</b>に働くことばかりを考えていると、自分にできる仕事しかしなくなる。", "correctExplain": "khớp đúng: quá chú trọng HIỆU QUẢ (効率的) của bản thân → chỉ làm những gì mình LÀM ĐƯỢC, không thử thách."}, {"bai": "BÀI 38", "date": "12/2015 (3)", "passage": "コンピューター化の進行とともに、記憶力のみならず、計算力とか、情報整理力とか、いくつもの脳の雑用と思われている作業を電脳(注)に負わせるようになった。肉体労働だけでなく、精神労働の負担からも人間を解放し、持てる力をなるべく創造的な仕事に振り向けようというのだろう。しかし、創造力とは何だろう。記憶力や情報整理力など脳の基礎的体力の上に成り立つもののような気がしてならないのだ。\n\n(注) 電脳：コンピュータ", "source": "（米原万里『心臓に毛が生えている理由』による）", "question": "この文章で筆者が最も言いたいことは何か。", "choices": ["コンピュータ化の進行が、人間を肉体労働から解放する。", "コンピュータ化の進行とともに、脳の基礎体力を失うことになる。", "コンピュータに任せている脳の雑用こそが、創造力の土台になる。", "コンピュータによる精神労働からの解放が、人間を創造的にする。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Câu cuối nói: sáng tạo dường như được XÂY TRÊN NỀN các \"việc lặt vặt của não\" như ghi nhớ, xử lý thông tin — những việc giờ giao hết cho máy tính. Vậy chính những \"việc vặt\" đó mới là NỀN TẢNG của sáng tạo — đúng với C.", "wrong": ["A chỉ nói về tác dụng tích cực bề ngoài (giải phóng lao động chân tay) — không phải lo ngại thực sự của tác giả.", "B nói \"mất sức mạnh cơ bản của não\" — gần đúng nhưng D/B thiếu liên hệ với SÁNG TẠO; B chỉ nói về hệ quả mà chưa chỉ rõ điều bị ảnh hưởng là khả năng sáng tạo.", "D nói \"giải phóng lao động trí óc giúp con người sáng tạo hơn\" — ngược với lo ngại của tác giả, tác giả nghi ngờ điều này, không khẳng định."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「しかし」ở câu áp cuối — chuyển từ kỳ vọng tích cực (máy tính giúp giải phóng con người để sáng tạo hơn) sang nghi ngờ thực sự của tác giả.", "first": "コンピューター化の進行とともに…脳の雑用と思われている作業を電脳に負わせるようになった。 → Nêu hiện tượng: máy tính đảm nhận các việc \"lặt vặt của não\" (ghi nhớ, tính toán, xử lý thông tin).", "last": "記憶力や情報整理力など脳の基礎的体力の上に成り立つもののような気がしてならないのだ。 → Câu cuối (sau しかし) nêu nghi ngờ của tác giả: sáng tạo có thể được XÂY TRÊN NỀN chính những \"việc vặt\" đó.", "link": "しかし đảo ý: kỳ vọng (máy tính giải phóng con người để tập trung sáng tạo) ⇔ nghi ngờ thật của tác giả (việc vặt của não chính là NỀN TẢNG của sáng tạo, nên giao hết cho máy tính có thể làm mất nền tảng ấy). C phản ánh đúng lo ngại này.", "traps": [{"label": "A", "tag": "Bẫy mọi người", "jp": "コンピュータ化の進行が、人間を<b>肉体労働</b>から解放する。", "vn": "Đây là kỳ vọng/lý do thông thường (giải phóng lao động) mà tác giả đang phản biện bằng しかし, không phải ý chính tác giả muốn nói."}, {"label": "B", "tag": "Bẫy thiếu liên hệ", "jp": "コンピュータ化の進行とともに、<b>脳の基礎体力</b>を<b>失う</b>ことになる。", "vn": "Có ý đúng một phần nhưng chưa nối rõ với chủ đề SÁNG TẠO — điều tác giả \"muốn nói nhất\" là về NỀN TẢNG của sáng tạo, không chỉ về việc mất sức mạnh não bộ nói chung."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "コンピュータによる<b>精神労働</b>からの解放が、人間を<b>創造的</b>にする。", "vn": "Ngược với hoài nghi của tác giả — D khẳng định điều mà tác giả đang NGHI NGỜ, không phải đồng tình."}], "translate": [{"jp": "肉体労働だけでなく、精神労働の負担からも人間を解放し、持てる力をなるべく創造的な仕事に振り向けようというのだろう。", "vn": "Có lẽ ý định là giải phóng con người không chỉ khỏi lao động chân tay mà cả lao động trí óc, để dồn năng lực vào những công việc mang tính sáng tạo hơn."}, {"jp": "しかし、創造力とは何だろう。記憶力や情報整理力など脳の基礎的体力の上に成り立つもののような気がしてならないのだ。", "vn": "Nhưng sáng tạo thực ra là gì? Tôi cứ có cảm giác rằng nó được xây dựng trên nền tảng của những năng lực cơ bản của não như khả năng ghi nhớ, xử lý thông tin."}], "vocab": [{"term": "負わせる", "reading": "おわせる", "mean": "giao cho, đặt gánh nặng lên (ai/cái gì)"}, {"term": "振り向ける", "reading": "ふりむける", "mean": "hướng/dồn (nguồn lực) vào một việc khác"}, {"term": "〜てならない", "reading": "てならない", "mean": "không thể không~ (ngữ pháp diễn tả cảm xúc tự nhiên, không kiềm được)"}], "anchorWords": ["文章", "筆者", "進行", "雑用", "作業", "電脳", "記憶力", "情報整理力"], "thinking": [{"jp": "コンピューター化の進行とともに…脳の雑用と思われている作業を電脳に負わせるようになった。肉体労働だけでなく、精神労働の負担からも人間を解放し、持てる力をなるべく創造的な仕事に振り向けようというのだろう。", "vn": "→ Hiện tượng: máy tính nhận làm việc \"lặt vặt của não\" (脳の雑用) — KỲ VỌNG: giải phóng con người để SÁNG TẠO hơn."}, {"jp": "しかし、創造力とは何だろう。記憶力や情報整理力など脳の基礎的体力の上に成り立つもののような気がしてならないのだ。", "vn": "→ しかし đảo ý — nghi ngờ: sáng tạo (創造力) có thể được XÂY TRÊN NỀN chính những \"việc vặt\" đó (記憶力・情報整理力)."}], "chain": "コンピュータ = 脳の雑用を負う (kỳ vọng: giải phóng con người để sáng tạo)\n　↓ しかし\n創造力こそ脳の基礎体力(記憶力等)の上に成り立つ\n　↓ suy ra\n雑用を全部コンピュータに任せると創造力の土台を失う恐れ", "correctExplainJp": "コンピュータに任せている<b>脳の雑用</b>こそが、<b>創造力</b>の土台になる。", "correctExplain": "khớp đúng nghi ngờ của tác giả: chính những \"việc vặt của não\" (脳の雑用) lại là NỀN TẢNG (土台) của sáng tạo."}, {"bai": "BÀI 39", "date": "12/2015 (4)", "passage": "誰にとっても、感情とどうつきあうかということはなかなか厄介な問題である。感情とうまくつきあうということは、単に社会的場面での感情表現をうまくコントロールするということではない。むしろ、感情の豊かさや複雑さを通して、またしばしば測りがたく統御(注)しがたい感情の動きを通して、生きることを味わい、人生を活性化しながら、しかも感情の力に支配されないということであろう。\n\n(注) 統御する：思いどおりに扱う", "source": "（井上俊・船津衛編『自己と他者の社会学』による）", "question": "感情とのつきあい方について、筆者はどうすればよいと述べているか。", "choices": ["感情と深くかかわりながらも、感情に縛られないようにする。", "感情を無理にコントロールせずに、感情に任せるようにする。", "感情をコントロールして、感情に流されないようにする。", "感情を隠すことも、強く表現することもないようにする。"], "correct": 0, "shortFeedback": {"correct": "Đúng! Bài nói: \"hoà hợp tốt với cảm xúc\" KHÔNG phải kiểm soát biểu hiện xã hội, mà là TRẢI NGHIỆM sự phong phú/phức tạp của cảm xúc để sống đầy đặn hơn, nhưng vẫn KHÔNG bị nó CHI PHỐI — A khớp đúng cả 2 vế.", "wrong": ["B nói \"mặc cho cảm xúc dẫn dắt\" — sai nửa sau, bài nói rõ KHÔNG được để cảm xúc chi phối, không phải mặc kệ nó.", "C nói về việc \"kiểm soát cảm xúc\" — đây chính là điều bài PHỦ ĐỊNH ngay từ đầu (đó không phải bản chất của việc hoà hợp với cảm xúc).", "D nói \"không giấu, không thể hiện mạnh\" — không có trong bài, bài không nói về MỨC ĐỘ biểu hiện, mà nói về việc TRẢI NGHIỆM cảm xúc sâu sắc mà không bị nó chi phối."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「ではない」+「むしろ」— phủ định cách hiểu thông thường (kiểm soát biểu hiện) rồi đưa ra bản chất thật ngay sau đó.", "first": "感情とうまくつきあうということは、単に社会的場面での感情表現をうまくコントロールするということではない。 → Phủ định ngay: hoà hợp với cảm xúc KHÔNG phải là kiểm soát biểu hiện trong xã hội.", "last": "感情の豊かさや複雑さを通して…生きることを味わい、人生を活性化しながら、しかも感情の力に支配されないということであろう。 → Câu cuối (むしろ) chốt bản chất thật: trải nghiệm cảm xúc phong phú để sống đầy đặn, NHƯNG không bị nó chi phối.", "link": "Câu đầu phủ định cách hiểu thông thường (kiểm soát biểu hiện) → むしろ đưa ra bản chất thật: cần trải nghiệm sâu cảm xúc (không kiểm soát/che giấu) NHƯNG vẫn giữ mình không bị nó chi phối. A phản ánh đúng cả 2 vế này.", "traps": [{"label": "B", "tag": "Bẫy thiếu ý", "jp": "感情を無理に<b>コントロールせずに</b>、感情に<b>任せる</b>ようにする。", "vn": "Chỉ đúng nửa đầu (không kiểm soát ép buộc), nhưng sai nửa sau — bài nói rõ KHÔNG được để cảm xúc CHI PHỐI mình, khác với việc \"mặc kệ\" (任せる) cảm xúc dẫn dắt."}, {"label": "C", "tag": "Bẫy mọi người", "jp": "感情を<b>コントロール</b>して、感情に<b>流されない</b>ようにする。", "vn": "Đây chính là cách hiểu THÔNG THƯỜNG mà câu đầu bài đã PHỦ ĐỊNH, không phải bản chất thật theo tác giả."}, {"label": "D", "tag": "Bẫy không có trong bài", "jp": "感情を<b>隠す</b>ことも、<b>強く表現する</b>こともないようにする。", "vn": "Bài không bàn về MỨC ĐỘ biểu hiện cảm xúc (giấu/thể hiện mạnh), mà về việc trải nghiệm cảm xúc sâu mà không bị nó chi phối."}], "translate": [{"jp": "感情とうまくつきあうということは、単に社会的場面での感情表現をうまくコントロールするということではない。", "vn": "Hoà hợp tốt với cảm xúc không đơn thuần là việc kiểm soát khéo léo cách biểu hiện cảm xúc trong các tình huống xã hội."}, {"jp": "感情の豊かさや複雑さを通して…生きることを味わい、人生を活性化しながら、しかも感情の力に支配されないということであ
