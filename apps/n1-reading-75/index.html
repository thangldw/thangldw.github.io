ろう。", "vn": "Đó có lẽ là việc thông qua sự phong phú và phức tạp của cảm xúc để cảm nhận trọn vẹn cuộc sống, làm cho cuộc đời thêm sinh động, nhưng đồng thời không để bản thân bị cảm xúc ấy chi phối."}], "vocab": [{"term": "厄介な", "reading": "やっかいな", "mean": "phiền phức, khó xử lý"}, {"term": "統御する", "reading": "とうぎょする", "mean": "điều khiển theo ý muốn, chế ngự"}, {"term": "支配される", "reading": "しはいされる", "mean": "bị chi phối, bị thống trị"}], "anchorWords": ["筆者", "社会的場面", "感情表現", "複雑", "人生", "活性化", "支配"], "thinking": [{"jp": "感情とうまくつきあうということは、単に社会的場面での感情表現をうまくコントロールするということではない。", "vn": "→ Phủ định ngay: hoà hợp cảm xúc KHÔNG phải là KIỂM SOÁT (コントロール) biểu hiện trong xã hội."}, {"jp": "むしろ、感情の豊かさや複雑さを通して、またしばしば測りがたく統御しがたい感情の動きを通して、生きることを味わい、人生を活性化しながら", "vn": "→ むしろ đảo ý: cần TRẢI NGHIỆM sự PHONG PHÚ/PHỨC TẠP (豊かさ・複雑さ) của cảm xúc để sống đầy đặn hơn."}, {"jp": "しかも感情の力に支配されないということであろう。", "vn": "→ Suy ra: NHƯNG vẫn phải KHÔNG để cảm xúc CHI PHỐI (支配されない) mình."}], "chain": "感情とつきあう ≠ 表現をコントロールする (PHỦ ĐỊNH)\n　↓ むしろ\n感情の豊かさを味わう (trải nghiệm sâu)\n　↓ しかも\n感情に支配されない (không bị chi phối)", "correctExplainJp": "感情と<b>深くかかわり</b>ながらも、感情に<b>縛られない</b>ようにする。", "correctExplain": "khớp đúng cả 2 vế: TRẢI NGHIỆM sâu cảm xúc (深くかかわる) NHƯNG không bị nó RÀNG BUỘC (縛られない)."}, {"bai": "BÀI 40", "date": "7/2016 (2)", "passage": "「自分は間違ってない」と思うことから始まる怒りは、妥当な怒りです。少しも後ろめたくありません。むしろ、「間違ってない」と思いながら怒りをごまかしてしまったときのほうが後味は悪いのです。「なんで怒らなかったんだろう」という後悔は、惨めな気持ちになって長く続きます。怒りを抑えてばかりいると、この惨めな気持ちにも慣れてしまいます。敗北感に慣らされてしまうのです。わたしはこれがいちばん怖いと思っています。", "source": "（和田秀樹『腹が立ったら怒りなさい』による）", "question": "筆者の考えに合うのはどれか。", "choices": ["怒りの原因を明らかにしたいなら、怒りをごまかさないほうがいい。", "怒りを抑えていると、ますます怒りが増してしまう。", "自分が間違っていないと思うなら、怒りを抑えなくていい。", "自分が間違っていると気づけば、怒りは長く続かない。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Câu đầu khẳng định: nếu nghĩ \"mình không sai\" thì nổi giận là điều CHÍNH ĐÁNG, không cần thấy có lỗi — đúng với C: nếu nghĩ mình không sai thì không cần kìm nén cơn giận.", "wrong": ["A nói về việc \"làm rõ nguyên nhân\" — không phải trọng tâm, bài không nói về việc tìm nguyên nhân, mà nói về việc có NÊN kìm nén giận hay không.", "B nói \"kìm nén thì giận sẽ tăng\" — không đúng, bài nói kìm nén dẫn đến CẢM GIÁC THẤT BẠI/chán nản kéo dài, không phải làm giận tăng thêm.", "D nói \"nếu nhận ra mình sai thì giận sẽ không kéo dài\" — không có trong bài, bài không đề cập trường hợp \"mình sai\"."]}, "anchor": "Không có mỏ neo đảo ngược kiểu しかし, nhưng có むしろ ở câu 2 — nhấn mạnh điều ngược với cảm giác thông thường: giả vờ không giận còn tệ hơn là giận thật.", "first": "「自分は間違ってない」と思うことから始まる怒りは、妥当な怒りです。少しも後ろめたくありません。 → Khẳng định luận điểm chính: nổi giận khi tin mình đúng là điều chính đáng, không cần cảm thấy có lỗi.", "last": "わたしはこれがいちばん怖いと思っています。 → Câu cuối nhấn mạnh: việc quen với cảm giác thất bại (do kìm nén giận liên tục) là điều đáng sợ nhất.", "link": "Luận điểm chính nêu ngay từ đầu: giận khi đúng là chính đáng → むしろ nhấn mạnh: giả vờ không giận còn để lại dư vị tệ hơn → câu cuối cảnh báo hậu quả nghiêm trọng nhất: quen với cảm giác thất bại. C phản ánh đúng luận điểm cốt lõi ở câu đầu.", "traps": [{"label": "A", "tag": "Bẫy lệch trọng tâm", "jp": "怒りの<b>原因を明らかに</b>したいなら、怒りをごまかさないほうがいい。", "vn": "Bài không nói về việc \"làm rõ NGUYÊN NHÂN\" (原因を明らかに) của cơn giận — trọng tâm là có nên kìm nén giận hay không khi mình tin là đúng."}, {"label": "B", "tag": "Bẫy ngược hệ quả", "jp": "怒りを<b>抑えている</b>と、ますます<b>怒りが増して</b>しまう。", "vn": "Bài nói kìm nén dẫn đến QUEN với CẢM GIÁC THẤT BẠI/chán nản, không nói rằng GIẬN SẼ TĂNG THÊM (怒りが増す)."}, {"label": "D", "tag": "Bẫy không có trong bài", "jp": "自分が<b>間違っている</b>と気づけば、怒りは<b>長く続かない</b>。", "vn": "Bài không đề cập đến trường hợp khi bản thân nhận ra MÌNH SAI (間違っている) — đây là tình huống không xuất hiện trong đoạn văn."}], "translate": [{"jp": "「自分は間違ってない」と思うことから始まる怒りは、妥当な怒りです。少しも後ろめたくありません。", "vn": "Cơn giận bắt nguồn từ suy nghĩ \"mình không sai\" là một cơn giận chính đáng. Không có gì phải cảm thấy có lỗi cả."}, {"jp": "怒りを抑えてばかりいると、この惨めな気持ちにも慣れてしまいます。敗北感に慣らされてしまうのです。わたしはこれがいちばん怖いと思っています。", "vn": "Nếu cứ luôn kìm nén cơn giận, ta sẽ dần quen với cảm giác chán nản ấy, quen với cảm giác thất bại. Và tôi nghĩ đây là điều đáng sợ nhất."}], "vocab": [{"term": "後ろめたい", "reading": "うしろめたい", "mean": "cảm thấy có lỗi, lương tâm cắn rứt"}, {"term": "後味が悪い", "reading": "あとあじがわるい", "mean": "để lại dư vị khó chịu, cảm giác không thoải mái sau đó"}, {"term": "敗北感", "reading": "はいぼくかん", "mean": "cảm giác thất bại, cảm giác thua kém"}], "anchorWords": ["筆者", "自分", "間違", "妥当"], "thinking": [{"jp": "「自分は間違ってない」と思うことから始まる怒りは、妥当な怒りです。少しも後ろめたくありません。", "vn": "→ Luận điểm: nổi giận khi tin mình ĐÚNG (間違ってない) là điều CHÍNH ĐÁNG (妥当), không cần CẢM THẤY CÓ LỖI (後ろめたい)."}, {"jp": "むしろ、「間違ってない」と思いながら怒りをごまかしてしまったときのほうが後味は悪いのです。「なんで怒らなかったんだろう」という後悔は、惨めな気持ちになって長く続きます。", "vn": "→ むしろ đảo ý: GIẢ VỜ không giận (ごまかす) còn để lại DƯ VỊ TỆ HƠN — hối hận kéo dài."}, {"jp": "怒りを抑えてばかりいると、この惨めな気持ちにも慣れてしまいます。…わたしはこれがいちばん怖いと思っています。", "vn": "→ Suy ra hậu quả nghiêm trọng nhất: kìm nén liên tục khiến QUEN với cảm giác THẤT BẠI (惨め/敗北感)."}], "chain": "「間違ってない」と思う怒り = 妥当 (chính đáng)\n　↓ むしろ\nごまかす方が後味悪い (giả vờ không giận còn tệ hơn)\n　↓ suy ra hậu quả\n抑え続ける → 惨めな気持ちに慣れる（đáng sợ nhất）", "correctExplainJp": "自分が<b>間違っていない</b>と思うなら、怒りを<b>抑えなくていい</b>。", "correctExplain": "khớp đúng luận điểm cốt lõi ở câu đầu: nếu tin mình KHÔNG SAI (間違っていない) thì KHÔNG CẦN kìm nén (抑えなくていい) cơn giận."}, {"bai": "BÀI 41", "date": "7/2016 (3)", "passage": "引っ越しというのは、誰にとっても面倒だが、いい面もあるだろう。すなわち、これまでの生活を振り返り、今後望むような生活を思い描きながら、そのために不要なものをどんどん処分する機会である、と。そういう意味では、引っ越しは日常生活を更生させるよいきっかけでもあるはずだ。私はいつもそのきっかけを活かしたいと思いながらも、なかなか実行するに至らない。むしろ何十年も、まるで亀のごとく重い物を背負いながら転々としてきたわけである。", "source": "（マイク・モラスキー 日本経済新聞2014年3月25日付夕刊による）", "question": "引っ越しについて、筆者はどのように述べているか。", "choices": ["不要なものを捨てる機会であり、自分もそのための引っ越しを何度もしている", "望むような生活をするためであり、自分もいい場所があれば引っ越しをしたい", "生活を一新する機会だが、自分は引っ越しをしてもそれを活かせていない", "いい面もあるが、自分は面倒であまり引っ越しをしていない"], "correct": 2, "shortFeedback": {"correct": "Đúng! Tác giả nói chuyển nhà là cơ hội làm mới cuộc sống, NHƯNG bản thân lại không tận dụng được cơ hội đó dù đã chuyển nhà nhiều lần — đúng với C.", "wrong": ["A nói \"đã chuyển nhà nhiều lần ĐỂ bỏ đồ không cần\" — sai, bài nói tác giả MUỐN nhưng KHÔNG THỰC HIỆN được, không phải đã làm nhiều lần.", "B nói về việc \"sẽ chuyển nếu có nơi tốt\" — không đúng, bài không nói về điều kiện chỗ ở, mà nói về việc không tận dụng được cơ hội làm mới cuộc sống.", "D nói \"vì ngại nên ít chuyển nhà\" — sai, bài nói tác giả chuyển nhà NHIỀU LẦN (何十年も…転々としてきた), chỉ là không tận dụng được cơ hội đó để làm mới cuộc sống."]}, "anchor": "Có mỏ neo đảo ý nhẹ: 「私はいつも…と思いながらも、なかなか実行するに至らない」+「むしろ」— đối lập giữa mong muốn (tận dụng cơ hội) và thực tế (không làm được, lại còn mang đồ cũ đi khắp nơi).", "first": "引っ越しというのは、誰にとっても面倒だが、いい面もあるだろう。 → Mở bài: chuyển nhà phiền phức nhưng có mặt tích cực.", "last": "むしろ何十年も、まるで亀のごとく重い物を背負いながら転々としてきたわけである。 → Câu cuối (むしろ) chốt: thực tế tác giả vẫn mang theo đồ đạc nặng nề suốt mấy chục năm, không hề \"làm mới\" cuộc sống như mong muốn.", "link": "Bài nêu mặt tích cực của việc chuyển nhà (cơ hội làm mới) → tác giả thừa nhận muốn tận dụng nhưng không thực hiện được → むしろ chốt: thực tế ngược lại, vẫn mang đồ cũ nặng nề suốt nhiều năm. C phản ánh đúng sự đối lập giữa lý tưởng và thực tế này.", "traps": [{"label": "A", "tag": "Bẫy ngược nghĩa", "jp": "不要なものを捨てる機会であり、自分もそのための引っ越しを<b>何度もしている</b>。", "vn": "Bài nói tác giả KHÔNG THỰC HIỆN được việc bỏ đồ, không phải \"đã làm nhiều lần\" như A nói."}, {"label": "B", "tag": "Bẫy thêm chi tiết", "jp": "望むような生活をするためであり、自分も<b>いい場所があれば</b>引っ越しをしたい。", "vn": "\"Nếu có nơi tốt sẽ chuyển\" (いい場所があれば) không có trong bài — đây là điều kiện không được đề cập."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "いい面もあるが、自分は<b>面倒であまり引っ越しをしていない</b>。", "vn": "Ngược ý — bài nói tác giả đã chuyển nhà RẤT NHIỀU LẦN (転々としてきた), không phải ít chuyển vì ngại."}], "translate": [{"jp": "そういう意味では、引っ越しは日常生活を更生させるよいきっかけでもあるはずだ。", "vn": "Theo nghĩa đó, chuyển nhà lẽ ra cũng là một cơ hội tốt để làm mới cuộc sống thường ngày."}, {"jp": "むしろ何十年も、まるで亀のごとく重い物を背負いながら転々としてきたわけである。", "vn": "Trái lại, suốt mấy chục năm qua, tôi cứ như một con rùa, vẫn mang theo những đồ đạc nặng nề mà chuyển từ nơi này sang nơi khác."}], "vocab": [{"term": "更生させる", "reading": "こうせいさせる", "mean": "làm mới lại, cải tổ lại"}, {"term": "亀のごとく", "reading": "かめのごとく", "mean": "như con rùa (so sánh ví với sự chậm chạp, nặng nề)"}, {"term": "転々とする", "reading": "てんてんとする", "mean": "chuyển từ nơi này sang nơi khác liên tục"}], "anchorWords": ["筆者", "面倒", "何十年", "背負", "実行", "生活", "一新", "機会"], "thinking": [{"jp": "引っ越しというのは、誰にとっても面倒だが、いい面もあるだろう。…引っ越しは日常生活を更生させるよいきっかけでもあるはずだ。", "vn": "→ Luận điểm: chuyển nhà phiền phức nhưng có MẶT TÍCH CỰC — là cơ hội LÀM MỚI (更生) cuộc sống."}, {"jp": "私はいつもそのきっかけを活かしたいと思いながらも、なかなか実行するに至らない。", "vn": "→ Suy ra: tác giả MUỐN tận dụng cơ hội đó NHƯNG KHÔNG THỰC HIỆN được (実行するに至らない)."}, {"jp": "むしろ何十年も、まるで亀のごとく重い物を背負いながら転々としてきたわけである。", "vn": "→ むしろ chốt: thực tế NGƯỢC LẠI — vẫn mang đồ nặng suốt mấy chục năm, không hề làm mới cuộc sống."}], "chain": "引っ越し = 生活を一新する機会 (cơ hội làm mới)\n　↓ 活かしたいが\n実行できない (muốn nhưng không làm được)\n　↓ むしろ\n何十年も重い物を背負う (thực tế ngược lại)", "correctExplainJp": "生活を<b>一新する機会</b>だが、自分は引っ越しをしても<b>それを活かせていない</b>。", "correctExplain": "khớp đúng: chuyển nhà là cơ hội LÀM MỚI (一新する機会) cuộc sống, NHƯNG tác giả KHÔNG TẬN DỤNG được (活かせていない) dù đã chuyển nhiều lần."}, {"bai": "BÀI 42", "date": "7/2016 (4)", "passage": "いま人間の欲望がいろいろと問題になっているのは、それが余りにも脹らみすぎて、欲望の充足それ自体が目的と化し、本来の意味、つまり私たちの必要を満たし、私たちに心身の安定とやすらぎ(幸福)をもたらす範囲を遥かに逸脱してしまったことにある。私たちの多くはこの過度に肥大した欲望ゆえに、日々を楽しく過せるどころか、絶えざる欲求不満に苛まれるという不幸な状態に陥っている。", "source": "（鈴木孝夫『人にはどれだけの物が必要か―ミニマム生活のすすめ』による）", "question": "欲望について、筆者はどのように述べているか。", "choices": ["欲望が満たされたため、本当に必要なものがわからなくなっている", "欲望が簡単に満たされるために、日々の楽しみが失われている", "欲望が脹らみすぎて、欲望を満たすことをあきらめるようになっている", "欲望が脹らみすぎたため、幸福が感じられなくなっている"], "correct": 3, "shortFeedback": {"correct": "Đúng! Bài nói: ham muốn phình to quá mức, vượt khỏi phạm vi mang lại \"sự an ổn, bình yên (= hạnh phúc)\" → khiến con người luôn bất mãn, RƠI VÀO trạng thái bất hạnh — đúng với D.", "wrong": ["A nói \"ham muốn đã được thoả mãn\" — ngược ý, bài nói ham muốn KHÔNG được thoả mãn, dẫn đến bất mãn liên tục.", "B nói \"ham muốn dễ được thoả mãn\" — cũng ngược ý, bài không nói ham muốn dễ thoả mãn.", "C nói \"từ bỏ việc thoả mãn ham muốn\" — không có trong bài, bài nói con người vẫn tiếp tục bị ham muốn chi phối, không phải từ bỏ."]}, "anchor": "Không có mỏ neo đảo ngược. Câu đầu nêu nguyên nhân (ham muốn phình to, lệch mục đích gốc), câu cuối nêu hậu quả (rơi vào bất hạnh).", "first": "いま人間の欲望がいろいろと問題になっているのは、それが余りにも脹らみすぎて…本来の意味…範囲を遥かに逸脱してしまったことにある。 → Nêu nguyên nhân: ham muốn phình to, vượt xa mục đích ban đầu (mang lại an ổn/hạnh phúc).", "last": "私たちの多くはこの過度に肥大した欲望ゆえに、日々を楽しく過せるどころか、絶えざる欲求不満に苛まれるという不幸な状態に陥っている。 → Câu cuối chốt hậu quả: vì ham muốn phình to quá mức, con người rơi vào trạng thái bất hạnh, luôn bất mãn.", "link": "Nguyên nhân (ham muốn phình to, lệch mục đích ban đầu là mang lại hạnh phúc) → hậu quả (rơi vào bất hạnh, bất mãn liên tục). D phản ánh đúng quan hệ nhân-quả này: ham muốn phình to → không còn cảm nhận được hạnh phúc.", "traps": [{"label": "A", "tag": "Bẫy ngược nghĩa", "jp": "欲望が<b>満たされた</b>ため、本当に必要なものがわからなくなっている。", "vn": "Ngược ý — bài nói ham muốn KHÔNG được thoả mãn (満たされない, luôn bất mãn), không phải \"đã được thoả mãn\" (満たされた)."}, {"label": "B", "tag": "Bẫy ngược nghĩa", "jp": "欲望が<b>簡単に満たされる</b>ために、日々の楽しみが失われている。", "vn": "Cũng ngược ý — bài không nói ham muốn DỄ được thoả mãn (簡単に満たされる), mà nói ham muốn quá lớn nên KHÓ thoả mãn."}, {"label": "C", "tag": "Bẫy thêm chi tiết", "jp": "欲望が脹らみすぎて、欲望を満たすことを<b>あきらめる</b>ようになっている。", "vn": "\"Từ bỏ việc thoả mãn ham muốn\" (あきらめる) không có trong bài — bài nói con người vẫn TIẾP TỤC chạy theo ham muốn, dẫn đến bất hạnh, không phải từ bỏ."}], "translate": [{"jp": "いま人間の欲望がいろいろと問題になっているのは、それが余りにも脹らみすぎて…本来の意味…範囲を遥かに逸脱してしまったことにある。", "vn": "Lý do mà ham muốn của con người ngày nay trở thành vấn đề là vì nó đã phình to quá mức, vượt xa khỏi phạm vi ý nghĩa ban đầu — đó là mang lại sự an ổn và bình yên (hạnh phúc) cho thân tâm."}, {"jp": "私たちの多くはこの過度に肥大した欲望ゆえに…絶えざる欲求不満に苛まれるという不幸な状態に陥っている。", "vn": "Vì ham muốn quá mức phình to này, nhiều người trong chúng ta rơi vào trạng thái bất hạnh, luôn bị giày vò bởi sự bất mãn không ngừng, chứ không thể sống vui vẻ mỗi ngày."}], "vocab": [{"term": "脹らみすぎる", "reading": "ふくらみすぎる", "mean": "phình to quá mức"}, {"term": "逸脱する", "reading": "いつだつする", "mean": "vượt ra ngoài, lệch khỏi (phạm vi/quy chuẩn)"}, {"term": "苛まれる", "reading": "さいなまれる", "mean": "bị giày vò, dằn vặt"}], "anchorWords": ["欲望", "筆者", "人間", "問題", "本来", "意味", "範囲", "逸脱"], "thinking": [{"jp": "いま人間の欲望がいろいろと問題になっているのは、それが余りにも脹らみすぎて、欲望の充足それ自体が目的と化し、本来の意味…範囲を遥かに逸脱してしまったことにある。", "vn": "→ Nguyên nhân: ham muốn (欲望) PHÌNH TO QUÁ MỨC (脹らみすぎ), vượt xa mục đích gốc — mang lại AN ỔN/HẠNH PHÚC (やすらぎ)."}, {"jp": "私たちの多くはこの過度に肥大した欲望ゆえに、日々を楽しく過せるどころか、絶えざる欲求不満に苛まれるという不幸な状態に陥っている。", "vn": "→ Suy ra: vì PHÌNH TO QUÁ MỨC, con người rơi vào BẤT MÃN LIÊN TỤC (絶えざる欲求不満) → trạng thái BẤT HẠNH (不幸)."}], "chain": "欲望が脹らみすぎる (phình to quá mức)\n　↓ vượt khỏi mục đích gốc (やすらぎ・幸福)\n絶えざる欲求不満 (bất mãn liên tục)\n　↓ 結果\n不幸な状態 (bất hạnh, mất cảm giác hạnh phúc)", "correctExplainJp": "欲望が<b>脹らみすぎた</b>ため、<b>幸福</b>が感じられなくなっている。", "correctExplain": "khớp đúng quan hệ nhân-quả: ham muốn PHÌNH TO QUÁ MỨC (脹らみすぎ) → không còn cảm nhận được HẠNH PHÚC (幸福)."}, {"bai": "BÀI 43", "date": "12/2016 (1)", "passage": "教師＝話す人、生徒＝聞く人という構造が知らずのうちに教室空間にできあがり、そして固定化してしまうのは恐ろしいことではないかと思う。教師が先取りしてしまうことで、生徒が自分自身で考え、解決しようとする芽をつみとってしまう場合がある。いつも話し続けるのがコミュニケーションでない。教師側が沈黙し、「待つ」という行為も時には大切であろう。もう少し話したい、と思うところで一歩ひいてみる(注)ことで、相手が言おうとすることを引き出すことができるのである。\n\n(注) 一歩ひいてみる：ここでは、話すのをやめてみる", "source": "（徳井厚子『日本語教師の「衣」再考―多文化共生への課題』による）", "question": "筆者の考えに合うのはどれか。", "choices": ["教師と生徒が自由に発言し合うことも必要だ。", "教師は生徒の考えを想像するべきだ。", "教師は生徒の発言を待つことも必要だ。", "教師は生徒に沈黙の時間を与えないようにすべきだ。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Bài nói rõ: giáo viên im lặng, \"chờ đợi\" cũng là điều quan trọng, đôi khi cần lùi lại một bước (dừng nói) để kéo điều học sinh muốn nói ra ngoài — đúng với C.", "wrong": ["A nói về việc \"cả hai cùng tự do phát biểu\" — không đúng trọng tâm, bài nhấn vào việc giáo viên CHỦ ĐỘNG im lặng/chờ, không phải về tự do phát biểu chung.", "B nói \"giáo viên nên TƯỞNG TƯỢNG suy nghĩ của học sinh\" — không có trong bài, bài nói về việc im lặng/chờ để học sinh tự nói ra, không phải đoán suy nghĩ.", "D ngược nghĩa hoàn toàn: bài đề xuất NGƯỢC LẠI — giáo viên nên cho học sinh thời gian im lặng, không phải tránh nó."]}, "anchor": "Có mỏ neo đảo ý nhẹ: 「いつも話し続けるのがコミュニケーションでない」— phủ định quan niệm thông thường (giao tiếp = luôn nói), dẫn đến luận điểm thật ở câu sau.", "first": "教師＝話す人、生徒＝聞く人という構造が…固定化してしまうのは恐ろしいことではないかと思う。 → Nêu vấn đề: cấu trúc \"giáo viên nói - học sinh nghe\" cố định là điều đáng lo.", "last": "もう少し話したい、と思うところで一歩ひいてみることで、相手が言おうとすることを引き出すことができるのである。 → Câu cuối chốt: lùi lại, dừng nói đúng lúc sẽ giúp kéo được điều học sinh muốn nói ra.", "link": "Vấn đề: giáo viên nói quá nhiều khiến học sinh không có cơ hội tự suy nghĩ → phủ định quan niệm \"giao tiếp = luôn nói\" → câu cuối chốt giải pháp: giáo viên im lặng, chờ đợi, lùi lại đúng lúc để học sinh được nói. C phản ánh đúng giải pháp này.", "traps": [{"label": "A", "tag": "Bẫy lệch trọng tâm", "jp": "教師と生徒が<b>自由に発言し合う</b>ことも必要だ。", "vn": "Bài nhấn vào việc GIÁO VIÊN chủ động IM LẶNG/CHỜ, không phải về việc cả hai bên TỰ DO PHÁT BIỂU ngang nhau."}, {"label": "B", "tag": "Bẫy thêm chi tiết", "jp": "教師は生徒の考えを<b>想像する</b>べきだ。", "vn": "\"Tưởng tượng suy nghĩ của học sinh\" (想像する) không có trong bài — bài nói về việc im lặng để học sinh TỰ NÓI RA, không phải ĐOÁN HỘ."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "教師は生徒に<b>沈黙の時間</b>を<b>与えない</b>ようにすべきだ。", "vn": "Ngược hẳn — bài đề xuất NÊN có thời gian IM LẶNG (沈黙の時間) cho học sinh, không phải tránh nó."}], "translate": [{"jp": "教師が先取りしてしまうことで、生徒が自分自身で考え、解決しようとする芽をつみとってしまう場合がある。", "vn": "Việc giáo viên nói trước, giải đáp trước có thể làm mất đi cơ hội để học sinh tự suy nghĩ và tự tìm cách giải quyết."}, {"jp": "もう少し話したい、と思うところで一歩ひいてみることで、相手が言おうとすることを引き出すことができるのである。", "vn": "Bằng cách lùi lại một bước (dừng nói) đúng vào lúc còn muốn nói thêm, ta có thể khơi gợi được điều mà người đối diện muốn nói."}], "vocab": [{"term": "先取りする", "reading": "せんどりする", "mean": "nói/làm trước, đoán trước và đáp ứng trước"}, {"term": "芽をつみとる", "reading": "めをつみとる", "mean": "ngắt đi mầm non (ẩn dụ: dập tắt cơ hội phát triển)"}, {"term": "一歩ひく", "reading": "いっぽひく", "mean": "lùi lại một bước, nhường lại"}], "anchorWords": ["筆者", "教師", "生徒", "構造", "固定化", "一歩", "相手", "発言"], "thinking": [{"jp": "教師＝話す人、生徒＝聞く人という構造が知らずのうちに教室空間にできあがり、そして固定化してしまうのは恐ろしいことではないかと思う。", "vn": "→ Nêu vấn đề: cấu trúc \"GIÁO VIÊN NÓI - HỌC SINH NGHE\" bị CỐ ĐỊNH (固定化) là điều ĐÁNG LO."}, {"jp": "いつも話し続けるのがコミュニケーションでない。教師側が沈黙し、「待つ」という行為も時には大切であろう。", "vn": "→ Suy ra: giao tiếp KHÔNG PHẢI là luôn NÓI — giáo viên IM LẶNG (沈黙), \"CHỜ ĐỢI\" (待つ) cũng quan trọng."}, {"jp": "もう少し話したい、と思うところで一歩ひいてみることで、相手が言おうとすることを引き出すことができるのである。", "vn": "→ Chốt: LÙI LẠI (一歩ひいてみる) đúng lúc giúp KÉO RA (引き出す) điều học sinh muốn nói."}], "chain": "教師が話し続ける構造 = 恐ろしい (vấn đề)\n　↓ suy ra\nコミュニケーション ≠ 話し続けること (PHỦ ĐỊNH)\n　↓ giải pháp\n一歩ひく（待つ）→ 相手の発言を引き出す", "correctExplainJp": "教師は生徒の<b>発言</b>を<b>待つ</b>ことも必要だ。", "correctExplain": "khớp đúng giải pháp: giáo viên CHỜ ĐỢI (待つ) để học sinh được NÓI (発言), đúng tinh thần \"一歩ひく\"."}, {"bai": "BÀI 44", "date": "12/2016 (3)", "passage": "異文化間での対話を議論するときに、必ずといってよいくらい出てくるのが、価値観の理解と共有である。他者と対話を通して、人間関係を樹立していくには、自己の価値観を保存したままで、他者の価値観を理解するという方略だけでは十分ではない。相互的な働きかけを通じて、何か新たな価値を共有することが要求されるのである。すなわち、自らの価値観を相対化し、新たな価値を対話という共同作業を通して創り上げ、それを共有していく態度が必要なのだ。", "source": "（ARCLE編集委員会・田中茂範・アレン玉井光江・根岸雅史・吉田研作編著『幼児から成人まで一貫した英語教育のための枠組み―ECF-English Curriculum Framework』による）", "question": "筆者によると、異文化間で対話を通して人間関係を築く上で最も大切なことは何か。", "choices": ["自己の価値観を理解してもらおうとする態度。", "自己の価値観を保ちながら、他者の価値観を理解する態度。", "他者と自己の共通の価値観を創り上げていく態度。", "他者の価値観の中に自己の価値観との共通点を見つける態度。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Câu cuối nói rõ: cần TƯƠNG ĐỐI HOÁ giá trị quan của mình, rồi CÙNG NHAU TẠO RA giá trị mới qua đối thoại — đúng với C: cùng tạo dựng giá trị quan chung.", "wrong": ["A chỉ nói về việc \"muốn người khác hiểu mình\" — một chiều, không đúng, bài nói cần TƯƠNG TÁC HAI CHIỀU để tạo giá trị mới.", "B nói về việc \"giữ giá trị quan của mình + hiểu người khác\" — đây chính là cách làm bài nói là CHƯA ĐỦ (十分ではない), không phải giải pháp cuối cùng.", "D nói về việc \"tìm điểm chung trong giá trị quan của người khác\" — khác với việc CÙNG TẠO RA giá trị mới mà bài đề xuất."]}, "anchor": "Có mỏ neo đảo ý rõ: 「方略だけでは十分ではない」— phủ định cách làm thông thường (giữ giá trị quan mình + hiểu người khác là đủ), dẫn đến luận điểm thật ở câu cuối.", "first": "他者と対話を通して、人間関係を樹立していくには、自己の価値観を保存したままで、他者の価値観を理解するという方略だけでは十分ではない。 → Phủ định cách làm thông thường: chỉ giữ giá trị quan mình + hiểu người khác là CHƯA ĐỦ.", "last": "自らの価値観を相対化し、新たな価値を対話という共同作業を通して創り上げ、それを共有していく態度が必要なのだ。 → Câu cuối chốt giải pháp thật: tương đối hoá giá trị quan của mình, CÙNG TẠO RA giá trị mới qua đối thoại.", "link": "Phủ định cách làm thông thường (giữ vững + hiểu người khác = chưa đủ) → câu cuối chốt giải pháp thật: tương đối hoá bản thân, cùng nhau tạo dựng giá trị mới qua đối thoại. C phản ánh đúng hành động \"cùng tạo dựng\" này.", "traps": [{"label": "A", "tag": "Bẫy một chiều", "jp": "自己の価値観を<b>理解してもらおう</b>とする態度。", "vn": "Chỉ nói về việc muốn người khác hiểu mình — MỘT CHIỀU, không phản ánh đúng tinh thần TƯƠNG TÁC hai chiều mà bài đề xuất."}, {"label": "B", "tag": "Bẫy mọi người", "jp": "自己の価値観を<b>保ちながら</b>、他者の価値観を<b>理解する</b>態度。", "vn": "Đây chính là cách làm mà bài đã PHỦ ĐỊNH là CHƯA ĐỦ (十分ではない), không phải giải pháp cuối cùng tác giả đề xuất."}, {"label": "D", "tag": "Bẫy lệch hành động", "jp": "他者の価値観の中に自己の価値観との<b>共通点を見つける</b>態度。", "vn": "\"Tìm điểm chung trong giá trị quan của người khác\" (共通点を見つける) khác với việc CÙNG NHAU TẠO RA (創り上げる) giá trị mới — hai hành động khác bản chất."}], "translate": [{"jp": "他者と対話を通して、人間関係を樹立していくには、自己の価値観を保存したままで、他者の価値観を理解するという方略だけでは十分ではない。", "vn": "Để xây dựng quan hệ con người thông qua đối thoại với người khác, chỉ giữ vững giá trị quan của bản thân và cố hiểu giá trị quan của người khác thôi là chưa đủ."}, {"jp": "自らの価値観を相対化し、新たな価値を対話という共同作業を通して創り上げ、それを共有していく態度が必要なのだ。", "vn": "Cần có thái độ tương đối hoá giá trị quan của chính mình, cùng nhau tạo dựng nên một giá trị mới thông qua quá trình đối thoại như một công việc chung, và chia sẻ giá trị đó với nhau."}], "vocab": [{"term": "相対化する", "reading": "そうたいかする", "mean": "tương đối hoá (không xem là tuyệt đối)"}, {"term": "樹立する", "reading": "じゅりつする", "mean": "xây dựng, thiết lập (quan hệ, chế độ)"}, {"term": "方略", "reading": "ほうりゃく", "mean": "chiến lược, sách lược"}], "anchorWords": ["筆者", "異文化間", "対話", "人間関係", "大切", "他者", "樹立", "自己"], "thinking": [{"jp": "他者と対話を通して、人間関係を樹立していくには、自己の価値観を保存したままで、他者の価値観を理解するという方略だけでは十分ではない。", "vn": "→ Phủ định cách làm thông thường: chỉ GIỮ giá trị quan mình (保存したまま) + HIỂU người khác là CHƯA ĐỦ (十分ではない)."}, {"jp": "相互的な働きかけを通じて、何か新たな価値を共有することが要求されるのである。", "vn": "→ Suy ra cần: TƯƠNG TÁC HAI CHIỀU (相互的) để CHIA SẺ giá trị MỚI (新たな価値)."}, {"jp": "自らの価値観を相対化し、新たな価値を対話という共同作業を通して創り上げ、それを共有していく態度が必要なのだ。", "vn": "→ Chốt giải pháp: TƯƠNG ĐỐI HOÁ (相対化) giá trị quan của mình, CÙNG TẠO RA (創り上げ) giá trị mới qua đối thoại."}], "chain": "自己保存+他者理解 = 不十分 (PHỦ ĐỊNH)\n　↓ 必要なのは\n相互的に新たな価値を共有 (tương tác 2 chiều)\n　↓ 具体的に\n価値観を相対化し、共同で創り上げる", "correctExplainJp": "他者と自己の<b>共通の価値観</b>を<b>創り上げていく</b>態度。", "correctExplain": "khớp đúng giải pháp thật: CÙNG NHAU TẠO RA (創り上げていく) giá trị quan chung, không chỉ giữ vững quan điểm riêng."}, {"bai": "BÀI 45", "date": "12/2016 (4)", "passage": "以下は、劇を作ることを仕事にしている人が書いた文章である。\n\n僕は「変な人」です。そうでなければ、こんな仕事はしてません。そして僕は「普通の人」です。だからこそこの仕事が成立しています。「特別なもの」を生み出そうとするとき、それがどんなふうに特別なのかを「普通」という視点から見極める必要があります。「特別」と「普通」、定規を何度も持ち替えるのです。そのために自分の中の普通さを死守するのです。", "source": "（小林賢太郎『僕がコントや演劇のために考えていること』による）", "question": "この文章で筆者が述べていることは何か。", "choices": ["「普通」という視点がないと、「特別なもの」は作れない。", "「普通の人」が普通のものを作ると、「特別なもの」になる。", "「変な人」が普通のものを作ると、「特別なもの」になる。", "「変な人」の視点でしか、「特別なもの」は作れない。"], "correct": 0, "shortFeedback": {"correct": "Đúng! Bài nói: cần liên tục \"đổi thước đo\" giữa \"đặc biệt\" và \"bình thường\" để xác định xem điều gì đó đặc biệt RA SAO — và phải GIỮ CHẶT phần \"bình thường\" trong mình để làm điều đó. A khớp đúng: không có góc nhìn \"bình thường\" thì không tạo được \"điều đặc biệt\".", "wrong": ["B/C đều nói về việc \"người này hay người kia\" làm \"thứ bình thường\" RA \"thứ đặc biệt\" — không đúng, bài không nói về việc biến cái bình thường thành đặc biệt, mà nói về việc CẦN CẢ HAI góc nhìn (đặc biệt + bình thường) để TẠO RA và ĐÁNH GIÁ điều đặc biệt.", "D nói \"chỉ góc nhìn của người kỳ lạ mới tạo được điều đặc biệt\" — thiếu vai trò của góc nhìn \"bình thường\" mà bài nhấn mạnh là cần thiết để NHÌN RA cái đặc biệt."]}, "anchor": "Không có mỏ neo đảo ngược kiểu しかし, nhưng có cấu trúc đối lập 「変な人」⇔「普通の人」xuyên suốt — cả hai cùng tồn tại trong tác giả và đều cần thiết.", "first": "僕は「変な人」です。…そして僕は「普通の人」です。だからこそこの仕事が成立しています。 → Mở bài: tác giả vừa là người \"kỳ lạ\" vừa là người \"bình thường\" — cả hai đều cần để làm nghề này.", "last": "「特別」と「普通」、定規を何度も持ち替えるのです。そのために自分の中の普通さを死守するのです。 → Câu cuối chốt: cần liên tục đổi \"thước đo\" giữa đặc biệt/bình thường, và phải giữ chặt phần bình thường trong mình.", "link": "Tác giả khẳng định cả 2 phần (kỳ lạ + bình thường) đều cần thiết → giải thích: cần góc nhìn \"bình thường\" để NHẬN RA cái gì đó đặc biệt ra sao → câu cuối nhấn mạnh phải giữ chặt phần bình thường này. A phản ánh đúng vai trò không thể thiếu của góc nhìn \"bình thường\".", "traps": [{"label": "B", "tag": "Bẫy lệch bản chất", "jp": "「普通の人」が普通のものを作ると、「<b>特別なもの</b>」になる。", "vn": "Bài không nói về việc \"biến cái bình thường thành đặc biệt\" — mà nói về việc cần góc nhìn bình thường để NHẬN RA/ĐÁNH GIÁ cái đặc biệt."}, {"label": "C", "tag": "Bẫy lệch bản chất", "jp": "「変な人」が普通のものを作ると、「<b>特別なもの</b>」になる。", "vn": "Tương tự B, đây không phải nội dung bài — bài không nói về việc người kỳ lạ BIẾN thứ bình thường thành đặc biệt."}, {"label": "D", "tag": "Bẫy thiếu ý", "jp": "「<b>変な人</b>」の視点でしか、「特別なもの」は作れない。", "vn": "Chỉ nhấn vào góc nhìn \"kỳ lạ\", bỏ sót vai trò QUAN TRỌNG KHÔNG KÉM của góc nhìn \"bình thường\" mà bài nhấn mạnh."}], "translate": [{"jp": "「特別なもの」を生み出そうとするとき、それがどんなふうに特別なのかを「普通」という視点から見極める必要があります。", "vn": "Khi muốn tạo ra \"điều đặc biệt\", ta cần nhìn từ góc độ \"bình thường\" để xác định xem nó đặc biệt theo cách nào."}, {"jp": "「特別」と「普通」、定規を何度も持ち替えるのです。そのために自分の中の普通さを死守するのです。", "vn": "Tôi liên tục đổi qua đổi lại \"thước đo\" giữa \"đặc biệt\" và \"bình thường\". Và để làm được điều đó, tôi luôn cố gắng giữ chặt phần bình thường trong chính mình."}], "vocab": [{"term": "見極める", "reading": "みきわめる", "mean": "xác định rõ, nhìn thấu"}, {"term": "定規を持ち替える", "reading": "じょうぎをもちかえる", "mean": "đổi thước đo (ẩn dụ: thay đổi tiêu chuẩn đánh giá)"}, {"term": "死守する", "reading": "ししゅする", "mean": "giữ chặt, bảo vệ đến cùng"}], "anchorWords": ["文章", "筆者", "普通", "仕事", "成立", "特別", "定規", "何度"], "thinking": [{"jp": "僕は「変な人」です。…そして僕は「普通の人」です。だからこそこの仕事が成立しています。", "vn": "→ Tác giả vừa là người KỲ LẠ (変な人) vừa là người BÌNH THƯỜNG (普通の人) — cả hai đều CẦN để làm nghề này."}, {"jp": "「特別なもの」を生み出そうとするとき、それがどんなふうに特別なのかを「普通」という視点から見極める必要があります。", "vn": "→ Suy ra: cần góc nhìn \"BÌNH THƯỜNG\" (普通という視点) để XÁC ĐỊNH (見極める) điều gì đó đặc biệt RA SAO."}, {"jp": "「特別」と「普通」、定規を何度も持ち替えるのです。そのために自分の中の普通さを死守するのです。", "vn": "→ Chốt: liên tục ĐỔI THƯỚC ĐO (定規を持ち替える) giữa đặc biệt/bình thường, và phải GIỮ CHẶT (死守する) phần bình thường."}], "chain": "変な人 + 普通の人 = cả 2 cần thiết\n　↓ suy ra\n特別なもの ⇄ 普通という視点 (cần để đánh giá)\n　↓ kết luận\n普通さを死守する (giữ chặt phần bình thường)", "correctExplainJp": "「普通」という<b>視点</b>がないと、「特別なもの」は作れない。", "correctExplain": "khớp đúng: KHÔNG CÓ góc nhìn \"BÌNH THƯỜNG\" (普通という視点) thì KHÔNG TẠO ĐƯỢC \"điều đặc biệt\" — vì cần nó để xác định/đánh giá."}, {"bai": "BÀI 46", "date": "7/2017 (2)", "passage": "以下は、動物園の飼育環境について書かれたものである。\n\n動物たちにとって飼育係は大事な環境要因である。展示場としての環境の改善だけでは、動物たちの飼育環境の真の改善にはならない。日々動物と接触する飼育係は、時として動物たちのストレス源になることがある。飼育係がストレス源にならないためには動物をよく観察し、行動にあわせた世話をし、その動物の種としての特徴、個体としての性格を知らなければならない。", "source": "（小宮輝之『物語 上野動物園の歴史』による）", "question": "筆者の考えに合うのはどれか。", "choices": ["動物たちにとって、飼育係との関係は展示場の改善よりも重要である。", "飼育環境を改善しても、動物にストレスがたまることがある。", "飼育環境の改善には、飼育係が動物の特徴や性格を把握することも重要である。", "飼育係の使命は、動物の特徴や性格に合った展示場を作ることである。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Bài nói: chỉ cải thiện khu trưng bày là chưa đủ, người chăm sóc phải hiểu đặc điểm LOÀI và TÍNH CÁCH RIÊNG của từng cá thể — đúng với C: cải thiện môi trường nuôi cần cả việc người chăm sóc nắm rõ đặc điểm/tính cách động vật.", "wrong": ["A nói \"quan hệ với người chăm sóc QUAN TRỌNG HƠN cải thiện khu trưng bày\" — đây là so sánh mức độ quan trọng không có trong bài, bài chỉ nói cả hai đều cần, không so sánh ai hơn ai.", "B nói đúng một chi tiết phụ (cải thiện môi trường vẫn có thể gây stress) nhưng đây không phải ý chính của bài, chỉ là lý do dẫn đến luận điểm chính.", "D nói về \"sứ mệnh tạo khu trưng bày phù hợp\" — không đúng, bài nói sứ mệnh là HIỂU và CHĂM SÓC theo đặc điểm động vật, không phải xây khu trưng bày."]}, "anchor": "Không có mỏ neo đảo ngược. Câu đầu nêu luận điểm chính (người chăm sóc là yếu tố môi trường quan trọng), câu cuối cụ thể hoá điều kiện cần thiết.", "first": "動物たちにとって飼育係は大事な環境要因である。展示場としての環境の改善だけでは、動物たちの飼育環境の真の改善にはならない。 → Nêu luận điểm: người chăm sóc là yếu tố môi trường quan trọng, chỉ cải thiện khu trưng bày là chưa đủ.", "last": "飼育係がストレス源にならないためには動物をよく観察し、行動にあわせた世話をし、その動物の種としての特徴、個体としての性格を知らなければならない。 → Câu cuối cụ thể hoá điều kiện: cần quan sát kỹ, hiểu đặc điểm loài và tính cách riêng từng cá thể.", "link": "Luận điểm chính (người chăm sóc quan trọng, không chỉ khu trưng bày) → cụ thể hoá điều kiện cần thiết để người chăm sóc không gây stress: hiểu đặc điểm loài + tính cách cá thể. C phản ánh đúng cả 2 yếu tố này là cần thiết cho việc cải thiện môi trường nuôi.", "traps": [{"label": "A", "tag": "Bẫy so sánh không có", "jp": "動物たちにとって、飼育係との関係は<b>展示場の改善よりも重要</b>である。", "vn": "Bài không so sánh mức độ quan trọng giữa quan hệ với người chăm sóc và khu trưng bày — chỉ nói CẢ HAI đều cần thiết, không phải cái nào hơn cái nào."}, {"label": "B", "tag": "Bẫy lấy chi tiết phụ làm ý chính", "jp": "飼育環境を改善しても、動物に<b>ストレスがたまる</b>ことがある。", "vn": "Đây là một chi tiết dẫn dắt (lý do cần phải làm gì), không phải LUẬN ĐIỂM CHÍNH mà câu hỏi yêu cầu."}, {"label": "D", "tag": "Bẫy lệch sứ mệnh", "jp": "飼育係の<b>使命</b>は、動物の特徴や性格に合った<b>展示場</b>を作ることである。", "vn": "Sứ mệnh của người chăm sóc theo bài là HIỂU và CHĂM SÓC theo đặc điểm động vật, không phải XÂY DỰNG khu trưng bày."}], "translate": [{"jp": "動物たちにとって飼育係は大事な環境要因である。展示場としての環境の改善だけでは、動物たちの飼育環境の真の改善にはならない。", "vn": "Đối với động vật, người chăm sóc là một yếu tố môi trường quan trọng. Chỉ cải thiện môi trường khu trưng bày thôi thì không phải là sự cải thiện thực sự đối với môi trường sống của chúng."}, {"jp": "飼育係がストレス源にならないためには動物をよく観察し、行動にあわせた世話をし、その動物の種としての特徴、個体としての性格を知らなければならない。", "vn": "Để người chăm sóc không trở thành nguồn gây căng thẳng cho động vật, họ cần quan sát kỹ động vật, chăm sóc phù hợp với hành vi của chúng, và phải hiểu rõ đặc điểm của loài cũng như tính cách riêng của từng cá thể."}], "vocab": [{"term": "飼育係", "reading": "しいくがかり", "mean": "người chăm sóc động vật (ở sở thú)"}, {"term": "ストレス源", "reading": "ストレスげん", "mean": "nguồn gây căng thẳng/stress"}, {"term": "個体", "reading": "こたい", "mean": "cá thể (sinh vật riêng lẻ)"}], "anchorWords": ["筆者", "動物", "飼育係", "大事", "環境要因", "展示場", "改善", "飼育環境"], "thinking": [{"jp": "動物たちにとって飼育係は大事な環境要因である。展示場としての環境の改善だけでは、動物たちの飼育環境の真の改善にはならない。", "vn": "→ Luận điểm: NGƯỜI CHĂM SÓC (飼育係) là yếu tố môi trường quan trọng, chỉ cải thiện KHU TRƯNG BÀY (展示場) là chưa đủ."}, {"jp": "日々動物と接触する飼育係は、時として動物たちのストレス源になることがある。", "vn": "→ Suy ra: chính người chăm sóc lại có thể trở thành NGUỒN GÂY STRESS (ストレス源) cho động vật."}, {"jp": "飼育係がストレス源にならないためには動物をよく観察し、行動にあわせた世話をし、その動物の種としての特徴、個体としての性格を知らなければならない。", "vn": "→ Chốt điều kiện: phải QUAN SÁT (観察し), hiểu ĐẶC ĐIỂM LOÀI và TÍNH CÁCH RIÊNG (種としての特徴・個体としての性格) của động vật."}], "chain": "飼育係 = 大事な環境要因 (yếu tố quan trọng)\n　↓ 時として\nストレス源になることがある (có thể gây stress)\n　↓ 防ぐには\n動物の特徴・性格を知る (hiểu đặc điểm/tính cách)", "correctExplainJp": "飼育環境の改善には、飼育係が動物の<b>特徴</b>や<b>性格</b>を<b>把握</b>することも重要である。", "correctExplain": "khớp đúng: cần người chăm sóc NẮM RÕ (把握) ĐẶC ĐIỂM (特徴) và TÍNH CÁCH (性格) của động vật."}, {"bai": "BÀI 47", "date": "7/2017 (3)", "passage": "人と人とのコミュニケーションが希薄化していると言われる今日、それを如何に円滑に、如何に真意を外さずに行うかは、誰にとっても大きな課題だ。時に人は「力」によって他者を動かそうとする。あるいは「経済力」が人を動かす手段ともなる。企業という組織では、「役職＝ポジション」を使って人を動かすケースも多い。だがそういった「上意下達」(注)「弱肉強食」のコミュニケーションでは、人は本質的な満足は得られない。人が人である所以(注)は、力対力の拮抗ではなく、他者との「共感」によって「動く」「動かす」ことができる点にある。\n\n(注) 上意下達：上に立つ者の考えや命令を下位の者へ伝えること\n(注) 所以：理由", "source": "（佐渡容・辻秀一『感じて動く』による）", "question": "筆者の考えに合うのはどれか。", "choices": ["企業では「共感」によるコミュニケーションで人を動かしている。", "企業では「役職」を使って人を動かすことも考えるべきだ。", "人は本質的な満足が得られると確信しない限り動かない。", "人は「力」より「共感」によって動こうとする。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Câu cuối khẳng định: bản chất con người là có thể \"vận động/làm vận động\" người khác qua \"sự đồng cảm\", không phải qua sự đối đầu quyền lực — đúng với D: con người muốn vận động bởi đồng cảm hơn là bởi quyền lực.", "wrong": ["A nói \"DOANH NGHIỆP ĐANG vận hành bằng đồng cảm\" — sai thời/thực tế, bài nói doanh nghiệp THƯỜNG dùng quyền lực/chức vụ (役職), và đó KHÔNG mang lại thoả mãn thật, không phải đã vận hành bằng đồng cảm.", "B nói \"nên dùng chức vụ để vận động người\" — ngược ý, bài PHÊ PHÁN cách này vì không mang lại thoả mãn thực chất.", "C nói về điều kiện \"phải chắc chắn được thoả mãn mới vận động\" — không có trong bài, đây là suy diễn không đúng."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「だが」trước câu cuối — chuyển từ các cách vận động bằng quyền lực/chức vụ (không hiệu quả thật) sang bản chất thật của sự vận động con người (đồng cảm).", "first": "人と人とのコミュニケーションが希薄化していると言われる今日…誰にとっても大きな課題だ。 → Nêu bối cảnh: giao tiếp con người ngày nay nhạt nhoà, là vấn đề lớn với mọi người.", "last": "人が人である所以は、力対力の拮抗ではなく、他者との「共感」によって「動く」「動かす」ことができる点にある。 → Câu cuối (sau だが) chốt: bản chất con người nằm ở khả năng vận động nhau qua đồng cảm, không phải qua đối đầu quyền lực.", "link": "だが đảo ý: các cách vận động bằng quyền lực/chức vụ phổ biến trong doanh nghiệp (nhưng KHÔNG mang lại thoả mãn thật) ⇔ bản chất thật của con người là vận động nhau bằng đồng cảm. D phản ánh đúng kết luận này: con người thiên về đồng cảm hơn là quyền lực.", "traps": [{"label": "A", "tag": "Bẫy ngược nghĩa", "jp": "企業では「<b>共感</b>」によるコミュニケーションで人を動かしている。", "vn": "Sai thực tế — bài nói doanh nghiệp THƯỜNG dùng quyền lực/chức vụ (役職) (và điều đó BỊ PHÊ PHÁN), không phải đã vận hành bằng đồng cảm."}, {"label": "B", "tag": "Bẫy ngược nghĩa", "jp": "企業では「<b>役職</b>」を使って人を動かすことも考えるべきだ。", "vn": "Ngược ý — bài PHÊ PHÁN cách dùng chức vụ để vận động người, không phải đề xuất NÊN dùng."}, {"label": "C", "tag": "Bẫy thêm chi tiết", "jp": "人は<b>本質的な満足</b>が得られると<b>確信しない限り</b>動かない。", "vn": "Điều kiện \"phải chắc chắn được thoả mãn\" (確信しない限り) không có trong bài — đây là suy diễn không có căn cứ trong đoạn văn."}], "translate": [{"jp": "だがそういった「上意下達」「弱肉強食」のコミュニケーションでは、人は本質的な満足は得られない。", "vn": "Nhưng với kiểu giao tiếp \"truyền lệnh từ trên xuống\", \"cá lớn nuốt cá bé\" như vậy, con người không thể đạt được sự thoả mãn thực sự."}, {"jp": "人が人である所以は、力対力の拮抗ではなく、他者との「共感」によって「動く」「動かす」ことができる点にある。", "vn": "Lý do con người là con người nằm ở việc có thể \"chuyển động\" và \"khiến người khác chuyển động\" thông qua sự đồng cảm với người khác, chứ không phải qua sự đối đầu giữa quyền lực với quyền lực."}], "vocab": [{"term": "希薄化する", "reading": "きはくかする", "mean": "trở nên nhạt nhoà, mỏng manh"}, {"term": "拮抗", "reading": "きっこう", "mean": "sự đối đầu cân bằng, giằng co"}, {"term": "所以", "reading": "ゆえん", "mean": "lý do, nguyên do (văn viết trang trọng)"}], "anchorWords": ["筆者", "希薄化", "今日", "課題", "所以", "力対力", "拮抗", "他者"], "thinking": [{"jp": "人と人とのコミュニケーションが希薄化していると言われる今日…時に人は「力」によって他者を動かそうとする。…企業という組織では、「役職＝ポジション」を使って人を動かすケースも多い。", "vn": "→ Bối cảnh: giao tiếp ngày nay NHẠT NHOÀ (希薄化) — nhiều người dùng QUYỀN LỰC/CHỨC VỤ (力・役職) để vận động người khác."}, {"jp": "だがそういった「上意下達」「弱肉強食」のコミュニケーションでは、人は本質的な満足は得られない。", "vn": "→ だが đảo ý: kiểu giao tiếp DÙNG QUYỀN LỰC đó KHÔNG mang lại THOẢ MÃN THẬT (本質的な満足)."}, {"jp": "人が人である所以は、力対力の拮抗ではなく、他者との「共感」によって「動く」「動かす」ことができる点にある。", "vn": "→ Suy ra bản chất con người: vận động nhau qua ĐỒNG CẢM (共感), KHÔNG qua đối đầu QUYỀN LỰC (力)."}], "chain": "力・役職で人を動かす (phổ biến trong doanh nghiệp)\n　↓ だが\n本質的な満足は得られない (không thoả mãn thật)\n　↓ suy ra\n人が人である所以 = 共感によって動く (đồng cảm > quyền lực)", "correctExplainJp": "人は「力」より「<b>共感</b>」によって動こうとする。", "correctExplain": "khớp đúng kết luận: con người thiên về ĐỒNG CẢM (共感) hơn QUYỀN LỰC (力) khi muốn được vận động."}, {"bai": "BÀI 48", "date": "7/2017 (4)", "passage": "人間には、道具をつくり、その道具に適応しようとする性質がある。そしてその道具に適応し過ぎてしまうことで、本来の人間の能力を削がれて(注)しまうことがある。その適応力が仇(注)となり、人間がつくった道具により人間が左右される。まるで、人間がつくった道具に人間がつくられてしまうかのように。歩きながらでもスマートフォン(注)を使いたいという欲求にかられ、挙げ句に視野を大きくそこへ奪われ、自ら、そして他者をも危険な状況に追い込んでしまう。これもその現象のひとつだ。\n\n(注) 削ぐ：削る\n(注) 仇：ここでは、害\n(注) スマートフォン：パソコンの機能もある携帯電話", "source": "（小川和也『デジタルは人間を奪うのか』による）", "question": "その現象とはどのような現象のことか。", "choices": ["道具によって人間が便利さに鈍感になる現象。", "道具によって人間が振り回されている現象。", "道具が人間にとって危険なものになる現象。", "道具の発展が人間の欲求を拡大させる現象。"], "correct": 1, "shortFeedback": {"correct": "Đúng! Bài nói: con người bị CÔNG CỤ CHI PHỐI (道具により人間が左右される), như thể bị công cụ \"tạo ra\" ngược lại — vừa đi vừa dùng điện thoại là ví dụ của hiện tượng bị công cụ ĐIỀU KHIỂN này. B khớp đúng: con người bị công cụ giật dây/chi phối.", "wrong": ["A nói về \"trở nên vô cảm với sự tiện lợi\" — không đúng, bài không nói về cảm giác với sự tiện lợi, mà nói về việc bị công cụ CHI PHỐI hành vi.", "C nói \"công cụ trở nên nguy hiểm\" — chỉ là HẬU QUẢ cụ thể (rủi ro khi đi đường), không phải hiện tượng GỐC mà câu hỏi hỏi tới.", "D nói về \"sự phát triển công cụ làm tăng ham muốn con người\" — không đúng trọng tâm, bài nói về việc con người bị công cụ CHI PHỐI/ĐIỀU KHIỂN ngược, không phải về ham muốn tăng lên."]}, "anchor": "Không có mỏ neo đảo ngược, nhưng có ví dụ cụ thể ở cuối minh hoạ cho luận điểm chính đã nêu trước đó (con người bị công cụ chi phối ngược).", "first": "人間には、道具をつくり、その道具に適応しようとする性質がある。 → Mở bài: con người có xu hướng tạo ra công cụ rồi thích nghi với nó.", "last": "歩きながらでもスマートフォンを使いたいという欲求にかられ…自ら、そして他者をも危険な状況に追い込んでしまう。これもその現象のひとつだ。 → Câu cuối đưa ví dụ cụ thể (dùng điện thoại khi đi bộ gây nguy hiểm) minh hoạ cho hiện tượng đã nêu.", "link": "Luận điểm chính (đã nêu giữa bài): thích nghi quá mức với công cụ khiến con người bị công cụ CHI PHỐI NGƯỢC LẠI (人間が左右される, 人間がつくられてしまうかのように) → câu cuối là VÍ DỤ cụ thể (dùng điện thoại khi đi đường) cho hiện tượng này. B phản ánh đúng bản chất hiện tượng: con người bị công cụ giật dây/chi phối.", "traps": [{"label": "A", "tag": "Bẫy lệch ý", "jp": "道具によって人間が<b>便利さに鈍感になる</b>現象。", "vn": "Bài không nói về \"vô cảm với sự tiện lợi\" (便利さに鈍感) — mà nói về việc bị công cụ CHI PHỐI hành vi, hai điều khác bản chất."}, {"label": "C", "tag": "Bẫy lấy ví dụ làm hiện tượng gốc", "jp": "道具が人間にとって<b>危険なもの</b>になる現象。", "vn": "\"Nguy hiểm\" (危険) chỉ là HẬU QUẢ cụ thể trong ví dụ cuối, không phải hiện tượng GỐC mà bài muốn nói (việc bị công cụ chi phối)."}, {"label": "D", "tag": "Bẫy lệch trọng tâm", "jp": "道具の発展が人間の<b>欲求を拡大させる</b>現象。", "vn": "Bài không nói về việc \"ham muốn con người tăng lên\" (欲求を拡大) do công cụ phát triển, mà nói về việc con người bị công cụ ĐIỀU KHIỂN/CHI PHỐI ngược lại."}], "translate": [{"jp": "その適応力が仇となり、人間がつくった道具により人間が左右される。まるで、人間がつくった道具に人間がつくられてしまうかのように。", "vn": "Khả năng thích nghi đó lại trở thành điều gây hại, khi con người bị chi phối ngược lại bởi chính công cụ mình tạo ra. Cứ như thể con người đang bị tạo ra bởi công cụ mà chính mình đã làm nên."}, {"jp": "歩きながらでもスマートフォンを使いたいという欲求にかられ、挙げ句に視野を大きくそこへ奪われ、自ら、そして他者をも危険な状況に追い込んでしまう。", "vn": "Bị thúc đẩy bởi ham muốn dùng điện thoại thông minh ngay cả khi đang đi bộ, rốt cuộc tầm nhìn bị cuốn hết vào đó, đẩy cả bản thân và người khác vào tình huống nguy hiểm."}], "vocab": [{"term": "削がれる", "reading": "そがれる", "mean": "bị bào mòn, bị giảm đi"}, {"term": "仇となる", "reading": "あだとなる", "mean": "trở thành điều gây hại (ngược với ý định ban đầu)"}, {"term": "挙げ句に", "reading": "あげくに", "mean": "rốt cuộc, cuối cùng thì (thường mang nghĩa hệ quả xấu)"}], "anchorWords": ["現象", "人間", "道具", "適応", "性質", "欲求", "他者", "危険"], "thinking": [{"jp": "人間には、道具をつくり、その道具に適応しようとする性質がある。そしてその道具に適応し過ぎてしまうことで、本来の人間の能力を削がれてしまうことがある。", "vn": "→ Con người tạo công cụ rồi THÍCH NGHI (適応) quá mức — khiến NĂNG LỰC GỐC (本来の能力) bị BÀO MÒN (削がれる)."}, {"jp": "その適応力が仇となり、人間がつくった道具により人間が左右される。まるで、人間がつくった道具に人間がつくられてしまうかのように。", "vn": "→ Suy ra: khả năng thích nghi đó trở thành HẠI (仇) — con người bị công cụ CHI PHỐI NGƯỢC LẠI (左右される)."}, {"jp": "歩きながらでもスマートフォンを使いたいという欲求にかられ…自ら、そして他者をも危険な状況に追い込んでしまう。これもその現象のひとつだ。", "vn": "→ Ví dụ minh hoạ: dùng điện thoại khi đi bộ — một trường hợp của hiện tượng BỊ CÔNG CỤ CHI PHỐI đó."}], "chain": "道具に適応しすぎる (thích nghi quá mức)\n　↓ 仇となり\n人間が道具に左右される (bị công cụ chi phối)\n　↓ 例\nスマホを使いながら歩く → 危険な状況 (ví dụ cụ thể)", "correctExplainJp": "道具によって人間が<b>振り回されている</b>現象。", "correctExplain": "khớp đúng bản chất hiện tượng: con người bị công cụ GIẬT DÂY/CHI PHỐI (振り回される), đúng với 「人間が左右される」."}, {"bai": "BÀI 49", "date": "12/2017 (2)", "passage": "あらゆる仕事はなんらかの形で、その人を世界の中に位置づける。畑仕事のような個人作業でもそうだ。自然のサイクルの中に、自分の存在を確かめることができる。人はどんなに大金持ちになっても、なんらかの形で働こうとする生き物だろう。お金持ちはお金持ちなりの仕事を、自分でつくり出すはずだ。それは人間が、外の世界との関わり合いを通じてしか自分が存在する実感を得ることができず、またそれを常に渇望(かつぼう)(注)していることを示している。\n\n(注) 渇望する：強く望む", "source": "", "question": "筆者の考えに合うのはどれか。", "choices": ["世界に存在するあらゆる仕事には、それぞれの価値がある。", "自然の中で働き、自身の存在を確認することが大切だ。", "人はどんなに豊かになっても、働くことをやめてはいけない。", "人は仕事を通じて、自身が存在する意義を実感できる。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Câu cuối chốt: con người chỉ có thể cảm nhận \"sự tồn tại của bản thân\" thông qua mối liên hệ với thế giới bên ngoài (qua công việc), và luôn khao khát điều đó — đúng với D.", "wrong": ["A nói về \"giá trị riêng của mỗi công việc\" — không đúng trọng tâm, bài không so sánh giá trị giữa các loại công việc.", "B chỉ nói về việc \"làm việc trong tự nhiên\" — đây chỉ là VÍ DỤ (công việc đồng áng), không phải luận điểm chung của toàn bài.", "C nói \"không nên ngừng làm việc\" — đây là MỘT VÍ DỤ cụ thể (người giàu vẫn làm việc) được dùng để minh chứng luận điểm, không phải kết luận chính."]}, "anchor": "Không có mỏ neo đảo ngược. Câu đầu nêu luận điểm chính (công việc giúp định vị bản thân trong thế giới), các câu giữa là ví dụ minh chứng, câu cuối chốt ý nghĩa sâu hơn.", "first": "あらゆる仕事はなんらかの形で、その人を世界の中に位置づける。 → Nêu luận điểm: mọi công việc đều giúp định vị con người trong thế giới.", "last": "それは人間が、外の世界との関わり合いを通じてしか自分が存在する実感を得ることができず、またそれを常に渇望していることを示している。 → Câu cuối chốt: con người chỉ cảm nhận được sự tồn tại của mình qua mối liên hệ với thế giới ngoài, và luôn khao khát điều đó.", "link": "Luận điểm chính (công việc định vị con người) → ví dụ minh chứng (người giàu vẫn tự tạo việc để làm) → câu cuối khái quát hoá ý nghĩa sâu hơn: con người cần công việc để CẢM NHẬN sự tồn tại của bản thân. D phản ánh đúng ý nghĩa cốt lõi này.", "traps": [{"label": "A", "tag": "Bẫy lệch trọng tâm", "jp": "世界に存在する<b>あらゆる仕事</b>には、それぞれの<b>価値</b>がある。", "vn": "Bài không so sánh GIÁ TRỊ (価値) giữa các loại công việc khác nhau — đây không phải nội dung được nhấn mạnh."}, {"label": "B", "tag": "Bẫy lấy ví dụ làm luận điểm", "jp": "<b>自然の中</b>で働き、自身の存在を確認することが大切だ。", "vn": "\"Làm việc trong tự nhiên\" (自然の中) chỉ là một VÍ DỤ cụ thể (công việc đồng áng), không phải luận điểm chung áp dụng cho MỌI loại công việc."}, {"label": "C", "tag": "Bẫy lấy ví dụ làm luận điểm", "jp": "人はどんなに<b>豊かに</b>なっても、働くことを<b>やめてはいけない</b>。", "vn": "\"Người giàu vẫn làm việc\" là VÍ DỤ minh chứng cho luận điểm, không phải bản thân luận điểm chính mà câu hỏi yêu cầu."}], "translate": [{"jp": "あらゆる仕事はなんらかの形で、その人を世界の中に位置づける。", "vn": "Mọi công việc, dưới hình thức nào đó, đều giúp định vị một người trong thế giới này."}, {"jp": "それは人間が、外の世界との関わり合いを通じてしか自分が存在する実感を得ることができず、またそれを常に渇望していることを示している。", "vn": "Điều đó cho thấy con người chỉ có thể cảm nhận được sự tồn tại thật sự của mình qua mối liên hệ với thế giới bên ngoài, và luôn khao khát điều đó."}], "vocab": [{"term": "位置づける", "reading": "いちづける", "mean": "định vị, xác định vị trí của ai/cái gì"}, {"term": "渇望する", "reading": "かつぼうする", "mean": "khao khát mãnh liệt"}, {"term": "〜なりの", "reading": "なりの", "mean": "theo cách riêng phù hợp với~ (ngữ pháp N2-N1)"}], "anchorWords": ["筆者", "仕事", "世界", "位置", "人間", "自分", "存在", "実感"], "thinking": [{"jp": "あらゆる仕事はなんらかの形で、その人を世界の中に位置づける。畑仕事のような個人作業でもそうだ。", "vn": "→ Luận điểm: MỌI công việc (あらゆる仕事) đều giúp ĐỊNH VỊ (位置づける) con người trong thế giới."}, {"jp": "人はどんなに大金持ちになっても、なんらかの形で働こうとする生き物だろう。お金持ちはお金持ちなりの仕事を、自分でつくり出すはずだ。", "vn": "→ Minh chứng: dù GIÀU đến đâu, con người vẫn TỰ TẠO RA việc để làm."}, {"jp": "それは人間が、外の世界との関わり合いを通じてしか自分が存在する実感を得ることができず、またそれを常に渇望していることを示している。", "vn": "→ Suy ra: con người chỉ CẢM NHẬN (実感) được sự TỒN TẠI của mình qua MỐI LIÊN HỆ với thế giới ngoài (外の世界との関わり合い), và luôn KHAO KHÁT (渇望) điều đó."}], "chain": "仕事 = 世界の中に自分を位置づける (luận điểm)\n　↓ 例\n金持ちも仕事を作り出す (vẫn tự tạo việc dù giàu)\n　↓ suy ra\n外の世界との関わり → 存在の実感 (cảm nhận tồn tại)", "correctExplainJp": "人は<b>仕事</b>を通じて、自身が<b>存在する意義</b>を<b>実感</b>できる。", "correctExplain": "khớp đúng ý nghĩa sâu: qua công việc (仕事), con người CẢM NHẬN (実感) được Ý NGHĨA TỒN TẠI (存在する意義) của mình."}, {"bai": "BÀI 50", "date": "12/2017 (3)", "passage": "「すべての歴史は現代史である。」この有名な言葉が示す内容は、われわれが史料(注)に対した場合、けっきょく史料をとおして過去を見るのは、ほかならぬ現在のわれわれであり現在の眼(め)である、ということである。われわれは、公平無私に(注)、また古い時代の人の心になって対処しようとしても、われわれが生きている現在の時代の人間である、ということから脱出することはできないからである。要するに歴史学は、こうした性格をもった学問である。\n\n(注) 史料：歴史研究のために必要な文献や遺物など\n(注) 公平無私に：私的な感情を持たずに公平に", "source": "", "question": "筆者によると、歴史学とはどのようなものか。", "choices": ["史料の分析をとおして現代史を解明するもの。", "古い時代の人々の立場に立って研究するもの。", "過去を現代の人々の視点で解釈するもの。", "過去を現代史と比較して理解するもの。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Câu đầu+giữa nói rõ: dù muốn công bằng/khách quan, người nghiên cứu sử KHÔNG THỂ thoát khỏi việc là người của HIỆN TẠI — nên nhìn quá khứ qua \"con mắt hiện tại\". Đúng với C: giải thích quá khứ theo góc nhìn người hiện đại.", "wrong": ["A nói \"giải thích lịch sử hiện đại\" — sai, bài không nói sử học để hiểu \"lịch sử hiện đại\", mà nói về việc nhìn QUÁ KHỨ qua mắt hiện tại.", "B ngược nghĩa: bài nói KHÔNG THỂ đặt mình vào tâm thế người xưa hoàn toàn (脱出することはできない), không phải nên đứng ở vị trí người xưa.", "D nói về việc \"so sánh quá khứ với lịch sử hiện đại\" — không có trong bài, bài không nói về việc SO SÁNH, mà nói về góc nhìn khi diễn giải."]}, "anchor": "Không có mỏ neo đảo ngược. Câu đầu trích dẫn câu nói nổi tiếng làm luận điểm chính, câu giữa giải thích lý do, câu cuối (要するに) tóm tắt lại.", "first": "「すべての�история は現代史である。」 → Trích câu nói nổi tiếng làm luận điểm mở đầu: mọi lịch sử đều là lịch sử của hiện tại.", "last": "要するに歴史学は、こうした性格をもった学問である。 → Câu cuối (要するに) tóm tắt: sử học mang bản chất là nhìn quá khứ qua góc nhìn hiện tại.", "link": "Câu nói nổi tiếng (mọi lịch sử là lịch sử hiện tại) → giải thích: vì người nghiên cứu luôn là người của hiện tại, không thể thoát ra khỏi điều đó dù muốn khách quan → 要するに tóm tắt lại bản chất này. C phản ánh đúng: quá khứ được giải thích qua góc nhìn của người hiện đại.", "traps": [{"label": "A", "tag": "Bẫy hiểu sai thuật ngữ", "jp": "史料の分析をとおして<b>現代史</b>を解明するもの。", "vn": "\"Hiện đại sử\" (現代史) trong câu trích dẫn là một cách nói ẨN DỤ (lịch sử luôn mang dấu ấn của người hiện tại), không phải nghĩa đen \"giải thích lịch sử hiện đại\" như A hiểu."}, {"label": "B", "tag": "Bẫy ngược nghĩa", "jp": "<b>古い時代の人々</b>の立場に立って研究するもの。", "vn": "Ngược ý — bài nói con người KHÔNG THỂ hoàn toàn đặt mình vào vị trí người xưa (古い時代の人の心になって), dù có cố gắng."}, {"label": "D", "tag": "Bẫy thêm chi tiết", "jp": "過去を<b>現代史</b>と<b>比較</b>して理解するもの。", "vn": "\"So sánh quá khứ với lịch sử hiện đại\" (比較) không có trong bài — bài nói về góc nhìn khi DIỄN GIẢI, không phải về việc so sánh hai giai đoạn."}], "translate": [{"jp": "われわれが史料に対した場合、けっきょく史料をとおして過去を見るのは、ほかならぬ現在のわれわれであり現在の眼である。", "vn": "Khi đối diện với tư liệu lịch sử, suy cho cùng, người nhìn quá khứ qua những tư liệu đó chính là chúng ta của hiện tại, bằng con mắt của hiện tại — không ai khác."}, {"jp": "われわれが生きている現在の時代の人間である、ということから脱出することはできないからである。", "vn": "Vì chúng ta không thể nào thoát ra khỏi việc mình là con người của thời đại hiện tại mà mình đang sống."}], "vocab": [{"term": "史料", "reading": "しりょう", "mean": "tư liệu lịch sử (văn bản, di vật...)"}, {"term": "公平無私", "reading": "こうへいむし", "mean": "công bằng, không vụ lợi cá nhân"}, {"term": "脱出する", "reading": "だっしゅつする", "mean": "thoát ra khỏi"}], "anchorWords": ["筆者", "歴史学", "現代史", "性格", "学問", "過去", "視点", "解釈"], "thinking": [{"jp": "「すべての歴史は現代史である。」この有名な言葉が示す内容は、われわれが史料に対した場合、けっきょく史料をとおして過去を見るのは、ほかならぬ現在のわれわれであり現在の眼である、ということである。", "vn": "→ Trích câu nói nổi tiếng: NGƯỜI NHÌN (現在の眼) quá khứ qua tư liệu LUÔN là người của HIỆN TẠI."}, {"jp": "われわれは、公平無私に、また古い時代の人の心になって対処しようとしても、われわれが生きている現在の時代の人間である、ということから脱出することはできないからである。", "vn": "→ Suy ra lý do: dù muốn KHÁCH QUAN/đặt mình vào tâm thế người xưa, KHÔNG THỂ THOÁT KHỎI (脱出することはできない) việc mình là người HIỆN TẠI."}, {"jp": "要するに歴史学は、こうした性格をもった学問である。", "vn": "→ 要するに chốt: sử học MANG BẢN CHẤT này — nhìn quá khứ qua góc nhìn hiện tại."}], "chain": "歴史は現代史である (câu nói nổi tiếng)\n　↓ なぜなら\n現在の人間という立場から脱出できない (không thể thoát khỏi vị trí hiện tại)\n　↓ 要するに\n歴史学 = 過去を現在の視点で見る学問", "correctExplainJp": "過去を<b>現代の人々の視点</b>で<b>解釈する</b>もの。", "correctExplain": "khớp đúng: sử học là GIẢI THÍCH (解釈する) quá khứ qua GÓC NHÌN người hiện đại (現代の人々の視点)."}, {"bai": "BÀI 51", "date": "12/2017 (4)", "passage": "人間は古い昔から、「人間とは何か」を問ってきた。けれどそれは、早く言えば「人間は動物とどこがちがうか?」という問いかけであった。いわく(注)「人間には動物にはない言語がある」、いわく「人間には思想がある」、「人間には文化がある」等々。しかしこの問いかけは、根本的にまちがっていた。問題は「人間は動物とどうちがうか?」ではなくて、「人間は他の動物とどうちがうか?」ということだったのである。これに答えるには、人間はどういう動物であるかを問う以外にない。\n\n(注) いわく：ここでは、よく言われるように", "source": "", "question": "筆者の考えに合うのはどれか。", "choices": ["言語・思想・文化は、人間だけのものと考えるべきではない。", "人間も動物であるという視点で、人間について考えるべきだ。", "人間と他の動物とのちがいを問いても意味がない。", "人間と動物のちがいを根本的に問い直すべきだ。"], "correct": 1, "shortFeedback": {"correct": "Đúng! Bài nói: câu hỏi đúng không phải \"con người khác ĐỘNG VẬT ra sao\" mà là \"con người khác CÁC ĐỘNG VẬT KHÁC ra sao\" — nghĩa là phải coi con người LÀ MỘT LOẠI ĐỘNG VẬT để nghiên cứu. Đúng với B.", "wrong": ["A nói về \"ngôn ngữ/tư tưởng/văn hoá không chỉ của con người\" — đây là SUY DIỄN không trực tiếp có trong bài, bài chỉ phê phán CÂU HỎI sai, không bàn về việc động vật có ngôn ngữ/văn hoá không.", "C nói \"hỏi sự khác biệt với động vật khác là vô nghĩa\" — ngược hẳn ý bài, bài nói CHÍNH CÂU HỎI NÀY mới là câu hỏi ĐÚNG cần đặt ra.", "D nói \"cần hỏi lại sự khác biệt giữa người và động vật\" — đây là CÂU HỎI CŨ mà bài đã phê phán là sai cơ bản, không phải đề xuất của tác giả."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「しかしこの問いかけは、根本的にまちがっていた」— phủ định mạnh câu hỏi truyền thống, dẫn đến câu hỏi đúng mà tác giả đề xuất.", "first": "人間は古い昔から、「人間とは何か」を問ってきた。けれどそれは…「人間は動物とどこがちがうか?」という問いかけであった。 → Nêu câu hỏi truyền thống: con người khác ĐỘNG VẬT (nói chung) ra sao.", "last": "問題は…「人間は他の動物とどうちがうか?」ということだったのである。これに答えるには、人間はどういう動物であるかを問う以外にない。 → Câu cuối chốt: câu hỏi đúng là con người khác CÁC ĐỘNG VẬT KHÁC ra sao — nghĩa là phải coi người LÀ một loại động vật.", "link": "しかし đảo ý mạnh: câu hỏi truyền thống (người khác động vật nói chung) bị phủ định là SAI CƠ BẢN → câu hỏi đúng (người khác các động vật KHÁC ra sao) đòi hỏi phải coi con người là một loại động vật để nghiên cứu. B phản ánh đúng tinh thần này.", "traps": [{"label": "A", "tag": "Bẫy suy diễn xa", "jp": "言語・思想・文化は、<b>人間だけ</b>のものと考えるべきではない。", "vn": "Bài không bàn về việc \"ngôn ngữ/văn hoá có ở động vật khác không\" — chỉ phê phán CÂU HỎI SAI, không đi sâu vào nội dung đó."}, {"label": "C", "tag": "Bẫy ngược nghĩa", "jp": "人間と<b>他の動物</b>とのちがいを問いても<b>意味がない</b>。", "vn": "Ngược hẳn ý bài — câu hỏi \"khác CÁC động vật KHÁC ra sao\" CHÍNH LÀ câu hỏi ĐÚNG mà tác giả đề xuất, không phải vô nghĩa."}, {"label": "D", "tag": "Bẫy mọi người", "jp": "人間と<b>動物</b>のちがいを<b>根本的に問い直す</b>べきだ。", "vn": "Đây là câu hỏi CŨ (người vs động vật nói chung) mà bài đã phê phán là sai cơ bản, không phải điều tác giả đề xuất."}], "translate": [{"jp": "しかしこの問いかけは、根本的にまちがっていた。", "vn": "Nhưng câu hỏi đó, về cơ bản, đã sai lầm."}, {"jp": "問題は「人間は動物とどうちがうか?」ではなくて、「人間は他の動物とどうちがうか?」ということだったのである。これに答えるには、人間はどういう動物であるかを問う以外にない。", "vn": "Vấn đề không phải là \"con người khác động vật ra sao\", mà là \"con người khác CÁC động vật KHÁC ra sao\". Để trả lời câu hỏi này, không có cách nào khác ngoài việc hỏi xem con người là loại động vật như thế nào."}], "vocab": [{"term": "問いかけ", "reading": "といかけ", "mean": "câu hỏi đặt ra"}, {"term": "いわく", "reading": "いわく", "mean": "như người ta thường nói (cách diễn đạt cổ/trang trọng)"}, {"term": "〜以外にない", "reading": "いがいにない", "mean": "không có cách nào khác ngoài~ (ngữ pháp nhấn mạnh tính tất yếu)"}], "anchorWords": ["筆者", "人間", "動物", "問題", "以外", "根本的", "視点"], "thinking": [{"jp": "人間は古い昔から、「人間とは何か」を問ってきた。けれどそれは、早く言えば「人間は動物とどこがちがうか?」という問いかけであった。…しかしこの問いかけは、根本的にまちがっていた。", "vn": "→ Câu hỏi TRUYỀN THỐNG: người khác ĐỘNG VẬT (nói chung) ra sao — しかし PHỦ ĐỊNH MẠNH (根本的にまちがっていた) câu hỏi này."}, {"jp": "問題は「人間は動物とどうちがうか?」ではなくて、「人間は他の動物とどうちがうか?」ということだったのである。", "vn": "→ Suy ra câu hỏi ĐÚNG: không phải \"khác ĐỘNG VẬT\", mà là \"khác CÁC ĐỘNG VẬT KHÁC\" (他の動物)."}, {"jp": "これに答えるには、人間はどういう動物であるかを問う以外にない。", "vn": "→ Chốt: để trả lời, PHẢI coi con người LÀ một loại ĐỘNG VẬT (どういう動物であるか) để nghiên cứu."}], "chain": "「人間は動物とどう違うか」(câu hỏi cũ) = 根本的にまちがっていた (SAI)\n　↓ suy ra câu hỏi đúng\n「人間は他の動物とどう違うか」\n　↓ 結論\n人間はどういう動物であるかを問うしかない", "correctExplainJp": "人間も<b>動物である</b>という視点で、人間について考えるべきだ。", "correctExplain": "khớp đúng tinh thần: phải coi con người LÀ một loại ĐỘNG VẬT (動物である) để nghiên cứu đúng câu hỏi."}, {"bai": "BÀI 52", "date": "7/2018 (1)", "passage": "人生やビジネスに目標を持つべきだ、というようなことが最近よく言われるが、わたしはそういう言い方に違和感を覚える。目標というものは、「持つべきだ」とか「持ったほうがいい」ものではなく、「持たなければいけない」とわざわざ啓蒙するものでもない。人生のあらゆる局面における「前提」なので、そのことがコンセンサス(注)になっている社会では、目標を持つことについて語られることはないからだ。\n\n(注) コンセンサス：ここでは、共通の理解", "source": "", "question": "目標について、筆者の考えに合うのはどれか。", "choices": ["目標は必ずしも持たなくてよい。", "目標は持っているのが当然である。", "目標は持ちたいと思って持てるものではない。", "目標を持っていても成功するとは限らない。"], "correct": 1, "shortFeedback": {"correct": "Đúng! Bài nói: mục tiêu là \"điều kiện tiên quyết\" (前提) trong mọi khía cạnh cuộc sống — nên ở xã hội nào đã có chung nhận thức về điều này, người ta KHÔNG CẦN phải nói ra. Tức là có mục tiêu là điều TỰ NHIÊN/ĐƯƠNG NHIÊN — đúng với B.", "wrong": ["A nói \"không cần phải có mục tiêu\" — ngược ý, bài nói mục tiêu là điều TẤT YẾU (前提), không phải có thể bỏ qua.", "C nói về việc \"muốn có mà không có được\" — không có trong bài, đây là nội dung không được đề cập.", "D nói về \"có mục tiêu cũng không chắc thành công\" — không có trong bài, bài không bàn về MỐI LIÊN HỆ giữa mục tiêu và thành công."]}, "anchor": "Có mỏ neo đảo ý nhẹ: 「わたしはそういう言い方に違和感を覚える」— tác giả phản đối ngay cách nói thông thường (nên/phải có mục tiêu), dẫn đến quan điểm thật ở câu cuối.", "first": "人生やビジネスに目標を持つべきだ、というようなことが最近よく言われるが、わたしはそういう言い方に違和感を覚える。 → Tác giả phản đối cách nói phổ biến: \"nên/phải có mục tiêu\".", "last": "人生のあらゆる局面における「前提」なので、そのことがコンセンサスになっている社会では、目標を持つことについて語られることはないからだ。 → Câu cuối chốt lý do: mục tiêu là điều kiện tiên quyết hiển nhiên, nên không cần phải nói ra trong xã hội đã có chung nhận thức về điều đó.", "link": "Tác giả phản đối cách nói \"nên có mục tiêu\" (vì nói vậy ngụ ý nó là lựa chọn) → câu cuối giải thích lý do thật: mục tiêu là điều TIÊN QUYẾT/ĐƯƠNG NHIÊN, không phải thứ cần khuyến khích — vì nó vốn đã có sẵn trong mọi khía cạnh cuộc sống. B phản ánh đúng: có mục tiêu là điều tự nhiên/đương nhiên.", "traps": [{"label": "A", "tag": "Bẫy ngược nghĩa", "jp": "目標は<b>必ずしも持たなくてよい</b>。", "vn": "Ngược ý — bài không nói \"không cần có mục tiêu\", mà nói mục tiêu là điều TẤT YẾU, hiển nhiên phải có."}, {"label": "C", "tag": "Bẫy thêm chi tiết", "jp": "目標は<b>持ちたいと思って持てる</b>ものではない。", "vn": "\"Muốn có mà không có được\" không có trong bài — đây là nội dung không xuất hiện."}, {"label": "D", "tag": "Bẫy thêm chi tiết", "jp": "目標を持っていても<b>成功するとは限らない</b>。", "vn": "Mối liên hệ giữa mục tiêu và THÀNH CÔNG (成功) không được bài đề cập đến."}], "translate": [{"jp": "目標というものは、「持つべきだ」とか「持ったほうがいい」ものではなく、「持たなければいけない」とわざわざ啓蒙するものでもない。", "vn": "Mục tiêu không phải là thứ mà ta \"nên có\" hay \"có thì tốt hơn\", và cũng không phải thứ cần phải cố tình tuyên truyền rằng \"bắt buộc phải có\"."}, {"jp": "人生のあらゆる局面における「前提」なので、そのことがコンセンサスになっている社会では、目標を持つことについて語られることはないからだ。", "vn": "Vì nó là một \"điều kiện tiên quyết\" trong mọi khía cạnh của đời sống, nên trong một xã hội đã có chung nhận thức về điều đó, người ta sẽ không cần phải nói về việc có mục tiêu hay không."}], "vocab": [{"term": "違和感を覚える", "reading": "いわかんをおぼえる", "mean": "cảm thấy không thoải mái, có cảm giác lạc quẻ"}, {"term": "啓蒙する", "reading": "けいもうする", "mean": "khai sáng, tuyên truyền giáo dục"}, {"term": "前提", "reading": "ぜんてい", "mean": "điều kiện tiên quyết, tiền đề"}], "anchorWords": ["目標", "筆者", "人生", "最近", "違和感", "局面", "前提", "社会"], "thinking": [{"jp": "人生やビジネスに目標を持つべきだ、というようなことが最近よく言われるが、わたしはそういう言い方に違和感を覚える。", "vn": "→ Tác giả PHẢN ĐỐI (違和感を覚える) cách nói thông thường \"nên/phải có mục tiêu\" (目標を持つべきだ)."}, {"jp": "目標というものは、「持つべきだ」とか「持ったほうがいい」ものではなく、「持たなければいけない」とわざわざ啓蒙するものでもない。", "vn": "→ Suy ra: mục tiêu KHÔNG phải thứ \"nên có\" — vì nói vậy ngụ ý nó là LỰA CHỌN, trong khi nó là điều TẤT YẾU."}, {"jp": "人生のあらゆる局面における「前提」なので、そのことがコンセンサスになっている社会では、目標を持つことについて語られることはないからだ。", "vn": "→ Chốt: mục tiêu là \"ĐIỀU KIỆN TIÊN QUYẾT\" (前提) — nên KHÔNG CẦN nói ra trong xã hội đã có chung nhận thức."}], "chain": "「目標を持つべき」という言い方 = 違和感 (tác giả phản đối)\n　↓ なぜなら\n目標は「前提」であり、選択肢ではない\n　↓ suy ra\nコンセンサスのある社会では語られない (không cần nói ra)", "correctExplainJp": "目標は<b>持っているのが当然</b>である。", "correctExplain": "khớp đúng: mục tiêu là điều TIÊN QUYẾT (前提), nên có nó là điều ĐƯƠNG NHIÊN (当然), không phải lựa chọn."}, {"bai": "BÀI 53", "date": "7/2018 (2)", "passage": "以下は、恥じらい(注)の表情と喜びの表情の違いについて述べた文章である。\n\n心理学者のアゼンドルフは、恥じらいと喜びの表情をいろいろ集めて分析した結果、微笑みが最高潮に達する時期と視線を伏せる時期との微妙なタイミングのズレが鍵であることを突き止めた。すなわち、微笑みがピークに達する一秒ほど前に視線が伏せられると恥じらいの表情として見えるが、ピークに達した直後に目が伏せられるとそれは喜びの表情と判断されるというのだ。試しに、鏡に向かってやってみていただきたい。違いが分かるだろう。\n\n(注) 恥じらい：恥ずかしがること", "source": "", "question": "恥じらいと喜びの表情はどの点で違うか。", "choices": ["微笑みがピークに達するまでの時間が速いか遅いか。", "微笑む直前の視線の動きが上か下か。", "視線を伏せるのが微笑みのピークの前か後か。", "視線を伏せている時間が長いか短いか。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Bài nói rõ: nhìn xuống TRƯỚC khi nụ cười đạt cao điểm = e thẹn; nhìn xuống NGAY SAU khi đạt cao điểm = vui mừng — đúng với C: trước hay sau điểm cao trào của nụ cười.", "wrong": ["A nói về \"tốc độ đạt cao điểm\" — không đúng, bài không so sánh tốc độ, mà so sánh THỜI ĐIỂM cụp mắt xuống so với cao điểm.", "B nói về \"hướng nhìn lên/xuống trước khi cười\" — không có trong bài, bài chỉ nói về việc CỤP MẮT XUỐNG, không nói về hướng nhìn trước đó.", "D nói về \"thời gian cụp mắt dài/ngắn\" — không đúng, bài không so sánh ĐỘ DÀI thời gian cụp mắt, mà so sánh THỜI ĐIỂM xảy ra việc đó."]}, "anchor": "Không có mỏ neo đảo ngược. Câu giữa (すなわち) là câu chốt then chốt, giải thích cụ thể sự khác biệt.", "first": "心理学者のアゼンドルフは…微笑みが最高潮に達する時期と視線を伏せる時期との微妙なタイミングのズレが鍵であることを突き止めた。 → Nêu phát hiện chính: chìa khoá nằm ở độ lệch thời điểm giữa đỉnh điểm nụ cười và lúc cụp mắt.", "last": "試しに、鏡に向かってやってみていただきたい。違いが分かるだろう。 → Câu cuối mời người đọc tự thử trước gương để cảm nhận sự khác biệt.", "link": "Câu giữa (すなわち) là nơi chứa thông tin cốt lõi: cụp mắt TRƯỚC đỉnh điểm = e thẹn; cụp mắt SAU đỉnh điểm = vui mừng. C phản ánh đúng yếu tố phân biệt: thời điểm cụp mắt so với đỉnh điểm nụ cười (trước hay sau).", "traps": [{"label": "A", "tag": "Bẫy lệch yếu tố so sánh", "jp": "微笑みが<b>ピーク</b>に達するまでの<b>時間が速いか遅いか</b>。", "vn": "Bài không so sánh TỐC ĐỘ (速いか遅いか) đạt đỉnh điểm, mà so sánh THỜI ĐIỂM cụp mắt xuống tương đối với đỉnh điểm đó."}, {"label": "B", "tag": "Bẫy thêm chi tiết", "jp": "微笑む直前の<b>視線の動き</b>が<b>上か下か</b>。", "vn": "\"Hướng nhìn lên/xuống\" (上か下か) trước khi cười không có trong bài — bài chỉ nói về việc CỤP MẮT XUỐNG ở các thời điểm khác nhau."}, {"label": "D", "tag": "Bẫy lệch yếu tố so sánh", "jp": "<b>視線を伏せている時間</b>が<b>長いか短いか</b>。", "vn": "Bài không so sánh ĐỘ DÀI thời gian cụp mắt (長いか短いか), mà so sánh THỜI ĐIỂM xảy ra (trước/sau đỉnh điểm)."}], "translate": [{"jp": "微笑みがピークに達する一秒ほど前に視線が伏せられると恥じらいの表情として見えるが、ピークに達した直後に目が伏せられるとそれは喜びの表情と判断されるというのだ。", "vn": "Nếu ánh nhìn cụp xuống khoảng một giây trước khi nụ cười đạt đỉnh điểm, nó sẽ được nhìn nhận là biểu cảm e thẹn; còn nếu mắt cụp xuống ngay sau khi đạt đỉnh điểm, nó sẽ được coi là biểu cảm vui mừng."}, {"jp": "試しに、鏡に向かってやってみていただきたい。違いが分かるだろう。", "vn": "Hãy thử làm điều này trước gương xem. Bạn sẽ nhận ra được sự khác biệt."}], "vocab": [{"term": "突き止める", "reading": "つきとめる", "mean": "tìm ra, xác định được (nguyên nhân/sự thật)"}, {"term": "視線を伏せる", "reading": "しせんをふせる", "mean": "cụp mắt xuống, nhìn xuống"}, {"term": "最高潮に達する", "reading": "さいこうちょうにたっする", "mean": "đạt đến đỉnh điểm, cao trào"}], "anchorWords": ["表情", "心理学者", "微笑", "最高潮", "時期", "視線", "微妙"], "thinking": [{"jp": "心理学者のアゼンドルフは…微笑みが最高潮に達する時期と視線を伏せる時期との微妙なタイミングのズレが鍵であることを突き止めた。", "vn": "→ Phát hiện chính: chìa khoá là ĐỘ LỆCH THỜI ĐIỂM (タイミングのズレ) giữa đỉnh điểm nụ cười và lúc CỤP MẮT (視線を伏せる)."}, {"jp": "すなわち、微笑みがピークに達する一秒ほど前に視線が伏せられると恥じらいの表情として見えるが、ピークに達した直後に目が伏せられるとそれは喜びの表情と判断されるというのだ。", "vn": "→ Suy ra cụ thể: cụp mắt TRƯỚC đỉnh điểm = E THẸN; cụp mắt SAU đỉnh điểm = VUI MỪNG."}], "chain": "鍵 = 微笑みのピークと視線を伏せるタイミングのズレ\n　↓ すなわち\nピークの前に伏せる → 恥じらい\nピークの後に伏せる → 喜び", "correctExplainJp": "視線を伏せるのが微笑みの<b>ピーク</b>の<b>前か後</b>か。", "correctExplain": "khớp đúng yếu tố phân biệt: THỜI ĐIỂM cụp mắt (視線を伏せる) so với ĐỈNH ĐIỂM (ピーク) nụ cười — trước hay sau."}, {"bai": "BÀI 54", "date": "7/2018 (3)", "passage": "「今」の勝負、つまり本番に弱いというひとは、失敗を恐れる気持ちがつよいのだとおもう。誰しも失敗は望まないが、人並み以上に失敗を恐れるのは、皮肉にも精度の高い到達イメージ、完成形が描けている結果だともいえる。完全なものへの願望は融通に欠ける到達のイメージでひとを縛ってしまうので、「今」起こっている現実そのものに合わせていくという柔軟な態度をゆるさない。予定どおりでないにしろ、その場で、なんとかやり過ごせる(注)、間に合わせられる、という行動が本番では求められているのだ。\n\n(注) やり過ごす：ここでは、切り抜ける", "source": "", "question": "筆者によると、本番に弱いひとはどうすればいいか。", "choices": ["事前に描いた完成形にこだわらず、現実に合わせて対応する。", "事前に完成形を描かずに、あらゆる事態に備える。", "到達イメージを意識しつつ、失敗を恐れない気持ちで臨む。", "精度の高い到達イメージに行動を合わせるようにする。"], "correct": 0, "shortFeedback": {"correct": "Đúng! Bài nói: hình ảnh đích đến quá hoàn hảo khiến người ta cứng nhắc, không linh hoạt theo thực tế — vậy cần làm: KHÔNG CỐ CHẤP với hình ảnh hoàn hảo đã vẽ sẵn, mà thích ứng với THỰC TẾ đang diễn ra. Đúng với A.", "wrong": ["B nói \"không vẽ hình ảnh hoàn thiện trước, chuẩn bị mọi tình huống\" — quá tuyệt đối, bài không nói bỏ hẳn việc lên hình dung, mà nói không nên CỐ CHẤP với nó.", "C nói \"vừa ý thức hình ảnh đích đến vừa không sợ thất bại\" — không đúng trọng tâm, bài không đề xuất \"không sợ thất bại\" mà đề xuất linh hoạt theo thực tế.", "D ngược nghĩa hoàn toàn: D nói nên ĐIỀU CHỈNH HÀNH ĐỘNG THEO hình ảnh hoàn hảo — đây chính là vấn đề bài đang phê phán."]}, "anchor": "Không có mỏ neo đảo ngược kiểu しかし rõ, nhưng có 皮肉にも (mỉa mai là) ở giữa bài — chỉ ra nghịch lý: sợ thất bại lại xuất phát từ điều tưởng như tích cực (hình dung rõ ràng, hoàn hảo).", "first": "「今」の勝負、つまり本番に弱いというひとは、失敗を恐れる気持ちがつよいのだとおもう。 → Nêu vấn đề: người yếu khi vào \"trận thật\" thường sợ thất bại mạnh.", "last": "予定どおりでないにしろ、その場で、なんとかやり過ごせる、間に合わせられる、という行動が本番では求められているのだ。 → Câu cuối chốt giải pháp: cần hành động linh hoạt, ứng biến tại chỗ, dù không đúng kế hoạch.", "link": "Vấn đề (sợ thất bại) → nguyên nhân nghịch lý (hình dung hoàn hảo quá mức làm mất linh hoạt) → giải pháp ở câu cuối: cần ứng biến theo thực tế, không cố chấp với hình ảnh hoàn hảo đã định trước. A phản ánh đúng giải pháp này.", "traps": [{"label": "B", "tag": "Bẫy tuyệt đối hoá", "jp": "事前に<b>完成形を描かずに</b>、あらゆる事態に備える。", "vn": "Bài không đề xuất \"bỏ hẳn việc hình dung trước\" — mà nói không nên CỐ CHẤP, CỨNG NHẮC với hình dung đó — B đi quá xa thành phủ nhận hoàn toàn."}, {"label": "C", "tag": "Bẫy lệch giải pháp", "jp": "到達イメージを意識しつつ、<b>失敗を恐れない</b>気持ちで臨む。", "vn": "Bài không nói về việc \"không sợ thất bại\" — mà đề xuất giải pháp là LINH HOẠT thích ứng với thực tế."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "精度の高い到達イメージに<b>行動を合わせる</b>ようにする。", "vn": "Ngược hẳn — D đề xuất điều chỉnh hành động THEO hình ảnh hoàn hảo, đây chính là vấn đề mà bài đang phê phán, không phải giải pháp."}], "translate": [{"jp": "完全なものへの願望は融通に欠ける到達のイメージでひとを縛ってしまうので、「今」起こっている現実そのものに合わせていくという柔軟な態度をゆるさない。", "vn": "Khát khao về sự hoàn hảo trói buộc con người bằng một hình ảnh đích đến cứng nhắc, thiếu linh hoạt, nên không cho phép có một thái độ mềm dẻo để thích ứng với thực tế đang diễn ra ngay lúc này."}, {"jp": "予定どおりでないにしろ、その場で、なんとかやり過ごせる、間に合わせられる、という行動が本番では求められているのだ。", "vn": "Dù không đúng như kế hoạch, hành động cần có khi vào trận thật là biết cách xoay xở, ứng biến ngay tại chỗ để vượt qua tình huống."}], "vocab": [{"term": "皮肉にも", "reading": "ひにくにも", "mean": "mỉa mai là, trớ trêu là"}, {"term": "融通に欠ける", "reading": "ゆうずうにかける", "mean": "thiếu linh hoạt, cứng nhắc"}, {"term": "やり過ごす", "reading": "やりすごす", "mean": "vượt qua, xoay xở qua được tình huống"}], "anchorWords": ["筆者", "本番", "勝負", "失敗", "気持", "予定", "行動", "皮肉"], "thinking": [{"jp": "「今」の勝負、つまり本番に弱いというひとは、失敗を恐れる気持ちがつよいのだとおもう。誰しも失敗は望まないが、人並み以上に失敗を恐れるのは、皮肉にも精度の高い到達イメージ、完成形が描けている結果だともいえる。", "vn": "→ Nghịch lý (皮肉にも): sợ thất bại MẠNH lại xuất phát từ việc đã hình dung QUÁ HOÀN HẢO (精度の高い到達イメージ)."}, {"jp": "完全なものへの願望は融通に欠ける到達のイメージでひとを縛ってしまうので、「今」起こっている現実そのものに合わせていくという柔軟な態度をゆるさない。", "vn": "→ Suy ra: hình dung hoàn hảo TRÓI BUỘC (縛ってしまう) khiến mất LINH HOẠT (柔軟な態度) theo thực tế."}, {"jp": "予定どおりでないにしろ、その場で、なんとかやり過ごせる、間に合わせられる、という行動が本番では求められているのだ。", "vn": "→ Chốt giải pháp: cần hành động ỨNG BIẾN tại chỗ (やり過ごせる), dù không đúng kế hoạch (予定どおりでない)."}], "chain": "失敗を恐れる = 完成形を描きすぎた結果 (nghịch lý)\n　↓ suy ra\n完成形に縛られる → 柔軟性を失う (mất linh hoạt)\n　↓ 解決策\n現実に合わせて対応する (ứng biến theo thực tế)", "correctExplainJp": "事前に描いた<b>完成形</b>にこだわらず、<b>現実</b>に合わせて<b>対応する</b>。", "correctExplain": "khớp đúng giải pháp: không CỐ CHẤP (こだわらず) với hình ảnh HOÀN HẢO đã vẽ sẵn, mà ỨNG BIẾN (対応する) theo THỰC TẾ."}, {"bai": "BÀI 55", "date": "7/2018 (4)", "passage": "日頃の他者とのつきあいでは、相手の一言一言が嘘だと疑ってかかっているわけではない。いちいちそんなふうに接したら失礼にあたる。つまり「性善説」(注)をデフォルト(基本)として相手と接するのが普通だろう。相手の発言は真実だと思ってそれを基準に判断するから、それを嘘だろうと見直すのは難しい。そうすると、仮に多少不自然な言い方やしぐさがあったとしても、そしてそれが実際に嘘の手がかりとして有効であったとしても、見落としてしまう可能性がある。\n\n(注) 性善説：人間は生まれつき善い人だという考え方", "source": "", "question": "見落としてしまう可能性があるのはなぜか。", "choices": ["普通相手は嘘をつかないと思っているから。", "相手を疑うのは失礼だと教えられてきたから。", "嘘かどうかを判断する基準を持つのは難しいから。", "嘘を見つける有効な手がかりが見つからないから。"], "correct": 0, "shortFeedback": {"correct": "Đúng! Bài nói: ta thường mặc định \"đối phương nói thật\" (性善説をデフォルトとして) — chính niềm tin \"người đối diện không nói dối\" này khiến ta dễ BỎ LỠ những dấu hiệu nói dối thực sự. Đúng với A.", "wrong": ["B nói về việc \"được dạy là nghi ngờ thì thất lễ\" — đây chỉ là LÝ DO PHỤ (giải thích vì sao mặc định tin), không phải nguyên nhân trực tiếp dẫn đến bỏ lỡ dấu hiệu nói dối.", "C nói \"khó có tiêu chuẩn để đánh giá nói dối\" — không đúng, bài nói có tiêu chuẩn (tin là thật) nhưng tiêu chuẩn đó khiến ta khó nhận ra khi có nói dối, không phải KHÔNG CÓ tiêu chuẩn.", "D nói \"không tìm được dấu hiệu hiệu quả\" — ngược ý, bài nói dấu hiệu CÓ THỂ TỒN TẠI và CÓ HIỆU QUẢ, nhưng ta vẫn bỏ lỡ vì mặc định tin tưởng, không phải vì thiếu dấu hiệu."]}, "anchor": "Không có mỏ neo đảo ngược. Mạch bài: nêu thói quen giao tiếp thông thường (tin tưởng mặc định) → giải thích hệ quả (khó nhận ra nói dối, dễ bỏ lỡ dấu hiệu).", "first": "日頃の他者とのつきあいでは、相手の一言一言が嘘だと疑ってかかっているわけではない。 → Nêu thói quen giao tiếp: không nghi ngờ từng lời nói của người khác.", "last": "仮に多少不自然な言い方やしぐさがあったとしても…見落としてしまう可能性がある。 → Câu cuối chốt hệ quả: dù có dấu hiệu bất thường, ta vẫn có thể bỏ lỡ.", "link": "Thói quen tin tưởng mặc định (性善説をデフォルト) → khó để xem lại lời nói là dối trá → hệ quả: dễ bỏ lỡ dấu hiệu nói dối dù dấu hiệu đó có thật và hiệu quả. A phản ánh đúng nguyên nhân gốc: niềm tin mặc định rằng đối phương không nói dối.", "traps": [{"label": "B", "tag": "Bẫy lấy lý do phụ làm nguyên nhân chính", "jp": "相手を<b>疑う</b>のは<b>失礼</b>だと教えられてきたから。", "vn": "\"Được dạy nghi ngờ là thất lễ\" chỉ là lý do GIẢI THÍCH cho thói quen tin tưởng, không phải nguyên nhân TRỰC TIẾP dẫn đến việc bỏ lỡ dấu hiệu nói dối."}, {"label": "C", "tag": "Bẫy hiểu sai", "jp": "<b>嘘かどうかを判断する基準</b>を持つのは難しいから。", "vn": "Bài không nói KHÔNG CÓ tiêu chuẩn đánh giá — mà nói tiêu chuẩn ĐANG CÓ (tin là thật) khiến khó nhận ra khi có nói dối."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "<b>嘘を見つける有効な手がかり</b>が見つからないから。", "vn": "Ngược ý — bài nói dấu hiệu nói dối CÓ THỂ tồn tại và hiệu quả, nhưng bị bỏ lỡ vì niềm tin mặc định, không phải vì thiếu dấu hiệu."}], "translate": [{"jp": "つまり「性善説」をデフォルト(基本)として相手と接するのが普通だろう。", "vn": "Nói cách khác, việc lấy \"thuyết tính thiện\" làm nền tảng mặc định khi giao tiếp với người khác có lẽ là điều bình thường."}, {"jp": "仮に多少不自然な言い方やしぐさがあったとしても、そしてそれが実際に嘘の手がかりとして有効であったとしても、見落としてしまう可能性がある。", "vn": "Dù có chút cách nói hay cử chỉ không tự nhiên, và dù đó thực sự là một dấu hiệu hữu hiệu của sự nói dối, ta vẫn có khả năng bỏ qua nó."}], "vocab": [{"term": "性善説", "reading": "せいぜんせつ", "mean": "thuyết tính thiện (con người bản chất là tốt)"}, {"term": "デフォルト", "reading": "デフォルト", "mean": "mặc định, trạng thái cơ bản"}, {"term": "見落とす", "reading": "みおとす", "mean": "bỏ lỡ, nhìn mà không thấy"}], "anchorWords": ["見落", "可能性", "日頃", "他者", "一言一言", "多少不自然", "普通相手"], "thinking": [{"jp": "日頃の他者とのつきあいでは、相手の一言一言が嘘だと疑ってかかっているわけではない。…つまり「性善説」をデフォルト（基本）として相手と接するのが普通だろう。", "vn": "→ Thói quen: KHÔNG nghi ngờ lời người khác — mặc định theo \"THUYẾT TÍNH THIỆN\" (性善説をデフォルト)."}, {"jp": "相手の発言は真実だと思ってそれを基準に判断するから、それを嘘だろうと見直すのは難しい。", "vn": "→ Suy ra: vì TIN lời người khác là THẬT (真実だと思って) làm chuẩn, nên KHÓ xem lại là NÓI DỐI."}, {"jp": "そうすると、仮に多少不自然な言い方やしぐさがあったとしても…見落としてしまう可能性がある。", "vn": "→ Chốt: dù có DẤU HIỆU bất thường, vẫn dễ BỎ LỠ (見落とす) vì niềm tin mặc định đó."}], "chain": "性善説をデフォルトとする (mặc định tin tưởng)\n　↓ suy ra\n相手の発言を真実だと判断 (lấy làm chuẩn)\n　↓ 結果\n嘘の手がかりを見落とす (bỏ lỡ dấu hiệu nói dối)", "correctExplainJp": "<b>普通</b>相手は<b>嘘をつかない</b>と思っているから。", "correctExplain": "khớp đúng nguyên nhân gốc: mặc định TIN (性善説をデフォルト) rằng đối phương KHÔNG nói dối (嘘をつかない)."}, {"bai": "BÀI 56", "date": "12/2021 (1)", "passage": "人をその気(※)にさせようとしているときに、相手が反論されることがあります。むしろ反論されることの方が多いと言えるでしょう。反論されると、それで「ああ、その気がないのか」と諦めてしまう人がいます。しかし、反論されただけで諦めていてはいけません。反論されるということは、承諾してもらうためにクリアすべき点が明らかにされた、ということなのです。むしろプラスに解釈しましょう。反論もせずに去っていってしまう人が最も説得しにくい人です。\n\n(※) その気：そうしようという気持ち", "source": "", "question": "筆者の考えに合うのはどれか。", "choices": ["反論されないように、問題点を解決しておいた方がいい。", "反論されないと言うことは、相手を説得できたということだ。", "反論されたら、相手を説得できる可能性が生まれたと考えていい。", "反論されるということは、相手が承諾したことと同じだと言える。"], "correct": 2, "shortFeedback": {"correct": "Đúng! Bài nói: bị phản đối nghĩa là điểm CẦN GIẢI QUYẾT để đối phương đồng ý đã được LÀM RÕ — nên hãy hiểu theo hướng TÍCH CỰC (むしろプラスに解釈) — đúng với C: phản đối nghĩa là có khả năng thuyết phục được.", "wrong": ["A nói \"nên giải quyết vấn đề trước để tránh bị phản đối\" — không đúng, bài không nói cách TRÁNH bị phản đối, mà nói cách NHÌN NHẬN khi đã bị phản đối.", "B nói \"không bị phản đối = đã thuyết phục được\" — ngược ý, bài nói người KHÔNG phản đối mà bỏ đi mới là người KHÓ thuyết phục nhất.", "D nói \"bị phản đối = đối phương đã đồng ý\" — ngược nghĩa hoàn toàn, phản đối không phải đồng ý, chỉ là dấu hiệu còn cơ hội thuyết phục."]}, "anchor": "Có mỏ neo đảo ngược rõ: 「しかし」— phủ định phản ứng thường gặp (bị phản đối thì bỏ cuộc), dẫn đến cách nhìn tích cực mà tác giả đề xuất.", "first": "反論されると、それで「ああ、その気がないのか」と諦めてしまう人がいます。 → Nêu phản ứng thường gặp: bị phản đối thì cho là đối phương không có ý định, rồi bỏ cuộc.", "last": "反論もせずに去っていってしまう人が最も説得しにくい人です。 → Câu cuối chốt: người KHÔNG phản đối mà lặng lẽ bỏ đi mới là người khó thuyết phục nhất — ngược với suy nghĩ thường gặp.", "link": "しかし đảo ý: phản ứng thường gặp (bị phản đối → bỏ cuộc) bị phủ định → tác giả đề xuất nhìn nhận TÍCH CỰC: phản đối nghĩa là đã có điểm cụ thể cần giải quyết, tức là CÓ KHẢ NĂNG thuyết phục. C phản ánh đúng cách nhìn nhận tích cực này.", "traps": [{"label": "A", "tag": "Bẫy lệch trọng tâm", "jp": "<b>反論されない</b>ように、問題点を<b>解決</b>しておいた方がいい。", "vn": "Bài không nói về cách TRÁNH bị phản đối từ trước — mà nói về cách NHÌN NHẬN khi đã bị phản đối."}, {"label": "B", "tag": "Bẫy ngược nghĩa", "jp": "<b>反論されない</b>と言うことは、相手を<b>説得できた</b>ということだ。", "vn": "Ngược ý — bài nói người KHÔNG phản đối (mà lặng lẽ rời đi) mới là người KHÓ thuyết phục nhất, không phải đã thuyết phục được."}, {"label": "D", "tag": "Bẫy ngược nghĩa", "jp": "反論されるということは、相手が<b>承諾した</b>ことと同じだと言える。", "vn": "Ngược nghĩa hoàn toàn — phản đối là dấu hiệu CHƯA đồng ý, nhưng còn cơ hội, không phải đã đồng ý."}], "translate": [{"jp": "反論されるということは、承諾してもらうためにクリアすべき点が明らかにされた、ということなのです。むしろプラスに解釈しましょう。", "vn": "Việc bị phản đối có nghĩa là điểm cần phải giải quyết để đối phương đồng ý đã được làm sáng tỏ. Vậy nên, hãy hiểu điều đó theo hướng tích cực."}, {"jp": "反論もせずに去っていってしまう人が最も説得しにくい人です。", "vn": "Người không hề phản đối mà chỉ lặng lẽ rời đi mới chính là người khó thuyết phục nhất."}], "vocab": [{"term": "その気にさせる", "reading": "そのきにさせる", "mean": "làm cho ai đó có ý muốn làm việc gì"}, {"term": "反論する", "reading": "はんろんする", "mean": "phản đối, đưa ra ý kiến phản bác"}, {"term": "承諾する", "reading": "しょうだくする", "mean": "đồng ý, chấp thuận"}], "anchorWords": ["筆者", "反論", "説得", "相手", "可能性"], "thinking": [{"jp": "人をその気にさせようとしているときに、相手が反論されることがあります。…反論されると、それで「ああ、その気がないのか」と諦めてしまう人がいます。", "vn": "→ Phản ứng THƯỜNG GẶP: bị PHẢN ĐỐI (反論される) → cho rằng đối phương KHÔNG có ý định, rồi BỎ CUỘC (諦めてしまう)."}, {"jp": "しかし、反論されただけで諦めていてはいけません。反論されるということは、承諾してもらうためにクリアすべき点が明らかにされた、ということなのです。", "vn": "→ しかし đảo ý: bị phản đối nghĩa là ĐIỂM CẦN GIẢI QUYẾT (クリアすべき点) để đối phương ĐỒNG Ý đã được LÀM RÕ (明らかにされた)."}, {"jp": "反論もせずに去っていってしまう人が最も説得しにくい人です。", "vn": "→ Suy ra (ngược lại): người KHÔNG phản đối mà LẶNG LẼ BỎ ĐI mới là người KHÓ thuyết phục NHẤT."}], "chain": "反論される → 諦める人が多い (phản ứng thường gặp)\n　↓ しかし\n反論 = クリアすべき点が明らかになった (tín hiệu tích cực)\n　↓ suy ra ngược lại\n反論せず去る人 = 最も説得しにくい", "correctExplainJp": "反論されたら、相手を<b>説得できる可能性</b>が<b>生まれた</b>と考えていい。", "correctExplain": "khớp đúng cách nhìn TÍCH CỰC: bị phản đối nghĩa là có KHẢ NĂNG (可能性) thuyết phục được, vì điểm cần giải quyết đã rõ."}, {"bai": "BÀI 57", "date": "12/2021 (2)", "passage": "一般的に工具は、とても合理的にデザインされているはずです。その原則は、世界中どこに行っても変わらないようですが、その合理的デザインの結果は、なぜ国によって全然違ってきます。もちろん素材や加工方法の違いがあって、工具の役割自体が違う場合も多いのですが、はさみやのこぎりのように、全く同じ機能、素材であっても民族独特の美意識の違いがくっきり現れます。そのことは、工具も持つ美しさが、必ずしも合理性からだけ生まれるのではないことを示しているように思います。", "source": "", "question": "工具のデザインについて、筆者の考えに合うのはどれか。", "choices": ["民族独特の美意識が、合理的より優先されている。", "民族によって異なる美意識が、素材や加工方法に現れる。", "国による違いは、合理的の追求から生まれる。", "合理性に加え、民族独特の美意識が反映されている。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Câu cuối nói rõ: vẻ đẹp của công cụ KHÔNG CHỈ sinh ra từ tính hợp lý — nghĩa là ngoài hợp lý, còn có ý thức thẩm mỹ riêng của từng dân tộc. Đúng với D: hợp lý + thẩm mỹ dân tộc cùng tồn tại.", "wrong": ["A nói \"thẩm mỹ dân tộc được ưu tiên HƠN hợp lý\" — không đúng, bài không so sánh cái nào quan trọng hơn, chỉ nói cả hai cùng góp phần.", "B nói về việc thẩm mỹ \"thể hiện qua vật liệu/cách gia công\" — sai, bài nói ngay cả khi VẬT LIỆU/CHỨC NĂNG GIỐNG NHAU, thẩm mỹ dân tộc vẫn khác biệt rõ.", "C nói \"sự khác biệt sinh ra từ việc theo đuổi tính hợp lý\" — ngược ý, bài nói sự khác biệt đó đến từ THẨM MỸ DÂN TỘC, không chỉ từ hợp lý."]}, "anchor": "Có mỏ neo đảo ý nhẹ: 「必ずしも合理性からだけ生まれるのではない」— phủ định một phần ý tưởng ban đầu (công cụ chỉ đẹp vì hợp lý), bổ sung yếu tố thẩm mỹ dân tộc.", "first": "一般的に工具は、とても合理的にデザインされているはずです。 → Nêu giả định ban đầu: công cụ được thiết kế hợp lý là điều phổ biến.", "last": "そのことは、工具も持つ美しさが、必ずしも合理性からだけ生まれるのではないことを示しているように思います。 → Câu cuối chốt: vẻ đẹp của công cụ không chỉ từ tính hợp lý, mà còn có yếu tố khác (thẩm mỹ dân tộc).", "link": "Giả định ban đầu (công cụ hợp lý, nguyên tắc giống nhau toàn cầu) → quan sát thực tế (cùng chức năng/vật liệu nhưng thẩm mỹ khác biệt rõ theo dân tộc) → câu cuối kết luận: vẻ đẹp công cụ = hợp lý + thẩm mỹ dân tộc riêng. D phản ánh đúng sự kết hợp này.", "traps": [{"label": "A", "tag": "Bẫy so sánh không có", "jp": "民族独特の美意識が、<b>合理的より優先</b>されている。", "vn": "Bài không nói thẩm mỹ dân tộc ƯU TIÊN HƠN (優先) hợp lý — chỉ nói cả hai YẾU TỐ cùng tồn tại, không so sánh mức độ."}, {"label": "B", "tag": "Bẫy lệch chủ thể biểu hiện", "jp": "民族によって異なる美意識が、<b>素材や加工方法</b>に現れる。", "vn": "Bài nói thẩm mỹ khác biệt RÕ dù VẬT LIỆU/CHỨC NĂNG GIỐNG NHAU — không phải thẩm mỹ \"thể hiện qua\" (現れる) vật liệu/gia công."}, {"label": "C", "tag": "Bẫy ngược nghĩa", "jp": "国による違いは、<b>合理的の追求</b>から生まれる。", "vn": "Ngược ý — bài nói sự khác biệt đến từ THẨM MỸ DÂN TỘC, không phải từ việc THEO ĐUỔI tính hợp lý (合理性の追求)."}], "translate": [{"jp": "はさみやのこぎりのように、全く同じ機能、素材であっても民族独特の美意識の違いがくっきり現れます。", "vn": "Như cái kéo hay cái cưa, dù có cùng chức năng, cùng vật liệu, sự khác biệt trong ý thức thẩm mỹ riêng của từng dân tộc vẫn hiện lên rất rõ."}, {"jp": "そのことは、工具も持つ美しさが、必ずしも合理性からだけ生まれるのではないことを示しているように思います。", "vn": "Điều đó, tôi nghĩ, cho thấy rằng vẻ đẹp của công cụ không hẳn chỉ sinh ra từ tính hợp lý mà thôi."}], "vocab": [{"term": "合理的", "reading": "ごうりてき", "mean": "hợp lý, theo lý tính"}, {"term": "美意識", "reading": "びいしき", "mean": "ý thức thẩm mỹ, gu cái đẹp"}, {"term": "くっきり現れる", "reading": "くっきりあらわれる", "mean": "hiện lên rõ rệt"}], "anchorWords": ["工具", "筆者", "一般的", "合理的", "合理性", "民族独特", "美意識", "反映"], "thinking": [{"jp": "一般的に工具は、とても合理的にデザインされているはずです。その原則は、世界中どこに行っても変わらないようですが、その合理的デザインの結果は、なぜ国によって全然違ってきます。", "vn": "→ Giả định: công cụ được thiết kế HỢP LÝ (合理的), nguyên tắc GIỐNG khắp thế giới — nhưng KẾT QUẢ lại KHÁC NHAU theo từng nước."}, {"jp": "はさみやのこぎりのように、全く同じ機能、素材であっても民族独特の美意識の違いがくっきり現れます。", "vn": "→ Suy ra: dù CÙNG chức năng/vật liệu, THẨM MỸ DÂN TỘC (民族独特の美意識) vẫn khác biệt RÕ."}, {"jp": "そのことは、工具も持つ美しさが、必ずしも合理性からだけ生まれるのではないことを示しているように思います。", "vn": "→ Chốt: vẻ đẹp công cụ KHÔNG CHỈ từ tính HỢP LÝ (合理性) — còn có yếu tố THẨM MỸ riêng."}], "chain": "工具 = 合理的デザイン (nguyên tắc giống nhau)\n　↓ しかし\n結果は国によって違う (kết quả khác nhau)\n　↓ なぜなら\n民族独特の美意識がある (thẩm mỹ dân tộc riêng)\n　↓ 結論\n美しさ = 合理性 + 民族の美意識", "correctExplainJp": "<b>合理性</b>に加え、<b>民族独特の美意識</b>が反映されている。", "correctExplain": "khớp đúng kết luận: vẻ đẹp = HỢP LÝ (合理性) CỘNG THÊM (加え) thẩm mỹ riêng của dân tộc."}, {"bai": "BÀI 58", "date": "12/2021 (3)", "passage": "昔もいまも、才能というのは一定の軌道から飛び出してゆく能力のことで、みんなにそんな例外的な能力が備わっていたら、そもそも大地にはりつく農業も、分業で成り立つ産業社会もあり得ない。\n\nいつの世も、才覚のある者が新しいビジネスを起こしてゆくのは事実だが、それをビジネスとして成立させるのは社員の労働と献身であるし、それがなければ起業者の才覚が活きることもない。", "source": "", "question": "才覚のある人について、この文章ではどのように述べられているか。", "choices": ["優秀な能力を使って、社員を率いてゆく責任がある。", "人並み外れた能力をビジネスに活かすことが必要である。", "誰の助けを借りることもなく、起業を成功に導くことができる。", "他者の支えによって初めて能力をビジネスに活用することができる。"], "correct": 3, "shortFeedback": {"correct": "Đúng! Câu cuối nói rõ: nếu KHÔNG CÓ lao động/cống hiến của nhân viên, tài năng của người sáng lập cũng không phát huy được — đúng với D: cần sự hỗ trợ của người khác mới vận dụng được tài năng.", "wrong": ["A nói về \"trách nhiệm dẫn dắt nhân viên\" — không có trong bài, bài nói ngược lại: nhân viên giúp tài năng đó phát huy, không phải người tài năng dẫn dắt.", "B chỉ nói nửa đầu (cần đưa tài năng vào kinh doanh), bỏ sót điều kiện quan trọng cần sự hỗ trợ từ người khác.", "C ngược nghĩa hoàn toàn: bài nói RÕ không thể thành công nếu thiếu sự hỗ trợ của người khác."]}, "anchor": "Có mỏ neo đảo ý nhẹ: 「が」giữa câu cuối — từ việc khẳng định tài năng cá nhân quan trọng, chuyển sang nhấn mạnh điều kiện cần thiết khác (sự cống hiến của nhân viên).", "first": "昔もいまも、才能というのは一定の軌道から飛び出してゆく能力のことで…そもそも農業も産業社会もあり得ない。 → Nêu định nghĩa về tài năng đặc biệt, hiếm có trong xã hội.", "last": "それをビジネスとして成立させるのは社員の労働と献身であるし、それがなければ起業者の才覚が活きることもない。 → Câu cuối (sau が) chốt: tài năng người sáng lập chỉ phát huy được NHỜ lao động, cống hiến của nhân viên.", "link": "Bài công nhận tài năng cá nhân quan trọng, nhưng が đảo ý: tài năng đó chỉ thành công khi có sự hỗ trợ của người khác (nhân viên) — đây là ý chính. D phản ánh đúng: tài năng cần được hỗ trợ bởi người khác mới phát huy được.", "traps": [{"label": "A", "tag": "Bẫy thêm chi tiết", "jp": "優秀な能力を使って、<b>社員を率いてゆく責任</b>がある。", "vn": "\"Trách nhiệm dẫn dắt nhân viên\" (社員を率いてゆく責任) không có trong bài — bài nói NGƯỢC LẠI, nhân viên giúp tài năng đó phát huy."}, {"label": "B", "tag": "Bẫy thiếu ý", "jp": "<b>人並み外れた能力</b>をビジネスに活かすことが必要である。", "vn": "Chỉ nói nửa đầu, bỏ sót điều kiện cốt lõi: cần có sự HỖ TRỢ của người khác (他者の支え)."}, {"label": "C", "tag": "Bẫy ngược nghĩa", "jp": "<b>誰の助けを借りることもなく</b>、起業を成功に導くことができる。", "vn": "Hoàn toàn ngược ý bài — bài khẳng định rõ KHÔNG THỂ thành công nếu THIẾU sự giúp đỡ của người khác."}], "translate": [{"jp": "いつの世も、才覚のある者が新しいビジネスを起こしてゆくのは事実だが、それをビジネスとして成立させるのは社員の労働と献身である。", "vn": "Ở thời nào cũng vậy, đúng là người có tài năng đặc biệt sẽ khởi xướng những việc kinh doanh mới, nhưng điều khiến nó thực sự thành công lại là lao động và sự cống hiến của nhân viên."}, {"jp": "それがなければ起業者の才覚が活きることもない。", "vn": "Nếu không có điều đó, tài năng của người sáng lập cũng không thể phát huy được."}], "vocab": [{"term": "軌道から飛び出す", "reading": "きどうからとびだす", "mean": "thoát ra khỏi quỹ đạo thông thường"}, {"term": "献身", "reading": "けんしん", "mean": "sự cống hiến, hết lòng vì công việc"}, {"term": "才覚", "reading": "さいかく", "mean": "tài năng, sự nhạy bén đ
