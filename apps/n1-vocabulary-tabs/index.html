<script>

function togP(el){var open=el.parentElement.classList.toggle('open');el.setAttribute('aria-expanded',String(open));}
function tog(id){var el=document.getElementById(id);if(el){var open=el.classList.toggle('open');el.setAttribute('aria-expanded',String(open));}}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function hl(t,q){if(!q||!t)return esc(t);try{return esc(String(t)).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),function(m){return'<mark>'+m+'</mark>';});}catch(e){return esc(t);}}
function ptag(p){var m={'動詞':'v','名詞':'n','形容詞':'adj','副詞':'adv'};return'<span class="ptag '+(m[p]||'oth')+'">'+esc(p||'名詞')+'</span>';}
function sbdg(src){var l={'tettei_m2':'Mon2','tettei_m3':'Mon3','mon1quiz':'Mon1','mon4master':'Mon4★','other':'他'};var c={'tettei_m2':'m2','tettei_m3':'m3','mon1quiz':'m1','mon4master':'m4'};return'<span class="sbdg '+(c[src]||'st')+'">'+esc(l[src]||src||'')+'</span>';}

var C,W,DTP,PTU,PAT,DTG,PRE,CT,C1696,TRANS;
var PAGE_SIZE=96,_visible={c:PAGE_SIZE,w:PAGE_SIZE},_visible1696=PAGE_SIZE;
var _pc='',_pw='',_ren={},_syCache={},_abt=[];

function sw(t,btn){
  document.querySelectorAll('.mtab').forEach(function(b){b.classList.remove('on');b.setAttribute('aria-selected','false');b.tabIndex=-1;});
  btn.classList.add('on');
  btn.setAttribute('aria-selected','true');
  btn.tabIndex=0;
  ['c','s1696','adj','ptu','dtg','ct','pre'].forEach(function(id){
    var p=document.getElementById('pn-'+id);
    if(p)p.classList.toggle('is-hidden',id!==t);
  });
  var sc=document.getElementById('stc'),sw2=document.getElementById('stw');
  var cc2=document.getElementById('ctc'),cw2=document.getElementById('ctw');
  if(sc)sc.classList.toggle('is-hidden',t!=='c');
  if(sw2)sw2.classList.toggle('is-hidden',t!=='w');
  if(cc2)cc2.classList.toggle('is-hidden',t!=='c');
  if(cw2)cw2.classList.toggle('is-hidden',t!=='w');
  if(t==='w'&&!W){
    W=JSON.parse(document.getElementById('d-ww').textContent);
    document.getElementById('vcw').textContent=W.length+' 語';
  }
  if(t==='c'||t==='w')rv(t);
  else if(!_ren[t]){_ren[t]=1;rTab(t);}
}

document.querySelector('.mtabs').addEventListener('keydown',function(event){
  if(['ArrowLeft','ArrowRight','Home','End'].indexOf(event.key)===-1)return;
  var tabs=Array.from(this.querySelectorAll('[role="tab"]'));
  var index=tabs.indexOf(event.target.closest('[role="tab"]'));
  if(index<0)return;
  event.preventDefault();
  var next=event.key==='Home'?0:event.key==='End'?tabs.length-1:(index+(event.key==='ArrowRight'?1:-1)+tabs.length)%tabs.length;
  tabs[next].click();tabs[next].focus();
});

function spos(p,btn,tab){
  if(tab==='c')_pc=p;else _pw=p;
  document.querySelectorAll('#st'+tab+' .stab').forEach(function(b){b.classList.remove('on');b.setAttribute('aria-pressed','false');});
  btn.classList.add('on');btn.setAttribute('aria-pressed','true');rv(tab);
}

function rv(tab,append){
  var isC=(tab==='c'),data=isC?C:(W||[]);
  var q=(document.getElementById('si'+tab).value||'').toLowerCase();
  var pos=isC?_pc:_pw;
  var src=isC?(document.getElementById('fmc').value||''):(document.getElementById('fmw').value||'');
  var exam=isC&&document.getElementById('examc').checked;
  var list=data.filter(function(v){
    var pOk=!pos||(v.p||'名詞')===pos;
    var qOk=!q||(v.k||'').includes(q)||(v.h||'').includes(q)||(v.vi||'').toLowerCase().includes(q)||
      (v.sy||[]).some(function(s){return(s.k||'').includes(q);});
    var sOk=!src||((v.src||'').indexOf(src)>=0)||((v.s2||'').indexOf(src)>=0);
    return pOk&&qOk&&sOk&&(!exam||v.e);
  });
  if(!append)_visible[tab]=PAGE_SIZE;
  var visible=Math.min(_visible[tab]||PAGE_SIZE,list.length);
  var renderList=list.slice(0,visible);
  document.getElementById('vc'+tab).textContent=visible<list.length?visible+' / '+list.length+' 語':list.length+' 語';
  var html='';
  // Mon4★: group by round in order
  if(isC && src==='mon4master'){
    var byRound={},roundOrder=[];
    renderList.forEach(function(v){
      var rnd=v.rnd||'その他';
      if(!byRound[rnd]){byRound[rnd]=[];roundOrder.push(rnd);}
      byRound[rnd].push(v);
    });
    // Sort rounds: 第83回 < 第84回 < 復習①...
    roundOrder.sort(function(a,b){
      var na=parseInt(a.replace(/[^0-9]/g,''))||999;
      var nb=parseInt(b.replace(/[^0-9]/g,''))||999;
      var ia=a.indexOf('復習')>=0?1000+na:na;
      var ib=b.indexOf('復習')>=0?1000+nb:nb;
      return ia-ib;
    });
    var gi=0;
    roundOrder.forEach(function(rnd){
      html+='<div class="round-heading">📚 '+esc(rnd)+' <span>('+byRound[rnd].length+'語)</span></div>';
      byRound[rnd].forEach(function(v){html+=bCard(v,q,true,gi++);});
    });
  } else {
    for(var i=0;i<renderList.length;i++)html+=bCard(renderList[i],q,isC,i);
  }
  document.getElementById('g'+tab).innerHTML=html;
  var more=document.getElementById('more-'+tab);
  if(more)more.innerHTML=visible<list.length?'<button type="button" class="load-more" data-action="load-more" data-list="'+tab+'">Hiển thị thêm '+Math.min(PAGE_SIZE,list.length-visible)+' mục</button>':'';
}

function loadMore(tab){_visible[tab]=(_visible[tab]||PAGE_SIZE)+PAGE_SIZE;rv(tab,true);}

function bCard(v,q,isC,idx){
  var k=v.k||'',h=v.h||'',vi=v.vi||'',pos=v.p||'名詞';
  var uid=(isC?'cc':'cw')+idx;
  var sy=v.sy||_syCache[k]||[];
  var syH='';
  sy.slice(0,3).forEach(function(s){
    if(!s.k)return;
    syH+='<span class="syi'+(s.p?' pri':'')+'"><span class="sw">'+hl(s.k,q)+'</span>'+(s.h?'<span class="sh">'+esc(s.h)+'</span>':'')+(s.m?'<span class="sm">'+esc(s.m)+'</span>':'')+'</span>';
  });
  var co=v.co||[];var coH='';
  co.slice(0,4).forEach(function(c){
    var jp=c.j||'';if(!jp)return;
    coH+='<div class="co-item'+(c.x?' key':c.n?' n1':'')+'"><span class="cjp">'+esc(jp)+(c.x?'<span class="keyb">★</span>':c.n?'<span class="n1b">N1</span>':'')+'</span>'+(c.v?'<div class="cvi">'+esc(c.v)+'</div>':'')+'</div>';
  });
  var refH='';
  (v.r||[]).slice(0,1).forEach(function(r){if(r.m&&r.q)refH+='<span class="refbdg">'+esc(r.m)+' 第'+esc(r.n)+'回 問'+esc(r.q)+'</span>';});
  if(v.rnd)refH+='<span class="refbdg">'+esc(v.rnd)+'</span>';
  var exH='';
  if(v.s){
    var exS=hl(v.s,q);
    if(k)exS=exS.replace(new RegExp('（'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'）','g'),'（<strong>'+k+'</strong>）');
    var cnBadge=v.cn?'<span class="correct-count">✓'+v.cn+'</span>':'';
    exH='<div class="ex-block">'+cnBadge+exS+(v.t?'<div class="ex-vi">= '+esc(v.t)+'</div>':'')+'</div>';
  }
  var wH='';
  if(!isC){
    if(v.m==='M4wrong'&&v.ws){
      // Mon4 wrong format: ✗N sentence → correct word → corrected sentence
      var numBadge=v.num?'✗'+v.num+' ':'✗ ';
      var ws=esc(v.ws);
      if(v.ow)ws=ws.replace(new RegExp(esc(v.ow).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<span class="wrong-word">'+esc(v.ow)+'</span>');
      wH='<div class="wrong-example wrong-example-roomy"><span class="wrong-number">'+numBadge+'</span>'+ws+'</div>';
      wH+='<div class="correction-block">';
      wH+='<div class="correction-title">→「'+esc(k)+'（'+esc(h)+'）」= '+esc(vi)+'</div>';
      if(v.cs){
        var cs=esc(v.cs);
        cs=cs.replace(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<strong class="correct-word">'+k+'</strong>');
        wH+='<div class="corrected-example">→ '+cs+'</div>';
      }
      if(v.ct)wH+='<div class="correction-translation">= '+esc(v.ct)+'</div>';
      wH+='</div>';
    } else {
      if(v.ws){
        var ws=esc(v.ws);
        if(v.ow)ws=ws.replace(new RegExp(esc(v.ow).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<span class="wrong-word">'+esc(v.ow)+'</span>');
        wH='<div class="wrong-example">✗ '+ws+'</div>';
      }
      if(v.os){
        wH+='<div class="correct-answer">→ Đúng: <b>'+esc(k)+'</b>'+(h?'（'+esc(h)+'）':'')+' = '+esc(vi)+'</div>';
      }
      if(v.cop){
        var cs=esc(v.cop);
        if(k)cs=cs.replace(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<strong>'+k+'</strong>');
        wH+='<div class="ex-block">'+cs+(v.ct?'<div class="ex-vi">→ '+esc(v.ct)+'</div>':'')+'</div>';
      }
    }
  }
  return '<div class="card'+(isC?'':' wcard')+'" data-p="'+esc(pos)+'" id="'+uid+'" role="button" tabindex="0" aria-expanded="false" data-action="toggle-card">'+(v.e?'<span class="ebdg">出題済</span>':'')+
    '<div class="wrow"><span class="wk">'+hl(k,q)+'</span>'+(h?'<span class="wh">'+esc(h)+'</span>':'')+ptag(pos)+(h?'<button type="button" class="spk" data-action="speak" data-card-id="'+uid+'" data-speech-text="'+esc(k)+'">Nghe</button>':'')+
    '</div>'+(vi||v.jm?'<div class="vi-row"><span class="vi-b">Nghĩa · '+hl(vi,q)+'</span>'+(v.jm?'<span class="jm-b">'+esc(v.jm)+'</span>':'')+'</div>':'')+
    (syH?'<div class="synb"><div class="synb-l">類義語 · Đồng nghĩa</div><div class="syn-chips">'+syH+'</div></div>':'')+
    (coH?'<div class="co-wrap"><div class="co-l">Cụm từ N1</div><div class="co-list">'+coH+'</div></div>':'')+
    '<div class="detail">'+wH+exH+'<div class="src-row">'+sbdg(v.src||'')+refH+'</div></div></div>';
}

function spk(text,id){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.spk').forEach(function(b){b.classList.remove('sp');});
  var u=new SpeechSynthesisUtterance(text);u.lang='ja-JP';u.rate=0.85;
  var jv=(window.speechSynthesis.getVoices()||[]).find(function(x){return x.lang==='ja-JP'||x.lang.startsWith('ja');});
  if(jv)u.voice=jv;
  var el=document.getElementById(id),btn=el?el.querySelector('.spk'):null;
  if(btn)btn.classList.add('sp');
  u.onend=function(){if(btn)btn.classList.remove('sp');};
  window.speechSynthesis.speak(u);
}
if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}

function rTab(t){
  var el=document.getElementById('pn-'+t);
  if(t==='adj')rADJ(el);
  else if(t==='ptu')rPTU(el);
  else if(t==='dtg')rDTG(el);
  else if(t==='ct')rCT(el);
  else if(t==='pre')rPRE(el);
  else if(t==='s1696')r1696(el);
}

function rADJ(el){
  var h='<div class="tab-content"><div class="tab-search"><input type="text" id="siadj" placeholder="検索..." data-dynamic-filter="adj"><span id="vcadj" class="tab-count">'+DTP.length+' 語</span></div><div class="filter-pills"><button type="button" data-action="adjective-filter" data-adjective-type="all" id="atb-all" class="filter-pill on">すべて</button><button type="button" data-action="adjective-filter" data-adjective-type="adj-i" id="atb-i" class="filter-pill">イ形容詞</button><button type="button" data-action="adjective-filter" data-adjective-type="adj-na" id="atb-na" class="filter-pill">ナ形容詞</button></div><div class="grid" id="adjgrid">';
  DTP.forEach(function(v,i){
    var uid='adj'+i,at=v.p||'adj-i';
    var coH='';(v.co||[]).forEach(function(c){coH+='<div class="co-item n1"><span class="cjp">'+esc(c.j||c.jp||'')+'<span class="n1b">N1</span></span></div>';});
    h+='<div class="card" data-p="形容詞" data-at="'+at+'" id="'+uid+'" role="button" tabindex="0" aria-expanded="false" data-action="toggle-card"><div class="wrow"><span class="wk">'+esc(v.k)+'</span>'+(v.h?'<span class="wh">'+esc(v.h)+'</span>':'')+'<span class="ptag adj">'+(at==='adj-na'?'ナ形':'イ形')+'</span>'+(v.h?'<button type="button" class="spk" data-action="speak" data-card-id="'+uid+'" data-speech-text="'+esc(v.k)+'">Nghe</button>':'')+
    '</div>'+(v.vi?'<div class="vi-row"><span class="vi-b">Nghĩa · '+esc(v.vi)+'</span></div>':'')+(coH?'<div class="co-wrap"><div class="co-l">Cụm từ</div><div class="co-list">'+coH+'</div></div>':'')+'<div class="detail"></div></div>';
  });
  el.innerHTML=h+'</div></div>';
}
var _at='all';
function setAT(t){
  _at=t;
  ['all','i','na'].forEach(function(x){var b=document.getElementById('atb-'+x);if(b)b.classList.remove('on');});
  var id=t==='adj-i'?'i':t==='adj-na'?'na':'all';
  var sel=document.getElementById('atb-'+id);
  if(sel)sel.classList.add('on');
  fAdj();
}
function fAdj(){
  var q=(document.getElementById('siadj')||{}).value||'';q=q.toLowerCase();
  var cnt=0;document.querySelectorAll('#adjgrid .card').forEach(function(c){var at=c.getAttribute('data-at')||'';var ok=(_at==='all'||at===_at)&&(!q||c.textContent.toLowerCase().includes(q));c.style.display=ok?'':'none';if(ok)cnt++;});
  var el=document.getElementById('vcadj');if(el)el.textContent=cnt+' 語';
}

function rPTU(el){
  var cats={'時間':'🕐 Thời gian','突然':'⚡ Đột ngột','程度':'📊 Mức độ','頻度':'🔄 Tần suất','数量':'🔢 Số lượng','行動':'💪 Hành động','感情':'❤️ Cảm xúc','接続':'🔗 Liên kết','批判':'⚠️ Phê phán','その他':'🌟 N1'};
  var h='<div class="tab-content"><div class="tab-search"><input type="text" id="siptu" placeholder="副詞検索..." data-dynamic-filter="ptu"><span id="vcptu" class="tab-count">'+PTU.length+' 語</span></div>';
  h+='<div class="filter-pills"><button type="button" id="ptb-list" data-action="ptu-mode" data-ptu-mode="list" class="filter-pill ptu on">📋 Danh sách</button><button type="button" id="ptb-pat" data-action="ptu-mode" data-ptu-mode="pat" class="filter-pill ptu">🔗 Pattern</button></div>';
  h+='<div id="ptu-content">';
  var bycat={};PTU.forEach(function(v){var c=v.cat||'その他';if(!bycat[c])bycat[c]=[];bycat[c].push(v);});
  Object.keys(cats).forEach(function(c){
    if(!bycat[c]||!bycat[c].length)return;
    h+='<div class="ptu-cat-title">'+esc(cats[c])+' ('+bycat[c].length+')</div>';
    h+='<div class="ptu-grid ptu-grid-spaced">';
    bycat[c].forEach(function(v){

    });

function switchPTU(btn,mode){
  document.querySelectorAll('#ptb-list,#ptb-pat').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  var content=document.getElementById('ptu-content');

  else{
    var h='';

      h+='<div class="pat-h" role="button" tabindex="0" aria-expanded="false" data-action="toggle-panel">';

      h+='<div class="pat-b">';
      g.items.forEach(function(item){
        h+='<div class="pat-row"><div><div class="pw">'+esc(item.k)+'</div>';
        h+='<div class="pvi">Nghĩa · '+esc(item.vi)+'</div>';
        h+='<div class="ppat">'+esc(item.pattern)+'</div></div>';
        h+='<div class="pc">→ '+esc(item.col)+'</div></div>';
      });
      h+='</div></div>';
    });
    content.innerHTML=h;
  }
}
function fPTU(){
  var q=(document.getElementById('siptu')||{}).value||'';q=q.toLowerCase();
  var cnt=0;document.querySelectorAll('.ptu-card').forEach(function(c){var ok=!q||c.textContent.toLowerCase().includes(q);c.style.display=ok?'':'none';if(ok)cnt++;});

function rDTG(el){
  var h='<div class="tab-content"><div class="tab-search"><input type="text" id="sidtg" placeholder="検索..." data-dynamic-filter="dtg"><span id="vcdtg" class="tab-count">—</span></div>';

    h+='<span class="dp">'+esc(g.prefix||gk)+'</span>';
    h+='<span class="dv">'+esc(g.vi_prefix||'')+'</span>';
    h+='<span class="dc">'+g.words.length+'語</span></div>';
    h+='<div class="dtg-b"><table class="dtg-t"><tr><th>動詞</th><th>名詞</th><th>Nghĩa</th></tr>';
    g.words.forEach(function(w){
      h+='<tr><td><span class="dtg-v">'+esc(w.v)+'</span>'+(w.h?'<span class="dtg-kn">（'+esc(w.h)+'）</span>':'')+(w.warn?'<div class="dtg-warn-box">⚠️ '+esc(w.warn)+'</div>':'')+'</td>';
      h+='<td class="dtg-n">'+esc(w.n||'')+'</td>';

    });

function fDTG(){
  var q=(document.getElementById('sidtg')||{}).value||'';q=q.toLowerCase();
  var cnt=0;document.querySelectorAll('#pn-dtg table tr:not(:first-child)').forEach(function(r){var ok=!q||r.textContent.toLowerCase().includes(q);r.style.display=ok?'':'none';if(ok)cnt++;});
  document.getElementById('vcdtg').textContent=cnt+' 語';

function rCT(el){
  var grps={};CT.forEach(function(e){var b=e.body||'';if(!grps[b])grps[b]=[];grps[b].push(e);});
  var h='<div class="tab-content">';
  Object.keys(grps).forEach(function(b){
    h+='<div class="ct-s"><div class="ct-h">'+esc(b)+'</div><div class="ct-chips">';
    grps[b].forEach(function(e){h+='<div class="ct-chip"><div class="ct-col">'+esc(e.col)+'</div>'+(e.vi?'<div class="ct-vi">'+esc(e.vi)+'</div>':'')+'</div>';});
    h+='</div></div>';
  });
  el.innerHTML=h+'</div>';
}

function rPRE(el){
  var pfx=PRE.filter(function(g){return g.t==='prefix';}),sfx=PRE.filter(function(g){return g.t==='suffix';});
  function rG(g,isSfx){
    var preview=(g.w||[]).slice(0,3).map(function(w){return '<span class="pre-preview-word">'+esc(w.k)+'</span>';}).join('');
    var h='<article class="pre-card '+(isSfx?'is-suffix':'is-prefix')+'">';
    h+='<button class="pre-card-head" type="button" data-action="toggle-panel" aria-label="Mở chi tiết '+esc(g.p||'')+'">';
    h+='<span class="pre-symbol">'+esc(g.p||'')+'</span><span class="pre-heading-copy">';
    h+=(g.kn?'<span class="pre-reading">'+esc(g.kn)+'</span>':'');
    h+='<span class="pre-meaning">'+esc(g.vi||'')+'</span></span>';
    h+='<span class="pre-count">'+(g.w||[]).length+'語</span><span class="pre-chevron">⌄</span></button>';
    if(preview)h+='<div class="pre-preview">'+preview+'</div>';
    h+='<div class="pre-b">';
    if(g.nt)h+='<p class="pre-note">'+esc(g.nt)+'</p>';
    if((g.w||[]).length){
      h+='<div class="pre-table-wrap"><table class="pre-table"><tr><th>漢字</th><th>読み</th><th>Nghĩa</th></tr>';
      g.w.forEach(function(w){h+='<tr><td>'+esc(w.k)+'</td><td>'+esc(w.h||'')+'</td><td>'+esc(w.v||'')+'</td></tr>';});
      h+='</table>';
    }
    h+='</div></div></article>';
    return h;
  }
  var h='<div class="pre-layout"><section class="pre-section"><div class="pre-section-head"><div><span class="pre-eyebrow">PREFIXES</span><h2>Tiền tố <span>接頭辞</span></h2></div><strong>'+pfx.length+' nhóm</strong></div><div class="pre-grid">';
  pfx.forEach(function(g){h+=rG(g,false);});
  h+='</div></section><section class="pre-section"><div class="pre-section-head"><div><span class="pre-eyebrow">SUFFIXES</span><h2>Hậu tố <span>接尾辞</span></h2></div><strong>'+sfx.length+' nhóm</strong></div><div class="pre-grid">';
  sfx.forEach(function(g){h+=rG(g,true);});
  el.innerHTML=h+'</div></section></div>';
}

function r1696(el,q){
  q=(q||'').toLowerCase();
  var data=C1696.filter(function(v){return !q||(v.k||'').toLowerCase().includes(q)||(v.h||'').toLowerCase().includes(q)||(v.vi||'').toLowerCase().includes(q)||(v.co||[]).some(function(c){return(c.j||'').toLowerCase().includes(q);});});
  var secs={both:'🔥 Câu luyện + set',only1696:'📝 Câu luyện',onlyCDT:'📌 Set phrase'};
  var grp={both:[],only1696:[],onlyCDT:[]};
  data.forEach(function(v){var s=v.sec||'only1696';if(grp[s])grp[s].push(v);});
  var shown=Math.min(_visible1696,data.length),remaining=shown;
  var h='<div class="tab-content"><div class="tab-search"><input type="text" id="si1696" placeholder="検索..." data-dynamic-filter="1696"><span id="vc1696" class="tab-count">'+(shown<data.length?shown+' / '+data.length:data.length)+' 語</span></div>';
  ['both','only1696','onlyCDT'].forEach(function(sec){
    var allCards=grp[sec];if(!allCards||!allCards.length||remaining<=0)return;
    var cards=allCards.slice(0,remaining);remaining-=cards.length;
    h+='<div class="set-section set-section-'+sec+'">'+secs[sec]+' ('+allCards.length+'語)</div>';
    cards.forEach(function(v,i){
      var uid='p'+sec.replace('only','o').replace('CDT','C')+i;
      var coH='';(v.co||[]).forEach(function(c){coH+='<div class="co-item n1"><span class="cjp">'+esc(c.j||'')+'<span class="n1b">N1</span></span></div>';});
      var optsH='';
      if(v.opts&&v.opts.length){
        optsH='<div class="answer-options">';
        v.opts.forEach(function(o){optsH+='<div class="answer-option"><span>'+o.n+'.</span>'+esc(o.t||'')+'</div>';});
        optsH+='</div>';
      }
      h+='<div class="card set-card" id="'+uid+'" role="button" tabindex="0" aria-expanded="false" data-action="toggle-card"><div class="wrow"><span class="wk">'+esc(v.k)+'</span>'+(v.h?'<span class="wh">'+esc(v.h)+'</span>':'')+ptag(v.p||'名詞')+(v.h?'<button type="button" class="spk" data-action="speak" data-card-id="'+uid+'" data-speech-text="'+esc(v.k)+'">Nghe</button>':'')+
      '</div>'+(v.vi?'<div class="vi-row"><span class="vi-b">Nghĩa · '+esc(v.vi)+'</span></div>':'')+(coH?'<div class="co-wrap"><div class="co-l">🔥 Set</div><div class="co-list">'+coH+'</div></div>':'')+'<div class="detail">'+optsH+'</div></div>';
    });
  });
  if(shown<data.length)h+='<div class="load-row"><button type="button" class="load-more" data-action="more-1696">Hiển thị thêm '+Math.min(PAGE_SIZE,data.length-shown)+' mục</button></div>';
  el.innerHTML=h+'</div>';
  var input=document.getElementById('si1696');if(input){input.value=q;}
}
function f1696(q){_visible1696=PAGE_SIZE;r1696(document.getElementById('pn-s1696'),q);var input=document.getElementById('si1696');if(input){input.focus();input.setSelectionRange(input.value.length,input.value.length);}}
function more1696(){var q=(document.getElementById('si1696')||{}).value||'';_visible1696+=PAGE_SIZE;r1696(document.getElementById('pn-s1696'),q);}

function activateControl(control){
  if(control.matches('[data-tab]')){sw(control.dataset.tab,control);return;}
  if(control.matches('[data-pos]')){spos(control.dataset.pos,control,control.dataset.list);return;}
  var action=control.dataset.action;
  if(action==='toggle-card'){tog(control.id);return;}
  if(action==='toggle-panel'){togP(control);return;}
  if(action==='speak'){spk(control.dataset.speechText,control.dataset.cardId);return;}
  if(action==='load-more'){loadMore(control.dataset.list);return;}
  if(action==='adjective-filter'){setAT(control.dataset.adjectiveType);return;}
  if(action==='ptu-mode'){switchPTU(control,control.dataset.ptuMode);return;}
  if(action==='more-1696')more1696();
}

document.addEventListener('click',function(event){
  var control=event.target.closest('[data-tab],[data-pos],[data-action]');
  if(control)activateControl(control);
});
document.addEventListener('keydown',function(event){
  if(event.key!=='Enter'&&event.key!==' ')return;
  var control=event.target.closest('[data-action="toggle-card"],[data-action="toggle-panel"]');
  if(!control)return;
  event.preventDefault();
  activateControl(control);
});
document.addEventListener('input',function(event){
  var tab=event.target.dataset.filter;
  if(tab){rv(tab);return;}
  var dynamic=event.target.dataset.dynamicFilter;
  if(dynamic==='adj')fAdj();
  else if(dynamic==='ptu')fPTU();
  else if(dynamic==='dtg')fDTG();
  else if(dynamic==='1696')f1696(event.target.value);
});
document.addEventListener('change',function(event){
  if(event.target.dataset.filter)rv(event.target.dataset.filter);
});


function initM4Syn(){
  // Fetch synonyms for Mon4 words that have none
  var need=C.filter(function(v){return(v.src==='mon4master'||v.s2==='mon4master')&&(!v.sy||!v.sy.length);}).slice(0,130);
  if(!need.length)return;
  var batches=[];
  for(var i=0;i<need.length;i+=10)batches.push(need.slice(i,i+10));
  var idx=0;
  function next(){
    if(idx>=batches.length)return;
    var batch=batches[idx++];
    var wl=batch.map(function(v){return v.k+'('+v.h+')='+v.vi;}).join('\n');
    fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:'JLPT N1 synonyms. JSON only: {"r":[{"k":"w","sy":[{"k":"s","h":"h","m":"m"}]}]}.\n'+wl}]})
    }).then(function(r){return r.json();}).then(function(d){
      var txt=d.content&&d.content[0]?d.content[0].text:'';
      var m=txt.match(/\{[\s\S]*\}/);
      if(m){try{var p=JSON.parse(m[0]);(p.r||[]).forEach(function(item){var v=C.find(function(d){return d.k===item.k;});if(v&&item.sy)v.sy=item.sy.map(function(s,i){return{k:s.k,h:s.h||'',m:s.m||'',p:i===0?1:0};});});}catch(e){}}
      setTimeout(next,700);
    }).catch(function(){setTimeout(next,1500);});
  }
  setTimeout(next,8000);
}
function initAPI(){
  var need=C.filter(function(v){return!v.sy||!v.sy.length;}).map(function(v){return v.k;});
  _abt=[];for(var i=0;i<need.length;i+=10)_abt.push(need.slice(i,i+10));
  if(_abt.length)setTimeout(function(){runBatch(0);},3000);
}
function runBatch(idx){
  if(idx>=_abt.length){document.getElementById('abar').classList.remove('show');return;}
  document.getElementById('abar').classList.add('show');
  document.getElementById('atxt').textContent='Tra đồng nghĩa... '+Math.round(idx*100/_abt.length)+'%';
  document.getElementById('afill').style.width=(idx*100/_abt.length)+'%';
  var wl=_abt[idx].map(function(k){var v=C.find(function(d){return d.k===k;});return v?k+'('+(v.h||'')+')='+(v.vi||''):k;}).join('\n');
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,messages:[{role:'user',content:'JLPT N1 synonyms. JSON only: {"r":[{"k":"word","sy":[{"k":"syn","h":"kana","m":"vn≤8words"}]}]}.\n'+wl}]})})
  .then(function(r){return r.json();}).then(function(d){
    var txt=d.content&&d.content[0]?d.content[0].text:'';
    var m=txt.match(/\{[\s\S]*\}/);
    if(m){try{var p=JSON.parse(m[0]);(p.r||[]).forEach(function(item){if(!item.k||!item.sy)return;_syCache[item.k]=item.sy.map(function(s,i){return{k:s.k,h:s.h||'',m:s.m||'',p:i===0?1:0};});var v=C.find(function(d){return d.k===item.k;});if(v)v.sy=_syCache[item.k];});if(!_pc&&!document.getElementById('pn-c').classList.contains('is-hidden'))rv('c');}catch(e){}}
    setTimeout(function(){runBatch(idx+1);},600);
  }).catch(function(){setTimeout(function(){runBatch(idx+1);},1500);});
}

function init(){
  W=[];
  TRANS={};
  rv('c');
  initAPI();
}
init();
