    <option value="mon4master">Mon4★</option>
  </select>
  <label style="font-size:12px;color:#555;display:flex;align-items:center;gap:4px;white-space:nowrap">
    <input type="checkbox" id="examc" onchange="rv('c')"> 出題済
  </label>
  <span class="cnt-lbl" id="vcc">—</span>
</div>
<div class="ctrl" id="ctw" style="display:none">
  <input type="text" id="siw" placeholder="..." oninput="rv('w')">
  <span class="cnt-lbl" id="vcw">—</span>
</div>
<div class="container">
  <div id="pn-c"><div class="grid" id="gc"></div><div class="load-row" id="more-c"></div></div>
  <div id="pn-w" style="display:none"><div class="grid" id="gw"></div></div>
  <div id="pn-s1696" style="display:none"></div>
  <div id="pn-adj"   style="display:none"></div>
  <div id="pn-ptu"   style="display:none"></div>
  <div id="pn-dtg"   style="display:none"></div>
  <div id="pn-ct"    style="display:none"></div>
  <div id="pn-pre"   style="display:none"></div>
</div>
<div class="api-bar" id="abar">
  <div class="spin"></div>
  <span id="atxt">Đang tra từ đồng nghĩa...</span>
  <div class="api-pw"><div class="api-pf" id="afill" style="width:0%"></div></div>
</div>
<script>

function togP(el){var open=el.parentElement.classList.toggle('open');el.setAttribute('aria-expanded',String(open));}
function tog(id){var el=document.getElementById(id);if(el){var open=el.classList.toggle('open');el.setAttribute('aria-expanded',String(open));}}
function cardKey(event,el){if(event.key==='Enter'||event.key===' '){event.preventDefault();tog(el.id);}}
function panelKey(event,el){if(event.key==='Enter'||event.key===' '){event.preventDefault();togP(el);}}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(t,q){if(!q||!t)return esc(t);try{return esc(String(t)).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),function(m){return'<mark>'+m+'</mark>';});}catch(e){return esc(t);}}
function ptag(p){var m={'動詞':'v','名詞':'n','形容詞':'adj','副詞':'adv'};return'<span class="ptag '+(m[p]||'oth')+'">'+esc(p||'名詞')+'</span>';}
function sbdg(src){var l={'tettei_m2':'Mon2','tettei_m3':'Mon3','mon1quiz':'Mon1','mon4master':'Mon4★','other':'他'};var c={'tettei_m2':'m2','tettei_m3':'m3','mon1quiz':'m1','mon4master':'m4'};return'<span class="sbdg '+(c[src]||'st')+'">'+esc(l[src]||src||'')+'</span>';}

var C,W,DTP,PTU,PAT,DTG,PRE,CT,C1696,TRANS;
var PAGE_SIZE=96,_visible={c:PAGE_SIZE,w:PAGE_SIZE},_visible1696=PAGE_SIZE;
var _pc='',_pw='',_ren={},_syCache={},_abt=[];

function sw(t,btn){
  document.querySelectorAll('.mtab').forEach(function(b){b.classList.remove('on');b.setAttribute('aria-selected','false');});
  btn.classList.add('on');
  btn.setAttribute('aria-selected','true');
  ['c','s1696','adj','ptu','dtg','ct','pre'].forEach(function(id){
    var p=document.getElementById('pn-'+id);
    if(p)p.style.display=(id===t)?'':'none';
  });
  var sc=document.getElementById('stc'),sw2=document.getElementById('stw');
  var cc2=document.getElementById('ctc'),cw2=document.getElementById('ctw');
  if(sc)sc.style.display=(t==='c')?'':'none';
  if(sw2)sw2.style.display=(t==='w')?'':'none';
  if(cc2)cc2.style.display=(t==='c')?'':'none';
  if(cw2)cw2.style.display=(t==='w')?'':'none';
  if(t==='w'&&!W){
    W=JSON.parse(document.getElementById('d-ww').textContent);
    document.getElementById('vcw').textContent=W.length+' 語';
  }
  if(t==='c'||t==='w')rv(t);
  else if(!_ren[t]){_ren[t]=1;rTab(t);}
}

function spos(p,btn,tab){
  if(tab==='c')_pc=p;else _pw=p;
  document.querySelectorAll('#st'+tab+' .stab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');rv(tab);
}

function rv(tab,append){
  var isC=(tab==='c'),data=isC?C:(W||[]);
  var q=(document.getElementById('si'+tab).value||'').toLowerCase();
  var pos=isC?_pc:_pw;
  var src=isC?(document.getElementById('fmc').value||''):(document.getElementById('fmw').value||'');
  var exam=isC&&document.getElementById('examc').checked;
  var list=data.filter(function(v){
    var pOk=!pos||(v.p||'名詞')===pos;
    var qOk=!q||(v.k||'').includes(q)||(v.h||'').includes(q)||(v.vi||'').toLowerCase().includes(q)||
      (v.sy||[]).some(function(s){return(s.k||'').includes(q);});
    var sOk=!src||((v.src||'').indexOf(src)>=0)||((v.s2||'').indexOf(src)>=0);
    return pOk&&qOk&&sOk&&(!exam||v.e);
  });
  if(!append)_visible[tab]=PAGE_SIZE;
  var visible=Math.min(_visible[tab]||PAGE_SIZE,list.length);
  var renderList=list.slice(0,visible);
  document.getElementById('vc'+tab).textContent=visible<list.length?visible+' / '+list.length+' 語':list.length+' 語';
  var html='';
  // Mon4★: group by round in order
  if(isC && src==='mon4master'){
    var byRound={},roundOrder=[];
    renderList.forEach(function(v){
      var rnd=v.rnd||'その他';
      if(!byRound[rnd]){byRound[rnd]=[];roundOrder.push(rnd);}
      byRound[rnd].push(v);
    });
    // Sort rounds: 第83回 < 第84回 < 復習①...
    roundOrder.sort(function(a,b){
      var na=parseInt(a.replace(/[^0-9]/g,''))||999;
      var nb=parseInt(b.replace(/[^0-9]/g,''))||999;
      var ia=a.indexOf('復習')>=0?1000+na:na;
      var ib=b.indexOf('復習')>=0?1000+nb:nb;
      return ia-ib;
    });
    var gi=0;
    roundOrder.forEach(function(rnd){
      html+='<div style="grid-column:1/-1;font-size:12px;font-weight:700;color:#fff;background:#3949ab;border-radius:8px;padding:5px 12px;margin-top:8px">📚 '+esc(rnd)+' <span style="font-weight:400;opacity:.8">('+byRound[rnd].length+'語)</span></div>';
      byRound[rnd].forEach(function(v){html+=bCard(v,q,true,gi++);});
    });
  } else {
    for(var i=0;i<renderList.length;i++)html+=bCard(renderList[i],q,isC,i);
  }
  document.getElementById('g'+tab).innerHTML=html;
  var more=document.getElementById('more-'+tab);
  if(more)more.innerHTML=visible<list.length?'<button type="button" class="load-more" onclick="loadMore(\''+tab+'\')">Hiển thị thêm '+Math.min(PAGE_SIZE,list.length-visible)+' mục</button>':'';
}

function loadMore(tab){_visible[tab]=(_visible[tab]||PAGE_SIZE)+PAGE_SIZE;rv(tab,true);}

function bCard(v,q,isC,idx){
  var k=v.k||'',h=v.h||'',vi=v.vi||'',pos=v.p||'名詞';
  var uid=(isC?'cc':'cw')+idx;
  var sy=v.sy||_syCache[k]||[];
  var syH='';
  sy.slice(0,3).forEach(function(s){
    if(!s.k)return;
    syH+='<span class="syi'+(s.p?' pri':'')+'"><span class="sw">'+hl(s.k,q)+'</span>'+(s.h?'<span class="sh">'+esc(s.h)+'</span>':'')+(s.m?'<span class="sm">'+esc(s.m)+'</span>':'')+'</span>';
  });
  var co=v.co||[];var coH='';
  co.slice(0,4).forEach(function(c){
    var jp=c.j||'';if(!jp)return;
    coH+='<div class="co-item'+(c.x?' key':c.n?' n1':'')+'"><span class="cjp">'+esc(jp)+(c.x?'<span class="keyb">★</span>':c.n?'<span class="n1b">N1</span>':'')+'</span>'+(c.v?'<div class="cvi">'+esc(c.v)+'</div>':'')+'</div>';
  });
  var refH='';
  (v.r||[]).slice(0,1).forEach(function(r){if(r.m&&r.q)refH+='<span class="refbdg">'+esc(r.m)+' 第'+esc(r.n)+'回 問'+esc(r.q)+'</span>';});
  if(v.rnd)refH+='<span class="refbdg">'+esc(v.rnd)+'</span>';
  var exH='';
  if(v.s){
    var exS=hl(v.s,q);
    if(k)exS=exS.replace(new RegExp('（'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'）','g'),'（<strong>'+k+'</strong>）');
    var cnBadge=v.cn?'<span style="font-size:11px;font-weight:700;color:#2e7d32;margin-right:4px">✓'+v.cn+'</span>':'';
    exH='<div class="ex-block">'+cnBadge+exS+(v.t?'<div class="ex-vi">= '+esc(v.t)+'</div>':'')+'</div>';
  }
  var wH='';
  if(!isC){
    if(v.m==='M4wrong'&&v.ws){
      // Mon4 wrong format: ✗N sentence → correct word → corrected sentence
      var numBadge=v.num?'✗'+v.num+' ':'✗ ';
      var ws=esc(v.ws);
      if(v.ow)ws=ws.replace(new RegExp(esc(v.ow).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<span style="color:#b71c1c;font-weight:800;text-decoration:line-through">'+esc(v.ow)+'</span>');
      wH='<div style="background:#fff3f3;border:1px solid #ffcdd2;border-radius:8px;padding:7px 11px;font-family:var(--font-sans, var(--portfolio-font-sans));font-size:13px;line-height:1.9;margin-bottom:7px"><span style="font-weight:700;color:#c62828">'+numBadge+'</span>'+ws+'</div>';
      wH+='<div style="background:#fff8f0;border-left:3px solid #e65100;padding:6px 10px;border-radius:0 8px 8px 0;margin-bottom:6px">';
      wH+='<div style="font-size:12px;font-weight:700;color:#e65100;font-family:var(--font-sans, var(--portfolio-font-sans));margin-bottom:4px">→「'+esc(k)+'（'+esc(h)+'）」= '+esc(vi)+'</div>';
      if(v.cs){
        var cs=esc(v.cs);
        cs=cs.replace(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<strong style="color:#1b5e20">'+k+'</strong>');
        wH+='<div style="font-size:13px;font-family:var(--font-sans, var(--portfolio-font-sans));color:#333;line-height:1.9">→ '+cs+'</div>';
      }
      if(v.ct)wH+='<div style="font-size:11.5px;color:#388e3c;font-style:italic;margin-top:3px">= '+esc(v.ct)+'</div>';
      wH+='</div>';
    } else {
      if(v.ws){
        var ws=esc(v.ws);
        if(v.ow)ws=ws.replace(new RegExp(esc(v.ow).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<span style="color:#b71c1c;font-weight:800;text-decoration:line-through">'+esc(v.ow)+'</span>');
        wH='<div style="background:#fff3f3;border:1px solid #ffcdd2;border-radius:8px;padding:6px 10px;font-family:var(--font-sans, var(--portfolio-font-sans));font-size:13px;line-height:1.9;margin-bottom:6px">✗ '+ws+'</div>';
      }
      if(v.os){
        wH+='<div style="font-size:12px;color:#e65100;font-weight:700;margin:4px 0">→ Đúng: <b>'+esc(k)+'</b>'+(h?'（'+esc(h)+'）':'')+' = '+esc(vi)+'</div>';
      }
      if(v.cop){
        var cs=esc(v.cop);
        if(k)cs=cs.replace(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<strong>'+k+'</strong>');
        wH+='<div class="ex-block">'+cs+(v.ct?'<div class="ex-vi">→ '+esc(v.ct)+'</div>':'')+'</div>';
      }
    }
  }
  return '<div class="card'+(isC?'':' wcard')+'" data-p="'+esc(pos)+'" id="'+uid+'" role="button" tabindex="0" aria-expanded="false" onclick="tog(\''+uid+'\')" onkeydown="cardKey(event,this)">'+(v.e?'<span class="ebdg">出題済</span>':'')+
    '<div class="wrow"><span class="wk">'+hl(k,q)+'</span>'+(h?'<span class="wh">'+esc(h)+'</span>':'')+ptag(pos)+(h?'<button class="spk" onclick="event.stopPropagation();spk(\''+k.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+"','"+uid+'\')">Nghe</button>':'')+
    '</div>'+(vi||v.jm?'<div class="vi-row"><span class="vi-b">Nghĩa · '+hl(vi,q)+'</span>'+(v.jm?'<span class="jm-b">'+esc(v.jm)+'</span>':'')+'</div>':'')+
    (syH?'<div class="synb"><div class="synb-l">類義語 · Đồng nghĩa</div><div class="syn-chips">'+syH+'</div></div>':'')+
    (coH?'<div class="co-wrap"><div class="co-l">Cụm từ N1</div><div class="co-list">'+coH+'</div></div>':'')+
    '<div class="detail">'+wH+exH+'<div class="src-row">'+sbdg(v.src||'')+refH+'</div></div></div>';
}

function spk(text,id){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.spk').forEach(function(b){b.classList.remove('sp');});
  var u=new SpeechSynthesisUtterance(text);u.lang='ja-JP';u.rate=0.85;
  var jv=(window.speechSynthesis.getVoices()||[]).find(function(x){return x.lang==='ja-JP'||x.lang.startsWith('ja');});
  if(jv)u.voice=jv;
  var el=document.getElementById(id),btn=el?el.querySelector('.spk'):null;
  if(btn)btn.classList.add('sp');
  u.onend=function(){if(btn)btn.classList.remove('sp');};
  window.speechSynthesis.speak(u);
}
if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}

function rTab(t){
  var el=document.getElementById('pn-'+t);
  if(t==='adj')rADJ(el);
  else if(t==='ptu')rPTU(el);
  else if(t==='dtg')rDTG(el);
  else if(t==='ct')rCT(el);
  else if(t==='pre')rPRE(el);
  else if(t==='s1696')r1696(el);
}

function rADJ(el){
  var h='<div style="padding:8px 0"><div style="display:flex;gap:7px;margin-bottom:9px;align-items:center"><input type="text" id="siadj" placeholder="検索..." oninput="fAdj()" style="flex:1;max-width:280px;padding:6px 10px;border:1.5px solid #d5d2ca;border-radius:8px;font-size:13px;outline:none;font-family:inherit"><span id="vcadj" style="font-size:12px;color:#888;font-weight:600;margin-left:6px">'+DTP.length+' 語</span></div><div style="display:flex;gap:6px;margin-bottom:9px"><button onclick="setAT(\'all\')" id="atb-all" style="padding:4px 12px;border:1.5px solid #4a5aad;border-radius:20px;font-size:12px;cursor:pointer;background:#4a5aad;color:#fff;font-family:inherit">すべて</button><button onclick="setAT(\'adj-i\')" id="atb-i" style="padding:4px 12px;border:1.5px solid #d5d2ca;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:inherit">イ形容詞</button><button onclick="setAT(\'adj-na\')" id="atb-na" style="padding:4px 12px;border:1.5px solid #d5d2ca;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:inherit">ナ形容詞</button></div><div class="grid" id="adjgrid">';
  DTP.forEach(function(v,i){
    var uid='adj'+i,at=v.p||'adj-i';
    var coH='';(v.co||[]).forEach(function(c){coH+='<div class="co-item n1"><span class="cjp">'+esc(c.j||c.jp||'')+'<span class="n1b">N1</span></span></div>';});
    h+='<div class="card" data-p="形容詞" data-at="'+at+'" id="'+uid+'" role="button" tabindex="0" aria-expanded="false" onclick="tog(\''+uid+'\')" onkeydown="cardKey(event,this)"><div class="wrow"><span class="wk">'+esc(v.k)+'</span>'+(v.h?'<span class="wh">'+esc(v.h)+'</span>':'')+'<span class="ptag adj">'+(at==='adj-na'?'ナ形':'イ形')+'</span>'+(v.h?'<button class="spk" onclick="event.stopPropagation();spk(\''+v.k.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+"','"+uid+'\')">Nghe</button>':'')+
    '</div>'+(v.vi?'<div class="vi-row"><span class="vi-b">Nghĩa · '+esc(v.vi)+'</span></div>':'')+(coH?'<div class="co-wrap"><div class="co-l">Cụm từ</div><div class="co-list">'+coH+'</div></div>':'')+'<div class="detail"></div></div>';
  });
  el.innerHTML=h+'</div></div>';
}
var _at='all';
function setAT(t){
  _at=t;
  ['all','i','na'].forEach(function(x){var b=document.getElementById('atb-'+x);if(b){b.style.background='#fff';b.style.color='#555';b.style.borderColor='#d5d2ca';}});
  var id=t==='adj-i'?'i':t==='adj-na'?'na':'all';
  var sel=document.getElementById('atb-'+id);
  if(sel){sel.style.background='#4a5aad';sel.style.color='#fff';sel.style.borderColor='#4a5aad';}
  fAdj();
}
function fAdj(){
  var q=(document.getElementById('siadj')||{}).value||'';q=q.toLowerCase();
  var cnt=0;document.querySelectorAll('#adjgrid .card').forEach(function(c){var at=c.getAttribute('data-at')||'';var ok=(_at==='all'||at===_at)&&(!q||c.textContent.toLowerCase().includes(q));c.style.display=ok?'':'none';if(ok)cnt++;});
  var el=document.getElementById('vcadj');if(el)el.textContent=cnt+' 語';
}

function rPTU(el){
  var cats={'時間':'🕐 Thời gian','突然':'⚡ Đột ngột','程度':'📊 Mức độ','頻度':'🔄 Tần suất','数量':'🔢 Số lượng','行動':'💪 Hành động','感情':'❤️ Cảm xúc','接続':'🔗 Liên kết','批判':'⚠️ Phê phán','その他':'🌟 N1'};
  var h='<div style="padding:8px 0"><div style="display:flex;gap:7px;margin-bottom:9px;align-items:center"><input type="text" id="siptu" placeholder="副詞検索..." oninput="fPTU()" style="flex:1;max-width:280px;padding:6px 10px;border:1.5px solid #d5d2ca;border-radius:8px;font-size:13px;outline:none;font-family:inherit"><span id="vcptu" style="font-size:12px;color:#888;font-weight:600;margin-left:6px">'+PTU.length+' 語</span></div>';
  h+='<div style="display:flex;gap:6px;margin-bottom:10px"><button id="ptb-list" onclick="switchPTU(this,\'list\')" style="padding:4px 12px;border:1.5px solid #6a1b9a;border-radius:20px;font-size:12px;cursor:pointer;background:#6a1b9a;color:#fff;font-family:inherit">📋 Danh sách</button><button id="ptb-pat" onclick="switchPTU(this,\'pat\')" style="padding:4px 12px;border:1.5px solid #d5d2ca;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:inherit">🔗 Pattern</button></div>';
  h+='<div id="ptu-content">';
  var bycat={};PTU.forEach(function(v){var c=v.cat||'その他';if(!bycat[c])bycat[c]=[];bycat[c].push(v);});
  Object.keys(cats).forEach(function(c){
    if(!bycat[c]||!bycat[c].length)return;
    h+='<div style="font-size:12px;font-weight:700;color:#4a148c;text-transform:uppercase;padding:6px 0 4px;border-bottom:2px solid #e8e0f0;margin-bottom:7px;margin-top:13px">'+esc(cats[c])+' ('+bycat[c].length+')</div>';
    h+='<div class="ptu-grid" style="margin-bottom:12px">';
    bycat[c].forEach(function(v){
      h+='<div class="ptu-card'+(v.n?' n1-exam':'')+'"><div class="ptu-k">'+esc(v.k)+(v.n?'<span style="font-size:9px;background:#e65100;color:#fff;padding:1px 4px;border-radius:3px;margin-left:4px;font-weight:700">N1</span>':'')+'</div>'+(v.vi?'<div class="ptu-vi">Nghĩa · '+esc(v.vi)+'</div>':'')+(v.col?'<div class="ptu-col">→ '+esc(v.col)+'</div>':'')+(v.pat?'<div style="font-size:11px;color:#6a1b9a;background:#f3e5f5;border-radius:4px;padding:2px 6px;margin-top:3px;display:inline-block;font-family:var(--font-sans, var(--portfolio-font-sans));font-weight:600">'+esc(v.pat)+'</div>':'')+'</div>';
    });
    h+='</div>';
  });
  h+='</div></div>';
  el.innerHTML=h;
}
function switchPTU(btn,mode){
  document.querySelectorAll('#ptb-list,#ptb-pat').forEach(function(b){b.style.background='#fff';b.style.color='#555';b.style.borderColor='#d5d2ca';});
  btn.style.background='#6a1b9a';btn.style.color='#fff';btn.style.borderColor='#6a1b9a';
  var content=document.getElementById('ptu-content');
  if(!content)return;
  if(mode==='list'){rPTU(document.getElementById('pn-ptu'));}
  else{
    var h='';
    PAT.forEach(function(g){
      var col=g.color||'#4a148c';
      h+='<div style="margin-bottom:13px;background:#fff;border-radius:12px;border:1px solid #e5e2d8;overflow:hidden">';
      h+='<div role="button" tabindex="0" aria-expanded="false" style="background:'+col+';color:#fff;padding:9px 13px;cursor:pointer;display:flex;align-items:center;gap:10px" onclick="togP(this)" onkeydown="panelKey(event,this)">';

function initM4Syn(){
  // Fetch synonyms for Mon4 words that have none
  var need=C.filter(function(v){return(v.src==='mon4master'||v.s2==='mon4master')&&(!v.sy||!v.sy.length);}).slice(0,130);
  if(!need.length)return;
  var batches=[];
  for(var i=0;i<need.length;i+=10)batches.push(need.slice(i,i+10));
  var idx=0;
  function next(){
    if(idx>=batches.length)return;
    var batch=batches[idx++];
    var wl=batch.map(function(v){return v.k+'('+v.h+')='+v.vi;}).join('\n');
    fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:'JLPT N1 synonyms. JSON only: {"r":[{"k":"w","sy":[{"k":"s","h":"h","m":"m"}]}]}.\n'+wl}]})
    }).then(function(r){return r.json();}).then(function(d){
      var txt=d.content&&d.content[0]?d.content[0].text:'';
      var m=txt.match(/\{[\s\S]*\}/);
      if(m){try{var p=JSON.parse(m[0]);(p.r||[]).forEach(function(item){var v=C.find(function(d){return d.k===item.k;});if(v&&item.sy)v.sy=item.sy.map(function(s,i){return{k:s.k,h:s.h||'',m:s.m||'',p:i===0?1:0};});});}catch(e){}}
      setTimeout(next,700);
    }).catch(function(){setTimeout(next,1500);});
  }
  setTimeout(next,8000);
}

  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,messages:[{role:'user',content:'JLPT N1 synonyms. JSON only: {"r":[{"k":"word","sy":[{"k":"syn","h":"kana","m":"vn≤8words"}]}]}.\n'+wl}]})})
  .then(function(r){return r.json();}).then(function(d){

}
