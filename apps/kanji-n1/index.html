<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N1 漢字読み</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=Be+Vietnam+Pro:wght@400;500;600&display=swap');
:root{
  --ink:#1a1a2e;--paper:#f0f4ff;--card:#fff;--red:#e53935;--green:#2e7d32;
  --muted:#546e7a;--border:#cfd8dc;--gold:#f57f17;--shadow:0 3px 16px rgba(0,0,0,.09);
  --blue:#1565c0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4ff;color:var(--ink);font-family:'Be Vietnam Pro','Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;background:linear-gradient(135deg,#1a237e 0%,#283593 60%,#1565c0 100%);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.3);}
header h1{font-family:'Noto Serif JP',serif;font-size:1.1rem;letter-spacing:.05em;}
header span{font-size:.8rem;color:#b0a898;}
.container{width:100%;max-width:720px;padding:24px 16px 60px;}

/* MENU */
#screen-menu{text-align:center;}
#screen-menu h2{font-family:'Noto Serif JP',serif;font-size:1.7rem;margin-bottom:5px;}
#screen-menu p{color:var(--muted);font-size:.88rem;margin-bottom:24px;}
.section-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:9px;text-align:left;}
.round-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:18px;}
.round-btn{background:var(--card);border:2px solid var(--border);border-radius:9px;padding:9px 3px;cursor:pointer;transition:all .15s;text-align:center;}
.round-btn:hover{border-color:var(--ink);}
.round-btn.active{border-color:var(--ink);background:var(--ink);color:#f7f3ee;}
.round-btn .rb-num{font-family:'Noto Serif JP',serif;font-size:.88rem;font-weight:700;display:block;margin-bottom:1px;}
.round-btn .rb-count{font-size:.62rem;color:var(--muted);}
.round-btn.active .rb-count{color:#b0a898;}
.special-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.special-btn{background:var(--card);border:2px solid var(--border);border-radius:9px;padding:12px;cursor:pointer;text-align:center;font-size:.86rem;font-weight:600;transition:all .15s;}
.special-btn:hover{border-color:var(--ink);}
.special-btn.active{border-color:var(--red);background:var(--red);color:white;}
.start-btn{background:linear-gradient(135deg,#e53935,#c62828);color:white;border:none;border-radius:11px;padding:13px 48px;font-size:.98rem;font-weight:600;cursor:pointer;letter-spacing:.04em;box-shadow:0 3px 10px rgba(229,57,53,.4);}
.start-btn:hover{opacity:.88;}
.stats-row{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:.8rem;color:var(--muted);}
.stat-chip strong{color:var(--ink);}
.continue-banner{background:var(--card);border:2px solid var(--gold);border-radius:11px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.cb-text{font-size:.84rem;}.cb-text strong{color:var(--gold);}
.cb-btn{background:var(--gold);color:white;border:none;border-radius:7px;padding:6px 13px;font-size:.78rem;font-weight:600;cursor:pointer;}

/* QUIZ — đề thi style */
#screen-quiz{display:none;}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.quiz-round{font-family:'Noto Serif JP',serif;font-size:.9rem;font-weight:700;color:#283593;}
.quiz-score{font-size:.82rem;color:var(--muted);}
.progress-wrap{height:4px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#e53935,#e91e63);border-radius:2px;transition:width .35s ease;}

/* câu hỏi */
.question-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 22px 20px;box-shadow:var(--shadow);margin-bottom:16px;}
.q-number-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.q-number{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.speak-btn{
  background:none;border:1.5px solid var(--border);border-radius:8px;
  padding:5px 8px;cursor:pointer;color:var(--muted);display:flex;align-items:center;
  transition:all .18s;line-height:0;
}
.speak-btn:hover{border-color:var(--blue);color:var(--blue);background:#eef4ff;}
.speak-btn.speaking{border-color:var(--red);color:var(--red);background:#fdf0ef;animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

.q-sentence{font-family:'Noto Sans JP',sans-serif;font-size:1.08rem;line-height:1.8;color:var(--ink);margin-bottom:18px;}
.q-sentence .underline{text-decoration:underline;text-underline-offset:3px;font-weight:700;font-family:'Noto Serif JP',serif;font-size:1.3rem;color:#e53935;}
.q-instruction{font-size:.75rem;color:var(--muted);border-top:1px solid var(--border);padding-top:10px;font-family:'Noto Sans JP',sans-serif;}

/* 4 choices */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.choice{background:var(--card);border:2px solid var(--border);border-radius:11px;padding:14px 16px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:10px;text-align:left;}
.choice:hover:not(.disabled){border-color:#888;background:#f9f6f1;transform:translateY(-1px);}
.choice.disabled{cursor:default;}
.choice-num{width:26px;height:26px;border-radius:50%;background:#f0ebe4;color:var(--muted);font-size:.82rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;}
.choice-text{font-family:'Noto Sans JP',sans-serif;font-size:1rem;color:var(--ink);}
/* states */
.choice.selected{border-color:var(--ink);background:#eef;}
.choice.correct{border-color:#2e7d32!important;background:linear-gradient(135deg,#e8f5e9,#f1f8e9)!important;}
.choice.correct .choice-num{background:var(--green);color:white;}
.choice.wrong-pick{border-color:#e53935!important;background:linear-gradient(135deg,#fff3f3,#fce4ec)!important;}
.choice.wrong-pick .choice-num{background:var(--red);color:white;}
.choice.reveal-correct{border-color:#2e7d32!important;background:linear-gradient(135deg,#e8f5e9,#f1f8e9)!important;}
.choice.reveal-correct .choice-num{background:var(--green);color:white;}

/* info panel - collocations + synonyms */
.info-panel{
  display:none;
  margin-bottom:12px;
  border-radius:12px;
  overflow:hidden;
  border:1.5px solid #c5cae9;
}
.info-section{padding:10px 14px;}
.info-col{background:linear-gradient(135deg,#e3f2fd,#e8eaf6);}
.info-syn{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border-top:1px solid #c8e6c9;}
.info-label{
  font-size:.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:5px;
}
.info-col .info-label{color:#1565c0;}
.info-syn .info-label{color:#2e7d32;}
.col-list{display:flex;flex-direction:column;gap:4px;}
.col-item{
  font-family:'Noto Sans JP',sans-serif;font-size:.82rem;
  color:#1a237e;line-height:1.55;
}
.col-item .col-jp{font-weight:600;}
.col-item .col-vi{color:#455a64;font-size:.78rem;}
.syn-chips{display:flex;flex-wrap:wrap;gap:5px;}
.syn-chip{
  background:#fff;color:#2e7d32;border:1.5px solid #81c784;
  border-radius:20px;padding:3px 10px;
  font-family:'Noto Sans JP',sans-serif;font-size:.8rem;font-weight:600;
}

/* feedback strip */
.feedback-strip{border-radius:10px;padding:12px 16px;margin-bottom:14px;display:none;font-size:.88rem;}
.feedback-strip.correct{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border:1.5px solid #2e7d32;display:block;color:#2e7d32;}
.feedback-strip.wrong{background:linear-gradient(135deg,#fff3f3,#fce4ec);border:1.5px solid #e53935;display:block;color:#e53935;}
.feedback-strip .fb-meaning{color:#333;font-size:.84rem;margin-top:4px;font-family:'Noto Sans JP',sans-serif;}

.btn-next{width:100%;background:var(--ink);color:white;border:none;border-radius:10px;padding:13px;font-size:.96rem;font-weight:600;cursor:pointer;display:none;margin-top:4px;}
.btn-next:hover{opacity:.86;}

/* RESULT */
#screen-result{display:none;text-align:center;}
.result-score{font-family:'Noto Serif JP',serif;font-size:3.6rem;font-weight:700;color:#1565c0;line-height:1;margin:16px 0 3px;}
.result-label{font-size:.88rem;color:var(--muted);margin-bottom:22px;}
.result-breakdown{display:flex;gap:12px;justify-content:center;margin-bottom:22px;}
.rb-chip{padding:8px 16px;border-radius:9px;font-size:.88rem;font-weight:600;}
.rb-correct{background:#edf7f1;color:var(--green);}
.rb-wrong{background:#fdf0ef;color:var(--red);}
.review-list{text-align:left;margin-bottom:22px;}
.review-list h3{font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
.review-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;}
.ri-kanji{font-family:'Noto Serif JP',serif;font-size:1.25rem;font-weight:700;min-width:42px;padding-top:2px;}
.ri-info{flex:1;}
.ri-reading{font-family:'Noto Sans JP',sans-serif;font-size:.88rem;font-weight:600;color:var(--ink);}
.ri-meaning{font-size:.76rem;color:var(--muted);}
.ri-yours{font-size:.72rem;text-align:right;min-width:80px;padding-top:2px;}
.ri-yours .wrong-ans{color:var(--red);}
.ri-yours .correct-ans{color:var(--green);}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.result-btns button{padding:11px 20px;border-radius:9px;font-size:.88rem;font-weight:600;cursor:pointer;}
.btn-retry{background:var(--red);color:white;border:none;}
.btn-menu-back{background:transparent;border:2px solid var(--ink);color:var(--ink);}
.btn-wrong-only{background:var(--ink);color:white;border:none;}
@media(max-width:480px){.choices{grid-template-columns:1fr;}.round-grid{grid-template-columns:repeat(4,1fr);}}
</style>
</head>
<body>
<header>
  <h1>🈷 JLPT N1 漢字読み</h1>
  <span id="header-stats">—</span>
</header>
<div class="container">

<!-- MENU -->
<div id="screen-menu">
  <h2>漢字読み Quiz</h2>
  <p>___の言葉の読み方として最もよいものを、１・２・３・４から一つ選びなさい。</p>
  <div id="continue-banner" class="continue-banner" style="display:none">
    <div class="cb-text">Tiếp tục từ <strong id="cb-label"></strong></div>
    <button class="cb-btn" onclick="continueSession()">Tiếp tục ▶</button>
  </div>
  <div class="section-label">Chọn đề (có thể chọn nhiều)</div>
  <div class="round-grid" id="round-grid"></div>
  <div class="section-label">Hoặc chọn bộ đặc biệt</div>
  <div class="special-btns">
    <button class="special-btn" id="btn-all" onclick="selectSpecial('all')">📚 Tất cả theo thứ tự</button>
    <button class="special-btn" id="btn-wrong" onclick="selectSpecial('wrong')">❌ Từ sai lần trước</button>
  </div>
  <button class="start-btn" onclick="startQuiz(false)">始める　▶</button>
  <div class="stats-row">
    <div class="stat-chip">Tổng: <strong id="stat-total">0</strong> từ</div>
    <div class="stat-chip">Đã đúng: <strong id="stat-correct-ever">0</strong></div>
    <div class="stat-chip">Cần ôn: <strong id="stat-wrong-ever">0</strong></div>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz">
  <div class="quiz-header">
    <span class="quiz-round" id="q-round-label"></span>
    <span class="quiz-score" id="q-score">✓ 0　✗ 0</span>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <div class="question-box">
    <div class="q-number-row">
      <div class="q-number" id="q-number">問題 1</div>
      <button class="speak-btn" id="speak-btn" onclick="speakCurrent()" title="Phát âm câu hỏi">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
    </div>
    <div class="q-sentence" id="q-sentence"></div>
    <div class="q-instruction">___の言葉の読み方として最もよいものを、１・２・３・４から一つ選びなさい。</div>
  </div>

  <div class="choices" id="choices-grid"></div>
  <div class="feedback-strip" id="feedback-strip"></div>
<div class="info-panel" id="info-panel">
  <div class="info-section info-col">
    <div class="info-label">🔗 Cụm hay dùng</div>
    <div class="col-list" id="col-list"></div>
  </div>
  <div class="info-section info-syn">
    <div class="info-label">≈ Đồng nghĩa</div>
    <div class="syn-chips" id="syn-chips"></div>
  </div>
</div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題 ▶</button>
</div>

<!-- RESULT -->
<div id="screen-result">
  <p style="color:var(--muted);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;margin-top:10px">結果</p>
  <div class="result-score" id="res-score"></div>
  <div class="result-label" id="res-label"></div>
  <div class="result-breakdown">
    <div class="rb-chip rb-correct" id="res-correct"></div>
    <div class="rb-chip rb-wrong" id="res-wrong"></div>
  </div>
  <div class="review-list" id="review-list"></div>
  <div class="result-btns">
    <button class="btn-retry" onclick="retryQuiz()">Làm lại</button>
    <button class="btn-wrong-only" id="btn-wrong-only" onclick="wrongOnly()">Ôn từ sai</button>
    <button class="btn-menu-back" onclick="goMenu()">Menu</button>
  </div>
</div>

</div>
<script>

// ══════════════════════════════════════
// DATA — đúng thứ tự đề, kèm 3 nhiễu
// wrong: [w1,w2,w3] — 3 đáp án sai dùng để trộn

let selRounds=new Set();
let specialMode=null;
let session={queue:[],idx:0,correct:0,wrong:0,answers:[]};
let allWrong=JSON.parse(localStorage.getItem('jlpt_wrong')||'[]');
let allCorrect=JSON.parse(localStorage.getItem('jlpt_correct')||'[]');
let savedSession=JSON.parse(localStorage.getItem('jlpt_session')||'null');

// ── Build menu ──
function buildMenu(){
  const g=document.getElementById('round-grid');
  g.innerHTML='';
  ROUNDS.forEach(ri=>{
    const cnt=VOCAB.filter(v=>v.round===ri.id).length;
    const btn=document.createElement('button');
    btn.className='round-btn';btn.dataset.id=ri.id;
    btn.innerHTML=`<span class="rb-num">${ri.label}</span><span class="rb-count">${cnt}từ</span>`;
    btn.onclick=()=>toggleRound(ri.id,btn);
    g.appendChild(btn);
  });
  updateStats();
  if(savedSession&&savedSession.queue&&savedSession.idx<savedSession.queue.length){
    const q=savedSession.queue[savedSession.idx];
    const lbl=q?(q.round===25?'復習問題':`第${q.round}回`):'';
    document.getElementById('cb-label').textContent=`${lbl} câu ${savedSession.idx+1}/${savedSession.queue.length}`;
    document.getElementById('continue-banner').style.display='flex';
  }
}

function toggleRound(id,btn){
  document.getElementById('btn-all').classList.remove('active');
  document.getElementById('btn-wrong').classList.remove('active');
  specialMode=null;
  if(selRounds.has(id)){selRounds.delete(id);btn.classList.remove('active');}
  else{selRounds.add(id);btn.classList.add('active');}
}

function selectSpecial(mode){
  specialMode=mode;selRounds.clear();
  document.querySelectorAll('.round-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-all').classList.toggle('active',mode==='all');
  document.getElementById('btn-wrong').classList.toggle('active',mode==='wrong');
}

function getPool(){
  if(specialMode==='wrong'){
    const p=VOCAB.filter(v=>allWrong.includes(v.k));
    return p.length?p:VOCAB;
  }
  const src=selRounds.size>0?VOCAB.filter(v=>selRounds.has(v.round)):VOCAB;
  return src.slice().sort((a,b)=>a.round!==b.round?a.round-b.round:a.order-b.order);
}

function updateStats(){
  document.getElementById('stat-total').textContent=VOCAB.length;
  document.getElementById('stat-correct-ever').textContent=allCorrect.length;
  document.getElementById('stat-wrong-ever').textContent=allWrong.length;
  document.getElementById('header-stats').textContent=allCorrect.length+' từ đã học';
}

// ── Quiz ──
function startQuiz(fromSaved){
  if(fromSaved&&savedSession){session=savedSession;}
  else{
    const pool=getPool();
    session={queue:pool,idx:0,correct:0,wrong:0,answers:[]};
    localStorage.setItem('jlpt_session',JSON.stringify(session));
  }
  showScreen('quiz');renderQuestion();
}

function continueSession(){startQuiz(true);}

function shuffle4(correct,wrong3){
  const opts=[{text:correct,isCorrect:true},...wrong3.map(w=>({text:w,isCorrect:false}))];
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  return opts;
}

// ── Speech ──
let _voicesLoaded = false;
function _loadVoices(){
  return new Promise(resolve => {
    const voices = window.speechSynthesis.getVoices();
    if(voices.length){ resolve(voices); return; }
    window.speechSynthesis.onvoiceschanged = () => resolve(window.speechSynthesis.getVoices());
  });
}

function speakJapanese(text, btn){
  if(!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('speaking'));
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ja-JP';
  utterance.rate = 0.9;
  utterance.pitch = 1;
  utterance.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const japaneseVoice = voices.find(v => v.lang === 'ja-JP' || v.lang.startsWith('ja'));
  if(japaneseVoice) utterance.voice = japaneseVoice;
  // animate button
  const activeBtn = btn || document.getElementById('speak-btn');
  if(activeBtn){ activeBtn.classList.add('speaking'); }
  utterance.onend = () => { if(activeBtn) activeBtn.classList.remove('speaking'); };
  utterance.onerror = () => { if(activeBtn) activeBtn.classList.remove('speaking'); };
  window.speechSynthesis.speak(utterance);
}

function speakCurrent(){
  const q = session.queue[session.idx];
  if(!q) return;
  // strip HTML tags from the sentence
  const raw = q.ex.replace(/<[^>]+>/g,'').replace(/<k>(.*?)<\/k>/g,'$1');
  speakJapanese(raw);
}

// preload voices on page load
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function renderQuestion(){
  const q=session.queue[session.idx];
  const tot=session.queue.length;
  // header
  const rLabel=q.round===25?`復習問題`:`第${q.round}回`;
  document.getElementById('q-round-label').textContent=`${rLabel}　問${q.order}　／　${session.idx+1}/${tot}`;
  document.getElementById('q-score').textContent=`✓ ${session.correct}　✗ ${session.wrong}`;
  document.getElementById('progress-fill').style.width=`${(session.idx/tot)*100}%`;
  // sentence: replace <k>word</k> with underline span
  const sentence=q.ex.replace(/<k>(.*?)<\/k>/g,'<span class="underline">$1</span>');
  document.getElementById('q-number').textContent=`問題 ${session.idx+1}`;
  document.getElementById('q-sentence').innerHTML=sentence;
  // reset info panel
  const infoPanel=document.getElementById('info-panel');
  if(infoPanel) infoPanel.style.display='none';
  // reset speak button state
  const spkBtn = document.getElementById('speak-btn');
  if(spkBtn) spkBtn.classList.remove('speaking');
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  // choices
  const opts=shuffle4(q.r,q.wrong);
  const grid=document.getElementById('choices-grid');
  grid.innerHTML='';
  opts.forEach((opt,i)=>{
    const div=document.createElement('div');
    div.className='choice';
    div.dataset.correct=opt.isCorrect;
    div.innerHTML=`<div class="choice-num">${i+1}</div><div class="choice-text">${opt.text}</div>`;
    div.onclick=()=>selectChoice(div,opt,q);
    grid.appendChild(div);
  });
  // reset feedback
  const fb=document.getElementById('feedback-strip');
  fb.style.display='none';fb.className='feedback-strip';
  document.getElementById('btn-next').style.display='none';
}

function showInfoPanel(k){
  const entry = LOOKUP[k];
  if(!entry) return;
  const panel = document.getElementById('info-panel');
  const colList = document.getElementById('col-list');
  const synChips = document.getElementById('syn-chips');
  
  // Build collocations - compact format
  if(entry.col && entry.col.length){
    colList.innerHTML = entry.col.map(c => {
      // Split on " — " to separate JP and VI parts
      const parts = c.split(' — ');
      const jp = parts[0] || c;
      const vi = parts[1] || '';
      return `<div class="col-item"><span class="col-jp">${esc(jp)}</span>${vi ? ' <span class="col-vi">— ' + esc(vi) + '</span>' : ''}</div>`;
    }).join('');
    panel.querySelector('.info-col').style.display = 'block';
  } else {
    panel.querySelector('.info-col').style.display = 'none';
  }
  
  // Build synonyms
  if(entry.syn && entry.syn.length){
    synChips.innerHTML = entry.syn.map(s => `<span class="syn-chip">${esc(s)}</span>`).join('');
    panel.querySelector('.info-syn').style.display = 'block';
  } else {
    panel.querySelector('.info-syn').style.display = 'none';
  }
  
  if((entry.col && entry.col.length) || (entry.syn && entry.syn.length)){
    panel.style.display = 'block';
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function selectChoice(el,opt,q){
  // already answered?
  const allChoices=document.querySelectorAll('.choice');
  const alreadyAnswered=[...allChoices].some(c=>c.classList.contains('correct')||c.classList.contains('wrong-pick'));
  if(alreadyAnswered)return;
  // disable all
  allChoices.forEach(c=>c.classList.add('disabled'));
  const fb=document.getElementById('feedback-strip');
  if(opt.isCorrect){
    el.classList.add('correct');
    session.correct++;
    fb.className='feedback-strip correct';
    fb.innerHTML=`✓ Chính xác!　<span class="fb-meaning">📖 ${q.m}</span>`;
    fb.style.display='block';
    showInfoPanel(q.k);
    allWrong=allWrong.filter(w=>w!==q.k);
    if(!allCorrect.includes(q.k))allCorrect.push(q.k);
    session.answers.push({q,userAns:opt.text,isCorrect:true});
  } else {
    el.classList.add('wrong-pick');
    session.wrong++;
    // reveal correct
    allChoices.forEach(c=>{if(c.dataset.correct==='true')c.classList.add('reveal-correct');});
    fb.className='feedback-strip wrong';
    fb.innerHTML=`✗ Sai rồi！　Đáp án: <strong>${q.r}</strong>　<span class="fb-meaning">📖 ${q.m}</span>`;
    fb.style.display='block';
    showInfoPanel(q.k);
    if(!allWrong.includes(q.k))allWrong.push(q.k);
    session.answers.push({q,userAns:opt.text,isCorrect:false});
  }
  localStorage.setItem('jlpt_wrong',JSON.stringify(allWrong));
  localStorage.setItem('jlpt_correct',JSON.stringify(allCorrect));
  localStorage.setItem('jlpt_session',JSON.stringify(session));
  document.getElementById('q-score').textContent=`✓ ${session.correct}　✗ ${session.wrong}`;
  document.getElementById('btn-next').style.display='block';
}

function nextQuestion(){
  session.idx++;
  if(session.idx>=session.queue.length){localStorage.removeItem('jlpt_session');showResult();}
  else{localStorage.setItem('jlpt_session',JSON.stringify(session));renderQuestion();}
}

// ── Result ──
function showResult(){
  showScreen('result');
  const tot=session.queue.length;
  const pct=Math.round((session.correct/tot)*100);
  document.getElementById('res-score').textContent=`${session.correct}/${tot}`;
  document.getElementById('res-label').textContent=pct>=80?'🎉 Xuất sắc! N1 level!':pct>=60?'👍 Khá tốt, tiếp tục cố!':'💪 Cần ôn thêm nhé!';
  document.getElementById('res-correct').textContent=`✓ ${session.correct} đúng`;
  document.getElementById('res-wrong').textContent=`✗ ${session.wrong} sai`;
  const wi=session.answers.filter(a=>!a.isCorrect);
  const rl=document.getElementById('review-list');
  rl.innerHTML=wi.length?`<h3>Từ cần ôn lại (${wi.length})</h3>`+wi.map(a=>`
    <div class="review-item">
      <div class="ri-kanji">${a.q.k}</div>
      <div class="ri-info">
        <div class="ri-reading">【${a.q.r}】</div>
        <div class="ri-meaning">${a.q.m}</div>
      </div>
      <div class="ri-yours"><div class="wrong-ans">✗ ${a.userAns}</div><div class="correct-ans">✓ ${a.q.r}</div></div>
    </div>`).join(''):'<p style="color:var(--green);text-align:center;padding:16px">🎊 Làm đúng hết!</p>';
  document.getElementById('btn-wrong-only').style.display=wi.length?'inline-block':'none';
  updateStats();
}

function retryQuiz(){startQuiz(false);}
function wrongOnly(){specialMode='wrong';selRounds.clear();startQuiz(false);}
function goMenu(){showScreen('menu');updateStats();}
function showScreen(n){['menu','quiz','result'].forEach(s=>{document.getElementById('screen-'+s).style.display=s===n?'block':'none';});}

buildMenu();

</script>
