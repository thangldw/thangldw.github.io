<script>
const allData = {"第83回": {"words": "支持・普及・加入・演出・反発・回収", "qs": [{"k": "支持", "r": "しじ", "m": "ủng hộ, hỗ trợ / 支持する・支持される", "c": 3, "o": ["部下に書類を作成するよう支持した。", "被災地に支持の物資が送られた。", "見事に第一支持の大学に合格した。", "彼は多くの市民から支持されている。"], "e": "✦セット: ～を支持する・支持を得る・支持率\n✗1→「指示(しじ)した」= chỉ thị, ra lệnh\n　→ 部下に書類を作成するよう指示した。= Anh ấy chỉ thị cấp dưới soạn tài liệu\n✗2→「支援(しえん)物資」= vật tư hỗ trợ\n　→ 被災地に支援の物資が送られた。= Vật tư hỗ trợ được gửi đến vùng thiên tai\n✗3→「志望(しぼう)校」= trường nguyện vọng\n　→ 見事に第一志望の大学に合格した。= Đỗ vào trường đại học nguyện vọng 1 xuất sắc\n✓4→ 彼は多くの市民から支持されている。= Anh ấy được nhiều người dân ủng hộ", "t": ["Khả năng anh ấy thành công là không có.", "Kế hoạch của anh ấy hỗ trợ hoàn toàn.", "Hàng viện trợ được gửi đến.", "Anh ấy được nhiều người dân ủng hộ."], "syn": "支援(しえん)・賛成(さんせい)・応援(おうえん)"}, {"k": "普及", "r": "ふきゅう", "m": "phổ biến, lan rộng / 普及する", "c": 3, "o": ["世界平和という普及的な問題に取り組む。", "会社は規模を普及した。", "あっという間にうわさが普及した。", "携帯電話は世界中に普及している。"], "e": "✦セット: ～が普及する・普及率・普及活動\n✗1→「普遍的(ふへんてき)な問題」= vấn đề mang tính phổ quát\n　→ 世界平和という普遍的な問題に取り組む。= Giải quyết vấn đề mang tính phổ quát là hòa bình thế giới\n✗2→「拡大(かくだい)した」= mở rộng quy mô\n　→ 会社は規模を拡大した。= Công ty đã mở rộng quy mô\n✗3→「広(ひろ)まった」= lan ra, phổ biến (tin đồn)\n　→ あっという間にうわさが広まった。= Tin đồn lan ra trong chớp mắt\n✓4→ 携帯電話は世界中に普及している。= Điện thoại di động đã phổ biến khắp thế giới", "t": ["Thế giới hòa bình là vấn đề phổ biến.", "Công ty mở rộng quy mô.", "Tin đồn lan ra trong chốc lát.", "Điện thoại di động đã phổ biến khắp thế giới."], "syn": "浸透(しんとう)・広まる(ひろまる)・一般化(いっぱんか)"}, {"k": "加入", "r": "かにゅう", "m": "gia nhập tổ chức / 加入する", "c": 1, "o": ["料理に調味料を加入した。", "彼は労働組合に加入している。", "交流パーティーに加入の申し込みをした。", "予備のためもう一つ注文を加入した。"], "e": "✦セット: 組合・保険・チームに加入する\n✗1→「加(くわ)える」= thêm vào (nguyên liệu)\n　→ 料理に調味料を加えた。= Thêm gia vị vào món ăn\n✗3→「参加(さんか)の申し込み」= đăng ký tham gia (sự kiện)\n　→ 交流パーティーに参加の申し込みをした。= Đã đăng ký tham gia tiệc giao lưu\n✗4→「追加(ついか)した」= thêm vào đơn\n　→ 予備のためもう一つ注文を追加した。= Đặt thêm một cái nữa để dự phòng\n✓2→ 彼は : "✦セット: 作戦を立てる・作戦を練る・作戦会議\n✗1→「作戦した」は不自然（動詞として使わない）\n　→ 国境でにらみ合っていた両国の軍がいよいよ行動した。= Quân đội hai nước đang đối đầu tại biên giới cuối cùng hành động\n✗2→「作戦を立てた」が正しい形\n　→ 今度の試験で友人と作戦を立てることになった。= Lần thi này sẽ cùng bạn lên kế hoạch\n✗4→「作戦を計画」は重複表現\n　→ 警察は交通違反を取り締まるための作戦を立てた。= Cảnh sát lập kế hoạch để kiểm soát vi phạm giao thông\n✓3→ チームのみんなで試合に勝つための作戦を立てた。= Cả đội cùng lập kế hoạch chiến thuật để thắng trận", "t": ["Hai quân đội đối đầu ở biên giới cuối cùng tấn công.", "Bạn bàn bạc về điểm số trong kỳ thi tới.", "Cả đội cùng lập kế hoạch để thắng trận.", "Cảnh sát lên kế hoạch bắt phạm vi phạm giao thông."], "syn": "戦略(せんりゃく)・策略(さくりゃく)・計画(けいかく)"}, {"k": "圧力", "r": "あつりょく", "m": "áp lực / 圧力をかける・圧力に屈する", "c": 2, "o": ["彼にとっては親の期待が圧力だった。", "彼は周囲の期待の大きさに驚き、逆に圧力されてしまった。", "政治家は田中教授の研究に陰で圧力をかけて来た。", "彼は彼女の話す勢いに圧力されてしまった。"], "e": "✦セット: 圧力をかける・圧力に屈する\n✗1→「プレッシャーだった」= là áp lực\n　→ 彼にとっては親の期待がプレッシャーだった。= Đối với anh ấy, kỳ vọng của cha mẹ là áp lực\n✗2→「圧倒(あっとう)されてしまった」= bị áp đảo\n　→ 彼は周囲の期待の大きさに驚き、逆に圧倒されてしまった。= Anh ấy bị ngợp bởi kỳ vọng xung quanh\n✗4→「気(き)を飲(の)まれてしまった」= bị cuốn vào\n　→ 彼は彼女の話す勢いに気を飲まれてしまった。= Anh ấy bị cuốn trước cách nói chuyện của cô ấy\n✓3→ 政治家は田中教授の研究に陰で圧力をかけて来た。= Chính khách ngầm gây áp lực lên nghiên cứu của giáo sư Tanaka", "t": ["Đối với anh ấy, kỳ vọng của cha mẹ là áp lực.", "Anh ấy bị choáng ngợp bởi kỳ vọng lớn.", "Chính khách đã ngầm gây áp lực lên nghiên cứu.", "Anh ấy bị cuốn vào guồng nói chuyện của cô ấy."], "syn": "プレッシャー・強制(きょうせい)・威圧(いあつ)"}, {"k": "軌道", "r": "きどう", "m": "quỹ đạo; đúng hướng / 軌道に乗る・軌道修正", "c": 1, "o": ["彼の言動は軌道を逸していた。", "会社の経営がやっと軌道に乗って来た。", "会社は今後規模を拡大する軌道らしい。", "彼は最初から軌道を立てて論理的に話した。"], "e": "✦セット: 軌道に乗る・軌道に乗せる・軌道修正\n✗1→「常軌(じょうき)を逸(いっ)していた」= đi trệch quỹ đạo (cụm đúng)\n　→ 彼の言動は常軌を逸していた。= Lời nói và hành động của anh ấy đã đi lệch quỹ đạo\n✗3→「見通(みとお)し・予定(よてい)らしい」= có vẻ dự định\n　→ 会社は今後規模を拡大する見通しらしい。= Có vẻ công ty sẽ mở rộng quy mô trong tương lai\n✗4→「筋道(すじみち)を立てて」= theo trình tự logic\n　→ 彼は最初から筋道を立てて論理的に話した。= Ngay từ đầu anh ấy nói chuyện logic theo trình tự\n✓2→ 会社の経営がやっと軌道に乗って来た。= Việc kinh doanh công ty cuối cùng đi vào quỹ đạo", "t": ["Hành động của anh ấy đi trệch quỹ đạo.", "Việc kinh doanh của công ty cuối cùng đi vào quỹ đạo.", "Có vẻ công ty sẽ mở rộng quy mô trong tương lai.", "Anh ấy nói rõ ràng theo từng bước logic."], "syn": "レール・進路(しんろ)・方向(ほうこう)"}, {"k": "適性", "r": "てきせい", "m": "tố chất phù hợp / 適性がある・適性を欠く", "c": 3, "o": ["品物の値段が適性に保たれているか調査した。", "彼は非常にいいかげんで適性だ。", "救急隊員の適性な処置により、人の命が救われた。", "彼は車の運転に適性を欠いている。"], "e": "✦セット: 適性がある・適性を欠く・適性検査\n✗1→「適正(てきせい)に」= hợp lý (漢字違う！)\n　→ 品物の値段が適正に保たれているか調査した。= Điều tra xem giá hàng hóa có được duy trì hợp lý không\n✗2→「いいかげんで適性だ」→不自然\n　→ 彼は非常にいいかげんな性格だ。= Anh ấy có tính cách rất cẩu thả\n✗3→「適切(てきせつ)な処置」= xử lý thích đáng\n　→ 救急隊員の適切な処置により、人の命が救われた。= Nhờ xử lý kịp thời của đội cấp cứu, mạng người được cứu\n✓4→ 彼は車の運転に適性を欠いている。= Anh ấy thiếu tố chất để lái xe", "t": ["Điều tra xem giá hàng hóa có được duy trì đúng mức không.", "Anh ấy rất cẩu thả và phù hợp.", "Sự xử lý kịp thời của đội cấp cứu đã cứu sống người.", "Anh ấy thiếu tố chất để lái xe."], "syn": "素質(そしつ)・才能(さいのう)・向き不向き(むきふむき)"}, {"k": "予断", "r": "よだん", "m": "phán đoán trước / 予断を許さない（慣用句！）", "c": 1, "o": ["受賞の知らせを聞く前から良い予断がしていた。", "A国の金融危機は予断を許さない状況にある。", "来月の本番までの予断を組んだ。", "大地震が来る前に、何らかの予断があったと言う。"], "e": "✦セット: 予断を許さない（この形のみ！）\n✗1→「予感(よかん)がしていた」= có linh cảm\n　→ 受賞の知らせを聞く前から良い予感がしていた。= Trước khi nghe tin được giải, tôi đã có linh cảm tốt\n✗3→「予定(よてい)を組んだ」= lên lịch\n　→ 来月の本番までの予定を組んだ。= Đã lên lịch cho đến buổi biểu diễn chính thức tháng sau\n✗4→「予兆(よちょう)があった」= có điềm báo\n　→ 大地震が来る前に、何らかの予兆があったと言う。= Người ta nói trước động đất lớn đã có dấu hiệu báo trước\n✓2→ A国の金融危機は予断を許さない状況にある。= Khủng hoảng tài chính nước A đang ở tình trạng không thể lạc quan", "t": ["Trước khi nghe tin nhận giải, anh đã có linh cảm tốt.", "Tình hình khủng hoảng tài chính nước A không thể lạc quan.", "Anh ấy lên lịch dự đoán cho tháng tới.", "Được nói là đã có dấu hiệu trước khi động đất lớn xảy ra."], "syn": "予測(よそく)・楽観(らっかん)・見通し(みとおし)"}, {"k": "知恵", "r": "ちえ", "m": "trí tuệ, mưu trí / 知恵をしぼる・知恵袋", "c": 1, "o": ["彼は母国で日本についての基礎知恵を学んだ。", "みんなで問題解決のため知恵をしぼった。", "彼女の話には知恵が感じられる。", "非常に知恵のいい男だ。"], "e": "✦セット: 知恵をしぼる・知恵を出し合う・知恵袋\n✗1→「基礎知識(きそちしき)」= kiến thức cơ bản\n　→ 彼は母国で日本についての基礎知識を学んだ。= Anh ấy học kiến thức cơ bản về Nhật Bản ở quê hương\n✗3→「知性(ちせい)が感じられる」= toát lên trí tuệ\n　→ 彼女の話には知性が感じられる。= Câu chuyện của cô ấy toát lên sự trí tuệ\n✗4→「頭(あたま)のいい」= thông minh\n　→ 非常に頭のいい男だ。= Anh ấy là người cực kỳ thông minh\n✓2→ みんなで問題解決のため知恵をしぼった。= Mọi người cùng vắt óc tìm cách giải quyết vấn đề", "t": ["Anh ấy học kiến thức cơ bản về Nhật Bản ở quê.", "Mọi người vắt óc suy nghĩ để giải quyết vấn đề.", "Cô ấy có vẻ có trí tuệ trong lời nói.", "Anh ấy cực kỳ thông minh."], "syn": "知識(ちしき)・知性(ちせい)・機転(きてん)"}]}, "第87回": {"words": "こなす・かばう・もつれる・しのぐ・ひたる・ほどこす", "qs": [{"k": "こなす", "r": "こなす", "m": "xử lý gọn, hoàn thành / 仕事をこなす", "c": 1, "o": ["食べすぎておなかをこなしてしまった。", "その学生は課題を次々にこなしていった。", "彼は冷静に敵の攻撃をこなした。", "社長は命令に逆らった社員をこなした。"], "e": "✦セット: 仕事・課題・量をこなす\n✗1→「消化(しょうか)した」= tiêu hóa\n　→ 食べすぎておなかを消化してしまった。= Ăn quá nhiều nên bị đau bụng\n✗3→「かわした」= né tránh (tấn công)\n　→ 彼は冷静に敵の攻撃をかわした。= Anh ấy bình tĩnh né tránh cuộc tấn công của đối thủ\n✗4→「処罰(しょばつ)した」= xử phạt\n　→ 社長は命令に逆らった社員を処罰した。= Giám đốc đã xử phạt nhân viên dám chống lệnh\n✓2→ その学生は課題を次々にこなしていった。= Sinh viên đó lần lượt hoàn thành các bài tập", "t": ["Ăn quá nhiều và bị đau bụng.", "Học sinh đó hoàn thành bài tập lần lượt.", "Anh ấy bình tĩnh né tránh cuộc tấn công.", "Giám đốc đã trừng phạt nhân viên dám cãi lệnh."], "syn": "処理(しょり)する・片付ける(かたづける)・熟(じゅく)す"}, {"k": "かばう", "r": "かばう", "m": "che chở, bảo vệ / 弟をかばう", "c": 1, "o": ["その女の子は傷ついた動物をかばった。", "彼は自分のせいだと言って弟をかばった。", "彼は災害から村をかばった。", "大量の落ち葉が歩道をかばった。"], "e": "✦セット: 弟・友人・仲間をかばう\n✗1→「手当(てあて)をした」= chăm sóc vết thương\n　→ その女の子は傷ついた動物の手当をした。= Cô bé chăm sóc vết thương cho con vật bị thương\n✗3→「守(まも)った」= bảo vệ (chung)\n　→ 彼は災害から村を守った。= Anh ấy bảo vệ ngôi làng khỏi thiên tai\n✗4→「覆(おお)った」= phủ kín\n　→ 大量の落ち葉が歩道を覆った。= Lá rụng dày che phủ vỉa hè\n✓2→ 彼は自分のせいだと言って弟をかばった。= Anh ấy nhận lỗi về mình để bảo vệ em trai", "t": ["Cô bé ôm lấy con vật bị thương.", "Anh ấy nhận lỗi về mình để bảo vệ em trai.", "Anh ấy bảo vệ ngôi làng khỏi thảm họa.", "Lá cây phủ kín lối đi."], "syn": "守る(まもる)・擁護(ようご)する・助ける(たすける)"}, {"k": "もつれる", "r": "もつれる", "m": "rắc rối, phức tạp / 話がもつれる", "c": 3, "o": ["事故が起きて、車がもつれていた。", "ショックで頭がもつれてしまった。", "この事件にはお金がもつれていた。", "離婚の話がもつれて裁判になった。"], "e": "✦セット: 話・交渉・関係がもつれる\n✗1→「絡(から)まっていた」= vướng víu (xe cộ)\n　→ 事故が起きて、車が絡まっていた。= Tai nạn xảy ra, xe cộ vướng víu nhau\n✗2→「混乱(こんらん)した」= rối loạn (đầu óc)\n　→ ショックで頭が混乱してしまった。= Vì sốc nên đầu óc rối loạn\n✗3→「絡(から)んでいた」= có liên quan (tiền)\n　→ この事件にはお金が絡んでいた。= Sự kiện này có liên quan đến tiền bạc\n✓4→ 離婚の話がもつれて裁判になった。= Chuyện ly hôn trở nên phức tạp và đưa ra tòa", "t": ["Tai nạn xảy ra, xe cộ rối loạn.", "Cú sốc khiến đầu anh ấy hỗn loạn.", "Vụ án này có liên quan đến tiền bạc.", "Cuộc đàm phán ly hôn rắc rối và đưa ra tòa."], "syn": "こじれる・複雑化(ふくざつか)する・難航(なんこう)する"}, {"k": "しのぐ", "r": "しのぐ", "m": "vượt qua, hơn / ～をしのぐ", "c": 3, "o": ["列車は早朝に国境をしのいだ。", "1万人をしのぐ観客が会場に集まった。", "やっと彼の夢がしのいだ。", "挑戦者の人気はチャンピオンをしのぐほどだった。"], "e": "✦セット: ～をしのぐ人気・実力がしのぐ\n✗1→「越(こ)えた」= vượt qua (biên giới)\n　→ 列車は早朝に国境を越えた。= Đoàn tàu vượt qua biên giới lúc sáng sớm\n✗2→「超(こ)える」= vượt quá (số lượng)\n　→ 1万人を超える観客が会場に集まった。= Hơn 10.000 khán giả đổ về hội trường\n✗3→「かなった」= trở thành hiện thực\n　→ やっと彼の夢がかなった。= Ước mơ của anh ấy cuối cùng thành hiện thực\n✓4→ 挑戦者の人気はチャンピオンをしのぐほどだった。= Độ nổi tiếng của người thách đấu còn hơn cả nhà vô địch", "t": ["Tàu hỏa vượt qua biên giới lúc sáng sớm.", "Hơn 10.000 khán giả đổ về hội trường.", "Giấc mơ của anh ấy cuối cùng thành hiện thực.", "Sức hút của người thách đấu vượt qua cả nhà vô địch."], "syn": "上回る(うわまわる)・超える(こえる)・まさる"}, {"k": "ひたる", "r": "ひたる", "m": "đắm chìm trong / 喜びにひたる（ポジティブ感情）", "c": 1, "o": ["彼は朝から晩まで仕事にひたっている。", "彼は優勝の喜びにひたっていた。", "彼は今テレビゲームにひたっている。", "彼はベッドの上でけがの痛みにひたっていた。"], "e": "✦セット: 喜び・感動・余韻にひたる\n✗1→「没頭(ぼっとう)する」= dốc sức vào (công việc)\n　→ 彼は朝から晩まで仕事に没頭している。= Anh ấy đắm chìm trong công việc từ sáng đến tối\n✗3→「熱中(ねっちゅう)する」= say mê (game)\n　→ 彼は今テレビゲームに熱中している。= Anh ấy đang say mê chơi game\n✗4→「苦(くる)しんでいた」= đang đau khổ\n　→ 彼はベッドの上でけがの痛みに苦しんでいた。= Anh ấy nằm trên giường đang đau đớn vì chấn thương\n✓2→ 彼は優勝の喜びにひたっていた。= Anh ấy đang thỏa thích trong niềm vui chiến thắng", "t": ["Anh ấy làm việc từ sáng đến tối.", "Anh ấy đang đắm chìm trong niềm vui chiến thắng.", "Anh ấy đang mê mải chơi game.", "Anh ấy đang ngâm mình trong cơn đau vì chấn thương."], "syn": "浸る(ひたる)・浸かる(つかる)・耽る(ふける)"}, {"k": "ほどこす", "r": "ほどこす", "m": "thực hiện, cung cấp / 治療をほどこす", "c": 3, "o": ["日々の努力が彼に成功をほどこした。", "父は娘にほうびをほどこした。", "市は市民の相談を直接受ける窓口をほどこした。", "医者は患者に最先端の治療をほどこした。"], "e": "✦セット: 治療・処置・工夫をほどこす\n✗1→「もたらした」= mang lại\n　→ 日々の努力が彼に成功をもたらした。= Sự cố gắng hàng ngày mang lại thành công cho anh ấy\n✗2→「与(あた)えた」= cho, tặng (phần thưởng)\n　→ 父は娘にほうびを与えた。= Cha tặng thưởng cho con gái\n✗3→「設(もう)けた」= lập ra (cửa sổ tiếp nhận)\n　→ 市は市民の相談を直接受ける窓口を設けた。= Thành phố lập cửa sổ tiếp nhận trực tiếp thắc mắc người dân\n✓4→ 医者は患者に最先端の治療をほどこした。= Bác sĩ áp dụng phương pháp điều trị tiên tiến nhất cho bệnh nhân", "t": ["Nỗ lực hàng ngày mang lại thành công cho anh ấy.", "Cha tặng thưởng cho con gái.", "Thành phố mở cửa sổ tiếp nhận tư vấn trực tiếp.", "Bác sĩ thực hiện phương pháp điều trị tiên tiến nhất."], "syn": "施す(ほどこす)・実施(じっし)する・行う(おこなう)"}]}, "第89回": {"words": "言い切る・付き添う・見守る・追い抜く・落ち合う・思い当たる", "qs": [{"k": "言い切る", "r": "いいきる", "m": "khẳng định dứt khoát / ～だと言い切る", "c": 2, "o": ["彼は彼女の誘いを言い切った。", "彼は彼女に本当の気持ちを言い切った。", "彼は彼女が犯人だと言い切った。", "彼は話を途中で言い切った。"], "e": "✦セット: ～だと言い切る\n✗1→「断(ことわ)った」= từ chối\n　→ 彼は彼女の誘いを断った。= Anh ấy từ chối lời mời của cô ấy\n✗2→「打(う)ち明(あ)けた」= thổ lộ tâm tư\n　→ 彼は彼女に本当の気持ちを打ち明けた。= Anh ấy thổ lộ thẳng thắn cảm xúc thật với cô ấy\n✗4→「途中(とちゅう)で話を切(き)った」= cắt đứt câu chuyện giữa chừng\n　→ 彼は話を途中で切った。= Anh ấy  đi qua, cảnh báo đề phòng được dỡ bỏ", "t": ["Bão đi qua, cảnh báo đỏ được dỡ bỏ.", "Anh ấy hủy đặt bàn nhà hàng.", "Anh ấy lại phá vỡ hẹn với cô ấy.", "Anh ấy hát và giải tỏa stress."], "syn": "解消(かいしょう)・取り消し(とりけし)・撤廃(てっぱい)"}, {"k": "由来", "r": "ゆらい", "m": "xuất xứ / ～に由来する", "c": 0, "o": ["このお寺の名前は古くから伝わる民話に由来している。", "彼は仕事に失敗した由来を説明した。", "彼の話を信じたが由来に借金を抱える羽目になった。", "異常気象の由来は地球温暖化であった。"], "e": "✦セット: ～に由来する\n✗2→「原因(げんいん)/理由(りゆう)」= nguyên nhân/lý do\n　→ 彼は仕事に失敗した原因を説明した。= Anh ấy giải thích nguyên nhân thất bại trong công việc\n✗3→「結果(けっか)として」= kết quả là\n　→ 彼の話を信じたが、結果として借金を抱える羽目になった。= Tin anh ấy nhưng kết quả là mang nợ\n✗4→「原因(げんいん)」= nguyên nhân\n　→ 異常気象の原因は地球温暖化であった。= Nguyên nhân thời tiết cực đoan là hiện tượng nóng lên toàn cầu\n✓1→ このお寺の名前は古くから伝わる民話に由来している。= Tên ngôi chùa này có nguồn gốc từ truyện dân gian lâu đời", "t": ["Tên ngôi chùa này có nguồn gốc từ truyện dân gian cổ.", "Anh ấy giải thích nguyên nhân thất bại trong công việc.", "Tin anh ấy nên cuối cùng mang nợ.", "Biến đổi khí hậu là do hiện tượng nóng lên toàn cầu."], "syn": "起源(きげん)・ルーツ・いわれ"}, {"k": "勘弁", "r": "かんべん", "m": "tha thứ / 勘弁してくれる", "c": 3, "o": ["彼は約束を破っては、勘弁ばかりしている。", "彼にも言いたいことは山ほどあったが、ぐっと勘弁した。", "大人がそんな無責任なことをするのは勘弁されない。", "彼はたった1分の遅れも勘弁してくれなかった。"], "e": "✦セット: 勘弁してくれる・勘弁ならない\n✗1→「言(い)い訳(わけ)ばかりしている」= cứ bào biện mãi\n　→ 彼は約束を破っては、言い訳ばかりしている。= Anh ấy cứ phá lời hứa rồi lại bào biện mãi\n✗2→「我慢(がまん)した」= nhịn lại\n　→ 彼にも言いたいことは山ほどあったが、ぐっと我慢した。= Anh ấy có muôn vàn điều muốn nói nhưng đã cố nhịn\n✗3→「許(ゆる)されない」= không thể tha thứ\n　→ 大人がそんな無責任なことをするのは許されない。= Người lớn làm điều vô trách nhiệm như vậy thật không thể tha thứ\n✓4→ 彼はたった1分の遅れも勘弁してくれなかった。= Anh ấy không tha thứ dù chỉ trễ 1 phút", "t": ["Anh ấy cứ phá vỡ hẹn và chỉ xin lỗi suốt.", "Anh ấy có nhiều điều muốn nói nhưng cố nhịn.", "Người lớn mà hành xử vô trách nhiệm như vậy thật không thể tha thứ.", "Anh ấy không tha thứ dù chỉ trễ 1 phút."], "syn": "許す(ゆるす)・見逃す(みのがす)・大目に見る(おおめにみる)"}, {"k": "吟味", "r": "ぎんみ", "m": "cân nhắc kỹ / 材料を吟味する", "c": 2, "o": ["さっそく警察が事件の吟味を開始した。", "製品開発のため市場を吟味した。", "食事をおいしくするために材料を吟味した。", "健康診断で血液を吟味してもらった。"], "e": "✦セット: 材料・言葉を吟味する\n✗1→「捜査(そうさ)」= điều tra (cảnh sát)\n　→ さっそく警察が事件の捜査を開始した。= Cảnh sát lập tức bắt đầu điều tra vụ án\n✗2→「調査(ちょうさ)した」= khảo sát\n　→ 製品開発のため市場を調査した。= Khảo sát thị trường để phát triển sản phẩm\n✗4→「検査(けんさ)して」= kiểm tra y tế\n　→ 健康診断で血液を検査してもらった。= Được xét nghiệm máu trong kỳ khám sức khỏe\n✓3→ 食事をおいしくするために材料を吟味した。= Lựa chọn kỹ nguyên liệu để bữa ăn ngon hơn", "t": ["Cảnh sát lập tức mở cuộc điều tra vụ án.", "Khảo sát thị trường để phát triển sản phẩm.", "Chọn lựa nguyên liệu kỹ để làm bữa ăn ngon.", "Nhờ kiểm tra máu trong kỳ khám sức khỏe."], "syn": "選定(せんてい)・検討(けんとう)・精査(せいさ)"}, {"k": "矛盾", "r": "むじゅん", "m": "mâu thuẫn / 話が矛盾する", "c": 2, "o": ["彼は彼女と性格が矛盾して別れた。", "彼には、この色は矛盾している。", "彼の話はつじつまが合わず矛盾していた。", "彼はどちらかというと矛盾的な人だ。"], "e": "✦セット: 話・言動が矛盾する\n✗1→「性格(せいかく)が合わなくて」= tính cách không hợp\n　→ 彼は彼女と性格が合わなくて別れた。= Anh ấy và cô ấy tính cách không hợp nên chia tay\n✗2→「似合(にあ)わない」= không hợp (màu sắc)\n　→ 彼には、この色は似合わない。= Màu này không hợp với anh ấy\n✗4→「矛盾した性格」は不自然\n　→ 彼はどちらかというと一貫性(いっかんせい)のない性格だ。= Nói đúng hơn thì anh ấy là người không nhất quán\n✓3→ 彼の話はつじつまが合わず矛盾していた。= Câu chuyện của anh ấy không nhất quán và đầy mâu thuẫn", "t": ["Anh ấy và cô ấy không hợp tính nên chia tay.", "Màu này không hợp với anh ấy.", "Câu chuyện của anh ấy không nhất quán và mâu thuẫn.", "Anh ấy là người có tính cách mâu thuẫn."], "syn": "食い違い(くいちがい)・不一致(ふいっち)・つじつまが合わない"}, {"k": "一貫", "r": "いっかん", "m": "nhất quán / 一貫して～する", "c": 2, "o": ["復旧工事は夜を一貫して続けられた。", "この運動は環境保護の一貫として行われている。", "容疑者は終始一貫して無実を訴えた。", "彼は長い論文をわずか一週間で一貫に書きあげた。"], "e": "✦セット: 一貫して～する・一貫した方針\n✗1→「夜(よる)を通(とお)して」= xuyên suốt đêm\n　→ 復旧工事は夜を通して続けられた。= Công trình phục hồi tiếp tục xuyên suốt đêm\n✗2→「一環(いっかん)として」= như một phần (漢字違う！)\n　→ この運動は環境保護の一環として行われている。= Phong trào này được thực hiện như một phần của bảo vệ môi trường\n✗4→「一気(いっき)に書きあげた」= viết một mạch xong\n　→ 彼は長い論文をわずか一週間で一気に書きあげた。= Anh ấy hoàn thành luận văn dài chỉ trong một tuần\n✓3→ 容疑者は終始一貫して無実を訴えた。= Nghi phạm nhất quán tuyên bố vô tội từ đầu đến cuối", "t": ["Công trình phục hồi tiếp tục suốt đêm.", "Phong trào này được thực hiện như một phần của bảo vệ môi trường.", "Nghi phạm nhất quán tuyên bố vô tội từ đầu đến cuối.", "Anh ấy hoàn thành luận văn dài chỉ trong một tuần."], "syn": "首尾一貫(しゅびいっかん)・一致(いっち)・徹底(てってい)"}, {"k": "合併", "r": "がっぺい", "m": "sáp nhập / 会社が合併する", "c": 3, "o": ["この映画は日米合併によるものだ。", "今日はとなりのクラスと合併で授業をすることになった。", "このプロジェクトでは両社の目的が合併した。", "彼の会社と彼女の会社が合併した。"], "e": "✦セット: 会社・銀行が合併する\n✗1→「合作(がっさく)」= hợp tác sản xuất\n　→ この映画は日米合作によるものだ。= Bộ phim này là tác phẩm hợp tác Nhật-Mỹ\n✗2→「合同(ごうどう)で」= cùng nhau\n　→ 今日はとなりのクラスと合同で授業をすることになった。= Hôm nay học chung với lớp bên cạnh\n✗3→「一致(いっち)した」= thống nhất\n　→ このプロジェクトでは両社の目的が一致した。= Trong dự án này, mục tiêu của hai công ty đã thống nhất\n✓4→ 彼の会社と彼女の会社が合併した。= Công ty của anh ấy và công ty của cô ấy đã sáp nhập", "t": ["Bộ phim này là sản phẩm hợp tác Nhật-Mỹ.", "Hôm nay học chung với lớp bên cạnh.", "Mục tiêu hai công ty đã thống nhất trong dự án này.", "Công ty anh ấy và công ty cô ấy đã sáp nhập."], "syn": "統合(とうごう)・合同(ごうどう)・統一(とういつ)"}, {"k": "融通", "r": "ゆうずう", "m": "linh hoạt / 融通がきく・利かない", "c": 2, "o": ["道がわからなくて困っていると、通りがかりの人が融通してくれた。", "彼は手際よく仕事を融通していった。", "彼は融通がきかなくて困る。", "彼女は家計の融通が上手だ。"], "e": "✦セット: 融通がきく・融通が利かない\n✗1→「案内(あんない)してくれた」= chỉ đường giúp\n　→ 道がわからなくて困っていると、通りがかりの人が案内してくれた。= Đang bối rối vì không biết đường thì người đi qua chỉ dẫn\n✗2→「こなして」= xử lý gọn\n　→ 彼は手際よく仕事をこなしていった。= Anh ấy xử lý công việc thuần thục từng bước\n✗4→「やりくりが上手」= giỏi xoay xở\n　→ 彼女は家計のやりくりが上手だ。= Cô ấy rất giỏi xoay xở tài chính gia đình\n✓3→ 彼は融通がきかなくて困る。= Anh ấy thiếu linh hoạt nên thật khó chịu", "t": ["Người đi đường chỉ đường giúp khi tôi bị lạc.", "Anh ấy xử lý công việc thuần thục từng bước.", "Anh ấy thiếu linh hoạt và thật khó chịu.", "Cô ấy rất giỏi xoay xở chi tiêu gia đình."], "syn": "柔軟(じゅうなん)・融資(ゆうし)・やりくり"}, {"k": "告発", "r": "こくはつ", "m": "tố cáo / 不正を告発する", "c": 3, "o": ["検査の結果、癌であることを医者に告発された。", "親友に悩みを告発した。", "首相は新内閣のメンバーを告発した。", "彼は匿名で会社の不正を告発した。"], "e": "✦セット: 不正・違法行為を告発する\n✗1→「告知(こくち)された」= được thông báo (bệnh)\n　→ 検査の結果、癌であることを医者に告知された。= Kết quả kiểm tra, bác sĩ thông báo bị ung thư\n✗2→「打(う)ち明(あ)けた」= tâm sự, thổ lộ\n　→ 親友に悩みを打ち明けた。= Tâm sự nỗi lo với người bạn thân\n✗3→「発表(はっぴょう)した」= thông báo công khai\n　→ 首相は新内閣のメンバーを発表した。= Thủ tướng công bố thành phần nội các mới\n✓4→ 彼は匿名で会社の不正を告発した。= Anh ấy ẩn danh tố cáo hành vi sai phạm của công ty", "t": ["Bác sĩ thông báo kết quả khám là ung thư.", "Tâm sự nỗi lòng với người bạn thân.", "Thủ tướng thông báo thành phần nội các mới.", "Anh ấy ẩn danh tố cáo tiêu cực trong công ty."], "syn": "訴え(うったえ)・告訴(こくそ)・内部告発(ないぶこくはつ)"}, {"k": "享受", "r": "きょうじゅ", "m": "thụ hưởng / 自然の恵みを享受する", "c": 2, "o": ["彼は彼女の主張を黙って享受した。", "実際に日本人と話して会話力を享受した。", "村の子どもたちは自然の恵みを享受して育った。", "自然災害により村は多大な被害を享受した。"], "e": "✦セット: 自然の恵みを享受する（良いものにのみ使う）\n✗1→「受(う)け入(い)れた」= chấp nhận\n　→ 彼は彼女の主張を黙って受け入れた。= Anh ấy im lặng chấp nhận lập luận của cô ấy\n✗2→「身(み)につけた」= tiếp thu được\n　→ 実際に日本人と話して会話力を身につけた。= Thực tế nói chuyện với người Nhật và nâng cao khả năng hội thoại\n✗4→「被害(ひがい)を享受」は不自然（悪いものに使わない）\n　→ 自然災害により村は多大な被害を受けた。= Thiên tai khiến làng chịu thiệt hại nặng nề\n✓3→ 村の子どもたちは自然の恵みを享受して育った。= Trẻ em trong làng lớn lên được thụ hưởng ân huệ thiên nhiên", "t": ["Anh ấy im lặng chấp nhận lập luận của cô ấy.", "Thực tế nói chuyện với người Nhật để nâng cao khả năng hội thoại.", "Những đứa trẻ trong làng lớn lên thụ hưởng ân huệ thiên nhiên.", "Thiên tai gây thiệt hại nặng nề cho ngôi làng."], "syn": "受ける(うける)・恵まれる(めぐまれる)・享有(きょうゆう)"}, {"k": "着目", "r": "ちゃくもく", "m": "chú ý đến / ～に着目する", "c": 1, "o": ["彼は犯行現場を着目した。", "彼は外国人が増えていることに着目した企画を立てた。", "あの先生は生徒の個性を着目している。", "山の頂上は晴れていて、とても着目が良かった。"], "e": "✦セット: ～に着目する\n✗1→「急行(きゅうこう)した」= đến nhanh, cấp tốc\n　→ 彼は犯行現場に急行した。= Anh ấy cấp tốc đến hiện trường vụ án\n✗3→「注目(ちゅうもく)している」= đang chú ý\n　→ あの先生は生徒の個性に注目している。= Giáo viên đó đang chú ý đến cá tính của học sinh\n✗4→「眺(なが)め/見晴(みは)らし」= tầm nhìn, cảnh quan\n　→ 山の頂上は晴れていて、とても眺めが良かった。= Đỉnh núi quang đãng, tầm nhìn rất đẹp\n✓2→ 彼は外国人が増えていることに着目した企画を立てた。= Anh ấy lập kế hoạch chú ý đến việc người nước ngoài tăng lên", "t": ["Anh ấy chạy đến hiện trường vụ án.", "Anh ấy lập kế hoạch chú ý đến việc người nước ngoài tăng.", "Giáo viên đó chú ý đến cá tính học sinh.", "Đỉnh núi quang đãng và tầm nhìn rất đẹp."], "syn": "注目(ちゅうもく)・目を向ける(めをむける)・注視(ちゅうし)"}, {"k": "浪費", "r": "ろうひ", "m": "lãng phí / 時間を浪費する", "c": 3, "o": ["これまでの努力を浪費にはできない。", "迷といくら貸しあっても浪費だ。", "食べ物を浪費してはいけない。", "貴重な時間を浪費してしまった。"], "e": "✦セット: 時間・お金を浪費する\n✗1→「無駄(むだ)にはできない」= không thể lãng phí\n　→ これまでの努力を無駄にはできない。= Không thể lãng phí những nỗ lực đến nay\n✗2→「無駄(むだ)だ」= vô ích\n　→ 迷といくら貸しあっても無駄だ。= Dù cho mượn bao nhiêu cũng vô ích\n✗3→「粗末(そまつ)にして」= đối xử tệ với đồ ăn\n　→ 食べ物を粗末にしてはいけない。= Không được đối xử tệ với thức ăn\n✓4→ 貴重な時間を浪費してしまった。= Đã lãng phí thời gian quý báu mất rồi", "t": ["Không thể lãng phí những nỗ lực đã bỏ ra.", "Dù cho nhau vay bao nhiêu cũng lãng phí.", "Không được lãng phí thức ăn.", "Đã lãng phí thời gian quý báu."], "syn": "無駄遣い(むだづかい)・消耗(しょうもう)・散財(さんざい)"}, {"k": "結晶", "r": "けっしょう", "m": "kết tinh; kết quả / 努力の結晶", "c": 1, "o": ["試合に臨み、チームは固く結晶した。", "この作品は彼の努力の結晶だ。", "水素と酸素が結晶して水が出来る。", "家族は固い結晶で結ばれている。"], "e": "✦セット: 努力の結晶・汗の結晶\n✗1→「結束(けっそく)した」= đoàn kết\n　→ 試合に臨み、チームは固く結束した。= Trước trận đấu, cả đội đoàn kết chặt chẽ\n✗3→「結合(けつごう)して」= kết hợp (hóa học)\n　→ 水素と酸素が結合して水が出来る。= Hydro và oxy kết hợp tạo thành nước\n✗4→「絆(きずな)」= dây liên kết tình cảm\n　→ 家族は固い絆で結ばれている。= Gia đình gắn kết với nhau bằng tình thân bền chặt\n✓2→ この作品は彼の努力の結晶だ。= Tác phẩm này là kết tinh từ nỗ lực của anh ấy", "t": ["Cả đội đoàn kết chặt chẽ khi bước vào thi đấu.", "Tác phẩm này là kết tinh của những nỗ lực anh ấy.", "Hydro và oxy kết hợp tạo thành nước.", "Gia đình gắn bó bằng tình thân bền chặt."], "syn": "成果(せいか)・結実(けつじつ)・産物(さんぶつ)"}]}, "復習②(14〜20)": {"words": "没頭・引率・氾濫・愛想・先手・面目・見聞", "qs": [{"k": "没頭", "r": "ぼっとう", "m": "đắm chìm / ～に没頭する", "c": 3, "o": ["彼は今、病気の療養に没頭している。", "彼は海に没頭するのが好きだ。", "彼は今、仕事に没頭されている。", "彼は今、研究に没頭している。"], "e": "✦セット: 研究・仕事・趣味に没頭する\n✗1→「専念(せんねん)している」= đang chuyên tâm (nhẹ hơn)\n　→ 彼は今、病気の療養に専念している。= Anh ấy hiện đang chuyên tâm dưỡng bệnh\n✗2→「潜(もぐ)るのが好きだ」= thích lặn\n　→ 彼は海に潜るのが好きだ。= Anh ấy thích lặn xuống biển\n✗3→「没頭される」は不自然\n　→ 彼は今、仕事に没頭している。= Anh ấy đang dốc sức vào công việc\n✓4→ 彼は今、研究に没頭している。= Anh ấy hiện đang đắm chìm vào nghiên cứu", "t": ["Anh ấy đang dưỡng bệnh chuyên tâm.", "Anh ấy thích lặn biển.", "Anh ấy đang bị cuốn vào công việc.", "Anh ấy đang đắm chìm trong nghiên cứu."], "syn": "熱中(ねっちゅう)・専念(せんねん)・打ち込む(うちこむ)"}, {"k": "引率", "r": "いんそつ", "m": "dẫn đi / 生徒を引率する", "c": 2, "o": ["プロ野球の選手だった田中さんは40歳で引率した。", "彼は自分の論文に有名な哲学者の言葉を引率した。", "担任教師が生徒を引率して工場を見学した。", "職員が見守る中、部長自らが引率して職場の掃除を始めた。"], "e": "✦セット: 生徒・チームを引率する\n✗1→「引退(いんたい)した」= giải nghệ\n　→ プロ野球の選手だった田中さんは40歳で引退した。= Ông Tanaka từng là cầu thủ bóng chày, giải nghệ năm 40 tuổi\n✗2→「引用(いんよう)した」= trích dẫn\n　→ 彼は自分の論文に有名な哲学者の言葉を引用した。= Anh ấy trích dẫn lời triết gia nổi tiếng trong luận văn\n✗4→「率先(そっせん)して」= tự mình dẫn đầu\n　→ 職員が見守る中、部長自らが率先して職場の掃除を始めた。= Trưởng phòng đích thân dẫn đầu dọn dẹp\n✓3→ 担任教師が生徒を引率して工場を見学した。= Giáo viên chủ nhiệm dẫn học sinh đi tham quan nhà máy", "t": ["Vận động viên Tanaka giải nghệ năm 40 tuổi.", "Anh ấy trích dẫn lời triết gia nổi tiếng trong luận văn.", "Giáo viên chủ nhiệm dẫn học sinh tham quan nhà máy.", "Trong khi nhân viên theo dõi, trưởng phòng tự mình dẫn đầu dọn dẹp."], "syn": "率いる(ひきいる)・先導(せんどう)する・引率者(いんそつしゃ)"}, {"k": "氾濫", "r": "はんらん", "m": "tràn ngập / 情報が氾濫する", "c": 2, "o": ["一部の隊員が隊長の指令に背き氾濫を起こした。", "お風呂のお湯を止めるのを忘れてしまい、浴槽からお湯が氾濫していた。", "インターネットには情報が氾濫している。", "彼女の目から涙が氾濫した。"], "e": "✦セット: 川が氾濫する・情報が氾濫する\n✗1→「反乱(はんらん)を起こした」= nổi loạn (発音同じ！漢字注意)\n　→ 一部の隊員が隊長の指令に背き反乱を起こした。= Một số binh sĩ nổi loạn chống lại lệnh chỉ huy\n✗2→「あふれていた」= tràn ra ngoài\n　→ お風呂のお湯を止めるのを忘れてしまい、浴槽からお湯があふれていた。= Quên tắt vòi nước bồn tắm, nước tràn ra ngoài\n✗4→「あふれた」= trào ra (nước mắt)\n　→ 彼女の目から涙があふれた。= Nước mắt cô ấy trào ra\n✓3→ インターネットには情報が氾濫している。= Internet tràn ngập thông tin", "t": ["Một số binh sĩ chống lại lệnh chỉ huy gây biến loạn.", "Quên tắt nước bồn tắm, nước tràn ra ngoài.", "Internet tràn ngập thông tin.", "Nước mắt cô ấy trào ra."], "syn": "溢れる(あふれる)・넘치다・洪水(こうずい)"}, {"k": "愛想", "r": "あいそ", "m": "thái độ niềm nở / 愛想をつかす", "c": 1, "o": ["彼は愛想の証しに彼女にペンダントを贈った。", "彼は彼女に愛想をつかされた。", "彼は古いジーンズに愛想があった。", "笑顔の素敵な彼は非常に良い愛想を人に与える。"], "e": "✦セット: 愛想をつかす・愛想が良い・悪い\n✗1→「愛情(あいじょう)の証(あかし)し」= bằng chứng tình yêu\n　→ 彼は愛情の証しに彼女にペンダントを贈った。= Anh ấy tặng mặt dây chuyền như bằng chứng tình yêu\n✗3→「愛着(あいちゃく)があった」= có tình cảm gắn bó\n　→ 彼は古いジーンズに愛着があった。= Anh ấy vẫn còn tình cảm với chiếc quần jeans cũ\n✗4→「良い印象(いんしょう)を与える」= tạo ấn tượng tốt\n　→ 笑顔の素敵な彼は非常に良い印象を人に与える。= Nụ cười dễ thương của anh ấy tạo ấn tượng rất tốt\n✓2→ 彼は彼女に愛想をつかされた。= Cô ấy đã hoàn toàn chán ghét anh ấy", "t": ["Anh ấy tặng mặt dây chuyền như bằng chứng tình yêu.", "Cô ấy đã làm anh ấy chán ngán.", "Anh ấy vẫn còn yêu chiếc quần jean cũ.", "Anh ấy rất dễ mến và tạo ấn tượng tốt."], "syn": "愛嬌(あいきょう)・親しみやすさ(したしみやすさ)・感じが良い"}, {"k": "先手", "r": "せんて", "m": "đi trước / 先手を打つ", "c": 1, "o": ["けんかの場合、先手を打ったほうが悪いとされる。", "敵にこちらの弱点を知られる前に先手を打った。", "彼は悪の道に入り、暴力団の先手となってしまった。", "彼はとても先手が器用だ。"], "e": "✦セット: 先手を打つ・先手を取る\n✗1→「先手を打ったほうが悪い」→けんかの文脈で矛盾\n　→ けんかの場合、先に手を出したほうが悪いとされる。= Trong trường hợp đánh nhau, người ra tay trước bị coi là sai\n✗3→「幹部(かんぶ)/一員(いちいん)」= thành viên/cán bộ\n　→ 彼は悪の道に入り、暴力団の幹部となってしまった。= Anh ấy sa vào con đường xấu, trở thành cán bộ băng đảng\n✗4→「手先(てさき)が器用」= khéo tay\n　→ 彼はとても手先が器用だ。= Anh ấy rất khéo tay\n✓2→ 敵にこちらの弱点を知られる前に先手を打った。= Trước khi kẻ địch biết điểm yếu của ta, ta đã ra tay trước", "t": ["Trong trường hợp đánh nhau, người ra tay trước bị coi là sai.", "Trước khi địch biết điểm yếu của ta, ta đã ra tay trước.", "Anh ấy vào con đường xấu và trở thành tay chân băng đảng.", "Anh ấy rất khéo léo tay chân."], "syn": "先制(せんせい)・先攻(せんこう)・主導権(しゅど  lợi nhuận.", "Anh ấy thanh toán mối quan hệ với bạn xấu."], "syn": "利益(りえき)・収益性(しゅうえきせい)・費用対効果(ひようたいこうか)"}, {"k": "英気", "r": "えいき", "m": "tinh thần mạnh mẽ / 英気を養う", "c": 3, "o": ["努力して英気を育てた。", "ひそかに英気を温めた。", "部屋の英気を入れ替えた。", "3日間休んで英気を養った。"], "e": "✦セット: 英気を養う（この形のみ！）\n✗1→「英気を育(そだ)てた」は不自然\n　→ 努力して元気を育てた。= Nỗ lực để bồi dưỡng tinh thần\n✗2→「士気(しき)を温めた」= nung nấu nhuệ khí\n　→ ひそかに士気を高めた。= Thầm lặng nâng cao nhuệ khí\n✗3→「空気(くうき)を入れ替えた」= thay không khí\n　→ 部屋の空気を入れ替えた。= Thay đổi không khí trong phòng\n✓4→ 3日間休んで英気を養った。= Nghỉ ngơi 3 ngày để tích lũy lại sức lực", "t": ["Nỗ lực để bồi dưỡng tinh thần mạnh mẽ.", "Bí mật ấp ủ tinh thần.", "Thay không khí trong phòng.", "Nghỉ 3 ngày để hồi phục sức lực."], "syn": "元気(げんき)・気力(きりょく)・活力(かつりょく)"}, {"k": "途方", "r": "とほう", "m": "hướng đi / 途方に暮れる", "c": 3, "o": ["彼は会社を出て帰宅途中に途方不明となってしまった。", "知らない街で道に迷い、途方に参った。", "彼は試合に勝つためなら途方を選ばなかった。", "彼は事故で家族を失い途方に暮れていた。"], "e": "✦セット: 途方に暮れる（この形のみ！）\n✗1→「行方(ゆくえ)不明(ふめい)となった」= mất tích\n　→ 彼は会社を出て帰宅途中に行方不明となってしまった。= Anh ấy rời công ty và mất tích trên đường về nhà\n✗2→「途方に参った」→「途方に暮れた」が正しい\n　→ 知らない街で道に迷い、途方に暮れた。= Lạc đường ở thành phố lạ, hoàn toàn mất phương hướng\n✗3→「手段(しゅだん)を選ばなかった」= không chọn lựa biện pháp\n　→ 彼は試合に勝つためなら手段を選ばなかった。= Để thắng trận, anh ấy không chọn lựa bất kỳ biện pháp nào\n✓4→ 彼は事故で家族を失い途方に暮れていた。= Mất đi gia đình trong tai nạn, anh ấy hoàn toàn mất phương hướng", "t": ["Anh ấy biến mất không rõ tung tích trên đường về.", "Lạc đường ở phố lạ, không biết phải làm thế nào.", "Anh ấy sẽ không chọn bất kỳ biện pháp nào để thắng trận.", "Anh ấy mất gia đình trong tai nạn và hoàn toàn mất phương hướng."], "syn": "手段(しゅだん)・方法(ほうほう)・どうしようもない"}, {"k": "明暗", "r": "めいあん", "m": "sáng tối; thành bại / 明暗を分ける", "c": 3, "o": ["夜の闇、この信号は明暗する。", "彼の人生にはいいことも悪いこともあり、明暗だった。", "鮮烈的な色を組み合わせて明暗を分けた。", "情報の有無が被災者の明暗を分けた。"], "e": "✦セット: 明暗を分ける・明暗が分かれる\n✗1→「明滅(めいめつ)する」= nhấp nháy\n　→ 夜の闇、この信号は明滅する。= Trong bóng tối đêm, tín hiệu này sáng tắt\n✗2→「明暗だった」→単独で使えない\n　→ 彼の人生にはいいことも悪いこともあり、起伏(きふく)があった。= Cuộc đời anh ấy có lúc vui lúc buồn\n✗3→「明暗(めいあん)を分けた」→文脈は合うが4が最典型\n　→ 鮮烈的な色を組み合わせて明暗を分けた。= Kết hợp màu sắc nổi bật để tạo tương phản sáng tối\n✓4→ 情報の有無が被災者の明暗を分けた。= Việc có hay không có thông tin đã quyết định số phận của nạn nhân", "t": ["Ban đêm tín hiệu này sáng tối luân phiên.", "Cuộc đời anh ấy có lúc vui lúc buồn.", "Kết hợp màu sắc nổi bật để phân biệt sáng tối.", "Việc có thông tin hay không đã quyết định số phận các nạn nhân."], "syn": "明暗(めいあん)・運命(うんめい)・明と暗(あかりとくら)"}, {"k": "資格", "r": "しかく", "m": "tư cách, quyền / 資格がある・ない", "c": 2, "o": ["パスポートに貼る写真は資格に合ったものでなければならない。", "彼はスポーツ選手としての資格に恵まれている。", "彼のような無責任な人は、親になる資格がない。", "あのような低俗なテレビ番組は見る資格がない。"], "e": "✦セット: 資格がある・資格がない・資格を取る\n✗1→「規格(きかく)に合った」= đúng quy cách\n　→ パスポートに貼る写真は規格に合ったものでなければならない。= Ảnh dán hộ chiếu phải đúng quy cách quy định\n✗2→「素質(そしつ)に恵まれている」= được thiên phú tố chất\n　→ 彼はスポーツ選手としての素質に恵まれている。= Anh ấy được thiên phú tố chất của vận động viên\n✗4→「価値(かち)がない」= không có giá trị\n　→ あのような低俗なテレビ番組は見る価値がない。= Chương trình TV tầm thường như vậy không đáng xem\n✓3→ 彼のような無責任な人は、親になる資格がない。= Người vô trách nhiệm như anh ấy không có tư cách làm cha mẹ", "t": ["Ảnh dán vào hộ chiếu phải đúng quy cách.", "Anh ấy được thiên phú tố chất của vận động viên thể thao.", "Người vô trách nhiệm như anh ấy không có tư cách làm cha mẹ.", "Chương trình TV tầm thường như vậy không đáng xem."], "syn": "権限(けんげん)・権利(けんり)・能力(のうりょく)"}]}, "復習④(28〜34)": {"words": "理屈・反感・中立・不覚・よみがえる・せかす・あおる", "qs": [{"k": "理屈", "r": "りくつ", "m": "lý lẽ / 理屈をこねる", "c": 1, "o": ["彼の思考は非常に理屈的である。", "彼は何事にも変な理屈をこねて相手を困らせる。", "感情的になって理屈を失うことのないようにしたいものだ。", "彼は理屈を抱いて母国を後にした。"], "e": "✦セット: 理屈をこねる・理屈が通る・通らない\n✗1→「論理的(ろんりてき)」= logic\n　→ 彼の思考は非常に論理的である。= Tư duy của anh ấy rất logic\n✗3→「理性(りせい)を失わないように」= không để mất lý trí\n　→ 感情的になって理性を失うことのないようにしたいものだ。= Muốn không để cảm xúc làm mất đi lý trí\n✗4→「志(こころざし)を抱(いだ)いて」= ôm chí hướng\n　→ 彼は志を抱いて母国を後にした。= Anh ấy ôm chí hướng và rời bỏ quê hương\n✓2→ 彼は何事にも変な理屈をこねて相手を困らせる。= Anh ấy hay bịa ra những lý lẽ kỳ lạ để làm khó người khác", "t": ["Tư duy của anh ấy rất logic.", "Anh ấy hay bào chữa vô lý và làm khó người khác.", "Muốn không để lý trí bị cuốn vào cảm xúc.", "Anh ấy ôm chí hướng và rời quê hương."], "syn": "屁理屈(へりくつ)・言い訳(いいわけ)・論理(ろんり)"}, {"k": "反感", "r": "はんかん", "m": "phản cảm / 反感を買う", "c": 3, "o": ["うちの犬は音や光に鋭く反感する。", "彼は自分の誤った行為を深く反感した。", "彼の一方的な非難に対して、彼女も反感を開始した。", "不用意な発言をして周囲の反感を買った。"], "e": "✦セット: 反感を買う・反感を持つ\n✗1→「反応(はんのう)する」= phản ứng (sinh lý)\n　→ うちの犬は音や光に鋭く反応する。= Con chó nhà tôi phản ứng nhạy với âm thanh và ánh sáng\n✗2→「反省(はんせい)した」= phản tỉnh\n　→ 彼は自分の誤った行為を深く反省した。= Anh ấy sâu sắc phản tỉnh về hành vi sai lầm\n✗3→「反論(はんろん)を始めた」= bắt đầu phản biện\n　→ 彼の一方的な非難に対して、彼女も反論を始めた。= Trước lời buộc tội một chiều, cô ấy cũng bắt đầu phản biện\n✓4→ 不用意な発言をして周囲の反感を買った。= Phát ngôn bất cẩn đã gây phản cảm cho mọi người xung quanh", "t": ["Con chó nhà tôi phản ứng nhạy với âm thanh và ánh sáng.", "Anh ấy sâu sắc phản tỉnh hành vi sai lầm của mình.", "Đối với lời buộc tội một chiều, cô ấy cũng bắt đầu phản biện.", "Phát ngôn bất cẩn khiến mọi người xung quanh có ác cảm."], "syn": "嫌悪(けんお)・悪感情(あくかんじょう)・不快感(ふかいかん)"}, {"k": "中立", "r": "ちゅうりつ", "m": "trung lập / 中立の立場を守る", "c": 1, "o": ["彼は多忙のため、朝から晩まで中立していた。", "彼は最後まで中立の立場を守った。", "彼は中立階級の家庭に育った。", "彼は資金不足のため計画を中立であきらめた。"], "e": "✦セット: 中立を保つ・中立の立場を守る\n✗1→「立(た)ちっぱなし」= đứng suốt\n　→ 彼は多忙のため、朝から晩まで立ちっぱなしだった。= Anh ấy bận rộn nên đứng suốt từ sáng đến tối\n✗3→「中産(ちゅうさん)階級(かいきゅう)」= tầng lớp trung lưu\n　→ 彼は中産階級の家庭に育った。= Anh ấy lớn lên trong gia đình tầng lớp trung lưu\n✗4→「中途(ちゅうと)で」= giữa chừng\n　→ 彼は資金不足のため計画を中途であきらめた。= Vì thiếu vốn, anh ấy từ bỏ kế hoạch giữa chừng\n✓2→ 彼は最後まで中立の立場を守った。= Anh ấy giữ vững lập trường trung lập đến cùng", "t": ["Anh ấy bận rộn nên đứng suốt từ sáng đến tối.", "Anh ấy giữ lập trường trung lập đến cùng.", "Anh ấy lớn lên trong gia đình tầng lớp trung lưu.", "Vì thiếu vốn, anh ấy từ bỏ kế hoạch giữa chừng."], "syn": "公平(こうへい)・第三者(だいさんしゃ)・中間(ちゅうかん)"}, {"k": "不覚", "r": "ふかく", "m": "lơ là / 不覚をとる", "c": 1, "o": ["あと1点で合格できなくて、とても不覚だった。", "彼は小学生相手に油断して不覚をとった。", "道を歩いていると、不覚に後ろから肩を叩かれた。", "人は通常、不覚にため息をついてしまう。"], "e": "✦セット: 不覚をとる・不覚にも（～してしまった）\n✗1→「悔(くや)しかった」= tiếc nuối, ức\n　→ あと1点で合格できなくて、とても悔しかった。= Chỉ thiếu 1 điểm nữa là đỗ, thật đáng tiếc\n✗3→「不意(ふい)に」= bất ngờ\n　→ 道を歩いていると、不意に後ろから肩を叩かれた。= Đang đi bộ thì bất ngờ bị vỗ vai từ phía sau\n✗4→「ふと」= vô tình, bỗng dưng\n　→ 人は通常、ふとため息をついてしまう。= Người ta thường vô tình thở dài\n✓2→ 彼は小学生相手に油断して不覚をとった。= Anh ấy mất cảnh giác trước học sinh tiểu học và bị bẽ mặt", "t": ["Chỉ thiếu 1 điểm nữa là đỗ, thật đáng tiếc.", "Anh ấy mất cảnh giác với đứa tiểu học và bị trị.", "Đang đi bộ thì bất ngờ bị vỗ vai từ phía sau.", "Người ta thường vô thức thở dài."], "syn": "油断(ゆだん)・隙(すき)・ミス"}, {"k": "よみがえる", "r": "よみがえる", "m": "hồi sinh / 記憶がよみがえる", "c": 1, "o": ["徹夜の工事のおかげで電車は通常の運行によみがえった。", "不意に10年前の記憶がよみがえった。", "彼は、信用していた友人をよみがえった。", "子どもが脱いだ靴は片方がよみがえっていた。"], "e": "✦セット: 記憶がよみがえる・意識がよみがえる\n✗1→「通常(つうじょう)の運行(うんこう)に戻(もど)った」= trở lại bình thường\n　→ 徹夜の工事のおかげで電車は通常の運行に戻った。= Nhờ công trình thâu đêm, tàu điện trở lại hoạt động bình thường\n✗3→「裏切(うらぎ)った」= phản bội\n　→ 彼は、信用していた友人を裏切った。= Anh ấy đã phản bội người bạn mà anh ấy tin tưởng\n✗4→「なくなっていた」= đã biến mất\n　→ 子どもが脱いだ靴は片方がなくなっていた。= Chiếc giày con nít cởi ra, một chiếc đã biến mất\n✓2→ 不意に10年前の記憶がよみがえった。= Bỗng nhiên ký ức 10 năm trước ùa về", "t": ["Nhờ thi công thâu đêm, tàu điện khôi phục chạy bình thường.", "Bỗng nhiên ký ức 10 năm trước ùa về.", "Anh ấy phản bội người bạn đã tin tưởng.", "Một chiếc giày của đứa trẻ cởi ra vẫn còn đó."], "syn": "蘇る(よみがえる)・復活(ふっかつ)する・思い出す(おもいだす)"}, {"k": "せかす", "r": "せかす", "m": "thúc giục / 子どもをせかす", "c": 0, "o": ["母はぐずぐずしている子どもをせかした。", "高速道路に入ると、彼は車のスピードをせかした。", "残り1分と告げられて彼は内心せかした。", "仕事の溜まっていた彼は食事もそこそこに先をせかした。"], "e": "✦セット: 子ども・相手をせかす\n✗2→「上(あ)げた」= tăng (tốc độ)\n　→ 高速道路に入ると、彼は車のスピードを上げた。= Vào cao tốc, anh ấy tăng tốc độ xe\n✗3→「焦(あせ)った」= hối hả, sốt ruột (tự mình)\n　→ 残り1分と告げられて彼は内心焦った。= Được báo còn 1 phút, trong lòng anh ấy hối hả\n✗4→「急(いそ)いだ」= vội vàng (tự mình)\n　→ 仕事の溜まっていた彼は食事もそこそこに急いだ。= Công việc chất đống, anh ấy ăn vội rồi vội vàng đi tiếp\n✓1→ 母はぐずぐずしている子どもをせかした。= Mẹ thúc giục đứa con hay lề mề", "t": ["Mẹ thúc giục đứa con cứ lề mề.", "Vào cao tốc, anh ấy tăng tốc độ xe.", "Được báo còn 1 phút, anh ấy trong lòng cảm thấy vội.", "Anh ấy bận đống việc nên ăn vội và đi tiếp."], "syn": "急かせる(いそがせる)・急き立てる(せきたてる)・催促(さいそく)する"}, {"k": "あおる", "r": "あおる", "m": "kích động / 不安をあおる", "c": 0, "o": ["みんなの不安をあおるような言動は慎むべきだ。", "暑いので彼はしょっちゅううちわで顔をあおった。", "彼は顔を手であおって嘆き悲しんだ。", "彼はくじけそうな友人を「がんばれ！」とあおった。"], "e": "✦セット: 不安・感情・炎をあおる\n✗2→「あおいだ」= quạt gió (bằng quạt tay)\n　→ 暑いので彼はしょっちゅううちわで顔をあおいだ。= Vì nóng nên anh ấy liên tục quạt quạt vào mặt\n✗3→「覆(おお)った」= che phủ\n　→ 彼は顔を手で覆って嘆き悲しんだ。= Anh ấy che mặt bằng tay và than thở đau buồn\n✗4→「励(はげ)ました」= động viên\n　→ 彼はくじけそうな友人を「がんばれ！」と励ました。= Anh ấy hét 'Cố lên!' để động viên người bạn sắp gục ngã\n✓1→ みんなの不安をあおるような言動は慎むべきだ。= Nên thận trọng với hành động có thể khoét thêm lo lắng của mọi người", "t": ["Hành động kích động lo lắng của mọi người cần phải kiềm chế.", "Nóng nên anh ấy cứ quạt mặt bằng quạt tay.", "Anh ấy che mặt bằng tay và khóc thương tiếc.", "Anh ấy hét vào bạn đang muốn bỏ cuộc: Cố lên!"], "syn": "煽る(あおる)・刺激(しげき)する・扇動(せんどう)する"}]}, "復習⑤(35〜41)": {"words": "てこずる・にごす・ばれる・かしげる・そらす・仕組む・割り込む", "qs": [{"k": "てこずる", "r": "てこずる", "m": "gặp khó khăn / 仕上げにてこずる", "c": 0, "o": ["この作品は仕上げにてこずった。", "彼は道に迷って、てこずった。", "雪の降る日に仕事で外に出なければならず、てこずった。", "彼の失礼な態度にてこずった。"], "e": "✦セット: 仕上げ・問題・扱いにてこずる\n✗2→「困(こま)った」= gặp khó khăn\n　→ 彼は道に迷って、困った。= Anh ấy lạc đường và lúng túng không biết làm sao\n✗3→「大変(たいへん)だった」= thật khổ\n　→ 雪の降る日に仕事で外に出なければならず、大変だった。= Ngày tuyết rơi mà phải ra ngoài làm việc, thật khổ\n✗4→「手(て)を焼(や)いた」= khó bảo, không trị được\n　→ 彼の失礼な態度に手を焼いた。= Thái độ thô lỗ của anh ấy làm tôi khó bảo\n✓1→ この作品は仕上げにてこずった。= Tác phẩm này gặp khó khăn ở khâu hoàn thiện", "t": ["Tác phẩm này gặp khó khăn ở khâu hoàn thiện.", "Anh ấy bị lạc đường và lúng túng.", "Hôm tuyết rơi phải ra ngoài làm, thật khổ.", "Thái độ thô lỗ của anh ấy làm mọi người khó chịu."], "syn": "手を焼く(てをやく)・苦労する(くろうする)・難航(なんこう)する"}, {"k": "にごす", "r": "にごす", "m": "nói vòng vo / 言葉をにごす", "c": 2, "o": ["彼は年齢をにごして登録した。", "彼は父親の名前をにごしてしまった。", "彼はその件に関して言葉をにごした。", "警察は事件の真相をにごした。"], "e": "✦セット: 言葉をにごす（この形のみ！）\n✗1→「ごまかして登録した」= khai gian khi đăng ký\n　→ 彼は年齢をごまかして登録した。= Anh ấy khai gian tuổi khi đăng ký\n✗2→「間違(まちが)えて」= viết nhầm\n　→ 彼は父親の名前を間違えてしまった。= Anh ấy đã viết nhầm tên cha\n✗4→「もみ消(け)した」= dập tắt, bưng bít\n　→ 警察は事件の真相をもみ消した。= Cảnh sát bưng bít sự thật của vụ án\n✓3→ 彼はその件に関して言葉をにごした。= Anh ấy nói ậm ừ, không rõ ràng về vụ việc đó", "t": ["Anh ấy khai gian tuổi khi đăng ký.", "Anh ấy vô tình làm sai tên cha.", "Anh ấy nói mập mờ về vụ việc đó.", "Cảnh sát bưng bít sự thật của vụ án."], "syn": "曖昧(あいまい)にする・ぼかす・はっきりしない"}, {"k": "ばれる", "r": "ばれる", "m": "bị lộ / うそがばれる", "c": 0, "o": ["彼のうそはすぐにばれた。", "彼は犯人がだれかすぐにばれた。", "アカデミー賞を獲った映画が日本でもばれた。", "調査により古代の遺跡がばれた。"], "e": "✦セット: うそ・秘密・犯行がばれる\n✗2→「見破(みやぶ)った」= nhìn thấu, phát hiện (chủ động)\n　→ 彼は犯人がだれかすぐに見破った。= Anh ấy ngay lập tức phát hiện ra ai là thủ phạm\n✗3→「公開(こうかい)された」= được chiếu công khai\n　→ アカデミー賞を獲った映画が日本でも公開された。= Bộ phim đoạt giải Oscar cũng được công chiếu ở Nhật\n✗4→「発見(はっけん)された」= được phát hiện\n　→ 調査により古代の遺跡が発見された。= Qua điều tra, di tích cổ đại được phát hiện\n✓1→ 彼のうそはすぐにばれた。= Lời nói dối của anh ấy bị lộ ngay", "t": ["Lời nói dối của anh ấy bị lộ ngay.", "Anh ấy phát hiện ra tên thủ phạm ngay lập tức.", "Bộ phim đoạt giải Oscar cũng được chiếu ở Nhật.", "Điều tra phát hiện di tích cổ đại."], "syn": "発覚(はっかく)する・露見(ろけん)する・見破られる(みやぶられる)"}, {"k": "かしげる", "r": "かしげる", "m": "nghiêng (đầu) / 首をかしげる", "c": 1, "o": ["地震の影響で家が少しかしげた。", "彼の発言には首をかしげた。", "学生は先生の話に耳をかしげた。", "葉が木の枝いっぱいにかしげている。"], "e": "✦セット: 首をかしげる（この形のみ！）\n✗1→「傾(かたむ)いた」= bị nghiêng (nhà)\n　→ 地震の影響で家が少し傾いた。= Do ảnh hưởng động đất, ngôi nhà bị nghiêng một chút\n✗3→「耳(みみ)を傾(かたむ)けた」= lắng nghe (cụm khác)\n　→ 学生は先生の話に耳を傾けた。= Học sinh lắng nghe câu chuyện của thầy giáo\n✗4→「茂(しげ)っている」= um tùm, rậm rạp\n　→ 葉が木の枝いっぱいに茂っている。= Lá cây phủ đầy cành um tùm\n✓2→ 彼の発言には首をかしげた。= Phát biểu của anh ấy khiến tôi nghiêng đầu nghi ngờ", "t": ["Do ảnh hưởng của động đất, nhà nghiêng đi một chút.", "Phát biểu của anh ấy khiến mọi người nghi ngờ.", "Học sinh nghiêng đầu lắng nghe thầy giáo nói.", "Lá cây phủ đầy cành."], "syn": "傾ける(かたむける)・曲げる(まげる)・傾く(かたむく)"}, {"k": "そらす", "r": "そらす", "m": "lảng đi / 目をそらす", "c": 2, "o": ["課長が田中さんと二人で話したいと言うので彼は席をそらした。", "彼はシャツのボタンをそらした。", "彼女がにらむと彼は目をそらした。", "準備が調ったので計画を行動にそらした。"], "e": "✦セット: 目をそらす・話をそらす・視線をそらす\n✗1→「席(せき)を外(はず)した」= rời chỗ ngồi\n　→ 課長が田中さんと二人で話したいと言うので彼は席を外した。= Trưởng phòng muốn nói chuyện riêng nên anh ấy rời chỗ\n✗2→「外(はず)した」= tháo ra\n　→ 彼はシャツのボタンを外した。= Anh ấy tháo cúc áo sơ mi ra\n✗4→「移(うつ)した」= chuyển sang\n　→ 準備が調ったので計画を行動に移した。= Mọi thứ đã sẵn sàng nên chuyển kế hoạch sang hành động\n✓3→ 彼女がにらむと彼は目をそらした。= Cô ấy trừng mắt, anh ấy lảng nhìn đi chỗ khác", "t": ["Trưởng phòng muốn nói chuyện riêng với Tanaka nên anh ấy ra ngoài.", "Anh ấy tháo cúc áo sơ mi.", "Cô ấy trừng mắt thì anh ấy né tránh ánh mắt.", "Chuẩn bị xong, chuyển kế hoạch sang hành động."], "syn": "外す(はずす)・逸らす(そらす)・ずらす"}, {"k": "仕組む", "r": "しくむ", "m": "sắp đặt / 意図的に仕組まれた", "c": 2, "o": ["彼は環境保護に仕組んでいる。", "この図書館は有名な建築家が仕組んだのだ。", "この事故は意図的に仕組まれたものだった。", "この辺は道が仕組んでいて分かりにくい。"], "e": "✦セット: 意図的に仕組む・陰謀を仕組む\n✗1→「取(と)り組(く)んでいる」= đang nỗ lực giải quyết\n　→ 彼は環境保護に取り組んでいる。= Anh ấy đang nỗ lực giải quyết vấn đề bảo vệ môi trường\n✗2→「設計(せっけい)した」= thiết kế\n　→ この図書館は有名な建築家が設計したのだ。= Thư viện này do kiến trúc sư nổi tiếng thiết kế\n✗4→「入(い)り組(く)んでいて」= phức tạp rối rắm\n　→ この辺は道が入り組んでいて分かりにくい。= Quanh đây đường phức tạp nên khó nhận ra\n✓3→ この事故は意図的に仕組まれたものだった。= Vụ tai nạn này là được dàn dựng có chủ đích", "t": ["Anh ấy đang tham gia bảo vệ môi trường.", "Thư viện này do kiến trúc sư nổi tiếng thiết kế.", "Vụ tai nạn này là được dàn dựng có chủ ý.", "Khu vực này đường phức tạp nên khó đi."], "syn": "たくらむ・計画(けいかく)する・陰謀(いんぼう)を巡らす"}, {"k": "割り込む", "r": "わりこむ", "m": "chen vào / 列に割り込む", "c": 0, "o": ["後ろから平然と人が行列に割り込んだ。", "彼はチケットの代金を銀行に割り込んだ。", "閉店前だったので店員は値段を割り込んでくれた。", "彼は酒のつきあいも仕事のうちだと割り込んで考えていた。"], "e": "✦セット: 列に割り込む・話に割り込む\n✗2→「振(ふ)り込(こ)んだ」= chuyển khoản\n　→ 彼はチケットの代金を銀行に振り込んだ。= Anh ấy chuyển tiền mua vé vào ngân hàng\n✗3→「割(わ)り引(び)いてくれた」= giảm giá\n　→ 閉店前だったので店員は値段を割り引いてくれた。= Vì sắp đóng cửa nên nhân viên đã giảm giá\n✗4→「割(わ)り切(き)って」= thực dụng, dứt khoát\n　→ 彼は酒のつきあいも仕事のうちだと割り切って考えていた。= Anh ấy coi việc nhậu nhẹt cũng là công việc\n✓1→ 後ろから平然と人が行列に割り込んだ。= Có người thản nhiên chen vào hàng từ phía sau", "t": ["Có người từ phía sau chen vào hàng một cách thản nhiên.", "Anh ấy chuyển tiền vé vào ngân hàng.", "Vì sắp đóng cửa nên nhân viên đã giảm giá.", "Anh ấy coi việc nhậu nhẹt cũng là một phần công việc."], "syn": "割って入る(わっていれる)・横入り(よこいり)・介入(かいにゅう)する"}]}, "復習⑥(42〜48)": {"words": "行き届く・受け止める・打ち込む・際立つ・取り組む・結びつける・見出す", "qs": [{"k": "行き届く", "r": "いきとどく", "m": "chu đáo / 気配りが行き届く", "c": 3, "o": ["彼に関するうわさが本人の耳にまで行き届いた。", "客へのサービスも行き届くと迷惑になる。", "彼は半日かけてようやく頂上に行き届いた。", "あの店は客への気配りが行き届いている。"], "e": "✦セット: 気配り・サービス・目が行き届く\n✗1→「届(とど)いた」= tin đến tai\n　→ 彼に関するうわさが本人の耳にまで届いた。= Tin đồn về anh ấy đã đến tận tai chính anh ấy\n✗2→「行き届きすぎると」→過剰サービスの文脈\n　→ 客へのサービスも過剰(かじょう)になると迷惑になる。= Dịch vụ phục vụ khách chu đáo quá cũng gây phiền\n✗3→「たどり着(つ)いた」= vất vả đến nơi\n　→ 彼は半日かけてようやく頂上にたどり着いた。= Mất nửa ngày, anh ấy mới leo đến đỉnh núi\n✓4→ あの店は客への気配りが行き届いている。= Cửa hàng đó rất chu đáo trong việc quan tâm đến khách hàng", "t": ["Tin đồn về anh ấy đã đến tai chính anh ấy.", "Dịch vụ chu đáo quá cũng gây phiền.", "Anh ấy mất nửa ngày mới đến được đỉnh núi.", "Cửa hàng đó phục vụ khách rất chu đáo."], "syn": "細やか(こまやか)・万全(ばんぜん)・徹底(てってい)する"}, {"k": "受け止める", "r": "うけとめる", "m": "nhận lấy / 気持ちを受け止める", "c": 0, "o": ["彼は彼女の気持ちを受け止めた。", "あの大学は後1週間入学願書を受け止めている。", "みんなで役割分担し、彼は会場の案内役を受け止めた。", "彼は会社を辞めると言う彼女を受け止め、考え直させた。"], "e": "✦セット: 気持ち・意見・現実を受け止める\n✗2→「受(う)け付(つ)けている」= đang nhận (đơn)\n　→ あの大学は後1週間入学願書を受け付けている。= Trường đại học đó còn nhận đơn nhập học thêm 1 tuần\n✗3→「引(ひ)き受(う)けた」= nhận lãnh nhiệm vụ\n　→ みんなで役割分担し、彼は会場の案内役を引き受けた。= Phân công nhau, anh ấy đảm nhận vai hướng dẫn\n✗4→「引(ひ)き止(と)めた」= ngăn lại\n　→ 彼は会社を辞めると言う彼女を引き止め、考え直させた。= Anh ấy ngăn cô ấy lại khi cô muốn nghỉ việc\n✓1→ 彼は彼女の気持ちを受け止めた。= Anh ấy thực sự tiếp nhận cảm xúc của cô ấy", "t": ["Anh ấy đón nhận cảm xúc của cô ấy.", "Trường đại học đó còn nhận đơn thêm 1 tuần.", "Mọi người phân công, anh ấy nhận vai hướng dẫn tại hội trường.", "Anh ấy ngăn cô ấy nghỉ việc và khiến cô ấy suy nghĩ lại."], "syn": "受け入れる(うけいれる)・理解(りかい)する・把握(はあく)する"}, {"k": "打ち込む", "r": "うちこむ", "m": "đắm chìm / 研究に打ち込む", "c": 3, "o": ["彼は試験に失敗し、打ち込んでしまった。", "この件に関してはもっと打ち込んだ議論が必要だ。", "駅員は満員電車の中に客を打ち込んだ。", "彼は今、遺伝子の研究に打ち込んでいる。"], "e": "✦セット: 研究・仕事・スポーツに打ち込む\n✗1→「落(お)ち込(こ)んで」= suy sụp\n　→ 彼は試験に失敗し、落ち込んでしまった。= Anh ấy thi trượt và suy sụp\n✗2→「突(つ)っ込(こ)んだ議論」= thảo luận sâu sắc\n　→ この件に関してはもっと突っ込んだ議論が必要だ。= Vụ này cần thảo luận kỹ hơn\n✗3→「押(お)し込(こ)んだ」= nhét vào\n　→ 駅員は満員電車の中に客を押し込んだ。= Nhân viên ga nhét khách vào tàu đông người\n✓4→ 彼は今、遺伝子の研究に打ち込んでいる。= Anh ấy hiện đang dốc sức vào nghiên cứu gen", "t": ["Anh ấy thi trượt và suy sụp.", "Vụ này cần thảo luận kỹ hơn.", "Nhân viên ga nhét khách vào tàu đông.", "Anh ấy đang dốc sức vào nghiên cứu gen."], "syn": "没頭(ぼっとう)する・熱中(ねっちゅう)する・専念(せんねん)する"}, {"k": "際立つ", "r": "きわだつ", "m": "nổi bật / 際立っている", "c": 0, "o": ["彼の成績の悪さは際立っていた。", "2日かけてやっと山の頂上に際立った。", "彼は疑惑を際立って否定した。", "捜査の末、やっと真相が際立った。"], "e": "✦セット: 際立つほど～だ・際立って優れている\n✗2→「たどり着(つ)いた」= vất vả leo đến nơi\n　→ 2日かけてやっと山の頂上にたどり着いた。= Mất 2 ngày mới leo đến đỉnh núi\n✗3→「強(つよ)く否定した」= phủ nhận mạnh mẽ\n　→ 彼は疑惑を強く否定した。= Anh ấy phủ nhận nghi ngờ một cách mạnh mẽ\n✗4→「明(あき)らかになった」= được làm rõ\n　→ 捜査の末、やっと真相が明らかになった。= Sau điều tra, cuối cùng sự thật được làm rõ\n✓1→ 彼の成績の悪さは際立っていた。= Điểm kém của anh ấy thực sự nổi bật", "t": ["Sự yếu kém trong học lực của anh ấy rất nổi bật.", "Mất 2 ngày mới leo đến đỉnh núi.", "Anh ấy phủ nhận nghi ngờ một cách mạnh mẽ.", "Sau điều tra, cuối cùng sự thật được làm rõ."], "syn": "目立つ(めだつ)・際立て(きわだて)・抜きん出る(ぬきんでる)"}, {"k": "取り組む", "r": "とりくむ", "m": "đương đầu / 問題に取り組む", "c": 2, "o": ["会社は彼のアイデアを取り組んだ。", "部屋にエアコンを取り組んでもらった。", "彼はゴミ問題に取り組んでいる。", "研修には現地の観光も取り組んであった。"], "e": "✦セット: 問題・課題・仕事に取り組む\n✗1→「取(と)り入(い)れた」= áp dụng, tiếp nhận ý tưởng\n　→ 会社は彼のアイデアを取り入れた。= Công ty đã tiếp nhận ý tưởng của anh ấy\n✗2→「取(と)り付(つ)けて」= lắp đặt\n　→ 部屋にエアコンを取り付けてもらった。= Được lắp điều hòa trong phòng\n✗4→「組(く)み込(こ)んで」= đưa vào chương trình\n　→ 研修には現地の観光も組み込んであった。= Trong khóa đào tạo có cả tham quan địa phương\n✓3→ 彼はゴミ問題に取り組んでいる。= Anh ấy đang nỗ lực giải quyết vấn đề rác thải", "t": ["Công ty đã áp dụng ý tưởng của anh ấy.", "Được lắp điều hòa trong phòng.", "Anh ấy đang nỗ lực giải quyết vấn đề rác thải.", "Trong khóa học có cả tham quan địa phương."], "syn": "取り掛かる(とりかかる)・従事(じゅうじ)する・向き合う(むきあう)"}, {"k": "結びつける", "r": "むすびつける", "m": "gắn kết / ～に結びつける", "c": 2, "o": ["彼女は長い髪を後ろで結びつけていた。", "彼は友人と彼女の仲を結びつけた。", "彼を犯行に結びつける証拠は何もなかった。", "二人は手を結びつけて歩いた。"], "e": "✦セット: ～に結びつける・証拠と結びつける\n✗1→「結(ゆ)わえて」= cột, buộc lại (tóc)\n　→ 彼女は長い髪を後ろで結わえていた。= Cô ấy buộc mái tóc dài ra phía sau\n✗2→「取(と)り持(も)った」= làm mối\n　→ 彼は友人と彼女の仲を取り持った。= Anh ấy làm mối cho bạn trai và cô ấy\n✗4→「手(て)を繋(つな)いで」= nắm tay nhau\n　→ 二人は手を繋いで歩いた。= Hai người nắm tay nhau và đi bộ\n✓3→ 彼を犯行に結びつける証拠は何もなかった。= Không có bằng chứng nào liên kết anh ấy với vụ phạm tội", "t": ["Cô ấy buộc mái tóc dài ra sau.", "Anh ấy kết nối anh bạn và cô gái với nhau.", "Không có bằng chứng liên kết anh ấy với tội ác.", "Hai người nắm tay nhau và đi bộ."], "syn": "関連付ける(かんれんづける)・つなげる・リンクする"}, {"k": "見出す", "r": "みいだす", "m": "tìm ra / 解決策を見出す", "c": 2, "o": ["友人に古いお寺へ連れて行ってもらい、お寺の中を見出した。", "会議で自分の案をみんなに見出した。", "ついに問題の解決策を見出した。", "自分の書いた文章にタイトルを見出した。"], "e": "✦セット: 解決策・答え・意味を見出す\n✗1→「見物(けんぶつ)した」= tham quan, ngắm cảnh\n　→ 友人に古いお寺へ連れて行ってもらい、お寺の中を見物した。= Được bạn đưa đến chùa cổ và tham quan bên trong\n✗2→「提案(ていあん)した」= đề xuất ý kiến\n　→ 会議で自分の案をみんなに提案した。= Đề xuất ý kiến của mình với mọi người trong cuộc họp\n✗4→「タイトルをつけた」= đặt tiêu đề\n　→ 自分の書いた文章にタイトルをつけた。= Đặt tiêu đề cho bài văn mình đã viết\n✓3→ ついに問題の解決策を見出した。= Cuối cùng đã tìm ra giải pháp cho vấn đề", "t": ["Được bạn đưa đến chùa cổ và tham quan bên trong.", "Đề xuất ý kiến của mình trong cuộc họp.", "Cuối cùng đã tìm ra giải pháp cho vấn đề.", "Tự đặt tiêu đề cho bài văn mình viết."], "syn": "発見(はっけん)する・見つける(みつける)・発掘(はっくつ)する"}]}, "復習⑦(49〜55)": {"words": "巻き込む・見逃す・突っぱねる・踏み切る・立ちはだかる・こみ上げる・言いふらす", "qs": [{"k": "巻き込む", "r": "まきこむ", "m": "cuốn vào / 事件に巻き込まれる", "c": 2, "o": ["刑事は人ごみの中に巻き込んでいた。", "首相の発言は大きな反響を巻き込んだ。", "彼女は事件に巻き込まれた。", "首にマフラーを巻き込んで出かけた。"], "e": "✦セット: 事件・問題に巻き込まれる\n✗1→「紛(まぎ)れ込(こ)んでいた」= lẫn vào\n　→ 刑事は人ごみの中に紛れ込んでいた。= Thám tử lẫn vào đám đông\n✗2→「引(ひ)き起(お)こした」= gây ra\n　→ 首相の発言は大きな反響を引き起こした。= Phát biểu của thủ tướng gây ra phản ứng lớn\n✗4→「巻(ま)いて」= quấn lại\n　→ 首にマフラーを巻いて出かけた。= Ra ngoài với chiếc khăn quàng quanh cổ\n✓3→ 彼女は事件に巻き込まれた。= Cô ấy bị cuốn vào vụ án ngoài ý muốn", "t": ["Thám tử lẫn vào đám đông.", "Phát biểu của thủ tướng gây phản ứng lớn.", "Cô ấy bị cuốn vào vụ án.", "Ra ngoài với khăn quàng cổ quấn quanh cổ."], "syn": "引き込む(ひきこむ)・巻き添え(まきぞえ)・連累(れんるい)"}, {"k": "見逃す", "r": "みのがす", "m": "bỏ qua / ミスを見逃す", "c": 3, "o": ["彼は今、目標を見逃してしまっている。", "顔がそっくりだったので兄を弟と見逃してしまった。", "彼は見逃すほど立派に成長した。", "部長は彼女のミスを見逃してくれた。"], "e": "✦セット: ミス・チャンスを見逃す\n✗1→「見失(みうしな)って」= đánh mất (mục tiêu)\n　→ 彼は今、目標を見失ってしまっている。= Anh ấy hiện đang đánh mất mục tiêu\n✗2→「見間違(みまちが)えて」= nhìn nhầm\n　→ 顔がそっくりだったので兄を弟と見間違えてしまった。= Vì mặt giống quá nên nhầm anh trai với em trai\n✗3→「見違(みちが)えるほど」= thay đổi đến mức khó nhận ra\n　→ 彼は見違えるほど立派に成長した。= Anh ấy đã trưởng thành đến mức khó nhận ra\n✓4→ 部長は彼女のミスを見逃してくれた。= Trưởng phòng đã bỏ qua lỗi của cô ấy", "t": ["Anh ấy đang đánh mất mục tiêu.", "Vì mặt giống nhau nên nhầm anh trai với em trai.", "Anh ấy lớn lên trông khác hẳn không nhận ra được.", "Trưởng phòng đã bỏ qua lỗi của cô ấy."], "syn": "見落とす(みおとす)・許す(ゆるす)・スルーする"}, {"k": "突っぱねる", "r": "つっぱねる", "m": "từ chối thẳng thừng / 要求を突っぱねる", "c": 1, "o": ["刑事は否認する容疑者に証拠を突っぱねた。", "社長は社員の要求を突っぱねた。", "警察は火事の原因を突っぱねた。", "彼はどろぼうを捕まえて警察に突っぱねた。"], "e": "✦セット: 要求・申し出を突っぱねる\n✗1→「突(つ)きつけた」= dí vào mặt (bằng chứng)\n　→ 刑事は否認する容疑者に証拠を突きつけた。= Thám tử dí bằng chứng vào mặt nghi phạm đang chối\n✗3→「調(しら)べた」= điều tra\n　→ 警察は火事の原因を調べた。= Cảnh sát điều tra nguyên nhân vụ cháy\n✗4→「突(つ)き出(だ)した」= giải lên (cảnh sát)\n　→ 彼はどろぼうを捕まえて警察に突き出した。= Anh ấy bắt tên trộm và giải lên cảnh sát\n✓2→ 社長は社員の要求を突っぱねた。= Giám đốc thẳng thừng bác bỏ yêu cầu của nhân viên", "t": ["Thám tử dí bằng chứng vào mặt nghi phạm.", "Giám đốc thẳng thừng từ chối yêu cầu của nhân viên.", "Cảnh sát điều tra nguyên nhân vụ cháy.", "Anh ấy bắt tên trộm và nộp cho cảnh sát."], "syn": "断る(ことわる)・拒絶(きょぜつ)する・はねのける"}, {"k": "踏み切る", "r": "ふみきる", "m": "quyết định bước ra / 海外進出に踏み切る", "c": 1, "o": ["空き缶を踏み切って捨てた。", "あの会社は海外進出に踏み切った。", "大学を卒業し社会人としての第一歩を踏み切った。", "彼は借金を踏み切った。"], "e": "✦セット: 海外進出・値上げ・実行に踏み切る\n✗1→「踏(ふ)んで」= đạp lên\n　→ 空き缶を踏んで捨てた。= Đạp bẹp lon rỗng rồi vứt đi\n✗3→「踏(ふ)み出(だ)した」= bước ra (nhẹ hơn)\n　→ 大学を卒業し社会人としての第一歩を踏み出した。= Tốt nghiệp đại học và bước chân đầu tiên vào xã hội\n✗4→「踏(ふ)み倒(たお)した」= quỵt nợ\n　→ 彼は借金を踏み倒した。= Anh ấy quỵt nợ\n✓2→ あの会社は海外進出に踏み切った。= Công ty đó đã quyết tâm tiến ra thị trường nước ngoài", "t": ["Đạp bẹp lon rỗng rồi vứt đi.", "Công ty đó đã quyết định tiến vào thị trường nước ngoài.", "Tốt nghiệp đại học và bước chân đầu tiên vào đời.", "Anh ấy quyết định không trả nợ."], "syn": "決断(けつだん)する・決行(けっこう)する・踏み出す(ふみだす)"}, {"k": "立ちはだかる", "r": "たちはだかる", "m": "chắn ngang / 壁が立ちはだかる", "c": 0, "o": ["彼の行く手には大きな壁が立ちはだかっていた。", "何度失敗しても、また元気に立ちはだかった。", "行き詰まったときは原点に立ちはだかってやり直そう。", "夫は妻の出産に立ちはだかった。"], "e": "✦セット: 壁・障害が立ちはだかる\n✗2→「立(た)ち上(あ)がった」= đứng dậy (lại)\n　→ 何度失敗しても、また元気に立ち上がった。= Dù thất bại bao nhiêu lần, lại đứng dậy đầy sức sống\n✗3→「立(た)ち返(かえ)って」= quay lại điểm xuất phát\n　→ 行き詰まったときは原点に立ち返ってやり直そう。= Khi bế tắc, hãy quay về điểm xuất phát và làm lại\n✗4→「立(た)ち会(あ)った」= có mặt, chứng kiến\n　→ 夫は妻の出産に立ち会った。= Người chồng đã có mặt khi vợ sinh con\n✓1→ 彼の行く手には大きな壁が立ちはだかっていた。= Trên con đường của anh ấy có bức tường lớn chắn ngang", "t": ["Trước mặt anh ấy có một bức tường lớn chắn ngang.", "Dù thất bại bao nhiêu lần, lại đứng dậy đầy tinh thần.", "Khi bế tắc hãy quay về điểm xuất phát và làm lại.", "Chồng đã có mặt khi vợ sinh con."], "syn": "立ちふさがる(たちふさがる)・阻む(はばむ)・妨げる(さまたげる)"}, {"k": "こみ上げる", "r": "こみあげる", "m": "trào dâng / 悲しみがこみ上げる", "c": 3, "o": ["嘔吐はひどくこみ上げていた。", "彼は締め切りの1週間前に原稿をこみ上げた。", "涙水がだんだんこみ上げてきた。", "悲しみが後から後からこみ上げてきた。"], "e": "✦セット: 悲しみ・感動・涙がこみ上げる\n✗1→「嘔吐(おうと)がひどかった」= buồn nôn nặng\n　→ 嘔吐はひどかった。= Cơn buồn nôn rất nặng\n✗2→「仕上(しあ)げた」= hoàn thành\n　→ 彼は締め切りの1週間前に原稿を仕上げた。= Anh ấy hoàn thành bản thảo trước deadline 1 tuần\n✗3→「涙(なみだ)がだんだんこみ上げてきた」→文が不自然\n　→ 涙がだんだんあふれてきた。= Nước mắt dần dần trào ra\n✓4→ 悲しみが後から後からこみ上げてきた。= Nỗi buồn cứ trào dâng liên tiếp từng đợt", "t": ["Buồn nôn rất nặng.", "Anh ấy hoàn thành bản thảo trước deadline 1 tuần.", "Nước mắt dần trào lên.", "Nỗi buồn cứ trào lên từng đợt từ sau lòng."], "syn": "湧き上がる(わきあがる)・込み上げる(こみあげる)・溢れる(あふれる)"}, {"k": "言いふらす", "r": "いいふらす", "m": "tung tin / うわさを言いふらす", "c": 1, "o": ["自分の今の感情を言葉に言いふらすのは難しい。", "彼は彼女のうわさを言いふらした。", "難解な部分は分かりやすい言葉で言いふらして説明した。", "裁判長は被告人に刑を言いふらした。"], "e": "✦セット: うわさ・秘密を言いふらす\n✗1→「表現(ひょうげん)する」= diễn đạt\n　→ 自分の今の感情を言葉に表現するのは難しい。= Thật khó để diễn đạt cảm xúc hiện tại bằng lời\n✗3→「言(い)い換(か)えて」= diễn đạt lại, paraphrase\n　→ 難解な部分は分かりやすい言葉で言い換えて説明した。= Phần khó hiểu được giải thích lại bằng ngôn ngữ dễ hiểu\n✗4→「言(い)い渡(わた)した」= tuyên (án)\n　→ 裁判長は被告人に刑を言い渡した。= Chánh án tuyên án cho bị cáo\n✓2→ 彼は彼女のうわさを言いふらした。= Anh ấy đã tung tin đồn về cô ấy ra khắp nơi", "t": ["Thật khó để diễn đạt cảm xúc hiện tại thành lời.", "Anh ấy tung tin đồn về cô ấy ra khắp nơi.", "Giải thích phần khó hiểu bằng ngôn ngữ dễ hiểu.", "Chánh án tuyên án bị cáo."], "syn": "広める(ひろめる)・言い触れる(いいふれる)・噂を流す(うわさをながす)"}]}, "復習⑧(56〜62)": {"words": "持ち越す・くよくよ・ひやひや・びっしり・ゆったり・ころころ・やたらに", "qs": [{"k": "持ち越す", "r": "もちこす", "m": "mang sang, hoãn lại / 次回に持ち越す", "c": 0, "o": ["この企画は来年度に持ち越された。", "彼はとなりの町に持ち越してしまった。", "彼は車のスピードを上げて、前の車を持ち越した。", "入場者の数は1万人を持ち越した。"], "e": "✦セット: 問題・案件を持ち越す\n✗2→「引(ひ)っ越(こ)して」= dọn nhà\n　→ 彼はとなりの町に引っ越してしまった。= Anh ấy đã dọn sang thị trấn bên cạnh\n✗3→「追(お)い越(こ)した」= vượt qua\n　→ 彼は車のスピードを上げて、前の車を追い越した。= Anh ấy tăng tốc và vượt qua xe phía trước\n✗4→「超(こ)えた」= vượt quá (số lượng)\n　→ 入場者の数は1万人を超えた。= Số người vào đã vượt quá 10.000 người\n✓1→ この企画は来年度に持ち越された。= Kế hoạch này được dời sang năm tài khóa tới", "t": ["Kế hoạch này được hoãn sang năm tài khóa tới.", "Anh ấy chuyển sang thị trấn bên cạnh.", "Anh ấy tăng tốc và vượt qua xe phía trước.", "Số lượng người vào đã vượt quá 10.000 người."], "syn": "先送り(さきおくり)・延期(えんき)・繰り越す(くりこす)"}, {"k": "くよくよ", "r": "くよくよ", "m": "lo lắng mãi / くよくよする", "c": 2, "o": ["彼は自分の責任を認め、くよくよした。", "新しいコピー機の使い方がわからずくよくよしていたら彼が助けてくれた。", "彼は自分のミスを気にして、いつまでもくよくよしていた。", "熱が出て、急に立ち上がると頭がくよくよした。"], "e": "✦セット: くよくよ悩む・くよくよしない\n✗1→「反省(はんせい)した」= phản tỉnh, nhận lỗi\n　→ 彼は自分の責任を認め、反省した。= Anh ấy nhận lỗi và phản tỉnh\n✗2→「まごまごして」= lúng túng, loay hoay\n　→ 新しいコピー機の使い方がわからずまごまごしていたら彼が助けてくれた。= Không biết dùng máy mà loay hoay thì anh ấy đã giúp\n✗4→「くらくらした」= chóng mặt\n　→ 熱が出て、急に立ち上がると頭がくらくらした。= Sốt cao, đứng dậy đột ngột thì đầu óc choáng váng\n✓3→ 彼は自分のミスを気にして、いつまでもくよくよしていた。= Anh ấy cứ để bụng về lỗi lầm của mình và dằn vặt mãi", "t": ["Anh ấy nhận lỗi và hối hận mãi.", "Không biết dùng máy photocopy mới mà lúng túng, anh ấy đã giúp.", "Anh ấy cứ để tâm đến lỗi lầm của mình mãi.", "Sốt cao, đứng dậy đột ngột thì đầu choáng váng."], "syn": "悩む(なやむ)・引きずる(ひきずる)・気にする(きにする)"}, {"k": "ひやひや", "r": "ひやひや", "m": "hồi hộp lo sợ / 内心ひやひやする", "c": 1, "o": ["本番が近づくと、緊張して胸がひやひやした。", "うそがばれるのではないかと内心ひやひやしていた。", "寝ている子を起こさないように夫婦はひやひや話した。", "彼は高い崖の上からひやひや下をのぞいてみた。"], "e": "✦セット: 内心ひやひやする\n✗1→「どきどきした」= hồi hộp phấn khích (tích cực hơn)\n　→ 本番が近づくと、緊張して胸がどきどきした。= Khi buổi biểu diễn đến gần, tim tôi đập hồi hộp\n✗3→「ひそひそ話した」= thì thầm trò chuyện\n　→ 寝ている子を起こさないように夫婦はひそひそ話した。= Để không đánh thức con ngủ, hai vợ chồng thì thầm trò chuyện\n✗4→「おそるおそる」= rón rén, dè dặt\n　→ 彼は高い崖の上からおそるおそる下をのぞいてみた。= Anh ấy rón rén nhìn xuống từ vách đá cao\n✓2→ うそがばれるのではないかと内心ひやひやしていた。= Trong lòng lo sợ không biết lời nói dối có bị lộ không", "t": ["Tim đập hồi hộp khi buổi biểu diễn đến gần.", "Lo lắng sẽ bị lộ lời nói dối nên trong lòng hồi hộp.", "Không muốn đánh thức con đang ngủ nên vợ chồng nói chuyện thì thầm.", "Anh ấy nhìn xuống từ vách đá cao một cách rụt rè."], "syn": "ドキドキ・冷や汗(ひやあせ)・緊張(きんちょう)"}, {"k": "びっしり", "r": "びっしり", "m": "chật kín / びっしり詰まっている", "c": 3, "o": ["彼女は彼に一日中びっしりとくっついて離れなかった。", "彼は運動して、びっしり汗をかいた。", "監督は選手たちをびっしり鍛えた。", "仕事の予定は来週までびっしり詰まっている。"], "e": "✦セット: びっしり詰まっている\n✗1→「べったり」= bám dính chặt\n　→ 彼女は彼に一日中べったりとくっついて離れなかった。= Cô ấy bám chặt vào anh ấy cả ngày không rời\n✗2→「びっしょり」= ướt đẫm\n　→ 彼は運動して、びっしょり汗をかいた。= Anh ấy vận động và đổ mồ hôi đầm đìa\n✗3→「みっちり」= rèn luyện kỹ lưỡng\n　→ 監督は選手たちをみっちり鍛えた。= Huấn luyện viên rèn luyện các cầu thủ kỹ lưỡng\n✓4→ 仕事の予定は来週までびっしり詰まっている。= Lịch công việc chật kín đến tận tuần sau", "t": ["Suốt ngày cô ấy bám sát anh ấy không rời.", "Anh ấy vận động và ra mồ hôi đẫm.", "Huấn luyện viên rèn luyện các cầu thủ kỹ lưỡng.", "Lịch làm việc chật kín đến tận tuần sau."], "syn": "ぎっしり・いっぱい・詰まっている(つまっている)"}, {"k": "ゆったり", "r": "ゆったり", "m": "thư thái / ゆったり過ごす", "c": 3, "o": ["部屋を貸し切りにしてもらい、ゆったり食事した。", "彼は過労で倒れ、ゆったりしていた。", "彼はピアノを演奏する恋人の顔を見つめてゆったりしていた。", "今度の休日は温泉でゆったり過ごすつもりだ。"], "e": "✦セット: ゆったり過ごす\n✗2→「ぐったり」= kiệt sức, mệt lả\n　→ 彼は過労で倒れ、ぐったりしていた。= Anh ấy ngã vì kiệt sức và nằm liệt\n✗3→「うっとり」= ngây ngất, mê mẩn\n　→ 彼はピアノを演奏する恋人の顔を見つめてうっとりしていた。= Anh ấy nhìn đắm đuối khuôn mặt người yêu đang chơi piano\n✓4→ 今度の休日は温泉でゆったり過ごすつもりだ。= Kỳ nghỉ tới dự định nghỉ dưỡng thư thái ở suối nước nóng", "t": ["Đặt riêng phòng và ăn uống thoải mái.", "Anh ấy kiệt sức vì làm việc quá sức.", "Anh ấy nhìn đắm đuối khuôn mặt người yêu đang đàn piano.", "Kỳ nghỉ tới dự định nghỉ dưỡng thoải mái ở suối nước nóng."], "syn": "のんびり・リラックス・ゆっくり"}, {"k": "ころころ", "r": "ころころ", "m": "thay đổi liên tục / 意見がころころ変わる", "c": 3, "o": ["彼は部屋の中でころころするのが好きだ。", "彼はあの大学ならころころ入れると思った。", "他人の話をころころ信じるべきではない。", "彼は言うことがころころ変わるので信用できない。"], "e": "✦セット: 意見がころころ変わる\n✗1→「ころころするのが好き」= thích lăn qua lăn lại\n　→ 彼は部屋の中でころころするのが好きだ。= Anh ấy thích lăn qua lăn lại trong phòng\n✗2→「簡単(かんたん)に入れる」= dễ dàng vào được\n　→ 彼はあの大学なら簡単に入れると思った。= Anh ấy nghĩ vào trường đại học đó thì dễ dàng\n✗3→「ころっと」= dễ dàng tin ngay\n　→ 他人の話をころっと信じるべきではない。= Không nên dễ dàng tin ngay lời người khác\n✓4→ 彼は言うことがころころ変わるので信用できない。= Anh ấy hay thay đổi lời nói liên tục nên không tin được", "t": ["Anh ấy thích lăn lộn trong phòng.", "Anh ấy cho rằng dễ dàng vào trường đó.", "Không nên tin ngay lời người khác.", "Anh ấy không thể tin tưởng vì hay thay đổi ý kiến."], "syn": "コロコロ・コロっと・くるくる"}, {"k": "やたらに", "r": "やたらに", "m": "bừa bãi, quá mức / やたらに汗をかく", "c": 2, "o": ["急いでいて、やたらに考える暇もなかった。", "彼女の前では緊張してやたらに口が利けなかった。", "どこか具合でも悪いのか、彼はやたらに汗をかいていた。", "強い者がやたらに勝つとは限らない。"], "e": "✦セット: やたらに汗をかく\n✗1→「ゆっくり考える暇もなかった」= không có thời gian suy nghĩ từ từ\n　→ 急いでいて、ゆっくり考える暇もなかった。= Vì vội vàng, không có thời gian để cân nhắc kỹ\n✗2→「まともに口が利けなかった」= không nói được gì đàng hoàng\n　→ 彼女の前では緊張してまともに口が利けなかった。= Trước mặt cô ấy thì lo lắng đến mức không nói được gì\n✗4→「必(かなら)ずしも」= không nhất thiết\n　→ 強い者が必ずしも勝つとは限らない。= Người mạnh không nhất thiết luôn thắng\n✓3→ どこか具合でも悪いのか、彼はやたらに汗をかいていた。= Không biết có vấn đề sức khỏe không, anh ấy đổ mồ hôi quá mức", "t": ["Vội vã nên không có thời gian nghĩ kỹ.", "Trước mặt cô ấy thì căng thẳng không nói được gì.", "Không biết có vấn đề sức khỏe không, anh ấy đổ mồ hôi quá nhiều.", "Người mạnh không nhất thiết luôn thắng."], "syn": "むやみに・やみくもに・無闇(むやみ)に"}]}, "復習⑨(70〜76)": {"words": "著しい・心細い・望ましい・なめらか・ささやか・さかん・もってのほか", "qs": [{"k": "著しい", "r": "いちじるしい", "m": "đáng kể, rõ rệt / 著しい発展", "c": 2, "o": ["彼は世界的にも著しい作家のサインをもらった。", "今日の彼の服装は派手でとても著しい。", "あの国はこの10年で著しい発展を遂げた。", "彼の言動は非常識も著しい。"], "e": "✦セット: 著しい発展・変化・著しく成長する\n✗1→「著名(ちょめい)な作家」= nhà văn nổi tiếng\n　→ 彼は世界的にも著名な作家のサインをもらった。= Anh ấy xin chữ ký của nhà văn nổi tiếng thế giới\n✗2→「目立(めだ)って」= nổi bật\n　→ 今日の彼の服装は派手でとても目立っている。= Trang phục của anh ấy hôm nay rất sặc sỡ và nổi bật\n✗4→「甚(はなは)だしい」= quá đáng, thậm tệ\n　→ 彼の言動は非常識も甚だしい。= Hành vi của anh ấy quá đáng và phi lý\n✓3→ あの国はこの10年で著しい発展を遂げた。= Đất nước đó đã đạt được sự phát triển đáng kể trong 10 năm", "t": ["Anh ấy xin chữ ký của nhà văn nổi tiếng thế giới.", "Trang phục hôm nay của anh ấy rất sặc sỡ và nổi bật.", "Đất nước đó đã phát triển đáng kể trong 10 năm qua.", "Hành vi của anh ấy cũng quá mức vô lý."], "syn": "顕著(けんちょ)・目立つ(めだつ)・際立つ(きわだつ)"}, {"k": "心細い", "r": "こころぼそい", "m": "cô đơn, lo lắng / 心細い思いをする", "c": 1, "o": ["記者の心細い質問に、政治家は答えられなかった。", "一人暮らしの彼女は、病気のとき心細かった。", "彼は彼女のことが心細かったので家まで送って行った。", "怒ったときの彼の顔はとても心細かった。"], "e": "✦セット: 一人でいて心細い\n✗1→「鋭(するど)い質問」= câu hỏi sắc bén\n　→ 記者の鋭い質問に、政治家は答えられなかった。= Câu hỏi sắc bén của phóng viên khiến chính khách không trả lời được\n✗3→「心配(しんぱい)だった」= lo lắng cho người khác\n　→ 彼は彼女のことが心配だったので家まで送って行った。= Vì lo cho cô ấy nên anh ấy đưa về tận nhà\n✗4→「恐(おそ)ろしかった」= đáng sợ\n　→ 怒ったときの彼の顔はとても恐ろしかった。= Khuôn mặt anh ấy khi tức giận trông rất đáng sợ\n✓2→ 一人暮らしの彼女は、病気のとき心細かった。= Sống một mình, khi bị bệnh cô ấy cảm thấy cô đơn bất an", "t": ["Câu hỏi sắc bén của phóng viên khiến chính khách không trả lời được.", "Cô ấy sống một mình và cảm thấy cô đơn lo lắng khi ốm.", "Anh ấy lo lắng cho cô ấy nên đưa về tận nhà.", "Khuôn mặt anh ấy khi tức giận trông rất đáng sợ."], "syn": "不安(ふあん)・孤独(こどく)・頼りない(たよりない)"}, {"k": "望ましい", "r": "のぞましい", "m": "đáng mong đợi / ～することが望ましい", "c": 3, "o": ["この山の頂上からはとても景色が望ましい。", "明日の朝には大雨になることが望ましい。", "彼の望ましいことは一つも実現できなかった。", "話し合いで解決することが望ましい。"], "e": "✦セット: ～することが望ましい\n✗1→「素晴(すば)らしい」= tuyệt vời\n　→ この山の頂上からはとても景色が素晴らしい。= Từ đỉnh núi này nhìn cảnh rất đẹp\n✗2→「大雨が望ましい」は不自然（悪い状況）\n　→ 明日の朝には晴れることが望ましい。= Sáng mai trời nắng là điều đáng mong đợi\n✗3→「望(のぞ)んでいた」= đã mong muốn\n　→ 彼の望んでいたことは一つも実現できなかった。= Không có điều nào mà anh ấy mong đợi thành hiện thực\n✓4→ 話し合いで解決することが望ましい。= Giải quyết bằng thương lượng là điều lý tưởng nhất", "t": ["Từ đỉnh núi này nhìn phong cảnh rất đẹp.", "Mong trời mai sáng sẽ mưa to.", "Không có điều nào trong số những gì anh ấy mong đợi thành hiện thực.", "Giải quyết bằng thương lượng là điều đáng mong đợi nhất."], "syn": "好ましい(このましい)・理想的(りそうてき)・適切(てきせつ)"}, {"k": "なめらか", "r": "なめらか", "m": "suôn sẻ, trơn tru / なめらかに話す", "c": 0, "o": ["彼はきれいな日本語でなめらかに話した。", "道に氷が張って、なめらかで危険だ。", "彼の頭はなめらかに光っていた。", "浮き輪がないと泳げない彼のそばを彼女はなめらかに泳いで行った。"], "e": "✦セット: なめらかに話す・なめらかな肌\n✗2→「つるつるで」= trơn trượt (nguy hiểm)\n　→ 道に氷が張って、つるつるで危険だ。= Đường đóng băng, trơn trượt nguy hiểm\n✗3→「てかてか光っていた」= bóng loáng\n　→ 彼の頭はてかてか光っていた。= Đầu anh ấy bóng loáng\n✗4→「すいすい泳いで」= bơi trôi chảy\n　→ 彼のそばを彼女はすいすい泳いで行った。= Cô ấy bơi trôi chảy qua bên cạnh anh ấy\n✓1→ 彼はきれいな日本語でなめらかに話した。= Anh ấy nói tiếng Nhật đẹp và lưu loát", "t": ["Anh ấy nói tiếng Nhật đẹp, lưu loát.", "Đường đóng băng, trơn trượt và nguy hiểm.", "Đầu anh ấy bóng loáng.", "Cô ấy bơi vút qua bên cạnh anh ấy không biết bơi."], "syn": "スムーズ・流暢(りゅうちょう)・滑(なめ)らか"}, {"k": "ささやか", "r": "ささやか", "m": "nhỏ bé, khiêm tốn / ささやかなお祝い", "c": 2, "o": ["もう残り時間はささやかだ。", "会社は規模をささやかにした。", "彼は彼女の誕生日に二人きりでささやかなお祝いをした。", "彼は彼女にささやかな皮肉を言った。"], "e": "✦セット: ささやかなお祝い・贈り物\n✗1→「わずか」= ít ỏi (số lượng)\n　→ もう残り時間はわずかだ。= Thời gian còn lại không còn nhiều\n✗2→「縮小(しゅくしょう)した」= thu nhỏ\n　→ 会社は規模を縮小した。= Công ty thu nhỏ quy mô\n✗4→「さりげない皮肉」= câu mỉa mai nhẹ nhàng\n　→ 彼は彼女にさりげない皮肉を言った。= Anh ấy nói một câu mỉa mai khéo léo với cô ấy\n✓3→ 彼は彼女の誕生日に二人きりでささやかなお祝いをした。= Anh ấy tổ chức bữa tiệc nhỏ hai người cho sinh nhật cô ấy", "t": ["Thời gian còn lại ít ỏi.", "Công ty thu hẹp quy mô.", "Anh ấy tổ chức bữa tiệc sinh nhật nhỏ hai người.", "Anh ấy nói một câu mỉa mai nhỏ với cô ấy."], "syn": "慎ましい(つつましい)・小さな・簡素(かんそ)な"}, {"k": "さかん", "r": "さかん", "m": "thịnh vượng, sôi nổi / さかんに行われる", "c": 2, "o": ["お祭りで神社の境内はさかんだった。", "マラソンのスタートラインに並んだ選手たちは、さかんに走り出した。", "世界中でデモがさかんに行われるようになった。", "この学校の生徒は勉強がさかんだ。"], "e": "✦セット: さかんに行われる\n✗1→「にぎやかだった」= náo nhiệt\n　→ お祭りで神社の境内はにぎやかだった。= Trong lễ hội, sân chùa rất náo nhiệt\n✗2→「一斉(いっせい)に走り出した」= đồng loạt chạy ra\n　→ マラソンのスタートラインに並んだ選手たちは、一斉に走り出した。= Các vận động viên đồng loạt chạy ra từ vạch xuất phát\n✗4→「熱心(ねっしん)だ」= nhiệt tình, chăm chỉ\n　→ この学校の生徒は勉強が熱心だ。= Học sinh trường này học tập rất nhiệt tình\n✓3→ 世界中でデモがさかんに行われるようになった。= Biểu tình đang diễn ra sôi nổi khắp thế giới", "t": ["Trong lễ hội, khuôn viên đền rất nhộn nhịp.", "Các vận động viên xếp hàng tại vạch xuất phát đồng loạt chạy.", "Biểu tình bắt đầu diễn ra sôi nổi khắp thế giới.", "Học sinh trường này học tập rất chăm chỉ."], "syn": "活発(かっぱつ)・盛ん(さかん)・積極的(せっきょくてき)"}, {"k": "もってのほか", "r": "もってのほか", "m": "không thể chấp nhận / もってのほかだ", "c": 1, "o": ["今年の冬の寒さはもってのほかだった。", "みんなから集めた募金を使いこむとは、もってのほかだ。", "一般社員は遅刻は認められないのだが、彼の場合はもってのほかだった。", "あのまじめな彼が遅刻するとは、もってのほかだ。"], "e": "✦セット: ～するとは、もってのほかだ\n✗1→「格別(かくべつ)/ひどかった」= đặc biệt, tệ hại\n　→ 今年の冬の寒さは格別だった。= Cái lạnh mùa đông năm nay thật đặc biệt\n✗3→「なおさら」= lại càng hơn\n　→ 一般社員は遅刻は認められないのだが、部長の場合はなおさらだった。= Nhân viên thường không được đi trễ, trưởng phòng lại càng không\n✓2→ みんなから集めた募金を使いこむとは、もってのほかだ。= Biển thủ tiền quyên góp từ mọi người, thật không thể chấp nhận", "t": ["Cái lạnh mùa đông năm nay đặc biệt khắc nghiệt.", "Sử dụng tiền quyên góp từ mọi người thì thật không thể chấp nhận.", "Nhân viên thường không được phép đi trễ, nhưng trường hợp của anh ấy lại càng không được.", "Anh ấy chăm chỉ như vậy mà đi trễ thật không thể hiểu được."], "syn": "言語道断(ごんごどうだん)・論外(ろんがい)・とんでもない"}]}, "復習⑩(84〜90)": {"words": "糸口・間柄・下見・図星・段取り・駆け引き・前触れ", "qs": [{"k": "糸口", "r": "いとぐち", "m": "manh mối / 解決の糸口", "c": 1, "o": ["彼女は縫い針の糸口に糸を通した。", "警察は犯人特定の糸口を見つけた。", "この図書館の閲覧室が二人の出会った糸口だった。", "彼も入社した糸口は何が何だか分からなかった。"], "e": "✦セット: 解決の糸口を見つける・糸口をつかむ\n✗1→「糸穴(いとあな)」= lỗ kim\n　→ 彼女は縫い針の糸穴に糸を通した。= Cô ấy xâu chỉ qua lỗ kim khâu\n✗3→「きっかけ」= cơ hội, duyên cớ\n　→ この図書館の閲覧室が二人の出会ったきっかけだった。= Phòng đọc thư viện này là cơ duyên gặp gỡ của hai người\n✗4→「経緯(けいい)」= quá trình, đầu đuôi sự việc\n　→ 彼も入社した経緯は何が何だか分からなかった。= Anh ấy vào làm việc cũng không hiểu đầu đuôi thế nào\n✓2→ 警察は犯人特定の糸口を見つけた。= Cảnh sát đã tìm thấy manh mối để xác định thủ phạm", "t": ["Cô ấy xâu chỉ qua lỗ kim.", "Cảnh sát tìm thấy manh mối để xác định thủ phạm.", "Phòng đọc sách thư viện này là nơi nhân duyên gặp gỡ của hai người.", "Anh ấy vào làm việc cũng không hiểu đầu đuôi là gì."], "syn": "手がかり(てがかり)・きっかけ・突破口(とっぱこう)"}, {"k": "間柄", "r": "あいだがら", "m": "mối quan hệ / 二人の間柄", "c": 1, "o": ["彼は相手との間柄をはかって上手に会話を進めた。", "彼と彼女の間柄を調べた。", "この停留所には約10分の間柄でバスが来る。", "この件は彼女とは間柄なかった。"], "e": "✦セット: 二人の間柄\n✗1→「距離感(きょりかん)をはかって」= đo lường khoảng cách\n　→ 彼は相手との距離感をはかって上手に会話を進めた。= Anh ấy đo lường khoảng cách và dẫn dắt cuộc trò chuyện khéo léo\n✗3→「間隔(かんかく)」= khoảng cách, khoảng thời gian\n　→ この停留所には約10分の間隔でバスが来る。= Trạm dừng này cứ khoảng 10 phút có một chuyến xe buýt\n✗4→「関係(かんけい)がなかった」= không liên quan\n　→ この件は彼女とは関係がなかった。= Vụ việc này không liên quan gì đến cô ấy\n✓2→ 彼と彼女の間柄を調べた。= Tôi đã tìm hiểu mối quan hệ giữa anh ấy và cô ấy", "t": ["Anh ấy đo lường khoảng cách với đối phương và khéo léo trò chuyện.", "Anh ấy điều tra mối quan hệ giữa hai người.", "Trạm dừng này có xe buýt đến cứ 10 phút một lần.", "Vụ việc này không liên quan gì đến cô ấy."], "syn": "関係(かんけい)・続き柄(つづきがら)・縁(えん)"}, {"k": "下見", "r": "したみ", "m": "xem trước / 会場の下見", "c": 2, "o": ["彼女は弟のことを下見していた。", "この半年で会社の経営が下見になって来た。", "コンサートを開くため、会場の下見に行った。", "ベッドに下見に寝てください。"], "e": "✦セット: 会場・現場の下見をする\n✗1→「監視(かんし)していた」= theo dõi, giám sát\n　→ 彼女は弟のことを監視していた。= Cô ấy đang theo dõi em trai\n✗2→「右肩(みぎかた)下(さ)がりになって来た」= đang đi xuống\n　→ この半年で会社の経営が右肩下がりになって来た。= Trong nửa năm qua, tình hình kinh doanh công ty đi xuống\n✗4→「下(した)に寝てください」= ở phía dưới\n　→ ベッドに下に寝てください。= Hãy nằm xuống dưới\n✓3→ コンサートを開くため、会場の下見に行った。= Để tổ chức hòa nhạc, họ đã đi khảo sát địa điểm trước", "t": ["Cô ấy đang giám sát em trai.", "Tình hình kinh doanh công ty đã xuống dốc trong nửa năm qua.", "Đến xem trước địa điểm để tổ chức hòa nhạc.", "Vui lòng nằm xuống dưới để kiểm tra."], "syn": "視察(しさつ)・下調べ(したしらべ)・事前調査(じぜんちょうさ)"}, {"k": "図星", "r": "ずぼし", "m": "trúng đích / 図星だった", "c": 2, "o": ["教科書の大事な所に図星を付けた。", "彼女は中年男性の図星だった。", "彼のあわてようを見ると、彼女が言ったことは図星だったようだ。", "彼はメールを書くとき、うれしさを図星で示した。"], "e": "✦セット: 図星を指す・図星だった\n✗1→「印(しるし)/マーク」= dấu, ký hiệu\n　→ 教科書の大事な所に印をつけた。= Đánh dấu chỗ quan trọng trong sách giáo khoa\n✗2→「理想(りそう)の」= lý tưởng\n　→ 彼女は中年男性の理想だった。= Cô ấy là mẫu người lý tưởng của đàn ông trung niên\n✗4→「絵文字(えもじ)」= biểu tượng cảm xúc\n　→ 彼はメールを書くとき、うれしさを絵文字で示した。= Anh ấy dùng biểu tượng cảm xúc để thể hiện niềm vui trong email\n✓3→ 彼のあわてようを見ると、彼女が言ったことは図星だったようだ。= Nhìn vẻ hoảng hốt của anh ấy, có vẻ điều cô ấy nói đã trúng đích", "t": ["Đánh dấu phần quan trọng trong sách giáo khoa.", "Cô ấy là người lý tưởng của trung niên.", "Nhìn cách anh ấy luống cuống thì có vẻ những gì cô ấy nói là chính xác.", "Anh ấy dùng biểu tượng cảm xúc để thể hiện niềm vui trong email."], "syn": "正解(せいかい)・的中(てきちゅう)・核心(かくしん)"}, {"k": "段取り", "r": "だんどり", "m": "chuẩn bị / 段取りを組む", "c": 1, "o": ["一つ一つ段取りを踏んで進まないと仕事はうまくいかない。", "彼は仕事の段取りを組むのがうまい。", "企画を進める段取りでいくつも問題が発生した。", "友人が訪ねて来るので、夕食を段取りした。"], "e": "✦セット: 段取りを組む\n✗1→「段取りを踏んで」→「段取りを踏む」は自然な表現\n　→ 一つ一つ段取りを踏んで進まないと仕事はうまくいかない。= Nếu không từng bước theo quy trình thì công việc không suôn sẻ\n✗3→「過程(かてい)で」= trong quá trình\n　→ 企画を進める過程でいくつも問題が発生した。= Trong quá trình thúc đẩy kế hoạch, nhiều vấn đề phát sinh\n✗4→「準備(じゅんび)した」= chuẩn bị\n　→ 友人が訪ねて来るので、夕食を準備した。= Bạn sắp đến chơi nên chuẩn bị bữa tối\n✓2→ 彼は仕事の段取りを組むのがうまい。= Anh ấy rất giỏi lên kế hoạch quy trình công việc", "t": ["Phải từng bước thực hiện theo trình tự không thì công việc không suôn sẻ.", "Anh ấy giỏi lên kế hoạch công việc.", "Trong quá trình thúc đẩy kế hoạch đã phát sinh nhiều vấn đề.", "Bạn sắp đến chơi nên chuẩn bị bữa tối."], "syn": "手順(てじゅん)・計画(けいかく)・準備(じゅんび)"}, {"k": "駆け引き", "r": "かけひき", "m": "mặc cả, tính toán / 恋の駆け引き", "c": 1, "o": ["彼の会社は輸入品の駆け引きをしている。", "彼女は恋の駆け引きが上手だ。", "彼は駆け引きに手を出して、借金を抱えてしまった。", "収入と支出を計算したら、駆け引きゼロになった。"], "e": "✦セット: 恋の駆け引き\n✗1→「取引(とりひき)をしている」= giao dịch, buôn bán\n　→ 彼の会社は輸入品の取引をしている。= Công ty anh ấy đang giao dịch hàng nhập khẩu\n✗3→「賭(か)け事(ごと)に手を出した」= sa vào cờ bạc\n　→ 彼は賭け事に手を出して、借金を抱えてしまった。= Anh ấy sa vào cờ bạc và mang nợ\n✗4→「差(さ)し引(ひ)きゼロ」= hòa vốn\n　→ 収入と支出を計算したら、差し引きゼロになった。= Tính toán thu chi thì ra bằng không\n✓2→ 彼女は恋の駆け引きが上手だ。= Cô ấy rất giỏi tính toán, mặc cả trong tình yêu", "t": ["Công ty anh ấy kinh doanh hàng nhập khẩu.", "Cô ấy rất giỏi tính toán trong tình yêu.", "Anh ấy đụng vào cờ bạc và mang nợ.", "Tính toán thu chi thì ra bằng không."], "syn": "交渉(こうしょう)・戦術(せんじゅつ)・策略(さくりゃく)"}, {"k": "前触れ", "r": "まえぶれ", "m": "điềm báo / ～の前触れ", "c": 2, "o": ["化粧品メーカーの新製品の前触れがテレビに流れた。", "彼は西暦3000年に人類は滅亡すると前触れした。", "空に虹がかかったのは、何かいいことの前触れかもしれない。", "彼はみんなの前触れを裏切って、試合に負けてしまった。"], "e": "✦セット: ～の前触れ・前触れもなく\n✗1→「CM/宣伝(せんでん)」= quảng cáo\n　→ 化粧品メーカーの新製品のCMがテレビに流れた。= Quảng cáo sản phẩm mới của hãng mỹ phẩm được phát trên TV\n✗2→「予言(よげん)した」= tiên tri\n　→ 彼は西暦3000年に人類は滅亡すると予言した。= Anh ấy tiên tri rằng nhân loại sẽ diệt vong vào năm 3000\n✗4→「期待(きたい)を裏切って」= phụ lòng kỳ vọng\n　→ 彼はみんなの期待を裏切って、試合に負けてしまった。= Anh ấy phụ lòng kỳ vọng của mọi người và thua trận đấu\n✓3→ 空に虹がかかったのは、何かいいことの前触れかもしれない。= Cầu vồng trên bầu trời có thể là điềm báo của điều tốt lành", "t": ["Quảng cáo sản phẩm mới của hãng mỹ phẩm phát trên TV.", "Anh ấy tiên tri nhân loại sẽ diệt vong năm 3000.", "Cầu vồng trên bầu trời có thể là điềm báo điều gì đó tốt lành.", "Anh ấy phản bội kỳ vọng của mọi người và thua trận đấu."], "syn": "予兆(よちょう)・兆し(きざし)・サイン"}]}, "第88回": {"words": "相次ぐ・心がける・引き起こす・差し支える・立て替える・恐れ入る", "qs": [{"k": "相次ぐ", "r": "あいつぐ", "m": "liên tiếp xảy ra, dồn dập", "c": 1, "o": ["取り引き先から電話があって田中部長に相次いだ。", "この近くの交差点で交通事故が相次いだ。", "10分間の休憩をはさみ、会議は相次いだ。", "工事が終わり、やっとインターネットが相次いだ。"], "t": ["Có điện thoại từ đối tác và chuyển liên tiếp đến trưởng phòng Tanaka.", "Tai nạn giao thông xảy ra liên tiếp ở giao lộ gần đây.", "Sau giải lao 10 phút, cuộc họp liên tiếp diễn ra.", "Công trình xong, cuối cùng internet a anh ấy đã thu hút khán giả\n✓3→ 彼の不注意が事故を引き起こした。= Sự bất cẩn của anh ấy đã gây ra tai nạn", "syn": "招く(まねく)・もたらす・発生させる(はっせいさせる)"}, {"k": "差し支える", "r": "さしつかえる", "m": "gây trở ngại, bất tiện", "c": 3, "o": ["おしゃべりをして授業を差し支えないでほしい。", "彼の皮肉に彼女は気分を差し支えた。", "仕事で大変な父を家族全員が差し支えた。", "仕事に差し支えるので酒は控えた。"], "t": ["Tôi muốn mọi người đừng nói chuyện làm trở ngại giờ học.", "Lời mỉa mai của anh ấy làm tâm trạng cô ấy bị ảnh hưởng.", "Cả gia đình hỗ trợ người cha bận rộn với công việc.", "Vì sợ ảnh hưởng đến công việc nên anh ấy kiêng rượu."], "e": "✦セット: 仕事に差し支える・差し支えなければ\n✗1→「妨げないで」= đừng cản trở\n　→ おしゃべりをして授業を妨げないでほしい。= Tôi muốn mọi người đừng nói chuyện làm trở ngại giờ học\n✗2→「害した」= làm tổn hại\n　→ 彼の皮肉に彼女は気分を害した。= Lời mỉa mai làm tâm trạng cô ấy xấu đi\n✗3→「支えた」= chống đỡ, hỗ trợ\n　→ 仕事で大変な父を家族全員が支えた。= Cả gia đình hỗ trợ người cha bận rộn\n✓4→ 仕事に差し支えるので酒は控えた。= Vì sợ ảnh hưởng đến công việc nên anh ấy kiêng rượu", "syn": "支障をきたす(ししょうをきたす)・妨げる(さまたげる)・影響する(えいきょうする)"}, {"k": "立て替える", "r": "たてかえる", "m": "trả thay, ứng tiền trước", "c": 0, "o": ["彼は切符を買うとき彼女の分を立て替えた。", "監督は動きが鈍くなってきた選手を立て替えた。", "病気で入院した社長は一時的に息子を社長に立て替えた。", "ベンチがなかったのでスーツケースを立て替えて座った。"], "t": ["Khi mua vé, anh ấy đã trả thay phần của cô ấy.", "Huấn luyện viên thay thế cầu thủ đã chậm lại.", "Giám đốc nhập viện vì bệnh, tạm thời để con trai thay thế.", "Vì không có ghế nên ngồi lên vali thay thế."], "e": "✦セット: 費用・代金を立て替える\n✗2→「交代させた」= thay người (thể thao)\n　→ 監督は動きが鈍くなってきた選手を交代させた。= Huấn luyện viên thay thế cầu thủ đã chậm lại\n✗3→「代理にした」= để làm đại diện thay\n　→ 病気で入院した社長は一時的に息子を代理にした。= Giám đốc để con trai làm đại diện tạm thời\n✗4→「代わりにして」= dùng thay thế\n　→ ベンチがなかったのでスーツケースを代わりにして座った。= Dùng vali thay ghế để ngồi\n✓1→ 彼は切符を買うとき彼女の分を立て替えた。= Khi mua vé, anh ấy đã trả thay phần của cô ấy", "syn": "先払い(さきばらい)・代わりに払う(かわりにはらう)・肩代わり(かたがわり)"}, {"k": "恐れ入る", "r": "おそれいる", "m": "vô cùng cảm ơn / thán phục / xin lỗi (khiêm tốn)", "c": 0, "o": ["彼の能力の高さには恐れ入った。", "漁村の人々は津波に恐れ入っていた。", "彼は自分の学歴を恐れ入って話した。", "薬を飲んでいたので車 const scores = {};
var wrongItems = [];
let currentRound = null, shuffled = [], cur = 0, score = 0, answered = false;

function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }


function speakJapanese(text){
  if(!text) return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=0.9; u.pitch=1; u.volume=1;
  function doSpeak(){
    var vs=window.speechSynthesis.getVoices();
    var v=vs.find(function(x){return x.lang==='ja-JP'||x.lang.startsWith('ja');});
    if(v) u.voice=v;
    window.speechSynthesis.speak(u);
  }
  if(window.speechSynthesis.getVoices().length===0){
    window.speechSynthesis.addEventListener('voiceschanged',doSpeak,{once:true});
  } else { doSpeak(); }
}

function speakWord(){
  var k=document.getElementById('w-kanji');
  if(k) speakJapanese(k.textContent);
}

function retryWrongInline(){
  if(!wrongItems.length) return;
  shuffled=wrongItems.slice();
  cur=0; score=0; answered=false; wrongItems=[];
  var rb=document.getElementById('retry-bar'); if(rb) rb.style.display='none';
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').classList.remove('show');
  showQ();
}

function toggleWL(){
  var wb=document.getElementById('wl-body');
  if(!wb) return;
  if(wb.classList.contains('show')){ wb.classList.remove('show'); return; }
  var h='';
  for(var i=0;i<wrongItems.length;i++){
    var wq=wrongItems[i];
    h+='<div style="padding:8px 0;border-bottom:1px solid #f0f0ea;">';
    h+='<strong>'+wq.k+'</strong> <span style="color:#888;font-size:12px;">'+wq.r+'</span>';
