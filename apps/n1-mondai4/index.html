    h+='</div>';
  }
  h+='<button onclick="retryWrongInline()" style="margin-top:10px;width:100%;padding:9px;border-radius:8px;border:1px solid #1D9E75;background:#EAF3DE;color:#27500A;font-size:13px;cursor:pointer;font-family:inherit;">間違えた問題だけやり直す</button>';
  wb.innerHTML=h;
  wb.classList.add('show');
}

function buildFeedback(q, chosen){
  var c=q.c;
  var elines=q.e.split('\n');
  var setLine='', wrongMap={}, curIdx=-1;
  for(var i=0;i<elines.length;i++){
    var ln=elines[i];
    if(!ln) continue;
    var code=ln.charCodeAt(0);
    if(code===0x2726||code===0x2746){
      // ✦ U+2726 or U+2746 = セット line
      setLine=ln; curIdx=-1;
    } else if(code===0x2717){
      // ✗
      var mm=ln.match(/^.(\d+)/);
      if(mm){ curIdx=parseInt(mm[1])-1; wrongMap[curIdx]={fix:ln,sent:'',vn:''}; }
    } else if(code===0x3000||code===0x2192){
      // 　→ continuation
      if(curIdx>=0&&wrongMap[curIdx]){
        var tr=ln.replace(/^[\u3000\s]*\u2192\s*/,'');
        var eq=tr.indexOf('\u3002= ');
        if(eq>=0){ wrongMap[curIdx].sent=tr.substring(0,eq+1); wrongMap[curIdx].vn=tr.substring(eq+3); }
        else{ wrongMap[curIdx].sent=tr; }
      }
    }
  }
  function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,''); }

  // parse セット items
  var setItems=[];
  if(setLine){
    var ci=setLine.indexOf(':');
    if(ci<0) ci=setLine.indexOf('\uff1a');
    var setRaw=ci>=0?setLine.substring(ci+1).trim():setLine.substring(1).trim();
    var parts=setRaw.split('\u30fb');
    var cs=q.o[c];
    for(var p=0;p<parts.length;p++){
      var it=parts[p].trim();
      if(!it) continue;
      var bare=it.replace(/^[\uff5e~\u301c]/,'');
      setItems.push({text:it, bold:bare.length>0&&cs.indexOf(bare)>=0});
    }
  }

  var h='<div style="font-size:15px;line-height:1.85;background:#f7faf7;border-radius:12px;padding:14px 14px 10px;">';

  // 支持（しじ）：nghĩa 🔊
  h+='<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:2px;">';
  h+='<span style="font-size:23px;font-weight:700;">'+q.k+'</span>';
  h+='<span style="font-size:15px;color:#555;">\uff08'+q.r+'\uff09\uff1a</span>';
  h+='<button onclick="speakJapanese(\''+esc(q.k)+'\')" style="background:none;border:none;font-size:19px;cursor:pointer;opacity:0.8;padding:0;">\ud83d\udd0a</button>';
  h+='</div>';
  h+='<div style="font-size:15px;color:#1D9E75;font-weight:600;margin-bottom:8px;">'+q.m+'</div>';

  // セット：
  if(setItems.length>0){
    h+='<div style="margin-bottom:7px;">';
    h+='<span style="font-size:15px;font-weight:700;color:#1a5fb4;">\u30bb\u30c3\u30c8\uff1a</span> ';
    for(var p=0;p<setItems.length;p++){
      if(p>0) h+='<span style="color:#bbb;margin:0 1px;">\u30fb</span>';
      if(setItems[p].bold){
        h+='<strong style="color:#0d2d6b;background:#bdd7ff;border-radius:4px;padding:2px 9px;font-size:16px;">'+setItems[p].text+'</strong>';
      } else {
        h+='<span style="color:#1a5fb4;font-size:16px;">'+setItems[p].text+'</span>';
      }
    }
    h+='</div>';
  }

  // 同義語：xuống dòng
  if(q.syn){
    h+='<div style="margin-bottom:10px;">';
    h+='<span style="font-size:13px;font-weight:700;color:#555;">\u540c\u7fa9\u8a9e\uff1a</span><br>';
    h+='<span style="font-size:14px;color:#333;">'+q.syn+'</span>';
    h+='</div>';
  }

  h+='<hr style="border:none;border-top:1px solid #c8e6c9;margin:6px 0 8px;">';

  // ✓ CORRECT
  h+='<div style="background:#EAF3DE;border:2px solid #639922;border-radius:10px;padding:11px 13px;margin:5px 0;">';
  h+='<span style="font-weight:700;color:#27500A;">\u2713'+(c+1)+'</span> '+q.o[c];
  h+=' <button onclick="speakJapanese(\''+esc(q.o[c])+'\')" style="background:none;border:none;font-size:13px;cursor:pointer;opacity:0.6;padding:0 3px;">\ud83d\udd09</button>';
  if(q.t&&q.t[c]) h+='<div style="font-size:13px;color:#1a6e3c;font-style:italic;font-weight:500;margin-top:2px;">= '+q.t[c]+'</div>';
  h+='</div>';

  // ✗ WRONG
  for(var i=0;i<q.o.length;i++){
    if(i===c) continue;
    var isCh=(i===chosen);
    var bg=isCh?'#FCEBEB':'#fffaf5';
    var bd=isCh?'#A32D2D':'#e0b070';
    h+='<div style="background:'+bg+';border:'+(isCh?'2px':'1px')+' solid '+bd+';border-radius:10px;padding:11px 13px;margin:5px 0;">';
    h+='<span style="font-weight:700;color:#c05e00;">\u2717'+(i+1)+'</span> '+q.o[i];
    h+=' <button onclick="speakJapanese(\''+esc(q.o[i])+'\')" style="background:none;border:none;font-size:13px;cursor:pointer;opacity:0.6;padding:0 3px;">\ud83d\udd09</button>';
    var wm=wrongMap[i];
    if(wm){
      var ai=wm.fix.indexOf('\u2192');
      if(ai>=0){
        h+='<div style="margin-top:6px;padding:7px 10px;background:#fff3e0;border-left:3px solid #e0a060;border-radius:0 6px 6px 0;">';
        h+='<div style="color:#c05e00;font-weight:600;font-size:13px;">'+wm.fix.substring(ai)+'</div>';
        if(wm.sent){
          h+='<div style="color:#444;font-size:13px;margin-top:2px;">\u2192 '+wm.sent+'</div>';
          if(wm.vn) h+='<div style="color:#2a6496;font-style:italic;font-size:13px;">= '+wm.vn+'</div>';
        }
        h+='</div>';
      }
    }
    h+='</div>';
  }

  h+='</div>';
  return h;
}

function resumeProgress(){
  var prog=loadProgress();
  if(!prog||!allData[prog.round]) return;
  currentRound=prog.round;
  shuffled=allData[prog.round].qs.slice();
  cur=Math.min(prog.cur, shuffled.length-1);
  score=0; answered=false; wrongItems=[];
  document.getElementById('menu-area').style.display='none';
  document.getElementById('score-card').classList.remove('show');
  document.getElementById('quiz-area').style.display='';
  showQ();
}

function buildMenu(){
  const menu = document.getElementById('menu');
  menu.innerHTML = '';
  sections.forEach(sec => {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = sec[0];
    menu.appendChild(lbl);
    sec[1].forEach(r => {
      const q = allData[r];
      const btn = document.createElement('button');
      btn.className = 'menu-btn' + (scores[r]!==undefined?' done':'');
      const chip = scores[r]!==undefined?`<span class="score-chip">${scores[r]}/${q.qs.length}</span>`:'';
      btn.innerHTML = `<div class="round-title">${r} ${chip}</div><div class="word-list">${q.words}</div>`;
      btn.onclick = ()=>startRound(r);
      menu.appendChild(btn);
    });
  });
}

function saveProgress(round, idx){
  try{ localStorage.setItem('mondai4_progress', JSON.stringify({round:round, cur:idx, ts:Date.now()})); }catch(e){}
}
function loadProgress(){
  try{ var d=localStorage.getItem('mondai4_progress'); return d?JSON.parse(d):null; }catch(e){return null;}
}

function startRound(r){
  currentRound = r;
  shuffled = allData[r].qs.slice();
  cur = 0; score = 0; answered = false; wrongItems = [];
  document.getElementById('menu-area').style.display='none';
  document.getElementById('score-card').classList.remove('show');
  document.getElementById('quiz-area').style.display='';
  showQ();
}

function showQ(){
  answered = false;
  const q = shuffled[cur];
  document.getElementById('w-round').textContent = currentRound;
  document.getElementById('w-kanji').textContent = q.k;
  document.getElementById('w-reading').textContent = q.r;
  document.getElementById('w-meaning').textContent = q.m;
  document.getElementById('w-meaning').style.display = 'none';
  document.getElementById('counter').textContent = `${cur+1} / ${shuffled.length}`;
  document.getElementById('prog').style.width = (cur/shuffled.length*100)+'%';
  const fb = document.getElementById('feedback');
  fb.className='feedback'; fb.style.display='none';
  document.getElementById('next-btn').classList.remove('show');
  const od = document.getElementById('opts');
  od.innerHTML='';
  q.o.forEach((opt,i)=>{
    const b = document.createElement('button');
    b.className='opt';
    b.textContent=`${i+1}\u3000${opt}`;
    b.onclick=()=>pick(i);
    od.appendChild(b);
  });
}


function pick(chosen){
  if(answered)return;
  answered=true;
  var q=shuffled[cur];
  var opts=document.querySelectorAll('.opt');
  opts.forEach(function(b){b.disabled=true;});
  // Color buttons: chosen=red if wrong, chosen=green if correct; correct always green
  opts.forEach(function(b,idx){
    if(idx===q.c){
      b.style.background='#EAF3DE';
      b.style.borderColor='#639922';
      b.style.color='#27500A';
      b.style.fontWeight='600';
      var origText=b.textContent;
      var safeTxt=q.o[idx].replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'');
      b.innerHTML='<span style="display:flex;justify-content:space-between;align-items:center;gap:8px;"><span>'+origText+'</span><span onclick="event.stopPropagation();speakJapanese(\''+safeTxt+'\')" style="flex-shrink:0;font-size:16px;opacity:0.7;cursor:pointer;">\ud83d\udd0a</span></span>';
    } else if(idx===chosen){
      b.style.background='#FCEBEB';
      b.style.borderColor='#A32D2D';
      b.style.color='#501313';
    }
  });
  var fb=document.getElementById('feedback');
  fb.innerHTML=buildFeedback(q,chosen);
  fb.style.display='block';
  if(chosen===q.c){
    score++;
    fb.className='feedback correct-fb show';
  } else {
    fb.className='feedback wrong-fb show';
    wrongItems.push(q);
  }
  var nb=document.getElementById('next-btn');
  nb.textContent=cur<shuffled.length-1?'次へ →':'結果を見る →';
  nb.classList.add('show');
  // top next btn
  var nbt=document.getElementById('next-btn-top');
  if(nbt){ nbt.style.display='block'; nbt.textContent=cur<shuffled.length-1?'次へ →':'結果を見る →'; nbt.onclick=nextQ; }
  var pb=document.getElementById('prev-btn');
  if(pb){ pb.disabled=(cur===0); pb.style.opacity=cur===0?'0.3':'1'; }
  var rb=document.getElementById('retry-bar');
  var wc=document.getElementById('wrong-count');
  if(rb&&wrongItems.length>0){ rb.style.display='block'; if(wc)wc.textContent=wrongItems.length; }
}

function prevQ(){
  if(cur===0)return;
  cur--;
  answered=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').classList.remove('show');
  var nbt=document.getElementById('next-btn-top'); if(nbt) nbt.style.display='none';
  showQ();
}

function showScore(){
  scores[currentRound]=score;
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('prog').style.width='100%';
  const sc=document.getElementById('score-card');
  sc.classList.add('show');
  document.getElementById('score-num').textContent=`${score} / ${shuffled.length}`;
  const pct=Math.round(score/shuffled.length*100);
  const msg=pct>=85?'完璧！🎉':pct>=70?'もう少し！📚':'頑張れ！💪';
  document.getElementById('score-lbl').textContent=`正解率 ${pct}% — ${msg}`;
  document.getElementById('btn-retry').onclick=()=>startRound(currentRound);
  var wls=document.getElementById('wl-section');
  if(wls){
    if(wrongItems.length>0){
      wls.style.display='block';
      var wtog=document.querySelector('#wl-section .wl-toggle');
      if(wtog) wtog.textContent='間違えた問題 ('+wrongItems.length+'問) を確認 ▾';
    } else { wls.style.display='none'; }
  }
}

function goMenu(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('score-card').classList.remove('show');
  document.getElementById('menu-area').style.display='';
  function nextQ(){
  cur++;
  if(cur>=shuffled.length) showScore();
  else showQ();
}

document.getElementById('next-btn').onclick=function(){
  cur++;
  if(cur>=shuffled.length) showScore();
  else showQ();
};

buildMenu();
}

function nextQ(){
  cur++;
  if(cur>=shuffled.length) showScore();
  else showQ();
}

document.getElementById('next-btn').onclick=function(){
  cur++;
  if(cur>=shuffled.length) showScore();
  else showQ();
};

buildMenu();
</script>
