document.querySelector('.tabs').addEventListener('keydown',function(event){if(['ArrowLeft','ArrowRight','Home','End'].indexOf(event.key)===-1)return;var tabs=Array.from(this.querySelectorAll('[role="tab"]'));var index=tabs.indexOf(event.target.closest('[role="tab"]'));if(index<0)return;event.preventDefault();var next=event.key==='Home'?0:event.key==='End'?tabs.length-1:(index+(event.key==='ArrowRight'?1:-1)+tabs.length)%tabs.length;tabs[next].click();tabs[next].focus();});
function fv(){var s=document.getElementById('si').value.toLowerCase();var r=document.getElementById('fr').value;var p=document.getElementById('fp').value;visibleCount=72;rv(V.filter(function(v){return(!r||v.r===r)&&(!p||v.p===p)&&(!s||v.k.indexOf(s)>=0||v.h.indexOf(s)>=0||v.m.indexOf(s)>=0||v.sy.join('').indexOf(s)>=0);}));}
function escAttr(value){return String(value||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rv(list){currentList=list;var shown=Math.min(visibleCount,list.length);document.getElementById('vc').textContent=shown<list.length?shown+' / '+list.length+' 語':list.length+' 語';document.getElementById('vg').innerHTML=list.slice(0,shown).map(function(v){var speechName='Phát âm '+v.k+' ('+v.h+')';return '<div class="card"><div class="wrow"><span class="qbadge">'+v.n+'</span><span class="wk">'+v.k+'</span><span class="wh">'+v.h+'</span><button type="button" class="speech-control" data-speak-text="'+escAttr(v.h)+'" aria-label="'+escAttr(speechName)+'">Nghe</button><span class="ptag">'+v.p+'</span><span class="rtag">第'+v.r+'回</span></div><div class="mng">'+v.m+'</div>'+(v.vi?'<div class="vi">Nghĩa · '+v.vi+'</div>':'')+'<div class="synb"><div class="synl">≒ 類義語</div>'+v.sy.map(function(s,i){return '<span class="syi'+(i===0?' pri':'')+'">'+ s+'</span>';}).join('')+'</div><div class="clls">Cụm từ · '+v.co.map(function(c){return '<span class="ct">'+c+'</span>';}).join('')+'</div></div>';}).join('');document.getElementById('more-vocab').innerHTML=shown<list.length?'<button type="button" class="load-more" onclick="loadMoreVocab()">Hiển thị thêm '+Math.min(72,list.length-shown)+' mục</button>':'';}
function loadMoreVocab(){visibleCount+=72;rv(currentList);}
function startQ(){var rf=document.getElementById('qr').value;var cs=document.getElementById('qc').value;var pool=rf==='all'?V.slice():V.filter(function(v){return v.r===rf;});pool=shuf(pool);var cnt=cs==='all'?pool.length:Math.min(parseInt(cs),pool.length);qq=pool.slice(0,cnt);qi=0;sc=0;document.getElementById('qs').style.display='none';document.getElementById('qa').classList.add('active');document.getElementById('res').classList.remove('show');showQ();}
function showQ(){var q=qq[qi],tot=qq.length;document.getElementById('qn').textContent=(qi+1)+' / '+tot;document.getElementById('sm').textContent='正解: '+sc;document.getElementById('pb').style.width=((qi/tot)*100)+'%';document.getElementById('qk').textContent=q.k;document.getElementById('qhi').textContent=q.h;document.getElementById('qmt').textContent='第'+q.r+'回 · '+q.p;var s=q.s;if(s.indexOf(q.k)>=0){s=s.replace(q.k,'<span class="ul">'+q.k+'</span>');}else if(s.indexOf(q.h)>=0){s=s.replace(q.h,'<span class="ul">'+q.h+'</span>');}currentSentence=q.s;document.getElementById('qsen').innerHTML=s;document.getElementById('qqn').textContent=q.n||'';document.getElementById('qvt').textContent=q.vi||'';document.getElementById('qvi').style.display='none';document.getElementById('og').innerHTML=q.op.map(function(o,i){return '<button type="button" class="ob" onclick="sel('+i+')" id="o'+i+'"><span class="nm">'+(i+1)+'</span>'+o+'</button>';}).join('');document.getElementById('exp').classList.remove('show');document.getElementById('bn').classList.remove('show');ans=false;}
function sel(c){if(ans)return;ans=true;var q=qq[qi],co=q.a;if(c===co)sc++;for(var i=0;i<q.op.length;i++){var b=document.getElementById('o'+i);b.disabled=true;if(i===co)b.classList.add(c===co&&i===c?'ok':'rv');if(i===c&&c!==co)b.classList.add('ng');}var sh=q.sy.map(function(s,i){return '<span class="esyi'+(i===0?' pri':'')+'">'+ s+'</span>';}).join('');document.getElementById('exp').innerHTML='<div style="margin-bottom:8px"><span class="ew">'+q.k+'</span><span class="eh">'+q.h+'</span></div><div style="font-size:13px;color:#333;margin:4px 0">📖 '+q.m+'</div><div style="font-size:12px;color:#b45309;background:#FFFBEB;border-radius:6px;padding:3px 8px;margin:4px 0;display:inline-block">🇻🇳 '+(q.vi||'')+'</div><div style="margin:8px 0"><span style="font-size:11px;color:#7F77DD;font-weight:500">≒ 類義語：</span><br>'+sh+'</div><div style="font-size:11px;color:#888">📌 '+q.co.map(function(c){return '<span class="ct">'+c+'</span>';}).join('')+'</div>';if(q.vi){document.getElementById('qvi').style.display='inline-block';}document.getElementById('exp').classList.add('show');document.getElementById('sm').textContent='正解: '+sc;document.getElementById('bn').classList.add('show');}
function nextQ(){qi++;if(qi>=qq.length)showRes();else showQ();}
function showRes(){document.getElementById('qa').classList.remove('active');document.getElementById('res').classList.add('show');var tot=qq.length,pct=Math.round((sc/tot)*100);document.getElementById('rsc').textContent=sc;document.getElementById('rtl').textContent='/ '+tot+' 問';document.getElementById('rmsg').textContent=(pct>=90?'🎉 素晴らしい！N1合格レベルです！':pct>=70?'👍 よくできました！':pct>=50?'📚 復習が必要です。':'💪 もっと練習！')+'（正答率: '+pct+'%）';}
function resetQ(){document.getElementById('res').classList.remove('show');document.getElementById('qs').style.display='';document.getElementById('qa').classList.remove('active');}
function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
var currentSentence = '';
function speakJapanese(text) {
  if (!text) return;
  window.speechSynthesis.cancel();
  var utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ja-JP';
  utterance.rate = 0.9;
  utterance.pitch = 1;
  utterance.volume = 1;
  function doSpeak() {
    var voices = window.speechSynthesis.getVoices();
    var japaneseVoice = voices.find(function(v){ return v.lang === 'ja-JP' || v.lang.startsWith('ja'); });
    if (japaneseVoice) utterance.voice = japaneseVoice;
    window.speechSynthesis.speak(utterance);
  }
  if (window.speechSynthesis.getVoices().length > 0) {
    doSpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = function() { doSpeak(); };
  }
}
document.addEventListener('click', function(event) {
  var control = event.target.closest('.speech-control');
  if (!control) return;
  if (control.dataset.speakText) {
    speakJapanese(control.dataset.speakText);
    return;
  }
  if (control.dataset.speakSource) {
    var source = document.getElementById(control.dataset.speakSource);
    speakJapanese(source ? source.textContent : '');
    return;
  }
  if (control.dataset.speakCurrent === 'sentence') speakJapanese(currentSentence);
});
rv(V);
</script>
